/* Render a single row in coverage workspace — shows Month and Category columns. */
function renderCoverageTableRow(r) {
  var key = r.monthIdx + '-' + r.gi + '-' + (r.type === 'auto' ? 'auto-' : '') + r.ti;
  var reviewed = _isCoverageRowReviewed(r);
  var state = S3.ws.txnStates[key];

  var rowStyle = '';
  var statusPill = '';
  var actionsHtml = '';

  if (reviewed) {
    rowStyle = 'background:var(--color-success-surface);opacity:.85';
    if (state === 'confirmed') statusPill = '<span style="font-size:10px;color:var(--color-success-text);font-weight:600">&#10003; Confirmed in ' + r.category + '</span>';
    else if (state === 'overridden') statusPill = '<span style="font-size:10px;color:var(--color-action);font-weight:600">&#10003; Overridden in ' + r.category + '</span>';
    else if (state === 'flagged') statusPill = '<span style="font-size:10px;color:var(--color-danger-text);font-weight:600">&#128681; Flagged from ' + r.category + '</span>';
    else if (r.type === 'auto' && S3.ws.confirmedClusters[r.monthIdx + '-' + r.gi + '-batch'] === 'confirmed')
      statusPill = '<span style="font-size:10px;color:var(--color-success-text);font-weight:600">&#10003; In ' + r.category + ' batch</span>';
    else statusPill = '<span style="font-size:10px;color:var(--color-success-text);font-weight:600">&#10003; In ' + r.category + '</span>';
    actionsHtml = statusPill;
  } else {
    var checked = S3.ws.selectedRows[key] ? 'checked' : '';
    actionsHtml = '<div class="workspace-row-actions">'
      + '<button class="tbl-btn confirm" onclick="wsConfirmFromCoverage(\'' + key + '\')">Confirm</button>'
      + '<button class="tbl-btn override-link" onclick="wsStartOverrideFromCoverage(\'' + key + '\')">Override</button>'
      + '<button class="tbl-btn flag" onclick="wsStartFlagFromCoverage(\'' + key + '\')">Flag</button>'
      + '</div>';
  }

  var cbCell = reviewed
    ? '<td class="cb-col"></td>'
    : '<td class="cb-col"><input type="checkbox" ' + (S3.ws.selectedRows[key] ? 'checked' : '') + ' onclick="wsToggleRow(\'' + key + '\')" /></td>';

  var vendor = r.txn.vendor === '—'
    ? '<span style="color:var(--color-text-tertiary);font-style:italic">— (manual)</span>'
    : r.txn.vendor;

  var mappedTo = (r.txn.suggested || '').split('·')[0].trim() || '—';
  /* Show short account code only to keep column tight */
  if (r.txn.suggested) {
    var parts = r.txn.suggested.split('·');
    if (parts.length > 1) mappedTo = parts[0].trim() + ' ·' + parts.slice(1).join('·');
  }

  return '<tr style="' + rowStyle + '">'
    + cbCell
    + '<td class="mono">' + r.txn.ref + '</td>'
    + '<td class="cov-context"><span style="font-size:11px;font-weight:500">' + r.monthLbl + '</span></td>'
    + '<td class="cov-context"><span style="font-size:11px">' + r.category + '</span></td>'
    + '<td style="color:var(--color-text-secondary)">' + vendor + '</td>'
    + '<td style="color:var(--color-text-secondary);font-size:11px">' + mappedTo + '</td>'
    + '<td class="amt">' + r.txn.amount + '</td>'
    + '<td>' + actionsHtml + '</td>'
    + '</tr>';
}

/* === Action handlers for coverage view === */
function wsSelectCoverage(coverageId) {
  S3.ws.selectedCoverage = coverageId;
  S3.ws.coverageFilter = 'toReview';
  renderMonthWorkspace('all');
}

function wsSelectClusterAllMode() {
  /* Convenience: navigate back into All-months mode from elsewhere */
  S3.ws.activeMonth = 'all';
  S3.ws.selectedCoverage = null;
  renderMonthWorkspace('all');
}

function wsSetCoverageFilter(f) {
  S3.ws.coverageFilter = f;
  renderMonthWorkspace('all');
}

function wsConfirmFromCoverage(key) {
  /* key is monthIdx-gi-(auto-)?ti */
  if (key.indexOf('-auto-') >= 0) {
    /* Auto-mapped row — confirming from coverage means "I personally reviewed and accept this auto-mapping".
       Track separately from overrides so we don't pollute the override semantics. */
    if (!S3.ws.coverageConfirmed) S3.ws.coverageConfirmed = {};
    S3.ws.coverageConfirmed[key] = { by: 'Controller', when: 'Day 18 · 14:32 WIB' };
  } else {
    S3.ws.txnStates[key] = 'confirmed';
  }
  invalidateCoverageCache();
  renderMonthWorkspace('all');
}

function wsStartOverrideFromCoverage(key) {
  S3.ws.overrideForm = key;
  S3.ws.overrideDraft = { account: '', dim: '', reason: '' };
  /* Pop a small inline override form. For the prototype we keep it simple — alert-driven. */
  var account = prompt('Override mapping for this transaction. New account:');
  if (!account) return;
  var reason = prompt('Reason for override (audit trail):');
  if (!reason) return;
  S3.ws.overrides[key] = { account: account, dim: '', reason: reason, by: 'Controller', when: 'Day 18' };
  if (key.indexOf('-auto-') < 0) S3.ws.txnStates[key] = 'overridden';
  invalidateCoverageCache();
  renderMonthWorkspace('all');
}

function wsStartFlagFromCoverage(key) {
  if (key.indexOf('-auto-') >= 0) {
    alert('Auto-mapped rows can be overridden but not flagged. Use Override instead.');
    return;
  }
  var comment = prompt('What should your IA investigate?');
  if (!comment) return;
  S3.ws.txnStates[key] = 'flagged';
  S3.ws.flagComments[key] = comment;
  invalidateCoverageCache();
  renderMonthWorkspace('all');
}

function wsCoverageToggleAll() {
  var coverageId = S3.ws.selectedCoverage;
  if (!coverageId) return;
  var rows = getCoverageRows(coverageId);
  var keys = rows.filter(function(r) { return !_isCoverageRowReviewed(r); }).slice(0, 100).map(function(r) {
    return r.monthIdx + '-' + r.gi + '-' + (r.type === 'auto' ? 'auto-' : '') + r.ti;
  });
  var allSelected = keys.length > 0 && keys.every(function(k) { return S3.ws.selectedRows[k]; });
  if (allSelected) keys.forEach(function(k) { delete S3.ws.selectedRows[k]; });
  else keys.forEach(function(k) { S3.ws.selectedRows[k] = true; });
  renderMonthWorkspace('all');
}



function renderClusterCard(monthIdx, grp, gi) {
  var isActive = S3.ws.selectedCluster === gi;
  var autoMappedCount = grp.total - grp.toReview;
  var isOrphan = grp.orphan;
  var hasIA = (grp.txns || []).some(function(t){return t.hasFlag && (t.flagReason==='reclass' || t.flagReason==='cash-restate' || t.flagReason==='fx-revaluation');});

  /* Compute manually-mapped counter from confirmed state of review rows */
  var manuallyMapped = 0;
  (grp.txns || []).forEach(function(txn, ti) {
    var key = monthIdx + '-' + gi + '-' + ti;
    var state = S3.ws.txnStates[key];
    if (state === 'confirmed' || state === 'overridden') manuallyMapped++;
  });
  /* Also: if the AI batch was confirmed, those count too (vendor pattern apply) */
  var batchKey = monthIdx + '-' + gi + '-batch';
  if (grp.autoBatch && S3.ws.confirmedClusters[batchKey] === 'confirmed') {
    manuallyMapped += grp.autoBatch.count;
  }
  /* Also: if IA band was accepted, count those iaTxns */
  var iaBandKey = monthIdx + '-' + gi + '-iaband';
  if (S3.ws.iaBandActions[iaBandKey] === 'accepted') {
    var iaTxns = (grp.txns || []).filter(function(t){return t.hasFlag && (t.flagReason==='reclass' || t.flagReason==='cash-restate' || t.flagReason==='fx-revaluation');});
    manuallyMapped += iaTxns.length;
  }

  var stillToReview = Math.max(0, grp.toReview - manuallyMapped);
  /* Cap at toReview so we don't double-count batch+IA both */
  if (manuallyMapped > grp.toReview && grp.autoBatch) {
    /* batch is separate from review rows — only cap if it inflates above what makes sense */
    /* keep going — manuallyMapped can exceed toReview in this case, but stillToReview should be 0 */
    stillToReview = 0;
  }

  var isDone = stillToReview === 0;
  var pctMapped = grp.total > 0 ? Math.round((autoMappedCount + manuallyMapped) / grp.total * 100) : 100;
  /* Cap pct at 100 (manual mapped + auto mapped can in edge cases exceed total due to batch counting) */
  if (pctMapped > 100) pctMapped = 100;

  var cardCls = 'cluster-card';
  if (isActive) cardCls += ' active';
  if (isOrphan) cardCls += ' danger';
  else if (isDone) cardCls += ' done';
  else if (hasIA) cardCls += ' has-ia';
  else cardCls += ' has-work';

  /* pills */
  var pills = [];
  if (isOrphan) {
    pills.push('<span class="cluster-card-pill flag-ia">' + grp.toReview + ' orphan</span>');
  } else if (isDone) {
    pills.push('<span class="cluster-card-pill done">All mapped &#10003;</span>');
  } else {
    pills.push('<span class="cluster-card-pill review">' + stillToReview + ' to review</span>');
  }
  if (hasIA && !isOrphan && !isDone) {
    pills.push('<span class="cluster-card-pill ia">IA</span>');
  }

  /* breakdown line — three states depending on what's been confirmed */
  var breakdownHtml;
  if (isDone) {
    if (manuallyMapped > 0) {
      breakdownHtml = '<div class="cluster-card-breakdown">'
        + '<span><span class="cluster-card-breakdown-num success">' + autoMappedCount + '</span> auto</span>'
        + '<span><span class="cluster-card-breakdown-num action">' + Math.min(manuallyMapped, grp.toReview + (grp.autoBatch ? grp.autoBatch.count : 0)) + '</span> manual</span>'
        + '</div>';
    } else {
      breakdownHtml = '<div class="cluster-card-breakdown"><span><span class="cluster-card-breakdown-num success">' + autoMappedCount + '</span> auto-mapped</span></div>';
    }
  } else if (manuallyMapped > 0) {
    breakdownHtml = '<div class="cluster-card-breakdown">'
      + '<span><span class="cluster-card-breakdown-num success">' + autoMappedCount + '</span> auto</span>'
      + '<span><span class="cluster-card-breakdown-num action">' + manuallyMapped + '</span> manual</span>'
      + '<span><span class="cluster-card-breakdown-num warn">' + stillToReview + '</span> to review</span>'
      + '</div>';
  } else {
    breakdownHtml = '<div class="cluster-card-breakdown">'
      + '<span><span class="cluster-card-breakdown-num success">' + autoMappedCount + '</span> auto-mapped</span>'
      + '<span><span class="cluster-card-breakdown-num warn">' + stillToReview + '</span> to review</span>'
      + '</div>';
  }

  var nameClsExtra = isDone ? ' done-clr' : '';
  var bigClsExtra = isDone ? ' done-clr' : '';
  var lblClsExtra = isDone ? ' done-clr' : '';
  var progClsExtra = isDone ? ' done-bg' : '';
  /* Progress bar: when manually mapped > 0 and not done yet, show two-tone fill */
  var progFillHtml;
  if (isDone) {
    progFillHtml = '<div class="cluster-card-prog-fill done" style="width:100%"></div>';
  } else if (manuallyMapped > 0) {
    /* Two-tone: auto fills green, manual extends with brand-blue */
    var autoPct = grp.total > 0 ? Math.round(autoMappedCount / grp.total * 100) : 0;
    var manualPct = grp.total > 0 ? Math.round(manuallyMapped / grp.total * 100) : 0;
    progFillHtml = '<div class="cluster-card-prog-fill done" style="width:' + autoPct + '%"></div>'
      + '<div class="cluster-card-prog-fill manual" style="width:' + manualPct + '%"></div>';
  } else {
    var autoPct = grp.total > 0 ? Math.round(autoMappedCount / grp.total * 100) : 0;
    progFillHtml = '<div class="cluster-card-prog-fill done" style="width:' + autoPct + '%"></div>';
  }

  return '<div class="' + cardCls + '" onclick="wsSelectCluster(' + gi + ')">'
    + '<div class="cluster-card-row">'
    +   '<span class="cluster-card-name' + nameClsExtra + '">' + grp.name + '</span>'
    +   '<div class="cluster-card-pill-wrap">' + pills.join('') + '</div>'
    + '</div>'
    + '<div class="cluster-card-num">'
    +   '<span class="cluster-card-num-big' + bigClsExtra + '">' + grp.total + '</span>'
    +   '<span class="cluster-card-num-lbl' + lblClsExtra + '">transactions</span>'
    + '</div>'
    + '<div class="cluster-card-prog' + progClsExtra + '" style="display:flex">' + progFillHtml + '</div>'
    + breakdownHtml
    + '</div>';
}

/* Empty state — month overview when no cluster selected */
function renderMonthOverviewPane(monthIdx, mo, groups) {
  var totalReview = groups.reduce(function(s,g){return s + (g.toReview||0);}, 0);

  return '<div class="workspace-pane">'
    + '<div class="workspace-empty">'
    +   '<div class="workspace-empty-title">Pick a category to review</div>'
    +   '<div class="workspace-empty-desc">' + totalReview + ' to review across ' + groups.length + ' categories</div>'
    + '</div>'
    + '</div>';
}

/* The actual cluster workspace (column 3 when cluster selected) */
function renderClusterWorkspace(monthIdx, mo, groups, gi) {
  var grp = groups[gi];
  var autoMappedCount = grp.total - grp.toReview;
  var clusterKey = monthIdx + '-' + gi;
  var clusterConfirmed = S3.ws.confirmedClusters[clusterKey];

  /* Header */
  var filt = S3.ws.activeFilter;
  var headerHtml = '<div class="workspace-hdr">'
    + '<div class="workspace-hdr-row">'
    +   '<div>'
    +     '<div class="workspace-hdr-title">' + grp.name + ' · ' + mo.m + ' 2025</div>'
    +     '<div class="workspace-hdr-meta">' + grp.total + ' transactions · ' + autoMappedCount + ' auto-mapped · ' + grp.toReview + ' to review</div>'
    +   '</div>'
    +   '<div class="workspace-filter-row">'
    +     '<span class="filter-lbl">Show:</span>'
    +     '<button class="' + (filt === 'review' ? 'btn-confirm' : 'btn-ghost') + '" onclick="wsSetFilter(\'review\')" style="font-size:11px;padding:4px 10px">To review (' + grp.toReview + ')</button>'
    +     '<button class="' + (filt === 'all' ? 'btn-confirm' : 'btn-ghost') + '" onclick="wsSetFilter(\'all\')" style="font-size:11px;padding:4px 10px">All (' + grp.total + ')</button>'
    +     '<button class="' + (filt === 'auto' ? 'btn-confirm' : 'btn-ghost') + '" onclick="wsSetFilter(\'auto\')" style="font-size:11px;padding:4px 10px">Auto-mapped (' + autoMappedCount + ')</button>'
    +   '</div>'
    + '</div>'
    + '</div>';

  /* AI batch banner — for confident vendor pattern (e.g. PT Sumber Makmur 143) */
  var batchBannerHtml = '';
  if (grp.autoBatch) {
    var batchKey = monthIdx + '-' + gi + '-batch';
    var batchState = S3.ws.confirmedClusters[batchKey]; /* 'confirmed' if user clicked Confirm all */
    if (batchState === 'confirmed') {
      batchBannerHtml = '<div class="batch-banner-wrap"><div class="batch-banner" style="opacity:.7">'
        + '<div class="batch-banner-row">'
        +   '<div class="batch-banner-text">'
        +     '<div class="batch-banner-title">&#10003; ' + grp.autoBatch.count + ' transactions confirmed — ' + grp.autoBatch.vendor + ' &rarr; ' + grp.autoBatch.account + '</div>'
        +     '<div class="batch-banner-meta">Total: ' + grp.autoBatch.amount + '</div>'
        +   '</div>'
        + '</div>'
        + '</div></div>';
    } else {
      batchBannerHtml = '<div class="batch-banner-wrap"><div class="batch-banner">'
        + '<div class="batch-banner-row">'
        +   '<div class="batch-banner-text">'
        +     '<div class="batch-banner-title">&#10003; AI batch detected: ' + grp.autoBatch.vendor + ' &rarr; ' + grp.autoBatch.account + '</div>'
        +     '<div class="batch-banner-meta">' + grp.autoBatch.count + ' transactions · ' + grp.autoBatch.amount + ' · 94% confidence · same vendor + description pattern</div>'
        +   '</div>'
        +   '<div class="batch-banner-actions">'
        +     '<button class="btn-ghost" style="font-size:11px;padding:5px 10px" onclick="wsInspectBatch(' + gi + ')">Inspect ' + grp.autoBatch.count + '</button>'
        +     '<button class="btn-confirm" style="font-size:11px;padding:5px 12px" onclick="wsConfirmBatch(\'' + batchKey + '\')">Confirm all ' + grp.autoBatch.count + '</button>'
        +   '</div>'
        + '</div>'
        + '</div></div>';
    }
  }

  /* IA recommendation band — for clusters with reclass/cash-restate/fx flags */
  var iaBandHtml = '';
  var iaTxns = (grp.txns || []).filter(function(t){return t.hasFlag && (t.flagReason==='reclass' || t.flagReason==='cash-restate' || t.flagReason==='fx-revaluation');});
  if (iaTxns.length > 0) {
    var firstIA = iaTxns[0];
    var iaBandKey = monthIdx + '-' + gi + '-iaband';
    var iaState = S3.ws.iaBandActions[iaBandKey];
    var bandLabel = firstIA.flagReason === 'reclass' ? 'IA recommends: reclassification'
      : firstIA.flagReason === 'cash-restate' ? 'IA: Cash → Accrual restatement'
      : 'IA: FX revaluation';

    /* If a batch banner is already present, IA band uses smaller top padding wrapper */
    var iaWrapStyle = batchBannerHtml ? ' style="padding-top:0"' : ' style="padding-top:12px"';

    if (iaState === 'accepted') {
      iaBandHtml = '<div class="ia-band-wrap"' + iaWrapStyle + '><div class="ia-band" style="opacity:.7">'
        + '<div class="ia-band-lbl">&#10003; ' + bandLabel + ' — accepted</div>'
        + '<div class="ia-band-text">' + iaTxns.length + ' transactions · documented in audit trail.</div>'
        + '</div></div>';
    } else {
      iaBandHtml = '<div class="ia-band-wrap"' + iaWrapStyle + '><div class="ia-band">'
        + '<div class="ia-band-lbl">' + bandLabel + '</div>'
        + '<div class="ia-band-text">' + (firstIA.flagNote || (iaTxns.length + ' transactions affected.')) + '</div>'
        + '<div class="ia-band-attr">— Reviewed by your IA</div>'
        + '<div class="ia-band-actions">'
        +   '<button class="btn-action" style="font-size:11px;padding:5px 12px" onclick="wsAcceptIA(\'' + iaBandKey + '\')">Accept (apply to ' + iaTxns.length + ')</button>'
        +   '<button class="btn-ghost" style="font-size:11px;padding:5px 10px" onclick="alert(\'In production: rejects the IA recommendation and lets you decide each row.\')">Reject &amp; review individually</button>'
        + '</div>'
        + '</div></div>';
    }
  }

  /* Section label + row table */
  var visibleTxns = grp.txns || [];
  var sectionLabel = '';
  if (filt === 'review') {
    if (grp.toReview === 0) sectionLabel = 'No transactions need review';
    else sectionLabel = grp.toReview + ' transactions need review';
  } else if (filt === 'auto') {
    sectionLabel = autoMappedCount + ' auto-mapped transactions';
    /* For auto filter, generate sample rows */
    visibleTxns = getAutoMappedRows(monthIdx, gi, grp);
  } else {
    /* all */
    sectionLabel = grp.total + ' transactions (review + auto-mapped)';
    var autoRows = getAutoMappedRows(monthIdx, gi, grp);
    var reviewRows = (grp.txns || []).slice();
    var combined = reviewRows.map(function(t,i){return {t:t, type:'review', origIdx:i};})
      .concat(autoRows.map(function(t,i){return {t:t, type:'auto', origIdx:i};}));
    /* sort by amount desc */
    combined.sort(function(a,b){
      var pa = parseInt(String(a.t.amount).replace(/[^0-9]/g,''), 10);
      var pb = parseInt(String(b.t.amount).replace(/[^0-9]/g,''), 10);
      return pb - pa;
    });
    visibleTxns = combined; /* this is the special "all" case — handled below */
  }

  var sectionLblHtml = '<div class="workspace-section-lbl">' + sectionLabel + '</div>';

  /* Build the table */
  var tableRows = '';
  if (filt === 'all') {
    /* combined all-mode: use the {t, type} shape */
    tableRows = visibleTxns.map(function(item) {
      var txn = item.t;
      if (item.type === 'auto') {
        return renderTxnTableRow(monthIdx, gi, item.origIdx, txn, 'auto');
      }
      return renderTxnTableRow(monthIdx, gi, item.origIdx, txn, 'review');
    }).join('');
  } else if (filt === 'auto') {
    tableRows = visibleTxns.map(function(txn, ti) {
      return renderTxnTableRow(monthIdx, gi, ti, txn, 'auto');
    }).join('');
  } else {
    /* review */
    tableRows = visibleTxns.map(function(txn, ti) {
      return renderTxnTableRow(monthIdx, gi, ti, txn, 'review');
    }).join('');
  }

  if (visibleTxns.length === 0) {
    tableRows = '<tr><td colspan="7" style="padding:24px;text-align:center;font-size:12px;color:var(--color-text-tertiary);font-weight:300">' + (grp.autoNote || 'No transactions in this view.') + '</td></tr>';
  }

  /* Build keys-of-selectable rows so the select-all checkbox works against this filter */
  var selectableKeys = [];
  if (filt === 'all') {
    visibleTxns.forEach(function(item) {
      var k = monthIdx + '-' + gi + '-' + (item.type === 'auto' ? 'auto-' : '') + item.origIdx;
      /* skip already-resolved rows */
      var st = S3.ws.txnStates[k];
      if (item.type === 'review' && (st === 'confirmed' || st === 'flagged' || st === 'overridden')) return;
      if (item.type === 'auto' && S3.ws.overrides[k]) return;
      selectableKeys.push(k);
    });
  } else if (filt === 'auto') {
    visibleTxns.forEach(function(txn, ti) {
      var k = monthIdx + '-' + gi + '-auto-' + ti;
      if (!S3.ws.overrides[k]) selectableKeys.push(k);
    });
  } else {
    visibleTxns.forEach(function(txn, ti) {
      var k = monthIdx + '-' + gi + '-' + ti;
      var st = S3.ws.txnStates[k];
      if (st !== 'confirmed' && st !== 'flagged' && st !== 'overridden') selectableKeys.push(k);
    });
  }
  var selectedCount = selectableKeys.filter(function(k){return S3.ws.selectedRows[k];}).length;
  var allSelected = selectableKeys.length > 0 && selectedCount === selectableKeys.length;

  /* Bulk action bar — appears as a sticky strip above the table when 1+ row selected.
     If bulk override or bulk flag form is open, render the form instead. */
  var bulkBarHtml = '';
  if (selectedCount > 0) {
    if (S3.ws.bulkOverrideOpen) {
      bulkBarHtml = renderBulkOverrideForm(selectedCount);
    } else if (S3.ws.bulkFlagOpen) {
      bulkBarHtml = renderBulkFlagForm(selectedCount);
    } else {
      bulkBarHtml = '<div class="bulk-bar">'
        + '<span class="bulk-bar-count">' + selectedCount + ' selected</span>'
        + '<div class="bulk-bar-actions">'
        +   '<button class="btn-confirm" style="font-size:11px;padding:5px 12px" onclick="wsBulkConfirm()">&#10003; Confirm ' + selectedCount + '</button>'
        +   '<button class="btn-ghost" style="font-size:11px;padding:5px 10px" onclick="wsOpenBulkOverride()">Override ' + selectedCount + '</button>'
        +   '<button class="btn-ghost" style="font-size:11px;padding:5px 10px;color:var(--color-action)" onclick="wsOpenBulkFlag()">Flag IA</button>'
        +   '<span style="margin:0 4px;color:var(--color-border-default)">|</span>'
        +   '<button class="btn-ghost" style="font-size:11px;padding:5px 10px;color:var(--color-text-tertiary)" onclick="wsClearSelection()">Clear</button>'
        + '</div>'
        + '</div>';
    }
  }

  var selectAllAttr = '';
  if (allSelected) selectAllAttr = 'checked';
  var hasSelectable = selectableKeys.length > 0;

  var tableHtml = bulkBarHtml + '<div class="workspace-table-wrap">'
    + '<table class="workspace-table">'
    + '<thead><tr>'
    +   '<th class="cb-col">' + (hasSelectable ? '<input type="checkbox" ' + selectAllAttr + ' onclick="wsToggleAll(\'' + filt + '\')" />' : '') + '</th>'
    +   '<th>Ref</th><th>Date</th><th>Vendor</th><th>AI suggests</th><th class="amt">Amount</th><th class="conf">Conf</th><th></th>'
    + '</tr></thead>'
    + '<tbody>' + tableRows + '</tbody>'
    + '</table>'
    + '</div>';

  /* Pagination footer */
  var paginationHtml = '';
  if (filt === 'review' && visibleTxns.length > 0) {
    var hidden = grp.total - grp.toReview;
    paginationHtml = '<div class="workspace-pagination">'
      + '<span>Showing ' + visibleTxns.length + ' review rows · ' + hidden.toLocaleString() + ' auto-mapped hidden</span>'
      + '<button class="workspace-pagination-link" onclick="wsSetFilter(\'all\')">Show all rows &#8594;</button>'
      + '</div>';
  } else if (filt === 'auto') {
    var shownAuto = visibleTxns.length;
    var moreAvailable = autoMappedCount > shownAuto;
    paginationHtml = '<div class="workspace-pagination">'
      + '<span>Showing ' + shownAuto.toLocaleString() + ' of ' + autoMappedCount.toLocaleString() + ' auto-mapped</span>'
      + (moreAvailable
          ? '<button class="workspace-pagination-link" onclick="alert(\'Pagination: production loads next 100\')">Load next 100 &#8594;</button>'
          : '<span style="color:var(--color-text-tertiary);font-weight:300">All shown</span>')
      + '</div>';
  } else if (filt === 'all') {
    var shownAll = visibleTxns.length;
    var moreAll = grp.total > shownAll;
    paginationHtml = '<div class="workspace-pagination">'
      + '<span>Showing ' + shownAll.toLocaleString() + ' of ' + grp.total.toLocaleString() + ' (review + auto-mapped, sorted by amount)</span>'
      + (moreAll
          ? '<button class="workspace-pagination-link" onclick="alert(\'Pagination: production loads next 100\')">Load next 100 &#8594;</button>'
          : '<span style="color:var(--color-text-tertiary);font-weight:300">All shown</span>')
      + '</div>';
  }

  return '<div class="workspace-pane">'
    + headerHtml
    + batchBannerHtml
    + iaBandHtml
    + sectionLblHtml
    + tableHtml
    + paginationHtml
    + '</div>';
}

/* Render a single dense table row for the workspace */
function renderTxnTableRow(monthIdx, gi, ti, txn, type) {
  var key = monthIdx + '-' + gi + '-' + (type === 'auto' ? 'auto-' : '') + ti;
  var rowCls = '';

  if (type === 'auto') {
    /* check for override */
    var override = S3.ws.overrides[key];
    var checked = S3.ws.selectedRows[key] ? 'checked' : '';
    if (override) {
      return '<tr style="background:var(--color-action-wash)">'
        + '<td class="cb-col"></td>'
        + '<td class="mono">' + txn.ref + '</td>'
        + '<td style="color:var(--color-text-tertiary)">' + txn.date + '</td>'
        + '<td style="color:var(--color-text-secondary)">' + txn.vendor + '</td>'
        + '<td style="font-size:11px"><span style="color:var(--color-action);font-weight:600">' + override.account + '</span><br><span style="color:var(--color-text-tertiary);font-size:10px;text-decoration:line-through">' + txn.suggested + '</span></td>'
        + '<td class="amt">' + txn.amount + '</td>'
        + '<td class="conf hi">&#10003;</td>'
        + '<td><span style="font-size:10px;color:var(--color-action);font-weight:600">Overridden</span></td>'
        + '</tr>';
    }
    return '<tr style="background:rgba(234,243,222,0.3)">'
      + '<td class="cb-col"><input type="checkbox" ' + checked + ' onclick="wsToggleRow(\'' + key + '\')" /></td>'
      + '<td class="mono">' + txn.ref + '</td>'
      + '<td style="color:var(--color-text-tertiary)">' + txn.date + '</td>'
      + '<td style="color:var(--color-text-secondary)">' + txn.vendor + '</td>'
      + '<td style="color:var(--color-text-secondary);font-size:11px">' + txn.suggested + '</td>'
      + '<td class="amt">' + txn.amount + '</td>'
      + '<td class="conf hi">' + txn.conf + '%</td>'
      + '<td><button class="tbl-btn override-link" onclick="wsStartOverride(\'' + key + '\')">Override</button></td>'
      + '</tr>';
  }

  /* review row */
  var state = S3.ws.txnStates[key] || 'pending';
  if (state === 'confirmed') rowCls = 'background:var(--color-success-surface);opacity:.85';
  else if (state === 'overridden') rowCls = 'background:var(--color-action-wash);opacity:.85';
  else if (state === 'flagged' || state === 'flagForm' || state === 'flagResolved') rowCls = 'background:var(--color-danger-surface);opacity:.85';

  /* Outlier highlight */
  var isOutlier = txn.hasFlag && txn.flagReason === 'amount-outlier';
  if (isOutlier) rowCls = 'background:var(--color-warning-surface)';

  var actions;
  if (state === 'confirmed') {
    actions = '<span style="font-size:10px;color:var(--color-success-text);font-weight:600">&#10003; Confirmed</span>';
  } else if (state === 'overridden') {
    actions = '<span style="font-size:10px;color:var(--color-action);font-weight:600">&#10003; Overridden</span>';
  } else if (state === 'flagged') {
    actions = '<span style="font-size:10px;color:var(--color-danger-text);font-weight:600">&#128681; Flagged</span>';
  } else {
    actions = '<div class="workspace-row-actions">'
      + '<button class="tbl-btn confirm" onclick="wsConfirm(' + gi + ',' + ti + ')">Confirm</button>'
      + '<button class="tbl-btn override-link">Override</button>'
      + '<button class="tbl-btn flag" onclick="wsStartFlag(' + gi + ',' + ti + ')">Flag</button>'
      + '</div>';
  }

  var vendor = txn.vendor === '—' ? '<span style="color:var(--color-text-tertiary);font-style:italic">— (manual)</span>' : txn.vendor;
  var checked = S3.ws.selectedRows[key] ? 'checked' : '';
  var canSelect = state !== 'confirmed' && state !== 'flagged' && state !== 'overridden';

  return '<tr style="' + rowCls + '">'
    + '<td class="cb-col">' + (canSelect ? '<input type="checkbox" ' + checked + ' onclick="wsToggleRow(\'' + key + '\')" />' : '') + '</td>'
    + '<td class="mono">' + txn.ref + '</td>'
    + '<td style="color:var(--color-text-tertiary)">' + txn.date + '</td>'
    + '<td style="color:var(--color-text-secondary)">' + vendor + '</td>'
    + '<td style="color:var(--color-text-secondary);font-size:11px">' + (txn.suggested || '—') + '</td>'
    + '<td class="amt">' + txn.amount + '</td>'
    + '<td class="conf ' + (txn.confCls || '') + '">' + (txn.conf > 0 ? txn.conf + '%' : '—') + '</td>'
    + '<td>' + actions + '</td>'
    + '</tr>';
}

/* Browse-all mode — flat row list, no clusters */
function renderBrowseAll(monthIdx, mo, groups) {
  var allRows = [];
  groups.forEach(function(grp, gi) {
    (grp.txns || []).forEach(function(txn, ti) {
      allRows.push({grp:grp, gi:gi, ti:ti, txn:txn, type:'review'});
    });
    var autoRows = getAutoMappedRows(monthIdx, gi, grp);
    autoRows.forEach(function(txn, ti) {
      allRows.push({grp:grp, gi:gi, ti:ti, txn:txn, type:'auto'});
    });
  });

  /* Sort by amount desc */
  allRows.sort(function(a, b) {
    var pa = parseInt(String(a.txn.amount).replace(/[^0-9]/g,''), 10);
    var pb = parseInt(String(b.txn.amount).replace(/[^0-9]/g,''), 10);
    return pb - pa;
  });

  var tableRows = allRows.slice(0, 50).map(function(item) {
    return renderTxnTableRow(monthIdx, item.gi, item.ti, item.txn, item.type);
  }).join('');

  return '<div class="workspace-pane">'
    + '<div class="workspace-hdr">'
    +   '<div class="workspace-hdr-row">'
    +     '<div>'
    +       '<div class="workspace-hdr-title">' + mo.m + ' 2025 — Browse all</div>'
    +       '<div class="workspace-hdr-meta">' + mo.txn.toLocaleString() + ' transactions, sorted by amount · manual review mode</div>'
    +     '</div>'
    +     '<div class="workspace-filter-row">'
    +       '<span class="filter-lbl">Decisions view groups these into ' + groups.length + ' categories. Most Controllers find that faster.</span>'
    +     '</div>'
    +   '</div>'
    + '</div>'
    + '<div class="workspace-table-wrap">'
    +   '<table class="workspace-table">'
    +   '<thead><tr><th>Ref</th><th>Date</th><th>Vendor</th><th>AI suggests</th><th class="amt">Amount</th><th class="conf">Conf</th><th></th></tr></thead>'
    +   '<tbody>' + tableRows + '</tbody>'
    +   '</table>'
    + '</div>'
    + '<div class="workspace-pagination">'
    +   '<span>Showing 50 of ' + mo.txn.toLocaleString() + '</span>'
    +   '<button class="workspace-pagination-link" onclick="alert(\'Pagination: production loads next 50\')">Load next 50 &#8594;</button>'
    + '</div>'
    + '</div>';
}

/* === Cluster + workspace action handlers === */
function wsSelectCluster(gi) {
  S3.ws.selectedCluster = gi;
  S3.ws.activeFilter = 'review';
  renderMonthWorkspace(S3.ws.activeMonth);
}
function wsConfirmBatch(batchKey) {
  S3.ws.confirmedClusters[batchKey] = 'confirmed';
  if (typeof invalidateCoverageCache === 'function') invalidateCoverageCache();
  renderMonthWorkspace(S3.ws.activeMonth);
}
function wsAcceptIA(iaBandKey) {
  S3.ws.iaBandActions[iaBandKey] = 'accepted';
  if (typeof invalidateCoverageCache === 'function') invalidateCoverageCache();
  renderMonthWorkspace(S3.ws.activeMonth);
}
function wsInspectBatch(gi) {
  /* Filter the current cluster to auto-mapped (where the batch lives) */
  S3.ws.activeFilter = 'auto';
  renderMonthWorkspace(S3.ws.activeMonth);
}

/* === Bulk row selection + actions === */
function wsToggleRow(key) {
  if (S3.ws.selectedRows[key]) delete S3.ws.selectedRows[key];
  else S3.ws.selectedRows[key] = true;
  renderMonthWorkspace(S3.ws.activeMonth);
}

function wsToggleAll(filt) {
  /* Re-derive selectableKeys for current cluster + filter, then toggle */
  var monthIdx = S3.ws.activeMonth;
  var gi = S3.ws.selectedCluster;
  if (gi === null) return;
  var groups = getWorkspaceData(monthIdx);
  var grp = groups[gi];
  if (!grp) return;
  var keys = [];
  if (filt === 'review' || !filt) {
    (grp.txns || []).forEach(function(txn, ti) {
      var k = monthIdx + '-' + gi + '-' + ti;
      var st = S3.ws.txnStates[k];
      if (st !== 'confirmed' && st !== 'flagged') keys.push(k);
    });
  } else if (filt === 'auto') {
    var autoRows = getAutoMappedRows(monthIdx, gi, grp);
    autoRows.forEach(function(txn, ti) {
      var k = monthIdx + '-' + gi + '-auto-' + ti;
      if (!S3.ws.overrides[k]) keys.push(k);
    });
  } else if (filt === 'all') {
    /* combined */
    (grp.txns || []).forEach(function(txn, ti) {
      var k = monthIdx + '-' + gi + '-' + ti;
      var st = S3.ws.txnStates[k];
      if (st !== 'confirmed' && st !== 'flagged') keys.push(k);
    });
    var autoRows = getAutoMappedRows(monthIdx, gi, grp);
    autoRows.forEach(function(txn, ti) {
      var k = monthIdx + '-' + gi + '-auto-' + ti;
      if (!S3.ws.overrides[k]) keys.push(k);
    });
  }

  var allCurrentlySelected = keys.length > 0 && keys.every(function(k){return S3.ws.selectedRows[k];});
  if (allCurrentlySelected) {
    keys.forEach(function(k){delete S3.ws.selectedRows[k];});
  } else {
    keys.forEach(function(k){S3.ws.selectedRows[k] = true;});
  }
  renderMonthWorkspace(S3.ws.activeMonth);
}

function wsClearSelection() {
  S3.ws.selectedRows = {};
  S3.ws.bulkOverrideOpen = false;
  S3.ws.bulkFlagOpen = false;
  renderMonthWorkspace(S3.ws.activeMonth);
}

function wsBulkConfirm() {
  /* Confirm all selected rows.
     - In per-month mode: review rows flip to 'confirmed'; auto rows are already mapped, skip.
     - In coverage mode: auto rows get coverageConfirmed (Controller personally reviewed). */
  var inCoverage = (S3.ws.activeMonth === 'all');
  Object.keys(S3.ws.selectedRows).forEach(function(key) {
    if (key.indexOf('-auto-') >= 0) {
      if (inCoverage) {
        if (!S3.ws.coverageConfirmed) S3.ws.coverageConfirmed = {};
        S3.ws.coverageConfirmed[key] = { by: 'Controller', when: 'Day 18 · 14:32 WIB' };
      }
      /* In per-month, auto rows can't be "confirmed" — they're already mapped. Skip. */
      return;
    }
    S3.ws.txnStates[key] = 'confirmed';
  });
  S3.ws.selectedRows = {};
  if (typeof invalidateCoverageCache === 'function') invalidateCoverageCache();
  renderMonthWorkspace(S3.ws.activeMonth);
}

function wsOpenBulkOverride() {
  S3.ws.bulkOverrideOpen = true;
  S3.ws.bulkFlagOpen = false;
  S3.ws.bulkOverrideDraft = { account:'', dim:'', reason:'' };
  renderMonthWorkspace(S3.ws.activeMonth);
}

function wsCancelBulkOverride() {
  S3.ws.bulkOverrideOpen = false;
  renderMonthWorkspace(S3.ws.activeMonth);
}

function wsConfirmBulkOverride() {
  var draft = S3.ws.bulkOverrideDraft;
  if (!draft.account || !draft.reason) {
    alert('Please provide both an account and a reason for the override.');
    return;
  }
  Object.keys(S3.ws.selectedRows).forEach(function(key) {
    S3.ws.overrides[key] = {
      account: draft.account,
      dim: draft.dim,
      reason: draft.reason,
      by: 'Controller',
      when: 'Day 18 · 14:32 WIB'
    };
    /* For review-type rows, mark them confirmed-as-overridden */
    if (key.indexOf('-auto-') < 0) {
      S3.ws.txnStates[key] = 'overridden';
    }
  });
  S3.ws.selectedRows = {};
  S3.ws.bulkOverrideOpen = false;
  S3.ws.bulkOverrideDraft = { account:'', dim:'', reason:'' };
  if (typeof invalidateCoverageCache === 'function') invalidateCoverageCache();
  renderMonthWorkspace(S3.ws.activeMonth);
}

function wsOpenBulkFlag() {
  S3.ws.bulkFlagOpen = true;
  S3.ws.bulkOverrideOpen = false;
  S3.ws.bulkFlagComment = '';
  renderMonthWorkspace(S3.ws.activeMonth);
}

function wsCancelBulkFlag() {
  S3.ws.bulkFlagOpen = false;
  renderMonthWorkspace(S3.ws.activeMonth);
}

function wsConfirmBulkFlag() {
  if (!S3.ws.bulkFlagComment || S3.ws.bulkFlagComment.trim().length === 0) {
    alert('Please add a comment for your IA when flagging these transactions.');
    return;
  }
  Object.keys(S3.ws.selectedRows).forEach(function(key) {
    if (key.indexOf('-auto-') >= 0) return; /* auto rows can't be flagged for review */
    S3.ws.txnStates[key] = 'flagged';
    S3.ws.flagComments[key] = S3.ws.bulkFlagComment;
  });
  S3.ws.selectedRows = {};
  S3.ws.bulkFlagOpen = false;
  S3.ws.bulkFlagComment = '';
  if (typeof invalidateCoverageCache === 'function') invalidateCoverageCache();
  renderMonthWorkspace(S3.ws.activeMonth);
}

/* Render helpers for transaction rows */
function confTag(conf) {
  if (conf >= 80) return 'High confidence (' + conf + '%)';
  if (conf >= 60) return 'Medium confidence (' + conf + '%)';
  return 'Low confidence (' + conf + '%)';
}

function renderStandardTxnRow(grp, gi, ti, txn, state, key) {
  var confColor = txn.confCls === 'hi' ? 'var(--color-success-text)' : txn.confCls === 'med' ? 'var(--color-warning-text)' : 'var(--color-danger-text)';
  var rowCls = state === 'confirmed' ? ' confirmed' : '';
  var actionHtml;

  /* Orphan rows can't be confirmed by Controller — only IA can resolve via CoA amendment */
  if (grp.orphan) {
    actionHtml = '<span style="font-size:11px;font-weight:600;color:var(--color-danger-text);background:var(--color-danger-surface);padding:3px 9px;border-radius:var(--radius-sm);border:1px solid var(--color-danger-border)">Awaiting IA</span>';
  } else if (state === 'confirmed') {
    actionHtml = '<span style="font-size:11px;font-weight:600;color:var(--color-success-text)">&#10003; Confirmed</span>';
  } else {
    actionHtml = '<button class="exc-btn-confirm" onclick="wsConfirm(' + gi + ',' + ti + ')">Confirm</button>'
      + '<button class="exc-btn-override" style="margin-left:4px">Override</button>'
      + '<button class="btn-ia" onclick="wsStartFlag(' + gi + ',' + ti + ')" style="margin-left:4px;margin-top:0">Flag IA</button>';
  }

  /* Mapping line varies for orphan rows */
  var mappingLine;
  if (grp.orphan) {
    mappingLine = '<div style="font-size:11px;color:var(--color-danger-text);margin-top:3px;font-weight:500">Legacy: <span style="font-family:var(--font-mono)">' + txn.legacyAcct + '</span> &middot; not in your locked CoA</div>';
  } else {
    mappingLine = '<div style="font-size:11px;color:var(--color-text-secondary);margin-top:3px">AI: <span style="font-weight:500">' + txn.suggested + '</span> &middot; <span style="color:var(--color-text-tertiary)">Dim: ' + txn.dim + '</span> &nbsp;<span style="color:' + confColor + ';font-weight:600">' + confTag(txn.conf) + '</span></div>';
  }

  /* Inline IA flag note for pre-flagged txns (reclass / cash-restate / orphan / etc.) */
  var preFlagNote = '';
  if (txn.hasFlag && txn.flagNote && state !== 'flagged' && state !== 'flagResolved' && state !== 'flagForm') {
    var noteColor = txn.flagReason === 'reclass' ? 'var(--color-action)'
      : txn.flagReason === 'cash-restate' ? 'var(--color-brand)'
      : txn.flagReason === 'fx-revaluation' ? 'var(--color-brand)'
      : txn.flagReason === 'orphan' ? 'var(--color-danger-text)'
      : 'var(--color-warning-text)';
    var noteBg = txn.flagReason === 'reclass' ? 'var(--color-action-wash)'
      : txn.flagReason === 'cash-restate' ? 'var(--color-brand-wash)'
      : txn.flagReason === 'fx-revaluation' ? 'var(--color-brand-wash)'
      : txn.flagReason === 'orphan' ? 'var(--color-danger-surface)'
      : 'var(--color-warning-surface)';
    var noteLabel = txn.flagReason === 'reclass' ? 'IA: Reclassification'
      : txn.flagReason === 'cash-restate' ? 'IA: Cash → Accrual restatement'
      : txn.flagReason === 'fx-revaluation' ? 'IA: FX revaluation (not an error)'
      : txn.flagReason === 'orphan' ? 'IA: Orphaned account — CoA amendment needed'
      : txn.flagReason === 'amount-outlier' ? 'IA: Amount outlier — confirm before bulk-apply'
      : txn.flagReason === 'new-vendor' ? 'IA: New vendor — verify before mapping'
      : 'IA flag';
    preFlagNote = '<div style="background:' + noteBg + ';border-radius:var(--radius-sm);padding:6px 10px;margin-top:6px;font-size:11px;line-height:1.5">'
      + '<div style="font-weight:600;color:' + noteColor + ';font-size:10px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px">' + noteLabel + '</div>'
      + '<div style="color:var(--color-text-secondary)">' + txn.flagNote + '</div>'
      + '</div>';
  }

  return '<div class="txn-row' + rowCls + '" style="' + (grp.orphan ? 'background:var(--color-danger-surface);' : '') + '">'
    + '<div style="flex:1;min-width:0">'
    +   '<div style="font-size:12px;font-family:var(--font-mono);color:var(--color-text-tertiary)">' + txn.ref + ' &middot; ' + txn.date + '</div>'
    +   '<div style="font-size:13px;font-weight:500;color:var(--color-text-primary);margin-top:1px">' + txn.vendor + '</div>'
    +   '<div style="font-size:11px;color:var(--color-text-tertiary);margin-top:1px">' + txn.desc + '</div>'
    +   mappingLine
    +   (txn.similar > 0 ? '<div style="font-size:11px;color:var(--color-action);margin-top:2px">' + txn.similar + ' similar transactions from same vendor</div>' : '')
    +   preFlagNote
    + '</div>'
    + '<div style="text-align:right;flex-shrink:0">'
    +   '<div style="font-size:14px;font-weight:700;font-family:var(--font-mono);color:var(--color-text-primary);margin-bottom:6px">' + txn.amount + '</div>'
    +   '<div style="display:flex;gap:4px;justify-content:flex-end;flex-wrap:wrap">' + actionHtml + '</div>'
    + '</div>'
    + '</div>';
}

/* ═══════════════════════════════════════
   STEP 3 — CONTROLLER SAMPLE REVIEW
   Per PRD: structured sample between "all months Done" and TB review.
   5 tabs: Top 20, Random 50, IDR 50M+ exceptions, Tax accounts, Flagged.
   Side-by-side legacy/Klay view per transaction.
   ═══════════════════════════════════════ */
/* ═══════════════════════════════════════
   STEP 4 — TB · BS · P&L REVIEW
   Two-column layout: period rail (column 1) + workspace (column 3 equivalent).
   Mirrors GL mapping's structure for visual continuity.
   - Column 1: "Year" / "YTD" pinned + 12 month cards (variance context)
   - Column 3 (workspace pane): tabs + summary cards + tables + variance cards
   - Selecting a month adds contextual banner, "Apr contrib." column, and reorders cards.
   ═══════════════════════════════════════ */

/* MONTH_KEYS maps the period string from the rail to a month index (or null for aggregates) */
var MONTH_KEYS = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
function tbPeriodToMonthIdx(p) {
  var i = MONTH_KEYS.indexOf(p);
  return i >= 0 ? i : null;
}
function tbMonthLbl(idx) {
  var labels = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return labels[idx];
}

/* For each variance, return the contribution from a specific month index.
   Returns null if month doesn't contribute. */
function tbVarianceContribForMonth(v, monthIdx) {
  if (!v.monthContrib) return null;
  var amt = v.monthContrib[monthIdx];
  if (amt == null || amt === 0) return null;
  return amt;
}

/* Format a contribution amount (with sign) */
function tbFormatContrib(amt) {
  if (amt == null) return '—';
  var sign = amt > 0 ? '+' : '-';
  var abs = Math.abs(amt);
  return sign + 'Rp ' + abs.toLocaleString();
}

/* Total variance amount for an entire variance row (in raw rupiah). Used to compute % share. */
function tbVarianceTotalAmt(v) {
  /* parse the delta string like "+Rp 1,240,000" or "-Rp 3,200,000" */
  var s = String(v.delta).replace(/[^0-9]/g, '');
  var n = parseInt(s, 10) || 0;
  return v.deltaCls === 'neg' ? -n : n;
}

/* For a given month, which variances contribute?
   Returns array of {variance, contribAmt, sharePct}. */
function tbVariancesForMonth(monthIdx) {
  return VARIANCES.filter(function(v) {
    return tbVarianceContribForMonth(v, monthIdx) != null;
  }).map(function(v) {
    var contrib = tbVarianceContribForMonth(v, monthIdx);
    var total = tbVarianceTotalAmt(v);
    var share = total !== 0 ? Math.round(Math.abs(contrib) / Math.abs(total) * 100) : 0;
    return { variance: v, contribAmt: contrib, sharePct: share };
  });
}

/* Count variances per month — used for rail badges */
function tbVarianceCountForMonth(monthIdx) {
  return tbVariancesForMonth(monthIdx).length;
}

function renderTBReview() {
  renderSubstepBar();

  var period = S3.tbReview.activePeriod || 'full';
  var selectedMonthIdx = tbPeriodToMonthIdx(period);
  var isMonthSelected = selectedMonthIdx !== null;

  /* === Period rail (column 1) === */
  var railHtml = '';

  /* "Year" pin */
  var yearActive = (period === 'full');
  var yearCardCls = 'skinny-mc-card all-pin' + (yearActive ? ' active-all' : '');
  railHtml += '<div class="' + yearCardCls + '" onclick="tbSetPeriod(\'full\')">'
    + '<div class="skinny-mc">'
    +   '<span class="skinny-mc-dot all-dot"></span>'
    +   '<span class="skinny-mc-name all-name">Year</span>'
    + '</div>'
    + '<div class="skinny-mc-all-meta">Full year</div>'
    + '</div>';

  /* "YTD" entry — quieter, sits below Year */
  var ytdActive = (period === 'ytd');
  var ytdCardCls = 'skinny-mc-card' + (ytdActive ? ' active' : '');
  railHtml += '<div class="' + ytdCardCls + '" onclick="tbSetPeriod(\'ytd\')" style="margin-bottom:6px">'
    + '<div class="skinny-mc">'
    +   '<span class="skinny-mc-dot" style="background:var(--color-action)"></span>'
    +   '<span class="skinny-mc-name" style="color:var(--color-action);font-weight:500">YTD</span>'
    + '</div>'
    + '</div>';

  railHtml += '<div class="skinny-mc-divider"></div>';

  /* 12 month cards */
  S3.months.forEach(function(m, i) {
    var isActive = (selectedMonthIdx === i);
    var varCount = tbVarianceCountForMonth(i);
    var cardCls = 'skinny-mc-card';
    if (isActive) cardCls += ' active';

    var dotCls;
    var nameCls;
    var pillHtml = '';

    if (varCount > 0) {
      /* This month contributes to a variance */
      dotCls = ' warn'; nameCls = ' warn';
    } else {
      /* Clean — no variance contribution */
      dotCls = ' done'; nameCls = ' done';
      pillHtml = '<span class="skinny-mc-pill done">&#10003;</span>';
    }

    railHtml += '<div class="' + cardCls + '" onclick="tbSetPeriod(\'' + MONTH_KEYS[i] + '\')">'
      + '<div class="skinny-mc">'
      +   '<span class="skinny-mc-dot' + dotCls + '"></span>'
      +   '<span class="skinny-mc-name' + nameCls + '">' + m.m.substring(0, 3) + '</span>'
      +   pillHtml
      + '</div>'
      + (varCount > 0
          ? '<div style="padding:4px 0 0 12px"><span class="skinny-mc-pill warn">' + varCount + (varCount === 1 ? ' var' : ' vars') + '</span></div>'
          : '')
      + '</div>';
  });

  /* Variance summary at bottom */
  var totalVar = VARIANCES.length;
  var expectedVar = VARIANCES.filter(function(v){return v.cls==='expected';}).length;
  var investigableVar = VARIANCES.filter(function(v){return v.cls==='investigable';}).length;
  railHtml += '<div class="skinny-mc-rail-overall">'
    + '<div class="skinny-mc-rail-overall-lbl">Variances</div>'
    + '<div class="skinny-mc-rail-overall-meta" style="line-height:1.5">' + totalVar + ' total · ' + expectedVar + ' expected · ' + investigableVar + ' to decide</div>'
    + '</div>';

  /* === Workspace pane (column 3 equivalent) === */
  var workspaceHtml = renderTBWorkspace(period, selectedMonthIdx);

  /* Compose */
  document.getElementById('main').innerHTML =
    '<div class="ws-shell">'
    +   '<div class="ws-month-rail-skinny">' + railHtml + '</div>'
    +   '<div class="tb-workspace-pane">' + workspaceHtml + '</div>'
    + '</div>';
}

function renderTBWorkspace(period, selectedMonthIdx) {
  var isMonthSelected = (selectedMonthIdx !== null);
  var periodLbl = period === 'full' ? 'Full year 2025'
    : period === 'ytd' ? 'YTD (Jan–Dec 2025)'
    : tbMonthLbl(selectedMonthIdx) + ' 2025';
  var focusLbl = isMonthSelected ? ' · focused on ' + tbMonthLbl(selectedMonthIdx) : '';

  /* Tabs at top */
  var tabs = [
    { lbl: 'Trial Balance', tag: VARIANCES.length + ' vars · Δ -Rp 1.6M', tagCls: 'has' },
    { lbl: 'Balance Sheet', tag: '1 var · Δ +Rp 360K', tagCls: 'has' },
    { lbl: 'P&L', tag: VARIANCES.filter(function(v){return v.fs.indexOf('P&L')>=0 && v.cls==='investigable';}).length + ' investigable', tagCls: 'has' }
  ];
  var tabHtml = tabs.map(function(t, i) {
    return '<button class="tb-tab' + (S3.tbReview.activeTab === i ? ' active' : '') + '" onclick="tbSetTab(' + i + ')">'
      + t.lbl + '<span class="tab-var ' + t.tagCls + '">' + t.tag + '</span></button>';
  }).join('');

  /* Contextual banner — shown when a month is selected */
  var contextBanner = '';
  if (isMonthSelected) {
    var monthVars = tbVariancesForMonth(selectedMonthIdx);
    if (monthVars.length === 0) {
      contextBanner = '<div class="tb-context-banner clean">'
        + '<span class="tb-context-banner-icon">&#10003;</span>'
        + '<div class="tb-context-banner-text">'
        +   '<strong>' + tbMonthLbl(selectedMonthIdx) + ' is clean.</strong> No variances were driven by this month. The full-year picture below remains the canonical view.'
        + '</div>'
        + '</div>';
    } else {
      /* Find the most-significant variance for this month (largest absolute contribution) */
      var mainVar = monthVars.slice().sort(function(a, b) {
        return Math.abs(b.contribAmt) - Math.abs(a.contribAmt);
      })[0];
      var mainV = mainVar.variance;
      contextBanner = '<div class="tb-context-banner warn">'
        + '<span class="tb-context-banner-icon">&#9651;</span>'
        + '<div class="tb-context-banner-text">'
        +   '<strong>' + tbMonthLbl(selectedMonthIdx) + ' drives the ' + mainV.id + ' ' + mainV.acct.split(' · ')[1] + ' variance.</strong> '
        +   (mainV.cls === 'investigable'
              ? mainV.iaNote.split('.')[0] + '. '
              : '')
        +   'The full-year picture below is highlighted to show ' + tbMonthLbl(selectedMonthIdx) + '\'s contribution. '
        +   '<button class="tb-context-banner-link" onclick="tbDrillToGL(\'' + mainV.id + '\')">Open ' + tbMonthLbl(selectedMonthIdx).substring(0,3) + ' &middot; ' + mainV.id + ' in GL workspace &#8599;</button>'
        + '</div>'
        + '</div>';
    }
  }

  /* Soft gate: if coverage views aren't fully reviewed */
  var coverageOverallPct = (typeof getCoverageOverallPct === 'function') ? getCoverageOverallPct() : 100;
  var coverageBanner = '';
  if (coverageOverallPct < 100) {
    coverageBanner = '<div class="tb-coverage-gate-banner">'
      + '<span class="tb-coverage-gate-icon">&#9651;</span>'
      + '<div class="tb-coverage-gate-text">'
      +   '<strong>Coverage views are ' + coverageOverallPct + '% reviewed.</strong> '
      +   'You can proceed, but your IA recommends finishing year-wide coverage first — it surfaces issues that would otherwise show up here as variances.'
      + '</div>'
      + '<button class="btn-ghost" onclick="goStep(2);wsSelectClusterAllMode();" style="font-size:11px;padding:5px 10px;flex-shrink:0">Back to coverage views</button>'
      + '</div>';
  }

  /* Tab content */
  var tabContent = '';
  if (S3.tbReview.activeTab === 0) tabContent = renderTBTab(selectedMonthIdx);
  else if (S3.tbReview.activeTab === 1) tabContent = renderBSTab();
  else tabContent = renderPLTab(selectedMonthIdx);

  /* Footer / proceed gate */
  var investigableCount = VARIANCES.filter(function(v) { return v.cls === 'investigable'; }).length;
  var resolvedInvestigable = VARIANCES.filter(function(v) { return v.cls === 'investigable' && S3.tbReview.varianceDecisions[v.id]; }).length;
  var canProceed = (investigableCount === resolvedInvestigable);

  var footer = '<div class="tb-footer">'
    + (canProceed
        ? '<span style="font-size:12px;color:var(--color-success-text)">&#10003; All variances resolved — proceed to sign-off</span>'
        : '<span style="font-size:12px;color:var(--color-text-tertiary);font-weight:300">Resolve ' + (investigableCount-resolvedInvestigable) + ' Investigable variance' + (investigableCount-resolvedInvestigable === 1 ? '' : 's') + ' to proceed</span>')
    + '<button class="btn-cont" ' + (canProceed ? '' : 'disabled') + ' onclick="goStep(4)">Proceed to sign-off &#8250;</button>'
    + '</div>';

  return ''
    + '<div class="tb-workspace-inner">'
    +   '<div class="tb-workspace-header">'
    +     '<div class="srow"><span class="badge b-rev">Review required</span><span class="bmeta">Stage 3 · Transaction data · Step 4 of 5 · TB · BS · P&amp;L review</span></div>'
    +     '<h1 style="margin:6px 0 4px">Trial balance reconciliation</h1>'
    +     '<div class="tb-workspace-meta">Three-way comparison: Legacy TB vs Klay across TB, Balance Sheet, and P&amp;L. <strong>' + periodLbl + '</strong>' + focusLbl + '</div>'
    +   '</div>'
    +   '<div class="tb-tabs">' + tabHtml + '</div>'
    +   contextBanner
    +   coverageBanner
    +   tabContent
    +   footer
    + '</div>';
}

function tbSetTab(i) { S3.tbReview.activeTab = i; renderTBReview(); }
function tbSetPeriod(k) { S3.tbReview.activePeriod = k; renderTBReview(); }

function renderTBTab(selectedMonthIdx) {
  var isMonthSelected = (selectedMonthIdx !== null);
  var monthAbbrev = isMonthSelected ? tbMonthLbl(selectedMonthIdx).substring(0,3) : '';

  /* Variance rows in the table — each variance appears as a row.
     If month is selected, an "Apr contrib." column is added. */
  var varRows = VARIANCES.map(function(v) {
    var rowCls = v.cls === 'investigable' ? 'tb3-row-warn' : 'tb3-row-exp';

    /* If a month is selected, check if this row is driven by it */
    var rowExtraCls = '';
    var contribCell = '';
    var rowIsHighlighted = false;
    if (isMonthSelected) {
      var contrib = tbVarianceContribForMonth(v, selectedMonthIdx);

        rowIsHighlighted = true;
        rowExtraCls = ' tb3-row-month-driven';
        contribCell = '<td class="mono var-contrib var-contrib-active' + (v.deltaCls === 'neg' ? ' neg' : ' pos') + '">' + tbFormatContrib(contrib) + '</td>';

      + '<td class="acct">' + v.acct + '</td>'

      + '<td class="mono">' + v.legacy + '</td>'
      + '<td class="mono">' + v.klay + '</td>'

    + '<tr' + (isMonthSelected ? ' class="tb3-row-faded"' : '') + '><td class="acct">1120 · Bank BCA</td><td>BS · Current</td><td class="mono">Rp 2,341,800,000</td><td class="mono">Rp 2,341,800,000</td><td class="var-zero">Rp 0</td>' + (isMonthSelected ? '<td class="var-contrib var-contrib-empty">—</td>' : '') + '<td><span style="color:var(--color-text-tertiary);font-size:11px">—</span></td><td></td></tr>'
    + '<tr' + (isMonthSelected ? ' class="tb3-row-faded"' : '') + '><td class="acct">2110 · Trade Payables</td><td>BS · Current Liab</td><td class="mono">Rp 1,847,320,000</td><td class="mono">Rp 1,847,320,000</td><td class="var-zero">Rp 0</td>' + (isMonthSelected ? '<td class="var-contrib var-contrib-empty">—</td>' : '') + '<td><span style="color:var(--color-text-tertiary);font-size:11px">—</span></td><td></td></tr>';

  /* Variance cards section */
  var cardSectionLabel, varCards;
  if (isMonthSelected) {
    /* Sort: month-driven first, then others. Optionally hide non-driven behind a reveal. */
    var driven = VARIANCES.filter(function(v){return tbVarianceContribForMonth(v, selectedMonthIdx) != null;});
    var notDriven = VARIANCES.filter(function(v){return tbVarianceContribForMonth(v, selectedMonthIdx) == null;});
    cardSectionLabel = monthAbbrev + '-driven variances';
    varCards = driven.map(function(v){return renderVarianceCard(v, selectedMonthIdx);}).join('');
    if (notDriven.length > 0) {
      varCards += '<details class="tb-not-driven-reveal" style="margin-top:6px">'
        + '<summary style="font-size:11px;color:var(--color-text-info);cursor:pointer;font-weight:500;padding:6px 0">Show ' + notDriven.length + ' other variance' + (notDriven.length === 1 ? '' : 's') + ' not driven by ' + monthAbbrev + ' &darr;</summary>'
        + '<div style="margin-top:8px">' + notDriven.map(function(v){return renderVarianceCard(v, null);}).join('') + '</div>'
        + '</details>';
    }
  } else {
    cardSectionLabel = 'Variance detail &amp; IA notes';
    varCards = VARIANCES.map(function(v){return renderVarianceCard(v, null);}).join('');
  }

  /* Header column for the contribution */
  var contribTh = isMonthSelected
    ? '<th class="var-contrib-th">' + monthAbbrev + ' contrib.</th>'
    : '';

  return ''
    + '<div class="tb3-cards">'
    +   '<div class="tb3-card"><div class="tb3-num">Rp 28,412,340,000</div><div class="tb3-lbl">Legacy TB total</div></div>'
    +   '<div class="tb3-card"><div class="tb3-num">Rp 28,410,740,000</div><div class="tb3-lbl">Klay TB total</div></div>'
    +   '<div class="tb3-card" style="border-left:3px solid var(--color-warning-border)"><div class="tb3-num" style="color:var(--color-warning-text)">-Rp 1,600,000</div><div class="tb3-lbl">Net variance &middot; ' + VARIANCES.length + ' accounts</div></div>'
    + '</div>'
    + '<p style="font-size:12px;color:var(--color-text-secondary);font-weight:300;margin-bottom:12px">Three account variances explain the Rp 1,600,000 difference between Legacy and Klay. Review each below — once accepted, the difference is documented in the audit trail.</p>'

    + '<div class="twrap"><table class="tb3-table">'
    +   '<thead><tr>'
    +     '<th>Account</th><th>FS placement</th><th>Legacy</th><th>Klay</th><th>Variance</th>'
    +     contribTh
    +     '<th>Class</th><th></th>'
    +   '</tr></thead>'
    +   '<tbody>' + balancedRows + varRows + '</tbody>'
    + '</table></div>'

    + '<div style="font-size:11px;font-weight:600;color:var(--color-text-tertiary);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;margin-top:18px">' + cardSectionLabel + '</div>'
    + varCards;
}

function tbDrillToGL(varId) {
  var v = VARIANCES.find ? VARIANCES.find(function(v){return v.id===varId;}) : null;
  if (!v) for (var i=0;i<VARIANCES.length;i++) if (VARIANCES[i].id===varId) v=VARIANCES[i];
  if (!v) return;
  /* Pick the month with the largest contribution */
  var bestMonthIdx = 3; /* default April */
  if (v.monthContrib) {
    var maxAbs = 0;
    Object.keys(v.monthContrib).forEach(function(k) {
      var amt = Math.abs(v.monthContrib[k]);
      if (amt > maxAbs) { maxAbs = amt; bestMonthIdx = parseInt(k, 10); }
    });
  }
  S3.ws.activeMonth = bestMonthIdx;
  S3.ws.selectedCluster = null;
  S3.ws.selectedCoverage = null;
  goStep(2);
}


function renderVarianceCard(v, selectedMonthIdx) {
  var cardCls = v.cls === 'investigable' ? 'inv' : 'exp';
  var badgeCls = v.cls === 'investigable' ? 'vb-inv' : 'vb-exp';
  var badgeText = v.cls === 'investigable' ? 'Investigable' : 'Expected';
  var deltaCls = v.deltaCls === 'pos' ? 'vpos' : 'vneg';

  /* Optional contribution annotation */
  var contribAnnotation = '';
  if (selectedMonthIdx != null) {
    var contrib = tbVarianceContribForMonth(v, selectedMonthIdx);
    if (contrib != null) {
      var total = tbVarianceTotalAmt(v);
      var sharePct = total !== 0 ? Math.round(Math.abs(contrib) / Math.abs(total) * 100) : 0;
      var monthAbbrev = tbMonthLbl(selectedMonthIdx).substring(0, 3);
      var contribStr = sharePct === 100
        ? '100% from ' + monthAbbrev
        : sharePct + '% from ' + monthAbbrev + ' (' + tbFormatContrib(contrib) + ')';
      contribAnnotation = ' &middot; <span style="color:var(--color-text-info);font-weight:500">' + contribStr + '</span>';
    }
  }

  var hdr = '<div class="var-card-hdr">'
    + '<div><div class="title">' + v.acct + '</div><div class="nums">Legacy: ' + v.legacy + ' &rarr; Klay: ' + v.klay + ' &middot; <span class="v ' + deltaCls + '">' + v.delta + '</span>' + contribAnnotation + '</div></div>'
    + '<span class="var-badge ' + badgeCls + '">' + badgeText + '</span>'
    + '</div>';

  /* Body content depends on classification */
  var body = '';
  if (v.cls === 'expected') {
    body = '<div class="sys-exp-box"><div class="sys-exp-lbl">System explanation</div><div class="sys-exp-text">' + v.sysExp + '</div></div>'
      + '<div class="var-card-footer"><span class="var-auto-accepted">Auto-accepted — no action required</span><span class="var-badge vb-exp">&#10003;</span></div>';
  } else {
    /* Investigable: needs Controller decision */
    var decision = S3.tbReview.varianceDecisions[v.id];
    body = '<div class="ia-note-box"><div class="ia-note-lbl">IA investigation note</div><div class="ia-note-text">' + v.iaNote + '</div><div class="ia-note-attr">— ' + v.iaBy + ' &middot; ' + v.iaWhen + '</div></div>';

    if (decision) {
      /* Show audit trail entry */
      body += '<div class="audit-entry" style="border-left:3px solid var(--color-success-text);padding-left:10px">'
        + '<div class="audit-lbl">Audit trail entry &middot; accepted with reason</div>'
        + '<div class="audit-text">' + decision.reasonText + (decision.customNote ? ' ' + decision.customNote : '') + '</div>'
        + '<div class="audit-attr">' + decision.by + ' &middot; ' + decision.when + '</div>'
        + '</div>'
        + '<div class="var-card-footer"><span style="font-size:12px;color:var(--color-success-text);font-weight:500">&#10003; Accepted with reason — documented in audit trail</span></div>';
    } else if (S3.tbReview.activeForm === v.id) {
      body += renderReasonForm(v);
    } else {
      body += '<div class="var-card-footer">'
        + '<span class="var-auto-accepted">Your decision is required. Accept with reason or escalate.</span>'
        + '<div style="display:flex;gap:8px"><button class="btn-accept-reason" onclick="tbStartReasonForm(\'' + v.id + '\')">Accept with reason</button><button class="btn-request-inv">Request further investigation</button></div>'
        + '</div>';
    }
  }

  return '<div class="var-card ' + cardCls + '">' + hdr + body + '</div>';
}

function renderReasonForm(v) {
  var selected = S3.tbReview.activeReason || null;
  var customNote = S3.tbReview.activeCustomNote || '';

  /* Reason options vary slightly by classification */
  var options = v.cls === 'investigable'
    ? [
        { k: 'accept-ia', t: "Accept IA's explanation — variance arises from CoA consolidation" },
        { k: 'immaterial', t: 'Variance is immaterial — within tolerance for sign-off' },
        { k: 'other', t: 'Other (write your own reason below)' }
      ]
    : [
        { k: 'accept-reclass', t: "Accept IA's reclassification — agrees with IFRS treatment" },
        { k: 'period-policy', t: 'Reclassification matches our accounting policy going forward' },
        { k: 'other', t: 'Other (write your own reason below)' }
      ];

  var optsHtml = options.map(function(opt) {
    var sel = selected === opt.k;
    return '<label class="reason-opt' + (sel ? ' sel' : '') + '">'
      + '<input type="radio" name="reason-' + v.id + '" ' + (sel ? 'checked' : '') + ' onchange="tbSetReason(\'' + opt.k + '\')" />'
      + '<span>' + opt.t + '</span>'
      + '</label>';
  }).join('');

  var canConfirm = selected && (selected !== 'other' || customNote.trim().length >= 10);

  return '<div class="reason-form">'
    + '<div class="reason-form-hdr"><span class="l">Reason for accepting this variance</span><span class="r">Required · stored in audit trail</span></div>'
    + optsHtml
    + '<textarea class="reason-textarea" placeholder="Add context or notes (required if \'Other\' selected)" oninput="tbSetCustomNote(this.value)">' + customNote + '</textarea>'
    + '<div class="reason-footer">'
    +   '<span class="note">Recorded with your name, role, and timestamp. Cannot be edited after sign-off.</span>'
    +   '<button class="btn-reason-confirm" ' + (canConfirm ? '' : 'disabled') + ' onclick="tbConfirmReason(\'' + v.id + '\')">Confirm acceptance</button>'
    + '</div>'
    + '</div>';
}

function tbStartReasonForm(varId) {
  S3.tbReview.activeForm = varId;
  S3.tbReview.activeReason = null;
  S3.tbReview.activeCustomNote = '';
  renderTBReview();
}
function tbSetReason(k) {
  S3.tbReview.activeReason = k;
  renderTBReview();
}
function tbSetCustomNote(v) {
  S3.tbReview.activeCustomNote = v;
  /* update button without full re-render */
  var btn = document.querySelector('.btn-reason-confirm');
  if (btn) {
    var sel = S3.tbReview.activeReason;
    var canConfirm = sel && (sel !== 'other' || v.trim().length >= 10);
    if (canConfirm) btn.removeAttribute('disabled');
    else btn.setAttribute('disabled', 'disabled');
  }
}
function tbConfirmReason(varId) {
  var v = VARIANCES.find(function(x){return x.id===varId;});
  var k = S3.tbReview.activeReason;
  var note = S3.tbReview.activeCustomNote;
  var reasonText = '';
  if (v.cls === 'investigable') {
    if (k === 'accept-ia') reasonText = "Accepted IA's explanation — variance arises from CoA consolidation.";
    else if (k === 'immaterial') reasonText = 'Variance accepted as immaterial — within tolerance for sign-off.';
    else reasonText = note;
  } else {
    if (k === 'accept-reclass') reasonText = "Accepted IA's reclassification — agrees with IFRS treatment.";
    else if (k === 'period-policy') reasonText = 'Reclassification matches our accounting policy going forward.';
    else reasonText = note;
  }
  S3.tbReview.varianceDecisions[varId] = {
    reasonText: reasonText,
    customNote: (k !== 'other' && note) ? '(' + note + ')' : '',
    by: 'BW (Controller)',
    when: 'Day 20 · 11:14 WIB'
  };
  S3.tbReview.activeForm = null;
  S3.tbReview.activeReason = null;
  S3.tbReview.activeCustomNote = '';
  renderTBReview();
}

    +   '<div class="so5-row"><span class="so5-label">Trial Balance</span><span class="so5-reviewed" style="color:var(--color-text-warning)">Reconciled · Δ -Rp 1.6M</span><span class="so5-detail">3 documented variances &middot; 2 expected (auto-accepted) &middot; 1 investigable accepted</span></div>'
    +   '<div class="so5-row"><span class="so5-label">Balance Sheet</span><span class="so5-reviewed" style="color:var(--color-text-warning)">Reconciled · Δ +Rp 360K</span><span class="so5-detail">1 expected variance (1310 rounding adjustment, also on TB)</span></div>'
    +   '<div class="so5-row"><span class="so5-label">P&amp;L</span><span class="so5-reviewed" style="color:var(--color-text-warning)">Reconciled · Net Profit Δ +Rp 1.96M</span><span class="so5-detail">2 documented variances &middot; Klay Net Profit higher (CoA merge effect)</span></div>'
    + '</div>'

    + '<div class="shdr"><h2>Auto-accepted variances</h2><span class="stag t-info">Challenge if you disagree</span></div>'
    + '<p style="font-size:12px;color:var(--color-text-secondary);font-weight:300;margin-bottom:10px;line-height:1.5">These were accepted automatically by the system. Click "I disagree" to escalate to IA — sign-off is locked while disputes are open.</p>'
    + '<div style="border:1px solid var(--color-border-default);border-radius:var(--radius-md);padding:0 14px;margin-bottom:16px;background:var(--color-surface-raised)">' + autoVarHtml + '</div>'
    + (hasDisputes ? '<div class="alert" style="margin-bottom:14px"><div class="alert-icon">&#9651;</div><div class="alert-body"><strong>Sign-off locked.</strong> You have disputed ' + Object.values(S3.signoff.disputes).filter(Boolean).length + ' variance(s). Your IA has been notified and must resolve these first.</div></div>' : '')

    + '<div class="fin-pos-row"><span class="fin-pos-lbl">Financial position as of</span><span class="fin-pos-date">31 December 2025</span></div>'

    + '<div class="formal-box" style="' + (canSeal ? '' : 'opacity:.5;') + '">'
    +   '<div class="formal-box-lbl">Formal Controller Acceptance</div>'
    +   '<div class="formal-text">I have reviewed the Trial Balance, Balance Sheet, and P&amp;L reconciliation. All accepted variances are documented. I am satisfied that the financial position in Klay correctly represents our company\'s financial state as of <span class="mono">31 December 2025</span>.</div>'
    +   '<div class="formal-sig">'
    +     '<div class="formal-sig-name">BW &mdash; Bambang Wijaya · Controller<br><span style="font-family:var(--font-mono);font-size:11px">Day 20 of 30</span></div>'
    +     (canSeal
        ? '<button class="btn-sign-seal" onclick="sealStage3()">Sign &amp; seal &#8250;</button>'
        : '<button class="btn-sign-seal" disabled>Sign &amp; seal &#8250;</button>')
    +   '</div>'
    + '</div>'
    + (canSeal ? '' : '<p class="proto-note">Sign-off locked — resolve disputed variances with your IA first.</p>');
}

function signoffDispute(id) { S3.signoff.disputes[id] = true; renderSignOff(); }
function signoffUndispute(id) { S3.signoff.disputes[id] = false; renderSignOff(); }

function sealStage3() {
  document.getElementById('main').innerHTML =
    '<div style="display:flex;flex-direction:column;align-items:center;text-align:center;padding:60px 20px">'
    + '<div style="width:64px;height:64px;border-radius:50%;background:var(--color-success-surface);display:flex;align-items:center;justify-content:center;margin-bottom:20px"><span style="color:var(--color-success-text);font-size:28px;font-weight:700">&#10003;</span></div>'
    + '<h1 style="font-size:24px">Stage 3 sealed</h1>'
    + '<p style="font-size:14px;color:var(--color-text-secondary);margin-top:6px;font-weight:300;max-width:480px;line-height:1.6">Your financial position is locked in Klay. The audit trail entry has been recorded immutably. UAT (Stage 4) unlocks next.</p>'
    + '<div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:20px">'
    +   '<span style="background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);font-size:11px;padding:3px 10px;border-radius:var(--radius-full);font-weight:500">20,462 transactions migrated</span>'
    +   '<span style="background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);font-size:11px;padding:3px 10px;border-radius:var(--radius-full);font-weight:500">5 variances resolved</span>'
    +   '<span style="background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);font-size:11px;padding:3px 10px;border-radius:var(--radius-full);font-weight:500">Day 20 of 30</span>'
    + '</div>'
    + '<button class="btn-cont" style="margin-top:24px" onclick="goStep(0)">[Demo: restart Stage 3]</button>'
    + '</div>';
}

/* Init */
renderSubstepBar();
goStep(0);
</script>
