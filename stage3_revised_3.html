<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Klay Migration — Stage 3 (Transaction data) revised</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Inconsolata:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --primitive-tc-900:#3D1200;--primitive-tc-700:#A03206;--primitive-tc-500:#B83D08;--primitive-tc-400:#D4622A;--primitive-tc-200:#EDD5C4;--primitive-tc-100:#F7EDE5;
  --primitive-bl-900:#0E2470;--primitive-bl-700:#1338A8;--primitive-bl-500:#1A46C8;--primitive-bl-400:#4D72E0;--primitive-bl-200:#C8D8FA;--primitive-bl-100:#EBF0FD;
  --primitive-ink-950:#080706;--primitive-ink-900:#1A1814;--primitive-ink-800:#2E2B27;--primitive-ink-400:#8C857C;--primitive-ink-300:#C8C2BA;--primitive-ink-200:#E2DDD7;--primitive-ink-100:#F4F0EB;--primitive-ink-50:#FBF8F5;--primitive-white:#FFFFFF;
  --primitive-go-700:#166638;--primitive-go-200:#A8D9BC;--primitive-go-100:#E8F5EE;
  --primitive-warn-800:#7A4D00;--primitive-warn-300:#E8C870;--primitive-warn-100:#FDF3E0;
  --primitive-stop-700:#A02020;--primitive-stop-300:#EAB8B8;--primitive-stop-100:#FBF0F0;
  --color-brand:var(--primitive-tc-500);--color-brand-hover:var(--primitive-tc-700);--color-brand-mid:var(--primitive-tc-400);--color-brand-subtle:var(--primitive-tc-200);--color-brand-wash:var(--primitive-tc-100);--color-brand-deep:var(--primitive-tc-900);
  --color-action:var(--primitive-bl-500);--color-action-hover:var(--primitive-bl-700);--color-action-mid:var(--primitive-bl-400);--color-action-subtle:var(--primitive-bl-200);--color-action-wash:var(--primitive-bl-100);
  --color-text-primary:var(--primitive-ink-950);--color-text-secondary:var(--primitive-ink-800);--color-text-tertiary:var(--primitive-ink-400);--color-text-disabled:var(--primitive-ink-300);--color-text-inverse:var(--primitive-white);
  --color-surface-base:var(--primitive-ink-50);--color-surface-raised:var(--primitive-white);--color-surface-sunken:var(--primitive-ink-100);
  --color-border-default:var(--primitive-ink-200);--color-border-subtle:var(--primitive-ink-100);--color-border-strong:var(--primitive-ink-300);
  --color-success-text:var(--primitive-go-700);--color-success-border:var(--primitive-go-200);--color-success-surface:var(--primitive-go-100);
  --color-warning-text:var(--primitive-warn-800);--color-warning-border:var(--primitive-warn-300);--color-warning-surface:var(--primitive-warn-100);
  --color-danger-text:var(--primitive-stop-700);--color-danger-border:var(--primitive-stop-300);--color-danger-surface:var(--primitive-stop-100);
  --font-sans:'Manrope',sans-serif;--font-mono:'Inconsolata',monospace;
  --radius-sm:6px;--radius-md:10px;--radius-lg:14px;--radius-xl:20px;--radius-full:9999px;
  --space-2:8px;--space-3:12px;--space-4:16px;--space-6:24px;--space-8:32px;--space-14:56px;
  --transition-base:0.15s ease;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--font-sans);background:var(--color-surface-base);color:var(--color-text-primary);-webkit-font-smoothing:antialiased;}
.nav{background:var(--color-surface-base);border-bottom:1px solid var(--color-border-default);padding:0 var(--space-14);height:52px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{color:var(--color-brand);font-weight:700;font-size:15px;letter-spacing:-0.02em;}
.nav-sep{color:var(--color-border-strong);margin:0 6px;}
.nav-org{color:var(--color-text-primary);font-weight:500;font-size:14px;}
.day-badge{font-size:11px;font-weight:600;padding:4px 12px;border-radius:var(--radius-full);background:var(--color-danger-surface);color:var(--color-danger-text);border:1px solid var(--color-danger-border);}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--color-brand);color:var(--color-text-inverse);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;}
/* Top stage bar */
.stagebar{background:var(--color-surface-raised);border-bottom:1px solid var(--color-border-default);padding:0 var(--space-14);display:flex;align-items:stretch;height:48px;}
.sti{display:flex;align-items:center;gap:8px;padding:0 16px;border-bottom:2px solid transparent;white-space:nowrap;}
.sti.on{border-bottom-color:var(--color-brand);}
.sti.off{opacity:.35;}
.stc{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.stc.on{background:var(--color-brand);color:var(--color-text-inverse);}
.stc.done{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);}
.stc.off{background:var(--color-surface-sunken);color:var(--color-text-disabled);border:1.5px solid var(--color-border-default);}
.stl{font-size:12px;font-weight:500;}
.stl.on{color:var(--color-brand);font-weight:600;}
.stl.done{color:var(--color-text-secondary);}
.stl.off{color:var(--color-text-disabled);}
/* Substep bar — horizontal Stage 3 substep navigation */
.substepbar{background:var(--color-surface-sunken);border-bottom:1px solid var(--color-border-default);padding:0 var(--space-14);display:flex;align-items:stretch;height:38px;}
.ssi{display:flex;align-items:center;gap:7px;padding:0 14px;border-right:1px solid var(--color-border-subtle);cursor:pointer;transition:background var(--transition-base);position:relative;}
.ssi:last-child{border-right:none;}
.ssi:hover{background:var(--color-surface-raised);}
.ssi.on{background:var(--color-surface-raised);border-bottom:2px solid var(--color-brand);margin-bottom:-1px;}
.ssi.done{}
.ssi.locked{opacity:.4;cursor:default;}
.ssi.locked:hover{background:transparent;}
.ssi.available{cursor:pointer;}
.ssc{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;flex-shrink:0;}
.ssc.on{background:var(--color-brand);color:var(--color-text-inverse);}
.ssc.done{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);}
.ssc.locked{background:var(--color-surface-sunken);color:var(--color-text-disabled);border:1.5px solid var(--color-border-default);}
.ssc.available{background:var(--color-surface-raised);color:var(--color-text-secondary);border:1.5px solid var(--color-border-default);}
.ssl{font-size:11px;font-weight:500;color:var(--color-text-secondary);}
.ssl.on{color:var(--color-brand);font-weight:600;}
.ssl.locked{color:var(--color-text-disabled);}
.ssl.available{color:var(--color-text-secondary);}
.ss-meta{font-size:10px;color:var(--color-text-tertiary);font-weight:300;margin-left:2px;}
/* Layout */
.layout{display:flex;min-height:calc(100vh - 138px);}
/* Workspace shell — used inside GL mapping substep with rails */
.ws-shell{display:flex;align-items:stretch;width:100%;min-height:calc(100vh - 138px);}
.ws-month-rail{width:200px;background:var(--color-surface-raised);border-right:1px solid var(--color-border-default);padding:12px 10px;flex-shrink:0;overflow-y:auto;}
.ws-month-rail-lbl{font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding:0 4px;}
.mini-mc{border-radius:var(--radius-md);border:1px solid var(--color-border-default);padding:8px 9px;margin-bottom:5px;cursor:pointer;transition:border-color var(--transition-base);}
.mini-mc:hover{border-color:var(--color-action-subtle);}
.mini-mc.active{box-shadow:0 0 0 2px var(--color-action-wash);}
.mini-mc.done{border-left:2.5px solid var(--color-success-text);background:var(--color-success-surface);}
.mini-mc.active-mc{border-left:2.5px solid var(--color-brand);background:var(--color-brand-wash);}
.mini-mc.warn{border-left:2.5px solid var(--color-warning-text);}
.mini-mc.todo{border-left:2.5px solid var(--color-border-strong);}
.mini-mc.notclosed{border-left:2.5px solid var(--color-border-strong);opacity:.65;}
.mini-mc-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
.mini-mc-name{font-size:12px;font-weight:500;color:var(--color-text-primary);}
.mini-mc-name.done-clr{color:var(--color-success-text);}
.mini-mc-name.active-clr{color:var(--color-brand);}
.mini-mc-name.todo-clr{color:var(--color-text-secondary);}
.mini-mc-pill{font-size:9px;padding:1px 6px;border-radius:var(--radius-full);font-weight:600;}
.mini-mc-pill.done{background:var(--color-success-surface);color:var(--color-success-text);}
.mini-mc-pill.active{background:var(--color-warning-surface);color:var(--color-warning-text);border:1px solid var(--color-warning-border);}
.mini-mc-pill.warn{background:var(--color-warning-surface);color:var(--color-warning-text);}
.mini-mc-pill.todo{font-weight:300;color:var(--color-text-tertiary);font-family:var(--font-mono);}
.mini-mc-prog{height:2px;background:var(--color-border-default);border-radius:var(--radius-full);margin-bottom:4px;overflow:hidden;}
.mini-mc-prog-fill{height:2px;border-radius:var(--radius-full);}
.mini-mc-prog-fill.done{background:var(--color-success-text);}
.mini-mc-prog-fill.active{background:var(--color-brand);}
.mini-mc-prog-fill.warn{background:var(--color-warning-text);}
.mini-mc-meta{font-size:10px;color:var(--color-text-tertiary);font-weight:300;}
.mini-mc-meta.done-clr{color:var(--color-success-text);}
.mini-mc-meta.active-clr{color:var(--color-brand);}
.mini-mc-flags{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px;}
.mini-mc-flag{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;}
.mini-mc-flag.var{background:var(--color-warning-surface);color:var(--color-warning-text);}
.mini-mc-flag.flag{background:var(--color-danger-surface);color:var(--color-danger-text);}
.mini-mc-notclosed{font-size:9px;color:var(--color-text-tertiary);margin-top:2px;font-style:italic;}
.ws-month-rail-overall{border-top:1px solid var(--color-border-default);padding-top:8px;margin-top:6px;}
.ws-month-rail-overall-lbl{font-size:9px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;padding:0 4px;}
.ws-month-rail-overall-bar{height:3px;background:var(--color-border-default);border-radius:var(--radius-full);margin:0 4px 3px;overflow:hidden;}
.ws-month-rail-overall-fill{height:3px;background:var(--color-brand);border-radius:var(--radius-full);}
.ws-month-rail-overall-meta{display:flex;justify-content:space-between;font-size:9px;color:var(--color-text-tertiary);padding:0 4px;}
/* The center workspace area when rails are present */
.ws-center{flex:1;padding:18px 24px;background:var(--color-surface-raised);min-width:0;overflow-y:auto;}

/* === Skinny month rail (column 1, ~88px) === */
.ws-month-rail-skinny{width:88px;background:var(--color-surface-raised);border-right:1px solid var(--color-border-default);padding:8px 6px;flex-shrink:0;overflow-y:auto;display:flex;flex-direction:column;}
/* Each month is wrapped in a card container with padding + spacing between cards */
.skinny-mc-card{padding:7px 7px 6px;border-radius:var(--radius-sm);cursor:pointer;margin-bottom:3px;transition:background var(--transition-base);}
.skinny-mc-card:hover{background:var(--color-surface-sunken);}
.skinny-mc-card.done{background:var(--color-success-surface);}
.skinny-mc-card.active{background:var(--color-warning-surface);box-shadow:0 0 0 1.5px var(--color-action-wash);}
.skinny-mc-card.notclosed{opacity:.55;}
.skinny-mc{display:flex;align-items:center;margin-bottom:5px;}
.skinny-mc-dot{width:6px;height:6px;border-radius:50%;margin-right:6px;flex-shrink:0;}
.skinny-mc-dot.done{background:var(--color-success-text);}
.skinny-mc-dot.active{background:var(--color-warning-text);}
.skinny-mc-dot.warn{background:var(--color-warning-text);}
.skinny-mc-dot.todo{background:var(--color-border-strong);}
.skinny-mc-name{font-size:11px;flex:1;}
.skinny-mc-name.done{font-weight:500;color:var(--color-success-text);}
.skinny-mc-name.active{font-weight:600;color:var(--color-warning-text);}
.skinny-mc-name.warn{font-weight:500;}
.skinny-mc-name.todo{color:var(--color-text-secondary);}
.skinny-mc-name.notclosed{color:var(--color-text-tertiary);}
.skinny-mc-pill{font-size:8px;padding:1px 4px;border-radius:var(--radius-full);font-weight:600;flex-shrink:0;}
.skinny-mc-pill.done{color:var(--color-success-text);background:transparent;}
.skinny-mc-pill.active{background:var(--color-warning-border);color:var(--color-warning-text);}
.skinny-mc-pill.warn{background:var(--color-warning-surface);color:var(--color-warning-text);}
/* Progress bar — sits inside the card now, no horizontal margin */
.skinny-mc-prog{height:2px;background:var(--color-border-default);overflow:hidden;border-radius:var(--radius-full);}
.skinny-mc-prog.done-bg{background:var(--color-success-border);}
.skinny-mc-prog.active-bg{background:var(--color-warning-border);}
.skinny-mc-prog-fill{height:2px;border-radius:var(--radius-full);}
.skinny-mc-prog-fill.done{background:var(--color-success-text);}
.skinny-mc-prog-fill.active{background:var(--color-warning-text);}
.skinny-mc-prog-fill.warn{background:var(--color-warning-text);}
/* Flag indicators sit below progress, inside the card */
.skinny-mc-flags{display:flex;gap:3px;margin-top:5px;}
.skinny-mc-flag{font-size:9px;font-weight:600;}
.skinny-mc-flag.var{color:var(--color-warning-text);}
.skinny-mc-flag.flag-ia{color:var(--color-danger-text);}
.skinny-mc-rail-overall{border-top:1px solid var(--color-border-default);padding-top:8px;margin-top:8px;padding-left:0;padding-right:0;}
.skinny-mc-rail-overall-lbl{font-size:8px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;padding:0 4px;font-weight:600;}
.skinny-mc-rail-overall-bar{height:2px;background:var(--color-border-default);border-radius:var(--radius-full);margin:0 4px 3px;overflow:hidden;}
.skinny-mc-rail-overall-fill{height:2px;background:var(--color-warning-text);}
.skinny-mc-rail-overall-meta{font-size:9px;color:var(--color-text-tertiary);padding:0 4px;}

/* All-months pin at top of month rail */
.skinny-mc-card.all-pin{background:var(--color-action-wash);border:1px solid var(--color-action-subtle);}
.skinny-mc-card.all-pin:hover{background:var(--color-action-wash);border-color:var(--color-action);}
.skinny-mc-card.all-pin.active-all{background:var(--color-action-wash);box-shadow:0 0 0 1.5px var(--color-action-wash),inset 5px 0 0 var(--color-action);}
.skinny-mc-dot.all-dot{background:var(--color-action);}
.skinny-mc-name.all-name{font-weight:600;color:var(--color-action);text-transform:uppercase;font-size:10px;letter-spacing:.04em;}
.skinny-mc-prog.all-bg{background:var(--color-action-subtle);}
.skinny-mc-prog-fill.all{background:var(--color-action);}
.skinny-mc-all-meta{font-size:8px;color:var(--color-action);font-weight:600;text-align:center;margin-top:4px;text-transform:uppercase;letter-spacing:.04em;}
.skinny-mc-divider{height:1px;background:var(--color-border-default);margin:4px 6px 8px;}

/* Coverage workspace context columns */
.workspace-table th.cov-context,.workspace-table td.cov-context{background:var(--color-action-wash);}
.workspace-table tbody tr:hover td.cov-context{background:var(--color-action-wash);}

/* === Cluster column (column 2, ~250px) === */
.cluster-col{width:250px;background:var(--color-surface-raised);border-right:1px solid var(--color-border-default);flex-shrink:0;overflow-y:auto;display:flex;flex-direction:column;}
.cluster-col-hdr{padding:11px 12px;border-bottom:1px solid var(--color-border-default);background:var(--color-surface-sunken);}
.cluster-col-hdr-title{font-size:13px;font-weight:600;color:var(--color-text-primary);}
.cluster-col-hdr-meta{font-size:11px;color:var(--color-text-tertiary);margin-top:2px;font-weight:300;}
.cluster-col-section-lbl{padding:11px 11px 5px;font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.06em;}

/* Account category card */
.cluster-card{position:relative;margin:0 7px 4px;padding:10px 11px;border-radius:var(--radius-md);border:1px solid var(--color-border-default);cursor:pointer;transition:border-color var(--transition-base),background var(--transition-base);background:var(--color-surface-raised);}
.cluster-card:hover{border-color:var(--color-action-subtle);}
.cluster-card.active{background:var(--color-action-wash);border-color:var(--color-action-subtle);box-shadow:inset 5px 0 0 var(--color-action);}
.cluster-card.active::after{content:"\25B8";position:absolute;right:-2px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--color-action);font-weight:700;line-height:1;}
.cluster-card.has-work{border-left:3px solid var(--color-warning-text);border-color:var(--color-warning-border);}
.cluster-card.has-ia{border-left:3px solid var(--color-action);border-color:var(--color-action-subtle);}
.cluster-card.done{border-left:3px solid var(--color-success-text);border-color:var(--color-success-border);background:var(--color-success-surface);}
.cluster-card.danger{border-left:3px solid var(--color-danger-text);border-color:var(--color-danger-border);}
.cluster-card.active.done{background:var(--color-action-wash);}
.cluster-card.active.has-work,.cluster-card.active.has-ia,.cluster-card.active.done,.cluster-card.active.danger{border-left:3px solid transparent;box-shadow:inset 5px 0 0 var(--color-action);}
.cluster-card-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.cluster-card-name{font-size:13px;font-weight:600;color:var(--color-text-primary);}
.cluster-card-name.done-clr{color:var(--color-success-text);}
.cluster-card-pill-wrap{display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end;}
.cluster-card-pill{font-size:9px;padding:1px 6px;border-radius:var(--radius-full);font-weight:600;flex-shrink:0;}
.cluster-card-pill.review{background:var(--color-warning-surface);color:var(--color-warning-text);}
.cluster-card-pill.done{background:var(--color-success-surface);color:var(--color-success-text);}
.cluster-card-pill.ia{background:var(--color-action-wash);color:var(--color-action);}
.cluster-card-pill.flag-ia{background:var(--color-danger-surface);color:var(--color-danger-text);}
.cluster-card-num{display:flex;align-items:baseline;gap:4px;margin-bottom:4px;}
.cluster-card-num-big{font-size:18px;font-weight:700;font-family:var(--font-mono);color:var(--color-text-primary);line-height:1;}
.cluster-card-num-big.done-clr{color:var(--color-success-text);}
.cluster-card-num-lbl{font-size:10px;color:var(--color-text-tertiary);}
.cluster-card-num-lbl.done-clr{color:var(--color-success-text);}
.cluster-card-prog{height:3px;background:var(--color-border-default);border-radius:var(--radius-full);overflow:hidden;margin-bottom:6px;}
.cluster-card-prog.done-bg{background:var(--color-success-border);}
.cluster-card-prog-fill{height:3px;border-radius:var(--radius-full);}
.cluster-card-prog-fill.warn{background:var(--color-success-text);}
.cluster-card-prog-fill.done{background:var(--color-success-text);}
.cluster-card-breakdown{display:flex;gap:10px;font-size:10px;color:var(--color-text-secondary);}
.cluster-card-breakdown-num{font-weight:600;}
.cluster-card-breakdown-num.success{color:var(--color-success-text);}
.cluster-card-breakdown-num.warn{color:var(--color-warning-text);}
.cluster-card-breakdown-num.action{color:var(--color-action);}
.cluster-card-prog-fill.manual{background:var(--color-action);}

/* Smaller cross-category cluster card */
.cross-cluster-card{margin:0 7px 4px;padding:9px 11px;border-radius:var(--radius-md);border:1px solid var(--color-border-default);cursor:pointer;transition:border-color var(--transition-base);background:var(--color-surface-raised);}
.cross-cluster-card.danger{border:1px solid var(--color-danger-border);}
.cross-cluster-card-name{font-size:12px;font-weight:500;color:var(--color-text-primary);line-height:1.3;}
.cross-cluster-card-meta{font-size:10px;color:var(--color-text-tertiary);margin-top:1px;}

/* === Workspace pane (column 3) === */
.workspace-pane{flex:1;background:var(--color-surface-raised);display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.workspace-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;}
.workspace-empty-title{font-size:14px;font-weight:500;color:var(--color-text-secondary);margin-bottom:6px;}
.workspace-empty-desc{font-size:12px;color:var(--color-text-tertiary);font-weight:300;}

.workspace-hdr{padding:14px 18px 12px;border-bottom:1px solid var(--color-border-default);}
.workspace-hdr-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.workspace-hdr-title{font-size:14px;font-weight:600;color:var(--color-text-primary);}
.workspace-hdr-meta{font-size:11px;color:var(--color-text-tertiary);margin-top:2px;font-weight:300;}
.workspace-filter-row{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.workspace-filter-row .filter-lbl{font-size:11px;color:var(--color-text-tertiary);font-weight:300;}

/* AI batch banner — card style inside workspace */
.batch-banner-wrap{padding:12px 18px;background:var(--color-surface-raised);border-bottom:1px solid var(--color-border-default);}
.batch-banner{padding:11px 14px;background:var(--color-success-surface);border:1px solid var(--color-success-border);border-left:3px solid var(--color-success-text);border-radius:var(--radius-md);}
.batch-banner-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.batch-banner-text{flex:1;min-width:0;}
.batch-banner-title{font-size:12px;font-weight:600;color:var(--color-success-text);line-height:1.3;}
.batch-banner-meta{font-size:11px;color:var(--color-success-text);opacity:.85;margin-top:2px;}
.batch-banner-actions{display:flex;gap:6px;flex-shrink:0;}

/* IA recommendation band — card style inside workspace */
.ia-band-wrap{padding:0 18px 12px;background:var(--color-surface-raised);}
.ia-band{padding:11px 14px;background:var(--color-action-wash);border:1px solid var(--color-action-subtle);border-left:3px solid var(--color-action);border-radius:var(--radius-md);}
.ia-band-lbl{font-size:10px;font-weight:600;color:var(--color-action);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.ia-band-text{font-size:12px;color:var(--color-text-primary);line-height:1.5;margin-bottom:8px;}
.ia-band-attr{font-size:11px;color:var(--color-text-tertiary);margin-bottom:8px;font-style:italic;}
.ia-band-actions{display:flex;gap:6px;}

.workspace-section-lbl{padding:10px 18px 6px;background:var(--color-surface-sunken);border-bottom:1px solid var(--color-border-default);font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em;}

/* Dense table inside workspace */
.workspace-table-wrap{flex:1;overflow-y:auto;}
.workspace-table{width:100%;border-collapse:collapse;font-size:12px;}
.workspace-table thead tr{background:var(--color-surface-sunken);border-bottom:1px solid var(--color-border-default);}
.workspace-table th{text-align:left;padding:7px 6px;font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em;}
.workspace-table th:first-child{padding-left:14px;}
.workspace-table th:last-child{padding-right:14px;text-align:right;}
.workspace-table th.amt{text-align:right;}
.workspace-table th.conf{text-align:center;}
.workspace-table tbody tr{border-bottom:1px solid var(--color-border-default);}
.workspace-table tbody tr:hover{background:var(--color-surface-sunken);}
.workspace-table td{padding:7px 6px;}
.workspace-table td:first-child{padding-left:14px;}
.workspace-table td:last-child{padding-right:14px;text-align:right;}
.workspace-table td.mono{font-family:var(--font-mono);font-size:11px;color:var(--color-text-tertiary);}
.workspace-table td.amt{text-align:right;font-family:var(--font-mono);font-weight:500;}
.workspace-table td.conf{text-align:center;font-weight:600;}
.workspace-table td.conf.hi{color:var(--color-success-text);}
.workspace-table td.conf.med{color:var(--color-warning-text);}
.workspace-table td.conf.lo{color:var(--color-danger-text);}
.workspace-table tr.outlier-row{background:var(--color-warning-surface);}
.workspace-table tr.outlier-row:hover{background:var(--color-warning-surface);}
.workspace-table tr.flagged-row{background:var(--color-danger-surface);opacity:.85;}
.workspace-row-actions{display:flex;gap:3px;justify-content:flex-end;}
.tbl-btn{font-size:10px;padding:2px 7px;border-radius:var(--radius-sm);border:1px solid var(--color-border-default);background:transparent;cursor:pointer;}
.tbl-btn.confirm{font-weight:500;border-color:var(--color-border-strong);}
.tbl-btn.flag{color:var(--color-action);border-color:var(--color-action-subtle);}
.tbl-btn.override-link{color:var(--color-text-secondary);}

/* Checkbox column in workspace table */
.workspace-table th.cb-col,.workspace-table td.cb-col{width:32px;padding-left:14px;padding-right:0;text-align:left;}
.workspace-table td.cb-col input[type="checkbox"],.workspace-table th.cb-col input[type="checkbox"]{cursor:pointer;margin:0;}

/* Bulk action bar — appears above table when rows are selected */
.bulk-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:8px 18px;background:var(--color-action-wash);border-top:1px solid var(--color-action-subtle);border-bottom:1px solid var(--color-action-subtle);}
.bulk-bar-count{font-size:12px;font-weight:600;color:var(--color-action);}
.bulk-bar-actions{display:flex;align-items:center;gap:6px;}

/* Bulk override / flag form (replaces bar when open) */
.bulk-form{padding:12px 18px;background:var(--color-action-wash);border-top:1px solid var(--color-action-subtle);border-bottom:1px solid var(--color-action-subtle);}
.bulk-form-title{font-size:12px;font-weight:600;color:var(--color-action);margin-bottom:8px;}
.bulk-form-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.bulk-form-input{flex:1;font-size:11px;padding:5px 8px;border:1px solid var(--color-border-default);border-radius:var(--radius-sm);background:var(--color-surface-raised);}
.bulk-form-textarea{width:100%;font-size:11px;padding:6px 8px;border:1px solid var(--color-border-default);border-radius:var(--radius-sm);background:var(--color-surface-raised);font-family:inherit;resize:vertical;min-height:48px;}
.bulk-form-actions{display:flex;gap:6px;justify-content:flex-end;}

.workspace-pagination{padding:8px 14px;background:var(--color-surface-sunken);border-top:1px solid var(--color-border-default);font-size:11px;color:var(--color-text-tertiary);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.workspace-pagination-link{font-size:11px;background:none;border:none;color:var(--color-action);cursor:pointer;font-weight:500;}

/* Decisions/Browse all toggle in substep bar */
.ws-toggle-wrap{margin-left:auto;display:flex;align-items:center;gap:6px;padding-right:14px;}
.ws-toggle-btn{font-size:11px;padding:4px 10px;border-radius:var(--radius-md);background:transparent;cursor:pointer;font-weight:500;}
.ws-toggle-btn.active{border:1px solid var(--color-text-primary);}
.ws-toggle-btn.inactive{border:1px solid var(--color-border-default);color:var(--color-text-tertiary);}

.sb-hdr{padding:0 var(--space-4) 10px;}
.sb-lbl{font-size:10px;color:var(--color-text-tertiary);font-weight:600;letter-spacing:.07em;text-transform:uppercase;}
.sb-row{padding:9px var(--space-4);display:flex;align-items:center;gap:10px;cursor:pointer;border-left:3px solid transparent;transition:background var(--transition-base);}
.sb-row:hover{background:var(--color-surface-sunken);}
.sb-row.sel{background:var(--color-brand-wash);border-left-color:var(--color-brand);}
.sb-name{font-size:13px;font-weight:500;color:var(--color-text-primary);}
.sb-meta{font-size:11px;color:var(--color-text-tertiary);margin-top:1px;font-weight:400;}
.step-n{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.step-n.pend{background:var(--color-surface-sunken);color:var(--color-text-disabled);border:1.5px solid var(--color-border-default);}
.step-n.act{background:var(--color-brand);color:var(--color-text-inverse);}
.step-n.dn{background:var(--color-success-surface);color:var(--color-success-text);font-size:13px;}
.cl-divider{height:1px;background:var(--color-border-subtle);margin:6px 0;}
.cl-group-lbl{font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.07em;padding:8px 16px 2px;}
.sb-prog-wrap{padding:6px 16px 8px;border-bottom:1px solid var(--color-border-subtle);}
.sb-prog-bg{background:var(--color-border-default);border-radius:var(--radius-full);height:2px;margin-bottom:5px;overflow:hidden;}
.sb-prog-fill{height:2px;border-radius:var(--radius-full);background:var(--color-brand);}
.sb-prog-label{display:flex;justify-content:space-between;font-size:10px;color:var(--color-text-tertiary);font-weight:300;}
/* Content */
.content{flex:1;padding:22px var(--space-8);overflow-y:auto;background:var(--color-surface-raised);}
.srow{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:var(--radius-sm);letter-spacing:.02em;}
.b-not{background:var(--color-surface-sunken);color:var(--color-text-tertiary);}
.b-act{background:var(--color-danger-surface);color:var(--color-danger-text);border:1px solid var(--color-danger-border);}
.b-proc{background:var(--color-action-wash);color:var(--color-action);border:1px solid var(--color-action-subtle);}
.b-rev{background:var(--color-warning-surface);color:var(--color-warning-text);border:1px solid var(--color-warning-border);}
.bmeta{font-size:11px;color:var(--color-text-tertiary);font-weight:400;}
h1{font-size:20px;font-weight:700;color:var(--color-text-primary);margin-bottom:8px;letter-spacing:-0.01em;}
h2{font-size:15px;font-weight:600;color:var(--color-text-primary);}
.desc{font-size:13px;color:var(--color-text-secondary);line-height:1.65;margin-bottom:14px;font-weight:300;}
/* Alerts */
.alert{border-left:3px solid var(--color-brand-subtle);background:var(--color-brand-wash);border-radius:0 var(--radius-md) var(--radius-md) 0;padding:10px 14px;margin-bottom:14px;display:flex;gap:10px;}
.alert.blue{border-left-color:var(--color-action-subtle);background:var(--color-action-wash);}
.alert-icon{color:var(--color-brand);font-size:13px;flex-shrink:0;margin-top:1px;}
.alert.blue .alert-icon{color:var(--color-action);}
.alert-body{font-size:12px;color:var(--color-text-secondary);line-height:1.55;font-weight:300;}
.alert-body strong{color:var(--color-brand);font-weight:600;}
.alert.blue .alert-body strong{color:var(--color-action);}
/* Buttons */
.btn-action{background:var(--color-action);color:var(--color-text-inverse);border:none;border-radius:var(--radius-md);padding:9px 20px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-sans);transition:background var(--transition-base);}
.btn-action:hover{background:var(--color-action-hover);}
.btn-cont{background:var(--color-action);color:var(--color-text-inverse);border:none;border-radius:var(--radius-lg);padding:11px 22px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-sans);display:inline-flex;align-items:center;gap:8px;transition:background var(--transition-base);}
.btn-cont:hover{background:var(--color-action-hover);}
.btn-cont:disabled{opacity:.4;cursor:default;}
.btn-cont:disabled:hover{background:var(--color-action);}
.btn-ia{background:var(--color-surface-raised);border:1px solid var(--color-action-subtle);color:var(--color-action);font-size:11px;padding:5px 12px;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-sans);font-weight:500;transition:background var(--transition-base);}
.btn-ia:hover{background:var(--color-action-wash);}
.btn-ghost{background:var(--color-surface-raised);border:1px solid var(--color-border-default);color:var(--color-text-secondary);font-size:12px;padding:5px 14px;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-sans);transition:background var(--transition-base);}
.btn-ghost:hover{background:var(--color-surface-sunken);}
.btn-confirm{background:var(--color-surface-raised);border:1.5px solid var(--color-text-primary);color:var(--color-text-primary);font-size:12px;padding:5px 14px;border-radius:var(--radius-sm);cursor:pointer;font-weight:600;font-family:var(--font-sans);}
/* Health-check cards */
.hccard{border-radius:var(--radius-md);padding:12px 14px;border:1px solid var(--color-border-default);background:var(--color-surface-sunken);}
.hccard.hrd{border-left:3px solid var(--color-danger-text);background:var(--color-danger-surface);}
.hccard.sft{border-left:3px solid var(--color-warning-text);background:var(--color-warning-surface);}
.hccard.wrn{border-left:3px solid var(--color-border-strong);}
.hccard.gd{border-left:3px solid var(--color-success-text);background:var(--color-success-surface);}
.hcn{font-family:var(--font-mono);font-size:20px;font-weight:600;color:var(--color-text-primary);letter-spacing:-0.02em;}
.hcn.gd{color:var(--color-success-text);}
.hcl{font-size:11px;color:var(--color-text-secondary);margin-top:2px;}
.bcard{border-left:3px solid var(--color-warning-border);border-radius:0 var(--radius-md) var(--radius-md) 0;background:var(--color-warning-surface);border-top:1px solid var(--color-warning-border);border-right:1px solid var(--color-warning-border);border-bottom:1px solid var(--color-warning-border);padding:12px 14px;margin-bottom:8px;}
.bcard.sft{border-left-color:var(--color-warning-border);background:var(--color-warning-surface);border-color:var(--color-warning-border);}
.bcard.hrd{border-left-color:var(--color-danger-border);background:var(--color-danger-surface);border-color:var(--color-danger-border);}
.bcard.wrn{border-left-color:var(--color-border-strong);background:var(--color-surface-sunken);border-color:var(--color-border-default);}
.bcard h3{font-size:12px;font-weight:600;color:var(--color-text-primary);margin-bottom:5px;}
.bcard p{font-size:12px;color:var(--color-text-secondary);line-height:1.5;margin-bottom:3px;font-weight:300;}
.frow{border:1px solid var(--color-border-default);border-radius:var(--radius-md);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;background:var(--color-surface-sunken);gap:12px;}
.fname{font-size:13px;font-weight:600;color:var(--color-text-primary);}
.fmeta{font-size:11px;color:var(--color-text-tertiary);margin-top:2px;font-weight:300;}
.up-badge{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);font-size:10px;font-weight:600;padding:3px 10px;border-radius:var(--radius-full);white-space:nowrap;}
/* Upload zone */
.upzone{border:1.5px dashed var(--color-border-strong);border-radius:var(--radius-lg);background:var(--color-surface-sunken);padding:32px 20px;display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:14px;}
.chklist{border:1px solid var(--color-border-default);border-radius:var(--radius-md);padding:14px;background:var(--color-surface-sunken);margin-bottom:14px;}
.chklist h3{font-size:10px;font-weight:600;color:var(--color-text-tertiary);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;}
.cli{display:flex;gap:8px;align-items:flex-start;font-size:12px;color:var(--color-text-secondary);line-height:1.55;margin-bottom:5px;font-weight:300;}
.cdot{width:4px;height:4px;border-radius:50%;background:var(--color-border-strong);flex-shrink:0;margin-top:6px;}
/* Month cards */
.month-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:var(--space-2);margin-bottom:18px;}
.month-card{border:1px solid var(--color-border-default);border-radius:var(--radius-lg);padding:14px 16px;background:var(--color-surface-raised);cursor:pointer;transition:border-color var(--transition-base),box-shadow var(--transition-base);position:relative;}
.month-card:hover{border-color:var(--color-action-subtle);box-shadow:0 0 0 3px var(--color-action-wash);}
.month-card.mc-done{border-left:3px solid var(--color-success-text);background:var(--color-success-surface);}
.month-card.mc-active{border-left:3px solid var(--color-brand);background:var(--color-brand-wash);}
.month-card.mc-warn{border-left:3px solid var(--color-warning-text);background:var(--color-warning-surface);}
.month-card.mc-todo{border-left:3px solid var(--color-border-strong);}
.mc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.mc-month{font-size:14px;font-weight:700;color:var(--color-text-primary);letter-spacing:-0.01em;}
.mc-status{font-size:10px;font-weight:600;padding:2px 8px;border-radius:var(--radius-full);}
.mc-s-done{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);}
.mc-s-active{background:var(--color-brand-wash);color:var(--color-brand);border:1px solid var(--color-brand-subtle);}
.mc-s-warn{background:var(--color-warning-surface);color:var(--color-warning-text);border:1px solid var(--color-warning-border);}
.mc-s-pend{background:var(--color-surface-sunken);color:var(--color-text-disabled);border:1px solid var(--color-border-default);}
.mc-prog-wrap{background:var(--color-border-default);border-radius:var(--radius-full);height:3px;margin-bottom:10px;overflow:hidden;}
.mc-prog-bar{height:3px;border-radius:var(--radius-full);}
.mc-prog-bar.grn{background:var(--color-success-text);}
.mc-prog-bar.tc{background:var(--color-brand);}
.mc-prog-bar.amb{background:var(--color-warning-text);}
.mc-stats{display:flex;gap:10px;}
.mc-stat{flex:1;}
.mc-stat-n{font-size:15px;font-weight:700;font-family:var(--font-mono);color:var(--color-text-primary);letter-spacing:-0.02em;}
.mc-stat-n.grn{color:var(--color-success-text);}
.mc-stat-n.red{color:var(--color-danger-text);}
.mc-stat-n.amb{color:var(--color-warning-text);}
.mc-stat-l{font-size:10px;color:var(--color-text-tertiary);margin-top:1px;font-weight:300;}
.mc-var-flag{margin-top:8px;padding:4px 8px;border-radius:var(--radius-sm);font-size:10px;font-weight:600;display:flex;align-items:center;gap:5px;}
.mc-var-flag.has-var{background:var(--color-warning-surface);color:var(--color-warning-text);}
.mc-var-flag.no-var{background:var(--color-success-surface);color:var(--color-success-text);}
.mc-flag-flag{margin-top:4px;padding:4px 8px;border-radius:var(--radius-sm);font-size:10px;font-weight:600;background:var(--color-danger-surface);color:var(--color-danger-text);display:flex;align-items:center;gap:5px;}
/* Progress bars */
.coa-prog-wrap{background:var(--color-border-default);border-radius:var(--radius-full);height:6px;margin:6px 0 4px;overflow:hidden;}
.coa-prog-bar{height:6px;border-radius:var(--radius-full);transition:width .4s;}
.coa-prog-bar.tc{background:var(--color-brand);}
.coa-prog-bar.grn{background:var(--color-success-text);}
/* Workspace groups */
.coa-sec{border:1px solid var(--color-border-default);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden;}
.coa-sec-hdr{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:var(--color-surface-sunken);}
.coa-sec-hdr.grn-l{border-left:3px solid var(--color-success-text);}
.coa-sec-hdr.amb-l{border-left:3px solid var(--color-warning-text);}
.coa-sec-hdr:hover{background:var(--color-border-subtle);}
.coa-sec-title{font-size:13px;font-weight:600;color:var(--color-text-primary);display:flex;align-items:center;gap:8px;}
.coa-sec-desc{font-size:12px;color:var(--color-text-tertiary);margin-top:3px;font-weight:300;}
.coa-badge{font-size:10px;font-weight:600;padding:2px 9px;border-radius:var(--radius-full);white-space:nowrap;}
.coa-badge.auto{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);}
.coa-badge.action{background:var(--color-warning-surface);color:var(--color-warning-text);border:1px solid var(--color-warning-border);}
/* Workspace transaction rows */
.txn-row{padding:10px 14px;border-top:1px solid var(--color-border-subtle);display:flex;align-items:center;gap:10px;}
.txn-row.confirmed{background:var(--color-success-surface);}
.txn-row.flagged{background:var(--color-warning-surface);}
.exc-btn-confirm{background:var(--color-surface-raised);border:1px solid var(--color-border-strong);color:var(--color-text-primary);font-size:11px;padding:4px 10px;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-sans);font-weight:600;}
.exc-btn-override{background:var(--color-surface-raised);border:1px solid var(--color-border-default);color:var(--color-text-tertiary);font-size:11px;padding:4px 10px;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-sans);}
.bulk-banner{background:var(--color-brand-wash);border-left:3px solid var(--color-brand);border-radius:0 var(--radius-md) var(--radius-md) 0;padding:12px 14px;margin:2px 0;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;}
.bulk-text{font-size:12px;color:var(--color-text-secondary);font-weight:300;}
.bulk-text strong{font-weight:600;color:var(--color-text-primary);display:block;margin-bottom:2px;}
.bulk-actions{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.exc-btn-apply{background:var(--color-action);color:var(--color-text-inverse);border:none;border-radius:var(--radius-sm);padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-sans);white-space:nowrap;}
.exc-btn-indiv{background:none;border:none;color:var(--color-action);font-size:12px;cursor:pointer;font-family:var(--font-sans);font-weight:500;white-space:nowrap;}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding-top:48px;overflow-y:auto;}
.modal-box{background:var(--color-surface-raised);border-radius:var(--radius-xl);width:100%;max-width:760px;box-shadow:0 20px 60px rgba(0,0,0,.25);margin:0 var(--space-4) var(--space-8);}
.modal-hdr{padding:20px 24px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.modal-title{font-size:18px;font-weight:700;color:var(--color-text-primary);letter-spacing:-0.01em;}
.modal-close{background:none;border:none;font-size:18px;color:var(--color-text-tertiary);cursor:pointer;padding:0;line-height:1;flex-shrink:0;margin-top:2px;}

/* ═══════════════════════════════════════
   RENDERING — substep bar + step routing
   ═══════════════════════════════════════ */
function renderSubstepBar() {
  var steps = [
    {lbl:'GL re-validation', meta:''},
    {lbl:'TB upload',        meta:''},
    {lbl:'GL mapping',       meta:''},
    {lbl:'TB · BS · P&L review', meta:''},
    {lbl:'Sign-off',         meta:''}
  ];

  /* maxStep = highest step the user has actually progressed to (linear). step = currently viewed.
     A step is "done" only if it's below maxStep, not just below the currently-viewed step. */
  var maxStep = S3._maxStep != null ? S3._maxStep : S3.step;

  var html = steps.map(function(s, i) {
    var cls;
    if (i === S3.step) cls = 'on';
    else if (i <= maxStep) cls = 'done';
    else cls = 'locked';

    /* Clickability:
       - Steps 0, 1 (re-validation, TB upload) are setup gates — only clickable up to maxStep.
       - Once GL mapping (step 2) has been reached, steps 2-5 become freely navigable
         so a Controller can peek at sample/TB review/sign-off without finishing every month. */
    var canClick = (i <= maxStep) || (maxStep >= 2 && i >= 2);
    var clickable = canClick ? ('onclick="goStep(' + i + ')"') : '';
    if (canClick && i > maxStep && i !== S3.step) cls = 'available';
    var icon = (i < maxStep || (i === maxStep && i !== S3.step)) ? '&#10003;' : (i + 1);
    var meta = (s.meta && i === S3.step) ? '<span class="ss-meta">· ' + s.meta + '</span>' : '';
    return '<div class="ssi ' + cls + '" ' + clickable + '>'
      + '<span class="ssc ' + cls + '">' + icon + '</span>'
      + '<span class="ssl ' + cls + '">' + s.lbl + '</span>'
      + meta
      + '</div>';
  }).join('');

  /* Decisions/Browse all toggle — only show on GL mapping (step 2) */
  if (S3.step === 2) {
    var vm = S3.ws.viewMode;
    html += '<div class="ws-toggle-wrap">'
      + '<button class="ws-toggle-btn ' + (vm === 'decisions' ? 'active' : 'inactive') + '" onclick="wsSetViewMode(\'decisions\')">Decisions</button>'
      + '<button class="ws-toggle-btn ' + (vm === 'browseAll' ? 'active' : 'inactive') + '" onclick="wsSetViewMode(\'browseAll\')">Browse all</button>'
      + '</div>';
  }

  document.getElementById('substepbar').innerHTML = html;
}

function wsSetViewMode(m) {
  S3.ws.viewMode = m;
  renderSubstepBar();
  renderMonthWorkspace(S3.ws.activeMonth);
}

function goStep(i) {
  /* Track the highest linearly-completed step.
     - Advancing by 1 (normal flow): bump _maxStep.
     - Jumping forward by >1 (peek mode): don't bump — just navigate.
     - Going backward: don't change _maxStep. */
  if (i === S3._maxStep + 1) S3._maxStep = i;
  S3.step = i;
  renderSubstepBar();
  if (i === 0) renderRevalidation();
  else if (i === 1) renderTBUpload();
  else if (i === 2) {
    /* GL mapping — drop straight into the workspace for the active month
       (or All months coverage view if that's where the user was). */
    var activeIdx = S3.ws.activeMonth != null ? S3.ws.activeMonth : 'all';
    renderMonthWorkspace(activeIdx);
  }
  else if (i === 3) renderTBReview();
  else if (i === 4) renderSignOff();
}

function renderMonthOverview() {
  var totalTxn = S3.months.reduce(function(s,m){return s+m.txn;},0);
  var totalMapped = S3.months.reduce(function(s,m){return s+m.mapped;},0);
  var totalReview = S3.months.reduce(function(s,m){return s+m.review;},0);
  var pctDone = Math.round(totalMapped/totalTxn*100);
  var totalFlags = S3.months.reduce(function(s,m){return s+(m.flagsOpen||0);},0);

  var cardsHtml = S3.months.map(function(m, i) {
    var cardCls = 'month-card mc-' + m.status;
    var statusHtml = '';
    if (m.status === 'done') statusHtml = '<span class="mc-status mc-s-done">&#10003; Done</span>';
    else if (m.status === 'active') statusHtml = '<span class="mc-status mc-s-active">In progress</span>';
    else if (m.status === 'warn') statusHtml = '<span class="mc-status mc-s-warn">' + m.review + ' remaining</span>';
    else statusHtml = '<span class="mc-status mc-s-pend">Not started</span>';

    var progCls = m.status === 'done' ? 'grn' : m.status === 'todo' ? 'tc' : 'amb';
    var mappedCls = m.status === 'done' ? 'grn' : '';
    var reviewCls = m.review > 0 ? 'red' : '';

    /* TB variance flag — clicking goes to TB view, not workspace */
    var varHtml = '';
    if (m.status !== 'todo') {
      if (m.varDetected) {
        /* TB variance card click bypasses workspace per PRD */
        varHtml = '<div class="mc-var-flag has-var" onclick="event.stopPropagation();openMonthTB(' + i + ')" style="cursor:pointer">&#9651; TB variance &middot; click to investigate</div>';
      } else {
        varHtml = '<div class="mc-var-flag no-var">&#10003; No variance</div>';
      }
    }
    var flagHtml = (m.flagsOpen && m.flagsOpen > 0) ? '<div class="mc-flag-flag">&#128681; ' + m.flagsOpen + ' flag awaiting IA</div>' : '';

    return '<div class="' + cardCls + '" onclick="openMonthWorkspace(' + i + ')">'
      + '<div class="mc-header"><span class="mc-month">' + m.m + '</span>' + statusHtml + '</div>'
      + '<div class="mc-prog-wrap"><div class="mc-prog-bar ' + progCls + '" style="width:' + m.pct + '%"></div></div>'
      + '<div class="mc-stats">'
      +   '<div class="mc-stat"><div class="mc-stat-n ' + mappedCls + '">' + m.mapped.toLocaleString() + '</div><div class="mc-stat-l">mapped</div></div>'
      +   '<div class="mc-stat"><div class="mc-stat-n">' + m.txn.toLocaleString() + '</div><div class="mc-stat-l">total</div></div>'
      +   '<div class="mc-stat"><div class="mc-stat-n ' + reviewCls + '">' + (m.review > 0 ? m.review : '—') + '</div><div class="mc-stat-l">to review</div></div>'
      + '</div>'
      + varHtml + flagHtml
      + '</div>';
  }).join('');

  document.getElementById('main').innerHTML =
    '<div class="srow"><span class="badge b-proc">In progress</span><span class="bmeta">Stage 3 · Transaction data · Step 3 of 6 · GL mapping</span></div>'
    + '<h1>GL transaction mapping</h1>'

/* Generate sample auto-mapped rows for a group on demand.

   pre-stored in the data because the real product would query them lazily.
   Each call returns the same rows for a given (monthIdx, gi) so refs are stable.
*/
function getAutoMappedRows(monthIdx, gi, group) {
  var mo = S3.months[monthIdx];
  var monthShort = mo.m.substring(0, 3);
  var rows = [];

  var templates;
  if (group.name === 'COGS') {
    templates = [
      { vendor:'PT Sumber Makmur',     desc:'Pembelian Bahan Baku',        acct:'5110 · Raw Material Purchases',   dim:'Jakarta · Production', baseAmt:280000000 },
      { vendor:'PT Logistik Nusantara',desc:'Standard Freight',            acct:'5310 · Freight & Shipping',       dim:'Jakarta · Production', baseAmt:18000000 },
      { vendor:'CV Bahan Karya',       desc:'Auxiliary Material',          acct:'5120 · Auxiliary Materials',      dim:'Jakarta · Production', baseAmt:12000000 },

    ];
  } else if (group.name === 'OpEx' || group.name === 'OpEx-G&A') {
    templates = [
      { vendor:'PLN Indonesia',     desc:'Listrik Bulanan',           acct:'6310 · Utilities',          dim:'Jakarta · Admin', baseAmt:12000000 },

      { vendor:'Sewa Gedung',       desc:'Sewa Gedung Bulanan',       acct:'6200 · Rent Expense',       dim:'Jakarta · Admin', baseAmt:52000000 },

    ];
  } else if (group.name === 'Assets' || group.name === 'Assets-Fixed') {
    templates = [
      { vendor:'PT Komputer Pro',   desc:'Pembelian Komputer',     acct:'1410 · Office Equipment',    dim:'Jakarta · Admin', baseAmt:18000000 },

    ];
  } else if (group.name === 'Assets-Current') {
    templates = [
      { vendor:'BCA',           desc:'Cash Movement',          acct:'1120 · Bank BCA',         dim:'Jakarta · Treasury', baseAmt:42000000 },
      { vendor:'Mandiri',       desc:'Cash Movement',          acct:'1130 · Bank Mandiri',     dim:'Jakarta · Treasury', baseAmt:38000000 },

    ];
  } else if (group.name === 'Liabilities') {
    templates = [

  /* How many sample rows to generate. Capped at 100 to keep page size reasonable. */
  var howMany = Math.min(100, Math.max(0, group.total - group.toReview));
  for (var ri = 0; ri < howMany; ri++) {
    var t = templates[ri % templates.length];
    /* Deterministic pseudo-amount: varies by ri so rows look distinct */
    var amt = t.baseAmt + (ri * 137 % 50) * (t.baseAmt * 0.01);
    amt = Math.round(amt / 1000) * 1000;
    var conf = 86 + ((ri * 7) % 13); /* 86–98% */

    });
  }
  return rows;
}

function renderMonthWorkspace(monthIdx) {
  /* monthIdx may be a number (0-11) or the string 'all' for the All-months coverage view. */
  var isAllMode = (monthIdx === 'all');
  var mo = isAllMode ? null : S3.months[monthIdx];
  S3.ws.activeMonth = monthIdx;

  /* When switching active month/scope, reset cluster/coverage selection so we land on overview */
  if (S3.ws._lastMonth !== monthIdx) {
    S3.ws.selectedCluster = null;
    S3.ws.selectedCoverage = null;
    S3.ws._lastMonth = monthIdx;
  }

  var totalMapped = S3.months.reduce(function(s,m){return s+m.mapped;},0);
  var totalTxn = S3.months.reduce(function(s,m){return s+m.txn;},0);
  var pct = Math.round(totalMapped/totalTxn*100);

  /* === Skinny month rail (column 1) === */
  /* "All months" pinned at the top, then a divider, then the 12 months. */
  var monthRailHtml = '';
  var allActive = isAllMode;
  var allCardCls = 'skinny-mc-card all-pin' + (allActive ? ' active-all' : '');
  monthRailHtml += '<div class="' + allCardCls + '" onclick="openMonthWorkspace(\'all\')">'
    + '<div class="skinny-mc">'
    +   '<span class="skinny-mc-dot all-dot"></span>'
    +   '<span class="skinny-mc-name all-name">All</span>'
    + '</div>'
    + '<div class="skinny-mc-prog all-bg"><div class="skinny-mc-prog-fill all" style="width:' + getCoverageOverallPct() + '%"></div></div>'
    + '<div class="skinny-mc-all-meta">Coverage</div>'
    + '</div>'
    + '<div class="skinny-mc-divider"></div>';

  S3.months.forEach(function(m, i) {
    var isActive = (!isAllMode) && (i === monthIdx);
    var cardCls = 'skinny-mc-card';
    var dotCls = '';
    var nameCls = '';
    var pillHtml = '';
    var progBar = '';
    var flagsHtml = '';

    if (isActive) cardCls += ' active';

    if (m.status === 'done') {
      if (!isActive) cardCls += ' done';
      dotCls = ' done'; nameCls = ' done';
      pillHtml = '<span class="skinny-mc-pill done">&#10003;</span>';
      progBar = '<div class="skinny-mc-prog done-bg"><div class="skinny-mc-prog-fill done" style="width:100%"></div></div>';
    } else if (m.status === 'active') {
      dotCls = ' active'; nameCls = ' active';
      pillHtml = '<span class="skinny-mc-pill active">' + (m.review || 0) + '</span>';
      progBar = '<div class="skinny-mc-prog active-bg"><div class="skinny-mc-prog-fill active" style="width:' + m.pct + '%"></div></div>';
    } else if (m.status === 'warn') {
      dotCls = ' warn'; nameCls = ' warn';
      pillHtml = '<span class="skinny-mc-pill warn">' + (m.review || 0) + '</span>';
      progBar = '<div class="skinny-mc-prog"><div class="skinny-mc-prog-fill warn" style="width:' + m.pct + '%"></div></div>';
    } else if (m.scenario === 'cutoff-warn') {
      cardCls += ' notclosed'; dotCls = ' todo'; nameCls = ' notclosed';
      pillHtml = '<span class="skinny-mc-pill" style="color:var(--color-warning-text)">&#9651;</span>';
    } else {
      dotCls = ' todo'; nameCls = ' todo';
    }

    /* flag indicators */
    var flagBadges = [];
    if (m.varDetected || (m.varAcct && m.status !== 'todo')) flagBadges.push('<span class="skinny-mc-flag var">&#9651;</span>');
    if (m.flagsOpen && m.flagsOpen > 0) flagBadges.push('<span class="skinny-mc-flag flag-ia">&#128681;' + m.flagsOpen + '</span>');
    if (flagBadges.length > 0) flagsHtml = '<div class="skinny-mc-flags">' + flagBadges.join('') + '</div>';

    monthRailHtml += '<div class="' + cardCls + '" onclick="openMonthWorkspace(' + i + ')">'
      + '<div class="skinny-mc">'
      +   '<span class="skinny-mc-dot' + dotCls + '"></span>'
      +   '<span class="skinny-mc-name' + nameCls + '">' + m.m.substring(0, 3) + '</span>'
      +   pillHtml
      + '</div>'
      + progBar
      + flagsHtml
      + '</div>';
  });

  /* Overall progress at bottom */
  monthRailHtml += '<div class="skinny-mc-rail-overall">'
    + '<div class="skinny-mc-rail-overall-lbl">Overall</div>'
    + '<div class="skinny-mc-rail-overall-bar"><div class="skinny-mc-rail-overall-fill" style="width:' + pct + '%"></div></div>'
    + '<div class="skinny-mc-rail-overall-meta">' + pct + '% &middot; ' + totalMapped.toLocaleString() + ' / ' + totalTxn.toLocaleString() + '</div>'
    + '</div>';

  /* === All-months mode === */
  if (isAllMode) {
    var coverageColHtml = renderCoverageColumn();
    var coveragePaneHtml;
    if (S3.ws.selectedCoverage == null) {
      coveragePaneHtml = renderCoverageOverviewPane();
    } else {
      coveragePaneHtml = renderCoverageWorkspace(S3.ws.selectedCoverage);
    }
    document.getElementById('main').innerHTML =
      '<div class="ws-shell">'
      +   '<div class="ws-month-rail-skinny">' + monthRailHtml + '</div>'
      +   '<div class="cluster-col">' + coverageColHtml + '</div>'
      +   coveragePaneHtml
      + '</div>';
    return;
  }

  /* === December not-closed early return === */
  var groups = getWorkspaceData(monthIdx);
  if (groups.length === 1 && groups[0].notClosed) {
    document.getElementById('main').innerHTML =
      '<div class="ws-shell">'
      +   '<div class="ws-month-rail-skinny">' + monthRailHtml + '</div>'
      +   '<div class="cluster-col">'
      +     '<div class="cluster-col-hdr">'
      +       '<div class="cluster-col-hdr-title">' + mo.m + ' 2025</div>'
      +       '<div class="cluster-col-hdr-meta">Not yet closed in legacy</div>'
      +     '</div>'
      +     '<div style="padding:14px 14px;font-size:11px;color:var(--color-text-tertiary);font-weight:300;line-height:1.5">December postings are not finalised. Year-end accruals typically post on 31 Dec. Wait for legacy close before mapping this month.</div>'
      +   '</div>'
      +   '<div class="workspace-pane">'
      +     '<div class="workspace-empty">'
      +       '<div class="workspace-empty-arrow">&#9651;</div>'
      +       '<div class="workspace-empty-title">' + mo.m + ' is not yet closed</div>'
      +       '<div class="workspace-empty-desc">Estimated 1,798 transactions when closed. Your IA will notify you when ready. Click another month in the rail to continue.</div>'
      +     '</div>'
      +   '</div>'
      + '</div>';
    return;
  }

  /* === Browse-all mode: skip cluster column, show flat rows in workspace === */
  if (S3.ws.viewMode === 'browseAll') {
    var workspaceBrowseHtml = renderBrowseAll(monthIdx, mo, groups);
    document.getElementById('main').innerHTML =
      '<div class="ws-shell">'
      +   '<div class="ws-month-rail-skinny">' + monthRailHtml + '</div>'
      +   workspaceBrowseHtml
      + '</div>';
    return;
  }

  /* === Cluster column (column 2) === */
  var clusterColHtml = '<div class="cluster-col-hdr">'
    + '<div class="cluster-col-hdr-title">' + mo.m + ' 2025</div>'
    + '<div class="cluster-col-hdr-meta">' + mo.txn.toLocaleString() + ' transactions · ' + (mo.review || 0) + ' to review</div>'
    + '</div>';

  /* Account categories section */
  clusterColHtml += '<div class="cluster-col-section-lbl">Account categories</div>';
  groups.forEach(function(grp, gi) {
    clusterColHtml += renderClusterCard(monthIdx, grp, gi);
  });

  /* Across-categories section: only render header if there are items */
  var crossItems = [];
  if (mo.flagsOpen && mo.flagsOpen > 0) {
    crossItems.push({type:'flag-ia', name:'Flagged to IA', meta:mo.flagsOpen + ' transaction · awaiting response', cls:'danger'});
  }
  if (crossItems.length > 0) {
    clusterColHtml += '<div class="cluster-col-section-lbl">Across categories</div>';
    crossItems.forEach(function(item) {
      clusterColHtml += '<div class="cross-cluster-card ' + (item.cls || '') + '">'
        + '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px">'
        +   '<div><div class="cross-cluster-card-name">' + item.name + '</div><div class="cross-cluster-card-meta">' + item.meta + '</div></div>'
        +   (item.type === 'flag-ia' ? '<span style="font-size:11px;color:var(--color-danger-text);font-weight:600">&#128681;</span>' : '')
        + '</div>'
        + '</div>';
    });
  }

  /* === Workspace pane (column 3) === */
  var workspaceHtml;
  if (S3.ws.selectedCluster === null || S3.ws.selectedCluster >= groups.length) {
    /* Show month overview */
    workspaceHtml = renderMonthOverviewPane(monthIdx, mo, groups);
  } else {
    /* Show selected cluster's workspace */
    workspaceHtml = renderClusterWorkspace(monthIdx, mo, groups, S3.ws.selectedCluster);
  }

  document.getElementById('main').innerHTML =
    '<div class="ws-shell">'
    +   '<div class="ws-month-rail-skinny">' + monthRailHtml + '</div>'
    +   '<div class="cluster-col">' + clusterColHtml + '</div>'
    +   workspaceHtml
    + '</div>';
}

/* Build a single cluster card for the cluster column */
/* ═══════════════════════════════════════
   COVERAGE VIEWS (All months)
   ═══════════════════════════════════════
   The Top 50 / Random sample / IDR 50M+ / Tax accounts / Flagged-to-IA views
   are queries over all rows across all 12 months. State (txnStates, overrides)
   is shared with per-month workspaces — confirming a row in Top 50 propagates
   to its month/category and vice versa. */

/* Cache so we don't recompute every render */
var _coverageCache = null;

function _allRowsAcrossMonths() {
  if (_coverageCache) return _coverageCache;
  var all = [];
  S3.months.forEach(function(m, monthIdx) {
    var groups = getWorkspaceData(monthIdx);
    /* Skip not-closed months (December) */
    if (groups.length === 1 && groups[0].notClosed) return;
    groups.forEach(function(grp, gi) {
      /* Review-needed rows (these have hasFlag/conf/etc. and need a decision) */
      (grp.txns || []).forEach(function(txn, ti) {
        all.push({
          monthIdx: monthIdx, gi: gi, ti: ti, type: 'review',
          monthLbl: m.m.substring(0, 3),
          category: grp.name,
          txn: txn,
          amountNum: parseInt(String(txn.amount).replace(/[^0-9]/g, ''), 10) || 0
        });
      });
      /* Auto-mapped rows generated on demand */
      var autos = getAutoMappedRows(monthIdx, gi, grp);
      autos.forEach(function(txn, ti) {
        all.push({
          monthIdx: monthIdx, gi: gi, ti: ti, type: 'auto',
          monthLbl: m.m.substring(0, 3),
          category: grp.name,
          txn: txn,
          amountNum: parseInt(String(txn.amount).replace(/[^0-9]/g, ''), 10) || 0
        });
      });
    });
  });
  _coverageCache = all;
  return all;
}

/* Invalidate when data changes (overrides, confirmations) */
function invalidateCoverageCache() { _coverageCache = null; }

function getCoverageRows(coverageId) {
  var all = _allRowsAcrossMonths();
  if (coverageId === 'top50') {
    /* Top 50 rows by amount, sorted desc */
    var sorted = all.slice().sort(function(a, b) { return b.amountNum - a.amountNum; });
    return sorted.slice(0, 50);
  }
  if (coverageId === 'idr50m') {
    /* All rows over IDR 50,000,000 */
    var over = all.filter(function(r) { return r.amountNum >= 50000000; });
    /* Sort by amount desc */
    over.sort(function(a, b) { return b.amountNum - a.amountNum; });
    return over;
  }
  if (coverageId === 'tax') {
    /* Tax-account rows — match suggested account starting with 21 (PPN/PPh patterns)
       In the demo data, tax-account references are sparse. We deterministically pick
       a sample of rows whose category contains 'Liabilities' or amount falls in tax-typical range. */
    var taxRows = all.filter(function(r) {
      var sug = r.txn.suggested || '';
      return /^2[12]\d/.test(sug) || /Tax|Pajak|PPN|PPh/i.test(r.txn.desc || '');
    });
    /* If sparse (likely in demo), pad with first N rows from Liabilities for the demo */
    if (taxRows.length < 30) {
      all.forEach(function(r) {
        if (taxRows.indexOf(r) >= 0) return;
        if (r.category === 'Liabilities') taxRows.push(r);
      });
    }
    /* Cap and sort */
    return taxRows.slice(0, 287).sort(function(a, b) { return b.amountNum - a.amountNum; });
  }
  if (coverageId === 'random') {
    /* Deterministic pseudo-random sample of 50, weighted across categories */
    var sample = [];
    /* Group by category */
    var byCat = {};
    all.forEach(function(r) {
      if (!byCat[r.category]) byCat[r.category] = [];
      byCat[r.category].push(r);
    });
    /* Take ~6-7 per category from a reproducible offset */
    var cats = Object.keys(byCat);
    var perCat = Math.ceil(50 / Math.max(1, cats.length));
    cats.forEach(function(cat) {
      var rows = byCat[cat];
      var step = Math.max(1, Math.floor(rows.length / perCat));
      for (var i = 0; i < rows.length && sample.length < 50; i += step) {
        sample.push(rows[i]);
      }
    });
    return sample.slice(0, 50);
  }
  if (coverageId === 'flagged') {
    /* Rows that have been flagged to IA (state === 'flagged') OR carry a hasFlag tag */
    var flagged = all.filter(function(r) {
      var key = r.monthIdx + '-' + r.gi + '-' + (r.type === 'auto' ? 'auto-' : '') + r.ti;
      var st = S3.ws.txnStates[key];
      if (st === 'flagged' || st === 'flagResolved') return true;
      if (r.txn.hasFlag && r.txn.flagReason === 'investigable') return true;
      return false;
    });
    return flagged;
  }
  return [];
}

/* Count of rows in a coverage view that are in any "resolved" state
   (confirmed, overridden, or auto-mapped without further action needed).
   For coverage, "reviewed" means: review row was confirmed/overridden/flagged,
   OR it's an auto row that's been confirmed via the AI batch banner / IA band /
   bulk override. */
function _isCoverageRowReviewed(r) {
  var key = r.monthIdx + '-' + r.gi + '-' + (r.type === 'auto' ? 'auto-' : '') + r.ti;
  var st = S3.ws.txnStates[key];
  if (st === 'confirmed' || st === 'overridden' || st === 'flagged') return true;
  /* Auto rows: count as reviewed if in a confirmed batch, individually overridden,
     or explicitly confirmed during coverage review */
  if (r.type === 'auto') {
    var batchKey = r.monthIdx + '-' + r.gi + '-batch';
    if (S3.ws.confirmedClusters[batchKey] === 'confirmed') return true;
    if (S3.ws.overrides[key]) return true;
    if (S3.ws.coverageConfirmed && S3.ws.coverageConfirmed[key]) return true;
  }
  return false;
}

function getCoverageStats(coverageId) {
  var rows = getCoverageRows(coverageId);
  var total = rows.length;
  var reviewed = rows.filter(_isCoverageRowReviewed).length;
  return { total: total, reviewed: reviewed, toGo: total - reviewed };
}

/* Across all coverage views, what's the rolled-up review percentage?
   Used for the All-pin's progress bar. Based on Top 50 + Random + IDR 50M+ + Tax. */
function getCoverageOverallPct() {
  var ids = ['top50', 'random', 'idr50m', 'tax'];
  var total = 0, reviewed = 0;
  ids.forEach(function(id) {
    var s = getCoverageStats(id);
    total += s.total;
    reviewed += s.reviewed;
  });
  return total > 0 ? Math.round(reviewed / total * 100) : 0;
}

      pillHtml = '<span class="cluster-card-pill review">' + stats.toGo + ' to go</span>';

    } else {

/* === Workspace when a coverage view is selected (column 3) === */
function renderCoverageWorkspace(coverageId) {
  var rows = getCoverageRows(coverageId);
  var stats = getCoverageStats(coverageId);
  var titleMap = {
    top50:   { title: 'Top 50 transactions by amount', sub: 'sorted by amount &darr;' },
    random:  { title: 'Random sample',                  sub: 'pre-selected, weighted across categories' },
    idr50m:  { title: 'IDR 50M+ exceptions',            sub: 'all transactions over IDR 50M, sorted by amount &darr;' },
    tax:     { title: 'Tax accounts',                   sub: 'all tax-account postings — confirm correct tax type' },
    flagged: { title: 'Flagged to IA',                  sub: 'awaiting IA response' }
  };
  var t = titleMap[coverageId] || { title: 'Coverage view', sub: '' };

  /* Filter pills */
  var filt = S3.ws.coverageFilter || 'toReview';
  var filteredRows;
  if (filt === 'toReview') {
    filteredRows = rows.filter(function(r) { return !_isCoverageRowReviewed(r); });
  } else if (filt === 'reviewed') {
    filteredRows = rows.filter(_isCoverageRowReviewed);
  } else {
    filteredRows = rows; /* all */
  }
  /* Cap shown rows to 100 for performance */
  var capped = filteredRows.slice(0, 100);

  /* Header */
  var hdrHtml = '<div class="workspace-hdr">'
    + '<div class="workspace-hdr-row">'
    +   '<div>'
    +     '<div class="workspace-hdr-title">' + t.title + '</div>'
    +     '<div class="workspace-hdr-meta">All months &middot; ' + stats.reviewed + ' of ' + stats.total + ' reviewed &middot; ' + t.sub + '</div>'
    +   '</div>'
    +   '<div class="workspace-filter-row">'
    +     '<span class="filter-lbl">Show:</span>'
    +     '<button class="' + (filt === 'toReview' ? 'btn-confirm' : 'btn-ghost') + '" onclick="wsSetCoverageFilter(\'toReview\')" style="font-size:11px;padding:4px 10px">To review (' + stats.toGo + ')</button>'
    +     '<button class="' + (filt === 'all' ? 'btn-confirm' : 'btn-ghost') + '" onclick="wsSetCoverageFilter(\'all\')" style="font-size:11px;padding:4px 10px">All (' + stats.total + ')</button>'
    +     '<button class="' + (filt === 'reviewed' ? 'btn-confirm' : 'btn-ghost') + '" onclick="wsSetCoverageFilter(\'reviewed\')" style="font-size:11px;padding:4px 10px">Reviewed (' + stats.reviewed + ')</button>'
    +   '</div>'
    + '</div>'
    + '</div>';

  /* Selectable keys for bulk actions */
  var selectableKeys = capped.filter(function(r) { return !_isCoverageRowReviewed(r); }).map(function(r) {
    return r.monthIdx + '-' + r.gi + '-' + (r.type === 'auto' ? 'auto-' : '') + r.ti;
  });
  var selectedCount = selectableKeys.filter(function(k) { return S3.ws.selectedRows[k]; }).length;
  var allSelected = selectableKeys.length > 0 && selectedCount === selectableKeys.length;

  /* Bulk action bar */
  var bulkBarHtml = '';
  if (selectedCount > 0) {
    if (S3.ws.bulkOverrideOpen) bulkBarHtml = renderBulkOverrideForm(selectedCount);
    else if (S3.ws.bulkFlagOpen) bulkBarHtml = renderBulkFlagForm(selectedCount);
    else {
      bulkBarHtml = '<div class="bulk-bar">'
        + '<span class="bulk-bar-count">' + selectedCount + ' selected</span>'
        + '<div class="bulk-bar-actions">'
        +   '<button class="btn-confirm" style="font-size:11px;padding:5px 12px" onclick="wsBulkConfirm()">&#10003; Confirm ' + selectedCount + '</button>'
        +   '<button class="btn-ghost" style="font-size:11px;padding:5px 10px" onclick="wsOpenBulkOverride()">Override ' + selectedCount + '</button>'
        +   '<button class="btn-ghost" style="font-size:11px;padding:5px 10px;color:var(--color-action)" onclick="wsOpenBulkFlag()">Flag IA</button>'
        +   '<span style="margin:0 4px;color:var(--color-border-default)">|</span>'
        +   '<button class="btn-ghost" style="font-size:11px;padding:5px 10px;color:var(--color-text-tertiary)" onclick="wsClearSelection()">Clear</button>'
        + '</div>'
        + '</div>';
    }
  }

  /* Rows */
  var rowsHtml = capped.map(function(r) {
    return renderCoverageTableRow(r);
  }).join('');

  if (capped.length === 0) {
    rowsHtml = '<tr><td colspan="9" style="padding:24px;text-align:center;font-size:12px;color:var(--color-text-tertiary);font-weight:300">'
      + (filt === 'toReview' ? 'All rows in this view have been reviewed.' : 'No rows in this view.')
      + '</td></tr>';
  }

  var tableHtml = '<div class="workspace-table-wrap">'
    + '<table class="workspace-table">'
    + '<thead><tr>'
    +   '<th class="cb-col">' + (selectableKeys.length > 0 ? '<input type="checkbox" ' + (allSelected ? 'checked' : '') + ' onclick="wsCoverageToggleAll()" />' : '') + '</th>'
    +   '<th>Ref</th>'
    +   '<th class="cov-context">Month</th>'
    +   '<th class="cov-context">Category</th>'
    +   '<th>Vendor</th>'
    +   '<th>Mapped to</th>'
    +   '<th class="amt">Amount</th>'
    +   '<th></th>'
    + '</tr></thead>'
    + '<tbody>' + rowsHtml + '</tbody>'
    + '</table>'
    + '</div>';

  /* Pagination */
  var paginationHtml = '';
  if (filteredRows.length > capped.length) {
    paginationHtml = '<div class="workspace-pagination">'
      + '<span>Showing ' + capped.length + ' of ' + filteredRows.length + '</span>'

      + '</div>';

  return '<div class="workspace-pane">'
    + hdrHtml
    + bulkBarHtml
    + tableHtml
    + paginationHtml
