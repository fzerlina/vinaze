function tbDrillToGL(varId) {
  var v = VARIANCES.find(function(x){return x.id===varId;});
  if (v && v.monthIdx !== undefined) {
    alert('Drill to GL: ' + S3.months[v.monthIdx].m + ' · ' + v.acct + '\n\nIn production, opens the GL workspace at this account scoped to the variance month.');
  }
}

function renderVarianceCard(v) {
  var cardCls = v.cls === 'investigable' ? 'inv' : v.cls === 'reclass' ? 'rec' : v.cls === 'cash-restatement' ? 'cash' : 'exp';
  var badgeCls = v.cls === 'investigable' ? 'vb-inv' : v.cls === 'reclass' ? 'vb-rec' : v.cls === 'cash-restatement' ? 'vb-cash' : 'vb-exp';
  var badgeText = v.cls === 'investigable' ? 'Investigable' : v.cls === 'reclass' ? 'Reclassification' : v.cls === 'cash-restatement' ? 'Cash-basis' : 'Expected';
  var deltaCls = v.deltaCls === 'pos' ? 'vpos' : 'vneg';
  var deltaSign = v.deltaCls === 'pos' ? '' : '';

  var hdr = '<div class="var-card-hdr">'
    + '<div><div class="title">' + v.acct + '</div><div class="nums">Legacy: ' + v.legacy + ' &rarr; Klay: ' + v.klay + ' &middot; <span class="v ' + deltaCls + '">' + v.delta + '</span></div></div>'
    + '<span class="var-badge ' + badgeCls + '">' + badgeText + '</span>'
    + '</div>';

  /* Body content depends on classification */
  var body = '';
  if (v.cls === 'expected') {
    body = '<div class="sys-exp-box"><div class="sys-exp-lbl">System explanation</div><div class="sys-exp-text">' + v.sysExp + '</div></div>'
      + '<div class="var-card-footer"><span class="var-auto-accepted">Auto-accepted — no action required</span><span class="var-badge vb-exp">&#10003;</span></div>';
  } else if (v.cls === 'cash-restatement') {
    body = '<div class="ia-note-box" style="background:var(--color-brand-wash)"><div class="ia-note-lbl" style="color:var(--color-brand)">Cash-basis restatement</div><div class="ia-note-text">' + v.iaNote + '</div><div class="ia-note-attr">— ' + v.iaBy + ' &middot; ' + v.iaWhen + '</div></div>'
      + '<div class="var-card-footer"><span class="var-auto-accepted">Documented as restatement — disclosed in audit trail. Not flagged as error.</span><span class="var-badge vb-cash">&#10003; Documented</span></div>';
  } else {
    /* Reclassification or Investigable both need a Controller decision */
    var decision = S3.tbReview.varianceDecisions[v.id];
    body = '<div class="ia-note-box"><div class="ia-note-lbl">IA investigation note</div><div class="ia-note-text">' + v.iaNote + '</div><div class="ia-note-attr">— ' + v.iaBy + ' &middot; ' + v.iaWhen + '</div></div>';

    if (decision) {
      /* Show audit trail entry */
      body += '<div class="audit-entry" style="border-left:3px solid var(--color-success-text);padding-left:10px">'
        + '<div class="audit-lbl">Audit trail entry · accepted with reason</div>'
        + '<div class="audit-text">' + decision.reasonText + (decision.customNote ? ' ' + decision.customNote : '') + '</div>'
        + '<div class="audit-attr">' + decision.by + ' &middot; ' + decision.when + '</div>'
        + '</div>'
        + '<div class="var-card-footer"><span style="font-size:12px;color:var(--color-success-text);font-weight:500">&#10003; Accepted with reason — documented in audit trail</span></div>';
    } else if (S3.tbReview.activeForm === v.id) {
      /* Show reason form */
      body += renderReasonForm(v);
    } else {
      body += '<div class="var-card-footer">'
        + '<span class="var-auto-accepted">Your decision is required. ' + (v.cls === 'investigable' ? 'Accept with reason or escalate.' : 'Confirm reclassification with documented reason.') + '</span>'
        + '<div style="display:flex;gap:8px"><button class="btn-accept-reason" onclick="tbStartReasonForm(\'' + v.id + '\')">Accept with reason</button><button class="btn-request-inv">Request further investigation</button></div>'
        + '</div>';
    }
  }

  return '<div class="var-card ' + cardCls + '">' + hdr + body + '</div>';
}

function renderReasonForm(v) {
  var selected = S3.tbReview.activeReason || null;
  var customNote = S3.tbReview.activeCustomNote || '';

  /* Reason options vary slightly by classification */
  var options = v.cls === 'investigable'
    ? [
        { k: 'accept-ia', t: "Accept IA's explanation — variance arises from CoA consolidation" },
        { k: 'immaterial', t: 'Variance is immaterial — within tolerance for sign-off' },
        { k: 'other', t: 'Other (write your own reason below)' }
      ]
    : [
        { k: 'accept-reclass', t: "Accept IA's reclassification — agrees with IFRS treatment" },
        { k: 'period-policy', t: 'Reclassification matches our accounting policy going forward' },
        { k: 'other', t: 'Other (write your own reason below)' }
      ];

  var optsHtml = options.map(function(opt) {
    var sel = selected === opt.k;
    return '<label class="reason-opt' + (sel ? ' sel' : '') + '">'
      + '<input type="radio" name="reason-' + v.id + '" ' + (sel ? 'checked' : '') + ' onchange="tbSetReason(\'' + opt.k + '\')" />'
      + '<span>' + opt.t + '</span>'
      + '</label>';
  }).join('');

  var canConfirm = selected && (selected !== 'other' || customNote.trim().length >= 10);

  return '<div class="reason-form">'
    + '<div class="reason-form-hdr"><span class="l">Reason for accepting this variance</span><span class="r">Required · stored in audit trail</span></div>'
    + optsHtml
    + '<textarea class="reason-textarea" placeholder="Add context or notes (required if \'Other\' selected)" oninput="tbSetCustomNote(this.value)">' + customNote + '</textarea>'
    + '<div class="reason-footer">'
    +   '<span class="note">Recorded with your name, role, and timestamp. Cannot be edited after sign-off.</span>'
    +   '<button class="btn-reason-confirm" ' + (canConfirm ? '' : 'disabled') + ' onclick="tbConfirmReason(\'' + v.id + '\')">Confirm acceptance</button>'
    + '</div>'
    + '</div>';
}

function tbStartReasonForm(varId) {
  S3.tbReview.activeForm = varId;
  S3.tbReview.activeReason = null;
  S3.tbReview.activeCustomNote = '';
  renderTBReview();
}
function tbSetReason(k) {
  S3.tbReview.activeReason = k;
  renderTBReview();
}
function tbSetCustomNote(v) {
  S3.tbReview.activeCustomNote = v;
  /* update button without full re-render */
  var btn = document.querySelector('.btn-reason-confirm');
  if (btn) {
    var sel = S3.tbReview.activeReason;
    var canConfirm = sel && (sel !== 'other' || v.trim().length >= 10);
    if (canConfirm) btn.removeAttribute('disabled');
    else btn.setAttribute('disabled', 'disabled');
  }
}
function tbConfirmReason(varId) {
  var v = VARIANCES.find(function(x){return x.id===varId;});
  var k = S3.tbReview.activeReason;
  var note = S3.tbReview.activeCustomNote;
  var reasonText = '';
  if (v.cls === 'investigable') {
    if (k === 'accept-ia') reasonText = "Accepted IA's explanation — variance arises from CoA consolidation.";
    else if (k === 'immaterial') reasonText = 'Variance accepted as immaterial — within tolerance for sign-off.';
    else reasonText = note;
  } else {
    if (k === 'accept-reclass') reasonText = "Accepted IA's reclassification — agrees with IFRS treatment.";
    else if (k === 'period-policy') reasonText = 'Reclassification matches our accounting policy going forward.';
    else reasonText = note;
  }
  S3.tbReview.varianceDecisions[varId] = {
    reasonText: reasonText,
    customNote: (k !== 'other' && note) ? '(' + note + ')' : '',
    by: 'BW (Controller)',
    when: 'Day 20 · 11:14 WIB'
  };
  S3.tbReview.activeForm = null;
  S3.tbReview.activeReason = null;
  S3.tbReview.activeCustomNote = '';
  renderTBReview();
}

/* ═══════════════════════════════════════
   STEP 5 — SIGN-OFF
   Fixed: attestation language matches PRD ("our company's").
   Preserved: dispute pattern on auto-accepted Expected variances.
   ═══════════════════════════════════════ */
function renderSignOff() {
  renderSubstepBar();

  var autoAccepted = VARIANCES.filter(function(v){ return v.autoAccepted; });
  var resolvedDecisions = VARIANCES.filter(function(v){ return S3.tbReview.varianceDecisions[v.id]; });
  var documentedRestatement = VARIANCES.filter(function(v){ return v.cls === 'cash-restatement'; });

  var autoVarHtml = autoAccepted.map(function(v) {
    var isDisputed = S3.signoff.disputes[v.id];
    if (isDisputed) {
      return '<div class="bcard sft" style="margin-bottom:6px">'
        + '<h3>' + v.acct + ' &mdash; ' + v.delta + ' <span class="stag t-dec" style="margin-left:6px">Escalated to IA</span></h3>'
        + '<p>' + v.sysExp + '</p>'
        + '<p style="color:var(--color-warning-text);font-weight:500;margin-top:4px">Your IA has been notified. Sign-off is locked until this is resolved.</p>'
        + '<div style="margin-top:6px"><button class="btn-ghost" onclick="signoffUndispute(\'' + v.id + '\')" style="font-size:11px">&#8592; Withdraw dispute</button></div>'
        + '</div>';
    }
    return '<div class="disp-row">'
      + '<div><div class="disp-name">' + v.acct + '</div><div class="disp-reason">Auto-accepted: ' + (v.cls === 'expected' ? 'GL-to-TB rounding adjustment' : 'documented') + ' &middot; <span class="disp-amt">' + v.delta + '</span></div></div>'
      + '<button class="btn-ia" onclick="signoffDispute(\'' + v.id + '\')" style="font-size:11px;padding:3px 10px;white-space:nowrap;flex-shrink:0;margin-top:0">I disagree &#8599;</button>'
      + '</div>';
  }).join('');

  var hasDisputes = Object.keys(S3.signoff.disputes).some(function(k){return S3.signoff.disputes[k];});
  var canSeal = !hasDisputes;

  document.getElementById('main').innerHTML =
    '<div class="srow"><span class="badge b-act">Action required</span><span class="bmeta">Stage 3 · Transaction data · Step 6 of 6 · Sign-off</span></div>'
    + '<h1>Confirm financial position</h1>'
    + '<p class="desc">Your review is complete. Check the summary, challenge any auto-accepted items if needed, then sign and seal the audit trail. <strong>This is the most consequential sign-off in the migration</strong> — every future financial report and tax filing rests on it.</p>'

    + '<div class="so5-summary">'
    +   '<div class="so5-row"><span class="so5-label">GL mapping</span><span class="so5-reviewed">Complete &#10003;</span><span class="so5-detail">All 12 months Done · ' + S3.months.reduce(function(s,m){return s+m.txn;},0).toLocaleString() + ' transactions mapped · 0 open flags</span></div>'
    +   '<div class="so5-row"><span class="so5-label">Sample review</span><span class="so5-reviewed">Reviewed &#10003;</span><span class="so5-detail">Top 20, random 50, IDR 50M+ exceptions, tax accounts, flagged items</span></div>'
    +   '<div class="so5-row"><span class="so5-label">Trial Balance</span><span class="so5-reviewed">Balanced &#10003;</span><span class="so5-detail">Net variance Rp 0 &middot; 2 expected (auto-accepted) · 1 reclassification · 1 investigable · 1 cash-basis restatement</span></div>'
    +   '<div class="so5-row"><span class="so5-label">Balance Sheet</span><span class="so5-reviewed">Clean &#10003;</span><span class="so5-detail">Assets = Liabilities + Equity · no variances</span></div>'
    +   '<div class="so5-row"><span class="so5-label">P&amp;L</span><span class="so5-reviewed">Reviewed &#10003;</span><span class="so5-detail">' + resolvedDecisions.length + ' variances accepted with reason · ' + documentedRestatement.length + ' restatement documented</span></div>'
    + '</div>'

    + '<div class="shdr"><h2>Auto-accepted variances</h2><span class="stag t-info">Challenge if you disagree</span></div>'
    + '<p style="font-size:12px;color:var(--color-text-secondary);font-weight:300;margin-bottom:10px;line-height:1.5">These were accepted automatically by the system. Click "I disagree" to escalate to IA — sign-off is locked while disputes are open.</p>'
    + '<div style="border:1px solid var(--color-border-default);border-radius:var(--radius-md);padding:0 14px;margin-bottom:16px;background:var(--color-surface-raised)">' + autoVarHtml + '</div>'
    + (hasDisputes ? '<div class="alert" style="margin-bottom:14px"><div class="alert-icon">&#9651;</div><div class="alert-body"><strong>Sign-off locked.</strong> You have disputed ' + Object.values(S3.signoff.disputes).filter(Boolean).length + ' variance(s). Your IA has been notified and must resolve these first.</div></div>' : '')

    + '<div class="fin-pos-row"><span class="fin-pos-lbl">Financial position as of</span><span class="fin-pos-date">31 December 2025</span></div>'

    + '<div class="formal-box" style="' + (canSeal ? '' : 'opacity:.5;') + '">'
    +   '<div class="formal-box-lbl">Formal Controller Acceptance</div>'
    +   '<div class="formal-text">I have reviewed the Trial Balance, Balance Sheet, and P&amp;L reconciliation. All accepted variances are documented. I am satisfied that the financial position in Klay correctly represents our company\'s financial state as of <span class="mono">31 December 2025</span>.</div>'
    +   '<div class="formal-sig">'
    +     '<div class="formal-sig-name">BW &mdash; Bambang Wijaya · Controller<br><span style="font-family:var(--font-mono);font-size:11px">Day 20 of 30</span></div>'
    +     (canSeal
        ? '<button class="btn-sign-seal" onclick="sealStage3()">Sign &amp; seal &#8250;</button>'
        : '<button class="btn-sign-seal" disabled>Sign &amp; seal &#8250;</button>')
    +   '</div>'
    + '</div>'
    + (canSeal ? '' : '<p class="proto-note">Sign-off locked — resolve disputed variances with your IA first.</p>');
}

function signoffDispute(id) { S3.signoff.disputes[id] = true; renderSignOff(); }
function signoffUndispute(id) { S3.signoff.disputes[id] = false; renderSignOff(); }

function sealStage3() {
  document.getElementById('main').innerHTML =
    '<div style="display:flex;flex-direction:column;align-items:center;text-align:center;padding:60px 20px">'
    + '<div style="width:64px;height:64px;border-radius:50%;background:var(--color-success-surface);display:flex;align-items:center;justify-content:center;margin-bottom:20px"><span style="color:var(--color-success-text);font-size:28px;font-weight:700">&#10003;</span></div>'
    + '<h1 style="font-size:24px">Stage 3 sealed</h1>'
    + '<p style="font-size:14px;color:var(--color-text-secondary);margin-top:6px;font-weight:300;max-width:480px;line-height:1.6">Your financial position is locked in Klay. The audit trail entry has been recorded immutably. UAT (Stage 4) unlocks next.</p>'
    + '<div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:20px">'
    +   '<span style="background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);font-size:11px;padding:3px 10px;border-radius:var(--radius-full);font-weight:500">20,462 transactions migrated</span>'
    +   '<span style="background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);font-size:11px;padding:3px 10px;border-radius:var(--radius-full);font-weight:500">5 variances resolved</span>'
    +   '<span style="background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);font-size:11px;padding:3px 10px;border-radius:var(--radius-full);font-weight:500">Day 20 of 30</span>'
    + '</div>'
    + '<button class="btn-cont" style="margin-top:24px" onclick="goStep(0)">[Demo: restart Stage 3]</button>'
    + '</div>';
}

/* Init */
renderSubstepBar();
goStep(0);
</script>
</body>
</html>
