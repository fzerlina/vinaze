<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Klay Migration — Stage 3 (Transaction data) revised</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Inconsolata:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --primitive-tc-900:#3D1200;--primitive-tc-700:#A03206;--primitive-tc-500:#B83D08;--primitive-tc-400:#D4622A;--primitive-tc-200:#EDD5C4;--primitive-tc-100:#F7EDE5;
  --primitive-bl-900:#0E2470;--primitive-bl-700:#1338A8;--primitive-bl-500:#1A46C8;--primitive-bl-400:#4D72E0;--primitive-bl-200:#C8D8FA;--primitive-bl-100:#EBF0FD;
  --primitive-ink-950:#080706;--primitive-ink-900:#1A1814;--primitive-ink-800:#2E2B27;--primitive-ink-400:#8C857C;--primitive-ink-300:#C8C2BA;--primitive-ink-200:#E2DDD7;--primitive-ink-100:#F4F0EB;--primitive-ink-50:#FBF8F5;--primitive-white:#FFFFFF;
  --primitive-go-700:#166638;--primitive-go-200:#A8D9BC;--primitive-go-100:#E8F5EE;
  --primitive-warn-800:#7A4D00;--primitive-warn-300:#E8C870;--primitive-warn-100:#FDF3E0;
  --primitive-stop-700:#A02020;--primitive-stop-300:#EAB8B8;--primitive-stop-100:#FBF0F0;
  --color-brand:var(--primitive-tc-500);--color-brand-hover:var(--primitive-tc-700);--color-brand-mid:var(--primitive-tc-400);--color-brand-subtle:var(--primitive-tc-200);--color-brand-wash:var(--primitive-tc-100);--color-brand-deep:var(--primitive-tc-900);
  --color-action:var(--primitive-bl-500);--color-action-hover:var(--primitive-bl-700);--color-action-mid:var(--primitive-bl-400);--color-action-subtle:var(--primitive-bl-200);--color-action-wash:var(--primitive-bl-100);
  --color-text-primary:var(--primitive-ink-950);--color-text-secondary:var(--primitive-ink-800);--color-text-tertiary:var(--primitive-ink-400);--color-text-disabled:var(--primitive-ink-300);--color-text-inverse:var(--primitive-white);
  --color-surface-base:var(--primitive-ink-50);--color-surface-raised:var(--primitive-white);--color-surface-sunken:var(--primitive-ink-100);
  --color-border-default:var(--primitive-ink-200);--color-border-subtle:var(--primitive-ink-100);--color-border-strong:var(--primitive-ink-300);
  --color-success-text:var(--primitive-go-700);--color-success-border:var(--primitive-go-200);--color-success-surface:var(--primitive-go-100);
  --color-warning-text:var(--primitive-warn-800);--color-warning-border:var(--primitive-warn-300);--color-warning-surface:var(--primitive-warn-100);
  --color-danger-text:var(--primitive-stop-700);--color-danger-border:var(--primitive-stop-300);--color-danger-surface:var(--primitive-stop-100);
  --font-sans:'Manrope',sans-serif;--font-mono:'Inconsolata',monospace;
  --radius-sm:6px;--radius-md:10px;--radius-lg:14px;--radius-xl:20px;--radius-full:9999px;
  --space-2:8px;--space-3:12px;--space-4:16px;--space-6:24px;--space-8:32px;--space-14:56px;
  --transition-base:0.15s ease;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--font-sans);background:var(--color-surface-base);color:var(--color-text-primary);-webkit-font-smoothing:antialiased;}
.nav{background:var(--color-surface-base);border-bottom:1px solid var(--color-border-default);padding:0 var(--space-14);height:52px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{color:var(--color-brand);font-weight:700;font-size:15px;letter-spacing:-0.02em;}
.nav-sep{color:var(--color-border-strong);margin:0 6px;}
.nav-org{color:var(--color-text-primary);font-weight:500;font-size:14px;}
.day-badge{font-size:11px;font-weight:600;padding:4px 12px;border-radius:var(--radius-full);background:var(--color-danger-surface);color:var(--color-danger-text);border:1px solid var(--color-danger-border);}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--color-brand);color:var(--color-text-inverse);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;}
/* Top stage bar */
.stagebar{background:var(--color-surface-raised);border-bottom:1px solid var(--color-border-default);padding:0 var(--space-14);display:flex;align-items:stretch;height:48px;}
.sti{display:flex;align-items:center;gap:8px;padding:0 16px;border-bottom:2px solid transparent;white-space:nowrap;}
.sti.on{border-bottom-color:var(--color-brand);}
.sti.off{opacity:.35;}
.stc{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.stc.on{background:var(--color-brand);color:var(--color-text-inverse);}
.stc.done{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);}
.stc.off{background:var(--color-surface-sunken);color:var(--color-text-disabled);border:1.5px solid var(--color-border-default);}
.stl{font-size:12px;font-weight:500;}
.stl.on{color:var(--color-brand);font-weight:600;}
.stl.done{color:var(--color-text-secondary);}
.stl.off{color:var(--color-text-disabled);}
/* Substep bar — horizontal Stage 3 substep navigation */
.substepbar{background:var(--color-surface-sunken);border-bottom:1px solid var(--color-border-default);padding:0 var(--space-14);display:flex;align-items:stretch;height:38px;}
.ssi{display:flex;align-items:center;gap:7px;padding:0 14px;border-right:1px solid var(--color-border-subtle);cursor:pointer;transition:background var(--transition-base);position:relative;}
.ssi:last-child{border-right:none;}
.ssi:hover{background:var(--color-surface-raised);}
.ssi.on{background:var(--color-surface-raised);border-bottom:2px solid var(--color-brand);margin-bottom:-1px;}
.ssi.done{}
.ssi.locked{opacity:.4;cursor:default;}
.ssi.locked:hover{background:transparent;}
.ssc{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;flex-shrink:0;}
.ssc.on{background:var(--color-brand);color:var(--color-text-inverse);}
.ssc.done{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);}
.ssc.locked{background:var(--color-surface-sunken);color:var(--color-text-disabled);border:1.5px solid var(--color-border-default);}
.ssl{font-size:11px;font-weight:500;color:var(--color-text-secondary);}
.ssl.on{color:var(--color-brand);font-weight:600;}
.ssl.locked{color:var(--color-text-disabled);}
.ss-meta{font-size:10px;color:var(--color-text-tertiary);font-weight:300;margin-left:2px;}
/* Layout */
.layout{display:flex;min-height:calc(100vh - 138px);}
/* Workspace shell — used inside GL mapping substep with rails */
.ws-shell{display:flex;align-items:stretch;width:100%;min-height:calc(100vh - 138px);}
.ws-month-rail{width:200px;background:var(--color-surface-raised);border-right:1px solid var(--color-border-default);padding:12px 10px;flex-shrink:0;overflow-y:auto;}
.ws-month-rail-lbl{font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding:0 4px;}
.mini-mc{border-radius:var(--radius-md);border:1px solid var(--color-border-default);padding:8px 9px;margin-bottom:5px;cursor:pointer;transition:border-color var(--transition-base);}
.mini-mc:hover{border-color:var(--color-action-subtle);}
.mini-mc.active{box-shadow:0 0 0 2px var(--color-action-wash);}
.mini-mc.done{border-left:2.5px solid var(--color-success-text);background:var(--color-success-surface);}
.mini-mc.active-mc{border-left:2.5px solid var(--color-brand);background:var(--color-brand-wash);}
.mini-mc.warn{border-left:2.5px solid var(--color-warning-text);}
.mini-mc.todo{border-left:2.5px solid var(--color-border-strong);}
.mini-mc.notclosed{border-left:2.5px solid var(--color-border-strong);opacity:.65;}
.mini-mc-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
.mini-mc-name{font-size:12px;font-weight:500;color:var(--color-text-primary);}
.mini-mc-name.done-clr{color:var(--color-success-text);}
.mini-mc-name.active-clr{color:var(--color-brand);}
.mini-mc-name.todo-clr{color:var(--color-text-secondary);}
.mini-mc-pill{font-size:9px;padding:1px 6px;border-radius:var(--radius-full);font-weight:600;}
.mini-mc-pill.done{background:var(--color-success-surface);color:var(--color-success-text);}
.mini-mc-pill.active{background:var(--color-warning-surface);color:var(--color-warning-text);border:1px solid var(--color-warning-border);}
.mini-mc-pill.warn{background:var(--color-warning-surface);color:var(--color-warning-text);}
.mini-mc-pill.todo{font-weight:300;color:var(--color-text-tertiary);font-family:var(--font-mono);}
.mini-mc-prog{height:2px;background:var(--color-border-default);border-radius:var(--radius-full);margin-bottom:4px;overflow:hidden;}
.mini-mc-prog-fill{height:2px;border-radius:var(--radius-full);}
.mini-mc-prog-fill.done{background:var(--color-success-text);}
.mini-mc-prog-fill.active{background:var(--color-brand);}
.mini-mc-prog-fill.warn{background:var(--color-warning-text);}
.mini-mc-meta{font-size:10px;color:var(--color-text-tertiary);font-weight:300;}
.mini-mc-meta.done-clr{color:var(--color-success-text);}
.mini-mc-meta.active-clr{color:var(--color-brand);}
.mini-mc-flags{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px;}
.mini-mc-flag{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;}
.mini-mc-flag.var{background:var(--color-warning-surface);color:var(--color-warning-text);}
.mini-mc-flag.flag{background:var(--color-danger-surface);color:var(--color-danger-text);}
.mini-mc-notclosed{font-size:9px;color:var(--color-text-tertiary);margin-top:2px;font-style:italic;}
.ws-month-rail-overall{border-top:1px solid var(--color-border-default);padding-top:8px;margin-top:6px;}
.ws-month-rail-overall-lbl{font-size:9px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;padding:0 4px;}
.ws-month-rail-overall-bar{height:3px;background:var(--color-border-default);border-radius:var(--radius-full);margin:0 4px 3px;overflow:hidden;}
.ws-month-rail-overall-fill{height:3px;background:var(--color-brand);border-radius:var(--radius-full);}
.ws-month-rail-overall-meta{display:flex;justify-content:space-between;font-size:9px;color:var(--color-text-tertiary);padding:0 4px;}
/* The center workspace area when rails are present */
.ws-center{flex:1;padding:18px 24px;background:var(--color-surface-raised);min-width:0;overflow-y:auto;}
.sb-hdr{padding:0 var(--space-4) 10px;}
.sb-lbl{font-size:10px;color:var(--color-text-tertiary);font-weight:600;letter-spacing:.07em;text-transform:uppercase;}
.sb-row{padding:9px var(--space-4);display:flex;align-items:center;gap:10px;cursor:pointer;border-left:3px solid transparent;transition:background var(--transition-base);}
.sb-row:hover{background:var(--color-surface-sunken);}
.sb-row.sel{background:var(--color-brand-wash);border-left-color:var(--color-brand);}
.sb-name{font-size:13px;font-weight:500;color:var(--color-text-primary);}
.sb-meta{font-size:11px;color:var(--color-text-tertiary);margin-top:1px;font-weight:400;}
.step-n{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.step-n.pend{background:var(--color-surface-sunken);color:var(--color-text-disabled);border:1.5px solid var(--color-border-default);}
.step-n.act{background:var(--color-brand);color:var(--color-text-inverse);}
.step-n.dn{background:var(--color-success-surface);color:var(--color-success-text);font-size:13px;}
.cl-divider{height:1px;background:var(--color-border-subtle);margin:6px 0;}
.cl-group-lbl{font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.07em;padding:8px 16px 2px;}
.sb-prog-wrap{padding:6px 16px 8px;border-bottom:1px solid var(--color-border-subtle);}
.sb-prog-bg{background:var(--color-border-default);border-radius:var(--radius-full);height:2px;margin-bottom:5px;overflow:hidden;}
.sb-prog-fill{height:2px;border-radius:var(--radius-full);background:var(--color-brand);}
.sb-prog-label{display:flex;justify-content:space-between;font-size:10px;color:var(--color-text-tertiary);font-weight:300;}
/* Content */
.content{flex:1;padding:22px var(--space-8);overflow-y:auto;background:var(--color-surface-raised);}
.srow{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:var(--radius-sm);letter-spacing:.02em;}
.b-not{background:var(--color-surface-sunken);color:var(--color-text-tertiary);}
.b-act{background:var(--color-danger-surface);color:var(--color-danger-text);border:1px solid var(--color-danger-border);}
.b-proc{background:var(--color-action-wash);color:var(--color-action);border:1px solid var(--color-action-subtle);}
.b-rev{background:var(--color-warning-surface);color:var(--color-warning-text);border:1px solid var(--color-warning-border);}
.bmeta{font-size:11px;color:var(--color-text-tertiary);font-weight:400;}
h1{font-size:20px;font-weight:700;color:var(--color-text-primary);margin-bottom:8px;letter-spacing:-0.01em;}
h2{font-size:15px;font-weight:600;color:var(--color-text-primary);}
.desc{font-size:13px;color:var(--color-text-secondary);line-height:1.65;margin-bottom:14px;font-weight:300;}
/* Alerts */
.alert{border-left:3px solid var(--color-brand-subtle);background:var(--color-brand-wash);border-radius:0 var(--radius-md) var(--radius-md) 0;padding:10px 14px;margin-bottom:14px;display:flex;gap:10px;}
.alert.blue{border-left-color:var(--color-action-subtle);background:var(--color-action-wash);}
.alert-icon{color:var(--color-brand);font-size:13px;flex-shrink:0;margin-top:1px;}
.alert.blue .alert-icon{color:var(--color-action);}
.alert-body{font-size:12px;color:var(--color-text-secondary);line-height:1.55;font-weight:300;}
.alert-body strong{color:var(--color-brand);font-weight:600;}
.alert.blue .alert-body strong{color:var(--color-action);}
/* Buttons */
.btn-action{background:var(--color-action);color:var(--color-text-inverse);border:none;border-radius:var(--radius-md);padding:9px 20px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-sans);transition:background var(--transition-base);}
.btn-action:hover{background:var(--color-action-hover);}
.btn-cont{background:var(--color-action);color:var(--color-text-inverse);border:none;border-radius:var(--radius-lg);padding:11px 22px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-sans);display:inline-flex;align-items:center;gap:8px;transition:background var(--transition-base);}
.btn-cont:hover{background:var(--color-action-hover);}
.btn-cont:disabled{opacity:.4;cursor:default;}
.btn-cont:disabled:hover{background:var(--color-action);}
.btn-ia{background:var(--color-surface-raised);border:1px solid var(--color-action-subtle);color:var(--color-action);font-size:11px;padding:5px 12px;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-sans);font-weight:500;transition:background var(--transition-base);}
.btn-ia:hover{background:var(--color-action-wash);}
.btn-ghost{background:var(--color-surface-raised);border:1px solid var(--color-border-default);color:var(--color-text-secondary);font-size:12px;padding:5px 14px;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-sans);transition:background var(--transition-base);}
.btn-ghost:hover{background:var(--color-surface-sunken);}
.btn-confirm{background:var(--color-surface-raised);border:1.5px solid var(--color-text-primary);color:var(--color-text-primary);font-size:12px;padding:5px 14px;border-radius:var(--radius-sm);cursor:pointer;font-weight:600;font-family:var(--font-sans);}
/* Health-check cards */
.hccard{border-radius:var(--radius-md);padding:12px 14px;border:1px solid var(--color-border-default);background:var(--color-surface-sunken);}
.hccard.hrd{border-left:3px solid var(--color-danger-text);background:var(--color-danger-surface);}
.hccard.sft{border-left:3px solid var(--color-warning-text);background:var(--color-warning-surface);}
.hccard.wrn{border-left:3px solid var(--color-border-strong);}
.hccard.gd{border-left:3px solid var(--color-success-text);background:var(--color-success-surface);}
.hcn{font-family:var(--font-mono);font-size:20px;font-weight:600;color:var(--color-text-primary);letter-spacing:-0.02em;}
.hcn.gd{color:var(--color-success-text);}
.hcl{font-size:11px;color:var(--color-text-secondary);margin-top:2px;}
.bcard{border-left:3px solid var(--color-warning-border);border-radius:0 var(--radius-md) var(--radius-md) 0;background:var(--color-warning-surface);border-top:1px solid var(--color-warning-border);border-right:1px solid var(--color-warning-border);border-bottom:1px solid var(--color-warning-border);padding:12px 14px;margin-bottom:8px;}
.bcard.sft{border-left-color:var(--color-warning-border);background:var(--color-warning-surface);border-color:var(--color-warning-border);}
.bcard.hrd{border-left-color:var(--color-danger-border);background:var(--color-danger-surface);border-color:var(--color-danger-border);}
.bcard.wrn{border-left-color:var(--color-border-strong);background:var(--color-surface-sunken);border-color:var(--color-border-default);}
.bcard h3{font-size:12px;font-weight:600;color:var(--color-text-primary);margin-bottom:5px;}
.bcard p{font-size:12px;color:var(--color-text-secondary);line-height:1.5;margin-bottom:3px;font-weight:300;}
.frow{border:1px solid var(--color-border-default);border-radius:var(--radius-md);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;background:var(--color-surface-sunken);gap:12px;}
.fname{font-size:13px;font-weight:600;color:var(--color-text-primary);}
.fmeta{font-size:11px;color:var(--color-text-tertiary);margin-top:2px;font-weight:300;}
.up-badge{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);font-size:10px;font-weight:600;padding:3px 10px;border-radius:var(--radius-full);white-space:nowrap;}
/* Upload zone */
.upzone{border:1.5px dashed var(--color-border-strong);border-radius:var(--radius-lg);background:var(--color-surface-sunken);padding:32px 20px;display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:14px;}
.chklist{border:1px solid var(--color-border-default);border-radius:var(--radius-md);padding:14px;background:var(--color-surface-sunken);margin-bottom:14px;}
.chklist h3{font-size:10px;font-weight:600;color:var(--color-text-tertiary);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;}
.cli{display:flex;gap:8px;align-items:flex-start;font-size:12px;color:var(--color-text-secondary);line-height:1.55;margin-bottom:5px;font-weight:300;}
.cdot{width:4px;height:4px;border-radius:50%;background:var(--color-border-strong);flex-shrink:0;margin-top:6px;}
/* Month cards */
.month-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:var(--space-2);margin-bottom:18px;}
.month-card{border:1px solid var(--color-border-default);border-radius:var(--radius-lg);padding:14px 16px;background:var(--color-surface-raised);cursor:pointer;transition:border-color var(--transition-base),box-shadow var(--transition-base);position:relative;}
.month-card:hover{border-color:var(--color-action-subtle);box-shadow:0 0 0 3px var(--color-action-wash);}
.month-card.mc-done{border-left:3px solid var(--color-success-text);background:var(--color-success-surface);}
.month-card.mc-active{border-left:3px solid var(--color-brand);background:var(--color-brand-wash);}
.month-card.mc-warn{border-left:3px solid var(--color-warning-text);background:var(--color-warning-surface);}
.month-card.mc-todo{border-left:3px solid var(--color-border-strong);}
.mc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.mc-month{font-size:14px;font-weight:700;color:var(--color-text-primary);letter-spacing:-0.01em;}
.mc-status{font-size:10px;font-weight:600;padding:2px 8px;border-radius:var(--radius-full);}
.mc-s-done{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);}
.mc-s-active{background:var(--color-brand-wash);color:var(--color-brand);border:1px solid var(--color-brand-subtle);}
.mc-s-warn{background:var(--color-warning-surface);color:var(--color-warning-text);border:1px solid var(--color-warning-border);}
.mc-s-pend{background:var(--color-surface-sunken);color:var(--color-text-disabled);border:1px solid var(--color-border-default);}
.mc-prog-wrap{background:var(--color-border-default);border-radius:var(--radius-full);height:3px;margin-bottom:10px;overflow:hidden;}
.mc-prog-bar{height:3px;border-radius:var(--radius-full);}
.mc-prog-bar.grn{background:var(--color-success-text);}
.mc-prog-bar.tc{background:var(--color-brand);}
.mc-prog-bar.amb{background:var(--color-warning-text);}
.mc-stats{display:flex;gap:10px;}
.mc-stat{flex:1;}
.mc-stat-n{font-size:15px;font-weight:700;font-family:var(--font-mono);color:var(--color-text-primary);letter-spacing:-0.02em;}
.mc-stat-n.grn{color:var(--color-success-text);}
.mc-stat-n.red{color:var(--color-danger-text);}
.mc-stat-n.amb{color:var(--color-warning-text);}
.mc-stat-l{font-size:10px;color:var(--color-text-tertiary);margin-top:1px;font-weight:300;}
.mc-var-flag{margin-top:8px;padding:4px 8px;border-radius:var(--radius-sm);font-size:10px;font-weight:600;display:flex;align-items:center;gap:5px;}
.mc-var-flag.has-var{background:var(--color-warning-surface);color:var(--color-warning-text);}
.mc-var-flag.no-var{background:var(--color-success-surface);color:var(--color-success-text);}
.mc-flag-flag{margin-top:4px;padding:4px 8px;border-radius:var(--radius-sm);font-size:10px;font-weight:600;background:var(--color-danger-surface);color:var(--color-danger-text);display:flex;align-items:center;gap:5px;}
/* Progress bars */
.coa-prog-wrap{background:var(--color-border-default);border-radius:var(--radius-full);height:6px;margin:6px 0 4px;overflow:hidden;}
.coa-prog-bar{height:6px;border-radius:var(--radius-full);transition:width .4s;}
.coa-prog-bar.tc{background:var(--color-brand);}
.coa-prog-bar.grn{background:var(--color-success-text);}
/* Workspace groups */
.coa-sec{border:1px solid var(--color-border-default);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden;}
.coa-sec-hdr{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:var(--color-surface-sunken);}
.coa-sec-hdr.grn-l{border-left:3px solid var(--color-success-text);}
.coa-sec-hdr.amb-l{border-left:3px solid var(--color-warning-text);}
.coa-sec-hdr:hover{background:var(--color-border-subtle);}
.coa-sec-title{font-size:13px;font-weight:600;color:var(--color-text-primary);display:flex;align-items:center;gap:8px;}
.coa-sec-desc{font-size:12px;color:var(--color-text-tertiary);margin-top:3px;font-weight:300;}
.coa-badge{font-size:10px;font-weight:600;padding:2px 9px;border-radius:var(--radius-full);white-space:nowrap;}
.coa-badge.auto{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);}
.coa-badge.action{background:var(--color-warning-surface);color:var(--color-warning-text);border:1px solid var(--color-warning-border);}
/* Workspace transaction rows */
.txn-row{padding:10px 14px;border-top:1px solid var(--color-border-subtle);display:flex;align-items:center;gap:10px;}
.txn-row.confirmed{background:var(--color-success-surface);}
.txn-row.flagged{background:var(--color-warning-surface);}
.exc-btn-confirm{background:var(--color-surface-raised);border:1px solid var(--color-border-strong);color:var(--color-text-primary);font-size:11px;padding:4px 10px;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-sans);font-weight:600;}
.exc-btn-override{background:var(--color-surface-raised);border:1px solid var(--color-border-default);color:var(--color-text-tertiary);font-size:11px;padding:4px 10px;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-sans);}
.bulk-banner{background:var(--color-brand-wash);border-left:3px solid var(--color-brand);border-radius:0 var(--radius-md) var(--radius-md) 0;padding:12px 14px;margin:2px 0;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;}
.bulk-text{font-size:12px;color:var(--color-text-secondary);font-weight:300;}
.bulk-text strong{font-weight:600;color:var(--color-text-primary);display:block;margin-bottom:2px;}
.bulk-actions{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.exc-btn-apply{background:var(--color-action);color:var(--color-text-inverse);border:none;border-radius:var(--radius-sm);padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-sans);white-space:nowrap;}
.exc-btn-indiv{background:none;border:none;color:var(--color-action);font-size:12px;cursor:pointer;font-family:var(--font-sans);font-weight:500;white-space:nowrap;}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding-top:48px;overflow-y:auto;}
.modal-box{background:var(--color-surface-raised);border-radius:var(--radius-xl);width:100%;max-width:760px;box-shadow:0 20px 60px rgba(0,0,0,.25);margin:0 var(--space-4) var(--space-8);}
.modal-hdr{padding:20px 24px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.modal-title{font-size:18px;font-weight:700;color:var(--color-text-primary);letter-spacing:-0.01em;}
.modal-close{background:none;border:none;font-size:18px;color:var(--color-text-tertiary);cursor:pointer;padding:0;line-height:1;flex-shrink:0;margin-top:2px;}
.modal-body{padding:16px 24px 24px;}
/* Sample-review tabs */
.gl-queue-tabs{display:flex;gap:0;border-bottom:2px solid var(--color-border-default);margin-bottom:16px;overflow-x:auto;}
.gl-tab{padding:8px 14px;font-size:12px;font-weight:500;color:var(--color-text-tertiary);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font-sans);}
.gl-tab.active{color:var(--color-brand);border-bottom-color:var(--color-brand);font-weight:700;}
.gl-tab .tab-cnt{font-size:11px;color:var(--color-warning-text);font-weight:600;margin-left:4px;}
.gl-tab .tab-done{font-size:11px;color:var(--color-success-text);font-weight:600;margin-left:4px;}
/* Sample review side-by-side */
.side-by-side{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.sbs-pane{border:1px solid var(--color-border-default);border-radius:var(--radius-md);padding:12px 14px;background:var(--color-surface-sunken);}
.sbs-lbl{font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.sbs-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid var(--color-border-subtle);}
.sbs-row:last-child{border-bottom:none;}
.sbs-row .k{color:var(--color-text-tertiary);font-weight:400;}
.sbs-row .v{color:var(--color-text-primary);font-weight:500;font-family:var(--font-mono);}
/* TB review */
.tb-tabs{display:flex;border-bottom:2px solid var(--color-border-default);margin-bottom:18px;}
.tb-tab{padding:8px 16px;font-size:13px;font-weight:500;color:var(--color-text-tertiary);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font-sans);display:flex;align-items:center;gap:6px;}
.tb-tab.active{color:var(--color-brand);border-bottom-color:var(--color-brand);font-weight:700;}
.tb-tab .tab-var{font-size:11px;padding:1px 6px;border-radius:var(--radius-full);}
.tb-tab .tab-var.has{background:var(--color-warning-surface);color:var(--color-warning-text);border:1px solid var(--color-warning-border);}
.tb-tab .tab-var.clean{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);}
.tb3-cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:14px;}
.tb3-card{border-radius:var(--radius-md);padding:14px 16px;border:1px solid var(--color-border-default);background:var(--color-surface-sunken);}
.tb3-card.grn{background:var(--color-success-surface);border-color:var(--color-success-border);}
.tb3-num{font-family:var(--font-mono);font-size:18px;font-weight:600;color:var(--color-text-primary);letter-spacing:-0.02em;}
.tb3-num.grn{color:var(--color-success-text);}
.tb3-lbl{font-size:11px;color:var(--color-text-secondary);margin-top:2px;font-weight:300;}
.tb3-table{width:100%;border-collapse:collapse;font-size:12px;}
.tb3-table th{text-align:left;font-size:10px;font-weight:600;color:var(--color-text-tertiary);letter-spacing:.07em;text-transform:uppercase;padding:7px 10px;border-bottom:1px solid var(--color-border-default);background:var(--color-surface-sunken);}
.tb3-table td{padding:10px;border-bottom:1px solid var(--color-border-subtle);color:var(--color-text-secondary);font-weight:300;vertical-align:middle;}
.tb3-table tr:last-child td{border-bottom:none;}
.tb3-table .acct{font-size:12px;font-weight:500;color:var(--color-text-primary);}
.tb3-table .mono{font-family:var(--font-mono);font-size:12px;}
.var-pos{color:var(--color-success-text);font-weight:600;font-family:var(--font-mono);}
.var-neg{color:var(--color-danger-text);font-weight:600;font-family:var(--font-mono);}
.var-zero{color:var(--color-text-tertiary);font-family:var(--font-mono);}
.var-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:var(--radius-full);white-space:nowrap;display:inline-block;}
.vb-exp{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);}
.vb-rec{background:var(--color-action-wash);color:var(--color-action);border:1px solid var(--color-action-subtle);}
.vb-inv{background:var(--color-warning-surface);color:var(--color-warning-text);border:1px solid var(--color-warning-border);}
.vb-cash{background:var(--color-brand-wash);color:var(--color-brand);border:1px solid var(--color-brand-subtle);}
.tb3-row-warn{border-left:3px solid var(--color-warning-text);}
.tb3-row-rec{border-left:3px solid var(--color-action);}
.tb3-row-cash{border-left:3px solid var(--color-brand);}
.tb3-row-exp{border-left:3px solid var(--color-success-text);}
.twrap{border:1px solid var(--color-border-default);border-radius:var(--radius-md);overflow:hidden;margin-bottom:14px;}
/* Variance cards */
.var-card{border-radius:var(--radius-lg);border:1px solid var(--color-border-default);overflow:hidden;margin-bottom:12px;}
.var-card.exp{border-left:3px solid var(--color-success-text);}
.var-card.rec{border-left:3px solid var(--color-action);}
.var-card.inv{border-left:3px solid var(--color-warning-text);}
.var-card.cash{border-left:3px solid var(--color-brand);}
.var-card-hdr{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.var-card-hdr .title{font-size:14px;font-weight:700;color:var(--color-text-primary);}
.var-card-hdr .nums{font-size:12px;color:var(--color-text-secondary);font-weight:300;margin-top:2px;}
.var-card-hdr .nums .v{font-weight:600;}
.var-card-hdr .nums .vpos{color:var(--color-success-text);}
.var-card-hdr .nums .vneg{color:var(--color-danger-text);}
.sys-exp-box{background:var(--color-action-wash);border-radius:var(--radius-md);padding:12px 14px;margin:0 16px 12px;}
.sys-exp-lbl{font-size:10px;font-weight:700;color:var(--color-action);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.sys-exp-text{font-size:12px;color:var(--color-text-secondary);line-height:1.6;font-weight:300;}
.ia-note-box{background:var(--color-warning-surface);border-radius:var(--radius-md);padding:12px 14px;margin:0 16px 12px;}
.ia-note-lbl{font-size:10px;font-weight:700;color:var(--color-warning-text);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.ia-note-text{font-size:12px;color:var(--color-text-secondary);line-height:1.6;font-weight:300;}
.ia-note-attr{font-size:11px;color:var(--color-text-tertiary);margin-top:6px;font-style:italic;}
.var-card-footer{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--color-border-subtle);gap:10px;flex-wrap:wrap;}
.var-auto-accepted{font-size:12px;color:var(--color-text-tertiary);font-weight:300;}
.btn-accept-reason{background:var(--color-action);color:var(--color-text-inverse);border:none;border-radius:var(--radius-sm);padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-sans);}
.btn-request-inv{background:var(--color-surface-raised);border:1px solid var(--color-border-default);color:var(--color-text-secondary);border-radius:var(--radius-sm);padding:7px 14px;font-size:12px;cursor:pointer;font-family:var(--font-sans);}
/* Reason capture inline form */
.reason-form{margin:0 16px 12px;border:1px solid var(--color-border-default);border-radius:var(--radius-md);padding:14px;background:var(--color-surface-sunken);}
.reason-form-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.reason-form-hdr .l{font-size:12px;font-weight:600;color:var(--color-text-primary);}
.reason-form-hdr .r{font-size:11px;color:var(--color-text-tertiary);font-weight:400;}
.reason-opt{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:var(--radius-md);background:var(--color-surface-raised);border:1px solid var(--color-border-default);cursor:pointer;margin-bottom:6px;transition:border-color var(--transition-base);}
.reason-opt:hover{border-color:var(--color-action-subtle);}
.reason-opt.sel{border-color:var(--color-action);background:var(--color-action-wash);}
.reason-opt input{margin-top:3px;flex-shrink:0;cursor:pointer;}
.reason-opt span{font-size:12px;color:var(--color-text-primary);line-height:1.5;}
.reason-textarea{width:100%;min-height:64px;padding:10px 12px;font-size:12px;line-height:1.5;border:1px solid var(--color-border-default);border-radius:var(--radius-md);background:var(--color-surface-raised);color:var(--color-text-primary);font-family:var(--font-sans);resize:vertical;margin-top:6px;}
.reason-footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:10px;border-top:1px solid var(--color-border-default);}
.reason-footer .note{font-size:11px;color:var(--color-text-tertiary);line-height:1.5;}
.btn-reason-confirm{background:var(--color-action);color:var(--color-text-inverse);border:none;border-radius:var(--radius-sm);padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-sans);}
.btn-reason-confirm:disabled{opacity:.4;cursor:default;}
/* Audit trail entry preview */
.audit-entry{background:var(--color-surface-sunken);border-radius:var(--radius-md);padding:10px 12px;margin:0 16px 12px;}
.audit-lbl{font-size:11px;font-weight:600;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.audit-text{font-size:12px;color:var(--color-text-primary);line-height:1.6;}
.audit-attr{font-size:11px;color:var(--color-text-tertiary);margin-top:6px;}
/* Sign-off */
.so5-summary{border:1px solid var(--color-border-default);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:16px;}
.so5-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--color-border-subtle);gap:12px;}
.so5-row:last-child{border-bottom:none;}
.so5-label{flex:0 0 130px;font-size:13px;font-weight:500;color:var(--color-text-primary);}
.so5-reviewed{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);font-size:11px;font-weight:600;padding:2px 9px;border-radius:var(--radius-full);flex-shrink:0;}
.so5-detail{font-size:12px;color:var(--color-text-tertiary);font-weight:300;flex:1;}
.fin-pos-row{border-left:3px solid var(--color-brand-subtle);background:var(--color-brand-wash);border-radius:0 var(--radius-md) var(--radius-md) 0;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.fin-pos-lbl{font-size:12px;color:var(--color-text-secondary);font-weight:300;}
.fin-pos-date{font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--color-brand);}
.formal-box{border:2px solid var(--color-text-primary);border-radius:var(--radius-lg);padding:20px;text-align:center;margin-bottom:14px;}
.formal-box-lbl{font-size:10px;font-weight:600;color:var(--color-text-tertiary);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;border-bottom:1px solid var(--color-border-default);padding-bottom:10px;}
.formal-text{font-size:13px;color:var(--color-text-primary);line-height:1.7;margin-bottom:16px;}
.formal-text .mono{font-family:var(--font-mono);background:var(--color-surface-sunken);padding:1px 4px;border-radius:3px;}
.formal-sig{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--color-border-default);}
.formal-sig-name{font-size:12px;color:var(--color-text-secondary);font-weight:300;text-align:left;}
.btn-sign-seal{background:var(--color-action);color:var(--color-text-inverse);border:none;border-radius:var(--radius-md);padding:10px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font-sans);display:inline-flex;align-items:center;gap:8px;}
.btn-sign-seal:disabled{opacity:.4;cursor:default;}
.shdr{display:flex;align-items:center;gap:8px;margin-bottom:8px;margin-top:4px;}
.shdr h2{font-size:12px;font-weight:600;color:var(--color-text-secondary);}
.stag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:var(--radius-sm);}
.t-info{background:var(--color-surface-sunken);color:var(--color-text-tertiary);}
.t-dec{background:var(--color-warning-surface);color:var(--color-warning-text);border:1px solid var(--color-warning-border);}
.proto-note{font-size:11px;color:var(--color-text-tertiary);font-weight:300;margin-top:8px;}
/* Dispute pattern */
.disp-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid var(--color-border-subtle);}
.disp-row:last-child{border-bottom:none;}
.disp-name{font-weight:500;color:var(--color-text-primary);font-size:13px;}
.disp-reason{font-size:11px;color:var(--color-text-tertiary);margin-top:2px;}
.disp-amt{font-family:var(--font-mono);font-weight:500;color:var(--color-text-primary);}
/* Flag IA flow */
.flag-form{margin-top:8px;border:1px solid var(--color-warning-border);border-radius:var(--radius-md);padding:12px;background:var(--color-warning-surface);}
.flag-form .l{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.flag-form .lbl{font-size:12px;font-weight:600;color:var(--color-warning-text);display:flex;align-items:center;gap:6px;}
.flag-form .hint{font-size:11px;color:var(--color-text-tertiary);}
.flag-textarea{width:100%;min-height:64px;padding:10px 12px;font-size:12px;line-height:1.5;border:1px solid var(--color-border-default);border-radius:var(--radius-sm);background:var(--color-surface-raised);color:var(--color-text-primary);font-family:var(--font-sans);resize:vertical;}
.flag-info-box{background:var(--color-surface-raised);border-radius:var(--radius-sm);padding:8px 10px;margin-top:8px;font-size:11px;color:var(--color-text-secondary);line-height:1.55;}
.flag-info-box strong{font-weight:600;color:var(--color-text-primary);}
.flag-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:10px;}
.btn-flag-confirm{background:var(--color-warning-text);color:var(--color-text-inverse);border:none;border-radius:var(--radius-sm);padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-sans);}
.btn-flag-confirm:disabled{opacity:.4;cursor:default;}
.btn-flag-cancel{background:none;border:1px solid var(--color-border-default);color:var(--color-text-secondary);font-size:12px;padding:6px 14px;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-sans);}
/* Resolved flag */
.flag-resolved{margin-top:10px;border:1px solid var(--color-warning-border);border-left:3px solid var(--color-warning-text);border-radius:0 var(--radius-md) var(--radius-md) 0;padding:12px 14px;background:var(--color-surface-raised);}
.flag-orig{background:var(--color-surface-sunken);border-radius:var(--radius-sm);padding:10px;margin-bottom:8px;}
.flag-orig-lbl,.flag-res-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.flag-orig-lbl{color:var(--color-text-secondary);}
.flag-res-lbl{color:var(--color-warning-text);}
.flag-orig-text,.flag-res-text{font-size:12px;color:var(--color-text-primary);line-height:1.55;}
.flag-res{background:var(--color-warning-surface);border-radius:var(--radius-sm);padding:10px;margin-bottom:8px;}
.flag-res-attr{font-size:11px;color:var(--color-text-tertiary);margin-top:4px;font-weight:400;}
.flag-resolution-actions{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--color-border-subtle);}
/* TB right-rail panel inside workspace */
.tb-rail{width:240px;flex-shrink:0;border-left:1px solid var(--color-border-default);padding:14px;}
.tb-rail-lbl{font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;}
.tb-rail-row{padding:6px 9px;display:flex;justify-content:space-between;border-radius:var(--radius-sm);margin-bottom:4px;}
.tb-rail-row.legacy{background:var(--color-success-surface);}
.tb-rail-row.klay{background:var(--color-surface-sunken);}
.tb-rail-row.var{background:var(--color-warning-surface);border-left:3px solid var(--color-warning-text);border-radius:0 var(--radius-sm) var(--radius-sm) 0;}
.tb-rail-row .l{font-size:11px;color:var(--color-text-tertiary);}
.tb-rail-row .v{font-size:11px;font-family:var(--font-mono);font-weight:600;}

   ═══════════════════════════════════════ */
function renderSubstepBar() {
  var steps = [
    {lbl:'GL re-validation', meta:''},
    {lbl:'TB upload',        meta:''},
    {lbl:'GL mapping',       meta:''}, /* meta filled below with months progress */
    {lbl:'Sample review',    meta:''},
    {lbl:'TB · BS · P&L review', meta:''},
    {lbl:'Sign-off',         meta:''}
  ];

  /* Inject GL mapping progress as meta */
  var monthsDone = S3.months.filter(function(m){return m.status==='done';}).length;
  steps[2].meta = monthsDone + ' / 12 months';

  var html = steps.map(function(s, i) {
    var state, cls;
    if (i < S3.step) { state = 'done'; cls = 'done'; }
    else if (i === S3.step) { state = 'on'; cls = 'on'; }
    else { state = 'locked'; cls = 'locked'; }
    var clickable = i <= S3.step ? ('onclick="goStep(' + i + ')"') : '';
    var icon = i < S3.step ? '&#10003;' : (i + 1);
    var meta = (s.meta && i === S3.step) ? '<span class="ss-meta">· ' + s.meta + '</span>' : '';
    return '<div class="ssi ' + cls + '" ' + clickable + '>'
      + '<span class="ssc ' + cls + '">' + icon + '</span>'
      + '<span class="ssl ' + cls + '">' + s.lbl + '</span>'
      + meta
      + '</div>';
  }).join('');

  document.getElementById('substepbar').innerHTML = html;
}

function goStep(i) {
  if (i > S3.step) S3.step = Math.max(S3.step, i);
  S3.step = i;
  renderSubstepBar();
  if (i === 0) renderRevalidation();
  else if (i === 1) renderTBUpload();
  else if (i === 2) {
    /* GL mapping — drop straight into the workspace for the active month.
       The month rail IS the overview. No separate overview screen.
    */
    var activeIdx = S3.ws.activeMonth != null ? S3.ws.activeMonth : 3; /* default April */
    /* If the chosen month is "todo" and has scenario:'cutoff-warn', fall back to next workable */
    renderMonthWorkspace(activeIdx);
  }
  else if (i === 3) renderSampleReview();
  else if (i === 4) renderTBReview();
  else if (i === 5) renderSignOff();
}

    var statusHtml = '';
    if (m.status === 'done') statusHtml = '<span class="mc-status mc-s-done">&#10003; Done</span>';
    else if (m.status === 'active') statusHtml = '<span class="mc-status mc-s-active">In progress</span>';
    else if (m.status === 'warn') statusHtml = '<span class="mc-status mc-s-warn">' + m.review + ' remaining</span>';
    else statusHtml = '<span class="mc-status mc-s-pend">Not started</span>';

    var progCls = m.status === 'done' ? 'grn' : m.status === 'todo' ? 'tc' : 'amb';
    var mappedCls = m.status === 'done' ? 'grn' : '';
    var reviewCls = m.review > 0 ? 'red' : '';

    /* TB variance flag — clicking goes to TB view, not workspace */
    var varHtml = '';
    if (m.status !== 'todo') {
      if (m.varDetected) {
        /* TB variance card click bypasses workspace per PRD */
        varHtml = '<div class="mc-var-flag has-var" onclick="event.stopPropagation();openMonthTB(' + i + ')" style="cursor:pointer">&#9651; TB variance &middot; click to investigate</div>';
      } else {
        varHtml = '<div class="mc-var-flag no-var">&#10003; No variance</div>';
      }
    }
    var flagHtml = (m.flagsOpen && m.flagsOpen > 0) ? '<div class="mc-flag-flag">&#128681; ' + m.flagsOpen + ' flag awaiting IA</div>' : '';

    return '<div class="' + cardCls + '" onclick="openMonthWorkspace(' + i + ')">'
      + '<div class="mc-header"><span class="mc-month">' + m.m + '</span>' + statusHtml + '</div>'
      + '<div class="mc-prog-wrap"><div class="mc-prog-bar ' + progCls + '" style="width:' + m.pct + '%"></div></div>'
      + '<div class="mc-stats">'
      +   '<div class="mc-stat"><div class="mc-stat-n ' + mappedCls + '">' + m.mapped.toLocaleString() + '</div><div class="mc-stat-l">mapped</div></div>'
      +   '<div class="mc-stat"><div class="mc-stat-n">' + m.txn.toLocaleString() + '</div><div class="mc-stat-l">total</div></div>'
      +   '<div class="mc-stat"><div class="mc-stat-n ' + reviewCls + '">' + (m.review > 0 ? m.review : '—') + '</div><div class="mc-stat-l">to review</div></div>'
      + '</div>'
      + varHtml + flagHtml
      + '</div>';
  }).join('');

  document.getElementById('main').innerHTML =
    '<div class="srow"><span class="badge b-proc">In progress</span><span class="bmeta">Stage 3 · Transaction data · Step 3 of 6 · GL mapping</span></div>'
    + '<h1>GL transaction mapping</h1>'
    + '<p class="desc">Your GL covers ' + totalTxn.toLocaleString() + ' transactions across 12 months. Work month by month — the AI has pre-mapped the majority. Click any month to open its workspace. Months are independently gated; a TB variance in one month does not block work on others.</p>'

    +   '<span style="font-size:12px;color:var(--color-text-tertiary);font-weight:300">' + totalMapped.toLocaleString() + ' of ' + totalTxn.toLocaleString() + ' transactions mapped</span>'

    + '<div class="coa-prog-wrap" style="margin-bottom:18px"><div class="coa-prog-bar tc" style="width:' + pctDone + '%"></div></div>'

    +     totalReview + ' transactions across all months need your review' + (totalFlags > 0 ? ' &middot; <span style="color:var(--color-danger-text);font-weight:500">' + totalFlags + ' flag(s) awaiting IA</span>' : '')
    +   '</div>'
    +   '<button class="btn-cont" onclick="openMonthWorkspace(3)">Continue with April &#8250;</button>'
    + '</div>'

    + '<div style="margin-top:14px;padding:10px 14px;background:var(--color-surface-sunken);border-radius:var(--radius-md);font-size:11px;color:var(--color-text-tertiary);font-weight:300;line-height:1.5"><strong style="color:var(--color-text-secondary);font-weight:600">Sign-off gate:</strong> all 12 months must reach Done status (no open flags, TB balanced) before sample review unlocks.</div>';

function openMonthWorkspace(idx) {
  S3.ws.activeMonth = idx;
  if (S3.months[idx].status === 'todo' && idx > 5) {
    /* prototype: only April allowed open for demo; September etc. are placeholder */
  }
  renderMonthWorkspace(idx);
}

function openMonthTB(idx) {
  /* PRD: TB variance card click opens TB view, not mapping */
  alert('TB variance investigation for ' + S3.months[idx].m + ' would open here.\n\n(In production: opens the right-rail TB panel expanded, with the variance highlighted and a "drill into account" link.)\n\nClicking the rest of the card opens the workspace.');
  openMonthWorkspace(idx);
}

  return groups;
}

function renderMonthWorkspace(monthIdx) {
  var mo = S3.months[monthIdx];
  S3.ws.activeMonth = monthIdx;

  var totalMapped = S3.months.reduce(function(s,m){return s+m.mapped;},0);
  var totalTxn = S3.months.reduce(function(s,m){return s+m.txn;},0);
  var pct = Math.round(totalMapped/totalTxn*100);

  /* Build the month rail HTML — mini cards by status */
  var monthRailHtml = '<div class="ws-month-rail-lbl">Months · 12</div>'
    + S3.months.map(function(m, i) {
        var isActive = i === monthIdx;
        var cardCls = 'mini-mc';
        var nameCls = '';
        var pillHtml = '';
        var progHtml = '';
        var metaHtml = '';
        var flagsHtml = '';
        var notClosedHtml = '';

        if (isActive) cardCls += ' active';

        if (m.status === 'done') {
          cardCls += ' done';
          nameCls = ' done-clr';
          pillHtml = '<span class="mini-mc-pill done">&#10003;</span>';
          progHtml = '<div class="mini-mc-prog"><div class="mini-mc-prog-fill done" style="width:100%"></div></div>';
          metaHtml = '<div class="mini-mc-meta done-clr">' + m.mapped.toLocaleString() + ' mapped</div>';
        } else if (m.status === 'active') {
          cardCls += ' active-mc';
          nameCls = ' active-clr';
          pillHtml = '<span class="mini-mc-pill active">In progress</span>';
          progHtml = '<div class="mini-mc-prog"><div class="mini-mc-prog-fill active" style="width:' + m.pct + '%"></div></div>';
          metaHtml = '<div class="mini-mc-meta active-clr">' + m.mapped.toLocaleString() + ' / ' + m.txn.toLocaleString() + ' · ' + m.review + ' to review</div>';
        } else if (m.status === 'warn') {
          cardCls += ' warn';
          pillHtml = '<span class="mini-mc-pill warn">' + m.review + ' left</span>';
          progHtml = '<div class="mini-mc-prog"><div class="mini-mc-prog-fill warn" style="width:' + m.pct + '%"></div></div>';
          metaHtml = '<div class="mini-mc-meta">' + m.mapped.toLocaleString() + ' / ' + m.txn.toLocaleString() + '</div>';
        } else if (m.scenario === 'cutoff-warn') {
          cardCls += ' notclosed';
          nameCls = ' todo-clr';
          pillHtml = '<span class="mini-mc-pill todo" style="color:var(--color-warning-text)">&#9651;</span>';
          notClosedHtml = '<div class="mini-mc-notclosed">Not yet closed</div>';
        } else {
          cardCls += ' todo';
          nameCls = ' todo-clr';
          pillHtml = '<span class="mini-mc-pill todo">' + m.txn.toLocaleString() + '</span>';
        }

        /* Variance and flag indicators */
        var flagBadges = [];
        if (m.varDetected || (m.varAcct && m.status !== 'todo')) flagBadges.push('<span class="mini-mc-flag var">&#9651; TB var</span>');
        if (m.flagsOpen && m.flagsOpen > 0) flagBadges.push('<span class="mini-mc-flag flag">&#128681; ' + m.flagsOpen + ' flag' + (m.flagsOpen > 1 ? 's' : '') + '</span>');
        if (flagBadges.length > 0) flagsHtml = '<div class="mini-mc-flags">' + flagBadges.join('') + '</div>';

        return '<div class="' + cardCls + '" onclick="openMonthWorkspace(' + i + ')">'
          + '<div class="mini-mc-row"><span class="mini-mc-name' + nameCls + '">' + m.m + '</span>' + pillHtml + '</div>'
          + progHtml
          + metaHtml
          + flagsHtml
          + notClosedHtml
          + '</div>';
      }).join('')
    + '<div class="ws-month-rail-overall">'
    +   '<div class="ws-month-rail-overall-lbl">Overall</div>'
    +   '<div class="ws-month-rail-overall-bar"><div class="ws-month-rail-overall-fill" style="width:' + pct + '%"></div></div>'
    +   '<div class="ws-month-rail-overall-meta"><span>' + pct + '% mapped</span><span>' + totalMapped.toLocaleString() + ' / ' + totalTxn.toLocaleString() + '</span></div>'
    + '</div>';

  /* Filter bar */
  var filt = S3.ws.activeFilter;
  var srt = S3.ws.activeSort;
  var filterBar = '<div style="display:flex;gap:6px;align-items:center;margin-bottom:10px;flex-wrap:wrap">'
    + '<span style="font-size:11px;color:var(--color-text-tertiary);font-weight:300">Show:</span>'
    + '<button class="' + (filt === 'review' ? 'btn-confirm' : 'btn-ghost') + '" onclick="wsSetFilter(\'review\')">Needs review (' + mo.review + ')</button>'
    + '<button class="' + (filt === 'all' ? 'btn-confirm' : 'btn-ghost') + '" onclick="wsSetFilter(\'all\')">All</button>'
    + '<button class="' + (filt === 'auto' ? 'btn-confirm' : 'btn-ghost') + '" onclick="wsSetFilter(\'auto\')">Auto-mapped</button>'
    + '<span style="font-size:11px;color:var(--color-text-tertiary);font-weight:300;margin-left:6px">Sort:</span>'
    + '<button class="' + (srt === 'amount' ? 'btn-confirm' : 'btn-ghost') + '" onclick="wsSetSort(\'amount\')">Amount &#8595;</button>'
    + '<button class="' + (srt === 'vendor' ? 'btn-confirm' : 'btn-ghost') + '" onclick="wsSetSort(\'vendor\')">Vendor</button>'
    + '</div>';

  /* Batch banner — appears after the high-confidence vendor pattern txn is confirmed in April */
  var batchHtml = '';
  var batchTriggerKey = '3-0-0'; /* April · COGS · first txn (PT Sumber Makmur, 143 similar) */
  if (monthIdx === 3 && S3.ws.txnStates[batchTriggerKey] === 'confirmed') {
    batchHtml = '<div class="bulk-banner">'
      + '<div class="bulk-text"><strong>PT Sumber Makmur — 143 similar transactions detected</strong>Confirmed INV-2025-0234 → 5110 · Raw Material Purchases. Same vendor pattern across Apr–Dec. Apply to all 143? Total: Rp 287,400,000</div>'
      + '<div class="bulk-actions"><button class="exc-btn-apply" onclick="showBatchModal()">Review &amp; apply to 143 &#8250;</button><button class="exc-btn-indiv">This one only</button></div>'
      + '</div>';
  }

  /* Account groups — driven by per-month scenario */
  var groups = getWorkspaceData(monthIdx);

  /* Special case: month not closed in legacy (December) */
  if (groups.length === 1 && groups[0].notClosed) {
    document.getElementById('main').innerHTML =
      '<div class="ws-shell">'
      +   '<div class="ws-month-rail">' + monthRailHtml + '</div>'
      +   '<div class="ws-center" style="flex:1">'
      +     '<div class="srow"><span class="badge b-not">Not started</span><span class="bmeta">Stage 3 · Transaction data · GL mapping · ' + mo.m + '</span></div>'
      +     '<h1 style="margin-bottom:4px">' + mo.m + ' 2025</h1>'
      +     '<div style="font-size:12px;color:var(--color-text-tertiary);font-weight:300;margin-bottom:14px">Estimated 1,798 transactions when closed</div>'
      +     '<div class="bcard sft">'
      +       '<h3>Month not yet closed in legacy system</h3>'
      +       '<p>December postings are not finalised. Year-end accruals (depreciation true-ups, bonus provisions, FX revaluation) typically post on 31 Dec. Wait for legacy close before mapping this month.</p>'
      +       '<p style="font-style:italic;font-size:11px;color:var(--color-text-tertiary);margin-top:8px">Your IA will notify you when ready. Click another month in the rail to continue.</p>'
      +     '</div>'
      +   '</div>'
      + '</div>';
    return;
  }

  var groupsHtml = groups.map(function(grp, gi) {
    var isExp = S3.ws.expandedGroup === gi;
    var reviewBadge;
    if (grp.orphan) {
      reviewBadge = '<span class="coa-badge action" style="background:var(--color-danger-surface);color:var(--color-danger-text);border-color:var(--color-danger-border)">' + grp.toReview + ' orphaned · IA action required</span>';
    } else if (grp.toReview > 0) {
      reviewBadge = '<span class="coa-badge action">' + grp.toReview + ' to review</span>';
    } else {
      reviewBadge = '<span class="coa-badge auto">All mapped</span>';
    }

    var leftBorder = grp.orphan ? 'red-l' : (grp.toReview > 0 ? 'amb-l' : 'grn-l');
    var orphanLeftStyle = grp.orphan ? ';border-left:3px solid var(--color-danger-text)' : '';

    var txnRows = '';
    if (isExp) {
      /* Auto-confirmed batch row — collapsed by default */
      if (grp.autoBatch) {
        var batchKey = monthIdx + '-' + gi + '-batch';
        var batchExpanded = S3.ws.expandedAutoBatch[batchKey];
        txnRows += '<div style="padding:10px 14px;border-top:1px solid var(--color-border-subtle);background:var(--color-success-surface);display:flex;align-items:center;justify-content:space-between;gap:10px">'
          + '<div style="flex:1;min-width:0">'
          +   '<div style="font-size:13px;font-weight:500;color:var(--color-success-text)"><span style="font-weight:700">&#10003;</span> ' + grp.autoBatch.count + ' transactions auto-applied — ' + grp.autoBatch.vendor + ' &rarr; ' + grp.autoBatch.account + '</div>'
          +   '<div style="font-size:11px;color:var(--color-success-text);opacity:.85;margin-top:2px">Total: ' + grp.autoBatch.amount + ' &middot; pattern matched from confirmation in earlier month</div>'
          + '</div>'
          + '<button class="btn-ghost" onclick="wsToggleBatch(\'' + batchKey + '\')" style="font-size:11px;flex-shrink:0">' + (batchExpanded ? 'Hide rows' : 'Show all ' + grp.autoBatch.count) + '</button>'
          + '</div>';
        if (batchExpanded) {
          /* Generate placeholder rows for the batch — show first 8 + count */
          var sampleBatch = '';
          for (var bi = 0; bi < 8; bi++) {
            sampleBatch += '<div style="padding:6px 14px;border-top:1px solid var(--color-border-subtle);background:var(--color-success-surface);opacity:.85;font-size:11px;display:flex;justify-content:space-between">'
              + '<div><span style="font-family:var(--font-mono);color:var(--color-success-text)">INV-2025-' + (200 + bi).toString().padStart(4, '0') + '</span> &middot; ' + grp.autoBatch.vendor + ' &middot; ' + monthShortFromMonth(mo.m) + ' ' + (bi*3+2) + '</div>'
              + '<div style="font-family:var(--font-mono);color:var(--color-success-text);font-weight:600">Rp ' + (200000000 + bi * 12000000).toLocaleString() + '</div>'
              + '</div>';
          }
          txnRows += sampleBatch
            + '<div style="padding:6px 14px;border-top:1px solid var(--color-border-subtle);background:var(--color-success-surface);font-size:11px;color:var(--color-success-text);text-align:center;font-style:italic">…and ' + (grp.autoBatch.count - 8) + ' more matching this pattern</div>';
        }
      }

      /* Auto-mapped notice for groups with no individual rows to review */
      if (grp.txns.length === 0 && grp.autoNote) {
        txnRows += '<div style="padding:10px 14px;border-top:1px solid var(--color-border-subtle);font-size:12px;color:var(--color-text-tertiary);background:var(--color-success-surface);font-weight:300">' + grp.autoNote + '</div>';
      }

      /* Individual transaction rows */
      var visibleTxns = grp.txns;
      if (S3.ws.activeFilter === 'review') {
        /* Already only the to-review rows in our mock data — keep all */
      } else if (S3.ws.activeFilter === 'auto') {
        /* No individual auto-mapped rows seeded — show notice */
        if (grp.autoNote && grp.txns.length > 0) {
          txnRows += '<div style="padding:10px 14px;border-top:1px solid var(--color-border-subtle);font-size:12px;color:var(--color-text-tertiary);background:var(--color-success-surface);font-weight:300">Showing auto-mapped only: ' + (grp.total - grp.txns.length) + ' transactions auto-applied at &ge;80% confidence. Use "All" filter to see review rows alongside.</div>';
        }
        visibleTxns = [];
      }

      if (visibleTxns.length > 0) {
        txnRows += visibleTxns.map(function(txn, ti) {
          var key = monthIdx + '-' + gi + '-' + ti;
          var state = S3.ws.txnStates[key] || 'pending';

          if (state === 'flagged') return renderFlaggedTxnRow(grp, gi, ti, txn, key);
          if (state === 'flagResolved') return renderFlagResolvedRow(grp, gi, ti, txn, key);
          if (state === 'flagForm') return renderFlagFormRow(grp, gi, ti, txn, key);

          return renderStandardTxnRow(grp, gi, ti, txn, state, key);
        }).join('');

        /* Pagination footer when there are more review rows than displayed */
        if (grp.toReview > visibleTxns.length) {
          txnRows += '<div style="padding:10px 14px;border-top:1px solid var(--color-border-subtle);background:var(--color-surface-sunken);text-align:center;font-size:12px;color:var(--color-text-tertiary)">Showing ' + visibleTxns.length + ' of ' + grp.toReview + ' review rows &middot; <button class="btn-ghost" style="font-size:11px;padding:3px 10px" onclick="alert(\'Pagination: in production, loads next 25 rows\')">Show next 25 &#8594;</button></div>';
        } else if (grp.total > grp.toReview && S3.ws.activeFilter === 'review' && grp.toReview > 0) {
          txnRows += '<div style="padding:8px 14px;border-top:1px solid var(--color-border-subtle);background:var(--color-surface-sunken);text-align:center;font-size:11px;color:var(--color-text-tertiary);font-weight:300">' + (grp.total - grp.toReview) + ' additional auto-mapped transactions hidden &middot; switch to "All" filter to view</div>';
        }
      }
    }

    return '<div class="coa-sec" style="margin-bottom:8px' + orphanLeftStyle + '">'
      + '<div class="coa-sec-hdr ' + leftBorder + '" onclick="wsToggleGroup(' + gi + ')">'
      +   '<div><div class="coa-sec-title">' + (isExp ? '&#9660;' : '&#9654;') + ' ' + grp.name + ' &middot; ' + grp.total + ' transactions</div><div class="coa-sec-desc">' + (grp.code || '') + '</div></div>'
      +   reviewBadge
      + '</div>'
      + txnRows
      + '</div>';
  }).join('');

  /* TB right-rail — per-month variance data */
  var tbVarHtml = '';
  if (mo.varDetected || (mo.scenario === 'reclass-var' || mo.scenario === 'cash-restate' || mo.scenario === 'fx-var')) {
    var varDriver = '';
    if (mo.scenario === 'investigable') varDriver = mo.varAcct + ' · Entertainment';
    else if (mo.scenario === 'reclass-var') varDriver = mo.varAcct + ' · Office Supplies (Reclass)';
    else if (mo.scenario === 'cash-restate') varDriver = mo.varAcct + ' · Sales (Cash → Accrual)';
    else if (mo.scenario === 'fx-var') varDriver = mo.varAcct + ' · USD Bank (FX revaluation)';
    tbVarHtml = '<div class="tb-rail-row var"><span class="l" style="font-weight:600;color:var(--color-warning-text)">Variance</span><span class="v">' + (mo.varAmt || '&Delta;') + '</span></div>'
      + '<div style="font-size:10px;color:var(--color-danger-text);margin:4px 0 6px;padding:0 9px">Driven by: ' + varDriver + '</div>'
      + '<button class="btn-ia" style="font-size:10px;padding:2px 8px;width:100%">Go to ' + mo.varAcct + ' in GL &#8599;</button>';
  } else {
    tbVarHtml = '<div class="tb-rail-row bal">&#10003; Balanced for ' + mo.m + '</div>';
  }

  var tbPanel = '<div class="tb-rail">'
    + '<div class="tb-rail-lbl">Trial balance</div>'
    + '<div style="display:flex;gap:4px;margin-bottom:8px">'
    +   '<button class="btn-confirm" style="font-size:10px;padding:2px 7px">' + mo.m + '</button>'
    +   '<button class="btn-ghost" style="font-size:10px;padding:2px 7px">YTD</button>'
    +   '<button class="btn-ghost" style="font-size:10px;padding:2px 7px">Full year</button>'
    + '</div>'
    + '<div style="display:flex;border-bottom:1px solid var(--color-border-default);margin-bottom:8px">'
    +   '<button class="btn-ghost" style="font-size:10px;padding:3px 8px;border:none;border-bottom:2px solid var(--color-brand);border-radius:0;color:var(--color-brand);font-weight:600">TB</button>'
    +   '<button class="btn-ghost" style="font-size:10px;padding:3px 8px;border:none;border-radius:0">BS</button>'
    +   '<button class="btn-ghost" style="font-size:10px;padding:3px 8px;border:none;border-radius:0">P&amp;L</button>'
    + '</div>'
    + '<div class="tb-rail-row legacy"><span class="l">Legacy</span><span class="v">Rp 28.4B</span></div>'
    + '<div class="tb-rail-row klay"><span class="l">Klay</span><span class="v">Rp 28.39B</span></div>'
    + tbVarHtml
    + '<div style="border-top:1px solid var(--color-border-default);padding-top:8px;margin-top:8px">'
    +   '<div style="font-size:10px;color:var(--color-text-tertiary);font-weight:300;margin-bottom:4px">Overall progress</div>'
    +   '<div class="coa-prog-wrap" style="margin-bottom:4px"><div class="coa-prog-bar tc" style="width:' + pct + '%"></div></div>'
    +   '<div style="font-size:10px;color:var(--color-text-tertiary)">' + pct + '% &middot; ' + totalMapped.toLocaleString() + ' / ' + totalTxn.toLocaleString() + '</div>'
    + '</div>'
    + '<div style="border-top:1px solid var(--color-border-default);padding-top:8px;margin-top:8px">'
    +   '<div style="font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Sign-off gate</div>'
    +   '<div style="font-size:11px;color:var(--color-text-tertiary);font-weight:300;line-height:1.5;margin-bottom:6px">All months Done with no open flags. TB must balance.</div>'
    + '</div>'
    + '</div>';

  var prevIdx = monthIdx - 1, nextIdx = monthIdx + 1;

  /* Find next workable month (skip cutoff-warn) */
  var nextWorkableIdx = -1;
  for (var ni = nextIdx; ni < S3.months.length; ni++) {
    if (S3.months[ni].scenario !== 'cutoff-warn') { nextWorkableIdx = ni; break; }
  }

  document.getElementById('main').innerHTML =
    '<div class="ws-shell">'
    +   '<div class="ws-month-rail">' + monthRailHtml + '</div>'

/* Render helpers for transaction rows */
function confTag(conf) {
  if (conf >= 80) return 'High confidence (' + conf + '%)';
  if (conf >= 60) return 'Medium confidence (' + conf + '%)';
  return 'Low confidence (' + conf + '%)';
}

function renderStandardTxnRow(grp, gi, ti, txn, state, key) {
  var confColor = txn.confCls === 'hi' ? 'var(--color-success-text)' : txn.confCls === 'med' ? 'var(--color-warning-text)' : 'var(--color-danger-text)';
  var rowCls = state === 'confirmed' ? ' confirmed' : '';
  var actionHtml;

  /* Orphan rows can't be confirmed by Controller — only IA can resolve via CoA amendment */
  if (grp.orphan) {
    actionHtml = '<span style="font-size:11px;font-weight:600;color:var(--color-danger-text);background:var(--color-danger-surface);padding:3px 9px;border-radius:var(--radius-sm);border:1px solid var(--color-danger-border)">Awaiting IA</span>';
  } else if (state === 'confirmed') {
    actionHtml = '<span style="font-size:11px;font-weight:600;color:var(--color-success-text)">&#10003; Confirmed</span>';
  } else {
    actionHtml = '<button class="exc-btn-confirm" onclick="wsConfirm(' + gi + ',' + ti + ')">Confirm</button>'
      + '<button class="exc-btn-override" style="margin-left:4px">Override</button>'
      + '<button class="btn-ia" onclick="wsStartFlag(' + gi + ',' + ti + ')" style="margin-left:4px;margin-top:0">Flag IA</button>';
  }

  /* Mapping line varies for orphan rows */
  var mappingLine;
  if (grp.orphan) {
    mappingLine = '<div style="font-size:11px;color:var(--color-danger-text);margin-top:3px;font-weight:500">Legacy: <span style="font-family:var(--font-mono)">' + txn.legacyAcct + '</span> &middot; not in your locked CoA</div>';
  } else {
    mappingLine = '<div style="font-size:11px;color:var(--color-text-secondary);margin-top:3px">AI: <span style="font-weight:500">' + txn.suggested + '</span> &middot; <span style="color:var(--color-text-tertiary)">Dim: ' + txn.dim + '</span> &nbsp;<span style="color:' + confColor + ';font-weight:600">' + confTag(txn.conf) + '</span></div>';
  }

  /* Inline IA flag note for pre-flagged txns (reclass / cash-restate / orphan / etc.) */
  var preFlagNote = '';
  if (txn.hasFlag && txn.flagNote && state !== 'flagged' && state !== 'flagResolved' && state !== 'flagForm') {
    var noteColor = txn.flagReason === 'reclass' ? 'var(--color-action)'
      : txn.flagReason === 'cash-restate' ? 'var(--color-brand)'
      : txn.flagReason === 'fx-revaluation' ? 'var(--color-brand)'
      : txn.flagReason === 'orphan' ? 'var(--color-danger-text)'
      : 'var(--color-warning-text)';
    var noteBg = txn.flagReason === 'reclass' ? 'var(--color-action-wash)'
      : txn.flagReason === 'cash-restate' ? 'var(--color-brand-wash)'
      : txn.flagReason === 'fx-revaluation' ? 'var(--color-brand-wash)'
      : txn.flagReason === 'orphan' ? 'var(--color-danger-surface)'
      : 'var(--color-warning-surface)';
    var noteLabel = txn.flagReason === 'reclass' ? 'IA: Reclassification'
      : txn.flagReason === 'cash-restate' ? 'IA: Cash → Accrual restatement'
      : txn.flagReason === 'fx-revaluation' ? 'IA: FX revaluation (not an error)'
      : txn.flagReason === 'orphan' ? 'IA: Orphaned account — CoA amendment needed'
      : txn.flagReason === 'amount-outlier' ? 'IA: Amount outlier — confirm before bulk-apply'
      : txn.flagReason === 'new-vendor' ? 'IA: New vendor — verify before mapping'
      : 'IA flag';
    preFlagNote = '<div style="background:' + noteBg + ';border-radius:var(--radius-sm);padding:6px 10px;margin-top:6px;font-size:11px;line-height:1.5">'
      + '<div style="font-weight:600;color:' + noteColor + ';font-size:10px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px">' + noteLabel + '</div>'
      + '<div style="color:var(--color-text-secondary)">' + txn.flagNote + '</div>'
      + '</div>';
  }

  return '<div class="txn-row' + rowCls + '" style="' + (grp.orphan ? 'background:var(--color-danger-surface);' : '') + '">'
    + '<div style="flex:1;min-width:0">'
    +   '<div style="font-size:12px;font-family:var(--font-mono);color:var(--color-text-tertiary)">' + txn.ref + ' &middot; ' + txn.date + '</div>'
    +   '<div style="font-size:13px;font-weight:500;color:var(--color-text-primary);margin-top:1px">' + txn.vendor + '</div>'
    +   '<div style="font-size:11px;color:var(--color-text-tertiary);margin-top:1px">' + txn.desc + '</div>'
    +   mappingLine
    +   (txn.similar > 0 ? '<div style="font-size:11px;color:var(--color-action);margin-top:2px">' + txn.similar + ' similar transactions from same vendor</div>' : '')
    +   preFlagNote
    + '</div>'
    + '<div style="text-align:right;flex-shrink:0">'
    +   '<div style="font-size:14px;font-weight:700;font-family:var(--font-mono);color:var(--color-text-primary);margin-bottom:6px">' + txn.amount + '</div>'
    +   '<div style="display:flex;gap:4px;justify-content:flex-end;flex-wrap:wrap">' + actionHtml + '</div>'
    + '</div>'
    + '</div>';
}

function wsSetFilter(f) { S3.ws.activeFilter = f; renderMonthWorkspace(S3.ws.activeMonth); }
function wsSetSort(s) { S3.ws.activeSort = s; renderMonthWorkspace(S3.ws.activeMonth); }
function wsToggleGroup(gi) { S3.ws.expandedGroup = S3.ws.expandedGroup === gi ? -1 : gi; renderMonthWorkspace(S3.ws.activeMonth); }
function wsToggleBatch(key) { S3.ws.expandedAutoBatch[key] = !S3.ws.expandedAutoBatch[key]; renderMonthWorkspace(S3.ws.activeMonth); }
function monthShortFromMonth(m) { return m.substring(0, 3); }
function wsConfirm(gi, ti) {
  var key = S3.ws.activeMonth + '-' + gi + '-' + ti;
  S3.ws.txnStates[key] = 'confirmed';
  renderMonthWorkspace(S3.ws.activeMonth);
}

/* Flag IA flow */
function wsStartFlag(gi, ti) {
  var key = S3.ws.activeMonth + '-' + gi + '-' + ti;
  S3.ws.txnStates[key] = 'flagForm';
  renderMonthWorkspace(S3.ws.activeMonth);
}
function wsUpdateFlagComment(key, value) {
  S3.ws.flagComments[key] = value;
  /* update button disabled state without full re-render */
  var btn = document.querySelector('button.btn-flag-confirm');
  if (btn) { if (value.trim().length >= 10) btn.removeAttribute('disabled'); else btn.setAttribute('disabled', 'disabled'); }
}
function wsCancelFlag(gi, ti) {
  var key = S3.ws.activeMonth + '-' + gi + '-' + ti;
  delete S3.ws.txnStates[key];
  delete S3.ws.flagComments[key];
  renderMonthWorkspace(S3.ws.activeMonth);
}
function wsConfirmFlag(gi, ti) {
  var key = S3.ws.activeMonth + '-' + gi + '-' + ti;
  S3.ws.txnStates[key] = 'flagged';
  /* increment month flag counter */
  if (!S3.months[S3.ws.activeMonth].flagsOpen) S3.months[S3.ws.activeMonth].flagsOpen = 0;
  S3.months[S3.ws.activeMonth].flagsOpen++;
  renderMonthWorkspace(S3.ws.activeMonth);
}
function wsSimulateIAResolve(key) {
  S3.ws.txnStates[key] = 'flagResolved';
  S3.ws.flagResolutions[key] = {
    text: 'Confirmed with finance team — this is a director expense reimbursement. Originally posted under 6111 (Biaya Representasi Direksi) which we\'re consolidating into 6110 per your CoA decision in Stage 1. Mapping to 6110 is correct. Flagging this pattern: 2 similar manual journals in May/June have the same shape and should also map to 6110.',
    by: 'Andi (IA)',
    when: 'Day 19 · 14:08'
  };
  renderMonthWorkspace(S3.ws.activeMonth);
}
function wsConfirmResolution(key) {
  S3.ws.txnStates[key] = 'confirmed';
  /* decrement month flag counter */
  if (S3.months[S3.ws.activeMonth].flagsOpen > 0) S3.months[S3.ws.activeMonth].flagsOpen--;
  renderMonthWorkspace(S3.ws.activeMonth);
}
function wsReFlag(gi, ti) {
  var key = S3.ws.activeMonth + '-' + gi + '-' + ti;
  S3.ws.txnStates[key] = 'flagForm';
  S3.ws.flagComments[key] = '';
  renderMonthWorkspace(S3.ws.activeMonth);
}

/* ═══════════════════════════════════════
   STEP 4 — TB · BS · P&L REVIEW
   All 4 PRD variance classifications represented.
   Investigable variance has reason-capture form (radio + textarea).
   Reclassification has IA explanation + accept-with-reason.
   Cash-basis restatement is documented + accepted.

   ═══════════════════════════════════════ */
function renderTBReview() {
  renderSubstepBar();

  var tabs = [
    { lbl: 'Trial Balance', tag: '5 variances', tagCls: 'has' },

    return '<button class="tb-tab' + (S3.tbReview.activeTab === i ? ' active' : '') + '" onclick="tbSetTab(' + i + ')">'
      + t.lbl + '<span class="tab-var ' + t.tagCls + '">' + t.tag + '</span></button>';
  }).join('');

  /* Period selector */
  var periods = [
    {k:'jan',lbl:'Jan'},{k:'feb',lbl:'Feb'},{k:'mar',lbl:'Mar'},{k:'apr',lbl:'Apr'},
    {k:'may',lbl:'May'},{k:'jun',lbl:'Jun'},{k:'jul',lbl:'Jul'},{k:'aug',lbl:'Aug'},
    {k:'sep',lbl:'Sep'},{k:'ytd',lbl:'YTD'},{k:'full',lbl:'Full year'}

  var periodHtml = '<div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:14px">'
    + '<span style="font-size:11px;color:var(--color-text-tertiary);font-weight:300;margin-right:4px">Period:</span>'
    + periods.map(function(p) {
        var act = S3.tbReview.activePeriod === p.k;
        return '<button class="' + (act ? 'btn-confirm' : 'btn-ghost') + '" onclick="tbSetPeriod(\'' + p.k + '\')" style="font-size:11px;padding:3px 9px">' + p.lbl + '</button>';
      }).join('')
    + '</div>';

  /* Tab content */
  var tabContent = '';
  if (S3.tbReview.activeTab === 0) tabContent = renderTBTab();
  else if (S3.tbReview.activeTab === 1) tabContent = renderBSTab();
  else tabContent = renderPLTab();

  /* Can proceed? Investigable variances must have decisions */
  var investigableCount = VARIANCES.filter(function(v) { return v.cls === 'investigable'; }).length;
  var resolvedInvestigable = VARIANCES.filter(function(v) { return v.cls === 'investigable' && S3.tbReview.varianceDecisions[v.id]; }).length;
  var reclassCount = VARIANCES.filter(function(v) { return v.cls === 'reclass'; }).length;
  var resolvedReclass = VARIANCES.filter(function(v) { return v.cls === 'reclass' && S3.tbReview.varianceDecisions[v.id]; }).length;
  var canProceed = (investigableCount === resolvedInvestigable) && (reclassCount === resolvedReclass);

  document.getElementById('main').innerHTML =
    '<div class="srow"><span class="badge b-rev">Review required</span><span class="bmeta">Stage 3 · Transaction data · Step 5 of 6 · TB · BS · P&amp;L review</span></div>'
    + '<h1>Trial balance reconciliation</h1>'
    + '<p class="desc">Your IA has run a full 3-way comparison: Legacy TB vs Klay across TB, Balance Sheet, and P&amp;L. Variances are classified into four types: <strong>Expected</strong> (auto-accepted), <strong>Reclassification</strong> (your reason required), <strong>Investigable</strong> (your decision required), <strong>Cash-basis restatement</strong> (documented).</p>'

    + '<div class="tb-tabs">' + tabHtml + '</div>'
    + periodHtml
    + tabContent

    + '<div style="margin-top:20px;border-top:1px solid var(--color-border-default);padding-top:16px;display:flex;align-items:center;justify-content:space-between">'
    +   (canProceed
        ? '<span style="font-size:12px;color:var(--color-success-text)">&#10003; All variances resolved — proceed to sign-off</span>'
        : '<span style="font-size:12px;color:var(--color-text-tertiary);font-weight:300">Resolve all Reclassification and Investigable variances to proceed (' + (investigableCount-resolvedInvestigable+reclassCount-resolvedReclass) + ' remaining)</span>')
    +   '<button class="btn-cont" ' + (canProceed ? '' : 'disabled') + ' onclick="goStep(5)">Proceed to sign-off &#8250;</button>'
    + '</div>';
}

    +   '<tbody>' + balancedRows + rowsHtml + '</tbody>'

    +     '<tr><td style="padding-left:20px">Total Equity</td><td class="mono">Rp 11,445,020,000</td><td class="mono">Rp 11,445,020,000</td><td class="var-zero">Rp 0</td></tr>'

    + '</div>'
