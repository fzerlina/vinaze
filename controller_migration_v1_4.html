.p0-cashback-row{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;}
.p0-cashback-row:last-child{margin-bottom:0;}
.p0-cb-icon{width:32px;height:32px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.p0-cb-icon.full{background:var(--color-success-surface);}
.p0-cb-icon.half{background:var(--color-warning-surface);}
.p0-cb-icon.none{background:var(--color-surface-sunken);}
.p0-cb-text .amount{font-size:14px;font-weight:700;color:var(--color-text-primary);display:block;margin-bottom:2px;}
.p0-cb-text .when{font-size:12px;color:var(--color-text-tertiary);font-weight:300;}
.p0-cb-divider{border:none;border-top:1px solid var(--color-border-default);margin:12px 0;}
.p0-cb-note{font-size:11px;color:var(--color-text-tertiary);font-weight:300;line-height:1.5;}
/* files to prepare */
.p0-files{border:1px solid var(--color-border-default);border-radius:var(--radius-lg);background:var(--color-surface-raised);overflow:hidden;}
.p0-files-hdr{padding:12px 16px;background:var(--color-surface-sunken);border-bottom:1px solid var(--color-border-default);}
.p0-files-hdr-lbl{font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.07em;}
.p0-file-row{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border-bottom:1px solid var(--color-border-subtle);}
.p0-file-row:last-child{border-bottom:none;}
.p0-file-num{width:22px;height:22px;border-radius:50%;background:var(--color-surface-sunken);color:var(--color-text-tertiary);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1.5px solid var(--color-border-default);}
.p0-file-body .name{font-size:13px;font-weight:600;color:var(--color-text-primary);margin-bottom:3px;}
.p0-file-body .req{font-size:12px;color:var(--color-text-tertiary);font-weight:300;line-height:1.5;}
.p0-file-body .req strong{color:var(--color-brand);font-weight:600;}
/* stages preview */
.p0-stages{border:1px solid var(--color-border-default);border-radius:var(--radius-lg);background:var(--color-surface-raised);overflow:hidden;}
.p0-stages-hdr{padding:12px 16px;background:var(--color-surface-sunken);border-bottom:1px solid var(--color-border-default);}
.p0-stages-hdr-lbl{font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.07em;}
.p0-stage-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--color-border-subtle);}
.p0-stage-row:last-child{border-bottom:none;}
.p0-stage-n{width:22px;height:22px;border-radius:50%;background:var(--color-surface-sunken);color:var(--color-text-tertiary);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1.5px solid var(--color-border-default);}
.p0-stage-body .s-name{font-size:13px;font-weight:600;color:var(--color-text-primary);}
.p0-stage-body .s-days{font-size:11px;color:var(--color-text-tertiary);font-weight:300;margin-top:1px;}
.p0-stage-body .s-sign{font-size:10px;color:var(--color-action);font-weight:600;background:var(--color-action-wash);padding:1px 7px;border-radius:var(--radius-full);border:1px solid var(--color-action-subtle);display:inline-block;margin-top:3px;}
/* right rail */
.p0-right{display:flex;flex-direction:column;gap:16px;position:sticky;top:16px;}
/* IA note */
.p0-ia-card{border:1px solid var(--color-border-default);border-radius:var(--radius-lg);background:var(--color-surface-raised);overflow:hidden;}
.p0-ia-hdr{padding:11px 14px;background:var(--color-surface-sunken);border-bottom:1px solid var(--color-border-default);font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.07em;}
.p0-ia-body{padding:14px;}
.p0-ia-av{width:36px;height:36px;border-radius:50%;background:var(--color-brand);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
.p0-ia-name{font-size:13px;font-weight:600;color:var(--color-text-primary);margin-bottom:2px;}
.p0-ia-role{font-size:11px;color:var(--color-text-tertiary);font-weight:300;margin-bottom:10px;}
.p0-ia-msg{font-size:12px;color:var(--color-text-secondary);line-height:1.6;font-weight:300;border-left:2px solid var(--color-brand-subtle);padding-left:10px;}
/* CTA */
.p0-cta-card{border:1px solid var(--color-border-default);border-radius:var(--radius-lg);background:var(--color-surface-raised);padding:20px;}
.p0-cta-title{font-size:14px;font-weight:700;color:var(--color-text-primary);margin-bottom:6px;}
.p0-cta-sub{font-size:12px;color:var(--color-text-tertiary);font-weight:300;line-height:1.55;margin-bottom:16px;}
.p0-cta-warning{background:var(--color-warning-surface);border:1px solid var(--color-warning-border);border-radius:var(--radius-md);padding:10px 12px;font-size:12px;color:var(--color-warning-text);font-weight:300;line-height:1.5;margin-bottom:14px;}
.p0-cta-warning strong{font-weight:700;display:block;margin-bottom:2px;}
.btn-begin{width:100%;background:var(--color-action);color:var(--color-text-inverse);border:none;border-radius:var(--radius-md);padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font-sans);transition:background var(--transition-base);display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-begin:hover{background:var(--color-action-hover);}
.p0-clock-note{font-size:11px;color:var(--color-text-tertiary);font-weight:300;text-align:center;margin-top:8px;}
/* tier badge in hero */
.p0-tier-badge{display:flex;align-items:center;gap:12px;margin-top:18px;}
.p0-tier-pill{display:inline-flex;align-items:center;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;font-size:12px;font-weight:600;padding:5px 12px;border-radius:var(--radius-full);letter-spacing:.01em;}
.p0-tier-check{color:rgba(255,255,255,.7);font-size:12px;font-weight:400;}
/* role switcher in nav */
.role-switcher{display:flex;align-items:center;gap:0;border:1px solid var(--color-border-default);border-radius:var(--radius-full);overflow:hidden;background:var(--color-surface-sunken);}
.role-btn{padding:4px 12px;font-size:11px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--color-text-tertiary);font-family:var(--font-sans);transition:all .15s;}
.role-btn.active{background:var(--color-surface-raised);color:var(--color-text-primary);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08);}
/* dashboard view */
.dash-shell{min-height:calc(100vh - 52px);background:var(--color-surface-base);display:flex;flex-direction:column;}
.dash-hero{background:var(--color-brand);padding:28px 56px 26px;display:flex;align-items:flex-start;justify-content:space-between;gap:24px;}
.dash-hero-left{}
.dash-hero-kicker{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.dash-hero-kicker::before{content:'';width:16px;height:2px;background:rgba(255,255,255,.35);display:block;}
.dash-hero h1{font-size:clamp(24px,3vw,36px);font-weight:800;color:#fff;letter-spacing:-0.02em;line-height:1.1;margin-bottom:6px;}
.dash-hero-sub{font-size:13px;color:rgba(255,255,255,.65);font-weight:300;}
.dash-cashback-pill{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:var(--radius-lg);padding:14px 20px;flex-shrink:0;}
.dcp-icon{font-size:22px;}
.dcp-lbl{font-size:10px;font-weight:600;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px;}
.dcp-val{font-size:16px;font-weight:700;color:#fff;letter-spacing:-0.01em;}
.dcp-sub{font-size:11px;color:rgba(255,255,255,.55);margin-top:1px;font-weight:300;}
.dash-body{flex:1;padding:28px 56px 40px;display:grid;grid-template-columns:1fr 300px;gap:28px;align-items:start;}
/* progress track */
.dash-track-card{border:1px solid var(--color-border-default);border-radius:var(--radius-lg);background:var(--color-surface-raised);overflow:hidden;margin-bottom:20px;}
.dash-track-hdr{padding:12px 16px;background:var(--color-surface-sunken);border-bottom:1px solid var(--color-border-default);display:flex;align-items:center;justify-content:space-between;}
.dash-track-lbl{font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.07em;}
.dash-track-day{font-family:var(--font-mono);font-size:11px;color:var(--color-text-tertiary);}
/* timeline bar */
.dash-timeline{padding:20px 20px 16px;}
.dash-tl-bar-wrap{position:relative;height:8px;background:var(--color-border-default);border-radius:var(--radius-full);margin-bottom:8px;overflow:hidden;}
.dash-tl-bar-fill{position:absolute;left:0;top:0;height:100%;background:var(--color-brand);border-radius:var(--radius-full);transition:width .4s;}
.dash-tl-bar-target{position:absolute;top:-4px;height:16px;width:2px;background:var(--color-success-text);border-radius:1px;}
.dash-tl-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--color-text-tertiary);margin-bottom:16px;font-family:var(--font-mono);}
.dash-tl-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.dash-stat{text-align:center;padding:10px 8px;background:var(--color-surface-sunken);border-radius:var(--radius-md);border:1px solid var(--color-border-default);}
.dash-stat-n{font-family:var(--font-mono);font-size:18px;font-weight:700;color:var(--color-text-primary);letter-spacing:-0.02em;}
.dash-stat-n.green{color:var(--color-success-text);}
.dash-stat-n.amber{color:var(--color-warning-text);}
.dash-stat-l{font-size:10px;color:var(--color-text-tertiary);margin-top:2px;font-weight:300;}
/* stage status table */
.dash-stages-card{border:1px solid var(--color-border-default);border-radius:var(--radius-lg);background:var(--color-surface-raised);overflow:hidden;}
.dash-stages-hdr{padding:12px 16px;background:var(--color-surface-sunken);border-bottom:1px solid var(--color-border-default);font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.07em;}
.dash-stage-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--color-border-subtle);}
.dash-stage-row:last-child{border-bottom:none;}
.dash-sn{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.dash-sn.done{background:var(--color-success-surface);color:var(--color-success-text);border:1.5px solid var(--color-success-border);}
.dash-sn.active{background:var(--color-brand);color:#fff;}
.dash-sn.pending{background:var(--color-surface-sunken);color:var(--color-text-disabled);border:1.5px solid var(--color-border-default);}
.dash-stage-body{flex:1;}
.dash-stage-name{font-size:13px;font-weight:500;color:var(--color-text-primary);}
.dash-stage-status{font-size:11px;color:var(--color-text-tertiary);font-weight:300;margin-top:1px;}
.dash-stage-row.active-row .dash-stage-name{color:var(--color-brand);font-weight:600;}
.dash-stage-badge{font-size:10px;font-weight:600;padding:2px 9px;border-radius:var(--radius-full);white-space:nowrap;flex-shrink:0;}
.dash-b-done{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);}
.dash-b-active{background:var(--color-brand-wash);color:var(--color-brand);border:1px solid var(--color-brand-subtle);}
.dash-b-pend{background:var(--color-surface-sunken);color:var(--color-text-disabled);border:1px solid var(--color-border-default);}
/* right rail cards */
.dash-right{display:flex;flex-direction:column;gap:16px;position:sticky;top:16px;}
.dash-projection-card{border:1px solid var(--color-border-default);border-radius:var(--radius-lg);background:var(--color-surface-raised);overflow:hidden;}
.dash-proj-hdr{padding:12px 16px;background:var(--color-surface-sunken);border-bottom:1px solid var(--color-border-default);font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.07em;}
.dash-proj-body{padding:16px;}
.dash-proj-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--color-border-subtle);}
.dash-proj-row:last-child{border-bottom:none;}
.dash-proj-lbl{font-size:12px;color:var(--color-text-secondary);font-weight:300;}
.dash-proj-val{font-size:12px;font-weight:600;color:var(--color-text-primary);font-family:var(--font-mono);}
.dash-proj-val.green{color:var(--color-success-text);}
.dash-proj-val.amber{color:var(--color-warning-text);}
.dash-attn-card{border:1px solid var(--color-warning-border);border-radius:var(--radius-lg);background:var(--color-warning-surface);overflow:hidden;}
.dash-attn-hdr{padding:10px 14px;border-bottom:1px solid var(--color-warning-border);font-size:10px;font-weight:600;color:var(--color-warning-text);text-transform:uppercase;letter-spacing:.07em;}
.dash-attn-body{padding:12px 14px;}
.dash-attn-item{display:flex;gap:8px;margin-bottom:8px;font-size:12px;color:var(--color-warning-text);}
.dash-attn-item:last-child{margin-bottom:0;}
.dash-attn-dot{width:5px;height:5px;border-radius:50%;background:var(--color-warning-text);flex-shrink:0;margin-top:5px;}
.dash-team-card{border:1px solid var(--color-border-default);border-radius:var(--radius-lg);background:var(--color-surface-raised);overflow:hidden;}
.dash-team-hdr{padding:12px 16px;background:var(--color-surface-sunken);border-bottom:1px solid var(--color-border-default);font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.07em;}
.dash-team-body{padding:12px 16px;}
.dash-team-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--color-border-subtle);}
.dash-team-row:last-child{border-bottom:none;}
.dash-team-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.dash-team-av.ctrl{background:var(--color-brand);color:#fff;}
.dash-team-av.ia{background:var(--color-action);color:#fff;}
.dash-team-av.spn{background:var(--color-surface-sunken);color:var(--color-text-secondary);border:1.5px solid var(--color-border-default);}
.dash-team-name{font-size:12px;font-weight:500;color:var(--color-text-primary);}
.dash-team-role{font-size:11px;color:var(--color-text-tertiary);font-weight:300;}

/* ── UNIFIED STAGE TABLE ── */
.p0-stage-table{margin-bottom:20px;}
.p0s-row{display:flex;gap:0;margin-bottom:0;}
.p0s-left{display:flex;flex-direction:column;align-items:center;width:36px;flex-shrink:0;padding-top:2px;}
.p0s-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;z-index:1;}
.p0s-num.done{background:var(--color-brand);color:#fff;}
.p0s-num.active{background:var(--color-brand);color:#fff;box-shadow:0 0 0 3px var(--color-brand-wash);}
.p0s-num.locked{background:var(--color-surface-raised);color:var(--color-text-disabled);border:1.5px solid var(--color-border-default);}
.p0s-num.plan{background:var(--color-surface-sunken);color:var(--color-text-tertiary);border:1.5px solid var(--color-border-default);}
.p0s-connector{width:2px;flex:1;min-height:16px;margin:3px auto;}
.p0s-connector.done{background:var(--color-brand);}
.p0s-connector.active{background:linear-gradient(to bottom,var(--color-brand) 50%,var(--color-border-default) 50%);}
.p0s-connector{background:var(--color-border-default);}
.p0s-body{flex:1;padding:0 0 20px 14px;}
.p0s-head{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:5px;}
.p0s-name{font-size:13px;font-weight:700;color:var(--color-text-primary);}
.p0s-current .p0s-name{color:var(--color-brand);}
.p0s-done .p0s-name{color:var(--color-text-secondary);}
.p0s-days{font-size:11px;color:var(--color-text-tertiary);font-weight:300;font-family:var(--font-mono);}
.p0s-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:var(--radius-full);white-space:nowrap;margin-left:auto;}
.p0s-badge.done{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);}
.p0s-badge.active{background:var(--color-brand-wash);color:var(--color-brand);border:1px solid var(--color-brand-subtle);}
.p0s-badge.locked{background:var(--color-surface-sunken);color:var(--color-text-disabled);border:1px solid var(--color-border-default);}
.p0s-badge.plan{background:var(--color-action-wash);color:var(--color-action);border:1px solid var(--color-action-subtle);}
.p0s-desc{font-size:12px;color:var(--color-text-tertiary);font-weight:300;line-height:1.6;margin-bottom:4px;}
.p0s-status{font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-top:3px;}
.p0s-current .p0s-status{color:var(--color-brand);}
/* files sub-section inside stage 1 row */
.p0s-files{margin-top:10px;border:1px solid var(--color-border-default);border-radius:var(--radius-md);overflow:hidden;background:var(--color-surface-sunken);}
.p0s-file{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-bottom:1px solid var(--color-border-subtle);}
.p0s-file:last-child{border-bottom:none;}
.p0s-file-num{width:18px;height:18px;border-radius:50%;background:var(--color-surface-raised);color:var(--color-text-tertiary);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--color-border-default);margin-top:1px;}
.p0s-file-name{font-size:12px;font-weight:600;color:var(--color-text-primary);margin-bottom:2px;}
.p0s-file-req{font-size:11px;color:var(--color-text-tertiary);font-weight:300;line-height:1.5;}
.p0s-file-req strong{color:var(--color-brand);font-weight:600;}
/* completed files tags */
.p0s-files-done{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.p0s-file-tag{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);font-size:10px;font-weight:500;padding:2px 8px;border-radius:var(--radius-full);}
/* projection rows inside cashback card */
.p0s-proj-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--color-border-subtle);}
.p0s-proj-row:last-child{border-bottom:none;}
.p0s-proj-lbl{font-size:12px;color:var(--color-text-secondary);font-weight:300;}
.p0s-proj-val{font-size:12px;font-weight:600;color:var(--color-text-primary);font-family:var(--font-mono);}
/* timeline bar in hero */
.p0-tl-wrap{width:100%;max-width:560px;margin-bottom:16px;}
.p0-tl-bar-bg{position:relative;height:6px;background:rgba(255,255,255,.2);border-radius:var(--radius-full);margin-bottom:6px;overflow:visible;}
.p0-tl-bar-fill{position:absolute;left:0;top:0;height:100%;background:#fff;border-radius:var(--radius-full);}
.p0-tl-target{position:absolute;right:0;top:-5px;width:2px;height:16px;background:rgba(255,255,255,.5);border-radius:1px;}
.p0-tl-labels{display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,.5);font-family:var(--font-mono);}
/* hero stats row */
.p0-hero-stats{display:flex;gap:20px;}
.p0-hs{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:var(--radius-md);padding:10px 16px;}
.p0-hs-n{font-family:var(--font-mono);font-size:18px;font-weight:700;color:#fff;letter-spacing:-0.02em;margin-bottom:2px;}
.p0-hs-l{font-size:11px;color:rgba(255,255,255,.55);font-weight:300;}
/* team card */
.p0-team-card{border:1px solid var(--color-border-default);border-radius:var(--radius-lg);background:var(--color-surface-raised);overflow:hidden;}
.p0-team-hdr{padding:12px 16px;background:var(--color-surface-sunken);border-bottom:1px solid var(--color-border-default);font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.07em;}
.p0-team-body{padding:4px 16px 8px;}
.p0-team-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--color-border-subtle);}
.p0-team-row:last-child{border-bottom:none;}
.p0-team-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.p0-team-av.ctrl{background:var(--color-brand);color:#fff;}
.p0-team-av.ia{background:var(--color-action);color:#fff;}
.p0-team-av.spn{background:var(--color-surface-sunken);color:var(--color-text-secondary);border:1.5px solid var(--color-border-default);}
.p0-team-name{font-size:12px;font-weight:500;color:var(--color-text-primary);}
.p0-team-role{font-size:11px;color:var(--color-text-tertiary);font-weight:300;}
/* attention card */
.p0-attn-card{border:1px solid var(--color-warning-border);border-radius:var(--radius-lg);background:var(--color-warning-surface);overflow:hidden;margin-bottom:0;}
.p0-attn-hdr{padding:10px 14px;border-bottom:1px solid var(--color-warning-border);font-size:10px;font-weight:600;color:var(--color-warning-text);text-transform:uppercase;letter-spacing:.07em;}
.p0-attn-body{padding:10px 14px;}
.p0-attn-item{display:flex;gap:8px;margin-bottom:7px;font-size:12px;color:var(--color-warning-text);line-height:1.5;}
.p0-attn-item:last-child{margin-bottom:0;}
.p0-attn-dot{width:5px;height:5px;border-radius:50%;background:var(--color-warning-text);flex-shrink:0;margin-top:5px;}

/* ── AUTH0-STYLE LOGIN ── */
.login-overlay{position:fixed;inset:0;background:linear-gradient(135deg,#3D1200 0%,#B83D08 45%,#D4622A 75%,#A03206 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;}
.login-overlay::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 70% 20%,rgba(255,255,255,.07) 0%,transparent 60%),radial-gradient(ellipse at 20% 80%,rgba(0,0,0,.25) 0%,transparent 55%);pointer-events:none;}
.login-card{background:#fff;border-radius:8px;padding:40px 40px 32px;width:100%;max-width:400px;box-shadow:0 4px 32px rgba(0,0,0,.18);}
.login-logo{display:flex;justify-content:center;margin-bottom:24px;}
.login-logo-mark{width:44px;height:44px;display:flex;align-items:center;justify-content:center;}
/* Terracotta shield SVG inline */
.login-title{font-family:var(--font-sans);font-size:24px;font-weight:600;color:#1a1814;text-align:center;margin-bottom:8px;letter-spacing:-0.01em;}
.login-sub{font-size:14px;color:#8C857C;text-align:center;margin-bottom:24px;font-weight:300;line-height:1.5;}
.login-sub strong{color:#1a1814;font-weight:500;}
.login-field{margin-bottom:14px;}
.login-field label{display:block;font-size:13px;font-weight:500;color:#2E2B27;margin-bottom:6px;}
.login-field input{width:100%;height:44px;border:1px solid #E2DDD7;border-radius:6px;padding:0 14px;font-size:14px;font-family:var(--font-sans);color:#080706;outline:none;transition:border-color .15s;}
.login-field input:focus{border-color:#1A46C8;box-shadow:0 0 0 3px rgba(26,70,200,.1);}
.login-field input::placeholder{color:#C8C2BA;}
.login-pw-wrap{position:relative;}
.login-pw-wrap input{padding-right:44px;}
.login-pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#8C857C;padding:4px;display:flex;align-items:center;}
.login-pw-eye:hover{color:#1a1814;}
.login-reset{font-size:13px;color:#1A46C8;font-weight:500;text-decoration:none;display:inline-block;margin-bottom:20px;cursor:pointer;background:none;border:none;font-family:var(--font-sans);padding:0;}
.login-reset:hover{text-decoration:underline;}
.btn-login-continue{width:100%;height:44px;background:#1A46C8;color:#fff;border:none;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font-sans);transition:background .15s;margin-bottom:20px;}
.btn-login-continue:hover{background:#1338A8;}
.login-divider{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:#E2DDD7;}
.login-divider span{font-size:12px;color:#8C857C;font-weight:400;letter-spacing:.04em;}

function updStageBar(){
  var s=APP.stage;
  var tabs=[
    {n:1,lbl:'Accounts & Dimensions'},
    {n:2,lbl:'Master data'},
    {n:3,lbl:'Transaction data'},
    {n:4,lbl:'UAT'},
    {n:5,lbl:'Live'}
  ];
  var h='';
  tabs.forEach(function(tb,i){
    var st=s>tb.n?'done':s===tb.n?'on':'off';
    var icon=st==='done'?'&#10003;':tb.n;
    var clickable=(st!=='off')?' clickable':'';
    var oc=st!=='off'?' onclick="jumpToStage('+tb.n+')"':'';
    h+='<div class="sti'+clickable+' '+st+'"'+oc+'>'
      +'<div class="stc '+st+'">'+icon+'</div>'
      +'<div class="stl '+st+'">'+tb.lbl+'</div>'
      +'</div>';
    if(i<tabs.length-1) h+='<div class="conn"></div>';
  });
  document.getElementById('stagebar').innerHTML=h;
}
function updDay(){

function updS1Sidebar(){
  var active=APP.s1.cur; /* 0=upload, 1=health check; steps 2-4 owned by updS3Sidebar */
  var steps=[
    'Upload CoA|Day 1',
    'Health check|Results',
    'Dimensions|Define &amp; confirm',
    'Account mapping|'+S3_TOTALS.total+' accounts',
    'Sign-off|Lock both'
  ];
  var rows=steps.map(function(r,i){
    var p=r.split('|');
    var state=i<active?'dn':i===active?'act':'pend';
    var sel=i===active?' sel':'';
    var sub=i<active?'Complete':p[1];
    return'<div class="sb-row'+sel+'" onclick="s1GoStep('+i+')"><div class="step-n '+state+'">'+(i<active?'&#10003;':(i+1))+'</div><div><div class="sb-name">'+p[0]+'</div><div class="sb-meta">'+sub+'</div></div></div>';
  }).join('');
  document.getElementById('sidebar').innerHTML=
    '<div class="sb-hdr"><span class="sb-lbl">Accounts &amp; Dimensions</span></div>'
    +'<div class="sb-prog-wrap">'
      +'<div class="sb-prog-bg"><div class="sb-prog-fill'+(active>=4?' complete':'')+'" style="width:'+Math.round(active/4*100)+'%"></div></div>'
      +'<div class="sb-prog-label"><span>Step '+(active+1)+' of 5</span><span>'+(active>=4?'<span style="color:var(--color-success-text)">Complete &#10003;</span>':Math.round(active/4*100)+'%')+'</span></div>'
    +'</div>'+rows;
}
function s1GoStep(i){
  if(i===0){APP.s1.cur=0;updS1Sidebar();rUp(document.getElementById('main'),T[0],0);}
  else if(i===1){APP.s1.cur=1;updS1Sidebar();rHC(document.getElementById('main'),T[0],0);}
  else{
    S3.step=i;updS3Sidebar(i);
    if(i===2)      rDimReview();
    else if(i===3) rS3Summary();
    else           rS3SignOff();
  }
}
function renderS1(){
  var a=document.getElementById('main');
  var cur=APP.s1.cur,ts=APP.s1.ts;
  if(cur===0){
    if(!ts[0])rUp(a,T[0],0);
    else if(ts[0]===1)rProc(a,T[0]);
    else if(ts[0]===2)rHC(a,T[0],0);
    else rUp(a,T[0],0);
  } else {
    rHC(a,T[0],0);
  }
}

var SO_MODAL_CALLBACK=null;

/* ── Confidence tag helper — replaces raw % everywhere ── */
function confTag(conf){
  if(conf===null||conf===undefined) return'';
  var label,bg,color,border;
  if(conf>=85){label='High confidence';bg='var(--color-success-surface)';color='var(--color-success-text)';border='var(--color-success-border)';}
  else if(conf>=70){label='Medium confidence';bg='var(--color-warning-surface)';color='var(--color-warning-text)';border='var(--color-warning-border)';}
  else{label='Low confidence';bg='var(--color-danger-surface)';color='var(--color-danger-text)';border='var(--color-danger-border)';}
  return'<span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:var(--radius-full);background:'+bg+';color:'+color+';border:1px solid '+border+';white-space:nowrap">'+label+'</span>';
}
function confTagAI(conf){
  /* Prefixed with "AI ·" for places that need to call out AI origin */
  if(conf===null||conf===undefined) return'';
  var tag=confTag(conf);
  return tag.replace('>','>AI \u00b7 ');
}
function showSignOffModal(title,subtitle,summaryHtml,checkLabel,onConfirm){
  SO_MODAL_CALLBACK=onConfirm;
  document.getElementById('so-modal-title').textContent=title;

  document.getElementById('so-modal-summary-body').innerHTML=summaryHtml;

  document.getElementById('so-modal-confirm-btn').disabled=true;
  document.getElementById('so-modal-overlay').style.display='flex';
}
function soModalCheckChange(){

}
function soModalClose(){
  document.getElementById('so-modal-overlay').style.display='none';
  SO_MODAL_CALLBACK=null;
}
function soModalClickOutside(e){
  if(e.target===document.getElementById('so-modal-overlay')) soModalClose();

/* When building the IA-facing side (ia_migration.html), implement
   the following for each hard block flagged by the Controller:

   CONTROLLER → IA:
   - Controller clicks "Notify IA" on a hard block
   - IA receives a task in their queue: block type, affected accounts, description
   - IA resolves the issue in the CMS (assigns types, merges codes, reassigns parents)
   - IA writes a resolution note explaining exactly what was done
   - IA marks the block as "resolved" and submits — this triggers the Controller review

   IA → CONTROLLER (the return loop):
   - Controller sees the hard block card change to amber "IA resolved — review required"
   - Controller reads the IA's resolution note
   - Controller either:
     a) Confirms: block clears, hard count decrements, audit trail records who confirmed and when
     b) Sends back: block returns to IA queue with optional Controller comment; IA must revise and resubmit

   ASSUMPTIONS (validate with Michael/team):
   1. Controller always reviews IA resolutions — no auto-clear path
   2. IA submits a written note before marking resolved (freetext, required field)
   3. Each hard block is notified and resolved independently (no bulk notify)
   4. "Send back" resets to the notified state, not unresolved — IA sees a dispute flag
   5. No in-product comment thread — resolution note is the only IA→Controller communication
   6. Notification delivery (email/in-app) is out of scope for this prototype

   STATES (hardState per block index):
   'unresolved' → 'notified' → 'ia_resolved' → 'confirmed'
                                             ↘ 'notified' (if sent back)

   IA-side screens needed:
   - Task list: "Hard blocks flagged by Controller — N pending"
   - Per-block resolution form: affected accounts list + resolution note textarea + submit button
   - Re-resolution form (for disputed blocks): shows Controller's send-back reason + revised note field
═══════════════════════════════════════ */

      +'</div>'
      +(isExp?'<p style="margin-top:6px">'+b.i+'</p>':'')
    +'</div>';
  });

  /* Gated proceed */
  var blockMsg='';
  if(hardUnresolved){
    var pendingHard=hc.hb.filter(function(b,hi){return(HC_STATE.hardState[hi]||'unresolved')!=='confirmed';}).length;
    blockMsg=pendingHard+' hard block'+(pendingHard>1?'s':'')+' still need'+(pendingHard===1?'s':'')+' to be confirmed.';
  } else if(softActioned<softTotal){
    blockMsg=(softTotal-softActioned)+' soft block'+(softTotal-softActioned>1?'s':'')+' still need your decision.';
  }

    +'<p style="font-size:12px;color:'+(canProceed?'var(--color-success-text)':'var(--color-text-tertiary)')+';font-weight:300;line-height:1.5">'

    +'</p>'
    +'<button class="btn-cont"'+(canProceed?' onclick="ackHC(0)"':' style="opacity:.35;cursor:default" disabled')+'>'
      +'Proceed to CoA mapping &#8250;'
    +'</button>'
  +'</div>';

  a.innerHTML=h;
}

function updS2Sidebar(curItem){
  var it=APP.s2.items;
  var st=APP.s2.steps;
  var avail=[true,true,true,true,true,true]; /* prototype: all items accessible */
  var done=it.filter(function(v){return v>=3;}).length;
  var pct=Math.round(done/5*100);

  // Sub-step definitions per item type
  // Upload items (1-5): [Upload, Health check, Confirm]
  // Dims (0): [Review, Structure, Sign-off]
  var SUB_STEPS={
    0:['Upload','Health check','Confirm'],
    1:['Upload','Health check','Confirm'],
    2:['Upload','Health check','Confirm'],
    3:['Upload','Health check','Confirm'],
    4:['Upload','Health check','Confirm']
  };

  function mkItem(idx,name){
    var isAvail=true,isSel=idx===curItem,isBlocked=false; /* prototype: always available */
    var itemSt=it[idx];
    var dotCls=itemSt>=3?'done':(isSel&&itemSt>=1?'active':itemSt>=1?'empty':'lock');
    var dotInner=itemSt>=3?'&#10003;':(isSel&&itemSt>=1?'&#9654;':'');
    var tagTxt='',tagCls='lock';
    if(itemSt>=3){tagTxt=MD_DAYS[idx]?'Day '+MD_DAYS[idx]:'Complete';tagCls='done';}
    else if(isSel&&itemSt>=1){tagTxt='In progress';tagCls='active';}
    else if(isAvail&&itemSt>=1){tagTxt='Ready';tagCls='ready';}
    var cls='cl-item'+(isSel?' cl-sel':'');
    var row='<div class="'+cls+'" onclick="s2GoItem('+idx+')">'
      +'<div class="cl-dot '+dotCls+'">'+dotInner+'</div>'
      +'<div><div class="cl-name">'+name+'</div>'+(tagTxt?'<span class="cl-tag '+tagCls+'">'+tagTxt+'</span>':'')+'</div>'
      +'</div>';

    // Expand sub-steps only for active, non-done item
    if(isSel&&itemSt<3&&itemSt>=1){
      var curStep=st[idx]; // 0=first, 1=second, 2=third
      var subSteps=SUB_STEPS[idx];
      var subHtml='<div class="cl-substeps">';
      subSteps.forEach(function(lbl,si){
        var isDone=si<curStep;
        var isActive=si===curStep;
        var sDot=isDone?'done':isActive?'active':'lock';
        var sDotInner=isDone?'&#10003;':isActive?'&#9654;':'';
        subHtml+='<div class="cl-sub'+(isActive?' cl-sub-active':isDone?' cl-sub-done':'')+'">'
          +'<div class="cl-sub-dot '+sDot+'">'+sDotInner+'</div>'
          +'<span class="cl-sub-name">'+lbl+'</span>'
          +'</div>';
      });
      subHtml+='</div>';
      row+=subHtml;
    }
    return row;
  }

  var rows=mkItem(0,'Fixed asset')
    +'<div class="cl-divider"></div>'
    +'<div class="cl-group-lbl">Product</div>'
    +mkItem(1,'Product data')
    +mkItem(2,'Inventory balance')
    +'<div class="cl-divider"></div>'
    +'<div class="cl-group-lbl">AR / AP</div>'
    +mkItem(3,'Customer &amp; vendor')
    +mkItem(5,'Outstanding AR/AP');

  document.getElementById('sidebar').innerHTML=
    '<div class="sb-hdr"><span class="sb-lbl">Master data</span><span class="sb-cnt">'+done+' of 5</span></div>'
    +'<div class="sb-prog-wrap">'
      +'<div class="sb-prog-bg"><div class="sb-prog-fill'+(pct===100?' complete':'')+'" style="width:'+pct+'%"></div></div>'
      +'<div class="sb-prog-label"><span>'+done+' of 6 complete</span>'
      +'<span>'+(pct===100?'<span style="color:var(--color-success-text)">All done &#10003;</span>':pct+'%')+'</span></div>'
    +'</div>'+rows;
}

/* ── dimension actions ── */
function dimConfirm(i){DIM_STATE.dims[i].status='confirmed';rDimReview();}
function dimReject(i){DIM_STATE.dims[i].status='rejected';rDimReview();}
function dimUndo(i){DIM_STATE.dims[i].status='undecided';rDimReview();}
function dimRemove(i){
  /* only user-added dims can be fully removed; AI dims use reject instead */
  if(DIM_STATE.dims[i].source==='user'){DIM_STATE.dims.splice(i,1);rDimReview();}
  else dimReject(i);
}

function dimAddValue(i){
  var v=prompt('Add a value to '+DIM_STATE.dims[i].name+':');
  if(v&&v.trim()){
    DIM_STATE.dims[i].vals.push(v.trim());
    DIM_STATE.dims[i].txns.push(0);
    DIM_STATE.dims[i].colors.push('#8C857C');
    rDimReview();
  }
}

function dimOpenAdd(){DIM_STATE.addingNew=true;DIM_STATE.newName='';DIM_STATE.newVals=[];rDimReview();}
function dimCancelAdd(){DIM_STATE.addingNew=false;DIM_STATE.newVals=[];rDimReview();}
function dimAddNewVal(){
  var inp=document.getElementById('new-val-input');
  if(inp&&inp.value.trim()){DIM_STATE.newVals.push(inp.value.trim());inp.value='';rDimReview();}
}
function dimRemoveNewVal(vi){DIM_STATE.newVals.splice(vi,1);rDimReview();}
function dimSaveNew(){
  var inp=document.getElementById('new-dim-name');
  var name=inp?inp.value.trim():'';
  if(!name){alert('Please enter a dimension name.');return;}
  DIM_STATE.dims.push({
    name:name,status:'undecided',source:'user',
    vals:DIM_STATE.newVals.slice(),txns:DIM_STATE.newVals.map(function(){return 0;}),
    totalTxns:18432,conf:null,desc:'Added manually by Controller.',
    colors:DIM_STATE.newVals.map(function(){return'#8C857C';}),
    addLbl:name.toLowerCase(),unresolved:false
  });
  DIM_STATE.addingNew=false;DIM_STATE.newVals=[];
  rDimReview();
}

function confDim(i){dimConfirm(i);} /* legacy compat */
function goS2Review(){rDimReview();}
function togRev(i){}

    var state=i<active?'dn':i===active?'act':'pend';
    var sel=i===active?' sel':'';
    var sub=i<active?'Complete':p[1];

        var isActive=S3.subStep===s[1];

          +'<span class="cl-sub-name">'+s[0]+'</span>'
          +'</div>';
      });

    }

  }).join('');
  document.getElementById('sidebar').innerHTML=
    '<div class="sb-hdr"><span class="sb-lbl">Accounts &amp; Dimensions</span></div>'
    +'<div class="sb-prog-wrap">'
      +'<div class="sb-prog-bg"><div class="sb-prog-fill'+(active>=4?' complete':'')+'" style="width:'+Math.round(active/4*100)+'%"></div></div>'

    +'</div>'+rows;
}

/* ═══════════════════════════════════════
   STAGE 3, STEP 4: REVIEW EXCEPTIONS
   Shows ALL accounts in one table — 4 categories:
   - pending: needs review → Confirm + Override
   - confirmed: confirmed by user → Override only (escape hatch)
   - auto: auto-mapped ≥80% → Override only
   - ia: IA resolving → read-only, status badge
   - tax: pre-mapped locked → read-only, lock badge
═══════════════════════════════════════ */

/* ── Consolidation map: tosCode → [indices] for rows that consolidate ── */
function getConsolidationMap(){
  var map={};
  EXC_ROWS.forEach(function(r,i){
    if(!r.tosCode||r.state==='tax'||r.state==='ia') return;
    if(!map[r.tosCode]) map[r.tosCode]=[];
    map[r.tosCode].push(i);
  });
  /* Only keep entries with >1 row */
  Object.keys(map).forEach(function(k){if(map[k].length<=1) delete map[k];});
  return map;
}
function getDimTagOptions(){
  /* Returns [{label, dim, val}] — label is "DimName: Value" */
  var confirmedDims=DIM_STATE.dims.filter(function(d){return d.status==='confirmed';});
  /* Fallback: if Controller hasn't reached Dimensions step yet, use all non-rejected dims */
  var sourceDims=confirmedDims.length>0
    ?confirmedDims
    :DIM_STATE.dims.filter(function(d){return d.status!=='rejected';});
  var opts=[{label:'— none —',dim:null,val:null}];
  sourceDims.forEach(function(d){
    d.vals.filter(function(v){return v!=='?';}).forEach(function(v){
      opts.push({label:d.name+': '+v, dim:d.name, val:v});
    });
  });
  return opts;
}

function rS3Exceptions(){ rS3Workspace(); }
function rS3Workspace(){
  APP.screen='s3-workspace';
  S3.subStep='workspace';
  updS3Sidebar(3);
  var a=document.getElementById('main');

  var counts={
    pending: EXC_ROWS.filter(function(r){return r.state==='pending';}).length,
    confirmed: EXC_ROWS.filter(function(r){return r.state==='confirmed';}).length,
    auto: EXC_ROWS.filter(function(r){return r.state==='auto';}).length,
    ia: EXC_ROWS.filter(function(r){return r.state==='ia';}).length,
    tax: EXC_ROWS.filter(function(r){return r.state==='tax';}).length
  };
  var totalRows=EXC_ROWS.length;

  /* ── category filter buttons ── */
  function fBtn(val,label){
    return'<button class="exc-filt-btn'+(S3.filter===val?' exc-filt-active':'')+'" onclick="s3SetFilter(\''+val+'\')">'+label+'</button>';
  }
  function fsBtn(val,label){
    return'<button class="exc-filt-btn'+(S3.fsFilter===val?' exc-filt-active':'')+'" onclick="s3SetFS(\''+val+'\')">'+label+'</button>';
  }

  var toolbar='<div class="exc-toolbar" style="flex-wrap:wrap;gap:6px;margin-bottom:10px">'
    +'<div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">'
      +'<span style="font-size:11px;color:var(--color-text-tertiary);font-weight:300">Show:</span>'
      +fBtn('all','All ('+totalRows+')')
      +fBtn('review','Needs review ('+counts.pending+')')
      +fBtn('auto','Auto-mapped ('+counts.auto+')')
      +fBtn('ia','IA resolving ('+counts.ia+')')
      +fBtn('tax','Tax ('+counts.tax+')')
      +'<span style="font-size:11px;color:var(--color-text-tertiary);font-weight:300;margin-left:6px">FS:</span>'
      +fsBtn('all','All')
      +fsBtn('pl','P&L')
      +fsBtn('bs','BS')
    +'</div>'
    +'<div style="display:flex;align-items:center;gap:5px">'
      +'<span style="font-size:11px;color:var(--color-text-tertiary);font-weight:300">Sort:</span>'
      +'<button class="exc-filt-btn'+(S3.sort==='conf'?' exc-filt-active':'')+'" onclick="s3SetSort(\'conf\')">Confidence</button>'
      +'<button class="exc-filt-btn'+(S3.sort==='code'?' exc-filt-active':'')+'" onclick="s3SetSort(\'code\')">Account code</button>'
    +'</div>'
  +'</div>';

  /* ── apply filters ── */
  var filtered=EXC_ROWS.map(function(r,i){return{r:r,i:i};}).filter(function(obj){
    var r=obj.r;
    if(S3.filter==='review') return r.state==='pending';
    if(S3.filter==='auto')   return r.state==='auto';
    if(S3.filter==='ia')     return r.state==='ia';
    if(S3.filter==='tax')    return r.state==='tax';
    return true;
  });
  if(S3.fsFilter!=='all'){
    filtered=filtered.filter(function(obj){
      if(!obj.r.fs) return false;
      return S3.fsFilter==='pl'?obj.r.fs.startsWith('P&L'):obj.r.fs.startsWith('BS');
    });
  }

  /* ── sort: pending/review rows by conf asc; others by code ── */
  filtered.sort(function(a,b){
    /* category order: pending first, then auto, ia, tax, confirmed */
    var order={pending:0,confirmed:1,auto:2,ia:3,tax:4};
    var ao=order[a.r.state]||5, bo=order[b.r.state]||5;
    if(ao!==bo) return ao-bo;
    if(S3.sort==='conf'){
      var ac=a.r.conf===null||a.r.conf===undefined?999:a.r.conf;
      var bc=b.r.conf===null||b.r.conf===undefined?999:b.r.conf;
      return ac-bc;
    }
    return a.r.legCode.localeCompare(b.r.legCode);
  });

  /* ── pagination ── */
  var totalFiltered=filtered.length;
  var totalPages=Math.max(1,Math.ceil(totalFiltered/S3.PAGE_SIZE));
  S3.page=Math.min(S3.page,totalPages-1);
  var pageStart=S3.page*S3.PAGE_SIZE;
  var pageRows=filtered.slice(pageStart,pageStart+S3.PAGE_SIZE);

  /* ── sticky progress (only counts "needs review" bucket) ── */
  var reviewDone=counts.confirmed;
  var reviewTotal=counts.pending+counts.confirmed;
  var pct=reviewTotal>0?Math.round(reviewDone/reviewTotal*100):100;
  var stickyProgress='<div style="background:var(--color-surface-sunken);border:1px solid var(--color-border-default);border-radius:var(--radius-md);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'
    +'<div style="display:flex;gap:16px;flex-wrap:wrap">'
      +'<span style="font-size:12px;color:var(--color-text-primary);font-weight:500"><span style="font-family:var(--font-mono)">'+counts.pending+'</span> <span style="font-weight:300;color:var(--color-text-tertiary)">to review</span></span>'
      +'<span style="font-size:12px;color:var(--color-success-text);font-weight:500"><span style="font-family:var(--font-mono)">'+counts.auto+'</span> <span style="font-weight:300;color:var(--color-text-tertiary)">auto-mapped</span></span>'
      +'<span style="font-size:12px;color:var(--color-action);font-weight:500"><span style="font-family:var(--font-mono)">'+counts.ia+'</span> <span style="font-weight:300;color:var(--color-text-tertiary)">IA resolving</span></span>'
      +'<span style="font-size:12px;color:var(--color-text-tertiary);font-weight:500"><span style="font-family:var(--font-mono)">'+counts.tax+'</span> <span style="font-weight:300">tax locked</span></span>'
    +'</div>'
    +'<div style="display:flex;align-items:center;gap:8px">'
      +'<div style="width:80px;background:var(--color-border-default);border-radius:var(--radius-full);height:4px;overflow:hidden"><div style="width:'+pct+'%;height:4px;background:var(--color-brand);border-radius:var(--radius-full)"></div></div>'
      +'<span style="font-size:11px;color:var(--color-brand);font-weight:600">'+pct+'% reviewed</span>'
    +'</div>'
  +'</div>';

  /* ── build table rows ── */
  var consMap=getConsolidationMap();
  var dimOpts=getDimTagOptions();
  var rows=pageRows.map(function(obj){

    var fsCls=r.fs&&r.fs.startsWith('P&L')?'fs-pl':r.fs&&r.fs.startsWith('BS')?'fs-bs':'';
    var fsCell=r.fs?'<span class="fs-badge '+fsCls+'">'+r.fs+'</span>':'<span style="font-size:11px;color:var(--color-text-tertiary)">—</span>';

    if(r.state==='confirmed'){
      var isBulkAnchor=(S3.lastConfirmedIdx===i)&&S3.bulkGroup&&S3.bulkGroup.indices.length>0;
      var dimTagCell=consMap[r.tosCode]
        ?(function(){

              ?' <span style="font-size:10px;color:var(--color-action);font-weight:300">Edited</span>'
              :'';
            return'<span style="font-size:11px;font-weight:500;color:var(--color-success-text)">'+tag+'</span>'+suffix;
          })()
        :'<span style="color:var(--color-text-disabled);font-size:11px">—</span>';
      var rowHtml='<tr style="background:var(--color-success-surface)">'
        +'<td>'
          +'<div style="font-family:var(--font-mono);font-size:11px;color:var(--color-success-text);opacity:.7">'+r.legCode+'</div>'
          +'<div style="font-size:12px;font-weight:500;color:var(--color-success-text)">'+r.legName+'</div>'
        +'</td>'
        +'<td>'
          +'<div style="font-family:var(--font-mono);font-size:11px;color:var(--color-success-text);opacity:.7">'+r.tosCode+'</div>'

        +'</td>'
        +'<td>'+dimTagCell+'</td>'
        +'<td>'+fsCell+'</td>'
        +'<td><span style="font-size:11px;font-weight:600;color:var(--color-success-text)">&#10003; Confirmed</span></td>'
        +'<td><button class="exc-btn-override" onclick="overrideRow('+i+')">Override</button></td>'

        +'<td style="color:var(--color-text-disabled);font-size:11px">—</td>'

    /* ── TAX LOCKED ── */
    if(r.state==='tax'){

        +'<td>'
          +'<div style="font-family:var(--font-mono);font-size:11px;color:var(--color-text-tertiary)">'+r.legCode+'</div>'

        +'<td style="color:var(--color-text-disabled);font-size:11px">Locked</td>'

    return'';
  }).join('');

  /* ── pagination ── */

function confirmRow(i){
  EXC_ROWS[i].state='confirmed';
  S3.overrideRow=null;
  S3.lastConfirmedIdx=i;
  S3.subStep='workspace';
  S3.bulkInlineExpanded=false;
  /* find similar pending rows: same tosCode, not this row, not yet confirmed */
  var similar=[];
  EXC_ROWS.forEach(function(r,idx){
    if(idx!==i&&r.state==='pending'&&r.tosCode===EXC_ROWS[i].tosCode){
      similar.push(idx);
    }
  });
  if(similar.length>0){
    S3.bulkGroup={tosCode:EXC_ROWS[i].tosCode,tosName:EXC_ROWS[i].tosName,indices:similar};
  } else {
    S3.bulkGroup=null;
  }
  rS3Exceptions();
}

function confirmBulkItem(idx){
  EXC_ROWS[idx].state='confirmed';
  /* remove from bulk group */
  if(S3.bulkGroup){
    S3.bulkGroup.indices=S3.bulkGroup.indices.filter(function(x){return x!==idx;});
    if(S3.bulkGroup.indices.length===0) S3.bulkGroup=null;
  }
  rS3Exceptions();
}

function applyBulk(){
  if(S3.bulkGroup){
    S3.bulkGroup.indices.forEach(function(idx){EXC_ROWS[idx].state='confirmed';});
  }
  S3.bulkGroup=null;
  S3.bulkInlineExpanded=false;
  rS3Exceptions();
}

function expandBulkInline(){
  S3.bulkInlineExpanded=true;
  rS3Exceptions();
}

function overrideRow(i){S3.overrideRow=i;rS3Workspace();}
function cancelOverride(){S3.overrideRow=null;rS3Workspace();}
function saveOverride(i){
  var inp=document.getElementById('ov-inp-'+i);
  if(inp)EXC_ROWS[i].tosName=inp.value;
  EXC_ROWS[i].state='confirmed';
  S3.overrideRow=null;
  confirmRow(i); /* reuse confirm logic to trigger bulk check */
}

/* ═══════════════════════════════════════
   STAGE 3, STEP 5: CONTROLLER SIGN-OFF

function rS3SignOff(){
  APP.screen='s3-signoff';
  updS3Sidebar(4);
  var a=document.getElementById('main');

  var allRows=EXC_ROWS.filter(function(r){return r.tosCode;});
  var total=allRows.length;
  var confirmedDims=DIM_STATE.dims.filter(function(d){return d.status==='confirmed';});
  var rejectedDims =DIM_STATE.dims.filter(function(d){return d.status==='rejected';});

  /* Group all rows by tosCode, preserving insertion order */
  var groupOrder=[];
  var groupMap={};
  allRows.forEach(function(r){
    if(!groupMap[r.tosCode]){
      groupMap[r.tosCode]={tosCode:r.tosCode,tosName:r.tosName,fs:r.fs,rows:[]};
      groupOrder.push(r.tosCode);
    }
    groupMap[r.tosCode].rows.push(r);
  });

  /* Build table rows */
  var tableRows=groupOrder.map(function(tosCode){
    var g=groupMap[tosCode];
    var fsCls=g.fs&&g.fs.startsWith('P&L')?'fs-pl':g.fs&&g.fs.startsWith('BS')?'fs-bs':'';
    var isConsolidated=g.rows.length>1;
    var isTax=g.rows[0]&&g.rows[0].state==='tax';
    var isIA=g.rows.length===1&&g.rows[0].state==='ia';

    /* Group header: Klay account + FS placement */
    var groupHeader='<tr style="background:var(--color-surface-sunken)">'
      +'<td colspan="3" style="padding:8px 12px">'
        +'<div style="display:flex;align-items:center;gap:10px">'
          +'<div>'
            +'<div style="font-family:var(--font-mono);font-size:11px;color:var(--color-text-tertiary)">'+g.tosCode+'</div>'
            +'<div style="font-size:13px;font-weight:600;color:var(--color-text-primary)">'+g.tosName+'</div>'
          +'</div>'
          +'<span class="fs-badge '+fsCls+'" style="margin-left:auto">'+g.fs+'</span>'
          +(isConsolidated?'<span style="font-size:10px;color:var(--color-action);font-weight:500">'+g.rows.length+' accounts</span>':'')
          +(isTax?'<span style="font-size:10px;font-weight:600;padding:1px 7px;border-radius:var(--radius-full);background:var(--color-surface-raised);color:var(--color-text-tertiary);border:1px solid var(--color-border-default)">&#128274; Tax</span>':'')
          +(isIA?'<span style="font-size:10px;font-weight:600;padding:1px 7px;border-radius:var(--radius-full);background:var(--color-warning-surface);color:var(--color-warning-text);border:1px solid var(--color-warning-border)">IA resolving</span>':'')
        +'</div>'
      +'</td>'
    +'</tr>';

    /* Legacy account rows */
    var legacyRows=g.rows.map(function(r){
      var dimCell=isConsolidated
        ?(r.dimTag
          ?'<span style="font-size:11px;color:var(--color-text-primary)">'+r.dimTag+'</span>'
            +(r.dimTagEdited?'<span style="font-size:10px;color:var(--color-action);margin-left:5px">Edited</span>':'<span style="font-size:10px;color:var(--color-text-tertiary);margin-left:5px">AI</span>')
          :'<span style="font-size:11px;color:var(--color-warning-text)">— untagged</span>')
        :'<span style="color:var(--color-text-disabled);font-size:11px">—</span>';

      var statusBadge=r.state==='confirmed'
        ?'<span style="font-size:10px;color:var(--color-success-text)">&#10003; Confirmed</span>'
        :r.state==='auto'
        ?'<span style="font-size:10px;color:var(--color-success-text)">Auto</span>'
        :r.state==='ia'
        ?'<span style="font-size:10px;color:var(--color-warning-text)">IA</span>'
        :'<span style="font-size:10px;color:var(--color-text-tertiary)">&#128274;</span>';

      return'<tr style="border-top:1px solid var(--color-border-subtle)">'
        +'<td style="padding:6px 12px 6px 24px">'
          +'<div style="font-family:var(--font-mono);font-size:11px;color:var(--color-text-tertiary)">'+r.legCode+'</div>'
          +'<div style="font-size:12px;color:var(--color-text-primary)">'+r.legName+'</div>'
        +'</td>'
        +'<td style="padding:6px 12px">'+dimCell+'</td>'
        +'<td style="padding:6px 12px;text-align:right">'+statusBadge+'</td>'
      +'</tr>';
    }).join('');

    return groupHeader+legacyRows;
  }).join('');

  a.innerHTML='<div class="srow"><span class="badge b-act">Action required</span><span class="bmeta">Stage 1 &middot; Accounts &amp; Dimensions &middot; Step 5</span></div>'
    +'<h1>Sign-off</h1>'
    +'<p class="desc">Review the complete account and dimension structure below. Once you sign off, both are locked permanently.</p>'

    /* Unified grouped table */
    +'<div class="twrap" style="margin-bottom:16px"><table class="exc-table" style="table-layout:fixed;width:100%">'
      +'<thead><tr>'
        +'<th style="width:45%">Legacy account</th>'
        +'<th style="width:35%">Dimension tag</th>'
        +'<th style="width:20%;text-align:right">Status</th>'
      +'</tr></thead>'
      +'<tbody>'+tableRows+'</tbody>'
    +'</table></div>'

    +(rejectedDims.length>0
      ?'<div style="font-size:12px;color:var(--color-danger-text);margin-bottom:12px;padding:8px 12px;background:var(--color-danger-surface);border:1px solid var(--color-danger-border);border-radius:var(--radius-md)">Rejected dimensions (will not be used): '+rejectedDims.map(function(d){return d.name;}).join(', ')+'</div>'
      :'')

    /* Lock warning + offline notice */
    +'<div class="warn-bar"><div class="warn-bar-icon">&#128274;</div><div class="warn-bar-text">Signing off locks both the account mapping and dimension structure permanently. Any change after this point requires your IA and a new sign-off.</div></div>'
    +'<div style="background:var(--color-warning-surface);border:1px solid var(--color-warning-border);border-radius:var(--radius-md);padding:10px 14px;margin-bottom:16px;font-size:12px;color:var(--color-warning-text);line-height:1.6">'
      +'<strong style="display:block;font-weight:600;margin-bottom:2px">&#9998; Physical sign-off required</strong>'
      +'Before locking here, ensure you have reviewed and signed the confirmation document with your IA — either in print or digitally.'
    +'</div>'

    /* Two sign-off checkboxes */
    +'<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px">'
      +'<div class="so-box" style="align-items:flex-start;flex-direction:column;gap:10px">'
        +'<div class="so-lbl">Sign-off 1 of 2 &mdash; Account mapping</div>'
        +'<div class="so-text">I have reviewed the account mapping above and confirm it correctly represents our Chart of Accounts.</div>'
        +'<div class="so-note">'+total+' accounts &middot; locked on confirmation.</div>'
        +'<label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;width:100%">'
          +'<input type="checkbox" id="so-chk-mapping" onchange="soCheckBoth()" style="margin-top:2px;flex-shrink:0" />'
          +'<span style="font-size:12px;color:var(--color-text-primary);line-height:1.5">I confirm the account mapping, including auto-mapped and IA-resolved accounts, is correct.</span>'
        +'</label>'
      +'</div>'
      +'<div class="so-box" style="align-items:flex-start;flex-direction:column;gap:10px">'
        +'<div class="so-lbl">Sign-off 2 of 2 &mdash; Dimension structure</div>'
        +'<div class="so-text">I confirm the dimension structure and all dimension tags assigned to consolidated accounts are correct.</div>'
        +'<div class="so-note">'+confirmedDims.length+' dimension'+(confirmedDims.length>1?'s':'')+' &middot; locked on confirmation.</div>'
        +'<label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;width:100%">'
          +'<input type="checkbox" id="so-chk-dims" onchange="soCheckBoth()" style="margin-top:2px;flex-shrink:0" />'
          +'<span style="font-size:12px;color:var(--color-text-primary);line-height:1.5">I confirm the dimension structure, including confirmed dimensions and all assigned tags, is correct.</span>'
        +'</label>'
      +'</div>'
    +'</div>'

    +'<div style="display:flex;align-items:center;justify-content:flex-end;gap:10px">'
      +'<button class="btn-ghost" onclick="rS3Workspace()">&#8592; Back to workspace</button>'
      +'<button class="btn-lock" id="so-lock-both-btn" disabled style="opacity:.35;cursor:default" onclick="lockBoth()">Lock account mapping &amp; dimensions &#8250;</button>'
    +'</div>';
}

function rS4Overview(){
  APP.screen='s4-overview';
  var a=document.getElementById('main');

  var totalTxn=S4_MONTHS.reduce(function(s,m){return s+m.txn;},0);
  var totalMapped=S4_MONTHS.reduce(function(s,m){return s+m.mapped;},0);
  var totalReview=S4_MONTHS.reduce(function(s,m){return s+m.review;},0);
  var pctDone=Math.round(totalMapped/totalTxn*100);

  var cards=S4_MONTHS.map(function(m,i){
    var cardCls='month-card mc-'+m.status;
    var statusHtml='';
    if(m.status==='done') statusHtml='<span class="mc-status mc-s-done">&#10003; Done</span>';
    else if(m.status==='active') statusHtml='<span class="mc-status mc-s-active">In progress</span>';
    else if(m.status==='warn') statusHtml='<span class="mc-status mc-s-warn">'+m.review+' remaining</span>';
    else statusHtml='<span class="mc-status mc-s-pend">Not started</span>';

    var progCls=m.status==='done'?'grn':m.status==='todo'?'tc':'amb';
    var mappedCls=m.status==='done'?'grn':'';
    var reviewCls=m.review>0?'red':'';

    var varHtml=m.status!=='todo'
      ?('<div class="mc-var-flag '+(m.var?'has-var':'no-var')+'">'+(m.var?'&#9651; TB variance detected':'&#10003; No variance')+'</div>')
      :'';

    var onclick=' onclick="goS4Month('+i+')"';
    return'<div class="'+cardCls+'"'+onclick+'>'
      +'<div class="mc-header"><span class="mc-month">'+m.m+'</span>'+statusHtml+'</div>'
      +'<div class="mc-prog-wrap"><div class="mc-prog-bar '+progCls+'" style="width:'+m.pct+'%"></div></div>'
      +'<div class="mc-stats">'
        +'<div class="mc-stat"><div class="mc-stat-n '+mappedCls+'">'+m.mapped.toLocaleString()+'</div><div class="mc-stat-l">mapped</div></div>'
        +'<div class="mc-stat"><div class="mc-stat-n">'+m.txn.toLocaleString()+'</div><div class="mc-stat-l">total</div></div>'
        +'<div class="mc-stat"><div class="mc-stat-n '+reviewCls+'">'+(m.review>0?m.review:'—')+'</div><div class="mc-stat-l">to review</div></div>'
      +'</div>'
      +varHtml
    +'</div>';
  }).join('');

  a.innerHTML='<div class="srow"><span class="badge b-proc">In progress</span><span class="bmeta">Transaction data &middot; GL mapping</span></div>'
    +'<h1>GL transaction mapping</h1>'
    +'<p class="desc">Your GL covers '+totalTxn.toLocaleString()+' transactions across 9 months. Work month by month — the AI has pre-mapped the majority. Click any month to open its workspace, or start from January.</p>'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">'
      +'<span style="font-size:12px;color:var(--color-text-tertiary);font-weight:300">'+totalMapped.toLocaleString()+' of '+totalTxn.toLocaleString()+' transactions mapped</span>'
      +'<span style="font-size:12px;font-weight:700;color:var(--color-brand)">'+pctDone+'% complete</span>'
    +'</div>'
    +'<div class="coa-prog-wrap" style="margin-bottom:18px"><div class="coa-prog-bar tc" style="width:'+pctDone+'%"></div></div>'
    +'<div class="month-grid">'+cards+'</div>'
    +'<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">'
      +'<div style="font-size:12px;color:var(--color-text-tertiary);font-weight:300">'
        +totalReview+' transactions across all months need your review'
      +'</div>'
      +'<button class="btn-cont" onclick="goS4Month(0)">Start from January &#8250;</button>'
    +'</div>';
}

    var p=r.split('|');

  S7.step=Math.max(S7.step,i);

}

        +'<div class="p0-team-row"><div class="p0-team-av ctrl">SR</div><div><div class="p0-team-name">Sari Rahayu</div><div class="p0-team-role">Controller &middot; Secondary</div></div></div>'
        +'<div class="p0-team-row"><div class="p0-team-av ia">RM</div><div><div class="p0-team-name">Reza Maulana</div><div class="p0-team-role">Implementation Associate</div></div></div>'
        +'<div class="p0-team-row"><div class="p0-team-av spn">HS</div><div><div class="p0-team-name">Hendra Santoso</div><div class="p0-team-role">Director Sponsor &middot; View only</div></div></div>'
      +'</div>'
    +'</div>';

  // ── IA MESSAGE (pre-migration only) ──
  var iaHTML = !inProgress ? ''
    +'<div class="p0-ia-card">'
      +'<div class="p0-ia-hdr">Your Implementation Associate</div>'
      +'<div class="p0-ia-body">'
        +'<div class="p0-ia-av">RM</div>'
        +'<div class="p0-ia-name">Reza Maulana</div>'
        +'<div class="p0-ia-role">Implementation Associate &middot; Klay</div>'
        +'<div class="p0-ia-msg">Everything is configured and ready. When you have your 3 files exported from Accurate, click Begin Migration. I will be notified the moment you upload your first file and will schedule the Stage 2 dimension discovery session with you.</div>'
      +'</div>'
    +'</div>' : '';

  // ── ATTENTION BANNER (in-progress only) ──
  var attnHTML = inProgress ? ''
    +'<div class="p0-attn-card">'
      +'<div class="p0-attn-hdr">&#9651; Action needed</div>'
      +'<div class="p0-attn-body">'
        +'<div class="p0-attn-item"><div class="p0-attn-dot"></div><span>Stage 3 — 62 accounts need your review before CoA sign-off</span></div>'

      +'</div>'
    +'</div>' : '';

  // ── ASSEMBLE ─────────────────────────
  return '<div class="p0-shell">'
    + heroHTML
    +'<div class="p0-body">'
      +'<div class="p0-left">'
        +'<div class="p0-stage-table">'+stageRowsHTML+'</div>'
        + teamHTML
      +'</div>'
      +'<div class="p0-right">'
        + ctaHTML
        + attnHTML
        + cashbackHTML
        + entityHTML
        + iaHTML
      +'</div>'
    +'</div>'
  +'</div>';
}

function rLogin(){
  // inject login overlay over everything
  var el=document.getElementById('login-overlay');
  if(!el){
    el=document.createElement('div');
    el.id='login-overlay';
    el.className='login-overlay';
    document.body.appendChild(el);
  }
  el.style.display='flex';
  el.innerHTML=''
    +'<div class="login-card">'
      // Logo
      +'<div class="login-logo">'
        +'<div class="login-logo-mark">'
          +'<svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">'
            +'<path d="M22 4L6 10V22C6 31 13 38.5 22 41C31 38.5 38 31 38 22V10L22 4Z" fill="#B83D08"/>'
            +'<path d="M22 4L6 10V22C6 31 13 38.5 22 41V4Z" fill="#A03206"/>'
          +'</svg>'
        +'</div>'
      +'</div>'
      // Title
      +'<div class="login-title">Welcome</div>'
      +'<div class="login-sub">Log in to continue to <strong>Klay</strong>.</div>'
      // Error
      +'<div class="login-error" id="login-error">Wrong email or password. Please try again.</div>'
      // Email
      +'<div class="login-field"><label>Email address *</label><input type="email" id="login-email" placeholder="you@company.com" autocomplete="email"/></div>'
      // Password
      +'<div class="login-field"><label>Password *</label><div class="login-pw-wrap"><input type="password" id="login-pw" placeholder="Your password" autocomplete="current-password"/><button class="login-pw-eye" onclick="togglePw()" tabindex="-1"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>'
      // Reset
      +'<button class="login-reset" onclick="void(0)">Reset password</button>'
      // CTA
      +'<button class="btn-login-continue" onclick="submitLogin()">Continue</button>'
      // Divider
      +'<div class="login-divider"><span>OR</span></div>'
      // Google
      +'<button class="btn-login-google" onclick="submitLogin()">'
        +'<svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>'
        +'Continue with Google'
      +'</button>'
    +'</div>'
    // Footer logo
    +'<div class="login-footer">'
      +'<svg class="login-footer-mark" width="24" height="24" viewBox="0 0 44 44" fill="none"><path d="M22 4L6 10V22C6 31 13 38.5 22 41C31 38.5 38 31 38 22V10L22 4Z" fill="white"/><path d="M22 4L6 10V22C6 31 13 38.5 22 41V4Z" fill="rgba(255,255,255,.6)"/></svg>'
    +'</div>';

  // allow Enter key to submit
  setTimeout(function(){
    var pw=document.getElementById('login-pw');
    if(pw)pw.addEventListener('keydown',function(e){if(e.key==='Enter')submitLogin();});
    var em=document.getElementById('login-email');
    if(em)em.addEventListener('keydown',function(e){if(e.key==='Enter')submitLogin();});
  },50);
}

function togglePw(){
  var inp=document.getElementById('login-pw');
  if(inp)inp.type=inp.type==='password'?'text':'password';
}



function submitLogin(){
  var email=document.getElementById('login-email');
  var pw=document.getElementById('login-pw');
  var err=document.getElementById('login-error');
  // demo: any non-empty input works; wrong = show error once
  var e=email?email.value.trim():'';
  var p=pw?pw.value.trim():'';
  if(!e||!p){
    if(err){err.textContent='Please enter your email and password.';err.classList.add('show');}
    return;
  }
  // demo auth: accept any input
  var overlay=document.getElementById('login-overlay');
  if(overlay){overlay.style.display='none';}
  rPhase0();
}
