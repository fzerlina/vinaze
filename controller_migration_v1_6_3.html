.s2-dim-tbl-row:hover td{background:var(--color-surface-sunken);}
.s2-dim-tbl-row-new td{background:var(--color-brand-wash);}
.s2-dim-tbl-name{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--color-text-primary);}
.s2-dim-tbl-empty{padding:24px 12px;text-align:center;color:var(--color-text-secondary);font-size:12px;border-top:1px solid var(--color-border-default);border-bottom:1px solid var(--color-border-default);}
.s2-dim-empty-link{background:transparent;border:none;color:var(--color-brand);cursor:pointer;font-family:var(--font-sans);font-size:12px;text-decoration:underline;padding:0;}

/* Configure button (top-right of substeps) */
.s2-dim-cfg-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:var(--color-surface-raised);border:1px solid var(--color-border-default);border-radius:var(--radius-md);font-size:12px;font-weight:500;color:var(--color-text-primary);cursor:pointer;font-family:var(--font-sans);}
.s2-dim-cfg-btn:hover{background:var(--color-surface-sunken);border-color:var(--color-text-tertiary);}
.s2-dim-cfg-icon{font-size:13px;}

/* Structure Overview dimensions strip */
.s2-orient-dim-strip{margin-top:14px;padding:12px 14px;background:var(--color-surface-raised);border:1px solid var(--color-border-default);border-radius:var(--radius-md);}
.s2-orient-dim-strip-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.s2-orient-dim-strip-lbl{font-size:10px;font-weight:600;color:var(--color-text-tertiary);letter-spacing:0.06em;text-transform:uppercase;}
.s2-orient-dim-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px;}
.s2-orient-dim-card{border:1px solid var(--color-border-default);border-radius:var(--radius-sm);padding:10px 12px;background:var(--color-surface-base);}
.s2-orient-dim-card-name{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--color-text-primary);margin-bottom:3px;}
.s2-orient-dim-card-meta{font-size:11px;color:var(--color-text-tertiary);font-weight:300;}
.s2-orient-dim-card-add{border:1px dashed var(--color-border-strong);background:transparent;color:var(--color-text-secondary);cursor:pointer;font-family:var(--font-sans);font-size:11px;display:flex;align-items:center;justify-content:center;gap:4px;}
.s2-orient-dim-card-add:hover{background:var(--color-surface-sunken);color:var(--color-text-primary);}

/* Workspace state-text column */
.s2-ws-state{font-size:11px;font-weight:500;}
.s2-ws-state-mapped{color:var(--color-success-text);}
.s2-ws-state-proposed{color:#534AB7;display:inline-flex;align-items:center;gap:3px;}
.s2-ws-state-unmapped{color:var(--color-text-tertiary);font-weight:400;}
.s2-ws-state-later{color:var(--color-warning-text);}
.s2-ws-state-icon{font-size:10px;margin-right:3px;}
.s2-ws-confirm-btn{margin-left:8px;font-size:10px;font-weight:500;padding:3px 9px;border-radius:var(--radius-sm);border:0.5px solid #7F77DD;background:transparent;color:#534AB7;cursor:pointer;font-family:var(--font-sans);}
.s2-ws-confirm-btn:hover{background:#EEEDFE;border-color:#534AB7;}

/* Mark for Later button */
.s2-act.later{background:var(--color-surface-raised);color:var(--color-text-secondary);border:1px solid var(--color-border-default);font-size:11px;padding:5px 10px;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-sans);font-weight:500;}
.s2-act.later:hover{background:var(--color-warning-surface);border-color:var(--color-warning-border);color:var(--color-warning-text);}
.s2-act.later.active{background:var(--color-warning-surface);border-color:var(--color-warning-border);color:var(--color-warning-text);}
.s2-act.later.active:hover{background:var(--color-surface-sunken);}

/* Deactivate button */
.s2-act.deact{background:var(--color-surface-raised);color:var(--color-text-secondary);border:1px solid var(--color-border-default);font-size:11px;padding:5px 10px;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-sans);font-weight:500;}
.s2-act.deact:hover{background:var(--color-action-wash);border-color:var(--color-action-subtle);color:var(--color-action);}
.s2-act.deact.active{background:var(--color-action-wash);border-color:var(--color-action-subtle);color:var(--color-action);}
.s2-act.deact.active:hover{background:var(--color-surface-sunken);}

/* Row action menu (kebab + popover) */
.s2-row-menu-wrap{position:relative;display:inline-block;}
.s2-row-menu-btn{background:transparent;border:1px solid var(--color-border-default);border-radius:var(--radius-sm);width:24px;height:24px;cursor:pointer;font-family:var(--font-sans);color:var(--color-text-secondary);font-size:14px;line-height:1;display:inline-flex;align-items:center;justify-content:center;padding:0;}
.s2-row-menu-btn:hover{background:var(--color-surface-sunken);color:var(--color-text-primary);}
.s2-row-menu{position:absolute;right:0;top:28px;background:var(--color-surface-raised);border:1px solid var(--color-border-strong);border-radius:var(--radius-md);box-shadow:0 8px 24px rgba(0,0,0,0.12);padding:4px;min-width:180px;z-index:50;}
.s2-row-menu-item{display:block;width:100%;text-align:left;padding:7px 10px;font-size:12px;background:transparent;border:none;cursor:pointer;font-family:var(--font-sans);color:var(--color-text-primary);border-radius:var(--radius-sm);}
.s2-row-menu-item:hover{background:var(--color-surface-sunken);}
.s2-row-menu-item.active{font-weight:600;}
.s2-row-menu-item.danger:hover{background:var(--color-danger-surface);color:var(--color-danger-text);}
.s2-row-menu-divider{height:1px;background:var(--color-border-default);margin:4px 0;}

/* State pill */
.s2-ws-state-deactivated{color:var(--color-action);}

/* ── New workspace layout: multi-color progress, underline tabs, filter toolbar ── */

/* Multi-color stacked progress */
.s2-prog2{margin:14px 0 16px;}
.s2-prog2-row{display:flex;align-items:baseline;gap:8px;margin-bottom:8px;}
.s2-prog2-num{font-size:22px;font-weight:700;color:var(--color-text-primary);}
.s2-prog2-tot{font-size:13px;color:var(--color-text-tertiary);font-weight:400;}
.s2-prog2-pct{margin-left:auto;font-size:13px;font-weight:600;color:var(--color-text-primary);}
.s2-prog2-bar{display:flex;height:6px;border-radius:var(--radius-full);overflow:hidden;background:var(--color-surface-sunken);}
.s2-prog2-seg{height:100%;}
.s2-prog2-seg-mapped{background:#1D9E75;}
.s2-prog2-seg-proposed{background:#7F77DD;}
.s2-prog2-seg-unmapped{background:#D3D1C7;}
.s2-prog2-seg-later{background:#BA7517;}
.s2-prog2-seg-deact{background:#378ADD;}
.s2-prog2-legend{display:flex;flex-wrap:wrap;gap:18px;margin-top:10px;font-size:11px;color:var(--color-text-secondary);}
.s2-prog2-legend-item{display:inline-flex;align-items:center;gap:5px;}
.s2-prog2-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.s2-prog2-legend-cnt{color:var(--color-text-tertiary);}

/* Underline status tabs (replace old pill filter) */
.s2-tabs{display:flex;gap:0;border-bottom:1px solid var(--color-border-default);margin:8px 0 12px;}
.s2-tab{font-size:12px;padding:9px 0;margin-right:24px;color:var(--color-text-secondary);cursor:pointer;border-bottom:2px solid transparent;font-weight:500;transition:color 0.12s;}
.s2-tab:hover:not(.on){color:var(--color-text-primary);}
.s2-tab.on{color:var(--color-text-primary);border-bottom-color:var(--color-brand);font-weight:600;}
.s2-tab-cnt{color:var(--color-text-tertiary);font-weight:400;margin-left:4px;}
.s2-tab.on .s2-tab-cnt{color:var(--color-text-secondary);}

/* Filter toolbar */
.s2-ftbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.s2-ft-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 11px;background:var(--color-surface-raised);border:1px solid var(--color-border-default);border-radius:var(--radius-md);font-size:12px;font-weight:500;color:var(--color-text-primary);cursor:pointer;font-family:var(--font-sans);}
.s2-ft-btn:hover{background:var(--color-surface-sunken);border-color:var(--color-text-tertiary);}
.s2-ft-btn.active{background:var(--color-brand-wash);border-color:var(--color-brand);color:var(--color-brand-deep);}
.s2-ft-btn.disabled{opacity:0.5;cursor:not-allowed;color:var(--color-text-tertiary);background:var(--color-surface-raised);border-color:var(--color-border-default);}
.s2-ft-btn.disabled:hover{background:var(--color-surface-raised);border-color:var(--color-border-default);}
.s2-ft-btn-icon{font-size:13px;line-height:1;}
.s2-ft-btn-caret{font-size:9px;color:var(--color-text-tertiary);margin-left:2px;}
.s2-ft-badge{background:var(--color-brand);color:var(--color-text-inverse);padding:1px 6px;border-radius:var(--radius-full);font-size:10px;font-weight:600;line-height:1.4;}
.s2-ft-chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:5px 10px;background:var(--color-surface-sunken);border:1px solid var(--color-border-default);border-radius:var(--radius-md);color:var(--color-text-primary);font-weight:500;}
.s2-ft-chip-lbl{color:var(--color-text-tertiary);font-weight:400;}
.s2-ft-chip-x{font-size:11px;cursor:pointer;color:var(--color-text-tertiary);margin-left:2px;line-height:1;padding:0 2px;}
.s2-ft-chip-x:hover{color:var(--color-text-primary);}
.s2-ft-chip-more{font-size:11px;padding:5px 8px;color:var(--color-text-tertiary);background:transparent;border:1px dashed var(--color-border-default);border-radius:var(--radius-md);cursor:pointer;font-family:var(--font-sans);}
.s2-ft-chip-more:hover{background:var(--color-surface-sunken);color:var(--color-text-primary);}
.s2-ft-search{flex:1;display:flex;align-items:center;gap:6px;padding:7px 11px;background:var(--color-surface-raised);border:1px solid var(--color-border-default);border-radius:var(--radius-md);min-width:240px;}
.s2-ft-search:focus-within{border-color:var(--color-text-tertiary);}
.s2-ft-search-icon{font-size:13px;color:var(--color-text-tertiary);flex-shrink:0;}
.s2-ft-search-input{flex:1;border:none;outline:none;background:transparent;font-size:12px;font-family:var(--font-sans);color:var(--color-text-primary);}
.s2-ft-search-input::placeholder{color:var(--color-text-tertiary);}
.s2-ft-search-clear{font-size:11px;color:var(--color-text-tertiary);cursor:pointer;background:transparent;border:none;padding:0 4px;font-family:var(--font-sans);}
.s2-ft-search-clear:hover{color:var(--color-text-primary);}

/* Tree-filter dropdown */
.s2-ft-pop-anchor{position:relative;display:inline-block;}
.s2-ft-pop{position:absolute;top:36px;left:0;z-index:60;background:var(--color-surface-raised);border:1px solid var(--color-border-strong);border-radius:var(--radius-md);box-shadow:0 8px 24px rgba(0,0,0,0.12);padding:10px;width:340px;animation:s2-ft-pop-in 0.12s ease-out;}
@keyframes s2-ft-pop-in{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
.s2-ft-pop-title{font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;}
.s2-ft-pop-search{display:flex;align-items:center;gap:6px;padding:6px 8px;background:var(--color-surface-sunken);border:1px solid var(--color-border-default);border-radius:var(--radius-sm);margin-bottom:10px;}
.s2-ft-pop-search-input{flex:1;border:none;outline:none;background:transparent;font-size:11px;font-family:var(--font-sans);color:var(--color-text-primary);}
.s2-ft-pop-tree{max-height:340px;overflow-y:auto;font-size:12px;margin:0 -4px;}
.s2-ft-tree-row{display:flex;align-items:center;gap:6px;padding:4px 6px;cursor:pointer;border-radius:var(--radius-sm);}
.s2-ft-tree-row:hover{background:var(--color-surface-sunken);}
.s2-ft-tree-chev{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;font-size:10px;color:var(--color-text-tertiary);flex-shrink:0;cursor:pointer;}
.s2-ft-tree-chev.placeholder{visibility:hidden;}
.s2-ft-tree-chk{width:13px;height:13px;cursor:pointer;flex-shrink:0;margin:0;}
.s2-ft-tree-name{flex:1;color:var(--color-text-primary);}
.s2-ft-tree-name.top{font-weight:600;}
.s2-ft-tree-name.mid{font-weight:500;}
.s2-ft-tree-cnt{font-size:11px;color:var(--color-text-tertiary);font-weight:400;}
.s2-ft-tree-row.matched{background:var(--color-brand-wash);}
.s2-ft-tree-row.matched .s2-ft-tree-name{color:var(--color-brand-deep);}
.s2-ft-pop-actions{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:8px;border-top:1px solid var(--color-border-default);}
.s2-ft-pop-clear{font-size:11px;color:var(--color-text-secondary);background:transparent;border:none;cursor:pointer;font-family:var(--font-sans);font-weight:500;padding:4px 0;}
.s2-ft-pop-clear:hover{color:var(--color-text-primary);}
.s2-ft-pop-clear:disabled{color:var(--color-text-disabled);cursor:not-allowed;}
.s2-ft-pop-apply{font-size:12px;padding:5px 14px;background:var(--color-brand);color:var(--color-text-inverse);border:none;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-sans);font-weight:600;}
.s2-ft-pop-apply:hover{background:var(--color-brand-hover);}

/* Multi-section filter dropdown (the "Filter" overflow with Confidence / Tier / Dimensions) */
.s2-ft-pop-multi{width:300px;}
.s2-ft-section{margin-bottom:14px;}
.s2-ft-section:last-child{margin-bottom:6px;}
.s2-ft-section-hdr{font-size:10px;font-weight:600;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;padding:0 4px;}
.s2-ft-chkrow{display:flex;align-items:center;gap:8px;padding:5px 6px;cursor:pointer;border-radius:var(--radius-sm);font-size:12px;color:var(--color-text-primary);}
.s2-ft-chkrow:hover{background:var(--color-surface-sunken);}
.s2-ft-chkrow input{flex-shrink:0;cursor:pointer;}
.s2-ft-chkrow-lbl{flex:1;display:flex;align-items:center;gap:6px;}
.s2-ft-tier-icon{display:inline-block;font-size:11px;line-height:1;}
.s2-ft-tier-icon.hard{color:#A02020;}
.s2-ft-tier-icon.soft{color:#BA7517;}
.s2-ft-tier-icon.warn{color:#185FA5;}

/* Issues banner (top of workspace) */
/* Issue cluster boxes (4-column grid above the workspace toolbar) */
.s2-issboxes-section{margin:14px 0 18px;}
.s2-issboxes{display:grid;grid-template-columns:repeat(4, 1fr);gap:10px;}
.s2-issboxes-toggle{display:flex;justify-content:flex-end;margin-top:8px;}
.s2-issboxes-toggle-btn{font-size:11px;font-weight:500;padding:5px 10px;border-radius:var(--radius-md);border:0.5px solid var(--color-border-default);background:transparent;color:var(--color-text-secondary);cursor:pointer;font-family:var(--font-sans);}
.s2-issboxes-toggle-btn:hover{background:var(--color-surface-sunken);color:var(--color-text-primary);border-color:var(--color-border-strong);}
.s2-issboxes-toggle-cnt{color:var(--color-text-tertiary);font-weight:400;margin-left:2px;}
.s2-issbox{background:var(--color-surface-raised);border-radius:var(--radius-md);padding:12px 14px;display:flex;flex-direction:column;gap:8px;border:1px solid;border-left-width:3px;}
.s2-issbox.hard{border-color:#EAB8B8;border-left-color:#A02020;}
.s2-issbox.soft{border-color:#E8C870;border-left-color:#BA7517;}
.s2-issbox.warn{border-color:#B5D4F4;border-left-color:#185FA5;}
.s2-issbox-hd{display:flex;align-items:flex-start;gap:8px;}
.s2-issbox-icon{font-size:13px;line-height:1.3;flex-shrink:0;}
.s2-issbox.hard .s2-issbox-icon{color:#A02020;}
.s2-issbox.soft .s2-issbox-icon{color:#BA7517;}
.s2-issbox.warn .s2-issbox-icon{color:#185FA5;}
.s2-issbox-name{font-size:13px;font-weight:600;line-height:1.3;}
.s2-issbox.hard .s2-issbox-name{color:#501313;}
.s2-issbox.soft .s2-issbox-name{color:#412402;}
.s2-issbox.warn .s2-issbox-name{color:#0E3A6B;}
.s2-issbox-cnt{font-size:11px;font-weight:500;}
.s2-issbox.hard .s2-issbox-cnt{color:#791F1F;}
.s2-issbox.soft .s2-issbox-cnt{color:#633806;}
.s2-issbox.warn .s2-issbox-cnt{color:#185FA5;}
.s2-issbox-actions{display:flex;align-items:center;gap:8px;margin-top:auto;}
.s2-issbox-filter{margin-left:auto;font-size:11px;font-weight:500;background:transparent;border:none;cursor:pointer;font-family:var(--font-sans);text-decoration:underline;padding:0;}
.s2-issbox.hard .s2-issbox-filter{color:#501313;}
.s2-issbox.soft .s2-issbox-filter{color:#412402;}
.s2-issbox.warn .s2-issbox-filter{color:#0E3A6B;}
.s2-issbox-filter:hover{opacity:0.75;}

/* Inline issue badges in row */
.s2-issbadge{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:1px 7px;background:#FBF0F0;color:#791F1F;border-radius:var(--radius-full);font-weight:500;margin-right:4px;cursor:pointer;line-height:1.5;}
.s2-issbadge.soft{background:#FDF3E0;color:#7A4D00;}
.s2-issbadge.warn{background:#E6F0FA;color:#0E3A6B;}
.s2-issbadge:hover{filter:brightness(0.95);}
.s2-issbadge-icon{font-size:9px;}

/* Status filter pills (above table — replaces underline tabs) */
.s2-pills{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0 12px;}

/* Informational banner — shown above the filter pills when Proposed > 0. Dismissable. */
.s2-bulkbar{display:flex;align-items:center;gap:14px;padding:11px 14px;margin:0 0 12px;background:#EEEDFE;border:0.5px solid #AFA9EC;border-left:3px solid #534AB7;border-radius:var(--radius-md);}
.s2-bulkbar-icon{font-size:18px;color:#534AB7;flex-shrink:0;line-height:1;}
.s2-bulkbar-msg{flex:1;min-width:0;}
.s2-bulkbar-title{font-size:12px;font-weight:600;color:#26215C;line-height:1.3;}
.s2-bulkbar-sub{font-size:11px;color:#3C3489;font-weight:300;margin-top:2px;line-height:1.4;}
.s2-bulkbar-sub strong{font-weight:600;}
.s2-bulkbar-close{flex-shrink:0;width:24px;height:24px;border-radius:var(--radius-sm);border:none;background:transparent;color:#534AB7;cursor:pointer;font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center;font-family:var(--font-sans);padding:0;}
.s2-bulkbar-close:hover{background:rgba(83,74,183,0.1);color:#26215C;}
.s2-pill{font-size:12px;padding:6px 14px;border-radius:var(--radius-full);background:transparent;border:0.5px solid transparent;color:var(--color-text-secondary);cursor:pointer;font-family:var(--font-sans);font-weight:500;}
.s2-pill:hover:not(.on){background:var(--color-surface-sunken);color:var(--color-text-primary);}
.s2-pill.on{background:var(--color-surface-raised);color:var(--color-text-primary);border-color:var(--color-border-strong);}
.s2-pill-cnt{color:var(--color-text-tertiary);font-weight:400;margin-left:4px;}
.s2-pill.on .s2-pill-cnt{color:var(--color-text-secondary);}

/* Edge-to-edge table (no card wrapper) */
.s2-ws-tbl-flat{width:100%;border-collapse:collapse;font-size:12px;border-top:1px solid var(--color-border-default);border-bottom:1px solid var(--color-border-default);}
.s2-ws-tbl-flat th{text-align:left;font-size:9px;font-weight:700;color:var(--color-text-tertiary);letter-spacing:.07em;text-transform:uppercase;padding:10px 12px;border-bottom:1px solid var(--color-border-default);background:transparent;}
.s2-ws-tbl-flat th.amt{text-align:right;}
.s2-ws-tbl-flat td{padding:10px 12px;border-bottom:1px solid var(--color-border-subtle);font-weight:300;color:var(--color-text-secondary);vertical-align:middle;}
.s2-ws-tbl-flat tr:last-child td{border-bottom:none;}
.s2-ws-tbl-flat tr:hover td{background:var(--color-surface-sunken);}
.s2-ws-tbl-flat tr.s2-row-header td{background:var(--color-surface-sunken);padding:7px 10px 6px;border-top:1px solid var(--color-border-default);}
.s2-ws-tbl-flat tr.s2-row-group-hdr td{background:var(--color-brand-wash);border-top:1px solid var(--color-brand-subtle);}

/* ═══════════════════════════════════════════════════════════════
   STAGE 3 — GL MAPPING (ported from stage3_revised_3.html)
   The whole namespace lives below; v1.6.2's tokens (--color-action,
   --color-success-text, etc.) carry the v1.6.2 look through verbatim.
═══════════════════════════════════════════════════════════════ */

/* GL Mapping — button additions. v1.6.2's .btn-confirm is the filled-green confirm-action
   button; the revised file used .btn-confirm for an outline "active filter" style. To avoid
   the clash, the ported code uses .glm-btn-pri (renamed in-place) for that outline style. */
.btn-action{background:var(--color-action);color:var(--color-text-inverse);border:none;border-radius:var(--radius-md);padding:9px 20px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-sans);transition:background var(--transition-base);}
.btn-action:hover:not(:disabled){background:var(--color-action-hover);}
.btn-action:disabled{opacity:.4;cursor:default;}
.btn-ia{background:var(--color-surface-raised);border:1px solid var(--color-action-subtle);color:var(--color-action);font-size:11px;padding:5px 12px;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-sans);font-weight:500;transition:background var(--transition-base);}
.btn-ia:hover{background:var(--color-action-wash);}
.glm-btn-pri{background:var(--color-surface-raised);border:1.5px solid var(--color-text-primary);color:var(--color-text-primary);font-size:12px;padding:5px 14px;border-radius:var(--radius-sm);cursor:pointer;font-weight:600;font-family:var(--font-sans);}
.glm-btn-pri:hover{background:var(--color-surface-sunken);}

/* Workspace shell — fills the area under the stagebar, no padding around it */
.ws-shell{display:flex;align-items:stretch;width:100%;min-height:600px;border:1px solid var(--color-border-default);border-radius:var(--radius-lg);overflow:hidden;background:var(--color-surface-raised);}

/* === Skinny month rail (column 1, ~88px) === */
.ws-month-rail-skinny{width:88px;background:var(--color-surface-raised);border-right:1px solid var(--color-border-default);padding:8px 6px;flex-shrink:0;overflow-y:auto;display:flex;flex-direction:column;}
.skinny-mc-card{padding:7px 7px 6px;border-radius:var(--radius-sm);cursor:pointer;margin-bottom:3px;transition:background var(--transition-base);}
.skinny-mc-card:hover{background:var(--color-surface-sunken);}
.skinny-mc-card.done{background:var(--color-success-surface);}
.skinny-mc-card.active{background:var(--color-warning-surface);box-shadow:0 0 0 1.5px var(--color-action-wash);}
.skinny-mc-card.notclosed{opacity:.55;}
.skinny-mc{display:flex;align-items:center;margin-bottom:5px;}
.skinny-mc-dot{width:6px;height:6px;border-radius:50%;margin-right:6px;flex-shrink:0;}
.skinny-mc-dot.done{background:var(--color-success-text);}
.skinny-mc-dot.active{background:var(--color-warning-text);}
.skinny-mc-dot.warn{background:var(--color-warning-text);}
.skinny-mc-dot.todo{background:var(--color-border-strong);}
.skinny-mc-name{font-size:11px;flex:1;}
.skinny-mc-name.done{font-weight:500;color:var(--color-success-text);}
.skinny-mc-name.active{font-weight:600;color:var(--color-warning-text);}
.skinny-mc-name.warn{font-weight:500;}
.skinny-mc-name.todo{color:var(--color-text-secondary);}
.skinny-mc-name.notclosed{color:var(--color-text-tertiary);}
.skinny-mc-pill{font-size:8px;padding:1px 4px;border-radius:var(--radius-full);font-weight:600;flex-shrink:0;}
.skinny-mc-pill.done{color:var(--color-success-text);background:transparent;}
.skinny-mc-pill.active{background:var(--color-warning-border);color:var(--color-warning-text);}
.skinny-mc-pill.warn{background:var(--color-warning-surface);color:var(--color-warning-text);}
.skinny-mc-prog{height:2px;background:var(--color-border-default);overflow:hidden;border-radius:var(--radius-full);}
.skinny-mc-prog.done-bg{background:var(--color-success-border);}
.skinny-mc-prog.active-bg{background:var(--color-warning-border);}
.skinny-mc-prog.all-bg{background:var(--color-action-subtle);}
.skinny-mc-prog-fill{height:2px;border-radius:var(--radius-full);}
.skinny-mc-prog-fill.done{background:var(--color-success-text);}
.skinny-mc-prog-fill.active{background:var(--color-warning-text);}
.skinny-mc-prog-fill.warn{background:var(--color-warning-text);}
.skinny-mc-prog-fill.all{background:var(--color-action);}
.skinny-mc-flags{display:flex;gap:3px;margin-top:5px;}
.skinny-mc-flag{font-size:9px;font-weight:600;}
.skinny-mc-flag.var{color:var(--color-warning-text);}
.skinny-mc-flag.flag-ia{color:var(--color-danger-text);}
.skinny-mc-rail-overall{border-top:1px solid var(--color-border-default);padding-top:8px;margin-top:8px;padding-left:0;padding-right:0;}
.skinny-mc-rail-overall-lbl{font-size:8px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;padding:0 4px;font-weight:600;}
.skinny-mc-rail-overall-bar{height:2px;background:var(--color-border-default);border-radius:var(--radius-full);margin:0 4px 3px;overflow:hidden;}
.skinny-mc-rail-overall-fill{height:2px;background:var(--color-warning-text);}
.skinny-mc-rail-overall-meta{font-size:9px;color:var(--color-text-tertiary);padding:0 4px;}

/* All-months pin at the top of the month rail */
.skinny-mc-card.all-pin{background:var(--color-action-wash);border:1px solid var(--color-action-subtle);}
.skinny-mc-card.all-pin:hover{background:var(--color-action-wash);border-color:var(--color-action);}
.skinny-mc-card.all-pin.active-all{background:var(--color-action-wash);box-shadow:0 0 0 1.5px var(--color-action-wash),inset 5px 0 0 var(--color-action);}
.skinny-mc-dot.all-dot{background:var(--color-action);}
.skinny-mc-name.all-name{font-weight:600;color:var(--color-action);text-transform:uppercase;font-size:10px;letter-spacing:.04em;}
.skinny-mc-all-meta{font-size:8px;color:var(--color-action);font-weight:600;text-align:center;margin-top:4px;text-transform:uppercase;letter-spacing:.04em;}
.skinny-mc-divider{height:1px;background:var(--color-border-default);margin:4px 6px 8px;}

/* === Cluster column (column 2, ~250px) === */
.cluster-col{width:250px;background:var(--color-surface-raised);border-right:1px solid var(--color-border-default);flex-shrink:0;overflow-y:auto;display:flex;flex-direction:column;}
.cluster-col-hdr{padding:11px 12px;border-bottom:1px solid var(--color-border-default);background:var(--color-surface-sunken);}
.cluster-col-hdr-title{font-size:13px;font-weight:600;color:var(--color-text-primary);}
.cluster-col-hdr-meta{font-size:11px;color:var(--color-text-tertiary);margin-top:2px;font-weight:300;}
.cluster-col-section-lbl{padding:11px 11px 5px;font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.06em;}

/* Account category card */
.cluster-card{position:relative;margin:0 7px 4px;padding:10px 11px;border-radius:var(--radius-md);border:1px solid var(--color-border-default);cursor:pointer;transition:border-color var(--transition-base),background var(--transition-base);background:var(--color-surface-raised);}
.cluster-card:hover{border-color:var(--color-action-subtle);}
.cluster-card.active{background:var(--color-action-wash);border-color:var(--color-action-subtle);box-shadow:inset 5px 0 0 var(--color-action);}
.cluster-card.active::after{content:"\25B8";position:absolute;right:-2px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--color-action);font-weight:700;line-height:1;}
.cluster-card.has-work{border-left:3px solid var(--color-warning-text);border-color:var(--color-warning-border);}
.cluster-card.has-ia{border-left:3px solid var(--color-action);border-color:var(--color-action-subtle);}
.cluster-card.done{border-left:3px solid var(--color-success-text);border-color:var(--color-success-border);background:var(--color-success-surface);}
.cluster-card.danger{border-left:3px solid var(--color-danger-text);border-color:var(--color-danger-border);}
.cluster-card.active.done{background:var(--color-action-wash);}
.cluster-card.active.has-work,.cluster-card.active.has-ia,.cluster-card.active.done,.cluster-card.active.danger{border-left:3px solid transparent;box-shadow:inset 5px 0 0 var(--color-action);}
.cluster-card-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.cluster-card-name{font-size:13px;font-weight:600;color:var(--color-text-primary);}
.cluster-card-name.done-clr{color:var(--color-success-text);}
.cluster-card-pill-wrap{display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end;}
.cluster-card-pill{font-size:9px;padding:1px 6px;border-radius:var(--radius-full);font-weight:600;flex-shrink:0;}
.cluster-card-pill.review{background:var(--color-warning-surface);color:var(--color-warning-text);}
.cluster-card-pill.done{background:var(--color-success-surface);color:var(--color-success-text);}
.cluster-card-pill.ia{background:var(--color-action-wash);color:var(--color-action);}
.cluster-card-pill.flag-ia{background:var(--color-danger-surface);color:var(--color-danger-text);}
.cluster-card-num{display:flex;align-items:baseline;gap:4px;margin-bottom:4px;}
.cluster-card-num-big{font-size:18px;font-weight:700;font-family:var(--font-mono);color:var(--color-text-primary);line-height:1;}
.cluster-card-num-big.done-clr{color:var(--color-success-text);}
.cluster-card-num-lbl{font-size:10px;color:var(--color-text-tertiary);}
.cluster-card-num-lbl.done-clr{color:var(--color-success-text);}
.cluster-card-prog{height:3px;background:var(--color-border-default);border-radius:var(--radius-full);overflow:hidden;margin-bottom:6px;}
.cluster-card-prog.done-bg{background:var(--color-success-border);}
.cluster-card-prog-fill{height:3px;border-radius:var(--radius-full);}
.cluster-card-prog-fill.warn{background:var(--color-success-text);}
.cluster-card-prog-fill.done{background:var(--color-success-text);}
.cluster-card-prog-fill.manual{background:var(--color-action);}
.cluster-card-breakdown{display:flex;gap:10px;font-size:10px;color:var(--color-text-secondary);}
.cluster-card-breakdown-num{font-weight:600;}
.cluster-card-breakdown-num.success{color:var(--color-success-text);}
.cluster-card-breakdown-num.warn{color:var(--color-warning-text);}
.cluster-card-breakdown-num.action{color:var(--color-action);}

/* Smaller cross-category cluster card */
.cross-cluster-card{margin:0 7px 4px;padding:9px 11px;border-radius:var(--radius-md);border:1px solid var(--color-border-default);cursor:pointer;transition:border-color var(--transition-base);background:var(--color-surface-raised);}
.cross-cluster-card.danger{border:1px solid var(--color-danger-border);}
.cross-cluster-card-name{font-size:12px;font-weight:500;color:var(--color-text-primary);line-height:1.3;}
.cross-cluster-card-meta{font-size:10px;color:var(--color-text-tertiary);margin-top:1px;}

/* === Workspace pane (column 3) === */
.workspace-pane{flex:1;background:var(--color-surface-raised);display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.workspace-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;}
.workspace-empty-arrow{font-size:32px;color:var(--color-text-tertiary);margin-bottom:10px;opacity:.5;}
.workspace-empty-title{font-size:14px;font-weight:500;color:var(--color-text-secondary);margin-bottom:6px;}
.workspace-empty-desc{font-size:12px;color:var(--color-text-tertiary);font-weight:300;text-align:center;max-width:380px;}

.workspace-hdr{padding:14px 18px 12px;border-bottom:1px solid var(--color-border-default);}
.workspace-hdr-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.workspace-hdr-title{font-size:14px;font-weight:600;color:var(--color-text-primary);}
.workspace-hdr-meta{font-size:11px;color:var(--color-text-tertiary);margin-top:2px;font-weight:300;}
.workspace-filter-row{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.workspace-filter-row .filter-lbl{font-size:11px;color:var(--color-text-tertiary);font-weight:300;}

/* AI batch banner */
.batch-banner-wrap{padding:12px 18px;background:var(--color-surface-raised);border-bottom:1px solid var(--color-border-default);}
.batch-banner{padding:11px 14px;background:var(--color-success-surface);border:1px solid var(--color-success-border);border-left:3px solid var(--color-success-text);border-radius:var(--radius-md);}
.batch-banner-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.batch-banner-text{flex:1;min-width:0;}
.batch-banner-title{font-size:12px;font-weight:600;color:var(--color-success-text);line-height:1.3;}
.batch-banner-meta{font-size:11px;color:var(--color-success-text);opacity:.85;margin-top:2px;}
.batch-banner-actions{display:flex;gap:6px;flex-shrink:0;}

/* IA recommendation band */
.ia-band-wrap{padding:0 18px 12px;background:var(--color-surface-raised);}
.ia-band{padding:11px 14px;background:var(--color-action-wash);border:1px solid var(--color-action-subtle);border-left:3px solid var(--color-action);border-radius:var(--radius-md);}
.ia-band-lbl{font-size:10px;font-weight:600;color:var(--color-action);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.ia-band-text{font-size:12px;color:var(--color-text-primary);line-height:1.5;margin-bottom:8px;}
.ia-band-attr{font-size:11px;color:var(--color-text-tertiary);margin-bottom:8px;font-style:italic;}
.ia-band-actions{display:flex;gap:6px;}

.workspace-section-lbl{padding:10px 18px 6px;background:var(--color-surface-sunken);border-bottom:1px solid var(--color-border-default);font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em;}

/* Dense table inside workspace */
.workspace-table-wrap{flex:1;overflow-y:auto;}
.workspace-table{width:100%;border-collapse:collapse;font-size:12px;}
.workspace-table thead tr{background:var(--color-surface-sunken);border-bottom:1px solid var(--color-border-default);}
.workspace-table th{text-align:left;padding:7px 6px;font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em;}
.workspace-table th:first-child{padding-left:14px;}
.workspace-table th:last-child{padding-right:14px;text-align:right;}
.workspace-table th.amt{text-align:right;}
.workspace-table th.conf{text-align:center;}
.workspace-table tbody tr{border-bottom:1px solid var(--color-border-default);}
.workspace-table tbody tr:hover{background:var(--color-surface-sunken);}
.workspace-table td{padding:7px 6px;}
.workspace-table td:first-child{padding-left:14px;}
.workspace-table td:last-child{padding-right:14px;text-align:right;}
.workspace-table td.mono{font-family:var(--font-mono);font-size:11px;color:var(--color-text-tertiary);}
.workspace-table td.amt{text-align:right;font-family:var(--font-mono);font-weight:500;}
.workspace-table td.conf{text-align:center;font-weight:600;}
.workspace-table td.conf.hi{color:var(--color-success-text);}
.workspace-table td.conf.med{color:var(--color-warning-text);}
.workspace-table td.conf.lo{color:var(--color-danger-text);}
.workspace-table tr.outlier-row{background:var(--color-warning-surface);}
.workspace-table tr.outlier-row:hover{background:var(--color-warning-surface);}
.workspace-table tr.flagged-row{background:var(--color-danger-surface);opacity:.85;}
.workspace-row-actions{display:flex;gap:3px;justify-content:flex-end;}
.tbl-btn{font-size:10px;padding:2px 7px;border-radius:var(--radius-sm);border:1px solid var(--color-border-default);background:transparent;cursor:pointer;font-family:var(--font-sans);color:var(--color-text-primary);}
.tbl-btn:hover{background:var(--color-surface-sunken);}
.tbl-btn.confirm{font-weight:500;border-color:var(--color-border-strong);}
.tbl-btn.flag{color:var(--color-action);border-color:var(--color-action-subtle);}
.tbl-btn.override-link{color:var(--color-text-secondary);}

/* Checkbox column */
.workspace-table th.cb-col,.workspace-table td.cb-col{width:32px;padding-left:14px;padding-right:0;text-align:left;}
.workspace-table td.cb-col input[type="checkbox"],.workspace-table th.cb-col input[type="checkbox"]{cursor:pointer;margin:0;}

/* Coverage workspace context columns */
.workspace-table th.cov-context,.workspace-table td.cov-context{background:var(--color-action-wash);}
.workspace-table tbody tr:hover td.cov-context{background:var(--color-action-wash);}

/* Bulk action bar — appears above table when rows are selected */
.bulk-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:8px 18px;background:var(--color-action-wash);border-top:1px solid var(--color-action-subtle);border-bottom:1px solid var(--color-action-subtle);}
.bulk-bar-count{font-size:12px;font-weight:600;color:var(--color-action);}
.bulk-bar-actions{display:flex;align-items:center;gap:6px;}

/* Bulk override / flag form */
.bulk-form{padding:12px 18px;background:var(--color-action-wash);border-top:1px solid var(--color-action-subtle);border-bottom:1px solid var(--color-action-subtle);}
.bulk-form-title{font-size:12px;font-weight:600;color:var(--color-action);margin-bottom:8px;}
.bulk-form-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.bulk-form-input{flex:1;font-size:11px;padding:5px 8px;border:1px solid var(--color-border-default);border-radius:var(--radius-sm);background:var(--color-surface-raised);font-family:var(--font-sans);}
.bulk-form-textarea{width:100%;font-size:11px;padding:6px 8px;border:1px solid var(--color-border-default);border-radius:var(--radius-sm);background:var(--color-surface-raised);font-family:inherit;resize:vertical;min-height:48px;}
.bulk-form-actions{display:flex;gap:6px;justify-content:flex-end;}

.workspace-pagination{padding:8px 14px;background:var(--color-surface-sunken);border-top:1px solid var(--color-border-default);font-size:11px;color:var(--color-text-tertiary);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.workspace-pagination-link{font-size:11px;background:none;border:none;color:var(--color-action);cursor:pointer;font-weight:500;font-family:var(--font-sans);}

/* Decisions / Browse all toggle (lives in the workspace header on GL Mapping) */
.ws-toggle-wrap{display:flex;align-items:center;gap:6px;}
.ws-toggle-btn{font-size:11px;padding:4px 10px;border-radius:var(--radius-md);background:transparent;cursor:pointer;font-weight:500;font-family:var(--font-sans);}
.ws-toggle-btn.active{border:1px solid var(--color-text-primary);color:var(--color-text-primary);}
.ws-toggle-btn.inactive{border:1px solid var(--color-border-default);color:var(--color-text-tertiary);}
.ws-toggle-btn.inactive:hover{color:var(--color-text-secondary);border-color:var(--color-border-strong);}

/* Variance / status badges (shared with TB review namespace, but only used by GL Mapping flag rows in this file) */
.var-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:var(--radius-full);white-space:nowrap;display:inline-block;}
.vb-inv{background:var(--color-warning-surface);color:var(--color-warning-text);border:1px solid var(--color-warning-border);}
.vb-rec{background:var(--color-action-wash);color:var(--color-action);border:1px solid var(--color-action-subtle);}

/* Flag form (per-row Flag-to-IA inline form) */
.flag-form{padding:10px 14px;background:var(--color-action-wash);border:1px solid var(--color-action-subtle);border-radius:var(--radius-md);margin:8px 0;}
.flag-form-title{font-size:11px;font-weight:600;color:var(--color-action);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;}
.flag-textarea{width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--color-border-default);border-radius:var(--radius-sm);background:var(--color-surface-raised);font-family:inherit;resize:vertical;min-height:54px;margin-bottom:8px;}
.flag-info-box{font-size:11px;color:var(--color-text-secondary);background:var(--color-surface-raised);padding:7px 10px;border-radius:var(--radius-sm);margin-bottom:8px;line-height:1.45;}
.flag-actions{display:flex;gap:6px;justify-content:flex-end;}
.btn-flag-confirm{background:var(--color-action);color:var(--color-text-inverse);border:none;border-radius:var(--radius-sm);padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font-sans);}
.btn-flag-confirm:hover{background:var(--color-action-hover);}
.btn-flag-cancel{background:transparent;border:1px solid var(--color-border-default);color:var(--color-text-secondary);font-size:11px;padding:5px 12px;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-sans);}

/* Flagged / resolved row display */
.flag-orig,.flag-res{font-size:11px;background:var(--color-surface-sunken);padding:6px 10px;border-radius:var(--radius-sm);margin-top:4px;}
.flag-orig-lbl,.flag-res-lbl{font-size:9px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
.flag-res-attr{font-size:10px;color:var(--color-text-tertiary);font-style:italic;margin-top:3px;}
.flag-resolution-actions{display:flex;gap:6px;margin-top:6px;}
.flag-resolved{background:var(--color-action-wash);border-left:3px solid var(--color-action);padding:8px 12px;border-radius:0 var(--radius-md) var(--radius-md) 0;margin:4px 0;}

/* Flag-row CSS for the orphan row-variant render functions (renderAutoMappedRow,
   renderFlagFormRow, renderFlaggedTxnRow, renderStandardTxnRow, renderFlagResolvedRow).
   These aren't called by the active flow but were ported for parity. */
.txn-row{padding:10px 14px;border-top:1px solid var(--color-border-subtle);display:flex;align-items:center;gap:10px;}
.txn-row.confirmed{background:var(--color-success-surface);}
.txn-row.flagged{background:var(--color-warning-surface);}

/* IA recommendation small accent class used inside batch / IA rows */
.ia{color:var(--color-action);}

/* ═══════════════════════════════════════════════════════════════
   GL MAPPING VERIFICATION (v1.7.0 — replaces decision/cluster workflow)
   Layout: skinny month rail + wide workspace. Workspace contains:
     1. Progress bar (Confirmed / Pending / Marked for Later)
     2. Coverage view tiles (All / Top 50 / Random / Big-txn exception)
     3. Pill filter strip (All / Pending / Confirmed / Marked for Later)
     4. Filter bar (Legacy acct dropdown · Klay acct dropdown · More filters · Search)
     5. Verification table — Edit / Confirm / Mark for Later / Re-investigate
═══════════════════════════════════════════════════════════════ */

/* Workspace pane fills the area to the right of the rail */
.glm-ws{flex:1;background:var(--color-surface-raised);display:flex;flex-direction:column;min-width:0;overflow:hidden;}
/* The top section (header + progress + tiles + pills + filter bar) is fixed-height —
   it shrinks to its content, NOT flex-grow. Only the table region below it grows. */
.glm-ws-inner{flex:0 0 auto;padding:18px 24px 4px;}

/* Workspace header — month title + meta */
.glm-ws-hdr{display:flex;align-items:baseline;justify-content:space-between;gap:14px;margin-bottom:14px;}
.glm-ws-hdr-title{font-size:18px;font-weight:700;color:var(--color-text-primary);letter-spacing:-0.01em;}
.glm-ws-hdr-sub{font-size:12px;color:var(--color-text-tertiary);font-weight:400;margin-top:2px;}
.glm-ws-hdr-meta{font-size:11px;color:var(--color-text-tertiary);font-weight:300;}

/* Progress strip (matches s2-prog2 visual language) */
.glm-prog{margin-bottom:18px;}
/* Page-level "overall progress" — sits between the stage description and the workspace shell.
   Slightly more breathing room so it reads as a hero summary, not a workspace strip. */
.glm-prog-overall{margin:18px 0 22px;padding:14px 16px;background:var(--color-surface-raised);border:1px solid var(--color-border-default);border-radius:var(--radius-md);}
.glm-prog-row{display:flex;align-items:baseline;gap:8px;margin-bottom:8px;}
.glm-prog-num{font-size:22px;font-weight:700;color:var(--color-text-primary);}
.glm-prog-tot{font-size:13px;color:var(--color-text-tertiary);font-weight:400;}
.glm-prog-pct{margin-left:auto;font-size:13px;font-weight:600;color:var(--color-text-primary);}
.glm-prog-bar{display:flex;height:6px;border-radius:var(--radius-full);overflow:hidden;background:var(--color-surface-sunken);}
.glm-prog-seg{height:100%;}
.glm-prog-seg-confirmed{background:#1D9E75;}
.glm-prog-seg-pending{background:#D3D1C7;}
.glm-prog-seg-later{background:#BA7517;}
.glm-prog-seg-reinv{background:#A02020;}
.glm-prog-legend{display:flex;flex-wrap:wrap;gap:18px;margin-top:10px;font-size:11px;color:var(--color-text-secondary);}
.glm-prog-legend-item{display:inline-flex;align-items:center;gap:5px;}
.glm-prog-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.glm-prog-legend-cnt{color:var(--color-text-tertiary);}

/* Coverage tiles row */
.glm-cov-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px;}
.glm-cov-tile{border:1px solid var(--color-border-default);border-radius:var(--radius-md);padding:11px 14px;background:var(--color-surface-raised);cursor:pointer;transition:border-color var(--transition-base),box-shadow var(--transition-base);}
.glm-cov-tile:hover{border-color:var(--color-action-subtle);box-shadow:0 0 0 3px var(--color-action-wash);}
.glm-cov-tile.active{border:1.5px solid var(--color-action);background:var(--color-action-wash);box-shadow:inset 4px 0 0 var(--color-action);}
.glm-cov-tile-name{font-size:12px;font-weight:600;color:var(--color-text-primary);margin-bottom:3px;}
.glm-cov-tile-meta{font-size:11px;color:var(--color-text-tertiary);font-weight:400;}
.glm-cov-tile.active .glm-cov-tile-name{color:var(--color-action);}

/* Pill filter strip (mirrors s2-pills) */
.glm-pills{display:flex;flex-wrap:wrap;gap:4px;margin:6px 0 10px;}
.glm-pill{font-size:12px;padding:6px 14px;border-radius:var(--radius-full);background:transparent;border:0.5px solid transparent;color:var(--color-text-secondary);cursor:pointer;font-family:var(--font-sans);font-weight:500;}
.glm-pill:hover:not(.on){background:var(--color-surface-sunken);color:var(--color-text-primary);}
.glm-pill.on{background:var(--color-surface-raised);color:var(--color-text-primary);border-color:var(--color-border-strong);}
.glm-pill-cnt{color:var(--color-text-tertiary);font-weight:400;margin-left:4px;}
.glm-pill.on .glm-pill-cnt{color:var(--color-text-secondary);}

/* Filter bar (mirrors s2-ws filter buttons + search) */
.glm-fbar{display:flex;align-items:center;gap:8px;padding:10px 0;margin-bottom:8px;border-bottom:1px solid var(--color-border-default);}
.glm-fbtn{background:var(--color-surface-raised);border:1px solid var(--color-border-default);border-radius:var(--radius-sm);padding:6px 12px;font-size:11px;font-weight:500;cursor:pointer;font-family:var(--font-sans);color:var(--color-text-secondary);display:inline-flex;align-items:center;gap:5px;}
.glm-fbtn:hover{background:var(--color-surface-sunken);color:var(--color-text-primary);}
.glm-fbtn.active{background:var(--color-text-primary);color:var(--color-text-inverse);border-color:var(--color-text-primary);font-weight:600;}
.glm-fbtn-caret{font-size:9px;opacity:.6;}
.glm-fbar-spacer{flex:1;}
.glm-fbar-search{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--color-surface-sunken);border:1px solid var(--color-border-default);border-radius:var(--radius-sm);min-width:200px;}
.glm-fbar-search input{flex:1;border:none;outline:none;background:transparent;font-size:11px;font-family:var(--font-sans);color:var(--color-text-primary);}
.glm-fbar-search-icon{color:var(--color-text-tertiary);font-size:11px;}
.glm-fbar-clear{font-size:11px;color:var(--color-text-secondary);background:transparent;border:none;cursor:pointer;font-family:var(--font-sans);font-weight:500;padding:4px 8px;}
.glm-fbar-clear:hover{color:var(--color-text-primary);}

/* Filter popover (mirrors s2-ft-pop) */
.glm-fpop-anchor{position:relative;display:inline-block;}
.glm-fpop{position:absolute;top:32px;left:0;z-index:60;background:var(--color-surface-raised);border:1px solid var(--color-border-strong);border-radius:var(--radius-md);box-shadow:0 8px 24px rgba(0,0,0,0.12);padding:10px;width:300px;}
.glm-fpop-title{font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;}
.glm-fpop-search{display:flex;align-items:center;gap:6px;padding:6px 8px;background:var(--color-surface-sunken);border:1px solid var(--color-border-default);border-radius:var(--radius-sm);margin-bottom:8px;}
.glm-fpop-search input{flex:1;border:none;outline:none;background:transparent;font-size:11px;font-family:var(--font-sans);}
.glm-fpop-list{max-height:280px;overflow-y:auto;}
.glm-fpop-opt{padding:6px 8px;font-size:12px;color:var(--color-text-secondary);cursor:pointer;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:space-between;}
.glm-fpop-opt:hover{background:var(--color-surface-sunken);color:var(--color-text-primary);}
.glm-fpop-opt.sel{background:var(--color-action-wash);color:var(--color-action);font-weight:600;}
.glm-fpop-opt-code{font-family:var(--font-mono);font-size:10px;color:var(--color-text-tertiary);}
.glm-fpop-opt.sel .glm-fpop-opt-code{color:var(--color-action);}
.glm-fpop-actions{display:flex;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid var(--color-border-default);}
.glm-fpop-clear{font-size:11px;color:var(--color-text-secondary);background:transparent;border:none;cursor:pointer;font-family:var(--font-sans);}
.glm-fpop-clear:hover{color:var(--color-text-primary);}

/* Verification table */
.glm-tbl-wrap{flex:1;overflow-y:auto;padding-bottom:18px;}
.glm-tbl{width:100%;border-collapse:collapse;font-size:12px;}
.glm-tbl thead tr{background:var(--color-surface-sunken);border-bottom:1px solid var(--color-border-default);position:sticky;top:0;z-index:2;}
.glm-tbl th{text-align:left;padding:8px 8px;font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em;}
.glm-tbl th:first-child{padding-left:14px;width:28px;}
.glm-tbl th.amt{text-align:right;}
.glm-tbl th.actions{text-align:right;padding-right:14px;}
.glm-tbl tbody tr{border-bottom:1px solid var(--color-border-subtle);}
.glm-tbl tbody tr:hover:not(.editing){background:var(--color-surface-sunken);}
.glm-tbl td{padding:9px 8px;vertical-align:top;}
.glm-tbl tr.editing td{vertical-align:top;}
.glm-tbl td:first-child{padding-left:14px;}
.glm-tbl td.mono{font-family:var(--font-mono);font-size:11px;color:var(--color-text-tertiary);}
.glm-tbl td.amt{text-align:right;font-family:var(--font-mono);font-weight:500;color:var(--color-text-primary);}
.glm-tbl td.acct{font-size:11.5px;line-height:1.35;}
.glm-tbl td.acct-code{font-family:var(--font-mono);color:var(--color-text-tertiary);font-size:10.5px;display:block;margin-bottom:1px;}
.glm-tbl td.acct-name{color:var(--color-text-primary);}
.glm-tbl td.dim{font-size:11px;color:var(--color-text-secondary);}
.glm-tbl td.dim-none{color:var(--color-text-tertiary);font-style:italic;}
.glm-tbl td.actions{text-align:right;padding-right:14px;}

/* Row state styling */
.glm-tbl tr.r-confirmed td{background:var(--color-success-surface);}
.glm-tbl tr.r-confirmed:hover td{background:#D7EBDF;}
.glm-tbl tr.r-later td{background:#FAEFD9;}
.glm-tbl tr.r-later:hover td{background:#F4E5C5;}
.glm-tbl tr.r-reinv td{background:var(--color-danger-surface);}
.glm-tbl tr.r-reinv:hover td{background:#F4DADA;}
.glm-tbl tr.editing td{background:var(--color-action-wash);}

/* Row status badge in the leftmost stripe */
.glm-row-badge{display:inline-block;font-size:9px;font-weight:600;padding:2px 7px;border-radius:var(--radius-full);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;}
.glm-row-badge.confirmed{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);}
.glm-row-badge.pending{background:var(--color-surface-sunken);color:var(--color-text-tertiary);border:1px solid var(--color-border-default);}
.glm-row-badge.later{background:var(--color-warning-surface);color:var(--color-warning-text);border:1px solid var(--color-warning-border);}
.glm-row-badge.reinv{background:var(--color-danger-surface);color:var(--color-danger-text);border:1px solid var(--color-danger-border);}

/* Row actions */
.glm-row-actions{display:inline-flex;gap:4px;justify-content:flex-end;}
.glm-rb{font-size:10px;padding:3px 9px;border-radius:var(--radius-sm);border:1px solid var(--color-border-default);background:var(--color-surface-raised);cursor:pointer;font-family:var(--font-sans);color:var(--color-text-secondary);font-weight:500;}
.glm-rb:hover{background:var(--color-surface-sunken);color:var(--color-text-primary);border-color:var(--color-border-strong);}
.glm-rb.edit{border-color:var(--color-action-subtle);color:var(--color-action);}
.glm-rb.edit:hover{background:var(--color-action-wash);}
.glm-rb.confirm{border-color:var(--color-success-border);color:var(--color-success-text);}
.glm-rb.confirm:hover{background:var(--color-success-surface);}
.glm-rb.later{border-color:var(--color-warning-border);color:var(--color-warning-text);}
.glm-rb.later:hover{background:var(--color-warning-surface);}
.glm-rb.reinv{border-color:var(--color-danger-border);color:var(--color-danger-text);}
.glm-rb.reinv:hover{background:var(--color-danger-surface);}
.glm-rb.menu{padding:3px 7px;}
.glm-rb-menu-wrap{position:relative;display:inline-block;}
.glm-rb-menu{position:absolute;top:24px;right:0;background:var(--color-surface-raised);border:1px solid var(--color-border-strong);border-radius:var(--radius-md);box-shadow:0 8px 20px rgba(0,0,0,0.10);min-width:200px;z-index:50;padding:4px 0;}
.glm-rb-menu-item{padding:7px 12px;font-size:11px;color:var(--color-text-secondary);cursor:pointer;display:flex;align-items:center;gap:8px;}
.glm-rb-menu-item:hover{background:var(--color-surface-sunken);color:var(--color-text-primary);}
.glm-rb-menu-item.danger{color:var(--color-danger-text);}
.glm-rb-menu-item.danger:hover{background:var(--color-danger-surface);}

/* Inline edit row */
.glm-edit-input{font-size:11.5px;padding:5px 8px;border:1px solid var(--color-border-default);border-radius:var(--radius-sm);background:var(--color-surface-raised);font-family:var(--font-sans);width:100%;color:var(--color-text-primary);}
.glm-edit-input:focus{outline:none;border-color:var(--color-action);box-shadow:0 0 0 2px var(--color-action-wash);}
.glm-edit-input.mono-fld{font-family:var(--font-mono);font-size:11px;}
.glm-edit-save{background:var(--color-action);color:var(--color-text-inverse);border:none;border-radius:var(--radius-sm);padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font-sans);}
.glm-edit-save:hover{background:var(--color-action-hover);}
.glm-edit-cancel{background:transparent;border:1px solid var(--color-border-default);color:var(--color-text-secondary);font-size:11px;padding:5px 12px;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-sans);}

/* Bulk action bar (when rows selected) */
.glm-bulkbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:8px 14px;background:var(--color-action-wash);border:1px solid var(--color-action-subtle);border-radius:var(--radius-md);margin-bottom:8px;}
.glm-bulkbar-count{font-size:12px;font-weight:600;color:var(--color-action);}
.glm-bulkbar-actions{display:flex;gap:6px;}

/* Edited-cell indicator (shows when row's Klay account / dim differs from original) */
.glm-edited-mark{display:inline-block;font-size:9px;font-weight:600;color:var(--color-action);background:var(--color-action-wash);padding:1px 5px;border-radius:var(--radius-sm);margin-left:5px;text-transform:uppercase;letter-spacing:.04em;}

</style>
</head>

<script>
/* ═══════════════════════════════════════════════════════════════
   APP STATE
   New 6-stage flow:
     1 = Master data (CoA + GL + TB uploads, plus 6 master-data tiles)
     2 = Account Mapping (account-level — legacy → Klay)
     3 = GL Mapping (transaction-level — verify every line landed correctly)
     4 = Review (TB / BS / P&L — Legacy vs Klay reconciliation)
     5 = UAT
     6 = Sign-off

   Internal function/state names are historical: renderS3 + s3_/S3_/APP.s3 belong
   to Stage 4 (Review); renderS3GL + S3GL_/APP.s3gl belong to Stage 3 (GL Mapping);
   renderS4 = Stage 5 (UAT); renderS5 = Stage 6 (Sign-off).
═══════════════════════════════════════════════════════════════ */

/* ═══════════════════════════════════════════════════════════════
   DEMO DATA — User profile, organisation, team. These would come from the
   backend in production. Editing UI is wired but values aren't persisted
   between sessions (prototype).
═══════════════════════════════════════════════════════════════ */
var DEMO_USER = {
  firstName: 'Budi',
  lastName: 'Wijaya',
  email: 'budi.wijaya@makmurjaya.co.id',
  phone: '+62 812 3456 7890',
  jobTitle: 'Group Controller',
  role: 'Controller',        // matches DEMO_ROLES — drives admin access
  isOwner: true,             // workspace owner = always admin
  initials: 'BW',
  timezone: 'Asia/Jakarta',
  language: 'English',
  twoFactorEnabled: true,
  lastSignIn: 'Today at 09:14 from Jakarta'
};

/* Session-only demo toggle: lets you see the prototype as if you were a non-admin user
   (Accountant / Auditor / Viewer). Flips the access-control logic so Team & permissions
   is hidden from the sidebar and the avatar menu. Not persisted; resets on page reload. */
var DEMO_SIMULATE_NON_ADMIN = false;

/* Permissions helper — single source of truth for the "admin" predicate used throughout
   Settings. Admin = workspace owner OR role is Controller / CFO. */
function isAdmin(){
  if (DEMO_SIMULATE_NON_ADMIN) return false;
  if (DEMO_USER.isOwner) return true;
  return DEMO_USER.role === 'Controller' || DEMO_USER.role === 'CFO';
}
function toggleDemoNonAdmin(){
  DEMO_SIMULATE_NON_ADMIN = !DEMO_SIMULATE_NON_ADMIN;
  /* If we're now non-admin and currently sitting on the Team section, bounce to Profile */
  if (!isAdmin() && APP.settings && APP.settings.active === 'team') {
    APP.settings.active = 'profile';
  }
  renderApp();
}

var DEMO_ORG = {
  legalName: 'PT Makmur Jaya Sentosa',
  displayName: 'PT Makmur Jaya',
  taxId: '01.234.567.8-901.000',
  country: 'Indonesia',
  industry: 'Manufacturing — FMCG',
  baseCurrency: 'IDR',
  fiscalYearStart: '1 January',
  fiscalYearEnd: '31 December',
  reportingFrequency: 'Monthly',
  address: 'Jl. Sudirman Kav. 52-53, Jakarta Selatan 12190',
  klayPlan: 'Klay Enterprise',
  klaySince: 'October 2025'
};

var DEMO_TEAM = [
  {id:'u1', name:'Budi Wijaya',     email:'budi.wijaya@makmurjaya.co.id',     role:'Controller',  isOwner:true,  status:'active',  initials:'BW', lastActive:'now'},
  {id:'u2', name:'Sarah Lim',       email:'sarah.lim@makmurjaya.co.id',       role:'CFO',         isOwner:false, status:'active',  initials:'SL', lastActive:'2 hours ago'},
  {id:'u3', name:'Andi Pratama',    email:'andi.pratama@makmurjaya.co.id',    role:'Accountant',  isOwner:false, status:'active',  initials:'AP', lastActive:'yesterday'},
  {id:'u4', name:'Maya Kusuma',     email:'maya.kusuma@makmurjaya.co.id',     role:'Accountant',  isOwner:false, status:'active',  initials:'MK', lastActive:'3 days ago'},
  {id:'u5', name:'Reza Hidayat',    email:'reza.hidayat@deloitte.co.id',      role:'Auditor',     isOwner:false, status:'invited', initials:'RH', lastActive:'invited 2 days ago'}
];

/* Role catalogue (display name + permissions blurb). Used in Team & permissions. */
var DEMO_ROLES = [
  {id:'controller', name:'Controller',  desc:'Full access — manage all settings, sign off on migration, invite users'},
  {id:'cfo',        name:'CFO',         desc:'Full access — view all data, approve sign-offs'},
  {id:'accountant', name:'Accountant',  desc:'Create and edit mappings, review transactions, raise issues'},
  {id:'auditor',    name:'Auditor',     desc:'Read-only — audit log access, no edit permission'},
  {id:'viewer',     name:'Viewer',      desc:'Read-only — dashboard and reports only'}
];


var APP = {
  stage: 1,
  /* When non-null, Settings is showing instead of any stage. Stores the return ticket
     so 'Back to Workspace' lands the user back where they were. */
  settings: null,          // null | { active:'profile'|'organization'|'team'|'dimensions', returnTo: {...} | null }
  /* Top-right avatar dropdown open state */
  avatarMenuOpen: false,
  /* Stage 1 state — 9 items: 3 uploads + 6 master data tiles
     Each item state: 0=not started, 1=uploading, 2=uploaded/HC review, 3=confirmed
  */
  s1: {
    items: [3, 3, 3,    // CoA, GL, TB (pre-confirmed for demo)
            3, 3, 3, 3, 2, 0],  // Inv, FA, Vendor, Customer, OpenAP review, OpenAR locked
    detailIdx: null,  // when null, show overview; when set (0-8), show detail
  },
  /* Stage 2 state */
  s2: {
    substep: 1,              // 1 = Klay orientation, 2 = Workspace, 3 = Sign off
    klayCoaView: false,      // true when "Review Klay CoA" is open as an overlay over substep 2
    klayRenameOpen: null,    // Klay code currently in rename-edit mode (or null)
    activeCluster: 'all-accounts', // for the workspace navigator
    activeSection: 'bs-ca',  // (legacy) FS section state, retained for backward compat
    signedOff: false,        // true once mapping sign-off is confirmed in substep 3
    dimPopoverFor: null,     // legacy account code that has the +Add-dimension popover open
    dimEditingId: null,      // dimension currently in edit mode on Settings page

    proposedBannerDismissed: false, // session flag — set true when user × the bulk-info banner

    typeFilterExpanded: {},  // hierarchy nodeId → bool, for tree expand/collapse
    klayFilter: [],          // multi-select Klay CoA hierarchy node ids that are checked
    klayFilterOpen: false,   // whether the Klay filter dropdown is open
    klayFilterExpanded: {},  // hierarchy nodeId → bool, for tree expand/collapse
    klayFilterSearch: '',    // search within the Klay filter tree

  s3: {
    view: 'tb',            // 'tb', 'bs', or 'pl'
    period: 'cumulative',  // 'cumulative' or month index 0..8

  }
  /* Stage 3 (GL Mapping) state is initialised below as APP.s3gl */
};

/* ═══════════════════════════════════════
   STAGES TOP NAV
═══════════════════════════════════════ */
var STAGES = [
  {n:1, lbl:'Master data'},
  {n:2, lbl:'Account Mapping'},
  {n:3, lbl:'GL Mapping'},
  {n:4, lbl:'Review'},
  {n:5, lbl:'UAT'},
  {n:6, lbl:'Sign-off'}
];

function renderStageBar(){
  var s = APP.stage;
  var inSettings = !!APP.settings;
  var html = '';
  STAGES.forEach(function(st, i){
    // In Settings: every stage is shown as 'off' (dimmed) since none is active.
    // Past stages in the migration flow stay 'done' for context.
    var cls;
    if (inSettings) {
      cls = s > st.n ? 'done' : 'off';
    } else {
      cls = s > st.n ? 'done' : s === st.n ? 'on' : 'off';
    }
    var icon = cls === 'done' ? '&#10003;' : st.n;
    html += '<div class="sti clickable ' + cls + '" onclick="jumpToStage(' + st.n + ')">'
      + '<div class="stc ' + cls + '">' + icon + '</div>'
      + '<div class="stl ' + cls + '">' + st.lbl + '</div>'
      + '</div>';
    if (i < STAGES.length - 1) html += '<div class="conn"></div>';
  });
  document.getElementById('stagebar').innerHTML = html;
}

function jumpToStage(n){
  // Leaving settings if active
  APP.settings = null;
  APP.stage = n;
  // Reset detail view when jumping
  APP.s1.detailIdx = null;
  // Day badge — 6 stages: Master data (5), Account Mapping (12), GL Mapping (18),
  // Review (22), UAT (25), Sign-off (28)
  var day = n === 1 ? 5 : n === 2 ? 12 : n === 3 ? 18 : n === 4 ? 22 : n === 5 ? 25 : 28;
  var b = document.getElementById('daybadge');
  b.textContent = 'Day ' + day + ' of 30';
  b.className = 'day-badge act';
  // Substep bar visibility — most stages don't use it (set per-renderer if needed)
  var ssb = document.getElementById('substepbar');
  ssb.style.display = 'none';
  ssb.innerHTML = '';
  // Render the stage. Internal function names are historical and don't match user-facing
  // stage numbers: renderS3GL is the new GL Mapping (Stage 3), renderS3 is Review (Stage 4),
  // renderS4 is UAT (Stage 5), renderS5 is Sign-off (Stage 6).
  renderStageBar();
  if (n === 1) renderS1();
  else if (n === 2) renderS2();
  else if (n === 3) renderS3GL();
  else if (n === 4) renderS3();
  else if (n === 5) renderS4();
  else renderS5();
  window.scrollTo(0, 0);
}

/* Top-level renderer. Routes to the Settings page when APP.settings is set,
   otherwise to the active stage. Use this instead of calling render fns directly
   when something might cross routes (e.g. dimension handlers run from both
   Settings and the Workspace). */
function renderApp(){
  // Update the gear's active state
  var gear = document.querySelector('.nav-gear');
  if (gear) {
    if (APP.settings) gear.classList.add('active');
    else gear.classList.remove('active');
  }
  if (APP.settings) {
    renderSettings();
    return;
  }
  // Otherwise, re-render the current stage (mapping as in jumpToStage)
  if (APP.stage === 1) renderS1();
  else if (APP.stage === 2) renderS2();
  else if (APP.stage === 3) renderS3GL();
  else if (APP.stage === 4) renderS3();
  else if (APP.stage === 5) renderS4();
  else renderS5();
}

function s1_nConfirmed(){ return APP.s1.items.filter(function(s){return s===3;}).length; }
function s1_gateClear(idx){ return APP.s1.items[idx] === 3; }

function s1_tileStatus(idx){
  var item = S1_ITEMS[idx];
  var s = APP.s1.items[idx];
  var locked = item.gate != null && !s1_gateClear(item.gate) && s === 0;
  if (locked) return {cls:'ts-locked', txt:'Locked'};
  if (s === 0) return {cls:'ts-pending', txt:'Pending'};
  if (s === 1) return {cls:'ts-uploaded', txt:'Uploading…'};
  if (s === 2) return {cls:'ts-review', txt:'Review'};
  return {cls:'ts-done', txt:'Confirmed'};
}

function s1_renderOverview(){

  var html = '<h1 class="stage-title">Upload Data</h1>'
    + '<p class="stage-sub">Upload the foundational data Klay needs: your Chart of Accounts, full General Ledger, and Legacy Trial Balance — plus the master data Klay will use as reference for every transaction from go-live.</p>'

    + '<span><strong>' + done + ' of ' + total + '</strong> items confirmed</span>'
    + '<span>·</span><span>Days 1–10 of 30</span>'

    html += '<div class="hint-banner">'
      + '<div class="hint-icon">i</div>'

  // Foundation row
  html += '<div class="bento-section-lbl">Foundational uploads</div>';

  html += '<div class="bento-section-lbl">Master data</div>';
  html += '<div class="bento">';
  for (var j = 3; j < S1_ITEMS.length; j++) html += s1_renderTile(j);

  var canContinue = (done === total);

function s1_renderTile(idx){
  var item = S1_ITEMS[idx];
  var s = APP.s1.items[idx];
  var status = s1_tileStatus(idx);
  var locked = item.gate != null && !s1_gateClear(item.gate) && s === 0;
  var classes = ['tile'];
  if (s === 3) classes.push('done');
  if (locked) classes.push('locked');
  if (s === 0 && !locked) classes.push('skel');

  var html = '<div class="' + classes.join(' ') + '" onclick="s1_openDetail(' + idx + ')">';
  html += '<div class="tile-hdr">';
  html += '<div><span class="tile-num">' + item.num + '</span><div class="tile-name">' + item.name + '</div></div>';
  html += '<span class="tile-status ' + status.cls + '">' + status.txt + '</span>';
  html += '</div>';

  if (locked) {
    html += '<div class="tile-desc">' + item.desc + '</div>';
    html += '<div class="tile-foot lock">Unlocks once ' + S1_ITEMS[item.gate].name + ' is confirmed</div>';
  } else if (s === 0) {
    html += '<div class="tile-desc">' + item.desc + '</div>';
    html += '<div class="tile-foot">Click to upload</div>';
  } else if (s === 2) {
    html += '<div class="tile-desc">' + item.detected + ' — review needed before confirming</div>';
    var hb = item.hc.hb.length, sb = item.hc.sb.length, wb = item.hc.wb.length;
    html += '<div class="tile-foot warn">' + (hb + sb) + ' health-check items to review</div>';
  } else if (s === 3) {
    html += '<div class="tile-stats">';
    item.stats.forEach(function(st){
      html += '<div><div class="tile-stat-n">' + st.n + '</div><div class="tile-stat-l">' + st.l + '</div></div>';
    });
    html += '</div>';
  }

  html += '</div>';
  return html;
}

}

function s1_renderHC(kind, title, rows){
  var html = '<div class="hc-section ' + kind + '">';
  html += '<div class="hc-section-hdr"><span class="hc-section-title">' + title + '</span><span class="hc-section-cnt">' + rows.length + ' item' + (rows.length === 1 ? '' : 's') + '</span></div>';
  html += '<div class="hc-section-body">';
  rows.forEach(function(r){
    html += '<div class="hc-row">'
      + '<div class="hc-row-title">' + r.t + '</div>'
      + '<div class="hc-row-info">' + r.i + '</div>';
    if (r.a) {

    }
    html += '</div>';
  });
  html += '</div></div>';
  return html;
}

/* Compile a PT. ABC dataset into the S2_ACCOUNTS shape that the rest of the app expects.
   Headers and leaves both go in (renderers will skip headers where appropriate).
   Any leaf with a newCode (AI-seeded mapping) is treated as Mapped (status:'confirmed')
   on first load — issue flags are orthogonal to mapping status. */
function s2_ptabcToFlat(dataset, fs){
  return dataset.map(function(r){
    var flat = {
      old: r.code,
      oldName: r.name,
      fs: fs,
      isHeader: !!r.isHeader,
      parent: r.parent || null,
    };
    if (!r.isHeader) {
      flat.newCode = r.newCode;
      flat.newName = r.newName;
      flat.conf = r.conf;
      // AI-seeded mapping → 'proposed' on first load. The controller still has to confirm
      // (or change) before it counts as Mapped. Falls back to row's status only if no newCode.
      flat.status = r.newCode ? 'proposed' : (r.status || 'unconfirmed');
      if (r.reason) flat.reason = r.reason;
      if (r.issues) flat.issues = r.issues.slice();
    }
    return flat;
  });
}
