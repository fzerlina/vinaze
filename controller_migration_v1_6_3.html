    } else {
      batchBannerHtml = '<div class="batch-banner-wrap"><div class="batch-banner">'
        + '<div class="batch-banner-row">'
        +   '<div class="batch-banner-text">'
        +     '<div class="batch-banner-title">&#10003; AI batch detected: ' + grp.autoBatch.vendor + ' &rarr; ' + grp.autoBatch.account + '</div>'
        +     '<div class="batch-banner-meta">' + grp.autoBatch.count + ' transactions · ' + grp.autoBatch.amount + ' · 94% confidence · same vendor + description pattern</div>'
        +   '</div>'
        +   '<div class="batch-banner-actions">'
        +     '<button class="btn-ghost" style="font-size:11px;padding:5px 10px" onclick="wsInspectBatch(' + gi + ')">Inspect ' + grp.autoBatch.count + '</button>'
        +     '<button class="glm-btn-pri" style="font-size:11px;padding:5px 12px" onclick="wsConfirmBatch(\'' + batchKey + '\')">Confirm all ' + grp.autoBatch.count + '</button>'
        +   '</div>'
        + '</div>'
        + '</div></div>';
    }
  }

  /* IA recommendation band — for clusters with reclass/cash-restate/fx flags */
  var iaBandHtml = '';
  var iaTxns = (grp.txns || []).filter(function(t){return t.hasFlag && (t.flagReason==='reclass' || t.flagReason==='cash-restate' || t.flagReason==='fx-revaluation');});
  if (iaTxns.length > 0) {
    var firstIA = iaTxns[0];
    var iaBandKey = monthIdx + '-' + gi + '-iaband';
    var iaState = APP.s3gl.ws.iaBandActions[iaBandKey];
    var bandLabel = firstIA.flagReason === 'reclass' ? 'IA recommends: reclassification'
      : firstIA.flagReason === 'cash-restate' ? 'IA: Cash → Accrual restatement'
      : 'IA: FX revaluation';

    /* If a batch banner is already present, IA band uses smaller top padding wrapper */
    var iaWrapStyle = batchBannerHtml ? ' style="padding-top:0"' : ' style="padding-top:12px"';

    if (iaState === 'accepted') {
      iaBandHtml = '<div class="ia-band-wrap"' + iaWrapStyle + '><div class="ia-band" style="opacity:.7">'
        + '<div class="ia-band-lbl">&#10003; ' + bandLabel + ' — accepted</div>'
        + '<div class="ia-band-text">' + iaTxns.length + ' transactions · documented in audit trail.</div>'
        + '</div></div>';
    } else {
      iaBandHtml = '<div class="ia-band-wrap"' + iaWrapStyle + '><div class="ia-band">'
        + '<div class="ia-band-lbl">' + bandLabel + '</div>'
        + '<div class="ia-band-text">' + (firstIA.flagNote || (iaTxns.length + ' transactions affected.')) + '</div>'
        + '<div class="ia-band-attr">— Reviewed by your IA</div>'
        + '<div class="ia-band-actions">'
        +   '<button class="btn-action" style="font-size:11px;padding:5px 12px" onclick="wsAcceptIA(\'' + iaBandKey + '\')">Accept (apply to ' + iaTxns.length + ')</button>'
        +   '<button class="btn-ghost" style="font-size:11px;padding:5px 10px" onclick="alert(\'In production: rejects the IA recommendation and lets you decide each row.\')">Reject &amp; review individually</button>'
        + '</div>'
        + '</div></div>';
    }
  }

  /* Section label + row table */
  var visibleTxns = grp.txns || [];
  var sectionLabel = '';
  if (filt === 'review') {
    if (grp.toReview === 0) sectionLabel = 'No transactions need review';
    else sectionLabel = grp.toReview + ' transactions need review';
  } else if (filt === 'auto') {
    sectionLabel = autoMappedCount + ' auto-mapped transactions';
    /* For auto filter, generate sample rows */
    visibleTxns = getAutoMappedRows(monthIdx, gi, grp);
  } else {
    /* all */
    sectionLabel = grp.total + ' transactions (review + auto-mapped)';
    var autoRows = getAutoMappedRows(monthIdx, gi, grp);
    var reviewRows = (grp.txns || []).slice();
    var combined = reviewRows.map(function(t,i){return {t:t, type:'review', origIdx:i};})
      .concat(autoRows.map(function(t,i){return {t:t, type:'auto', origIdx:i};}));
    /* sort by amount desc */
    combined.sort(function(a,b){
      var pa = parseInt(String(a.t.amount).replace(/[^0-9]/g,''), 10);
      var pb = parseInt(String(b.t.amount).replace(/[^0-9]/g,''), 10);
      return pb - pa;
    });
    visibleTxns = combined; /* this is the special "all" case — handled below */
  }

  var sectionLblHtml = '<div class="workspace-section-lbl">' + sectionLabel + '</div>';

  /* Build the table */
  var tableRows = '';
  if (filt === 'all') {
    /* combined all-mode: use the {t, type} shape */
    tableRows = visibleTxns.map(function(item) {
      var txn = item.t;
      if (item.type === 'auto') {
        return renderTxnTableRow(monthIdx, gi, item.origIdx, txn, 'auto');
      }
      return renderTxnTableRow(monthIdx, gi, item.origIdx, txn, 'review');
    }).join('');
  } else if (filt === 'auto') {
    tableRows = visibleTxns.map(function(txn, ti) {
      return renderTxnTableRow(monthIdx, gi, ti, txn, 'auto');
    }).join('');
  } else {
    /* review */
    tableRows = visibleTxns.map(function(txn, ti) {
      return renderTxnTableRow(monthIdx, gi, ti, txn, 'review');
    }).join('');
  }

  if (visibleTxns.length === 0) {
    tableRows = '<tr><td colspan="7" style="padding:24px;text-align:center;font-size:12px;color:var(--color-text-tertiary);font-weight:300">' + (grp.autoNote || 'No transactions in this view.') + '</td></tr>';
  }

  /* Build keys-of-selectable rows so the select-all checkbox works against this filter */
  var selectableKeys = [];
  if (filt === 'all') {
    visibleTxns.forEach(function(item) {
      var k = monthIdx + '-' + gi + '-' + (item.type === 'auto' ? 'auto-' : '') + item.origIdx;
      /* skip already-resolved rows */
      var st = APP.s3gl.ws.txnStates[k];
      if (item.type === 'review' && (st === 'confirmed' || st === 'flagged' || st === 'overridden')) return;
      if (item.type === 'auto' && APP.s3gl.ws.overrides[k]) return;
      selectableKeys.push(k);
    });
  } else if (filt === 'auto') {
    visibleTxns.forEach(function(txn, ti) {
      var k = monthIdx + '-' + gi + '-auto-' + ti;
      if (!APP.s3gl.ws.overrides[k]) selectableKeys.push(k);
    });
  } else {
    visibleTxns.forEach(function(txn, ti) {
      var k = monthIdx + '-' + gi + '-' + ti;
      var st = APP.s3gl.ws.txnStates[k];
      if (st !== 'confirmed' && st !== 'flagged' && st !== 'overridden') selectableKeys.push(k);
    });
  }
  var selectedCount = selectableKeys.filter(function(k){return APP.s3gl.ws.selectedRows[k];}).length;
  var allSelected = selectableKeys.length > 0 && selectedCount === selectableKeys.length;

  /* Bulk action bar — appears as a sticky strip above the table when 1+ row selected.
     If bulk override or bulk flag form is open, render the form instead. */
  var bulkBarHtml = '';
  if (selectedCount > 0) {
    if (APP.s3gl.ws.bulkOverrideOpen) {
      bulkBarHtml = renderBulkOverrideForm(selectedCount);
    } else if (APP.s3gl.ws.bulkFlagOpen) {
      bulkBarHtml = renderBulkFlagForm(selectedCount);
    } else {
      bulkBarHtml = '<div class="bulk-bar">'
        + '<span class="bulk-bar-count">' + selectedCount + ' selected</span>'
        + '<div class="bulk-bar-actions">'
        +   '<button class="glm-btn-pri" style="font-size:11px;padding:5px 12px" onclick="wsBulkConfirm()">&#10003; Confirm ' + selectedCount + '</button>'
        +   '<button class="btn-ghost" style="font-size:11px;padding:5px 10px" onclick="wsOpenBulkOverride()">Override ' + selectedCount + '</button>'
        +   '<button class="btn-ghost" style="font-size:11px;padding:5px 10px;color:var(--color-action)" onclick="wsOpenBulkFlag()">Flag IA</button>'
        +   '<span style="margin:0 4px;color:var(--color-border-default)">|</span>'
        +   '<button class="btn-ghost" style="font-size:11px;padding:5px 10px;color:var(--color-text-tertiary)" onclick="wsClearSelection()">Clear</button>'
        + '</div>'
        + '</div>';
    }
  }

  var selectAllAttr = '';
  if (allSelected) selectAllAttr = 'checked';
  var hasSelectable = selectableKeys.length > 0;

  var tableHtml = bulkBarHtml + '<div class="workspace-table-wrap">'
    + '<table class="workspace-table">'
    + '<thead><tr>'
    +   '<th class="cb-col">' + (hasSelectable ? '<input type="checkbox" ' + selectAllAttr + ' onclick="wsToggleAll(\'' + filt + '\')" />' : '') + '</th>'
    +   '<th>Ref</th><th>Date</th><th>Vendor</th><th>AI suggests</th><th class="amt">Amount</th><th class="conf">Conf</th><th></th>'
    + '</tr></thead>'
    + '<tbody>' + tableRows + '</tbody>'
    + '</table>'
    + '</div>';

  /* Pagination footer */
  var paginationHtml = '';
  if (filt === 'review' && visibleTxns.length > 0) {
    var hidden = grp.total - grp.toReview;
    paginationHtml = '<div class="workspace-pagination">'
      + '<span>Showing ' + visibleTxns.length + ' review rows · ' + hidden.toLocaleString() + ' auto-mapped hidden</span>'
      + '<button class="workspace-pagination-link" onclick="wsSetFilter(\'all\')">Show all rows &#8594;</button>'
      + '</div>';
  } else if (filt === 'auto') {
    var shownAuto = visibleTxns.length;
    var moreAvailable = autoMappedCount > shownAuto;
    paginationHtml = '<div class="workspace-pagination">'
      + '<span>Showing ' + shownAuto.toLocaleString() + ' of ' + autoMappedCount.toLocaleString() + ' auto-mapped</span>'
      + (moreAvailable
          ? '<button class="workspace-pagination-link" onclick="alert(\'Pagination: production loads next 100\')">Load next 100 &#8594;</button>'
          : '<span style="color:var(--color-text-tertiary);font-weight:300">All shown</span>')
      + '</div>';
  } else if (filt === 'all') {
    var shownAll = visibleTxns.length;
    var moreAll = grp.total > shownAll;
    paginationHtml = '<div class="workspace-pagination">'
      + '<span>Showing ' + shownAll.toLocaleString() + ' of ' + grp.total.toLocaleString() + ' (review + auto-mapped, sorted by amount)</span>'
      + (moreAll
          ? '<button class="workspace-pagination-link" onclick="alert(\'Pagination: production loads next 100\')">Load next 100 &#8594;</button>'
          : '<span style="color:var(--color-text-tertiary);font-weight:300">All shown</span>')
      + '</div>';
  }

  return '<div class="workspace-pane">'
    + headerHtml
    + batchBannerHtml
    + iaBandHtml
    + sectionLblHtml
    + tableHtml
    + paginationHtml
    + '</div>';
}

function renderTxnTableRow(monthIdx, gi, ti, txn, type) {
  var key = monthIdx + '-' + gi + '-' + (type === 'auto' ? 'auto-' : '') + ti;
  var rowCls = '';

  if (type === 'auto') {
    /* check for override */
    var override = APP.s3gl.ws.overrides[key];
    var checked = APP.s3gl.ws.selectedRows[key] ? 'checked' : '';
    if (override) {
      return '<tr style="background:var(--color-action-wash)">'
        + '<td class="cb-col"></td>'
        + '<td class="mono">' + txn.ref + '</td>'
        + '<td style="color:var(--color-text-tertiary)">' + txn.date + '</td>'
        + '<td style="color:var(--color-text-secondary)">' + txn.vendor + '</td>'
        + '<td style="font-size:11px"><span style="color:var(--color-action);font-weight:600">' + override.account + '</span><br><span style="color:var(--color-text-tertiary);font-size:10px;text-decoration:line-through">' + txn.suggested + '</span></td>'
        + '<td class="amt">' + txn.amount + '</td>'
        + '<td class="conf hi">&#10003;</td>'
        + '<td><span style="font-size:10px;color:var(--color-action);font-weight:600">Overridden</span></td>'
        + '</tr>';
    }
    return '<tr style="background:rgba(234,243,222,0.3)">'
      + '<td class="cb-col"><input type="checkbox" ' + checked + ' onclick="wsToggleRow(\'' + key + '\')" /></td>'
      + '<td class="mono">' + txn.ref + '</td>'
      + '<td style="color:var(--color-text-tertiary)">' + txn.date + '</td>'
      + '<td style="color:var(--color-text-secondary)">' + txn.vendor + '</td>'
      + '<td style="color:var(--color-text-secondary);font-size:11px">' + txn.suggested + '</td>'
      + '<td class="amt">' + txn.amount + '</td>'
      + '<td class="conf hi">' + txn.conf + '%</td>'
      + '<td><button class="tbl-btn override-link" onclick="wsStartOverride(\'' + key + '\')">Override</button></td>'
      + '</tr>';
  }

  /* review row */
  var state = APP.s3gl.ws.txnStates[key] || 'pending';
  if (state === 'confirmed') rowCls = 'background:var(--color-success-surface);opacity:.85';
  else if (state === 'overridden') rowCls = 'background:var(--color-action-wash);opacity:.85';
  else if (state === 'flagged' || state === 'flagForm' || state === 'flagResolved') rowCls = 'background:var(--color-danger-surface);opacity:.85';

  /* Outlier highlight */
  var isOutlier = txn.hasFlag && txn.flagReason === 'amount-outlier';
  if (isOutlier) rowCls = 'background:var(--color-warning-surface)';

  var actions;
  if (state === 'confirmed') {
    actions = '<span style="font-size:10px;color:var(--color-success-text);font-weight:600">&#10003; Confirmed</span>';
  } else if (state === 'overridden') {
    actions = '<span style="font-size:10px;color:var(--color-action);font-weight:600">&#10003; Overridden</span>';
  } else if (state === 'flagged') {
    actions = '<span style="font-size:10px;color:var(--color-danger-text);font-weight:600">&#128681; Flagged</span>';
  } else {
    actions = '<div class="workspace-row-actions">'
      + '<button class="tbl-btn confirm" onclick="wsConfirm(' + gi + ',' + ti + ')">Confirm</button>'
      + '<button class="tbl-btn override-link">Override</button>'
      + '<button class="tbl-btn flag" onclick="wsStartFlag(' + gi + ',' + ti + ')">Flag</button>'
      + '</div>';
  }

  var vendor = txn.vendor === '—' ? '<span style="color:var(--color-text-tertiary);font-style:italic">— (manual)</span>' : txn.vendor;
  var checked = APP.s3gl.ws.selectedRows[key] ? 'checked' : '';
  var canSelect = state !== 'confirmed' && state !== 'flagged' && state !== 'overridden';

  return '<tr style="' + rowCls + '">'
    + '<td class="cb-col">' + (canSelect ? '<input type="checkbox" ' + checked + ' onclick="wsToggleRow(\'' + key + '\')" />' : '') + '</td>'
    + '<td class="mono">' + txn.ref + '</td>'
    + '<td style="color:var(--color-text-tertiary)">' + txn.date + '</td>'
    + '<td style="color:var(--color-text-secondary)">' + vendor + '</td>'
    + '<td style="color:var(--color-text-secondary);font-size:11px">' + (txn.suggested || '—') + '</td>'
    + '<td class="amt">' + txn.amount + '</td>'
    + '<td class="conf ' + (txn.confCls || '') + '">' + (txn.conf > 0 ? txn.conf + '%' : '—') + '</td>'
    + '<td>' + actions + '</td>'
    + '</tr>';
}

function renderBrowseAll(monthIdx, mo, groups) {
  var allRows = [];
  groups.forEach(function(grp, gi) {
    (grp.txns || []).forEach(function(txn, ti) {
      allRows.push({grp:grp, gi:gi, ti:ti, txn:txn, type:'review'});
    });
    var autoRows = getAutoMappedRows(monthIdx, gi, grp);
    autoRows.forEach(function(txn, ti) {
      allRows.push({grp:grp, gi:gi, ti:ti, txn:txn, type:'auto'});
    });
  });

  /* Sort by amount desc */
  allRows.sort(function(a, b) {
    var pa = parseInt(String(a.txn.amount).replace(/[^0-9]/g,''), 10);
    var pb = parseInt(String(b.txn.amount).replace(/[^0-9]/g,''), 10);
    return pb - pa;
  });

  var tableRows = allRows.slice(0, 50).map(function(item) {
    return renderTxnTableRow(monthIdx, item.gi, item.ti, item.txn, item.type);
  }).join('');

  return '<div class="workspace-pane">'
    + '<div class="workspace-hdr">'
    +   '<div class="workspace-hdr-row">'
    +     '<div>'
    +       '<div class="workspace-hdr-title">' + mo.m + ' 2025 — Browse all</div>'
    +       '<div class="workspace-hdr-meta">' + mo.txn.toLocaleString() + ' transactions, sorted by amount · manual review mode</div>'
    +     '</div>'
    +     '<div class="workspace-filter-row">'
    +       '<span class="filter-lbl">Decisions view groups these into ' + groups.length + ' categories. Most Controllers find that faster.</span>'
    +     '</div>'
    +   '</div>'
    + '</div>'
    + '<div class="workspace-table-wrap">'
    +   '<table class="workspace-table">'
    +   '<thead><tr><th>Ref</th><th>Date</th><th>Vendor</th><th>AI suggests</th><th class="amt">Amount</th><th class="conf">Conf</th><th></th></tr></thead>'
    +   '<tbody>' + tableRows + '</tbody>'
    +   '</table>'
    + '</div>'
    + '<div class="workspace-pagination">'
    +   '<span>Showing 50 of ' + mo.txn.toLocaleString() + '</span>'
    +   '<button class="workspace-pagination-link" onclick="alert(\'Pagination: production loads next 50\')">Load next 50 &#8594;</button>'
    + '</div>'
    + '</div>';
}

function wsSelectCluster(gi) {
  APP.s3gl.ws.selectedCluster = gi;
  APP.s3gl.ws.activeFilter = 'review';
  renderMonthWorkspace(APP.s3gl.ws.activeMonth);
}

function wsConfirmBatch(batchKey) {
  APP.s3gl.ws.confirmedClusters[batchKey] = 'confirmed';
  if (typeof invalidateCoverageCache === 'function') invalidateCoverageCache();
  renderMonthWorkspace(APP.s3gl.ws.activeMonth);
}

function wsAcceptIA(iaBandKey) {
  APP.s3gl.ws.iaBandActions[iaBandKey] = 'accepted';
  if (typeof invalidateCoverageCache === 'function') invalidateCoverageCache();
  renderMonthWorkspace(APP.s3gl.ws.activeMonth);
}

function wsInspectBatch(gi) {
  /* Filter the current cluster to auto-mapped (where the batch lives) */
  APP.s3gl.ws.activeFilter = 'auto';
  renderMonthWorkspace(APP.s3gl.ws.activeMonth);
}

function wsToggleRow(key) {
  if (APP.s3gl.ws.selectedRows[key]) delete APP.s3gl.ws.selectedRows[key];
  else APP.s3gl.ws.selectedRows[key] = true;
  renderMonthWorkspace(APP.s3gl.ws.activeMonth);
}

function wsToggleAll(filt) {
  /* Re-derive selectableKeys for current cluster + filter, then toggle */
  var monthIdx = APP.s3gl.ws.activeMonth;
  var gi = APP.s3gl.ws.selectedCluster;
  if (gi === null) return;
  var groups = getWorkspaceData(monthIdx);
  var grp = groups[gi];
  if (!grp) return;
  var keys = [];
  if (filt === 'review' || !filt) {
    (grp.txns || []).forEach(function(txn, ti) {
      var k = monthIdx + '-' + gi + '-' + ti;
      var st = APP.s3gl.ws.txnStates[k];
      if (st !== 'confirmed' && st !== 'flagged') keys.push(k);
    });
  } else if (filt === 'auto') {
    var autoRows = getAutoMappedRows(monthIdx, gi, grp);
    autoRows.forEach(function(txn, ti) {
      var k = monthIdx + '-' + gi + '-auto-' + ti;
      if (!APP.s3gl.ws.overrides[k]) keys.push(k);
    });
  } else if (filt === 'all') {
    /* combined */
    (grp.txns || []).forEach(function(txn, ti) {
      var k = monthIdx + '-' + gi + '-' + ti;
      var st = APP.s3gl.ws.txnStates[k];
      if (st !== 'confirmed' && st !== 'flagged') keys.push(k);
    });
    var autoRows = getAutoMappedRows(monthIdx, gi, grp);
    autoRows.forEach(function(txn, ti) {
      var k = monthIdx + '-' + gi + '-auto-' + ti;
      if (!APP.s3gl.ws.overrides[k]) keys.push(k);
    });
  }

  var allCurrentlySelected = keys.length > 0 && keys.every(function(k){return APP.s3gl.ws.selectedRows[k];});
  if (allCurrentlySelected) {
    keys.forEach(function(k){delete APP.s3gl.ws.selectedRows[k];});
  } else {
    keys.forEach(function(k){APP.s3gl.ws.selectedRows[k] = true;});
  }
  renderMonthWorkspace(APP.s3gl.ws.activeMonth);
}

function wsClearSelection() {
  APP.s3gl.ws.selectedRows = {};
  APP.s3gl.ws.bulkOverrideOpen = false;
  APP.s3gl.ws.bulkFlagOpen = false;
  renderMonthWorkspace(APP.s3gl.ws.activeMonth);
}

function wsBulkConfirm() {
  /* Confirm all selected rows.
     - In per-month mode: review rows flip to 'confirmed'; auto rows are already mapped, skip.
     - In coverage mode: auto rows get coverageConfirmed (Controller personally reviewed). */
  var inCoverage = (APP.s3gl.ws.activeMonth === 'all');
  Object.keys(APP.s3gl.ws.selectedRows).forEach(function(key) {
    if (key.indexOf('-auto-') >= 0) {
      if (inCoverage) {
        if (!APP.s3gl.ws.coverageConfirmed) APP.s3gl.ws.coverageConfirmed = {};
        APP.s3gl.ws.coverageConfirmed[key] = { by: 'Controller', when: 'Day 18 · 14:32 WIB' };
      }
      /* In per-month, auto rows can't be "confirmed" — they're already mapped. Skip. */
      return;
    }
    APP.s3gl.ws.txnStates[key] = 'confirmed';
  });
  APP.s3gl.ws.selectedRows = {};
  if (typeof invalidateCoverageCache === 'function') invalidateCoverageCache();
  renderMonthWorkspace(APP.s3gl.ws.activeMonth);
}

function wsOpenBulkOverride() {
  APP.s3gl.ws.bulkOverrideOpen = true;
  APP.s3gl.ws.bulkFlagOpen = false;
  APP.s3gl.ws.bulkOverrideDraft = { account:'', dim:'', reason:'' };
  renderMonthWorkspace(APP.s3gl.ws.activeMonth);
}

function wsCancelBulkOverride() {
  APP.s3gl.ws.bulkOverrideOpen = false;
  renderMonthWorkspace(APP.s3gl.ws.activeMonth);
}

function wsConfirmBulkOverride() {
  var draft = APP.s3gl.ws.bulkOverrideDraft;
  if (!draft.account || !draft.reason) {
    alert('Please provide both an account and a reason for the override.');
    return;
  }
  Object.keys(APP.s3gl.ws.selectedRows).forEach(function(key) {
    APP.s3gl.ws.overrides[key] = {
      account: draft.account,
      dim: draft.dim,
      reason: draft.reason,
      by: 'Controller',
      when: 'Day 18 · 14:32 WIB'
    };
    /* For review-type rows, mark them confirmed-as-overridden */
    if (key.indexOf('-auto-') < 0) {
      APP.s3gl.ws.txnStates[key] = 'overridden';
    }
  });
  APP.s3gl.ws.selectedRows = {};
  APP.s3gl.ws.bulkOverrideOpen = false;
  APP.s3gl.ws.bulkOverrideDraft = { account:'', dim:'', reason:'' };
  if (typeof invalidateCoverageCache === 'function') invalidateCoverageCache();
  renderMonthWorkspace(APP.s3gl.ws.activeMonth);
}

function wsOpenBulkFlag() {
  APP.s3gl.ws.bulkFlagOpen = true;
  APP.s3gl.ws.bulkOverrideOpen = false;
  APP.s3gl.ws.bulkFlagComment = '';
  renderMonthWorkspace(APP.s3gl.ws.activeMonth);
}

function wsCancelBulkFlag() {
  APP.s3gl.ws.bulkFlagOpen = false;
  renderMonthWorkspace(APP.s3gl.ws.activeMonth);
}

function wsConfirmBulkFlag() {
  if (!APP.s3gl.ws.bulkFlagComment || APP.s3gl.ws.bulkFlagComment.trim().length === 0) {
    alert('Please add a comment for your IA when flagging these transactions.');
    return;
  }
  Object.keys(APP.s3gl.ws.selectedRows).forEach(function(key) {
    if (key.indexOf('-auto-') >= 0) return; /* auto rows can't be flagged for review */
    APP.s3gl.ws.txnStates[key] = 'flagged';
    APP.s3gl.ws.flagComments[key] = APP.s3gl.ws.bulkFlagComment;
  });
  APP.s3gl.ws.selectedRows = {};
  APP.s3gl.ws.bulkFlagOpen = false;
  APP.s3gl.ws.bulkFlagComment = '';
  if (typeof invalidateCoverageCache === 'function') invalidateCoverageCache();
  renderMonthWorkspace(APP.s3gl.ws.activeMonth);
}

function renderBulkOverrideForm(count) {
  var d = APP.s3gl.ws.bulkOverrideDraft;
  return '<div class="bulk-form">'

function confTag(conf) {
  if (conf >= 80) return 'High confidence (' + conf + '%)';
  if (conf >= 60) return 'Medium confidence (' + conf + '%)';
  return 'Low confidence (' + conf + '%)';
}

function renderStandardTxnRow(grp, gi, ti, txn, state, key) {
  var confColor = txn.confCls === 'hi' ? 'var(--color-success-text)' : txn.confCls === 'med' ? 'var(--color-warning-text)' : 'var(--color-danger-text)';
  var rowCls = state === 'confirmed' ? ' confirmed' : '';
  var actionHtml;

  /* Orphan rows can't be confirmed by Controller — only IA can resolve via CoA amendment */
  if (grp.orphan) {
    actionHtml = '<span style="font-size:11px;font-weight:600;color:var(--color-danger-text);background:var(--color-danger-surface);padding:3px 9px;border-radius:var(--radius-sm);border:1px solid var(--color-danger-border)">Awaiting IA</span>';
  } else if (state === 'confirmed') {
    actionHtml = '<span style="font-size:11px;font-weight:600;color:var(--color-success-text)">&#10003; Confirmed</span>';
  } else {
    actionHtml = '<button class="exc-glm-btn-pri" onclick="wsConfirm(' + gi + ',' + ti + ')">Confirm</button>'
      + '<button class="exc-btn-override" style="margin-left:4px">Override</button>'
      + '<button class="btn-ia" onclick="wsStartFlag(' + gi + ',' + ti + ')" style="margin-left:4px;margin-top:0">Flag IA</button>';
  }

  /* Mapping line varies for orphan rows */
  var mappingLine;
  if (grp.orphan) {
    mappingLine = '<div style="font-size:11px;color:var(--color-danger-text);margin-top:3px;font-weight:500">Legacy: <span style="font-family:var(--font-mono)">' + txn.legacyAcct + '</span> &middot; not in your locked CoA</div>';
  } else {
    mappingLine = '<div style="font-size:11px;color:var(--color-text-secondary);margin-top:3px">AI: <span style="font-weight:500">' + txn.suggested + '</span> &middot; <span style="color:var(--color-text-tertiary)">Dim: ' + txn.dim + '</span> &nbsp;<span style="color:' + confColor + ';font-weight:600">' + confTag(txn.conf) + '</span></div>';
  }

  /* Inline IA flag note for pre-flagged txns (reclass / cash-restate / orphan / etc.) */
  var preFlagNote = '';
  if (txn.hasFlag && txn.flagNote && state !== 'flagged' && state !== 'flagResolved' && state !== 'flagForm') {
    var noteColor = txn.flagReason === 'reclass' ? 'var(--color-action)'
      : txn.flagReason === 'cash-restate' ? 'var(--color-brand)'
      : txn.flagReason === 'fx-revaluation' ? 'var(--color-brand)'
      : txn.flagReason === 'orphan' ? 'var(--color-danger-text)'
      : 'var(--color-warning-text)';
    var noteBg = txn.flagReason === 'reclass' ? 'var(--color-action-wash)'
      : txn.flagReason === 'cash-restate' ? 'var(--color-brand-wash)'
      : txn.flagReason === 'fx-revaluation' ? 'var(--color-brand-wash)'
      : txn.flagReason === 'orphan' ? 'var(--color-danger-surface)'
      : 'var(--color-warning-surface)';
    var noteLabel = txn.flagReason === 'reclass' ? 'IA: Reclassification'
      : txn.flagReason === 'cash-restate' ? 'IA: Cash → Accrual restatement'
      : txn.flagReason === 'fx-revaluation' ? 'IA: FX revaluation (not an error)'
      : txn.flagReason === 'orphan' ? 'IA: Orphaned account — CoA amendment needed'
      : txn.flagReason === 'amount-outlier' ? 'IA: Amount outlier — confirm before bulk-apply'
      : txn.flagReason === 'new-vendor' ? 'IA: New vendor — verify before mapping'
      : 'IA flag';
    preFlagNote = '<div style="background:' + noteBg + ';border-radius:var(--radius-sm);padding:6px 10px;margin-top:6px;font-size:11px;line-height:1.5">'
      + '<div style="font-weight:600;color:' + noteColor + ';font-size:10px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px">' + noteLabel + '</div>'
      + '<div style="color:var(--color-text-secondary)">' + txn.flagNote + '</div>'
      + '</div>';
  }

  return '<div class="txn-row' + rowCls + '" style="' + (grp.orphan ? 'background:var(--color-danger-surface);' : '') + '">'
    + '<div style="flex:1;min-width:0">'
    +   '<div style="font-size:12px;font-family:var(--font-mono);color:var(--color-text-tertiary)">' + txn.ref + ' &middot; ' + txn.date + '</div>'
    +   '<div style="font-size:13px;font-weight:500;color:var(--color-text-primary);margin-top:1px">' + txn.vendor + '</div>'
    +   '<div style="font-size:11px;color:var(--color-text-tertiary);margin-top:1px">' + txn.desc + '</div>'
    +   mappingLine
    +   (txn.similar > 0 ? '<div style="font-size:11px;color:var(--color-action);margin-top:2px">' + txn.similar + ' similar transactions from same vendor</div>' : '')
    +   preFlagNote
    + '</div>'
    + '<div style="text-align:right;flex-shrink:0">'
    +   '<div style="font-size:14px;font-weight:700;font-family:var(--font-mono);color:var(--color-text-primary);margin-bottom:6px">' + txn.amount + '</div>'
    +   '<div style="display:flex;gap:4px;justify-content:flex-end;flex-wrap:wrap">' + actionHtml + '</div>'
    + '</div>'
    + '</div>';
}

}

function renderS3(){

  // rendered by renderS3GL().
  var ssb = document.getElementById('substepbar');
  ssb.style.display = 'none';
  ssb.innerHTML = '';

  s3_refreshData();

  var html = '<h1 class="stage-title">Financial Statement Reviews</h1>'
    + '<p class="stage-sub">Reconcile your Klay-derived financial statements against the Legacy reference uploaded in Stage 1. Investigate any variance — if a row needs remapping, jump back to Stage 2; if a transaction needs reverification, jump back to Stage 3.</p>'
    + '<div class="stage-meta"><span>Day 22 of 30</span></div>';

  // ── 2-COLUMN SHELL (mirrors Stage 2) ──

/* ── COLUMN 1: Period rail (ALL + months) ── */
function s3_renderPeriodCol(){
  var p = APP.s3.period;
  var html = '<div class="s2-prail">';
  html += '<div class="s2-prail-list">';

  // Compute variance count for a given period (used for status indicators)
  function varCountFor(period){
    var data = s3_buildStatements(period);
    return data.tb.filter(function(r){
      if (r.kind || r.section || r.legacyOnly) return false;
      return r.legacy !== r.klay;
    }).length;
  }

  // ALL row
  var allVarCount = varCountFor('cumulative');
  html += '<div class="s2-prail-item all ' + (p === 'cumulative' ? 'active' : '') + '" onclick="s3_setPeriod(\'cumulative\')">'
    + '<span>ALL</span>'
    + '<span class="s2-prail-num">YTD</span>'
    + '</div>';

  S2_MONTHS.forEach(function(m, i){
    var active = (p === i || p === String(i));
    var monthVarCount = varCountFor(i);
    // Status: green check if no variance, amber dot if small, red ! if material
    // (For our demo: the placement-error always shows as variance, plus per-month FX noise)
    var markCls, markIcon;
    if (monthVarCount === 0) { markCls = 'done'; markIcon = '&#10003;'; }
    else { markCls = 'flag'; markIcon = '!'; }
    html += '<div class="s2-prail-item ' + (active ? 'active' : '') + '" onclick="s3_setPeriod(' + i + ')">'
      + '<span class="s2-prail-mark ' + markCls + '">' + markIcon + '</span>'
      + '<span>' + m.m + '</span>';
    html += '</div>';
  });
  html += '</div>';

  // Footer — summary of variance count for current period
  var varCount = S3_TB.filter(function(r){
    if (r.kind || r.section || r.legacyOnly) return false;
    return r.legacy !== r.klay;
  }).length;
  html += '<div class="s2-prail-foot">'
    + '<div class="s2-prail-foot-lbl">Variances</div>'
    + '<div class="s2-prail-foot-val">' + varCount + ' account' + (varCount === 1 ? '' : 's')
    + '</div></div>';

  html += '</div>';
  return html;
}

/* ── COLUMN 2: Main content (tabs + summary + table) ── */
function s3_renderMainCol(){
  var v = APP.s3.view;
  var p = APP.s3.period;
  var periodLabel = (p === 'cumulative') ? 'YTD · Jan–Sep 2025' : (S2_MONTHS[parseInt(p, 10)] && S2_MONTHS[parseInt(p, 10)].full) || 'Selected period';

  var html = '<div class="s3-main">';

  // Tabs at the top of the main area
  var tabs = [
    {k:'tb', l:'Trial Balance'},
    {k:'bs', l:'Balance Sheet'},
    {k:'pl', l:'P&L'}
  ];
  html += '<div class="s3-tabs">';
  tabs.forEach(function(t){
    var cls = v === t.k ? 'active' : '';
    html += '<button class="s3-tab ' + cls + '" onclick="s3_setView(\'' + t.k + '\')">' + t.l + '</button>';
  });
  html += '<div class="s3-period-lbl">' + periodLabel + '</div>';
  html += '</div>';

  // Resolve dataset and totals for the active tab
  var ds = s3_datasetFor(v);
  var totals = s3_totalsFor(v);

  // ── 3 SUMMARY BOXES ──
  html += s3_renderSummary(totals);

  // Variance handling
  var diffSubset = ds.filter(function(r){ return !(r.kind || r.section) && !r.legacyOnly && r.legacy !== r.klay; });
  var hasVariance = diffSubset.length > 0;

  // Filter + ViewBy toggles
  var showAll = APP.s3.showAll || false;
  var viewBy = APP.s3.viewBy || 'klay';
  html += '<div class="s3-filter-row">';
  // Count legacy contributors across all Klay rows for accurate label
  var legacyContribCount = ds.reduce(function(s, r){
    if (r.kind || r.section || r.legacyOnly) return s;
    return s + (r.contribs ? r.contribs.length : 0);
  }, 0);
  var klayRowCount = ds.filter(function(r){return !(r.kind || r.section || r.legacyOnly);}).length;

  html += '<div class="s3-filter-grp">';
  html += '<button class="s2-ws-filt-btn ' + (!showAll ? 'active' : '') + '" onclick="s3_setShowAll(false)">Variances only (' + diffSubset.length + ')</button>';
  html += '<button class="s2-ws-filt-btn ' + (showAll ? 'active' : '') + '" onclick="s3_setShowAll(true)">All accounts</button>';
  html += '</div>';
  // View by toggle — three options
  html += '<div class="s3-viewby">';
  html += '<span class="s3-viewby-lbl">View by:</span>';
  html += '<button class="s2-ws-filt-btn ' + (viewBy === 'klay' ? 'active' : '') + '" onclick="s3_setViewBy(\'klay\')">Klay account (' + klayRowCount + ')</button>';
  html += '<button class="s2-ws-filt-btn ' + (viewBy === 'bylegacy' ? 'active' : '') + '" onclick="s3_setViewBy(\'bylegacy\')">Legacy account (' + legacyContribCount + ')</button>';
  html += '<button class="s2-ws-filt-btn ' + (viewBy === 'legacy' ? 'active' : '') + '" onclick="s3_setViewBy(\'legacy\')">Side-by-side</button>';
  html += '</div>';
  html += '</div>';

  if (hasVariance && viewBy === 'klay') {
    html += '<div class="s3-help-row">Click ▶ to expand a Klay row and see its legacy contributors. <strong>Investigate</strong> jumps back to Stage 2 mapping.</div>';
  } else if (viewBy === 'bylegacy') {
    html += '<div class="s3-help-row">One row per legacy account. Rows grouped by their Klay mapping target — adjacent rows with the same target represent many-to-one consolidations.</div>';
  }

  // Table
  if (viewBy === 'klay') {
    html += s3_renderTable(ds, v, showAll);
  } else if (viewBy === 'bylegacy') {
    html += s3_renderByLegacy(ds, v, showAll);
  } else {
    html += s3_renderLegacyView(ds, v, showAll);
  }

  html += '</div>'; // /s3-main
  return html;
}

/* Choose dataset based on view */
function s3_datasetFor(view){
  if (view === 'tb') return S3_TB;
  if (view === 'pl') return S3_PL;
  // 'bs' — only A/L/E sections of TB
  return S3_TB.filter(function(r){
    if (!r.kind && !r.section) return true;
    return ['ASSETS','TOTAL_ASSETS','LIABILITIES','TOTAL_LIABILITIES','EQUITY','TOTAL_EQUITY','TOTAL_LE'].indexOf(r.section) !== -1;
  });
}

/* Totals for header summary boxes */
function s3_totalsFor(view){
  var ds = s3_datasetFor(view);
  // Strategy: pick a representative grand-total row.
  var key;
  if (view === 'tb') key = 'TOTAL_LE';   // use total L+E (matches total assets)
  else if (view === 'bs') key = 'TOTAL_LE';
  else key = 'NET'; // P&L → net income
  var row = ds.find(function(r){return r.section === key;});
  if (!row) return {legacy:0, klay:0, label:'Total'};
  // Friendly label
  var label = key === 'NET' ? 'Net income' : (key === 'TOTAL_LE' ? 'Total assets' : (row.label || 'Total'));
  return {legacy: row.legacy, klay: row.klay, label: label};
}

/* Render the 3 summary boxes */
function s3_renderSummary(t){
  var v = (t.klay || 0) - (t.legacy || 0);
  var pct = (t.legacy && t.legacy !== 0) ? (v / Math.abs(t.legacy)) * 100 : 0;

  var box;
  if (v === 0) box = {tone:'ok', icon:'&#10003;', label:'In sync', sub:'Klay matches Legacy exactly'};
  else if (Math.abs(pct) <= 0.1) box = {tone:'warn', icon:'!', label:'Within tolerance', sub:'Δ less than 0.1% of Legacy'};
  else box = {tone:'bad', icon:'&times;', label:'Material variance', sub:'Δ exceeds 0.1% threshold'};

  var html = '<div class="s3-summary">';
  // Legacy
  html += '<div class="s3-sumbox">';
  html += '<div class="s3-sumbox-lbl">Legacy ' + t.label.toLowerCase() + '</div>';
  html += '<div class="s3-sumbox-val">' + s3_fmtIDR(t.legacy) + '</div>';
  html += '<div class="s3-sumbox-sub">Reference (Stage 1 upload)</div>';
  html += '</div>';
  // Klay
  html += '<div class="s3-sumbox">';
  html += '<div class="s3-sumbox-lbl">Klay ' + t.label.toLowerCase() + '</div>';
  html += '<div class="s3-sumbox-val">' + s3_fmtIDR(t.klay) + '</div>';
  html += '<div class="s3-sumbox-sub">Derived from mapped GL</div>';
  html += '</div>';
  // Variance
  html += '<div class="s3-sumbox s3-sumbox-' + box.tone + '">';
  html += '<div class="s3-sumbox-lbl">Variance</div>';
  var sign = v > 0 ? '+' : v < 0 ? '−' : '';
  var absStr = (v === 0) ? '—' : ('Rp ' + Math.abs(v).toLocaleString('en-US'));
  html += '<div class="s3-sumbox-val">' + sign + (v === 0 ? '' : ' ') + absStr + '</div>';
  html += '<div class="s3-sumbox-sub"><span class="s3-sumbox-icon">' + box.icon + '</span> ' + box.label + ' &middot; ' + box.sub + '</div>';
  html += '</div>';
  html += '</div>';
  return html;
}

function s3_fmtIDR(n){
  if (n === 0 || n == null) return 'Rp 0';
  var abs = Math.abs(n);
  // For summary boxes we prefer Bn/Mn for readability
  if (abs >= 1_000_000_000) return 'Rp ' + (n / 1_000_000_000).toFixed(2) + 'B';
  if (abs >= 1_000_000) return 'Rp ' + (n / 1_000_000).toFixed(1) + 'M';
  return 'Rp ' + n.toLocaleString('en-US');
}

/* Comparison table */
/* ── PATTERN 1: Klay-anchored with expand-to-show-legacy-contributors ── */
function s3_renderTable(ds, view, showAll){
  var html = '<div class="compare-table-wrap"><table class="compare-table">';
  var legacyHdr, klayHdr;
  if (view === 'tb') { legacyHdr = 'Legacy TB'; klayHdr = 'Klay TB'; }
  else if (view === 'bs') { legacyHdr = 'Legacy'; klayHdr = 'Klay'; }
  else { legacyHdr = 'Legacy P&L'; klayHdr = 'Klay P&L'; }

  html += '<thead><tr>'
    + '<th style="width:30px"></th>'
    + '<th style="width:120px">Account</th>'
    + '<th>Name</th>'
    + '<th class="num">' + legacyHdr + '</th>'
    + '<th class="num">' + klayHdr + '</th>'
    + '<th class="num" style="width:170px">Variance</th>'
    + '<th style="width:120px"></th>'
    + '</tr></thead><tbody>';

  // Helper: find the subtotal that follows a given section header.
  // The TOTAL_ row's `legacy` value is what the Stage 1 Legacy TB upload would have totaled
  // for this section; `klay` is what Klay computed.
  function findSectionSubtotal(secName, fromIdx){
    // Section name 'ASSETS' → subtotal 'TOTAL_ASSETS'; equity sums into 'TOTAL_EQUITY' but the BS grand total is 'TOTAL_LE'
    var key = 'TOTAL_' + secName;
    for (var j = fromIdx; j < ds.length; j++) {
      if (ds[j].section === key) return ds[j];
    }
    return null;
  }

  // Group rows into a structured pass: section banner → klay accounts → legacy-only group → subtotal
  var i = 0;
  while (i < ds.length) {
    var r = ds[i];
    if (r.kind === 'section') {
      // Emit a section banner that shows the Stage 1 upload reconciliation
      var sub = findSectionSubtotal(r.section, i + 1);
      if (sub) {
        var sv = fmtVar(sub.legacy, sub.klay);
        var diff = sub.klay - sub.legacy;
        var pctOfLegacy = (sub.legacy !== 0) ? Math.abs(diff) / Math.abs(sub.legacy) * 100 : 0;
        var tone;
        if (diff === 0) tone = 'ok';
        else if (pctOfLegacy <= 0.1) tone = 'warn';
        else tone = 'bad';
        html += '<tr class="s3-secbanner s3-secbanner-' + tone + '"><td colspan="7">';
        html += '<div class="s3-secbanner-row">';
        html += '<div class="s3-secbanner-label">' + r.label + '</div>';
        html += '<div class="s3-secbanner-pair">';
        html += '<span class="s3-secbanner-side"><span class="s3-secbanner-side-lbl">Stage 1 upload</span><span class="s3-secbanner-side-val">' + fmt(sub.legacy) + '</span></span>';
        html += '<span class="s3-secbanner-arrow">→</span>';
        html += '<span class="s3-secbanner-side"><span class="s3-secbanner-side-lbl">Klay derived</span><span class="s3-secbanner-side-val">' + fmt(sub.klay) + '</span></span>';
        html += '</div>';
        html += '<div class="s3-secbanner-var ' + tone + '">';
        if (diff === 0) html += '<span class="s3-secbanner-var-icon">&#10003;</span> Reconciled';
        else html += '<span class="s3-secbanner-var-icon">' + (tone === 'bad' ? '&times;' : '!') + '</span> Δ ' + sv.text;
        html += '</div>';
        html += '</div>';
        html += '</td></tr>';
      } else {
        // Fallback for sections that don't have a paired subtotal (shouldn't happen)
        html += '<tr class="section-row"><td colspan="7">' + r.label + '</td></tr>';
      }
      i++;
      continue;
    }
    if (r.kind === 'subtotal' || r.kind === 'total') {
      var v = fmtVar(r.legacy, r.klay);
      html += '<tr class="' + (r.kind === 'total' ? 'total-row' : 'subtotal-row') + '">';
      html += '<td></td><td></td><td>' + r.label + '</td>';
      html += '<td class="num legacy">' + fmt(r.legacy) + '</td>';
      html += '<td class="num klay">' + fmt(r.klay) + '</td>';
      html += '<td class="num ' + v.cls + '">' + v.text + '</td><td></td></tr>';
      i++;
      continue;
    }
    // Skip legacy-only rows here — handled in second pass per section
    if (r.legacyOnly) { i++; continue; }

    // Klay account row
    var hasVar = (r.legacy !== r.klay);
    if (!showAll && !hasVar) { i++; continue; }
    var v2 = fmtVar(r.legacy, r.klay);
    var hasContribs = r.contribs && r.contribs.length > 0;
    var multiContrib = hasContribs && r.contribs.length > 1;
    // Auto-expand if variance row (so user immediately sees which contributor caused it)
    var defaultExpand = hasVar && hasContribs;
    var isExpanded = APP.s3.expanded[r.acct] != null ? APP.s3.expanded[r.acct] : defaultExpand;
    var chevron = hasContribs ? (isExpanded ? '▼' : '▶') : '';

    html += '<tr' + (hasVar ? ' class="s3-var-row"' : '') + '>';
    html += '<td class="s3-chev">' + (hasContribs ? '<span class="s3-chev-btn" onclick="s3_toggleExpand(\'' + r.acct + '\')">' + chevron + '</span>' : '') + '</td>';
    html += '<td class="acct">' + r.acct + '</td>';
    html += '<td class="acct-name">' + r.name;
    if (multiContrib) html += ' <span class="s3-contrib-badge">' + r.contribs.length + ' legacy</span>';
    html += '</td>';
    html += '<td class="num legacy">' + fmt(r.legacy) + '</td>';
    html += '<td class="num klay">' + fmt(r.klay) + '</td>';
    html += '<td class="num ' + v2.cls + '">' + v2.text + '</td>';
    html += '<td>';
    if (hasVar) {
      // Find the contributor responsible for the variance (if any) — pass its old code
      var varContrib = r.contribs ? r.contribs.find(function(c){return c.legacy !== c.klay && c.old !== '—';}) : null;
      var legacyOld = varContrib ? varContrib.old : '';
      html += '<button class="btn-investigate" onclick="s3_investigate(\'' + r.acct + '\', \'' + legacyOld + '\')" title="Jump to Stage 2 — Workspace"><span>Investigate</span><span class="btn-investigate-arrow">&rarr;</span></button>';
    }
    html += '</td>';
    html += '</tr>';

    // Render contributors when expanded
    if (isExpanded && hasContribs) {
      r.contribs.forEach(function(c){
        var cv = fmtVar(c.legacy, c.klay);
        var cVar = (c.legacy !== c.klay);
        html += '<tr class="s3-contrib-row' + (cVar ? ' s3-contrib-var' : '') + '">';
        html += '<td></td>';
        html += '<td class="acct s3-contrib-code">' + c.old + '</td>';
        html += '<td class="acct-name s3-contrib-name">↳ ' + c.oldName + (c.varNote ? ' <span class="s3-contrib-note">' + c.varNote + '</span>' : '') + '</td>';
        html += '<td class="num legacy">' + fmt(c.legacy) + '</td>';
        html += '<td class="num klay">' + fmt(c.klay) + '</td>';
        html += '<td class="num ' + cv.cls + '">' + cv.text + '</td>';
        html += '<td>';
        if (cVar && c.old !== '—') {
          html += '<button class="btn-investigate btn-investigate-sm" onclick="s3_investigate(\'' + r.acct + '\', \'' + c.old + '\')" title="Jump to Stage 2 — Workspace for this account"><span>Investigate</span><span class="btn-investigate-arrow">&rarr;</span></button>';
        }
        html += '</td>';
        html += '</tr>';
      });
    }

    i++;
  }

  // Second pass: append legacy-only sub-sections at the bottom of each main section
  // (For prototype simplicity, we render a single "Legacy-only accounts" group at the end, before grand total)
  var legacyOnly = ds.filter(function(r){return r.legacyOnly;});
  if (legacyOnly.length > 0) {
    html += '<tr class="section-row s3-legacy-only-hdr"><td colspan="7">Legacy-only accounts <span class="s3-legacy-only-tag">no Klay equivalent</span></td></tr>';
    legacyOnly.forEach(function(r){
      html += '<tr class="s3-legacy-only-row">';
      html += '<td></td>';
      html += '<td class="acct">' + (r.acct || '').replace(/^L:/, '') + '</td>';
      html += '<td class="acct-name">' + r.name + (r.note ? '<div class="s3-legacy-only-note">' + r.note + '</div>' : '') + '</td>';
      html += '<td class="num legacy" style="color:var(--color-text-tertiary);font-style:italic">structural</td>';
      html += '<td class="num klay" style="color:var(--color-text-tertiary)">—</td>';
      html += '<td class="num var-zero">—</td>';
      html += '<td></td>';
      html += '</tr>';
    });
  }

  html += '</tbody></table></div>';
  return html;
}

/* ── BY LEGACY: one row per legacy account, grouped by section, with mapping target visible ──
   Same single-table layout as the by-Klay view, but pivoted: each row is a legacy account
   showing where it lands in Klay. Rows with the same Klay target are visually grouped
   so many-to-one consolidations are easy to spot. */
function s3_renderByLegacy(ds, view, showAll){
  var html = '<div class="compare-table-wrap"><table class="compare-table">';
  var legacyHdr, klayHdr;
  if (view === 'tb') { legacyHdr = 'Legacy TB'; klayHdr = 'Klay TB'; }
  else if (view === 'bs') { legacyHdr = 'Legacy'; klayHdr = 'Klay'; }
  else { legacyHdr = 'Legacy P&L'; klayHdr = 'Klay P&L'; }

  html += '<thead><tr>'
    + '<th style="width:90px">Legacy code</th>'
    + '<th>Legacy name</th>'
    + '<th style="width:280px">Mapped to (Klay)</th>'
    + '<th class="num">' + legacyHdr + '</th>'
    + '<th class="num">' + klayHdr + '</th>'
    + '<th class="num" style="width:140px">Variance</th>'
    + '<th style="width:110px"></th>'
    + '</tr></thead><tbody>';

  // Helper: find subtotal for section banner
  function findSectionSubtotal(secName, fromIdx){
    var key = 'TOTAL_' + secName;
    for (var j = fromIdx; j < ds.length; j++) {
      if (ds[j].section === key) return ds[j];
    }
    return null;
  }

  // Walk ds: emit section banner, then for each Klay row in the section, expand its legacy contributors
  var i = 0;
  while (i < ds.length) {
    var r = ds[i];

    if (r.kind === 'section') {
      var sub = findSectionSubtotal(r.section, i + 1);
      if (sub) {
        var sv = fmtVar(sub.legacy, sub.klay);
        var diff = sub.klay - sub.legacy;
        var pctOfLegacy = (sub.legacy !== 0) ? Math.abs(diff) / Math.abs(sub.legacy) * 100 : 0;
        var tone;
        if (diff === 0) tone = 'ok';
        else if (pctOfLegacy <= 0.1) tone = 'warn';
        else tone = 'bad';
        html += '<tr class="s3-secbanner s3-secbanner-' + tone + '"><td colspan="7">';
        html += '<div class="s3-secbanner-row">';
        html += '<div class="s3-secbanner-label">' + r.label + '</div>';
        html += '<div class="s3-secbanner-pair">';
        html += '<span class="s3-secbanner-side"><span class="s3-secbanner-side-lbl">Stage 1 upload</span><span class="s3-secbanner-side-val">' + fmt(sub.legacy) + '</span></span>';
        html += '<span class="s3-secbanner-arrow">→</span>';
        html += '<span class="s3-secbanner-side"><span class="s3-secbanner-side-lbl">Klay derived</span><span class="s3-secbanner-side-val">' + fmt(sub.klay) + '</span></span>';
        html += '</div>';
        html += '<div class="s3-secbanner-var ' + tone + '">';
        if (diff === 0) html += '<span class="s3-secbanner-var-icon">&#10003;</span> Reconciled';
        else html += '<span class="s3-secbanner-var-icon">' + (tone === 'bad' ? '&times;' : '!') + '</span> Δ ' + sv.text;
        html += '</div>';
        html += '</div>';
        html += '</td></tr>';
      }
      i++;
      continue;
    }

    if (r.kind === 'subtotal' || r.kind === 'total') {
      var v = fmtVar(r.legacy, r.klay);
      html += '<tr class="' + (r.kind === 'total' ? 'total-row' : 'subtotal-row') + '">';
      html += '<td></td><td></td><td>' + r.label + '</td>';
      html += '<td class="num legacy">' + fmt(r.legacy) + '</td>';
      html += '<td class="num klay">' + fmt(r.klay) + '</td>';
      html += '<td class="num ' + v.cls + '">' + v.text + '</td><td></td></tr>';
      i++;
      continue;
    }

    if (r.legacyOnly) { i++; continue; } // handled in second pass

    // Klay account row → expand into one row per contributor
    if (r.contribs && r.contribs.length > 0) {
      r.contribs.forEach(function(c, cidx){
        var cVar = (c.legacy !== c.klay);
        if (!showAll && !cVar) return;
        var cv = fmtVar(c.legacy, c.klay);
        var isFirstInGroup = cidx === 0;
        var groupSize = r.contribs.length;
        var multiContrib = groupSize > 1;

        html += '<tr class="s3-bylegacy-row' + (cVar ? ' s3-var-row' : '') + (multiContrib && isFirstInGroup ? ' group-start' : '') + (multiContrib && cidx > 0 ? ' group-cont' : '') + '">';
        html += '<td class="acct">' + c.old + '</td>';
        html += '<td class="acct-name">' + c.oldName + (c.varNote ? ' <span class="s3-contrib-note">' + c.varNote + '</span>' : '') + '</td>';
        html += '<td class="s3-bylegacy-target">';
        if (multiContrib && !isFirstInGroup) {
          html += '<span class="s3-bylegacy-target-cont">↳ same target</span>';
        } else {
          html += '<span class="s3-bylegacy-target-code">' + r.acct + '</span>';
          html += '<span class="s3-bylegacy-target-name">' + r.name + '</span>';
          if (multiContrib) html += '<span class="s3-contrib-badge">' + groupSize + ' legacy</span>';
        }
        html += '</td>';
        html += '<td class="num legacy">' + fmt(c.legacy) + '</td>';
        html += '<td class="num klay">' + fmt(c.klay) + '</td>';
        html += '<td class="num ' + cv.cls + '">' + cv.text + '</td>';
        html += '<td>';
        if (cVar && c.old !== '—') {
          html += '<button class="btn-investigate btn-investigate-sm" onclick="s3_investigate(\'' + r.acct + '\', \'' + c.old + '\')" title="Jump to Stage 2 — Workspace for this account"><span>Investigate</span><span class="btn-investigate-arrow">&rarr;</span></button>';
        }
        html += '</td>';
        html += '</tr>';
      });
    }

    i++;
  }

  // Legacy-only sub-section at the bottom
  var legacyOnly = ds.filter(function(r){return r.legacyOnly;});
  if (legacyOnly.length > 0) {
    html += '<tr class="section-row s3-legacy-only-hdr"><td colspan="7">Legacy-only accounts <span class="s3-legacy-only-tag">no Klay equivalent</span></td></tr>';
    legacyOnly.forEach(function(r){
      html += '<tr class="s3-legacy-only-row">';
      html += '<td class="acct">' + (r.acct || '').replace(/^L:/, '') + '</td>';
      html += '<td class="acct-name">' + r.name + (r.note ? '<div class="s3-legacy-only-note">' + r.note + '</div>' : '') + '</td>';
      html += '<td class="acct-name" style="color:var(--color-text-tertiary);font-style:italic">no Klay target</td>';
      html += '<td class="num legacy" style="color:var(--color-text-tertiary);font-style:italic">structural</td>';
      html += '<td class="num klay" style="color:var(--color-text-tertiary)">—</td>';
      html += '<td class="num var-zero">—</td>';
      html += '<td></td>';
      html += '</tr>';
    });
  }

  html += '</tbody></table></div>';
  return html;
}

/* ── SIDE-BY-SIDE: Pattern 2 — Legacy and Klay TBs in two panes ── */
function s3_renderLegacyView(ds, view, showAll){
  // Build two parallel datasets:
  //  - LEFT (Legacy): every contributor, plus legacy-only rows, organized by section
  //  - RIGHT (Klay): every Klay row, organized by section
  // Section subtotals reconcile across both sides.

  var html = '<div class="s3-sbs">';

  // We render section by section so subtotals line up.
  // Walk ds and split into sections.
  var sections = [];
  var current = null;
  ds.forEach(function(r){
    if (r.kind === 'section') {
      current = {label:r.label, klay:[], legacy:[], subtotal:null};
      sections.push(current);
      return;
    }
    if (r.kind === 'subtotal' || r.kind === 'total') {
      if (current) current.subtotal = r;
      else sections.push({label:r.label, klay:[], legacy:[], subtotal:r}); // grand total floats own section
      // For 'total' row (TOTAL_LE), end the current section
      if (r.kind === 'total') current = null;
      return;
    }
    if (!current) return;
    if (r.legacyOnly) {
      current.legacy.push({code:(r.acct || '').replace(/^L:/,''), name:r.name, note:r.note, structural:true});
    } else {
      current.klay.push(r);
      // expand contributors as legacy entries on the left
      if (r.contribs) {
        r.contribs.forEach(function(c){
          current.legacy.push({code:c.old, name:c.oldName, legacy:c.legacy, klay:c.klay, mappedTo:r.acct, mappedToName:r.name, varNote:c.varNote});
        });
      }
    }
  });

  sections.forEach(function(sec){
    if (sec.klay.length === 0 && sec.legacy.length === 0 && !sec.subtotal) return;

    html += '<div class="s3-sbs-section">';
    html += '<div class="s3-sbs-section-hdr">' + sec.label + '</div>';
    html += '<div class="s3-sbs-grid">';

    // LEFT pane: Legacy accounts with their balances
    html += '<div class="s3-sbs-pane">';
    html += '<div class="s3-sbs-pane-hdr"><span>Legacy CoA</span><span class="s3-sbs-pane-meta">' + sec.legacy.length + ' accounts</span></div>';
    html += '<table class="s3-sbs-tbl"><tbody>';
    sec.legacy.forEach(function(l){
      if (l.structural) {
        html += '<tr class="s3-sbs-row legacy-only">';
        html += '<td class="acct" style="width:70px">' + l.code + '</td>';
        html += '<td class="acct-name"><em>' + l.name + '</em></td>';
        html += '<td class="num" style="color:var(--color-text-tertiary);width:120px">structural</td>';
        html += '</tr>';
      } else {
        var rowVar = (l.legacy !== l.klay);
        if (!showAll && !rowVar) return;
        html += '<tr class="s3-sbs-row' + (rowVar ? ' s3-var-row' : '') + '">';
        html += '<td class="acct" style="width:70px">' + l.code + '</td>';
        html += '<td class="acct-name">' + l.name + '<div class="s3-sbs-mapto">→ ' + l.mappedTo + ' · ' + s2_klayDisplayName(l.mappedTo, l.mappedToName) + '</div></td>';
        html += '<td class="num" style="width:120px">' + fmt(l.legacy) + '</td>';
        html += '</tr>';
      }
    });
    if (sec.subtotal) {
      html += '<tr class="s3-sbs-subtotal"><td></td><td>' + sec.subtotal.label + '</td><td class="num">' + fmt(sec.subtotal.legacy) + '</td></tr>';
    }
    html += '</tbody></table>';
    html += '</div>';

    // RIGHT pane: Klay accounts with their balances
    html += '<div class="s3-sbs-pane">';
    html += '<div class="s3-sbs-pane-hdr"><span>Klay CoA</span><span class="s3-sbs-pane-meta">' + sec.klay.length + ' accounts</span></div>';
    html += '<table class="s3-sbs-tbl"><tbody>';
    sec.klay.forEach(function(k){
      var rowVar = (k.legacy !== k.klay);
      if (!showAll && !rowVar) return;
      var v = fmtVar(k.legacy, k.klay);
      html += '<tr class="s3-sbs-row' + (rowVar ? ' s3-var-row' : '') + '">';
      html += '<td class="acct" style="width:80px">' + k.acct + '</td>';
      html += '<td class="acct-name">' + s2_klayDisplayName(k.acct, k.name);
      if (rowVar) html += '<div class="s3-sbs-varnote">Δ ' + v.text + '</div>';
      html += '</td>';
      html += '<td class="num" style="width:120px">' + fmt(k.klay) + '</td>';
      html += '</tr>';
    });
    if (sec.subtotal) {
      var subVar = fmtVar(sec.subtotal.legacy, sec.subtotal.klay);
      html += '<tr class="s3-sbs-subtotal"><td></td><td>' + sec.subtotal.label + (subVar.cls === 'var-pos' || subVar.cls === 'var-neg' ? ' <span class="s3-sbs-subvar">Δ ' + subVar.text + '</span>' : '') + '</td><td class="num">' + fmt(sec.subtotal.klay) + '</td></tr>';
    }
    html += '</tbody></table>';
    html += '</div>';

    html += '</div></div>'; // /grid /section
  });

  html += '</div>'; // /sbs
  return html;
}

function s3_setView(v){
  APP.s3.view = v;
  renderS3();

}
function s3_setPeriod(p){
  APP.s3.period = p;

}
function s3_setShowAll(b){
  APP.s3.showAll = b;
  renderS3();
}
function s3_setViewBy(vb){
  APP.s3.viewBy = vb;
  // Reset expanded state when switching views
  if (vb === 'klay') APP.s3.expanded = {};
  renderS3();
  window.scrollTo(0, 0);
}
function s3_toggleExpand(acct){
  // If undefined, the row's auto-expanded by default, so toggle starts as collapsing
  var current = APP.s3.expanded[acct];
  if (current == null) {
    // Determine current default — variance rows are auto-expanded
    var ds = s3_datasetFor(APP.s3.view);
    var row = ds.find(function(r){return r.acct === acct;});
    var defaultExpand = row && row.contribs && row.legacy !== row.klay;
    APP.s3.expanded[acct] = !defaultExpand;
  } else {
    APP.s3.expanded[acct] = !current;
  }
  renderS3();
}

function s3_investigate(klayAcct, legacyAcct){
  // Map the Klay account code to the right Substep 3 account-type tab
  var firstDigit = klayAcct.charAt(0);
  var clusterKey = 'all-accounts';
  if (firstDigit === '1') {
    // Assets — split between current and fixed by code
    clusterKey = (klayAcct.indexOf('1-2') === 0) ? 'type:fa' : 'type:ca';
  }
  else if (firstDigit === '2') clusterKey = 'type:cl';
  else if (firstDigit === '4') clusterKey = 'type:rev';
  else if (firstDigit === '5') clusterKey = 'type:cogs';
  else if (firstDigit === '6' || firstDigit === '7' || firstDigit === '8') clusterKey = 'type:opex';

  // Special case: placement-error account 12310,0,20 lives under the "Account type missing"
  // issue cluster. Route there instead so the user lands on the annotated reason.
  if (legacyAcct === '12310,0,20') {
    clusterKey = 'type-missing';
  }

  // Set Stage 2 state — go to Workspace substep, filter to Unmapped for context
  APP.s2.substep = 2;
  APP.s2.activeCluster = clusterKey;
  APP.s2.wsFilter = 'unmapped';
  APP.s2.klayCoaView = false;
  // Stash the account to highlight after render
  APP.s2.highlightAccount = legacyAcct || null;
  jumpToStage(2);

  // After render, scroll to the highlighted account and pulse it
  if (legacyAcct) {
    setTimeout(function(){
      var rowId = 's2-row-' + legacyAcct.replace(/[^a-zA-Z0-9]/g, '_');
      var row = document.getElementById(rowId);
      if (row) {
        row.scrollIntoView({behavior:'smooth', block:'center'});
        row.classList.add('s2-row-highlight');
        setTimeout(function(){ row.classList.remove('s2-row-highlight'); }, 2400);
      }
    }, 150);
  }
}

/* Close popovers (filter dropdowns, row action menu) when clicking outside */
document.addEventListener('click', function(ev){
  var changed = false;
  var insideAnchor = !!ev.target.closest('.s2-ft-pop-anchor');
  // Close filter dropdowns when click is outside any .s2-ft-pop-anchor
  if (APP.s2 && APP.s2.typeFilterOpen && !insideAnchor) {
    APP.s2.typeFilterOpen = false; changed = true;
  }
  if (APP.s2 && APP.s2.klayFilterOpen && !insideAnchor) {
    APP.s2.klayFilterOpen = false; changed = true;
  }
  if (APP.s2 && APP.s2.moreFilterOpen && !insideAnchor) {
    APP.s2.moreFilterOpen = false; changed = true;
  }
  // Close row action menu when click is outside any .s2-row-menu-wrap
  if (APP.s2 && APP.s2.rowMenuOpen != null) {
    if (!ev.target.closest('.s2-row-menu-wrap')) {
      APP.s2.rowMenuOpen = null;
      changed = true;
    }
  }
  // GL Mapping filter popovers — close when clicking outside any .glm-fpop-anchor
  var insideGlmAnchor = !!ev.target.closest('.glm-fpop-anchor');
  if (APP.s3gl && APP.s3gl.ws && APP.s3gl.ws.legacyAcctFilterOpen && !insideGlmAnchor) {
    APP.s3gl.ws.legacyAcctFilterOpen = false; changed = true;
  }
  if (APP.s3gl && APP.s3gl.ws && APP.s3gl.ws.klayAcctFilterOpen && !insideGlmAnchor) {
    APP.s3gl.ws.klayAcctFilterOpen = false; changed = true;
  }
  // Avatar dropdown menu — close when clicking outside .avatar-menu-wrap
  if (APP.avatarMenuOpen && !ev.target.closest('.avatar-menu-wrap')) {
    APP.avatarMenuOpen = false;
    renderAvatarMenu();
  }
  if (changed && typeof renderApp === 'function') renderApp();
});
</script>
</body>
</html>
