/* Flatten getWorkspaceData's clustered txns into a single per-month transaction list.
   Each transaction gets a stable row key 'monthIdx-gi-ti' and exposes legacy + Klay
   account info, dimensions, amount, etc. The pre-existing review txns (low-confidence)
   are joined with the auto-mapped txns to form the full "every line" universe. */
function glm_flattenTxns(monthIdx) {
  if (monthIdx === 'all' || monthIdx == null) return [];
  var groups = getWorkspaceData(monthIdx);
  if (groups.length === 1 && groups[0].notClosed) return [];
  var mo = S3GL_MONTHS[monthIdx];
  var rows = [];
  groups.forEach(function(grp, gi) {
    /* Review-flagged rows (the originals from getWorkspaceData) */
    (grp.txns || []).forEach(function(t, ti) {
      var key = monthIdx + '-' + gi + '-' + ti;
      var amtNum = parseInt(String(t.amount).replace(/[^0-9]/g, ''), 10) || 0;
      var legacyCode = (t.legacyAcct ? t.legacyAcct.split(' · ')[0] : null) || (t.suggested ? t.suggested.split(' · ')[0] : '—');
      var legacyName = t.legacyAcct ? (t.legacyAcct.split(' · ')[1] || '') : '';
      rows.push({
        key: key,
        monthIdx: monthIdx, gi: gi, ti: ti, category: grp.name,
        ref: t.ref, date: t.date, vendor: t.vendor, desc: t.desc,
        amount: t.amount, amountNum: amtNum,
        legacyCode: legacyCode, legacyName: legacyName,
        klayCode: t.suggested ? t.suggested.split(' · ')[0] : '—',
        klayName: t.suggested ? (t.suggested.split(' · ')[1] || '') : '',
        dim: t.dim || '(no dim)',
        dimensions: glm_parseDimString(t.dim)
      });
    });
    /* Auto-mapped rows generated on demand (the bulk of the transactions) */
    var autos = (typeof getAutoMappedRows === 'function') ? getAutoMappedRows(monthIdx, gi, grp) : [];
    autos.forEach(function(t, ti) {
      var key = monthIdx + '-' + gi + '-auto-' + ti;
      var amtNum = parseInt(String(t.amount).replace(/[^0-9]/g, ''), 10) || 0;
      rows.push({
        key: key,
        monthIdx: monthIdx, gi: gi, ti: ti, category: grp.name,
        ref: t.ref, date: t.date, vendor: t.vendor, desc: t.desc,
        amount: t.amount, amountNum: amtNum,
        legacyCode: t.suggested ? t.suggested.split(' · ')[0] : '—',
        legacyName: t.suggested ? (t.suggested.split(' · ')[1] || '') : '',
        klayCode: t.suggested ? t.suggested.split(' · ')[0] : '—',
        klayName: t.suggested ? (t.suggested.split(' · ')[1] || '') : '',
        dim: t.dim || '(no dim)',
        dimensions: glm_parseDimString(t.dim)
      });
    });
  });
  return rows;
}

/* Parse the legacy "City · Department" dim string into structured {dim, value} tags
   compatible with S2's dimension model. Heuristic mapping based on S2_DIMENSIONS values:
     - Location dim values: 'Jakarta', 'Surabaya', 'Bandung'
     - Department dim values: 'Sales', 'Marketing', 'Finance', 'R&D', 'G&A', 'Operations',
       plus prototype-only fallbacks for unmapped strings (Production, Admin, Treasury). */
function glm_parseDimString(str) {
  if (!str || str === '(no dim)') return [];
  var tags = [];
  var parts = String(str).split(/\s*·\s*/);
  /* Known dimension catalogues (read from S2_DIMENSIONS where possible) */
  var locDim = (typeof S2_DIMENSIONS !== 'undefined') ? S2_DIMENSIONS.find(function(d){return d.id==='location';}) : null;
  var depDim = (typeof S2_DIMENSIONS !== 'undefined') ? S2_DIMENSIONS.find(function(d){return d.id==='department';}) : null;
  var locValues = (locDim && locDim.values) || ['Jakarta', 'Surabaya', 'Bandung'];
  parts.forEach(function(p) {
    p = p.trim();
    if (!p) return;
    if (locValues.indexOf(p) >= 0) {
      tags.push({dim: 'location', value: p});
    } else {
      /* Map prototype-only legacy values to a Department tag — close enough for the demo */
      var deptValues = (depDim && depDim.values) || [];
      if (deptValues.indexOf(p) >= 0) {
        tags.push({dim: 'department', value: p});
      } else {
        /* Unknown value — still tag as Department for visibility; the user can re-pick on edit */
        tags.push({dim: 'department', value: p});
      }
    }
  });
  return tags;
}

/* Effective state of a row: applies any override + Controller status. */
function glm_rowState(rowKey) {
  return APP.s3gl.ws.txnStates[rowKey] || 'pending';
}
function glm_rowOverride(rowKey) {
  return APP.s3gl.ws.overrides[rowKey] || null;
}

/* Compute progress counts for the active scope (current month, or all-months). */
function glm_computeProgress(scopeRows) {
  var total = scopeRows.length;
  var confirmed = 0, later = 0, reinv = 0;
  scopeRows.forEach(function(r) {
    var st = glm_rowState(r.key);
    if (st === 'confirmed') confirmed++;
    else if (st === 'later') later++;
    else if (st === 'reInvestigate') reinv++;
  });
  var pending = total - confirmed - later - reinv;
  return {total:total, confirmed:confirmed, pending:pending, later:later, reinv:reinv};
}

/* Apply coverage view + filters + search to a row list. */
function glm_filterRows(rows) {
  var ws = APP.s3gl.ws;
  var out = rows.slice();
  /* 1. Coverage view */
  if (ws.coverage === 'top50') {
    out.sort(function(a,b){return b.amountNum - a.amountNum;});
    out = out.slice(0, 50);
  } else if (ws.coverage === 'random') {
    /* Deterministic pseudo-random: stride sampling */
    var sample = [];
    var stride = Math.max(1, Math.floor(out.length / 50));
    for (var i = 0; i < out.length && sample.length < 50; i += stride) sample.push(out[i]);
    out = sample;
  } else if (ws.coverage === 'bigtxn') {
    /* Big transaction exception — rows ≥ Rp 50,000,000 */
    out = out.filter(function(r){return r.amountNum >= 50000000;});
    out.sort(function(a,b){return b.amountNum - a.amountNum;});
  }
  /* 2. Status pill */
  if (ws.statusFilter && ws.statusFilter !== 'all') {
    out = out.filter(function(r){
      var st = glm_rowState(r.key);
      if (ws.statusFilter === 'pending') return st === 'pending' || st === 'reInvestigate';
      return st === ws.statusFilter;
    });
  }
  /* 3. Legacy account filter (single-select code) */
  if (ws.legacyAcctFilter) {
    out = out.filter(function(r){return r.legacyCode === ws.legacyAcctFilter;});
  }
  /* 4. Klay account filter — checks override first, falls back to original */
  if (ws.klayAcctFilter) {
    out = out.filter(function(r){
      var ov = glm_rowOverride(r.key);
      var k = ov ? (ov.klay ? ov.klay.split(' · ')[0] : r.klayCode) : r.klayCode;
      return k === ws.klayAcctFilter;
    });
  }
  /* 5. Search */
  if (ws.searchText) {
    var q = ws.searchText.toLowerCase();
    out = out.filter(function(r){
      return (r.ref && r.ref.toLowerCase().indexOf(q) >= 0)
        || (r.vendor && r.vendor.toLowerCase().indexOf(q) >= 0)
        || (r.desc && r.desc.toLowerCase().indexOf(q) >= 0)
        || (r.legacyCode && r.legacyCode.toLowerCase().indexOf(q) >= 0)
        || (r.klayCode && r.klayCode.toLowerCase().indexOf(q) >= 0);
    });
  }
  return out;
}

/* Workspace renderer — the right side of the shell. */
function glm_renderVerificationWorkspace(monthIdx, isAllMode, mo) {
  /* Roll-up mode (All-months): aggregate every closed month's transactions. */
  var allRows = [];
  if (isAllMode) {
    for (var mi = 0; mi < S3GL_MONTHS.length; mi++) {
      var monthGroups = getWorkspaceData(mi);
      if (monthGroups.length === 1 && monthGroups[0].notClosed) continue;
      allRows = allRows.concat(glm_flattenTxns(mi));
    }
  } else if (mo && mo.scenario === 'cutoff-warn') {
    /* December — not closed yet. Show an empty-state, no workspace machinery. */
    return '<div class="glm-ws"><div class="glm-ws-inner">'
      + '<div style="padding:48px 24px;text-align:center;font-size:12px;color:var(--color-text-tertiary);">'
      + '<div style="font-size:14px;font-weight:600;color:var(--color-text-secondary);margin-bottom:6px;">' + mo.m + ' 2025 — not yet closed</div>'
      + 'Year-end accruals typically post on 31 Dec. Estimated ' + mo.txn.toLocaleString() + ' transactions when closed. '
      + 'Your IA will notify you when ready. Pick another month in the rail to continue.'
      + '</div>'
      + '</div></div>';
  } else {
    allRows = glm_flattenTxns(monthIdx);
  }

  var visibleRows = glm_filterRows(allRows);

  var html = '<div class="glm-ws"><div class="glm-ws-inner">';
  html += glm_renderCoverageTiles(allRows);
  html += glm_renderPillStrip(allRows);
  html += glm_renderFilterBar(allRows);
  html += glm_renderBulkBar();
  html += '</div>'; /* close glm-ws-inner so the table can scroll on its own */
  html += '<div class="glm-tbl-wrap" style="padding:0 24px 18px">';
  html += glm_renderTable(visibleRows);
  html += '</div>';
  html += '</div>';
  return html;
}

/* Progress strip — segmented bar + legend. */
/* Overall (year-wide) progress strip. Aggregates every closed month's transactions
   so the counts don't change as the user navigates between months in the rail.
   Sits at the page level — between the description and the workspace shell. */
function glm_renderOverallProgress() {
  /* Aggregate across every closed month */
  var allRows = [];
  for (var mi = 0; mi < S3GL_MONTHS.length; mi++) {
    var gs = getWorkspaceData(mi);
    if (gs.length === 1 && gs[0].notClosed) continue;
    allRows = allRows.concat(glm_flattenTxns(mi));
  }
  var p = glm_computeProgress(allRows);
  var pctOf = function(n){return p.total > 0 ? (n / p.total * 100) : 0;};
  var pct = p.total > 0 ? Math.round((p.confirmed / p.total) * 100) : 0;

  var html = '<div class="glm-prog glm-prog-overall">';
  html += '<div class="glm-prog-row">';
  html += '<span class="glm-prog-num">' + p.confirmed.toLocaleString() + '</span>';
  html += '<span class="glm-prog-tot">/ ' + p.total.toLocaleString() + ' transactions confirmed</span>';
  html += '<span class="glm-prog-pct">' + pct + '%</span>';
  html += '</div>';
  html += '<div class="glm-prog-bar">';
  html += '<div class="glm-prog-seg glm-prog-seg-confirmed" style="width:' + pctOf(p.confirmed) + '%"></div>';
  html += '<div class="glm-prog-seg glm-prog-seg-pending" style="width:' + pctOf(p.pending) + '%"></div>';
  html += '<div class="glm-prog-seg glm-prog-seg-later" style="width:' + pctOf(p.later) + '%"></div>';
  html += '<div class="glm-prog-seg glm-prog-seg-reinv" style="width:' + pctOf(p.reinv) + '%"></div>';
  html += '</div>';
  html += '<div class="glm-prog-legend">';
  html += '<span class="glm-prog-legend-item"><span class="glm-prog-legend-dot" style="background:#1D9E75"></span>Confirmed <span class="glm-prog-legend-cnt">' + p.confirmed.toLocaleString() + '</span></span>';
  html += '<span class="glm-prog-legend-item"><span class="glm-prog-legend-dot" style="background:#D3D1C7"></span>Waiting to be Confirmed <span class="glm-prog-legend-cnt">' + p.pending.toLocaleString() + '</span></span>';
  html += '<span class="glm-prog-legend-item"><span class="glm-prog-legend-dot" style="background:#BA7517"></span>Marked for Later <span class="glm-prog-legend-cnt">' + p.later.toLocaleString() + '</span></span>';
  html += '<span class="glm-prog-legend-item"><span class="glm-prog-legend-dot" style="background:#A02020"></span>Flagged to Re-investigate <span class="glm-prog-legend-cnt">' + p.reinv.toLocaleString() + '</span></span>';
  html += '</div>';
  html += '</div>';
  return html;
}

/* Coverage-view tile row — All (default) · Top 50 · Random · Big-txn exception. */
function glm_renderCoverageTiles(allRows) {
  var ws = APP.s3gl.ws;
  var tiles = [
    {id:'all',     name:'All transactions',         meta: allRows.length.toLocaleString() + ' lines'},
    {id:'top50',   name:'Top 50 by amount',         meta: 'Largest material lines'},
    {id:'random',  name:'Random sample',            meta: '50-line audit sample'},
    {id:'bigtxn',  name:'Big-transaction exception',meta: '≥ Rp 50M each'}
  ];
  var html = '<div class="glm-cov-row">';
  tiles.forEach(function(t) {
    var isActive = ws.coverage === t.id;
    html += '<div class="glm-cov-tile ' + (isActive ? 'active' : '') + '" onclick="glm_setCoverage(\'' + t.id + '\')">'
      + '<div class="glm-cov-tile-name">' + t.name + '</div>'
      + '<div class="glm-cov-tile-meta">' + t.meta + '</div>'
      + '</div>';
  });
  html += '</div>';
  return html;
}

/* Pill filter strip — All / Waiting / Confirmed / Marked for Later. */
function glm_renderPillStrip(allRows) {
  var ws = APP.s3gl.ws;
  /* Counts respect coverage view but ignore the pill itself — count over filtered (post-coverage) rows */
  var savedStatus = ws.statusFilter; ws.statusFilter = 'all';
  var visibleAfterCov = glm_filterRows(allRows);
  ws.statusFilter = savedStatus;
  var p = glm_computeProgress(visibleAfterCov);

  var pills = [
    {id:'all',       lbl:'All',                       cnt: p.total},
    {id:'pending',   lbl:'Waiting to be Confirmed',   cnt: p.pending + p.reinv},
    {id:'confirmed', lbl:'Confirmed',                 cnt: p.confirmed},
    {id:'later',     lbl:'Marked for Later',          cnt: p.later}
  ];
  var html = '<div class="glm-pills">';
  pills.forEach(function(pl) {
    var isOn = (ws.statusFilter || 'all') === pl.id;
    html += '<button class="glm-pill ' + (isOn ? 'on' : '') + '" onclick="glm_setStatusFilter(\'' + pl.id + '\')">'
      + pl.lbl + '<span class="glm-pill-cnt">' + pl.cnt.toLocaleString() + '</span>'
      + '</button>';
  });
  html += '</div>';
  return html;
}

/* Filter bar — Legacy Account · Klay Account · Filter overflow · Search. */
function glm_renderFilterBar(allRows) {
  var ws = APP.s3gl.ws;

  /* Build unique sorted account lists from the underlying rows (legacy + Klay) */
  var legacyMap = {}, klayMap = {};
  allRows.forEach(function(r) {
    if (r.legacyCode && r.legacyCode !== '—') legacyMap[r.legacyCode] = r.legacyName || '';
    if (r.klayCode && r.klayCode !== '—') klayMap[r.klayCode] = r.klayName || '';
  });
  var legacyCodes = Object.keys(legacyMap).sort();
  var klayCodes = Object.keys(klayMap).sort();

  var html = '<div class="glm-fbar">';

  /* Legacy account dropdown */
  html += '<div class="glm-fpop-anchor" onclick="event.stopPropagation()">';
  var legLbl = ws.legacyAcctFilter ? 'Legacy: ' + ws.legacyAcctFilter : 'Legacy account';
  html += '<button class="glm-fbtn ' + (ws.legacyAcctFilter ? 'active' : '') + '" onclick="glm_toggleFilterPopover(\'legacy\')">' + legLbl + ' <span class="glm-fbtn-caret">&#9662;</span></button>';
  if (ws.legacyAcctFilterOpen) {
    html += '<div class="glm-fpop">';
    html += '<div class="glm-fpop-title">Filter by legacy account</div>';
    html += '<div class="glm-fpop-list">';
    legacyCodes.forEach(function(code) {
      var sel = ws.legacyAcctFilter === code;
      html += '<div class="glm-fpop-opt ' + (sel ? 'sel' : '') + '" onclick="glm_setLegacyFilter(\'' + code + '\')">'
        + '<span><span class="glm-fpop-opt-code">' + code + '</span> ' + (legacyMap[code] || '') + '</span>'
        + (sel ? '<span>&#10003;</span>' : '')
        + '</div>';
    });
    html += '</div>';
    html += '<div class="glm-fpop-actions"><button class="glm-fpop-clear" onclick="glm_setLegacyFilter(null)">Clear</button></div>';
    html += '</div>';
  }
  html += '</div>';

  /* Klay account dropdown */
  html += '<div class="glm-fpop-anchor" onclick="event.stopPropagation()">';
  var klLbl = ws.klayAcctFilter ? 'Klay: ' + ws.klayAcctFilter : 'Klay account';
  html += '<button class="glm-fbtn ' + (ws.klayAcctFilter ? 'active' : '') + '" onclick="glm_toggleFilterPopover(\'klay\')">' + klLbl + ' <span class="glm-fbtn-caret">&#9662;</span></button>';
  if (ws.klayAcctFilterOpen) {
    html += '<div class="glm-fpop">';
    html += '<div class="glm-fpop-title">Filter by Klay account</div>';
    html += '<div class="glm-fpop-list">';
    klayCodes.forEach(function(code) {
      var sel = ws.klayAcctFilter === code;
      html += '<div class="glm-fpop-opt ' + (sel ? 'sel' : '') + '" onclick="glm_setKlayFilter(\'' + code + '\')">'
        + '<span><span class="glm-fpop-opt-code">' + code + '</span> ' + (klayMap[code] || '') + '</span>'
        + (sel ? '<span>&#10003;</span>' : '')
        + '</div>';
    });
    html += '</div>';
    html += '<div class="glm-fpop-actions"><button class="glm-fpop-clear" onclick="glm_setKlayFilter(null)">Clear</button></div>';
    html += '</div>';
  }
  html += '</div>';

  /* "Filter" overflow — placeholder for now (UI-only) */
  html += '<button class="glm-fbtn" onclick="alert(\'Additional filters (dimension, vendor, amount band) would open here.\')">Filter</button>';

  html += '<div class="glm-fbar-spacer"></div>';

  /* Search */
  html += '<div class="glm-fbar-search">';
  html += '<span class="glm-fbar-search-icon">&#9906;</span>';
  html += '<input type="text" placeholder="Search ref, vendor, description, account…" oninput="glm_setSearch(this.value)" value="' + (ws.searchText || '').replace(/"/g, '&quot;') + '" />';
  html += '</div>';

  /* Clear filters affordance */
  var anyFilter = ws.legacyAcctFilter || ws.klayAcctFilter || ws.searchText || ws.statusFilter !== 'all' || ws.coverage !== 'all';
  if (anyFilter) {
    html += '<button class="glm-fbar-clear" onclick="glm_clearAllFilters()">Reset</button>';
  }

  html += '</div>';
  return html;
}

/* Bulk action bar — visible when rows are selected. */
function glm_renderBulkBar() {
  var ws = APP.s3gl.ws;
  var count = Object.keys(ws.selectedRows).filter(function(k){return ws.selectedRows[k];}).length;
  if (count === 0) return '';
  return '<div class="glm-bulkbar">'
    + '<div class="glm-bulkbar-count">' + count + ' selected</div>'
    + '<div class="glm-bulkbar-actions">'
    +   '<button class="glm-rb confirm" onclick="glm_bulkConfirm()">&#10003; Confirm ' + count + '</button>'
    +   '<button class="glm-rb later" onclick="glm_bulkLater()">Mark for Later</button>'
    +   '<button class="glm-rb" onclick="glm_clearSelection()">Cancel</button>'
    + '</div>'
    + '</div>';
}

/* The verification table itself. */
function glm_renderTable(rows) {
  var ws = APP.s3gl.ws;
  var pageSize = ws.pageSize || 50;
  var totalPages = Math.max(1, Math.ceil(rows.length / pageSize));
  /* Clamp page if filters changed underneath */
  if (ws.page >= totalPages) ws.page = Math.max(0, totalPages - 1);
  var startIdx = ws.page * pageSize;
  var endIdx = Math.min(startIdx + pageSize, rows.length);
  var pageRows = rows.slice(startIdx, endIdx);

  /* Select-all considers only the current page's rows */
  var selectedInPage = pageRows.filter(function(r){return ws.selectedRows[r.key];}).length;
  var allChecked = (pageRows.length > 0 && selectedInPage === pageRows.length);

  if (rows.length === 0) {
    return '<table class="glm-tbl"><tbody><tr><td colspan="10" style="padding:40px 14px;text-align:center;font-size:12px;color:var(--color-text-tertiary);font-weight:300">No transactions match the current filters.</td></tr></tbody></table>';
  }

  var html = '<table class="glm-tbl">';
  html += '<thead><tr>';
  html += '<th><input type="checkbox" ' + (allChecked ? 'checked' : '') + ' onclick="glm_toggleSelectAll()" /></th>';
  html += '<th>Status</th>';
  html += '<th>Reference</th>';
  html += '<th>Date</th>';
  html += '<th>Vendor · Description</th>';
  html += '<th>Legacy account</th>';
  html += '<th>Klay account</th>';
  html += '<th>Dimensions</th>';
  html += '<th class="amt">Amount</th>';
  html += '<th class="actions">Actions</th>';
  html += '</tr></thead>';
  html += '<tbody>';
  pageRows.forEach(function(r) {
    if (ws.editingRow === r.key) {
      html += glm_renderEditingRow(r);
    } else {
      html += glm_renderRow(r);
    }
  });
  html += '</tbody></table>';

  /* Pagination footer */
  if (totalPages > 1) {
    html += '<div style="padding:10px 14px;border-top:1px solid var(--color-border-default);background:var(--color-surface-sunken);display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--color-text-tertiary);">';
    html += '<div>Showing <strong style="color:var(--color-text-primary)">' + (startIdx + 1).toLocaleString() + '–' + endIdx.toLocaleString() + '</strong> of ' + rows.length.toLocaleString() + ' transactions</div>';
    html += '<div style="display:flex;align-items:center;gap:8px">';
    var prevDisabled = ws.page === 0;
    var nextDisabled = ws.page >= totalPages - 1;
    html += '<button class="glm-rb" ' + (prevDisabled ? 'disabled style="opacity:.4;cursor:default"' : '') + ' onclick="' + (prevDisabled ? '' : 'glm_setPage(' + (ws.page - 1) + ')') + '">&larr; Prev</button>';
    html += '<span style="font-size:11px;color:var(--color-text-secondary)">Page ' + (ws.page + 1) + ' of ' + totalPages + '</span>';
    html += '<button class="glm-rb" ' + (nextDisabled ? 'disabled style="opacity:.4;cursor:default"' : '') + ' onclick="' + (nextDisabled ? '' : 'glm_setPage(' + (ws.page + 1) + ')') + '">Next &rarr;</button>';
    html += '</div>';
    html += '</div>';
  }

  return html;
}

function glm_setPage(p) {
  APP.s3gl.ws.page = p;
  renderMonthWorkspace(APP.s3gl.ws.activeMonth);
}

/* A single verification row in display mode. */
/* Resolve a row's effective Klay account + dimensions (override-aware). */
function glm_effectiveKlay(r) {
  var ov = glm_rowOverride(r.key);
  if (ov && ov.klay) {
    var parts = ov.klay.split(/\s*·\s*/);
    return { code: parts[0] || r.klayCode, name: parts.slice(1).join(' · ') || r.klayName };
  }
  return { code: r.klayCode, name: r.klayName };
}
function glm_effectiveDimensions(r) {
  var ov = glm_rowOverride(r.key);
  if (ov && ov.dimensions) return ov.dimensions.slice();
  return (r.dimensions || []).slice();
}

/* Build a Klay-account <select> grouped by subSection (using <optgroup>).
   Mirrors Stage 2's s2_renderKlayDropdown, but reads from S2_KLAY (richer metadata
   already has subSection on every entry). The current value may be a code that
   isn't in S2_KLAY (e.g. legacy auto-mapped strings like "5110 · Raw Material");
   in that case we prepend a synthetic "(currently mapped)" optgroup so the value
   still displays selected. */
function glm_renderKlaySelect(currentValue, onChangeAttr) {
  var hasMatch = false;
  if (typeof S2_KLAY === 'undefined') {
    /* Fallback when S2_KLAY isn't loaded (shouldn't happen in practice) */
    return '<input type="text" class="glm-edit-input mono-fld" value="' + (currentValue || '').replace(/"/g,'&quot;') + '" ' + onChangeAttr + ' />';
  }
  /* Group by subSection, preserve insertion order */
  var groups = {};
  var groupOrder = [];
  S2_KLAY.forEach(function(opt) {
    if (opt.mvp === 'SCHEMA') return; /* skip deferred accounts */
    var key = opt.subSection || 'Other';
    if (!groups[key]) { groups[key] = []; groupOrder.push(key); }
    groups[key].push(opt);
    if (currentValue && currentValue.indexOf(opt.code) === 0) hasMatch = true;
  });
  var html = '<select class="s2-klay-sel" ' + onChangeAttr + ' style="font-family:var(--font-mono);font-size:11px">';
  if (!currentValue) {
    html += '<option value="" disabled selected>Pick a Klay account…</option>';
  } else if (!hasMatch) {
    /* Current value (e.g. legacy auto-mapped string) isn't in the new CoA — keep it visible */
    html += '<optgroup label="Currently mapped">';
    html += '<option value="' + currentValue.replace(/"/g,'&quot;') + '" selected>' + currentValue + '</option>';
    html += '</optgroup>';
  }
  groupOrder.forEach(function(grp) {
    html += '<optgroup label="' + grp + '">';
    groups[grp].forEach(function(opt) {
      var fullVal = opt.code + ' · ' + opt.name;
      var sel = (currentValue && currentValue.indexOf(opt.code) === 0) ? ' selected' : '';
      html += '<option value="' + fullVal.replace(/"/g,'&quot;') + '"' + sel + '>' + opt.code + ' · ' + opt.name + '</option>';
    });
    html += '</optgroup>';
  });
  html += '</select>';
  return html;
}

/* Render a dimensions cell. Two modes:
     - displayMode: chips only, no × or Add button (read-only summary)
     - editMode:    chips with ×, plus an inline +Add button / popover */
function glm_renderDimensionsCell(r, editMode) {
  var dims = editMode
    ? (APP.s3gl.ws.editDraftDimensions != null ? APP.s3gl.ws.editDraftDimensions : glm_effectiveDimensions(r))
    : glm_effectiveDimensions(r);
  if (!dims.length && !editMode) {
    return '<span class="s2-dim-empty">— no dimensions —</span>';
  }
  var html = '';
  dims.forEach(function(tag, tIdx) {
    var dim = (typeof s2_dimById === 'function') ? s2_dimById(tag.dim) : null;
    if (!dim) {
      /* Tag references an unknown dimension — render minimally so it's still visible */
      html += '<span class="s2-dim-chip" style="background:#F1EFE8;color:#444441">'
        + (tag.dim || 'Tag') + ': ' + tag.value;
      if (editMode) html += ' <span class="s2-dim-chip-x" onclick="glm_removeEditDim(' + tIdx + ')" title="Remove">&times;</span>';
      html += '</span>';
      return;
    }
    var c = s2_dimChipColor(dim);
    html += '<span class="s2-dim-chip" style="background:' + c.bg + ';color:' + c.fg + '">';
    html += dim.name + ': ' + tag.value;
    if (editMode) html += ' <span class="s2-dim-chip-x" onclick="glm_removeEditDim(' + tIdx + ')" title="Remove">&times;</span>';
    html += '</span>';
  });
  if (editMode) {
    if (APP.s3gl.ws.dimPopoverOpen) {
      html += glm_renderEditDimPopover();
    } else {
      html += '<button class="s2-dim-add-btn" onclick="glm_openEditDimPopover()">+ Add</button>';
    }
  }
  return html;
}

/* Inline +Add dimension popover for the editing row (mirrors s2_renderDimPopover). */
function glm_renderEditDimPopover() {
  if (typeof S2_DIMENSIONS === 'undefined') return '';

function glm_renderRow(r) {
  var ws = APP.s3gl.ws;
  var st = glm_rowState(r.key);
  var ov = glm_rowOverride(r.key);
  var rowCls = '';
  var badge;
  if (st === 'confirmed') { rowCls = 'r-confirmed'; badge = '<span class="glm-row-badge confirmed">&#10003; Confirmed</span>'; }
  else if (st === 'later') { rowCls = 'r-later'; badge = '<span class="glm-row-badge later">Later</span>'; }
  else if (st === 'reInvestigate') { rowCls = 'r-reinv'; badge = '<span class="glm-row-badge reinv">&#9873; Re-investigate</span>'; }
  else { badge = '<span class="glm-row-badge pending">Pending</span>'; }

  var effKlay = glm_effectiveKlay(r);
  var editedMark = ov ? '<span class="glm-edited-mark">Edited</span>' : '';
  var checked = ws.selectedRows[r.key] ? 'checked' : '';

  var actions;
  if (st === 'confirmed') {
    actions = '<div class="glm-row-actions">'
      + '<button class="glm-rb" onclick="glm_undoStatus(\'' + r.key + '\')" title="Undo confirmation">Undo</button>'
      + '<button class="glm-rb edit" onclick="glm_startEdit(\'' + r.key + '\')">Edit</button>'
      + '</div>';
  } else if (st === 'later') {
    actions = '<div class="glm-row-actions">'
      + '<button class="glm-rb confirm" onclick="glm_confirm(\'' + r.key + '\')">&#10003; Confirm</button>'
      + '<button class="glm-rb" onclick="glm_undoStatus(\'' + r.key + '\')">Undo</button>'
      + '</div>';
  } else if (st === 'reInvestigate') {
    actions = '<div class="glm-row-actions">'
      + '<button class="glm-rb" onclick="jumpToStage(2)" title="Go back to Stage 2 to remap this account">Open Stage 2 &rsaquo;</button>'
      + '<button class="glm-rb" onclick="glm_undoStatus(\'' + r.key + '\')">Undo</button>'
      + '</div>';
  } else {
    actions = '<div class="glm-row-actions">'
      + '<button class="glm-rb edit" onclick="glm_startEdit(\'' + r.key + '\')">Edit</button>'
      + '<button class="glm-rb confirm" onclick="glm_confirm(\'' + r.key + '\')">&#10003; Confirm</button>'
      + '<button class="glm-rb later" onclick="glm_markLater(\'' + r.key + '\')">Later</button>'
      + '<button class="glm-rb reinv" onclick="glm_reInvestigate(\'' + r.key + '\')" title="Flag for re-mapping in Stage 2">&#9873;</button>'
      + '</div>';
  }

  return '<tr class="' + rowCls + '">'
    + '<td><input type="checkbox" ' + checked + ' onclick="glm_toggleRow(\'' + r.key + '\')" /></td>'
    + '<td>' + badge + '</td>'
    + '<td class="mono">' + r.ref + '</td>'
    + '<td style="color:var(--color-text-tertiary);font-size:11px">' + r.date + '</td>'
    + '<td><div style="font-size:12px;color:var(--color-text-primary);font-weight:500">' + r.vendor + '</div>'
    +   '<div style="font-size:11px;color:var(--color-text-tertiary);margin-top:1px">' + r.desc + '</div></td>'
    + '<td class="acct"><span class="acct-code">' + r.legacyCode + '</span><span class="acct-name">' + (r.legacyName || '—') + '</span></td>'
    + '<td class="acct"><span class="acct-code">' + effKlay.code + '</span><span class="acct-name">' + (effKlay.name || '—') + '</span>' + editedMark + '</td>'
    + '<td>' + glm_renderDimensionsCell(r, false) + '</td>'
    + '<td class="amt">' + r.amount + '</td>'
    + '<td class="actions">' + actions + '</td>'
    + '</tr>';
}

/* Row status actions */
/* Re-render the overall progress strip in place. Called by status-changing actions
   (confirm / mark-later / re-investigate / undo / bulk*) so the page-level progress
   bar updates without rebuilding the entire page. */
function glm_refreshOverallProgress() {
  var current = document.querySelector('.glm-prog-overall');
  if (!current || !current.parentNode) return;
  /* Build a stand-in container, render into it, swap the .glm-prog-overall node */
  var wrap = document.createElement('div');
  wrap.innerHTML = glm_renderOverallProgress();
  var fresh = wrap.firstChild;
  if (fresh) current.parentNode.replaceChild(fresh, current);
}

function glm_toggleSelectAll() {
  var ws = APP.s3gl.ws;
  var rows = glm_filterRows(glm_flattenTxns(ws.activeMonth));
  if (ws.activeMonth === 'all') {
    var all = [];
    for (var mi = 0; mi < S3GL_MONTHS.length; mi++) {
      var gs = getWorkspaceData(mi);
      if (gs.length === 1 && gs[0].notClosed) continue;
      all = all.concat(glm_flattenTxns(mi));
    }
    rows = glm_filterRows(all);
  }
  var selectedInView = rows.filter(function(r){return ws.selectedRows[r.key];}).length;
  if (selectedInView === rows.length) {
    rows.forEach(function(r){delete ws.selectedRows[r.key];});
  } else {
    rows.forEach(function(r){ws.selectedRows[r.key] = true;});

  renderMonthWorkspace(ws.activeMonth);

/* Inline edit lifecycle */
/* Open inline edit for a row. Stages the row's current dimensions as the draft
   so chip removes/adds can mutate them, but the row's stored data is not touched
   until Save. */
function glm_startEdit(rowKey) {
  var ws = APP.s3gl.ws;
  ws.editingRow = rowKey;
  ws.editDraft = { klay: null }; /* null = use existing on first render */
  /* Snapshot the row's current effective dimensions into a draft array. */
  var rows = ws.activeMonth === 'all' ? null : glm_flattenTxns(ws.activeMonth);
  var row = null;
  if (rows) row = rows.find(function(r){return r.key === rowKey;});
  if (!row) {
    /* All-months mode: search across all months */
    for (var mi = 0; mi < S3GL_MONTHS.length; mi++) {
      var gs = getWorkspaceData(mi);
      if (gs.length === 1 && gs[0].notClosed) continue;
      var rs = glm_flattenTxns(mi);
      row = rs.find(function(r){return r.key === rowKey;});
      if (row) break;
    }
  }
  ws.editDraftDimensions = row ? glm_effectiveDimensions(row) : [];
  ws.dimPopoverOpen = false;
  renderMonthWorkspace(ws.activeMonth);
}
function glm_cancelEdit() {
  var ws = APP.s3gl.ws;
  ws.editingRow = null;
  ws.editDraft = { klay: '' };
  ws.editDraftDimensions = null;
  ws.dimPopoverOpen = false;
  renderMonthWorkspace(ws.activeMonth);
}
function glm_updateEditField(field, val) {
  APP.s3gl.ws.editDraft[field] = val;
}
function glm_saveEdit(rowKey) {
  var ws = APP.s3gl.ws;
  var draft = ws.editDraft || {};
  /* Persist as an override. Klay = new account string; dimensions = full tag array. */
  ws.overrides[rowKey] = {
    klay: draft.klay,
    dimensions: ws.editDraftDimensions || [],
    by: 'You',
    when: 'just now'
  };
  ws.editingRow = null;
  ws.editDraft = { klay: '' };
  ws.editDraftDimensions = null;
  ws.dimPopoverOpen = false;
  renderMonthWorkspace(ws.activeMonth);
}

function _allRowsAcrossMonths() {
  if (_coverageCache) return _coverageCache;
  var all = [];
  S3GL_MONTHS.forEach(function(m, monthIdx) {
    var groups = getWorkspaceData(monthIdx);
    /* Skip not-closed months (December) */
    if (groups.length === 1 && groups[0].notClosed) return;
    groups.forEach(function(grp, gi) {
      /* Review-needed rows (these have hasFlag/conf/etc. and need a decision) */
      (grp.txns || []).forEach(function(txn, ti) {
        all.push({
          monthIdx: monthIdx, gi: gi, ti: ti, type: 'review',
          monthLbl: m.m.substring(0, 3),
          category: grp.name,
          txn: txn,
          amountNum: parseInt(String(txn.amount).replace(/[^0-9]/g, ''), 10) || 0
        });
      });
      /* Auto-mapped rows generated on demand */
      var autos = getAutoMappedRows(monthIdx, gi, grp);
      autos.forEach(function(txn, ti) {
        all.push({
          monthIdx: monthIdx, gi: gi, ti: ti, type: 'auto',
          monthLbl: m.m.substring(0, 3),
          category: grp.name,
          txn: txn,
          amountNum: parseInt(String(txn.amount).replace(/[^0-9]/g, ''), 10) || 0
        });
      });
    });
  });
  _coverageCache = all;
  return all;
}

function invalidateCoverageCache() { _coverageCache = null; }

function getCoverageRows(coverageId) {
  var all = _allRowsAcrossMonths();
  if (coverageId === 'top50') {
    /* Top 50 rows by amount, sorted desc */
    var sorted = all.slice().sort(function(a, b) { return b.amountNum - a.amountNum; });
    return sorted.slice(0, 50);
  }
  if (coverageId === 'idr50m') {
    /* All rows over IDR 50,000,000 */
    var over = all.filter(function(r) { return r.amountNum >= 50000000; });
    /* Sort by amount desc */
    over.sort(function(a, b) { return b.amountNum - a.amountNum; });
    return over;
  }
  if (coverageId === 'tax') {
    /* Tax-account rows — match suggested account starting with 21 (PPN/PPh patterns)
       In the demo data, tax-account references are sparse. We deterministically pick
       a sample of rows whose category contains 'Liabilities' or amount falls in tax-typical range. */
    var taxRows = all.filter(function(r) {
      var sug = r.txn.suggested || '';
      return /^2[12]\d/.test(sug) || /Tax|Pajak|PPN|PPh/i.test(r.txn.desc || '');
    });
    /* If sparse (likely in demo), pad with first N rows from Liabilities for the demo */
    if (taxRows.length < 30) {
      all.forEach(function(r) {
        if (taxRows.indexOf(r) >= 0) return;
        if (r.category === 'Liabilities') taxRows.push(r);
      });
    }
    /* Cap and sort */
    return taxRows.slice(0, 287).sort(function(a, b) { return b.amountNum - a.amountNum; });
  }
  if (coverageId === 'random') {
    /* Deterministic pseudo-random sample of 50, weighted across categories */
    var sample = [];
    /* Group by category */
    var byCat = {};
    all.forEach(function(r) {
      if (!byCat[r.category]) byCat[r.category] = [];
      byCat[r.category].push(r);
    });
    /* Take ~6-7 per category from a reproducible offset */
    var cats = Object.keys(byCat);
    var perCat = Math.ceil(50 / Math.max(1, cats.length));
    cats.forEach(function(cat) {
      var rows = byCat[cat];
      var step = Math.max(1, Math.floor(rows.length / perCat));
      for (var i = 0; i < rows.length && sample.length < 50; i += step) {
        sample.push(rows[i]);
      }
    });
    return sample.slice(0, 50);
  }
  if (coverageId === 'flagged') {
    /* Rows that have been flagged to IA (state === 'flagged') OR carry a hasFlag tag */
    var flagged = all.filter(function(r) {
      var key = r.monthIdx + '-' + r.gi + '-' + (r.type === 'auto' ? 'auto-' : '') + r.ti;
      var st = APP.s3gl.ws.txnStates[key];
      if (st === 'flagged' || st === 'flagResolved') return true;
      if (r.txn.hasFlag && r.txn.flagReason === 'investigable') return true;
      return false;
    });
    return flagged;
  }
  return [];
}

function _isCoverageRowReviewed(r) {
  var key = r.monthIdx + '-' + r.gi + '-' + (r.type === 'auto' ? 'auto-' : '') + r.ti;
  var st = APP.s3gl.ws.txnStates[key];
  if (st === 'confirmed' || st === 'overridden' || st === 'flagged') return true;
  /* Auto rows: count as reviewed if in a confirmed batch, individually overridden,
     or explicitly confirmed during coverage review */
  if (r.type === 'auto') {
    var batchKey = r.monthIdx + '-' + r.gi + '-batch';
    if (APP.s3gl.ws.confirmedClusters[batchKey] === 'confirmed') return true;
    if (APP.s3gl.ws.overrides[key]) return true;
    if (APP.s3gl.ws.coverageConfirmed && APP.s3gl.ws.coverageConfirmed[key]) return true;
  }
  return false;
}

function getCoverageStats(coverageId) {
  var rows = getCoverageRows(coverageId);
  var total = rows.length;
  var reviewed = rows.filter(_isCoverageRowReviewed).length;
  return { total: total, reviewed: reviewed, toGo: total - reviewed };
}

function getCoverageOverallPct() {
  var ids = ['top50', 'random', 'idr50m', 'tax'];
  var total = 0, reviewed = 0;
  ids.forEach(function(id) {
    var s = getCoverageStats(id);
    total += s.total;
    reviewed += s.reviewed;
  });
  return total > 0 ? Math.round(reviewed / total * 100) : 0;
}

function renderCoverageColumn() {
  var html = '<div class="cluster-col-hdr">'
    + '<div class="cluster-col-hdr-title">All months</div>'
    + '<div class="cluster-col-hdr-meta">Year-wide audit coverage</div>'
    + '</div>';

  html += '<div class="cluster-col-section-lbl">Coverage views</div>';

  var cards = [
    { id: 'top50',  name: 'Top 50 by amount',     subLbl: 'transactions' },
    { id: 'random', name: 'Random sample',         subLbl: 'transactions · weighted' },
    { id: 'idr50m', name: 'IDR 50M+ exceptions',   subLbl: 'transactions' },
    { id: 'tax',    name: 'Tax accounts',          subLbl: 'transactions' }
  ];

  cards.forEach(function(c) {
    var stats = getCoverageStats(c.id);
    var isActive = APP.s3gl.ws.selectedCoverage === c.id;
    var isDone = stats.toGo === 0 && stats.total > 0;
    var pctBar = stats.total > 0 ? Math.round(stats.reviewed / stats.total * 100) : 0;

    var cardCls = 'cluster-card';
    if (isActive) cardCls += ' active';
    if (isDone) cardCls += ' done';
    else cardCls += ' has-work';

    var pillHtml;
    if (isDone) {
      pillHtml = '<span class="cluster-card-pill done">All reviewed &#10003;</span>';
    } else if (stats.reviewed === 0) {
      pillHtml = '<span class="cluster-card-pill review">' + stats.total + ' to go</span>';
    } else {
      pillHtml = '<span class="cluster-card-pill review">' + stats.toGo + ' to go</span>';
    }

    var breakdownHtml;
    if (stats.reviewed === 0) {
      breakdownHtml = '<div class="cluster-card-breakdown"><span style="color:var(--color-text-tertiary);font-weight:300">Not started</span></div>';
    } else {
      breakdownHtml = '<div class="cluster-card-breakdown">'
        + '<span><span class="cluster-card-breakdown-num success">' + stats.reviewed + '</span> reviewed</span>'
        + '<span><span class="cluster-card-breakdown-num warn">' + stats.toGo + '</span> to go</span>'
        + '</div>';
    }

    html += '<div class="' + cardCls + '" onclick="wsSelectCoverage(\'' + c.id + '\')">'
      + '<div class="cluster-card-row">'
      +   '<span class="cluster-card-name' + (isDone ? ' done-clr' : '') + '">' + c.name + '</span>'
      +   '<div class="cluster-card-pill-wrap">' + pillHtml + '</div>'
      + '</div>'
      + '<div class="cluster-card-num">'
      +   '<span class="cluster-card-num-big' + (isDone ? ' done-clr' : '') + '">' + stats.total + '</span>'
      +   '<span class="cluster-card-num-lbl' + (isDone ? ' done-clr' : '') + '">' + c.subLbl + '</span>'
      + '</div>'
      + '<div class="cluster-card-prog' + (isDone ? ' done-bg' : '') + '" style="display:flex"><div class="cluster-card-prog-fill ' + (isDone ? 'done' : 'warn') + '" style="width:' + pctBar + '%"></div></div>'
      + breakdownHtml
      + '</div>';
  });

  /* Flagged-to-IA card — danger-styled, separate */
  var flaggedStats = getCoverageStats('flagged');
  var flaggedActive = APP.s3gl.ws.selectedCoverage === 'flagged';
  var flaggedCls = 'cluster-card danger' + (flaggedActive ? ' active' : '');

  if (flaggedStats.total > 0) {
    html += '<div class="' + flaggedCls + '" onclick="wsSelectCoverage(\'flagged\')">'
      + '<div class="cluster-card-row">'
      +   '<span class="cluster-card-name">Flagged to IA</span>'
      +   '<span class="cluster-card-pill flag-ia">&#128681; ' + flaggedStats.total + '</span>'
      + '</div>'
      + '<div class="cluster-card-num">'
      +   '<span class="cluster-card-num-big">' + flaggedStats.total + '</span>'
      +   '<span class="cluster-card-num-lbl">awaiting IA response</span>'
      + '</div>'
      + '</div>';
  }

  html += '<div style="padding:14px 12px 8px;margin-top:8px;border-top:1px solid var(--color-border-default);font-size:11px;color:var(--color-text-tertiary);line-height:1.5;font-weight:300">'
    + 'Year-wide review covers high-leverage transactions across the books. Months below give per-category review for the long tail.'
    + '</div>';

  return html;
}

function renderCoverageOverviewPane() {
  return '<div class="workspace-pane">'
    + '<div class="workspace-empty">'
    +   '<div class="workspace-empty-title">Pick a coverage view to begin</div>'

    + '</div>'
    + '</div>';
}

function renderCoverageWorkspace(coverageId) {
  var rows = getCoverageRows(coverageId);
  var stats = getCoverageStats(coverageId);
  var titleMap = {
    top50:   { title: 'Top 50 transactions by amount', sub: 'sorted by amount &darr;' },
    random:  { title: 'Random sample',                  sub: 'pre-selected, weighted across categories' },
    idr50m:  { title: 'IDR 50M+ exceptions',            sub: 'all transactions over IDR 50M, sorted by amount &darr;' },
    tax:     { title: 'Tax accounts',                   sub: 'all tax-account postings — confirm correct tax type' },
    flagged: { title: 'Flagged to IA',                  sub: 'awaiting IA response' }
  };
  var t = titleMap[coverageId] || { title: 'Coverage view', sub: '' };

  /* Filter pills */
  var filt = APP.s3gl.ws.coverageFilter || 'toReview';
  var filteredRows;
  if (filt === 'toReview') {
    filteredRows = rows.filter(function(r) { return !_isCoverageRowReviewed(r); });
  } else if (filt === 'reviewed') {
    filteredRows = rows.filter(_isCoverageRowReviewed);
  } else {
    filteredRows = rows; /* all */
  }
  /* Cap shown rows to 100 for performance */
  var capped = filteredRows.slice(0, 100);

  /* Header */
  var hdrHtml = '<div class="workspace-hdr">'
    + '<div class="workspace-hdr-row">'
    +   '<div>'
    +     '<div class="workspace-hdr-title">' + t.title + '</div>'
    +     '<div class="workspace-hdr-meta">All months &middot; ' + stats.reviewed + ' of ' + stats.total + ' reviewed &middot; ' + t.sub + '</div>'
    +   '</div>'
    +   '<div class="workspace-filter-row">'
    +     '<span class="filter-lbl">Show:</span>'
    +     '<button class="' + (filt === 'toReview' ? 'glm-btn-pri' : 'btn-ghost') + '" onclick="wsSetCoverageFilter(\'toReview\')" style="font-size:11px;padding:4px 10px">To review (' + stats.toGo + ')</button>'
    +     '<button class="' + (filt === 'all' ? 'glm-btn-pri' : 'btn-ghost') + '" onclick="wsSetCoverageFilter(\'all\')" style="font-size:11px;padding:4px 10px">All (' + stats.total + ')</button>'
    +     '<button class="' + (filt === 'reviewed' ? 'glm-btn-pri' : 'btn-ghost') + '" onclick="wsSetCoverageFilter(\'reviewed\')" style="font-size:11px;padding:4px 10px">Reviewed (' + stats.reviewed + ')</button>'
    +   '</div>'
    + '</div>'
    + '</div>';

  /* Selectable keys for bulk actions */
  var selectableKeys = capped.filter(function(r) { return !_isCoverageRowReviewed(r); }).map(function(r) {
    return r.monthIdx + '-' + r.gi + '-' + (r.type === 'auto' ? 'auto-' : '') + r.ti;
  });
  var selectedCount = selectableKeys.filter(function(k) { return APP.s3gl.ws.selectedRows[k]; }).length;
  var allSelected = selectableKeys.length > 0 && selectedCount === selectableKeys.length;

  /* Bulk action bar */
  var bulkBarHtml = '';
  if (selectedCount > 0) {
    if (APP.s3gl.ws.bulkOverrideOpen) bulkBarHtml = renderBulkOverrideForm(selectedCount);
    else if (APP.s3gl.ws.bulkFlagOpen) bulkBarHtml = renderBulkFlagForm(selectedCount);
    else {
      bulkBarHtml = '<div class="bulk-bar">'
        + '<span class="bulk-bar-count">' + selectedCount + ' selected</span>'
        + '<div class="bulk-bar-actions">'
        +   '<button class="glm-btn-pri" style="font-size:11px;padding:5px 12px" onclick="wsBulkConfirm()">&#10003; Confirm ' + selectedCount + '</button>'
        +   '<button class="btn-ghost" style="font-size:11px;padding:5px 10px" onclick="wsOpenBulkOverride()">Override ' + selectedCount + '</button>'
        +   '<button class="btn-ghost" style="font-size:11px;padding:5px 10px;color:var(--color-action)" onclick="wsOpenBulkFlag()">Flag IA</button>'
        +   '<span style="margin:0 4px;color:var(--color-border-default)">|</span>'
        +   '<button class="btn-ghost" style="font-size:11px;padding:5px 10px;color:var(--color-text-tertiary)" onclick="wsClearSelection()">Clear</button>'
        + '</div>'
        + '</div>';
    }
  }

  /* Rows */
  var rowsHtml = capped.map(function(r) {
    return renderCoverageTableRow(r);
  }).join('');

  if (capped.length === 0) {
    rowsHtml = '<tr><td colspan="9" style="padding:24px;text-align:center;font-size:12px;color:var(--color-text-tertiary);font-weight:300">'
      + (filt === 'toReview' ? 'All rows in this view have been reviewed.' : 'No rows in this view.')
      + '</td></tr>';
  }

  var tableHtml = '<div class="workspace-table-wrap">'
    + '<table class="workspace-table">'
    + '<thead><tr>'
    +   '<th class="cb-col">' + (selectableKeys.length > 0 ? '<input type="checkbox" ' + (allSelected ? 'checked' : '') + ' onclick="wsCoverageToggleAll()" />' : '') + '</th>'
    +   '<th>Ref</th>'
    +   '<th class="cov-context">Month</th>'
    +   '<th class="cov-context">Category</th>'
    +   '<th>Vendor</th>'
    +   '<th>Mapped to</th>'
    +   '<th class="amt">Amount</th>'
    +   '<th></th>'
    + '</tr></thead>'
    + '<tbody>' + rowsHtml + '</tbody>'
    + '</table>'
    + '</div>';

  /* Pagination */
  var paginationHtml = '';
  if (filteredRows.length > capped.length) {
    paginationHtml = '<div class="workspace-pagination">'
      + '<span>Showing ' + capped.length + ' of ' + filteredRows.length + '</span>'
      + '<button class="workspace-pagination-link" onclick="alert(\'Pagination: production loads next 100\')">Load next 100 &#8594;</button>'
      + '</div>';
  }

  return '<div class="workspace-pane">'
    + hdrHtml
    + bulkBarHtml
    + tableHtml
    + paginationHtml
    + '</div>';
}

function renderCoverageTableRow(r) {
  var key = r.monthIdx + '-' + r.gi + '-' + (r.type === 'auto' ? 'auto-' : '') + r.ti;
  var reviewed = _isCoverageRowReviewed(r);
  var state = APP.s3gl.ws.txnStates[key];

  var rowStyle = '';
  var statusPill = '';
  var actionsHtml = '';

  if (reviewed) {
    rowStyle = 'background:var(--color-success-surface);opacity:.85';
    if (state === 'confirmed') statusPill = '<span style="font-size:10px;color:var(--color-success-text);font-weight:600">&#10003; Confirmed in ' + r.category + '</span>';
    else if (state === 'overridden') statusPill = '<span style="font-size:10px;color:var(--color-action);font-weight:600">&#10003; Overridden in ' + r.category + '</span>';
    else if (state === 'flagged') statusPill = '<span style="font-size:10px;color:var(--color-danger-text);font-weight:600">&#128681; Flagged from ' + r.category + '</span>';
    else if (r.type === 'auto' && APP.s3gl.ws.confirmedClusters[r.monthIdx + '-' + r.gi + '-batch'] === 'confirmed')
      statusPill = '<span style="font-size:10px;color:var(--color-success-text);font-weight:600">&#10003; In ' + r.category + ' batch</span>';
    else statusPill = '<span style="font-size:10px;color:var(--color-success-text);font-weight:600">&#10003; In ' + r.category + '</span>';
    actionsHtml = statusPill;
  } else {
    var checked = APP.s3gl.ws.selectedRows[key] ? 'checked' : '';
    actionsHtml = '<div class="workspace-row-actions">'
      + '<button class="tbl-btn confirm" onclick="wsConfirmFromCoverage(\'' + key + '\')">Confirm</button>'
      + '<button class="tbl-btn override-link" onclick="wsStartOverrideFromCoverage(\'' + key + '\')">Override</button>'
      + '<button class="tbl-btn flag" onclick="wsStartFlagFromCoverage(\'' + key + '\')">Flag</button>'
      + '</div>';
  }

  var cbCell = reviewed
    ? '<td class="cb-col"></td>'
    : '<td class="cb-col"><input type="checkbox" ' + (APP.s3gl.ws.selectedRows[key] ? 'checked' : '') + ' onclick="wsToggleRow(\'' + key + '\')" /></td>';

  var vendor = r.txn.vendor === '—'
    ? '<span style="color:var(--color-text-tertiary);font-style:italic">— (manual)</span>'
    : r.txn.vendor;

  var mappedTo = (r.txn.suggested || '').split('·')[0].trim() || '—';
  /* Show short account code only to keep column tight */
  if (r.txn.suggested) {
    var parts = r.txn.suggested.split('·');
    if (parts.length > 1) mappedTo = parts[0].trim() + ' ·' + parts.slice(1).join('·');
  }

  return '<tr style="' + rowStyle + '">'
    + cbCell
    + '<td class="mono">' + r.txn.ref + '</td>'
    + '<td class="cov-context"><span style="font-size:11px;font-weight:500">' + r.monthLbl + '</span></td>'
    + '<td class="cov-context"><span style="font-size:11px">' + r.category + '</span></td>'
    + '<td style="color:var(--color-text-secondary)">' + vendor + '</td>'
    + '<td style="color:var(--color-text-secondary);font-size:11px">' + mappedTo + '</td>'
    + '<td class="amt">' + r.txn.amount + '</td>'
    + '<td>' + actionsHtml + '</td>'
    + '</tr>';
}

function wsSelectCoverage(coverageId) {
  APP.s3gl.ws.selectedCoverage = coverageId;
  APP.s3gl.ws.coverageFilter = 'toReview';
  renderMonthWorkspace('all');
}

function wsSelectClusterAllMode() {
  /* Convenience: navigate back into All-months mode from elsewhere */
  APP.s3gl.ws.activeMonth = 'all';
  APP.s3gl.ws.selectedCoverage = null;
  renderMonthWorkspace('all');
}

function wsSetCoverageFilter(f) {
  APP.s3gl.ws.coverageFilter = f;
  renderMonthWorkspace('all');
}

function wsConfirmFromCoverage(key) {
  /* key is monthIdx-gi-(auto-)?ti */
  if (key.indexOf('-auto-') >= 0) {
    /* Auto-mapped row — confirming from coverage means "I personally reviewed and accept this auto-mapping".
       Track separately from overrides so we don't pollute the override semantics. */
    if (!APP.s3gl.ws.coverageConfirmed) APP.s3gl.ws.coverageConfirmed = {};
    APP.s3gl.ws.coverageConfirmed[key] = { by: 'Controller', when: 'Day 18 · 14:32 WIB' };
  } else {
    APP.s3gl.ws.txnStates[key] = 'confirmed';
  }
  invalidateCoverageCache();
  renderMonthWorkspace('all');
}

function wsStartOverrideFromCoverage(key) {
  APP.s3gl.ws.overrideForm = key;
  APP.s3gl.ws.overrideDraft = { account: '', dim: '', reason: '' };
  /* Pop a small inline override form. For the prototype we keep it simple — alert-driven. */
  var account = prompt('Override mapping for this transaction. New account:');
  if (!account) return;
  var reason = prompt('Reason for override (audit trail):');
  if (!reason) return;
  APP.s3gl.ws.overrides[key] = { account: account, dim: '', reason: reason, by: 'Controller', when: 'Day 18' };
  if (key.indexOf('-auto-') < 0) APP.s3gl.ws.txnStates[key] = 'overridden';
  invalidateCoverageCache();
  renderMonthWorkspace('all');
}

function wsStartFlagFromCoverage(key) {
  if (key.indexOf('-auto-') >= 0) {
    alert('Auto-mapped rows can be overridden but not flagged. Use Override instead.');
    return;
  }
  var comment = prompt('What should your IA investigate?');
  if (!comment) return;
  APP.s3gl.ws.txnStates[key] = 'flagged';
  APP.s3gl.ws.flagComments[key] = comment;
  invalidateCoverageCache();
  renderMonthWorkspace('all');
}

function wsCoverageToggleAll() {
  var coverageId = APP.s3gl.ws.selectedCoverage;
  if (!coverageId) return;
  var rows = getCoverageRows(coverageId);
  var keys = rows.filter(function(r) { return !_isCoverageRowReviewed(r); }).slice(0, 100).map(function(r) {
    return r.monthIdx + '-' + r.gi + '-' + (r.type === 'auto' ? 'auto-' : '') + r.ti;
  });
  var allSelected = keys.length > 0 && keys.every(function(k) { return APP.s3gl.ws.selectedRows[k]; });
  if (allSelected) keys.forEach(function(k) { delete APP.s3gl.ws.selectedRows[k]; });
  else keys.forEach(function(k) { APP.s3gl.ws.selectedRows[k] = true; });
  renderMonthWorkspace('all');
}

function renderClusterCard(monthIdx, grp, gi) {
  var isActive = APP.s3gl.ws.selectedCluster === gi;
  var autoMappedCount = grp.total - grp.toReview;
  var isOrphan = grp.orphan;
  var hasIA = (grp.txns || []).some(function(t){return t.hasFlag && (t.flagReason==='reclass' || t.flagReason==='cash-restate' || t.flagReason==='fx-revaluation');});

  /* Compute manually-mapped counter from confirmed state of review rows */
  var manuallyMapped = 0;
  (grp.txns || []).forEach(function(txn, ti) {
    var key = monthIdx + '-' + gi + '-' + ti;
    var state = APP.s3gl.ws.txnStates[key];
    if (state === 'confirmed' || state === 'overridden') manuallyMapped++;
  });
  /* Also: if the AI batch was confirmed, those count too (vendor pattern apply) */
  var batchKey = monthIdx + '-' + gi + '-batch';
  if (grp.autoBatch && APP.s3gl.ws.confirmedClusters[batchKey] === 'confirmed') {
    manuallyMapped += grp.autoBatch.count;
  }
  /* Also: if IA band was accepted, count those iaTxns */
  var iaBandKey = monthIdx + '-' + gi + '-iaband';
  if (APP.s3gl.ws.iaBandActions[iaBandKey] === 'accepted') {
    var iaTxns = (grp.txns || []).filter(function(t){return t.hasFlag && (t.flagReason==='reclass' || t.flagReason==='cash-restate' || t.flagReason==='fx-revaluation');});
    manuallyMapped += iaTxns.length;
  }

  var stillToReview = Math.max(0, grp.toReview - manuallyMapped);
  /* Cap at toReview so we don't double-count batch+IA both */
  if (manuallyMapped > grp.toReview && grp.autoBatch) {
    /* batch is separate from review rows — only cap if it inflates above what makes sense */
    /* keep going — manuallyMapped can exceed toReview in this case, but stillToReview should be 0 */
    stillToReview = 0;
  }

  var isDone = stillToReview === 0;
  var pctMapped = grp.total > 0 ? Math.round((autoMappedCount + manuallyMapped) / grp.total * 100) : 100;
  /* Cap pct at 100 (manual mapped + auto mapped can in edge cases exceed total due to batch counting) */
  if (pctMapped > 100) pctMapped = 100;

  var cardCls = 'cluster-card';
  if (isActive) cardCls += ' active';
  if (isOrphan) cardCls += ' danger';
  else if (isDone) cardCls += ' done';
  else if (hasIA) cardCls += ' has-ia';
  else cardCls += ' has-work';

  /* pills */
  var pills = [];
  if (isOrphan) {
    pills.push('<span class="cluster-card-pill flag-ia">' + grp.toReview + ' orphan</span>');
  } else if (isDone) {
    pills.push('<span class="cluster-card-pill done">All mapped &#10003;</span>');
  } else {
    pills.push('<span class="cluster-card-pill review">' + stillToReview + ' to review</span>');
  }
  if (hasIA && !isOrphan && !isDone) {
    pills.push('<span class="cluster-card-pill ia">IA</span>');
  }

  /* breakdown line — three states depending on what's been confirmed */
  var breakdownHtml;
  if (isDone) {
    if (manuallyMapped > 0) {
      breakdownHtml = '<div class="cluster-card-breakdown">'
        + '<span><span class="cluster-card-breakdown-num success">' + autoMappedCount + '</span> auto</span>'
        + '<span><span class="cluster-card-breakdown-num action">' + Math.min(manuallyMapped, grp.toReview + (grp.autoBatch ? grp.autoBatch.count : 0)) + '</span> manual</span>'
        + '</div>';
    } else {
      breakdownHtml = '<div class="cluster-card-breakdown"><span><span class="cluster-card-breakdown-num success">' + autoMappedCount + '</span> auto-mapped</span></div>';
    }
  } else if (manuallyMapped > 0) {
    breakdownHtml = '<div class="cluster-card-breakdown">'
      + '<span><span class="cluster-card-breakdown-num success">' + autoMappedCount + '</span> auto</span>'
      + '<span><span class="cluster-card-breakdown-num action">' + manuallyMapped + '</span> manual</span>'
      + '<span><span class="cluster-card-breakdown-num warn">' + stillToReview + '</span> to review</span>'
      + '</div>';
  } else {
    breakdownHtml = '<div class="cluster-card-breakdown">'
      + '<span><span class="cluster-card-breakdown-num success">' + autoMappedCount + '</span> auto-mapped</span>'
      + '<span><span class="cluster-card-breakdown-num warn">' + stillToReview + '</span> to review</span>'
      + '</div>';
  }

  var nameClsExtra = isDone ? ' done-clr' : '';
  var bigClsExtra = isDone ? ' done-clr' : '';
  var lblClsExtra = isDone ? ' done-clr' : '';
  var progClsExtra = isDone ? ' done-bg' : '';
  /* Progress bar: when manually mapped > 0 and not done yet, show two-tone fill */
  var progFillHtml;
  if (isDone) {
    progFillHtml = '<div class="cluster-card-prog-fill done" style="width:100%"></div>';
  } else if (manuallyMapped > 0) {
    /* Two-tone: auto fills green, manual extends with brand-blue */
    var autoPct = grp.total > 0 ? Math.round(autoMappedCount / grp.total * 100) : 0;
    var manualPct = grp.total > 0 ? Math.round(manuallyMapped / grp.total * 100) : 0;
    progFillHtml = '<div class="cluster-card-prog-fill done" style="width:' + autoPct + '%"></div>'
      + '<div class="cluster-card-prog-fill manual" style="width:' + manualPct + '%"></div>';
  } else {
    var autoPct = grp.total > 0 ? Math.round(autoMappedCount / grp.total * 100) : 0;
    progFillHtml = '<div class="cluster-card-prog-fill done" style="width:' + autoPct + '%"></div>';
  }

  return '<div class="' + cardCls + '" onclick="wsSelectCluster(' + gi + ')">'
    + '<div class="cluster-card-row">'
    +   '<span class="cluster-card-name' + nameClsExtra + '">' + grp.name + '</span>'
    +   '<div class="cluster-card-pill-wrap">' + pills.join('') + '</div>'
    + '</div>'
    + '<div class="cluster-card-num">'
    +   '<span class="cluster-card-num-big' + bigClsExtra + '">' + grp.total + '</span>'
    +   '<span class="cluster-card-num-lbl' + lblClsExtra + '">transactions</span>'
    + '</div>'
    + '<div class="cluster-card-prog' + progClsExtra + '" style="display:flex">' + progFillHtml + '</div>'
    + breakdownHtml
    + '</div>';
}

function renderMonthOverviewPane(monthIdx, mo, groups) {
