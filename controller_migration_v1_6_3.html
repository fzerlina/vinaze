<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Klay Migration — v2 (5-stage)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Inconsolata:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --primitive-tc-900:#3D1200;--primitive-tc-700:#A03206;--primitive-tc-500:#B83D08;--primitive-tc-400:#D4622A;--primitive-tc-200:#EDD5C4;--primitive-tc-100:#F7EDE5;
  --primitive-bl-900:#0E2470;--primitive-bl-700:#1338A8;--primitive-bl-500:#1A46C8;--primitive-bl-400:#4D72E0;--primitive-bl-200:#C8D8FA;--primitive-bl-100:#EBF0FD;
  --primitive-ink-950:#080706;--primitive-ink-900:#1A1814;--primitive-ink-800:#2E2B27;--primitive-ink-400:#8C857C;--primitive-ink-300:#C8C2BA;--primitive-ink-200:#E2DDD7;--primitive-ink-100:#F4F0EB;--primitive-ink-50:#FBF8F5;--primitive-white:#FFFFFF;
  --primitive-go-700:#166638;--primitive-go-200:#A8D9BC;--primitive-go-100:#E8F5EE;
  --primitive-warn-800:#7A4D00;--primitive-warn-300:#E8C870;--primitive-warn-100:#FDF3E0;
  --primitive-stop-700:#A02020;--primitive-stop-300:#EAB8B8;--primitive-stop-100:#FBF0F0;
  --color-brand:var(--primitive-tc-500);--color-brand-hover:var(--primitive-tc-700);--color-brand-mid:var(--primitive-tc-400);--color-brand-subtle:var(--primitive-tc-200);--color-brand-wash:var(--primitive-tc-100);--color-brand-deep:var(--primitive-tc-900);
  --color-action:var(--primitive-bl-500);--color-action-hover:var(--primitive-bl-700);--color-action-mid:var(--primitive-bl-400);--color-action-subtle:var(--primitive-bl-200);--color-action-wash:var(--primitive-bl-100);
  --color-text-primary:var(--primitive-ink-950);--color-text-secondary:var(--primitive-ink-800);--color-text-tertiary:var(--primitive-ink-400);--color-text-disabled:var(--primitive-ink-300);--color-text-inverse:var(--primitive-white);
  --color-surface-base:var(--primitive-ink-50);--color-surface-raised:var(--primitive-white);--color-surface-sunken:var(--primitive-ink-100);
  --color-border-default:var(--primitive-ink-200);--color-border-subtle:var(--primitive-ink-100);--color-border-strong:var(--primitive-ink-300);
  --color-success-text:var(--primitive-go-700);--color-success-border:var(--primitive-go-200);--color-success-surface:var(--primitive-go-100);
  --color-warning-text:var(--primitive-warn-800);--color-warning-border:var(--primitive-warn-300);--color-warning-surface:var(--primitive-warn-100);
  --color-danger-text:var(--primitive-stop-700);--color-danger-border:var(--primitive-stop-300);--color-danger-surface:var(--primitive-stop-100);
  --font-sans:'Instrument Sans',sans-serif;--font-mono:'Inconsolata',monospace;
  --radius-sm:6px;--radius-md:10px;--radius-lg:14px;--radius-xl:20px;--radius-full:9999px;
  --space-2:8px;--space-3:12px;--space-4:16px;--space-6:24px;--space-8:32px;--space-14:56px;
  --transition-base:0.15s ease;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--font-sans);background:var(--color-surface-base);color:var(--color-text-primary);-webkit-font-smoothing:antialiased;}

/* ── NAV ── */
.nav{background:var(--color-surface-base);border-bottom:1px solid var(--color-border-default);padding:0 var(--space-14);height:52px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{color:var(--color-brand);font-weight:700;font-size:15px;letter-spacing:-0.02em;}
.nav-sep{color:var(--color-border-strong);margin:0 6px;}
.nav-org{color:var(--color-text-primary);font-weight:500;font-size:14px;}
.day-badge{font-size:11px;font-weight:600;padding:4px 12px;border-radius:var(--radius-full);}
.day-badge.pend{background:var(--color-surface-sunken);color:var(--color-text-tertiary);border:1px solid var(--color-border-default);}
.day-badge.act{background:var(--color-danger-surface);color:var(--color-danger-text);border:1px solid var(--color-danger-border);}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--color-brand);color:var(--color-text-inverse);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;}

/* ── STAGE BAR (top) ── */
.stagebar{background:var(--color-surface-raised);border-bottom:1px solid var(--color-border-default);padding:0 var(--space-14);display:flex;align-items:stretch;height:48px;}
.sti{display:flex;align-items:center;gap:8px;padding:0 16px;border-bottom:2px solid transparent;white-space:nowrap;}
.sti.clickable{cursor:pointer;}
.sti.clickable:hover{background:var(--color-surface-sunken);}
.sti.on{border-bottom-color:var(--color-brand);}
.sti.off{opacity:.4;}
.stc{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.stc.on{background:var(--color-brand);color:var(--color-text-inverse);}
.stc.done{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);}
.stc.off{background:var(--color-surface-sunken);color:var(--color-text-disabled);border:1.5px solid var(--color-border-default);}
.stl{font-size:12px;font-weight:500;}
.stl.on{color:var(--color-brand);font-weight:600;}
.stl.done{color:var(--color-text-secondary);}
.stl.off{color:var(--color-text-disabled);}
.conn{width:1px;background:var(--color-border-default);margin:12px 0;flex-shrink:0;}

/* ── SUBSTEP BAR (within a stage) ── */
.substepbar{background:var(--color-surface-sunken);border-bottom:1px solid var(--color-border-default);padding:0 var(--space-14);display:flex;align-items:stretch;height:38px;}
.ssi{display:flex;align-items:center;gap:8px;padding:0 14px;cursor:pointer;border-bottom:2px solid transparent;}
.ssi.locked{cursor:not-allowed;opacity:.4;}
.ssi:hover:not(.locked){background:var(--color-surface-raised);}
.ssi.on{border-bottom-color:var(--color-brand);}
.ssc{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.ssc.on{background:var(--color-brand);color:var(--color-text-inverse);}
.ssc.done{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);}
.ssc.locked{background:transparent;color:var(--color-text-disabled);border:1.5px solid var(--color-border-default);}
.ssc.available{background:var(--color-surface-raised);color:var(--color-text-secondary);border:1.5px solid var(--color-border-default);}
.ssl{font-size:12px;font-weight:500;color:var(--color-text-secondary);}
.ssl.on{color:var(--color-brand);font-weight:600;}
.ssl.done{color:var(--color-text-secondary);}
.ssl.locked{color:var(--color-text-disabled);}


.ssn{font-size:10px;color:var(--color-text-tertiary);font-family:var(--font-mono);margin-left:4px;}
.ssi.done .ssn{color:var(--color-success-text);}
.ss-divider{color:var(--color-border-default);font-size:14px;display:flex;align-items:center;}

/* ── SUBSTEP 1: Klay orientation panes ── */
.s2-legend{display:flex;gap:18px;margin:14px 0 10px;font-size:11px;color:var(--color-text-secondary);}
.s2-legend-item{display:inline-flex;align-items:center;gap:6px;}
.s2-flag-mini{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600;letter-spacing:0.04em;font-family:var(--font-mono);}
.s2-flag-mini.sys{background:#FCEBEB;color:#791F1F;}
.s2-flag-mini.ctrl{background:#FBEAF0;color:#993556;}

.s2-orient-shell{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--color-border-default);border-radius:var(--radius-lg);overflow:hidden;background:var(--color-surface-raised);height:calc(100vh - 280px);min-height:520px;max-height:900px;}
.s2-orient-side{display:flex;flex-direction:column;border-right:1px solid var(--color-border-default);overflow:hidden;}
.s2-orient-side:last-child{border-right:none;}
.s2-orient-hdr{padding:10px 16px;background:var(--color-surface-sunken);border-bottom:1px solid var(--color-border-default);display:flex;justify-content:space-between;align-items:baseline;flex-shrink:0;}
.s2-orient-title{font-size:13px;font-weight:600;color:var(--color-text-primary);}
.s2-orient-meta{font-size:11px;color:var(--color-text-tertiary);font-weight:400;}
.s2-orient-tag{display:inline-block;font-size:9px;font-weight:600;padding:1px 6px;border-radius:3px;background:var(--color-surface-sunken);color:var(--color-text-tertiary);margin-left:6px;letter-spacing:0.04em;text-transform:uppercase;font-family:var(--font-mono);}
.s2-orient-rename-hint{display:flex;align-items:flex-start;gap:7px;padding:8px 16px;background:#FAF9FE;border-bottom:1px solid #CECBF6;font-size:11px;color:#3C3489;line-height:1.45;font-weight:400;}
.s2-orient-rename-hint-icon{font-size:11px;color:#534AB7;flex-shrink:0;line-height:1.45;}
.s2-orient-rename-hint strong{color:#26215C;font-weight:600;}
.s2-orient-body{flex:1;overflow-y:auto;padding:6px 0;}
.s2-top-cta{display:flex;justify-content:flex-end;margin:14px 0 6px;}
.s2-orient-fs-hdr{padding:10px 16px 4px;font-size:9px;font-weight:600;color:var(--color-text-tertiary);letter-spacing:0.06em;text-transform:uppercase;border-top:1px solid var(--color-border-default);background:var(--color-surface-raised);position:sticky;top:0;display:flex;justify-content:space-between;align-items:baseline;}
.s2-orient-fs-hdr:first-child{border-top:none;}
.s2-orient-fs-cnt{font-size:10px;font-family:var(--font-mono);font-weight:400;color:var(--color-text-disabled);}
.s2-orient-mid{padding:4px 16px;font-size:11px;color:var(--color-text-primary);font-weight:500;display:flex;align-items:baseline;gap:8px;}
.s2-orient-mid-d0{padding-left:16px;}
.s2-orient-mid-d1{padding-left:28px;}
.s2-orient-mid-d2{padding-left:40px;}
.s2-orient-mid-code{font-family:var(--font-mono);font-size:10px;color:var(--color-text-tertiary);min-width:60px;flex-shrink:0;}
.s2-orient-mid-name{font-size:11px;color:var(--color-text-primary);font-weight:500;flex:1;}
.s2-orient-mid-cnt{font-size:10px;color:var(--color-text-disabled);font-family:var(--font-mono);}
.s2-orient-leaf{padding:3px 16px 3px 32px;font-size:11px;display:flex;align-items:baseline;gap:8px;color:var(--color-text-secondary);}
.s2-orient-leaf-d0{padding-left:16px;}
.s2-orient-leaf-d1{padding-left:32px;}
.s2-orient-leaf-d2{padding-left:48px;}
.s2-orient-leaf-d3{padding-left:64px;}
.s2-orient-leaf-code{font-family:var(--font-mono);font-size:9px;color:var(--color-text-disabled);min-width:80px;flex-shrink:0;}
.s2-orient-leaf-name{font-size:11px;color:var(--color-text-primary);}
.s2-orient-leaf-more{padding:4px 16px 6px 32px;font-size:10px;color:var(--color-text-disabled);font-style:italic;}
.s2-orient-leaf.klay .s2-orient-leaf-code{color:var(--color-text-tertiary);}

/* ── SUBSTEP 2: Cluster cards ── */
.s2-sec-tabs{display:flex;gap:4px;margin:14px 0 14px;border-bottom:1px solid var(--color-border-default);font-size:12px;}
.s2-sec-tab{padding:8px 14px;cursor:pointer;border:1px solid transparent;border-bottom:none;color:var(--color-text-secondary);font-size:12px;font-weight:500;border-radius:6px 6px 0 0;margin-bottom:-1px;}
.s2-sec-tab:hover{color:var(--color-text-primary);background:var(--color-surface-sunken);}
.s2-sec-tab.on{background:var(--color-surface-raised);color:var(--color-text-primary);font-weight:600;border-color:var(--color-border-default);border-bottom:1px solid var(--color-surface-raised);}
.s2-sec-tab-cnt{font-size:10px;font-family:var(--font-mono);color:var(--color-text-disabled);margin-left:4px;}
.s2-sec-tab.on .s2-sec-tab-cnt{color:var(--color-text-tertiary);}

/* Issue clusters as boxes (Substep 3 All tab) */
.s2-issue-boxes{margin:0 0 16px;}
.s2-issue-boxes-hdr{font-size:10px;font-weight:600;color:var(--color-text-tertiary);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px;}
.s2-issue-boxes-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));gap:8px;}
.s2-issue-box{padding:10px 12px;border-radius:var(--radius-md);border:1px solid var(--color-border-default);background:var(--color-surface-raised);cursor:pointer;transition:background 0.1s;}
.s2-issue-box:hover{background:var(--color-surface-sunken);}
.s2-issue-box.on{background:#FCEBEB;border-color:#F09595;}
.s2-issue-box.s2-issue-hard{border-left:3px solid #A32D2D;}
.s2-issue-box.s2-issue-soft{border-left:3px solid #BA7517;}
.s2-issue-box-cnt{font-size:18px;font-weight:700;color:var(--color-text-primary);line-height:1.1;}
.s2-issue-box-name{font-size:11px;color:var(--color-text-primary);font-weight:500;margin-top:2px;line-height:1.3;}
.s2-issue-box-kind{font-size:9px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.04em;font-weight:500;margin-top:4px;}
.s2-issue-box.s2-issue-hard .s2-issue-box-kind{color:#A32D2D;}
.s2-issue-box.s2-issue-soft .s2-issue-box-kind{color:#854F0B;}

/* Full-width workspace (no sidebar in Substep 3) */
.s2-ws-full{padding:0;background:transparent;border:1px solid var(--color-border-default);border-radius:var(--radius-lg);overflow:hidden;}

.s2-cards{display:flex;flex-direction:column;gap:10px;}
.s2-cards-empty{padding:36px;text-align:center;color:var(--color-text-tertiary);font-size:12px;font-weight:300;border:1px dashed var(--color-border-default);border-radius:var(--radius-md);}
.s2-card{background:var(--color-surface-raised);border:1px solid var(--color-border-default);border-radius:var(--radius-lg);padding:12px 16px;}
.s2-card.confirmed{background:#F1F8E8;border-color:#C0DD97;}
.s2-card.review-marked{background:#FCEBEB;border-color:#F09595;}
.s2-card.pat-split{border-left:3px solid #BA7517;}
.s2-card.pat-review{border-left:3px solid #A32D2D;}
.s2-card.pat-clean{border-left:3px solid #639922;}

.s2-card-hdr{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:6px;}
.s2-card-hdr-l{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;flex:1;min-width:0;}
.s2-card-code{font-family:var(--font-mono);font-size:11px;color:var(--color-text-tertiary);font-weight:500;}
.s2-card-name{font-size:13px;font-weight:600;color:var(--color-text-primary);}
.s2-card-leaves{font-size:11px;color:var(--color-text-tertiary);font-family:var(--font-mono);flex-shrink:0;}
.s2-card-synth-tag{font-size:9px;color:var(--color-text-disabled);font-style:italic;padding:1px 6px;border:1px dashed var(--color-border-default);border-radius:3px;}

.s2-pat-tag{display:inline-block;font-size:9px;font-weight:600;padding:2px 7px;border-radius:3px;letter-spacing:0.04em;text-transform:uppercase;font-family:var(--font-mono);}
.s2-pat-clean{background:#EAF3DE;color:#27500A;}
.s2-pat-split{background:#FAEEDA;color:#854F0B;}
.s2-pat-review{background:#FCEBEB;color:#791F1F;}

.s2-card-targets{display:flex;align-items:flex-start;gap:8px;margin:8px 0;}
.s2-card-arrow{font-size:14px;color:var(--color-text-tertiary);line-height:1.6;flex-shrink:0;}
.s2-card-target-pill{display:inline-flex;align-items:baseline;gap:6px;padding:5px 10px;border:1px solid var(--color-border-default);border-radius:var(--radius-md);background:var(--color-surface-raised);font-size:12px;}
.s2-card-target-pill.confirmed{background:#EAF3DE;border-color:#C0DD97;}
.s2-card-target-code{font-family:var(--font-mono);font-size:10px;color:var(--color-text-tertiary);font-weight:600;}
.s2-card-target-pill.confirmed .s2-card-target-code{color:#27500A;}
.s2-card-target-name{font-size:12px;color:var(--color-text-primary);}
.s2-card-target-multi{display:flex;flex-direction:column;gap:5px;flex:1;}
.s2-card-target-row{display:flex;align-items:baseline;gap:8px;font-size:12px;}
.s2-card-target-meta{font-size:11px;color:var(--color-text-secondary);font-family:var(--font-mono);}

.s2-card-note{font-size:11px;color:var(--color-text-secondary);font-style:italic;line-height:1.5;margin:6px 0 8px;padding-left:24px;}
.s2-card-actions{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
.btn-conf-primary{padding:6px 12px;background:var(--color-brand);color:var(--color-text-inverse);border:none;border-radius:var(--radius-md);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font-sans);}
.btn-conf-primary:hover{background:var(--color-brand-hover);}
.btn-conf-secondary{padding:6px 12px;background:transparent;color:var(--color-text-secondary);border:1px solid var(--color-border-default);border-radius:var(--radius-md);font-size:11px;font-weight:500;cursor:pointer;font-family:var(--font-sans);}
.btn-conf-secondary:hover{background:var(--color-surface-sunken);color:var(--color-text-primary);}
.btn-conf-done{padding:6px 12px;background:var(--color-success-text);color:#fff;border:none;border-radius:var(--radius-md);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font-sans);}
.btn-conf-done:hover{background:#1f4006;}

/* Investigate button — used in Stage 4 (Review) variance rows to jump back to Stage 2 */
.btn-investigate{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 12px;
  background:#fff;
  color:var(--color-brand);
  border:1px solid var(--color-brand);
  border-radius:var(--radius-md);
  font-size:11px;font-weight:600;
  font-family:var(--font-sans);
  cursor:pointer;
  white-space:nowrap;
  transition:background 0.12s ease, color 0.12s ease, transform 0.12s ease;
}
.btn-investigate:hover{
  background:var(--color-brand);
  color:#fff;
}
.btn-investigate:hover .btn-investigate-arrow{
  transform:translateX(2px);
}
.btn-investigate:active{
  transform:scale(0.97);
}
.btn-investigate-arrow{
  display:inline-block;
  font-size:13px;
  line-height:1;
  transition:transform 0.18s ease;
}
/* Smaller variant for contributor rows (less prominent) */
.btn-investigate-sm{
  padding:3px 8px;
  font-size:10px;
  font-weight:500;
}
.btn-investigate-sm .btn-investigate-arrow{font-size:11px;}

/* Row-highlight pulse — used after Investigate jumps to land on a specific account */
@keyframes s2-row-pulse {
  0%   { background:#FFF3D9; box-shadow: inset 4px 0 0 #C77B1A; }
  60%  { background:#FFF3D9; box-shadow: inset 4px 0 0 #C77B1A; }
  100% { background:transparent; box-shadow: inset 4px 0 0 transparent; }
}
.s2-ws-tbl tr.s2-row-highlight td {
  animation: s2-row-pulse 2.4s ease-out;
}

/* Expandable card detail */
.s2-card-hdr-r{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.s2-card-expand{display:flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--color-border-default);border-radius:var(--radius-md);padding:3px 8px;cursor:pointer;font-family:var(--font-sans);}
.s2-card-expand:hover{background:var(--color-surface-sunken);}
.s2-card-chevron{font-size:9px;color:var(--color-text-tertiary);}
.s2-card.expanded .s2-card-chevron{color:var(--color-text-primary);}
.s2-card-detail{margin:8px 0 0;padding:10px 12px;background:var(--color-surface-sunken);border-radius:var(--radius-md);border:0.5px solid var(--color-border-default);}
.s2-card-detail-hdr{font-size:10px;font-weight:600;color:var(--color-text-tertiary);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px;}
.s2-card-detail-tbl{width:100%;border-collapse:collapse;font-size:11px;}
.s2-card-detail-tbl thead th{text-align:left;font-size:9px;font-weight:600;color:var(--color-text-tertiary);letter-spacing:0.04em;text-transform:uppercase;padding:4px 6px;border-bottom:0.5px solid var(--color-border-default);}
.s2-card-detail-tbl tbody td{padding:5px 6px;border-bottom:0.5px solid rgba(0,0,0,0.04);vertical-align:top;}
.s2-card-detail-tbl tbody tr:last-child td{border-bottom:none;}
.s2-cd-code{font-family:var(--font-mono);font-size:10px;color:var(--color-text-tertiary);font-weight:500;}
.s2-cd-name{font-size:11px;color:var(--color-text-primary);}
.s2-cd-arrow{font-size:11px;color:var(--color-text-tertiary);width:16px;text-align:center;}
.s2-cd-tcode{font-family:var(--font-mono);font-size:10px;color:var(--color-text-tertiary);font-weight:600;}
.s2-cd-tname{font-size:11px;color:var(--color-text-primary);}
.s2-cd-conf{width:60px;text-align:right;}

.s2-conf{font-weight:700;font-family:var(--font-mono);}
.s2-conf.high{color:var(--color-success-text);}
.s2-conf.med{color:var(--color-warning-text);}
.s2-conf.low{color:var(--color-danger-text);}
.s2-actgrp{display:flex;gap:4px;justify-content:flex-end;}
.s2-act{background:var(--color-surface-raised);border:1px solid var(--color-border-default);border-radius:var(--radius-sm);padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font-sans);color:var(--color-text-secondary);}
.s2-act:hover{background:var(--color-surface-sunken);}
.s2-act.confirm{color:var(--color-text-primary);}
.s2-act.unconfirm{background:var(--color-success-surface);color:var(--color-success-text);border-color:var(--color-success-border);}
.s2-act.flag{color:var(--color-warning-text);}
.s2-act.disabled{opacity:.45;cursor:not-allowed;}

/* ── NEW: Account-Type cluster cards (column 2 when ALL is selected) ── */
.s2-cl-type{border:1px solid var(--color-border-default);border-radius:var(--radius-md);padding:9px 11px;cursor:pointer;background:var(--color-surface-raised);margin-bottom:6px;transition:border-color var(--transition-base);}
.s2-cl-type:hover{border-color:var(--color-border-strong);}
.s2-cl-type.active{border-color:var(--color-brand);box-shadow:inset 3px 0 0 0 var(--color-brand);}
.s2-cl-type.done{background:var(--color-success-surface);border-color:var(--color-success-border);}
.s2-cl-type.done.active{box-shadow:inset 3px 0 0 0 var(--color-success-text);}
.s2-cl-type-row{display:flex;justify-content:space-between;align-items:center;gap:6px;}
.s2-cl-type-name{font-size:12px;font-weight:600;color:var(--color-text-primary);}
.s2-cl-type-cnt{font-size:11px;color:var(--color-text-tertiary);font-weight:600;font-family:var(--font-mono);}
.s2-cl-type-bar{background:var(--color-border-subtle);border-radius:var(--radius-full);height:3px;margin:6px 0 4px;overflow:hidden;}
.s2-cl-type-fill{background:var(--color-brand);height:100%;border-radius:var(--radius-full);transition:width .4s;}
.s2-cl-type.done .s2-cl-type-fill{background:var(--color-success-text);}
.s2-cl-type-foot{font-size:10px;color:var(--color-text-tertiary);font-weight:500;}
.s2-cl-type-foot strong{color:var(--color-text-primary);font-weight:700;}

/* ── NEW: Compact Issues list (secondary section in column 2) ── */
.s2-cl-issue-mini{display:flex;align-items:center;gap:8px;padding:6px 10px;cursor:pointer;border-radius:var(--radius-sm);font-size:11px;}
.s2-cl-issue-mini:hover{background:var(--color-surface-sunken);}
.s2-cl-issue-mini.active{background:var(--color-brand-wash);border-left:2px solid var(--color-brand);padding-left:8px;}
.s2-cl-issue-mini-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.s2-cl-issue-mini.hard .s2-cl-issue-mini-dot{background:var(--color-danger-text);}
.s2-cl-issue-mini.soft .s2-cl-issue-mini-dot{background:var(--color-warning-text);}
.s2-cl-issue-mini-name{flex:1;font-weight:500;color:var(--color-text-secondary);line-height:1.3;}
.s2-cl-issue-mini.active .s2-cl-issue-mini-name{color:var(--color-brand);font-weight:600;}
.s2-cl-issue-mini-cnt{font-size:10px;color:var(--color-text-tertiary);font-weight:600;font-family:var(--font-mono);}

/* ── NEW: Klay account dropdown in workspace table ── */
.s2-klay-sel{width:100%;padding:6px 10px;border:1px solid var(--color-border-default);border-radius:var(--radius-sm);font-size:12px;font-family:var(--font-sans);background:var(--color-surface-raised);color:var(--color-text-primary);cursor:pointer;}
.s2-klay-sel:focus{outline:none;border-color:var(--color-action);}
.s2-klay-sel:hover:not(:disabled){border-color:var(--color-border-strong);}
.s2-klay-sel:disabled{background:var(--color-surface-sunken);color:var(--color-text-secondary);cursor:default;border-color:var(--color-border-subtle);}

/* ── NEW: Subtle confidence cues on row (replaces explicit confidence column) ── */
.s2-ws-tbl tr.s2-row-low td{background:#FDF6EC;}
.s2-ws-tbl tr.s2-row-low td:first-child{border-left:3px solid var(--color-warning-text);}
.s2-ws-tbl tr.s2-row-med td:first-child{border-left:3px solid var(--color-warning-border);}
.s2-ws-tbl tr.s2-row-low:hover td{background:#FAEFD9;}
.s2-ws-tbl tr.s2-row-header td{background:var(--color-surface-sunken);padding:7px 10px 6px;border-top:1px solid var(--color-border-default);}
.s2-ws-tbl tr.s2-row-group-hdr td{background:#E6F1FB;padding:8px 10px;border-top:1px solid #BFD7EE;}
.s2-grp-line{display:flex;align-items:center;gap:8px;}
.s2-grp-icon{font-size:10px;color:#0C447C;}
.s2-grp-label{font-size:11px;color:#0C447C;font-weight:500;}
.s2-grp-target{font-size:11px;color:var(--color-text-primary);}
.s2-grp-tcode{font-family:var(--font-mono);font-size:10px;color:var(--color-text-tertiary);font-weight:600;margin-right:4px;}
.s2-grp-confirm{background:#185FA5 !important;color:#fff !important;border:none !important;font-weight:600 !important;}
.s2-grp-confirm:hover{background:#0C447C !important;}
.s2-ws-tbl tr.s2-row-in-group td{background:#F5FAFE;}
.s2-ws-tbl tr.s2-row-in-group td:first-child{padding-left:24px;}
.s2-header-code{font-family:var(--font-mono);font-size:10px;font-weight:600;color:var(--color-text-secondary);}
.s2-header-name{font-size:12px;font-weight:600;color:var(--color-text-primary);margin-left:8px;}
.s2-header-tag{font-size:10px;font-style:italic;color:var(--color-text-tertiary);margin-left:10px;}
.s2-row-reason{font-size:11px;line-height:1.4;margin-top:4px;font-style:italic;}
.s2-row-reason-low{color:#791F1F;}
.s2-row-reason-med{color:#854F0B;}

/* ── NEW: Preview view (Old vs New CoA side-by-side) ── */
.s2-prev-shell{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px;}
.s2-prev-side{border:1px solid var(--color-border-default);border-radius:var(--radius-lg);background:var(--color-surface-raised);overflow:hidden;display:flex;flex-direction:column;max-height:760px;}
.s2-prev-side-hdr{padding:12px 16px;background:var(--color-surface-sunken);border-bottom:1px solid var(--color-border-default);display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-shrink:0;}
.s2-prev-side-title{font-size:13px;font-weight:700;color:var(--color-text-primary);}
.s2-prev-side-sub{font-size:11px;color:var(--color-text-tertiary);font-weight:500;margin-top:2px;}
.s2-prev-tree{flex:1;overflow-y:auto;padding:8px 0;}
.s2-prev-grp{margin-bottom:6px;}
.s2-prev-grp-hdr{padding:9px 16px 6px;font-size:9px;font-weight:700;color:var(--color-text-tertiary);letter-spacing:.08em;text-transform:uppercase;background:var(--color-surface-base);border-bottom:1px solid var(--color-border-subtle);position:sticky;top:0;z-index:1;}
.s2-prev-grp-cnt{font-family:var(--font-mono);color:var(--color-text-tertiary);font-weight:600;margin-left:4px;}

/* Tree node: a non-leaf parent (top or mid level) — structural, not clickable, not "mapped" */
.s2-prev-node{display:flex;align-items:center;gap:8px;padding:6px 16px;font-size:12px;background:var(--color-surface-raised);}
.s2-prev-node.node-top{padding-left:16px;font-weight:700;color:var(--color-text-primary);background:#FAFAF7;border-bottom:1px solid var(--color-border-subtle);}
.s2-prev-node.node-mid{padding-left:32px;font-weight:600;color:var(--color-text-secondary);}
.s2-prev-node.all-mapped{background:var(--color-success-surface);}
.s2-prev-node-code{font-family:var(--font-mono);font-size:10px;color:var(--color-text-tertiary);font-weight:700;flex-shrink:0;width:54px;}
.s2-prev-node-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.s2-prev-node-cnt{font-family:var(--font-mono);font-size:10px;color:var(--color-text-tertiary);font-weight:600;flex-shrink:0;}

/* Leaf: an actual account row — clickable, mappable */
.s2-prev-leaf{display:flex;align-items:center;gap:8px;padding:6px 16px 6px 48px;cursor:pointer;border-left:3px solid transparent;font-size:12px;background:var(--color-surface-raised);}
.s2-prev-leaf:hover{background:var(--color-surface-sunken);}
.s2-prev-leaf.mapped{background:var(--color-success-surface);}
.s2-prev-leaf.mapped:hover{background:#D5EBDD;}
/* unmapped uses default white background — no fill */
.s2-prev-leaf.highlighted{border-left-color:var(--color-brand);background:var(--color-brand-wash) !important;font-weight:700;}
/* Klay leaves are 2 levels deep so smaller indent */
#s2-prev-tree-klay .s2-prev-leaf{padding-left:48px;}
.s2-prev-leaf-code{font-family:var(--font-mono);font-size:11px;color:var(--color-text-tertiary);font-weight:600;flex-shrink:0;width:60px;}
.s2-prev-leaf-name{flex:1;color:var(--color-text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.s2-prev-leaf-arrow{font-family:var(--font-mono);font-size:10px;color:var(--color-text-tertiary);font-weight:600;flex-shrink:0;}
.s2-prev-leaf.mapped .s2-prev-leaf-arrow{color:var(--color-success-text);}
.s2-prev-flag{display:inline-block;font-size:9px;font-weight:600;padding:1px 5px;border-radius:var(--radius-sm);margin-left:4px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.04em;}
.s2-prev-flag.sys{background:#FCEBEB;color:#A32D2D;}
.s2-prev-flag.ctrl{background:#FBEAF0;color:#993556;}

/* Klay CoA page topbar — back-to-workspace button */
.s2-klaycoa-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.s2-klaycoa-back{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:transparent;border:1px solid var(--color-border-default);border-radius:var(--radius-md);font-size:12px;font-weight:500;color:var(--color-text-secondary);cursor:pointer;font-family:var(--font-sans);}
.s2-klaycoa-back:hover{background:var(--color-surface-sunken);color:var(--color-text-primary);border-color:var(--color-text-tertiary);}
.s2-klaycoa-back-arrow{font-size:13px;}

/* Klay CoA — emphasize the right pane (Klay) since it's the focal artifact */
.s2-prev-side-primary{border-color:#7F77DD;border-width:1.5px;}
.s2-prev-side-primary .s2-prev-side-hdr{background:#EEEDFE;border-bottom-color:#AFA9EC;}
.s2-prev-side-primary .s2-prev-side-title{color:#26215C;}

/* Rename pencil — sits at the right edge of every Klay leaf, always visible */
.s2-prev-leaf.klay-row{position:relative;}
.s2-klay-rename-pencil{flex-shrink:0;background:transparent;border:none;color:var(--color-text-tertiary);cursor:pointer;font-size:12px;padding:2px 6px;border-radius:var(--radius-sm);font-family:var(--font-sans);}
.s2-klay-rename-pencil:hover{background:var(--color-surface-sunken);color:#534AB7;}

/* Renamed marker — italic "was X" + reset link */
.s2-prev-leaf.renamed{border-left:3px solid #7F77DD;background:#FAF9FE;}
.s2-prev-leaf.renamed:hover{background:#F2F0FB;}
.s2-prev-leaf.renamed.mapped{background:linear-gradient(90deg, #FAF9FE 0%, var(--color-success-surface) 100%);}
.s2-klay-renamed-was{font-size:10px;color:var(--color-text-tertiary);font-style:italic;font-weight:400;margin-left:6px;}
.s2-klay-reset-btn{font-size:10px;color:#534AB7;background:transparent;border:none;cursor:pointer;padding:0 4px;font-family:var(--font-sans);text-decoration:underline;}
.s2-klay-reset-btn:hover{color:#26215C;}

/* Rename input + buttons (in-place editor) */
.s2-klay-rename-input{flex:1;min-width:0;padding:4px 8px;font-size:12px;font-family:var(--font-sans);border:1px solid #7F77DD;border-radius:var(--radius-sm);background:var(--color-surface-raised);color:var(--color-text-primary);outline:none;}
.s2-klay-rename-input:focus{border-color:#534AB7;box-shadow:0 0 0 2px #EEEDFE;}
.s2-klay-rename-cascade{font-size:10px;color:var(--color-text-tertiary);font-style:italic;flex-shrink:0;font-weight:400;line-height:1.45;white-space:nowrap;}
.s2-klay-rename-btn{font-size:11px;font-weight:500;padding:4px 10px;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-sans);border:0.5px solid var(--color-border-default);background:transparent;color:var(--color-text-secondary);flex-shrink:0;}
.s2-klay-rename-btn:hover{background:var(--color-surface-sunken);color:var(--color-text-primary);}
.s2-klay-rename-btn-pri{background:#534AB7;border-color:#534AB7;color:#fff;}
.s2-klay-rename-btn-pri:hover{background:#3C3489;color:#fff;}

/* ── Klay CoA full-screen page (table view, single-pane) ── */
.coa-page-h{padding:18px 0 14px;border-bottom:1px solid var(--color-border-default);margin-bottom:0;}
.coa-page-back{font-size:11px;color:var(--color-text-secondary);background:transparent;border:none;cursor:pointer;padding:0;font-family:var(--font-sans);display:inline-flex;align-items:center;gap:5px;margin-bottom:10px;}
.coa-page-back:hover{color:var(--color-text-primary);}
.coa-page-title{font-size:18px;font-weight:500;margin:0 0 4px;color:var(--color-text-primary);}
.coa-page-sub{font-size:12px;color:var(--color-text-secondary);line-height:1.5;}
.coa-page-meta{display:flex;gap:14px;margin-top:8px;font-size:11px;color:var(--color-text-secondary);}
.coa-page-meta .stat{display:inline-flex;align-items:center;gap:5px;}
.coa-page-meta .stat .num{font-family:var(--font-mono);font-weight:600;color:var(--color-text-primary);}
.coa-page-meta .lock-mini{color:#A02020;font-size:10px;}

.coa-tools{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--color-border-default);flex-wrap:wrap;}
.coa-search{font-size:12px;padding:6px 12px;border:1px solid var(--color-border-default);border-radius:var(--radius-sm);background:var(--color-surface-raised);color:var(--color-text-primary);outline:none;width:280px;font-family:var(--font-sans);}
.coa-search:focus{border-color:#7F77DD;}
.coa-spacer{flex:1;}
.coa-lock-toggle{font-size:11px;color:var(--color-text-secondary);display:inline-flex;align-items:center;gap:6px;cursor:pointer;user-select:none;}
.coa-lock-toggle .check{width:14px;height:14px;border:1px solid var(--color-border-strong);border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;background:var(--color-surface-raised);color:transparent;}
.coa-lock-toggle.on .check{background:var(--color-text-primary);color:var(--color-surface-raised);border-color:var(--color-text-primary);}

.coa-table{width:100%;border-collapse:collapse;font-size:12px;background:var(--color-surface-raised);}
.coa-table thead th{position:sticky;top:0;background:var(--color-surface-sunken);text-align:left;font-size:9px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.04em;padding:9px 14px;border-bottom:1px solid var(--color-border-default);z-index:2;}

.coa-section-row td{padding:14px 14px 6px;font-size:11px;font-weight:600;color:#A02020;text-transform:uppercase;letter-spacing:0.06em;background:var(--color-surface-sunken);border-bottom:1px solid var(--color-border-default);}
.coa-add-section{font-size:10px;font-weight:500;color:#534AB7;background:transparent;border:1px dashed #C8B8FA;border-radius:var(--radius-sm);padding:2px 8px;cursor:pointer;text-transform:none;letter-spacing:0;font-family:var(--font-sans);float:right;margin-top:-2px;}
.coa-add-section:hover{background:#EEEDFE;border-style:solid;}
.coa-subsection-row td{padding:9px 14px 9px 30px;font-size:10px;font-weight:500;color:var(--color-text-secondary);background:var(--color-surface-raised);border-bottom:0.5px solid var(--color-border-subtle);text-transform:uppercase;letter-spacing:0.04em;}

.coa-row{border-bottom:0.5px solid var(--color-border-subtle);}
.coa-row:hover{background:var(--color-surface-sunken);}
.coa-row td{padding:9px 14px;color:var(--color-text-primary);vertical-align:middle;}
.coa-row td.code{font-family:var(--font-mono);font-size:11px;color:var(--color-text-primary);font-weight:500;width:90px;}
.coa-row td.name{color:var(--color-text-primary);}
.coa-row td.lock-col{width:30px;text-align:center;}
.coa-row td.actions{width:55px;text-align:right;}
.coa-row.depth-1 td.code{padding-left:46px;}
.coa-row.depth-2 td.code{padding-left:62px;}

.coa-row.locked-row{background:linear-gradient(to right,#FBF0F0 0%,#FBF0F0 3px,transparent 3px);}
.coa-row.locked-row:hover{background:linear-gradient(to right,#FBF0F0 0%,#FBF0F0 3px,var(--color-surface-sunken) 3px);}

.coa-lock-ico{color:#A02020;font-size:11px;cursor:help;}
.coa-tag{display:inline-block;font-size:8px;font-weight:600;padding:1px 5px;border-radius:3px;margin-left:6px;letter-spacing:0.04em;font-family:var(--font-mono);}
.coa-tag.contra{background:#EEEDFE;color:#3C3489;}
.coa-tag.ctrl{background:#FBEAF0;color:#993556;}
.coa-tag.new{background:#E1F5EE;color:#0F6E56;}

.coa-row-act{background:transparent;border:none;color:var(--color-text-secondary);cursor:pointer;font-size:13px;padding:3px 5px;border-radius:var(--radius-sm);line-height:1;font-family:var(--font-sans);}
.coa-row-act:hover{background:var(--color-surface-sunken);color:var(--color-text-primary);}

/* Code and name cells are click-to-edit. Hover reveals the affordance. */
.coa-row .editable-cell{cursor:text;position:relative;}
.coa-row:hover .editable-cell{background:#FFFCF5;box-shadow:inset 0 -1px 0 #E8DEC8;}
.coa-row.locked-row:hover .editable-cell{background:#FDF5F5;box-shadow:inset 0 -1px 0 #EAB8B8;}
.coa-row.coa-editing .editable-cell{cursor:default;background:transparent;box-shadow:none;}

/* Inline editor states — single neutral treatment for rename / add-subtype / add-account */
.coa-row.coa-editing td{background:var(--color-surface-sunken);border-top:1px solid var(--color-border-strong);border-bottom:1px solid var(--color-border-strong);padding-top:11px;padding-bottom:11px;padding-right:14px;padding-left:14px;}
.coa-row.coa-editing.depth-1 td.code{padding-left:46px;}
.coa-row.coa-editing.depth-2 td.code{padding-left:62px;}
.coa-row.coa-editing td.code:first-child{border-left:2px solid var(--color-text-primary);}

.coa-editor-grid{display:flex;gap:10px;align-items:flex-start;}
.coa-editor-fld{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0;}
.coa-editor-fld.compact{flex:0 0 110px;}
.coa-editor-fld.medium{flex:0 0 200px;}
.coa-editor-lbl{font-size:9px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.04em;font-weight:500;}
.coa-editor-input{padding:5px 8px;font-size:11px;border:1px solid var(--color-border-strong);border-radius:var(--radius-sm);background:var(--color-surface-raised);color:var(--color-text-primary);outline:none;font-family:var(--font-sans);}
.coa-editor-input.mono{font-family:var(--font-mono);}
.coa-editor-input:focus{border-color:var(--color-text-primary);box-shadow:0 0 0 2px rgba(26,24,20,0.1);}
.coa-editor-input.locked{background:#E8E2D8;color:var(--color-text-tertiary);border-color:var(--color-border-strong);cursor:not-allowed;display:flex;align-items:center;gap:5px;}
.coa-editor-input.locked .small-lock{color:#A02020;font-size:9px;}
.coa-editor-actions{display:flex;gap:5px;align-items:center;align-self:flex-end;padding-bottom:1px;}
.coa-btn-save{font-size:11px;padding:5px 11px;border-radius:var(--radius-sm);background:var(--color-text-primary);color:var(--color-surface-raised);border:1px solid var(--color-text-primary);cursor:pointer;font-family:var(--font-sans);}
.coa-btn-cancel{font-size:11px;padding:5px 11px;border-radius:var(--radius-sm);background:transparent;color:var(--color-text-secondary);border:1px solid var(--color-border-strong);cursor:pointer;font-family:var(--font-sans);}
.coa-editor-help{font-size:9px;color:var(--color-text-secondary);font-style:italic;margin-top:5px;line-height:1.4;}
.coa-editor-help .strong{font-weight:500;color:var(--color-text-primary);font-style:normal;}
.coa-was{font-size:10px;color:var(--color-text-tertiary);font-style:italic;font-weight:400;margin-left:6px;}
.coa-reset-btn{font-size:10px;color:#534AB7;background:transparent;border:none;cursor:pointer;padding:0 4px;font-family:var(--font-sans);text-decoration:underline;margin-left:2px;}
.coa-reset-btn:hover{color:#26215C;}

.coa-legend{padding:11px 0;font-size:11px;color:var(--color-text-secondary);border-top:1px solid var(--color-border-default);display:flex;gap:18px;flex-wrap:wrap;align-items:center;}
.coa-legend-item{display:inline-flex;align-items:center;gap:5px;}

/* ── Type-level summary panel (above workspace table when a Type cluster is selected) ── */
.s2-typesum{border:1px solid var(--color-border-default);border-radius:var(--radius-md);background:var(--color-surface-raised);margin-bottom:14px;overflow:hidden;}
.s2-typesum-hdr{padding:9px 14px;background:var(--color-surface-sunken);border-bottom:1px solid var(--color-border-default);display:flex;justify-content:space-between;align-items:center;gap:10px;}
.s2-typesum-title{font-size:11px;font-weight:700;color:var(--color-text-primary);letter-spacing:.04em;text-transform:uppercase;}
.s2-typesum-sub{font-size:11px;color:var(--color-text-tertiary);font-weight:500;}
.s2-typesum-body{display:flex;align-items:flex-start;gap:14px;padding:12px 14px;}
.s2-typesum-side{flex:1;min-width:0;}
.s2-typesum-side-lbl{font-size:9px;font-weight:700;color:var(--color-text-tertiary);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.s2-typesum-arrow{font-size:18px;color:var(--color-text-tertiary);padding-top:24px;flex-shrink:0;}
.s2-typesum-pill{display:flex;align-items:center;gap:8px;padding:6px 10px;border:1px solid var(--color-border-default);border-radius:var(--radius-sm);margin-bottom:5px;background:var(--color-surface-raised);font-size:11px;}
.s2-typesum-pill.done{background:var(--color-success-surface);border-color:var(--color-success-border);}
.s2-typesum-pill-code{font-family:var(--font-mono);font-size:10px;color:var(--color-text-tertiary);font-weight:700;flex-shrink:0;width:48px;}
.s2-typesum-pill.done .s2-typesum-pill-code{color:var(--color-success-text);}
.s2-typesum-pill-name{flex:1;color:var(--color-text-primary);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.s2-typesum-pill-cnt{font-family:var(--font-mono);font-size:10px;color:var(--color-text-tertiary);font-weight:700;flex-shrink:0;}
.s2-typesum-pill.done .s2-typesum-pill-cnt{color:var(--color-success-text);}

/* ── Activity column cells (monthly view only) ── */
.s2-act-vol{font-size:12px;font-weight:700;color:var(--color-text-primary);font-family:var(--font-mono);}
.s2-act-txn{font-size:10px;color:var(--color-text-tertiary);font-weight:500;margin-top:1px;}

/* ── STAGE 3: TB / BS / P&L REVIEW ── */
.review-tabs{display:flex;gap:0;border-bottom:2px solid var(--color-border-default);margin:18px 0 16px;}
.rev-tab{padding:10px 18px;font-size:13px;font-weight:500;color:var(--color-text-tertiary);cursor:pointer;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;background:none;font-family:var(--font-sans);}
.rev-tab.active{color:var(--color-brand);border-bottom-color:var(--color-brand);font-weight:700;}
.rev-tab:hover:not(.active){color:var(--color-text-primary);}

.compare-table-wrap{border:1px solid var(--color-border-default);border-radius:var(--radius-md);overflow:hidden;background:var(--color-surface-raised);}
.compare-table{width:100%;border-collapse:collapse;font-size:12px;}
.compare-table th{text-align:left;font-size:10px;font-weight:600;color:var(--color-text-tertiary);letter-spacing:.06em;text-transform:uppercase;padding:10px 14px;border-bottom:1px solid var(--color-border-default);background:var(--color-surface-sunken);}
.compare-table th.num{text-align:right;}
.compare-table td{padding:9px 14px;border-bottom:1px solid var(--color-border-subtle);}
.compare-table tr:last-child td{border-bottom:none;}
.compare-table tr:hover td{background:var(--color-surface-sunken);}
.compare-table .acct{font-family:var(--font-mono);color:var(--color-text-tertiary);font-size:11px;}
.compare-table .acct-name{color:var(--color-text-primary);font-weight:500;}
.compare-table .num{text-align:right;font-family:var(--font-mono);}
.compare-table .legacy{color:var(--color-text-secondary);}
.compare-table .klay{color:var(--color-text-primary);font-weight:500;}
.compare-table .var-zero{color:var(--color-success-text);font-weight:600;}
.compare-table .var-pos{color:var(--color-warning-text);font-weight:600;}
.compare-table .var-neg{color:var(--color-danger-text);font-weight:600;}
.compare-table tr.section-row td{background:var(--color-surface-sunken);font-weight:700;color:var(--color-text-primary);font-size:11px;text-transform:uppercase;letter-spacing:.04em;}
.compare-table tr.subtotal-row td{font-weight:700;color:var(--color-text-primary);border-top:1px solid var(--color-border-default);background:var(--color-brand-wash);}
.compare-table tr.total-row td{font-weight:700;color:var(--color-text-primary);border-top:2px solid var(--color-border-default);background:var(--color-surface-sunken);}

.review-controls{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:12px;flex-wrap:wrap;}
.review-month-sel{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--color-text-secondary);}
.review-month-sel select{padding:6px 10px;border:1px solid var(--color-border-default);border-radius:var(--radius-sm);font-size:12px;font-family:var(--font-sans);background:var(--color-surface-raised);color:var(--color-text-primary);cursor:pointer;}
.review-summary{display:flex;gap:18px;font-size:12px;color:var(--color-text-secondary);}
.review-summary span strong{color:var(--color-text-primary);font-family:var(--font-mono);}

/* Variance drilldown row */
.var-row{padding:10px 14px;background:var(--color-warning-surface);border:1px solid var(--color-warning-border);border-radius:var(--radius-md);margin-top:10px;display:flex;justify-content:space-between;align-items:center;font-size:12px;}
.var-row-text{color:var(--color-text-primary);}
.var-row-text strong{font-weight:600;}

/* ── STAGE 3: 2-COLUMN SHELL (mirrors Stage 2 layout) ── */
.s3-shell{display:flex;gap:0;min-height:600px;border:1px solid var(--color-border-default);border-radius:var(--radius-lg);overflow:hidden;background:var(--color-surface-raised);margin-top:18px;}
.s3-main{flex:1;padding:18px 22px;overflow-y:auto;}

/* Tabs at the top of the main column */
.s3-tabs{display:flex;align-items:center;gap:0;border-bottom:2px solid var(--color-border-default);margin-bottom:16px;}
.s3-tab{padding:10px 18px;font-size:13px;font-weight:500;color:var(--color-text-tertiary);cursor:pointer;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;background:none;font-family:var(--font-sans);}
.s3-tab.active{color:var(--color-brand);border-bottom-color:var(--color-brand);font-weight:700;}
.s3-tab:hover:not(.active){color:var(--color-text-primary);}
.s3-period-lbl{margin-left:auto;font-size:11px;color:var(--color-text-tertiary);font-weight:500;padding-bottom:8px;}

/* Summary boxes */
.s3-summary{display:grid;grid-template-columns:1fr 1fr 1.2fr;gap:12px;margin-bottom:16px;}
.s3-sumbox{border:1px solid var(--color-border-default);border-radius:var(--radius-md);padding:14px 16px;background:var(--color-surface-raised);}
.s3-sumbox-lbl{font-size:10px;font-weight:700;color:var(--color-text-tertiary);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.s3-sumbox-val{font-size:22px;font-weight:700;color:var(--color-text-primary);font-family:var(--font-mono);line-height:1.1;margin-bottom:6px;}
.s3-sumbox-sub{font-size:11px;color:var(--color-text-tertiary);font-weight:500;line-height:1.4;}
.s3-sumbox-icon{display:inline-block;width:14px;height:14px;border-radius:50%;text-align:center;line-height:14px;font-size:9px;font-weight:700;margin-right:3px;vertical-align:1px;}
/* Variance box tone */
.s3-sumbox-ok{background:var(--color-success-surface);border-color:var(--color-success-border);}
.s3-sumbox-ok .s3-sumbox-val,.s3-sumbox-ok .s3-sumbox-lbl{color:var(--color-success-text);}
.s3-sumbox-ok .s3-sumbox-icon{background:var(--color-success-text);color:var(--color-text-inverse);}
.s3-sumbox-ok .s3-sumbox-sub{color:var(--color-success-text);}
.s3-sumbox-warn{background:var(--color-warning-surface);border-color:var(--color-warning-border);}
.s3-sumbox-warn .s3-sumbox-val,.s3-sumbox-warn .s3-sumbox-lbl{color:var(--color-warning-text);}
.s3-sumbox-warn .s3-sumbox-icon{background:var(--color-warning-text);color:var(--color-text-inverse);}
.s3-sumbox-warn .s3-sumbox-sub{color:var(--color-warning-text);}
.s3-sumbox-bad{background:var(--color-danger-surface);border-color:var(--color-danger-border);}
.s3-sumbox-bad .s3-sumbox-val,.s3-sumbox-bad .s3-sumbox-lbl{color:var(--color-danger-text);}
.s3-sumbox-bad .s3-sumbox-icon{background:var(--color-danger-text);color:var(--color-text-inverse);}
.s3-sumbox-bad .s3-sumbox-sub{color:var(--color-danger-text);}

/* Filter row */
.s3-filter-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:12px;}
.s3-filter-grp{display:flex;gap:6px;}
.s3-filter-help{font-size:11px;color:var(--color-text-tertiary);font-weight:300;}
.s3-filter-help strong{color:var(--color-text-secondary);font-weight:600;}

/* Variance row tint in compare table */
.compare-table tr.s3-var-row td{background:var(--color-warning-surface);}
.compare-table tr.s3-var-row:hover td{background:#FBE9C5;}

/* ── Section banner: shows Stage 1 upload reconciliation per section ── */
.compare-table tr.s3-secbanner > td{padding:0;border-bottom:1px solid var(--color-border-default);}
.s3-secbanner-row{display:flex;align-items:center;gap:18px;padding:10px 14px;background:var(--color-surface-sunken);}
.s3-secbanner-ok .s3-secbanner-row{background:var(--color-success-surface);border-left:3px solid var(--color-success-border);}
.s3-secbanner-warn .s3-secbanner-row{background:var(--color-warning-surface);border-left:3px solid var(--color-warning-border);}
.s3-secbanner-bad .s3-secbanner-row{background:var(--color-danger-surface);border-left:3px solid var(--color-danger-border);}
.s3-secbanner-label{font-size:11px;font-weight:700;color:var(--color-text-primary);letter-spacing:.06em;text-transform:uppercase;flex-shrink:0;min-width:140px;}
.s3-secbanner-pair{display:flex;align-items:center;gap:14px;flex:1;min-width:0;}
.s3-secbanner-side{display:flex;flex-direction:column;gap:2px;}
.s3-secbanner-side-lbl{font-size:9px;font-weight:600;color:var(--color-text-tertiary);letter-spacing:.06em;text-transform:uppercase;}
.s3-secbanner-side-val{font-family:var(--font-mono);font-size:13px;font-weight:700;color:var(--color-text-primary);}
.s3-secbanner-arrow{font-size:13px;color:var(--color-text-tertiary);}
.s3-secbanner-var{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:700;font-family:var(--font-mono);padding:4px 10px;border-radius:var(--radius-full);flex-shrink:0;}
.s3-secbanner-var.ok{background:var(--color-success-text);color:var(--color-text-inverse);}
.s3-secbanner-var.warn{background:var(--color-warning-text);color:var(--color-text-inverse);}
.s3-secbanner-var.bad{background:var(--color-danger-text);color:var(--color-text-inverse);}
.s3-secbanner-var-icon{display:inline-block;width:14px;height:14px;line-height:14px;text-align:center;font-size:10px;background:rgba(255,255,255,0.25);border-radius:50%;font-family:var(--font-sans);}

/* ── By-legacy view: grouping + target column styling ── */
.compare-table tr.s3-bylegacy-row td{padding:7px 10px;}
.compare-table tr.s3-bylegacy-row.group-cont td{padding-top:3px;padding-bottom:3px;border-top:none;}
.compare-table tr.s3-bylegacy-row.group-cont:not(:last-child) td{border-bottom-color:var(--color-border-subtle);}
.s3-bylegacy-target{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.s3-bylegacy-target-code{font-family:var(--font-mono);font-size:10px;color:var(--color-text-tertiary);font-weight:600;flex-shrink:0;}
.s3-bylegacy-target-name{color:var(--color-text-primary);font-weight:500;font-size:12px;}
.s3-bylegacy-target-cont{font-size:11px;color:var(--color-text-tertiary);font-style:italic;}

/* ── Pattern 1: View By toggle ── */
.s3-viewby{display:flex;align-items:center;gap:6px;}
.s3-viewby-lbl{font-size:11px;color:var(--color-text-tertiary);font-weight:500;margin-right:4px;}
.s3-help-row{font-size:11px;color:var(--color-text-tertiary);font-weight:300;background:var(--color-surface-sunken);padding:6px 10px;border-radius:var(--radius-sm);margin-bottom:10px;}
.s3-help-row strong{color:var(--color-text-secondary);font-weight:600;}

/* Expand chevron + contributor rows */
.s3-chev{text-align:center;padding:8px 4px !important;}
.s3-chev-btn{display:inline-block;width:18px;height:18px;line-height:18px;text-align:center;cursor:pointer;color:var(--color-text-tertiary);font-size:9px;border-radius:3px;user-select:none;}
.s3-chev-btn:hover{background:var(--color-surface-sunken);color:var(--color-text-primary);}
.s3-contrib-badge{display:inline-block;font-size:9px;font-weight:600;color:var(--color-text-tertiary);background:var(--color-surface-sunken);padding:1px 6px;border-radius:var(--radius-full);margin-left:6px;font-family:var(--font-sans);text-transform:uppercase;letter-spacing:.04em;}
.compare-table tr.s3-contrib-row td{background:#FBFAF6;color:var(--color-text-secondary);font-size:11px;padding:6px 10px;border-bottom:1px solid var(--color-border-subtle);}
.compare-table tr.s3-contrib-row.s3-contrib-var td{background:#FDF6EC;}
.s3-contrib-code{color:var(--color-text-tertiary) !important;font-size:10px !important;font-weight:500 !important;padding-left:36px !important;}
.s3-contrib-name{color:var(--color-text-secondary) !important;font-style:italic;font-weight:400 !important;}
.s3-contrib-note{display:inline-block;font-size:10px;color:var(--color-warning-text);background:var(--color-warning-surface);padding:1px 6px;border-radius:var(--radius-sm);margin-left:6px;font-style:normal;font-weight:500;}

/* Legacy-only section */
.compare-table tr.s3-legacy-only-hdr td{background:var(--color-surface-sunken);color:var(--color-text-secondary);font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:8px 10px;border-top:1px solid var(--color-border-default);}
.s3-legacy-only-tag{display:inline-block;font-size:10px;font-weight:500;color:var(--color-warning-text);background:var(--color-warning-surface);padding:1px 7px;border-radius:var(--radius-full);margin-left:8px;text-transform:none;letter-spacing:0;}
.compare-table tr.s3-legacy-only-row td{background:#FAFAF7;color:var(--color-text-secondary);font-size:11px;}
.s3-legacy-only-note{font-size:10px;color:var(--color-text-tertiary);font-weight:400;font-style:italic;margin-top:2px;line-height:1.3;}

/* ── Pattern 2: Side-by-side legacy view ── */
.s3-sbs{margin-top:6px;}
.s3-sbs-section{margin-bottom:18px;border:1px solid var(--color-border-default);border-radius:var(--radius-md);overflow:hidden;background:var(--color-surface-raised);}
.s3-sbs-section-hdr{background:var(--color-surface-sunken);padding:8px 14px;font-size:10px;font-weight:700;color:var(--color-text-secondary);letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--color-border-default);}
.s3-sbs-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.s3-sbs-pane{border-right:1px solid var(--color-border-default);}
.s3-sbs-pane:last-child{border-right:none;}
.s3-sbs-pane-hdr{padding:6px 12px;background:#FAFAF7;border-bottom:1px solid var(--color-border-subtle);display:flex;justify-content:space-between;font-size:10px;font-weight:600;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.04em;}
.s3-sbs-pane-meta{color:var(--color-text-tertiary);font-weight:500;text-transform:none;letter-spacing:0;font-size:10px;}
.s3-sbs-tbl{width:100%;border-collapse:collapse;}
.s3-sbs-tbl td{padding:7px 12px;font-size:11px;border-bottom:1px solid var(--color-border-subtle);}
.s3-sbs-tbl td.acct{font-family:var(--font-mono);color:var(--color-text-tertiary);font-size:10px;}
.s3-sbs-tbl td.acct-name{color:var(--color-text-primary);}
.s3-sbs-tbl td.num{text-align:right;font-family:var(--font-mono);color:var(--color-text-primary);}
.s3-sbs-row.legacy-only td{color:var(--color-text-tertiary);background:#FAFAF7;}
.s3-sbs-row.s3-var-row td{background:var(--color-warning-surface);}
.s3-sbs-mapto{font-size:10px;color:var(--color-text-tertiary);font-family:var(--font-mono);margin-top:2px;}
.s3-sbs-varnote{font-size:10px;color:var(--color-warning-text);font-weight:600;margin-top:2px;}
.s3-sbs-subtotal td{background:var(--color-surface-sunken);font-weight:700;color:var(--color-text-primary);font-size:12px;}
.s3-sbs-subvar{color:var(--color-warning-text);font-weight:600;font-size:10px;font-family:var(--font-mono);margin-left:6px;}

/* ── UAT / Sign-off card stubs ── */
.placeholder-card{border:1px solid var(--color-border-default);border-radius:var(--radius-lg);padding:30px;background:var(--color-surface-raised);text-align:center;margin-top:24px;}
.placeholder-title{font-size:18px;font-weight:700;color:var(--color-text-primary);margin-bottom:8px;}
.placeholder-sub{font-size:13px;color:var(--color-text-secondary);font-weight:300;line-height:1.6;max-width:500px;margin:0 auto 20px;}

/* ── PROGRESS BAR ── */
.prog-wrap{background:var(--color-border-default);border-radius:var(--radius-full);height:5px;margin:6px 0 4px;overflow:hidden;}
.prog-bar{height:5px;border-radius:var(--radius-full);transition:width .4s;background:var(--color-brand);}
.prog-bar.green{background:var(--color-success-text);}

/* ── DIMENSIONS — chips, popover, drawer, structure-overview strip ── */
.s2-dim-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:var(--radius-full);font-size:11px;font-weight:500;margin-right:4px;margin-bottom:3px;line-height:1.5;}
.s2-dim-chip-x{font-size:10px;cursor:pointer;opacity:0.6;padding:0 1px;}
.s2-dim-chip-x:hover{opacity:1;}
.s2-dim-empty{font-size:11px;color:var(--color-text-tertiary);font-style:italic;font-weight:300;}
.s2-dim-add-btn{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 7px;background:transparent;border:0.5px dashed var(--color-border-strong);border-radius:var(--radius-full);color:var(--color-text-secondary);cursor:pointer;font-family:var(--font-sans);font-weight:500;}
.s2-dim-add-btn:hover{background:var(--color-surface-sunken);border-color:var(--color-text-tertiary);color:var(--color-text-primary);}

/* Add-dimension popover */
.s2-dim-pop{display:inline-block;vertical-align:top;background:var(--color-surface-raised);border:1px solid var(--color-border-strong);border-radius:var(--radius-md);box-shadow:0 8px 24px rgba(0,0,0,0.12);padding:10px;min-width:280px;margin-top:4px;}
.s2-dim-pop-hdr{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;}
.s2-dim-pop-title{font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.04em;}
.s2-dim-pop-manage{font-size:10px;font-weight:500;background:transparent;border:none;color:var(--color-brand);cursor:pointer;padding:2px 4px;font-family:var(--font-sans);border-radius:var(--radius-sm);}
.s2-dim-pop-manage:hover{background:var(--color-brand-wash);color:var(--color-brand-deep);}
.s2-dim-pop-row{margin-bottom:8px;}
.s2-dim-pop-lbl{font-size:11px;color:var(--color-text-secondary);margin-bottom:3px;display:block;}
.s2-dim-pop-sel{width:100%;padding:5px 8px;font-size:11px;font-family:var(--font-sans);border:1px solid var(--color-border-default);border-radius:var(--radius-sm);background:var(--color-surface-raised);color:var(--color-text-primary);}
.s2-dim-pop-actions{display:flex;justify-content:flex-end;gap:6px;margin-top:8px;}
.s2-dim-pop-btn{padding:4px 10px;font-size:11px;font-weight:600;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-sans);border:1px solid var(--color-border-default);background:var(--color-surface-raised);color:var(--color-text-secondary);}
.s2-dim-pop-btn-pri{background:var(--color-brand);color:var(--color-text-inverse);border-color:var(--color-brand);}
.s2-dim-pop-btn-pri:hover{background:var(--color-brand-hover);}
.s2-dim-pop-btn:hover:not(.s2-dim-pop-btn-pri){background:var(--color-surface-sunken);}

/* Nav gear button (Settings entry point) */
.nav-gear{background:transparent;border:none;color:var(--color-text-secondary);cursor:pointer;padding:5px 6px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-family:var(--font-sans);}
.nav-gear:hover{color:var(--color-text-primary);background:var(--color-surface-sunken);}
.nav-gear.active{color:var(--color-brand);background:var(--color-brand-wash);}

/* ── SETTINGS PAGE ── */
.settings-shell{min-height:calc(100vh - 120px);background:var(--color-surface-raised);border:1px solid var(--color-border-default);border-radius:var(--radius-lg);overflow:hidden;display:flex;}
/* Sidebar — left section list, Stripe/Linear style */
.settings-sidebar{width:220px;flex-shrink:0;background:var(--color-surface-sunken);border-right:1px solid var(--color-border-default);padding:18px 8px;}
.settings-sidebar-hdr{font-size:11px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.07em;padding:0 12px;margin-bottom:8px;}
.settings-sidebar-section{padding:7px 12px;border-radius:var(--radius-sm);cursor:pointer;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--color-text-secondary);font-weight:500;margin-bottom:2px;transition:background var(--transition-base),color var(--transition-base);}
.settings-sidebar-section:hover{background:var(--color-border-subtle);color:var(--color-text-primary);}
.settings-sidebar-section.active{background:var(--color-surface-raised);color:var(--color-text-primary);box-shadow:inset 3px 0 0 var(--color-action);}
.settings-sidebar-icon{font-size:14px;width:16px;display:inline-flex;justify-content:center;color:var(--color-text-tertiary);}
.settings-sidebar-section.active .settings-sidebar-icon{color:var(--color-action);}
.settings-sidebar-divider{height:1px;background:var(--color-border-default);margin:10px 12px;}
.settings-sidebar-footer{margin-top:auto;padding:12px;font-size:11px;color:var(--color-text-tertiary);line-height:1.5;}

.settings-content{padding:24px 30px;overflow-y:auto;flex:1;min-width:0;}
.settings-topbar{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
.settings-back{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:5px 10px;background:transparent;border:1px solid var(--color-border-default);border-radius:var(--radius-md);color:var(--color-text-secondary);cursor:pointer;font-family:var(--font-sans);font-weight:500;}
.settings-back:hover{background:var(--color-surface-sunken);color:var(--color-text-primary);border-color:var(--color-text-tertiary);}
.settings-back-arrow{font-size:13px;line-height:1;}
.settings-crumb{font-size:12px;color:var(--color-text-tertiary);}
.settings-title{font-size:22px;font-weight:700;color:var(--color-text-primary);margin-top:8px;}
.settings-sub{font-size:13px;color:var(--color-text-secondary);font-weight:300;margin-top:4px;line-height:1.55;max-width:640px;}
.settings-prototype-note{margin-top:12px;padding:8px 12px;background:var(--color-action-wash);border:1px solid var(--color-action-subtle);border-radius:var(--radius-sm);font-size:11px;color:var(--color-action);font-weight:500;display:inline-block;}

/* Form patterns shared by Profile, Organization, Team forms */
.settings-section{margin-top:22px;padding:18px 20px;border:1px solid var(--color-border-default);border-radius:var(--radius-md);background:var(--color-surface-raised);}
.settings-section-hdr{font-size:14px;font-weight:600;color:var(--color-text-primary);margin-bottom:4px;}
.settings-section-sub{font-size:12px;color:var(--color-text-tertiary);font-weight:300;line-height:1.55;margin-bottom:14px;}
.settings-form-grid{display:grid;grid-template-columns:160px 1fr;gap:12px 18px;align-items:center;}
.settings-form-lbl{font-size:12px;font-weight:500;color:var(--color-text-secondary);}
.settings-form-val{font-size:13px;color:var(--color-text-primary);}
.settings-form-input{width:100%;padding:7px 10px;font-family:var(--font-sans);font-size:13px;color:var(--color-text-primary);background:var(--color-surface-raised);border:1px solid var(--color-border-default);border-radius:var(--radius-sm);outline:none;}
.settings-form-input:focus{border-color:var(--color-action);box-shadow:0 0 0 2px var(--color-action-wash);}
.settings-form-input:disabled{background:var(--color-surface-sunken);color:var(--color-text-tertiary);cursor:not-allowed;}
.settings-form-help{font-size:11px;color:var(--color-text-tertiary);font-weight:300;margin-top:3px;line-height:1.4;}
.settings-form-actions{margin-top:14px;display:flex;gap:8px;justify-content:flex-end;}
.settings-form-save{padding:7px 14px;font-size:12px;font-weight:600;background:var(--color-action);color:var(--color-text-inverse);border:none;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-sans);}
.settings-form-save:hover{background:var(--color-action-hover);}
.settings-form-cancel{padding:7px 14px;font-size:12px;font-weight:500;background:transparent;color:var(--color-text-secondary);border:1px solid var(--color-border-default);border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-sans);}

/* Profile-specific: big avatar circle */
.settings-profile-hero{display:flex;align-items:center;gap:16px;margin-top:22px;padding:18px 20px;border:1px solid var(--color-border-default);border-radius:var(--radius-md);background:var(--color-surface-raised);}
.settings-profile-avatar{width:64px;height:64px;border-radius:50%;background:var(--color-brand);color:var(--color-text-inverse);font-size:22px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.settings-profile-meta-name{font-size:17px;font-weight:600;color:var(--color-text-primary);}
.settings-profile-meta-role{font-size:12px;color:var(--color-text-tertiary);margin-top:2px;}
.settings-profile-meta-email{font-size:12px;color:var(--color-text-secondary);margin-top:6px;font-family:var(--font-mono);}
.settings-profile-photo-btn{margin-left:auto;padding:6px 12px;font-size:11px;font-weight:500;background:transparent;color:var(--color-text-secondary);border:1px solid var(--color-border-default);border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-sans);}
.settings-profile-photo-btn:hover{background:var(--color-surface-sunken);color:var(--color-text-primary);}

/* Team table */
.settings-team-tbl{width:100%;border-collapse:collapse;font-size:12.5px;}
.settings-team-tbl thead tr{border-bottom:1px solid var(--color-border-default);}
.settings-team-tbl th{text-align:left;padding:9px 8px;font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em;}
.settings-team-tbl th:first-child{padding-left:14px;}
.settings-team-tbl th.actions{text-align:right;padding-right:14px;}
.settings-team-tbl tbody tr{border-bottom:1px solid var(--color-border-subtle);}
.settings-team-tbl tbody tr:hover{background:var(--color-surface-sunken);}
.settings-team-tbl td{padding:10px 8px;vertical-align:middle;}
.settings-team-tbl td:first-child{padding-left:14px;}
.settings-team-tbl td.actions{text-align:right;padding-right:14px;}
.settings-team-avatar{display:inline-flex;align-items:center;gap:10px;}
.settings-team-avatar-img{width:30px;height:30px;border-radius:50%;background:var(--color-brand);color:var(--color-text-inverse);font-size:11px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
.settings-team-avatar-img.gray{background:var(--color-border-strong);color:var(--color-text-secondary);}
.settings-team-avatar-meta-name{font-size:13px;font-weight:500;color:var(--color-text-primary);}
.settings-team-avatar-meta-email{font-size:11px;color:var(--color-text-tertiary);font-family:var(--font-mono);}
.settings-team-role{font-size:11px;padding:3px 8px;border-radius:var(--radius-full);background:var(--color-surface-sunken);color:var(--color-text-secondary);border:1px solid var(--color-border-default);font-weight:500;}
.settings-team-role.owner{background:var(--color-brand-wash);color:var(--color-brand);border-color:var(--color-brand-subtle);}
.settings-team-status{font-size:11px;color:var(--color-text-tertiary);}
.settings-team-status.invited{color:var(--color-warning-text);font-style:italic;}
.settings-team-act{font-size:11px;padding:4px 8px;background:transparent;color:var(--color-text-secondary);border:1px solid var(--color-border-default);border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-sans);font-weight:500;}
.settings-team-act:hover{background:var(--color-surface-sunken);color:var(--color-text-primary);}
.settings-team-act.danger{color:var(--color-danger-text);border-color:var(--color-danger-border);}
.settings-team-act.danger:hover{background:var(--color-danger-surface);}
.settings-team-invite{margin-top:14px;padding:7px 14px;font-size:12px;font-weight:600;background:var(--color-action);color:var(--color-text-inverse);border:none;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-sans);}
.settings-team-invite:hover{background:var(--color-action-hover);}

/* Roles legend (below team table) */
.settings-roles-legend{margin-top:18px;}
.settings-roles-legend-item{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--color-border-subtle);font-size:12px;}
.settings-roles-legend-item:last-child{border-bottom:none;}
.settings-roles-legend-name{font-weight:600;color:var(--color-text-primary);min-width:110px;}
.settings-roles-legend-desc{color:var(--color-text-secondary);font-weight:300;line-height:1.5;}

/* Avatar dropdown menu (top-right) */
.avatar{cursor:pointer;}
.avatar-menu-wrap{position:relative;display:inline-block;}
.avatar-menu{position:absolute;top:36px;right:0;background:var(--color-surface-raised);border:1px solid var(--color-border-strong);border-radius:var(--radius-md);box-shadow:0 8px 20px rgba(0,0,0,0.10);min-width:230px;z-index:1000;padding:6px 0;}
.avatar-menu-hdr{padding:10px 14px 8px;border-bottom:1px solid var(--color-border-default);margin-bottom:4px;}
.avatar-menu-name{font-size:13px;font-weight:600;color:var(--color-text-primary);}
.avatar-menu-email{font-size:11px;color:var(--color-text-tertiary);font-family:var(--font-mono);margin-top:2px;}
.avatar-menu-item{padding:8px 14px;font-size:12.5px;color:var(--color-text-secondary);cursor:pointer;display:flex;align-items:center;gap:8px;}
.avatar-menu-item:hover{background:var(--color-surface-sunken);color:var(--color-text-primary);}
.avatar-menu-divider{height:1px;background:var(--color-border-default);margin:4px 0;}

/* ─── Settings → Help & support ──────────────────────────────────── */
.settings-help-priority{margin-top:22px;padding:16px 20px;background:linear-gradient(135deg,var(--color-action-wash) 0%,var(--color-surface-raised) 100%);border:1px solid var(--color-action-subtle);border-radius:var(--radius-md);}
.settings-help-priority-hdr{display:flex;gap:14px;align-items:flex-start;margin-bottom:12px;}
.settings-help-priority-icon{font-size:22px;color:var(--color-action);flex-shrink:0;line-height:1;}
.settings-help-priority-title{font-size:14px;font-weight:600;color:var(--color-text-primary);}
.settings-help-priority-sub{font-size:12px;color:var(--color-text-secondary);font-weight:300;line-height:1.5;margin-top:3px;}
.settings-help-priority-btn{padding:7px 14px;font-size:12px;font-weight:600;background:var(--color-action);color:var(--color-text-inverse);border:none;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-sans);}
.settings-help-priority-btn:hover{background:var(--color-action-hover);}

.settings-help-channels{display:flex;flex-direction:column;gap:10px;}
.settings-help-channel{display:flex;gap:14px;align-items:center;padding:14px;border:1px solid var(--color-border-default);border-radius:var(--radius-md);background:var(--color-surface-raised);}
.settings-help-channel:hover{border-color:var(--color-border-strong);}
.settings-help-channel-icon{font-size:20px;color:var(--color-text-tertiary);flex-shrink:0;width:32px;display:inline-flex;justify-content:center;}
.settings-help-channel-body{flex:1;min-width:0;}
.settings-help-channel-name{font-size:13px;font-weight:600;color:var(--color-text-primary);margin-bottom:2px;}
.settings-help-channel-desc{font-size:12px;color:var(--color-text-secondary);font-weight:300;line-height:1.5;}
.settings-help-channel-meta{font-size:11px;color:var(--color-text-tertiary);margin-top:4px;}
.settings-help-channel-btn{padding:6px 14px;font-size:12px;font-weight:600;background:transparent;color:var(--color-action);border:1px solid var(--color-action-subtle);border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-sans);flex-shrink:0;white-space:nowrap;}
.settings-help-channel-btn:hover{background:var(--color-action-wash);}

.settings-help-links{display:flex;flex-direction:column;gap:6px;}
.settings-help-link{display:flex;gap:12px;align-items:center;padding:10px 14px;text-decoration:none;color:inherit;border-radius:var(--radius-sm);transition:background var(--transition-base);}
.settings-help-link:hover{background:var(--color-surface-sunken);}
.settings-help-link-icon{font-size:16px;width:24px;display:inline-flex;justify-content:center;color:var(--color-text-tertiary);}
.settings-help-link-name{font-size:13px;font-weight:500;color:var(--color-text-primary);}
.settings-help-link-desc{font-size:11px;color:var(--color-text-tertiary);font-weight:300;margin-top:1px;}
.settings-help-link-ext{margin-left:auto;font-size:11px;color:var(--color-text-tertiary);}
.settings-help-link:hover .settings-help-link-ext{color:var(--color-action);}

/* Demo admin toggle (lives at the bottom of the Profile section as a prototype affordance) */
.settings-demo-toggle{margin-top:22px;padding:12px 16px;border:1px dashed var(--color-border-strong);border-radius:var(--radius-md);background:var(--color-surface-sunken);display:flex;align-items:center;justify-content:space-between;gap:12px;}
.settings-demo-toggle-body{font-size:12px;color:var(--color-text-secondary);line-height:1.5;}
.settings-demo-toggle-title{font-size:11px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;}
.settings-demo-toggle-btn{padding:5px 12px;font-size:11px;font-weight:600;background:var(--color-text-primary);color:var(--color-text-inverse);border:none;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-sans);}
.settings-demo-toggle-btn.off{background:var(--color-surface-raised);color:var(--color-text-secondary);border:1px solid var(--color-border-default);}

/* Reuse dimension card styling (originally drawer-only) */
.s2-dim-card{border:1px solid var(--color-border-default);border-radius:var(--radius-md);padding:14px 16px;margin-bottom:10px;background:var(--color-surface-raised);}
.s2-dim-card-hdr{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;}
.s2-dim-card-title{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--color-text-primary);}
.s2-dim-card-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.s2-dim-card-meta{font-size:11px;color:var(--color-text-tertiary);font-weight:300;margin-bottom:8px;}
.s2-dim-card-actions{display:flex;gap:6px;}
.s2-dim-card-act{font-size:11px;padding:3px 8px;background:transparent;border:1px solid var(--color-border-default);border-radius:var(--radius-sm);color:var(--color-text-secondary);cursor:pointer;font-family:var(--font-sans);}
.s2-dim-card-act:hover{background:var(--color-surface-sunken);color:var(--color-text-primary);}
.s2-dim-card-act-danger:hover{background:var(--color-danger-surface);color:var(--color-danger-text);border-color:var(--color-danger-border);}
.s2-dim-card-values{display:flex;flex-wrap:wrap;gap:4px;}
.s2-dim-val-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:var(--radius-full);font-size:11px;font-weight:500;line-height:1.5;}
.s2-dim-val-chip-x{font-size:10px;cursor:pointer;opacity:0.6;}
.s2-dim-val-chip-x:hover{opacity:1;}
.s2-dim-val-add{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 7px;background:transparent;border:0.5px dashed var(--color-border-strong);border-radius:var(--radius-full);color:var(--color-text-secondary);cursor:pointer;font-family:var(--font-sans);}
.s2-dim-val-add:hover{background:var(--color-surface-sunken);color:var(--color-text-primary);}
.s2-dim-add-card{width:100%;padding:10px;background:transparent;border:1px dashed var(--color-border-strong);border-radius:var(--radius-md);font-size:12px;color:var(--color-text-secondary);cursor:pointer;font-family:var(--font-sans);font-weight:500;display:flex;align-items:center;justify-content:center;gap:6px;}
.s2-dim-add-card:hover{background:var(--color-surface-sunken);color:var(--color-text-primary);border-color:var(--color-text-tertiary);}
.s2-dim-edit-row{display:flex;gap:6px;margin-bottom:8px;}
.s2-dim-edit-input{flex:1;padding:5px 8px;font-size:12px;font-family:var(--font-sans);border:1px solid var(--color-border-default);border-radius:var(--radius-sm);background:var(--color-surface-raised);color:var(--color-text-primary);}
.s2-dim-edit-input:focus{outline:none;border-color:var(--color-action);}

/* ── AI-recommended dimensions (cards row above the configured table) ── */
.s2-dim-rec-section{margin-top:22px;margin-bottom:28px;}
.s2-dim-rec-hdr{display:flex;align-items:baseline;gap:8px;margin-bottom:10px;}
.s2-dim-rec-icon{font-size:14px;color:#534AB7;}
.s2-dim-rec-title{font-size:12px;font-weight:600;color:var(--color-text-primary);text-transform:uppercase;letter-spacing:0.04em;}
.s2-dim-rec-sub{font-size:11px;color:var(--color-text-tertiary);font-weight:400;}
.s2-dim-rec-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));gap:10px;}
.s2-dim-rec-card{border:1px solid #AFA9EC;border-left:3px solid #534AB7;background:#F7F6FE;border-radius:var(--radius-md);padding:12px 14px;display:flex;flex-direction:column;gap:6px;}
.s2-dim-rec-card-hdr{display:flex;align-items:center;gap:6px;}
.s2-dim-rec-card-name{font-size:13px;font-weight:600;color:#26215C;}
.s2-dim-rec-card-reason{font-size:11px;color:#3C3489;font-weight:300;line-height:1.45;}
.s2-dim-rec-card-vals{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px;}
.s2-dim-rec-card-vals-empty{font-size:10px;color:var(--color-text-tertiary);font-style:italic;}
.s2-dim-rec-card-val{display:inline-flex;align-items:center;font-size:10px;padding:1px 7px;background:#fff;border:0.5px solid #AFA9EC;border-radius:var(--radius-full);color:#3C3489;font-weight:500;}
.s2-dim-rec-card-val-more{background:transparent;border-color:transparent;color:var(--color-text-tertiary);}
.s2-dim-rec-card-meta{font-size:10px;color:var(--color-text-tertiary);font-style:italic;margin-top:2px;}
.s2-dim-rec-card-actions{display:flex;gap:6px;margin-top:6px;}
.s2-dim-rec-card-btn{flex:1;font-size:11px;font-weight:500;padding:5px 10px;border-radius:var(--radius-sm);border:0.5px solid var(--color-border-default);background:transparent;color:var(--color-text-secondary);cursor:pointer;font-family:var(--font-sans);}
.s2-dim-rec-card-btn:hover{background:var(--color-surface-sunken);color:var(--color-text-primary);}
.s2-dim-rec-card-btn-pri{background:#534AB7;border-color:#534AB7;color:#fff;}
.s2-dim-rec-card-btn-pri:hover{background:#3C3489;border-color:#3C3489;color:#fff;}

/* ── Configured dimensions table ── */
.s2-dim-tbl-section{margin-top:8px;}
.s2-dim-tbl-hdr{display:flex;align-items:baseline;gap:6px;margin-bottom:10px;}
.s2-dim-tbl-title{font-size:12px;font-weight:600;color:var(--color-text-primary);text-transform:uppercase;letter-spacing:0.04em;}
.s2-dim-tbl-cnt{font-size:11px;color:var(--color-text-tertiary);font-weight:400;}
.s2-dim-tbl{width:100%;border-collapse:collapse;font-size:12px;border-top:1px solid var(--color-border-default);border-bottom:1px solid var(--color-border-default);}
.s2-dim-tbl th{text-align:left;font-size:9px;font-weight:700;color:var(--color-text-tertiary);letter-spacing:0.07em;text-transform:uppercase;padding:10px 12px;border-bottom:1px solid var(--color-border-default);background:transparent;}
.s2-dim-tbl td{padding:12px;border-bottom:1px solid var(--color-border-subtle);vertical-align:top;}
.s2-dim-tbl tr:last-child td{border-bottom:none;}
