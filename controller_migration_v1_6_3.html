/* ──────────────────────────────────────────────────────────
   CLUSTER DETECTION
   A cluster = the deepest-meaningful-grouping in the legacy tree.
   For PT. ABC's CoA, clusters are the parent nodes whose children are leaves
   (or whose grandchildren are leaves, recursively the deepest such grouping).

   We build clusters by walking S2_ACCOUNTS (which has parent links from the
   PT. ABC dataset). For accounts that don't have parent links (the synthesized
   non-CA sections), we synthesize lightweight clusters per FS placement.

   Each cluster object:
   {
     id:           unique key
     code:         legacy code (header) or synthesized
     name:         human-readable cluster name
     fs:           which FS section (bs-ca, bs-fa, bs-cl, pl-rev, pl-cogs, pl-opex)
     leafCount:    number of postable leaves under this cluster
     leafIndices:  array of indices into S2_ACCOUNTS for the leaves
     aiTargets:    array of suggested Klay codes (could be 1 = clean, 2+ = split)
     aiTargetCounts: {klayCode: leafCountThatMapsToIt}
     pattern:      'clean' | 'split' | 'review'
     reasoning:    string explaining the AI's suggestion (esp. for split/review)
   }
*/
function s2_detectClusters(){
  var clusters = [];

  // PT. ABC tree-based detection across all 5 sections.
  // For each header in the tree, walk recursively. A header IS a cluster if all its
  // direct kids are leaves (no header kids). Otherwise its header kids become clusters.
  var allFs = ['bs-ca', 'bs-fa', 'bs-cl', 'pl-rev', 'pl-cogs', 'pl-opex'];

  allFs.forEach(function(fs){
    var headers = S2_ACCOUNTS.filter(function(a){return a.fs === fs && a.isHeader;});
    var leaves  = S2_ACCOUNTS.filter(function(a){return a.fs === fs && !a.isHeader;});

    // 1. Headers whose direct kids are all leaves → these are clusters
    //    Headers with MIXED kids (some leaves, some sub-headers) → the direct-leaf
    //    children form a cluster (using the parent header as the cluster name);
    //    sub-headers themselves recursively become their own clusters.
    headers.forEach(function(h){
      var directKids = S2_ACCOUNTS.filter(function(a){return a.parent === h.old;});
      // Direct leaf children only
      var leavesInCluster = directKids.filter(function(k){return !k.isHeader;});
      if (leavesInCluster.length === 0) return; // no direct leaves — sub-headers will handle their own

      // Compute AI target consensus
      var targetCounts = {};
      leavesInCluster.forEach(function(l){
        targetCounts[l.newCode] = (targetCounts[l.newCode] || 0) + 1;
      });
      var targets = Object.keys(targetCounts);
      var pattern = 'clean';
      var reasoning = '';
      if (targets.length === 1) {
        var tk = S2_KLAY_BY_CODE[targets[0]];
        reasoning = leavesInCluster.length + ' account' + (leavesInCluster.length === 1 ? '' : 's') + ' map to ' + targets[0] + (tk ? ' · ' + tk.subSection : '') + '.';
      } else {
        pattern = 'split';
        var bits = targets.map(function(t){
          var subSec = (S2_KLAY_BY_CODE[t] || {}).subSection || '';
          return targetCounts[t] + ' → ' + t + ' ' + subSec;
        });
        reasoning = 'AI splits across ' + targets.length + ' Klay accounts: ' + bits.join('; ') + '.';
      }
      // Mark "review" if any leaves have low confidence
      var lowCount = leavesInCluster.filter(function(l){return l.conf === 'low';}).length;
      if (lowCount > 0 && pattern === 'clean') {
        pattern = 'review';
        reasoning = leavesInCluster.length + ' account' + (leavesInCluster.length === 1 ? '' : 's') + ' to ' + targets[0] + '; ' + lowCount + ' need review (low confidence).';
      } else if (lowCount > 0 && pattern === 'split') {
        reasoning += ' ' + lowCount + ' account' + (lowCount === 1 ? '' : 's') + ' need review.';
      }

      clusters.push({
        id: 'cl:' + h.old,
        code: h.old,
        name: h.oldName,
        fs: h.fs,
        leafCount: leavesInCluster.length,
        leafIndices: leavesInCluster.map(function(l){return S2_ACCOUNTS.indexOf(l);}),
        aiTargets: targets,
        aiTargetCounts: targetCounts,
        pattern: pattern,
        reasoning: reasoning,
      });
    });

    // 2. Top-level leaves with no header parent → 1-leaf clusters
    leaves.forEach(function(l){
      var idx = S2_ACCOUNTS.indexOf(l);
      var alreadyInCluster = clusters.some(function(c){return c.leafIndices.indexOf(idx) !== -1;});
      if (alreadyInCluster) return;
      if (!l.parent) {
        var pattern = (l.conf === 'low') ? 'review' : 'clean';
        var subSec = (S2_KLAY_BY_CODE[l.newCode] || {}).subSection || '';
        clusters.push({
          id: 'cl:leaf:' + l.old,
          code: l.old,
          name: l.oldName,
          fs: l.fs,
          leafCount: 1,
          leafIndices: [idx],
          aiTargets: [l.newCode],
          aiTargetCounts: (function(o){o[l.newCode] = 1; return o;})({}),
          pattern: pattern,
          reasoning: l.reason || ('Single-account group — maps to ' + l.newCode + ' · ' + subSec + '.'),
        });
      }
    });
  });

  return clusters;
}

var S2_CLUSTERS = s2_detectClusters();
var S2_CLUSTERS_BY_ID = {};
S2_CLUSTERS.forEach(function(c){ S2_CLUSTERS_BY_ID[c.id] = c; });

/* Cluster cascade: when user confirms a cluster mapping, propagate to all its leaves.
   - Sets each leaf to status='confirmed' (per Q3=b answer: cluster confirm cascades regardless of confidence)
   - User can still override individual leaves in Substep 3 (Account mapping)
*/
function s2_cascadeCluster(clusterId, action){
  var c = S2_CLUSTERS_BY_ID[clusterId];
  if (!c) return;
  if (action === 'confirm') {
    APP.s2.clusterMappings[clusterId] = {status:'confirmed', cascade:true};
    c.leafIndices.forEach(function(idx){
      S2_ACCOUNTS[idx].status = 'confirmed';
    });
  } else if (action === 'review') {
    APP.s2.clusterMappings[clusterId] = {status:'review', cascade:false};
    // Don't change leaf status — leaves stay unconfirmed for individual handling
  } else if (action === 'unconfirm') {
    delete APP.s2.clusterMappings[clusterId];
    c.leafIndices.forEach(function(idx){
      S2_ACCOUNTS[idx].status = 'unconfirmed';
    });
  }
}

/* Helper: get clusters for an FS section (used by Substep 2 cards) */
function s2_clustersForSection(fs){
  return S2_CLUSTERS.filter(function(c){return c.fs === fs;});
}

function s2_klayOptionsFor(typeKey){
  // Filter Klay catalog to entries of the same type that are MVP-available.
  return S2_KLAY.filter(function(k){
    if (k.type !== typeKey) return false;
    if (k.mvp === 'SCHEMA') return false; // hide deferred from dropdowns
    return true;
  });
}

/* Render a Klay-account <select> grouped by sub-section.
   Used by the workspace tables in both ALL view and monthly view.
   - Disabled when status === 'confirmed' (Mapped). To re-pick, controller uses
     "Change to Unmapped" in the kebab and starts over.
   - When newCode is null (no AI suggestion or after Change-to-Unmapped), shows
     a placeholder option until the controller picks one. */
function s2_renderKlayDropdown(account, origIdx){
  var typeKey = s2_typeOf(account);
  var options = s2_klayOptionsFor(typeKey);
  var hasMapping = !!account.newCode;
  // If there's a current mapping not in the type-filtered list, prepend it so
  // the dropdown can display it. Skip when newCode is null.
  if (hasMapping) {
    var currentInOptions = options.some(function(o){return o.code === account.newCode;});
    if (!currentInOptions) {
      options = [{code:account.newCode, name:account.newName, subSection:'(currently mapped)'}].concat(options);
    }
  }
  // Group by subSection
  var groups = {};
  var groupOrder = [];
  options.forEach(function(opt){
    var key = opt.subSection || 'Other';
    if (!groups[key]) { groups[key] = []; groupOrder.push(key); }
    groups[key].push(opt);
  });

  var html = '<select class="s2-klay-sel" onchange="s2_changeKlay(' + origIdx + ', this.value)"' + (account.status === 'confirmed' ? ' disabled' : '') + '>';
  // Placeholder option when there's no current mapping
  if (!hasMapping) {
    html += '<option value="" selected disabled>Pick a Klay account…</option>';
  }
  groupOrder.forEach(function(grp){
    html += '<optgroup label="' + grp + '">';
    groups[grp].forEach(function(opt){
      var sel = (opt.code === account.newCode) ? ' selected' : '';
      html += '<option value="' + opt.code + '"' + sel + '>' + opt.code + ' · ' + s2_klayDisplayName(opt.code, opt.name) + '</option>';
    });
    html += '</optgroup>';
  });
  html += '</select>';
  return html;
}

/* ── LEGACY CoA TREE (2-3 layers) ──
   Build a hierarchical tree from flat S2_ACCOUNTS by grouping on code prefix.
   Indonesian convention: 4-digit codes; we group by first digit (top), first 2 digits (mid), leaf.
   E.g., 1001 Kas Besar → Asset (1xxx) → Cash & Bank (10xx) → 1001 Kas Besar (leaf)
*/
var LEGACY_TOP_NAMES = {
  '1':{code:'1000', name:'ASET (Assets)'},
  '2':{code:'2000', name:'KEWAJIBAN (Liabilities)'},
  '3':{code:'3000', name:'EKUITAS (Equity)'},
  '4':{code:'4000', name:'PENDAPATAN (Revenue)'},
  '5':{code:'5000', name:'HARGA POKOK (Cost of Sales)'},
  '6':{code:'6000', name:'BEBAN OPERASIONAL (Operating Expenses)'},
  '7':{code:'7000', name:'BEBAN LAIN-LAIN (Other Expenses)'},
};
var LEGACY_MID_NAMES = {
  '10':'Kas dan Bank',     '11':'Piutang & Uang Muka', '12':'Persediaan',     '13':'Biaya Dibayar Dimuka',
  '14':'Pajak Dibayar Dimuka', '15':'Aset Tetap',     '16':'Aset Tidak Berwujud', '17':'Akumulasi Penyusutan',
  '18':'Aset Lain-Lain',   '19':'Investasi',
  '20':'Hutang Jangka Pendek', '21':'Hutang Pajak',   '22':'Hutang Gaji',     '23':'Hutang Lain-Lain',
  '24':'Pendapatan Diterima Dimuka', '25':'Hutang Bank Jangka Pendek',
  '30':'Modal Disetor',    '31':'Laba Ditahan',
  '40':'Penjualan',        '41':'Pendapatan Lain',    '42':'Diskon & Retur',
  '50':'HPP Bahan',        '51':'HPP Tenaga Kerja',   '52':'HPP Overhead',
  '60':'Beban Gaji & Tunjangan', '61':'Beban Sewa & Utilitas', '62':'Beban Operasional Kendaraan',
  '63':'Beban Pemeliharaan', '64':'Beban Pemasaran',  '65':'Beban Perjalanan & Training',
  '66':'Beban Profesional', '67':'Beban Administrasi & Pajak', '68':'Beban Asuransi',
  '70':'Beban Bunga',      '71':'Beban Lain-Lain',
};
function s2_buildLegacyTree(){
  // Returns: typeKey → [ {code, name, kind:'top', children:[ {code, name, kind:'mid', children:[ <leaves> ] } ]} ]
  var byType = {};
  S2_TYPES.forEach(function(t){ byType[t.key] = []; });

  S2_ACCOUNTS.forEach(function(a){
    var typeKey = s2_typeOf(a);
    if (!typeKey) return;
    var topDigit = a.old.charAt(0);
    var midPrefix = a.old.substring(0, 2);

    if (!byType[typeKey]) byType[typeKey] = [];
    var typeArr = byType[typeKey];

    // Find or create top
    var topName = LEGACY_TOP_NAMES[topDigit] || {code:topDigit + '000', name:'Group ' + topDigit};
    var top = typeArr.find(function(n){return n.code === topName.code;});
    if (!top) {
      top = {code:topName.code, name:topName.name, kind:'top', children:[]};
      typeArr.push(top);
    }
    // Find or create mid
    var midName = LEGACY_MID_NAMES[midPrefix] || ('Group ' + midPrefix);
    var midCode = midPrefix + '00';
    var mid = top.children.find(function(n){return n.code === midCode;});
    if (!mid) {
      mid = {code:midCode, name:midName, kind:'mid', children:[]};
      top.children.push(mid);
    }
    // Leaf
    mid.children.push({code:a.old, name:a.oldName, kind:'leaf', _ref:a});
  });

  // Sort children at each level
  Object.keys(byType).forEach(function(t){
    byType[t].sort(function(a,b){return a.code < b.code ? -1 : 1;});
    byType[t].forEach(function(top){
      top.children.sort(function(a,b){return a.code < b.code ? -1 : 1;});
      top.children.forEach(function(mid){
        mid.children.sort(function(a,b){return a.code < b.code ? -1 : 1;});
      });
    });
  });
  return byType;
}

/* ── KLAY CoA TREE (2-layer: Type → Sub-section → Leaf) ──
   Klay catalog grouped by Type, then by Sub-section. Reflects the real Klay structure
   from the Account Type Taxonomy doc (e.g. Current Assets → Cash & Cash Equivalents → Kas).
*/
function s2_buildKlayTree(){
  var byType = {};
  S2_TYPES.forEach(function(t){
    byType[t.key] = {code:t.key.toUpperCase(), name:t.name, children:[]};
  });
  // Group catalog entries by type → sub-section
  var subSectionsByType = {}; // type → {subSection: [{leaf}]}
  S2_KLAY.forEach(function(k){
    if (k.mvp === 'SCHEMA') return; // hide deferred from preview
    if (!byType[k.type]) return; // type not modeled in S2_TYPES (e.g. nonop, tax aren't BS-relevant)
    if (!subSectionsByType[k.type]) subSectionsByType[k.type] = {};
    var sub = subSectionsByType[k.type];
    if (!sub[k.subSection]) sub[k.subSection] = [];
    sub[k.subSection].push({code:k.code, name:k.name, kind:'leaf', _klay:k});
  });
  // Materialize: each Type gets sub-section nodes (kind:'mid'), each containing leaves
  Object.keys(subSectionsByType).forEach(function(t){
    var subs = subSectionsByType[t];
    Object.keys(subs).forEach(function(subName){
      var leaves = subs[subName].slice().sort(function(a,b){return a.code < b.code ? -1 : 1;});
      // Sub-section node code = first part of leaf codes (e.g., '1-11' for Cash & Cash Equivalents)
      var subCode = leaves[0] ? leaves[0].code.substring(0, leaves[0].code.indexOf('-') + 3) : '';
      byType[t].children.push({code:subCode, name:subName, kind:'mid', children:leaves});
    });
    byType[t].children.sort(function(a,b){return a.code < b.code ? -1 : 1;});
  });
  return byType;
}

var LEGACY_TREE = s2_buildLegacyTree();
var KLAY_TREE   = s2_buildKlayTree();

/* ── ACCOUNT ACTIVITY PER MONTH ──
   For each account that had activity in a month, record txn count + total volume in IDR.
   Synthesized so the monthly view feels real. Deterministic per (month, account).
*/
function s2_fmtRupiah(v){
  if (v >= 1_000_000_000) return 'Rp ' + (v / 1_000_000_000).toFixed(1) + 'B';
  if (v >= 1_000_000) return 'Rp ' + (v / 1_000_000).toFixed(0) + 'M';
  if (v >= 1_000) return 'Rp ' + (v / 1_000).toFixed(0) + 'K';
  return 'Rp ' + v.toLocaleString();
}

/* ═══════════════════════════════════════
   MAIN ENTRY — renders the unified 2-col layout (CoA browser + workspace)
═══════════════════════════════════════ */
function renderS2(){
  // Substep bar is hidden for Stage 2 — Account Mapping is a single flow.
  // Structure Overview is an intro screen before the workspace; Sign off is a
  // final action reached from the workspace bottom. Neither is a "step."
  var ssb = document.getElementById('substepbar');
  ssb.style.display = 'none';
  var substep = APP.s2.substep || 1;

  // Compute progress for the workspace substep nav indicator.
  // An account is "handled" if it's Mapped (confirmed) OR explicitly Marked for Later —
  // either way the Controller has acknowledged it, so sign-off is unblocked.
  var wsTotal = S2_ACCOUNTS.filter(function(a){return !a.isHeader;}).length;
  var wsDone = S2_ACCOUNTS.filter(function(a){return !a.isHeader && a.status === 'confirmed';}).length;
  var wsHandled = S2_ACCOUNTS.filter(function(a){return !a.isHeader && (a.status === 'confirmed' || a.status === 'later');}).length;
  var wsComplete = (wsHandled === wsTotal && wsTotal > 0);

  // "Review Klay CoA" overlay — invoked from the Workspace header, returns to substep 2.
  if (APP.s2.klayCoaView) {
    s2_renderKlayCoa();
    return;
  }

  // Workspace mode — dispatch to the appropriate substep renderer
  if (substep === 1) {
    s2_renderSubstep1();
  } else if (substep === 3) {
    s2_renderSignoff();
  } else {
    s2_renderSubstep3();
  }
}

function s2_openKlayCoa(){ APP.s2.klayCoaView = true; renderS2(); window.scrollTo(0, 0); }
function s2_closeKlayCoa(){ APP.s2.klayCoaView = false; renderS2(); window.scrollTo(0, 0); }
function s2_setSubstep(n){
  APP.s2.substep = n;
  APP.s2.klayCoaView = false;
  renderS2();
  window.scrollTo(0, 0);
}

/* Recursive render of a legacy CoA node (header or leaf) for orientation */
function s2_renderOrientLegacyNode(node, allInFs, depth){
  var html = '';
  if (node.isHeader) {
    html += '<div class="s2-orient-mid s2-orient-mid-d' + Math.min(depth, 2) + '">';
    html += '<span class="s2-orient-mid-code">' + node.old + '</span>';
    html += '<span class="s2-orient-mid-name">' + node.oldName + '</span>';
    html += '</div>';
    var children = allInFs.filter(function(a){return a.parent === node.old;});
    children.forEach(function(c){
      html += s2_renderOrientLegacyNode(c, allInFs, depth + 1);
    });
  } else {
    html += '<div class="s2-orient-leaf s2-orient-leaf-d' + Math.min(depth, 3) + '">';
    html += '<span class="s2-orient-leaf-code">' + node.old + '</span>';
    html += '<span class="s2-orient-leaf-name">' + node.oldName + '</span>';
    html += '</div>';
  }
  return html;
}

  html += '</div>';

  // Multi-color stacked progress bar
  html += '<div class="s2-prog2">';
  html += '<div class="s2-prog2-row">';
  html += '<span class="s2-prog2-num">' + mappedN + '</span>';
  html += '<span class="s2-prog2-tot">/ ' + total + ' accounts mapped</span>';
  html += '<span class="s2-prog2-pct">' + pct + '%</span>';
  html += '</div>';
  // Stacked bar — order: Mapped → Proposed → Unmapped → Later → Deactivated
  function pctOf(n){ return total > 0 ? (n / total * 100) : 0; }
  html += '<div class="s2-prog2-bar">';
  html += '<div class="s2-prog2-seg s2-prog2-seg-mapped" style="width:' + pctOf(mappedN) + '%"></div>';
  html += '<div class="s2-prog2-seg s2-prog2-seg-proposed" style="width:' + pctOf(proposedN) + '%"></div>';
  html += '<div class="s2-prog2-seg s2-prog2-seg-unmapped" style="width:' + pctOf(unmappedN) + '%"></div>';
  html += '<div class="s2-prog2-seg s2-prog2-seg-later" style="width:' + pctOf(laterN) + '%"></div>';
  html += '<div class="s2-prog2-seg s2-prog2-seg-deact" style="width:' + pctOf(deactN) + '%"></div>';
  html += '</div>';
  // Legend
  html += '<div class="s2-prog2-legend">';
  html += '<span class="s2-prog2-legend-item"><span class="s2-prog2-legend-dot" style="background:#1D9E75"></span>Mapped <span class="s2-prog2-legend-cnt">' + mappedN + '</span></span>';
  html += '<span class="s2-prog2-legend-item"><span class="s2-prog2-legend-dot" style="background:#7F77DD"></span>Proposed <span class="s2-prog2-legend-cnt">' + proposedN + '</span></span>';
  html += '<span class="s2-prog2-legend-item"><span class="s2-prog2-legend-dot" style="background:#D3D1C7"></span>Unmapped <span class="s2-prog2-legend-cnt">' + unmappedN + '</span></span>';
  html += '<span class="s2-prog2-legend-item"><span class="s2-prog2-legend-dot" style="background:#BA7517"></span>Marked for Later <span class="s2-prog2-legend-cnt">' + laterN + '</span></span>';
  html += '<span class="s2-prog2-legend-item"><span class="s2-prog2-legend-dot" style="background:#378ADD"></span>Deactivated <span class="s2-prog2-legend-cnt">' + deactN + '</span></span>';
  html += '</div>';
  html += '</div>';

  // Issues banner — surface CoA issue clusters at the top of the workspace
  html += s2_renderIssueBoxes();

  // Workspace (full-width)
  // Note: account-type cluster filtering is no longer driven by tabs; the user filters
  // via the Filter button (multi-select tree). activeCluster is now used only by s3_investigate
  // to pre-filter the workspace to a specific issue type.
  html += '<div class="s2-ws s2-ws-full">';
  html += s2_renderAccountWorkspace(APP.s2.activeCluster || 'all-accounts', APP.s2.wsFilter || 'all');
  html += '</div>';

  // Continue — blocks if anything is Unmapped or Proposed (strict sign-off rule).
  // Marked-for-Later and Deactivated are explicit acknowledgments and don't block.
  var canContinue = (unmappedN === 0 && proposedN === 0);
  html += '<div class="signoff-row">';
  if (!canContinue) {
    var bits = [];
    if (unmappedN > 0) bits.push(unmappedN + ' unmapped');
    if (proposedN > 0) bits.push(proposedN + ' proposed');
    html += '<span class="btn-signoff-help">' + bits.join(', ') + ' &mdash; resolve before sign-off (Confirm, Mark for Later, or Deactivate)</span>';
  }
  html += '<button class="btn-cont" ' + (canContinue ? '' : 'disabled') + ' onclick="s2_setSubstep(3)">Continue to Sign off &rsaquo;</button>';
  html += '</div>';

  document.getElementById('main').innerHTML = html;
}

/* ── SUBSTEP 3: Sign off ──
   Stage 2 mapping sign-off. The Controller certifies that every legacy account
   has been mapped, low/medium-confidence mappings were reviewed, and the
   resulting Klay structure is what they intend. Once signed off, advance to
   Stage 3 — GL Mapping to verify transaction lines, then Stage 4 — Review for
   the numbers reconciliation. */
function s2_renderSignoff(){
  var leaves    = S2_ACCOUNTS.filter(function(a){return !a.isHeader;});
  var total     = leaves.length;
  var confirmed = leaves.filter(function(a){return a.status === 'confirmed';}).length;
  var proposed  = leaves.filter(function(a){return a.status === 'proposed';}).length;
  var laterCount= leaves.filter(function(a){return a.status === 'later';}).length;
  var deactCount= leaves.filter(function(a){return a.status === 'deactivated';}).length;
  // Anything not in one of the four "handled" states is Unmapped.
  var unmapped  = total - confirmed - proposed - laterCount - deactCount;
  var taggedCount = leaves.filter(function(a){
    return a.dimensions && a.dimensions.length > 0;
  }).length;

  // Strict sign-off (per spec): every account must be Mapped, Marked for Later, or
  // Deactivated. Proposed mappings count as "AI-suggested but not signed off by the
  // controller" and block sign-off until they're confirmed (per-row, bulk, or by
  // editing the Klay target).
  var canSignoff = (unmapped === 0 && proposed === 0);
  var signedOff = !!APP.s2.signedOff;

  var html = '<h1 class="stage-title">Sign off</h1>'
    + '<p class="stage-sub">Confirm that the account mapping is complete and accurate. After sign-off, you\'ll move to Stage 3 — GL Mapping to verify how transactions land in your mapped accounts. You can come back to revise the mapping if needed.</p>';

  // Summary cards
  html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:20px;">';
  html += '<div style="border:1px solid var(--color-border-default);border-radius:var(--radius-md);padding:14px 16px;background:var(--color-surface-raised);">';
  html += '<div style="font-size:11px;color:var(--color-text-tertiary);font-weight:500;text-transform:uppercase;letter-spacing:0.04em;">Mapped</div>';
  html += '<div style="font-size:22px;font-weight:700;color:var(--color-text-primary);margin-top:4px;">' + confirmed + ' <span style="font-size:14px;color:var(--color-text-tertiary);font-weight:500;">/ ' + total + '</span></div>';
  // Sub-lines: proposed (purple) and later (amber)
  if (proposed > 0) {
    html += '<div style="font-size:11px;color:#534AB7;margin-top:3px;">' + proposed + ' proposed &middot; awaiting your confirmation</div>';
  }
  if (laterCount > 0) {
    html += '<div style="font-size:11px;color:var(--color-warning-text);margin-top:3px;">' + laterCount + ' marked for later</div>';
  }
  html += '</div>';
  html += '<div style="border:1px solid var(--color-border-default);border-radius:var(--radius-md);padding:14px 16px;background:var(--color-surface-raised);">';
  html += '<div style="font-size:11px;color:var(--color-text-tertiary);font-weight:500;text-transform:uppercase;letter-spacing:0.04em;">Tagged with dimensions</div>';
  html += '<div style="font-size:22px;font-weight:700;color:var(--color-text-primary);margin-top:4px;">' + taggedCount + ' <span style="font-size:14px;color:var(--color-text-tertiary);font-weight:500;">/ ' + total + '</span></div>';
  html += '<div style="font-size:11px;color:var(--color-text-tertiary);margin-top:3px;">' + S2_DIMENSIONS.length + ' dimension' + (S2_DIMENSIONS.length === 1 ? '' : 's') + ' configured &middot; optional</div>';
  html += '</div>';
  html += '<div style="border:1px solid var(--color-border-default);border-radius:var(--radius-md);padding:14px 16px;background:var(--color-surface-raised);">';
  html += '<div style="font-size:11px;color:var(--color-text-tertiary);font-weight:500;text-transform:uppercase;letter-spacing:0.04em;">Status</div>';
  if (signedOff) {
    html += '<div style="font-size:14px;font-weight:600;color:var(--color-success-text);margin-top:8px;">&#10003; Signed off</div>';
  } else if (canSignoff) {
    html += '<div style="font-size:14px;font-weight:600;color:var(--color-warning-text);margin-top:8px;">Ready to sign off</div>';
  } else {
    var blockerLines = [];
    if (unmapped > 0) blockerLines.push(unmapped + ' unmapped');
    if (proposed > 0) blockerLines.push(proposed + ' proposed');
    html += '<div style="font-size:14px;font-weight:600;color:var(--color-danger-text);margin-top:8px;">' + blockerLines.join(', ') + '</div>';
  }
  html += '</div>';
  html += '</div>';

  // Block alert if not all accounts handled
  if (!canSignoff) {
    var blockers = [];
    if (unmapped > 0) blockers.push('<strong>' + unmapped + '</strong> still unmapped');
    if (proposed > 0) blockers.push('<strong>' + proposed + '</strong> proposed by AI but not yet confirmed');
    var blockerText = blockers.join(' &middot; ');
    html += '<div class="alert" style="margin-top:18px;background:var(--color-danger-surface);border:1px solid var(--color-danger-border);color:var(--color-danger-text);border-radius:var(--radius-md);padding:14px 16px;display:flex;gap:12px;align-items:flex-start;">';
    html += '<div class="alert-icon" style="flex-shrink:0;width:18px;height:18px;border-radius:50%;background:var(--color-danger-text);color:var(--color-text-inverse);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;">!</div>';
    html += '<div class="alert-body" style="font-size:12px;line-height:1.5;">' + blockerText + '. Go back to the Workspace to resolve them — Confirm individual rows, use the bulk actions, or Mark for Later.</div>';
    html += '</div>';
  } else {
    html += '<div class="alert blue" style="margin-top:18px"><div class="alert-icon">i</div>'
      + '<div class="alert-body"><strong>Sign-off is reversible.</strong> If you spot an issue in Stage 3 — GL Mapping or Stage 4 — Review, you can come back here, undo, and edit the mapping.</div></div>';
  }

  // Certification statements
  var certs = [
    {t:'Every legacy account is handled', d:'All ' + total + ' legacy GL accounts have either been mapped to a Klay account, or explicitly marked for later.'},
    {t:'Mappings reflect intent', d:'Splits, merges, and renames produce the structure I want in Klay. Group-level mappings were reviewed before bulk-confirming.'},
    {t:'Dimension tags are accurate', d:'Where dimensions were applied, the values are correct. Untagged accounts will land without analytical tags — fine if not needed.'},
  ];

  html += '<div style="margin-top:20px">';
  certs.forEach(function(c, i){
    var checked = signedOff ? ' checked' : '';
    var disabled = (!canSignoff || signedOff) ? ' disabled' : '';
    html += '<div style="border:1px solid var(--color-border-default);border-radius:var(--radius-md);padding:14px 16px;margin-bottom:8px;background:var(--color-surface-raised);' + (signedOff ? 'opacity:0.7;' : '') + '">';
    html += '<label style="display:flex;align-items:flex-start;gap:12px;cursor:' + ((!canSignoff || signedOff) ? 'not-allowed' : 'pointer') + ';">';
    html += '<input type="checkbox" id="s2-cert-' + i + '"' + checked + disabled + ' onchange="s2_updateSignoffBtn()" style="margin-top:2px;cursor:inherit;" />';
    html += '<div><div style="font-size:13px;font-weight:600;color:var(--color-text-primary);">' + c.t + '</div><div style="font-size:11px;color:var(--color-text-secondary);font-weight:300;margin-top:3px;line-height:1.5;">' + c.d + '</div></div>';
    html += '</label></div>';
  });
  html += '</div>';

  // Action row
  html += '<div class="signoff-row">';
  html += '<button class="btn-ghost" onclick="s2_setSubstep(2)">&larr; Back to Account Mapping</button>';
  if (signedOff) {
    html += '<button class="btn-conf-secondary" onclick="s2_undoSignoff()" style="margin-left:auto;margin-right:8px;">Undo sign-off</button>';
    html += '<button class="btn-cont" onclick="jumpToStage(3)">Continue to Stage 3 — GL Mapping &rsaquo;</button>';
  } else {
    html += '<button id="s2-signoff-btn" class="btn-cont" disabled onclick="s2_doSignoff()" style="margin-left:auto;">Sign off mapping &rsaquo;</button>';
  }
  html += '</div>';

  document.getElementById('main').innerHTML = html;
}

function s2_updateSignoffBtn(){
  var btn = document.getElementById('s2-signoff-btn');
  if (!btn) return;
  var allChecked = true;
  for (var i = 0; i < 3; i++) {
    var cb = document.getElementById('s2-cert-' + i);
    if (!cb || !cb.checked) { allChecked = false; break; }
  }
  btn.disabled = !allChecked;
}

function s2_doSignoff(){
  APP.s2.signedOff = true;
  renderS2();
  window.scrollTo(0, 0);
}

function s2_undoSignoff(){
  APP.s2.signedOff = false;
  renderS2();
  window.scrollTo(0, 0);
}

/* ── KLAY COA PAGE (table view, single-pane) ──
   Replaces the prior side-by-side preview. Renders a single table of all Klay
   accounts grouped by Type → Subsection → Account (and child subtypes when
   applicable). Locked accounts (sysReserved) show a 🔒 icon and only allow
   the display name to change; unlocked accounts allow rename of code+name+type.
*/

/* Tier 1 (Hard-locked) account codes per the Account Type Taxonomy v3.0.
   These are the accounts the posting engine references by canonical_code —
   their code/type are immutable, only the display name can change. */
var S2_KLAY_TIER1 = {
  '1-1200':1, '1-1400':1, '1-1410':1, '1-1420':1, '1-1430':1,
  '2-1000':1, '2-2000':1, '2-2100':1, '2-2110':1, '2-2120':1,
  '2-2130':1, '2-2140':1, '2-2150':1, '2-2200':1, '2-2210':1,
  '2-2300':1, '3-2000':1, '3-3000':1
};
function s2_klayIsLocked(code){ return !!S2_KLAY_TIER1[code]; }

/* Section labels — derived from S2_TYPES key but using plain consumer-facing
   names (no "Section X — " prefix). Includes Section 9 (System) for the
   suspense / rounding accounts that don't fit into the standard 7 types. */
var S2_KLAY_SECTIONS = [
  {key:'ca',   name:'Assets — Current'},
  {key:'fa',   name:'Assets — Non-Current'},
  {key:'cl',   name:'Liabilities'},
  {key:'eq',   name:'Equity'},
  {key:'rev',  name:'Revenue'},
  {key:'cogs', name:'Cost of Goods Sold'},
  {key:'opex', name:'Operating Expenses'},
  {key:'sys',  name:'System'}
];

/* Map a S2_KLAY entry to its section. Most map by `type` directly; system
   accounts (codes starting with 9-) live in the System section. */
function s2_klaySection(account){
  if (account.code && account.code.charAt(0) === '9') return 'sys';
  return account.type;
}

/* Ad-hoc: which accounts qualify as "subtype children" — rendered at depth-2.
   Today this is hand-curated (prepaid children under root, accumulated depreciation
   under fixed assets). In production, parent_code would be a field on S2_KLAY. */
var S2_KLAY_DEPTH2_CODES = {
  '1-1510':1, '1-1520':1,
  '1-2200':1, '1-2210':1, '1-2220':1, '1-2230':1
};

/* UI state — held alongside klayRenameOpen so multiple in-flight edits
   compose cleanly. addingInSection: section key currently in add-mode.
   creatingSubtypeOf: parent code currently in subtype-creation mode. */
function s2_klayPageState(){
  if (!APP.s2._klayPage) APP.s2._klayPage = {
    addingInSection:null, creatingSubtypeOf:null, lockedOnly:false, search:''
  };
  return APP.s2._klayPage;
}

function s2_klayPage_startAddInSection(sectionKey){
  s2_klayPageState().addingInSection = sectionKey;
  s2_klayPageState().creatingSubtypeOf = null;
  APP.s2.klayRenameOpen = null;
  renderS2();
}
function s2_klayPage_startCreateSubtype(parentCode){
  s2_klayPageState().creatingSubtypeOf = parentCode;
  s2_klayPageState().addingInSection = null;
  APP.s2.klayRenameOpen = null;
  renderS2();
}
function s2_klayPage_cancelAdd(){
  s2_klayPageState().addingInSection = null;
  s2_klayPageState().creatingSubtypeOf = null;
  renderS2();
}
function s2_klayPage_toggleLockedOnly(){
  var st = s2_klayPageState();
  st.lockedOnly = !st.lockedOnly;
  renderS2();
}
function s2_klayPage_setSearch(v){
  s2_klayPageState().search = (v || '').toLowerCase();
  renderS2();
}

/* ── PAGE: Klay CoA ── */
/* Overlay wrapper — used when CoA is opened from Stage 2 (full-page, top-bar back nav).
   Writes to #main and includes the "Back to Account Mapping" top bar. */
function s2_renderKlayCoa(){
  var html = '<div class="s2-klaycoa-topbar">';
  html += '<button class="s2-klaycoa-back" onclick="s2_closeKlayCoa()"><span class="s2-klaycoa-back-arrow">&larr;</span> Back to Account Mapping</button>';
  html += '</div>';
  html += s2_renderKlayCoaBody({mode: 'overlay'});
  document.getElementById('main').innerHTML = html;
}

/* Body builder — returns the CoA header + tools + table + legend as HTML.
   Used by:
     - s2_renderKlayCoa (overlay mode — full-page experience from Stage 2)
     - renderSettingsKlayCoa (embedded mode — inside the Settings content pane)
   The `mode` flag swaps the header treatment: overlay uses the original .coa-page-h
   styling; embedded uses Settings' .settings-title / .settings-sub for visual
   consistency with the other Settings sections. */
function s2_renderKlayCoaBody(opts){
  opts = opts || {};
  var mode = opts.mode || 'overlay';
  var st = s2_klayPageState();

  // Page header
  var allAccts = S2_KLAY.filter(function(k){return k.mvp === 'IN';});
  var lockedCount = 0;
  allAccts.forEach(function(k){ if (s2_klayIsLocked(k.code)) lockedCount++; });
  var editableCount = allAccts.length - lockedCount;

  var html = '';
  if (mode === 'embedded') {
    /* Settings-native header — matches Profile / Organization / Team patterns */
    html += '<div class="settings-title">Klay Chart of Accounts</div>';
    html += '<div class="settings-sub">Review the default chart of accounts. Rename or recode any account, and add new accounts where you need them. Some tax and control accounts have a <span style="color:#A02020">&#128274;</span> &mdash; only their display name can change.</div>';
    /* Stats strip — same content as overlay\'s coa-page-meta but spaced like a Settings element */
    html += '<div class="coa-page-meta" style="margin-top:12px">';
    html += '<span class="stat"><span class="num">' + allAccts.length + '</span> accounts</span>';
    html += '<span class="stat"><span class="lock-mini">&#128274;</span><span class="num">' + lockedCount + '</span> locked</span>';
    html += '<span class="stat"><span class="num">' + editableCount + '</span> editable</span>';
    html += '</div>';
  } else {
    /* Original overlay header */
    html += '<div class="coa-page-h">';
    html += '<h1 class="coa-page-title">Klay Chart of Accounts</h1>';
    html += '<div class="coa-page-sub">Review the default chart of accounts. Rename or recode any account, and add new accounts where you need them. Some tax and control accounts have a <span style="color:#A02020">&#128274;</span> &mdash; only their display name can change.</div>';
    html += '<div class="coa-page-meta">';
    html += '<span class="stat"><span class="num">' + allAccts.length + '</span> accounts</span>';
    html += '<span class="stat"><span class="lock-mini">&#128274;</span><span class="num">' + lockedCount + '</span> locked</span>';
    html += '<span class="stat"><span class="num">' + editableCount + '</span> editable</span>';
    html += '</div>';
    html += '</div>';
  }

  // Tools row (search + lock toggle) — identical in both modes, but embedded mode
  // gets a top border + spacing since it lacks the overlay's .coa-page-h container above.
  var toolsExtra = (mode === 'embedded') ? ' style="margin-top:16px;border-top:1px solid var(--color-border-default);padding-top:14px"' : '';
  html += '<div class="coa-tools"' + toolsExtra + '>';
  html += '<input class="coa-search" placeholder="Search code or name…" value="' + (st.search || '').replace(/"/g, '&quot;') + '" oninput="s2_klayPage_setSearch(this.value)" />';
  html += '<span class="coa-spacer"></span>';
  html += '<span class="coa-lock-toggle' + (st.lockedOnly ? ' on' : '') + '" onclick="s2_klayPage_toggleLockedOnly()"><span class="check">' + (st.lockedOnly ? '&#10003;' : '') + '</span>Show only &#128274; locked</span>';
  html += '</div>';

  // Filter helper
  function passesFilter(k){
    if (st.lockedOnly && !s2_klayIsLocked(k.code)) return false;
    if (st.search) {
      var hay = (k.code + ' ' + s2_klayDisplayName(k.code, k.name)).toLowerCase();
      if (hay.indexOf(st.search) === -1) return false;
    }
    return true;
  }

  // Group accounts by section, then subSection, preserving order via S2_KLAY array order
  var bySection = {};
  S2_KLAY_SECTIONS.forEach(function(s){ bySection[s.key] = {subs:[], byCode:{}}; });
  S2_KLAY.forEach(function(k){
    if (k.mvp !== 'IN') return;
    var secKey = s2_klaySection(k);
    var sec = bySection[secKey];
    if (!sec) return;
    if (!sec.byCode[k.subSection]) {
      sec.byCode[k.subSection] = [];
      sec.subs.push(k.subSection);
    }
    sec.byCode[k.subSection].push(k);
  });

  // Table
  html += '<table class="coa-table">';
  html += '<thead><tr><th>Code</th><th>Account name</th><th></th><th></th></tr></thead>';
  html += '<tbody>';

  S2_KLAY_SECTIONS.forEach(function(sec){
    var bucket = bySection[sec.key];
    if (!bucket || bucket.subs.length === 0) return;

    var anyPass = false;
    bucket.subs.forEach(function(sub){ bucket.byCode[sub].forEach(function(k){ if (passesFilter(k)) anyPass = true; }); });
    if (!anyPass && st.addingInSection !== sec.key) return;

    html += '<tr class="coa-section-row"><td colspan="4">' + sec.name;
    html += '<button class="coa-add-section" onclick="s2_klayPage_startAddInSection(\'' + sec.key + '\')">+ Add account in ' + sec.name + '</button>';
    html += '</td></tr>';

    if (st.addingInSection === sec.key) {
      html += s2_klayPage_renderAddAccountRow(sec);
    }

    var multipleSubs = bucket.subs.length > 1;

    bucket.subs.forEach(function(sub){
      var accountsInSub = bucket.byCode[sub].filter(passesFilter);
      if (accountsInSub.length === 0) return;
      if (multipleSubs && sub) {
        html += '<tr class="coa-subsection-row"><td colspan="4">' + sub + '</td></tr>';
      }
      accountsInSub.forEach(function(k){
        if (APP.s2.klayRenameOpen === k.code) {
          html += s2_klayPage_renderEditorRow(k);
        } else {
          html += s2_klayPage_renderAccountRow(k);
        }
        if (st.creatingSubtypeOf === k.code) {
          html += s2_klayPage_renderSubtypeEditorRow(k);
        }
      });
    });
  });

  html += '</tbody></table>';

  // Legend
  html += '<div class="coa-legend">';
  html += '<span class="coa-legend-item"><span class="coa-lock-ico">&#128274;</span><span>locked &mdash; only the display name can change</span></span>';
  html += '<span class="coa-legend-item"><span class="coa-tag contra">CONTRA</span><span>contra-account, opposite normal balance</span></span>';
  html += '<span class="coa-legend-item"><span class="coa-tag ctrl">CTRL</span><span>control account, posts via subledger only</span></span>';
  html += '</div>';

  return html;
}

/* Settings wrapper — renders the CoA body inside the Settings content pane.
   Called by renderSettings() when active section is 'klay-coa'. */
function renderSettingsKlayCoa(){
  return s2_renderKlayCoaBody({mode: 'embedded'});
}

/* Render a default account row (not in editor mode) */
function s2_klayPage_renderAccountRow(k){
  var locked = s2_klayIsLocked(k.code);
  var depth = S2_KLAY_DEPTH2_CODES[k.code] ? 2 : 1;
  var classes = 'coa-row depth-' + depth;
  if (locked) classes += ' locked-row';

  var displayName = s2_klayDisplayName(k.code, k.name);
  var defaultName = k.name;
  var isOverridden = S2_KLAY_NAME_OVERRIDES[k.code] != null;

  var nameHtml = displayName;
  if (k.controlAcct) nameHtml += ' <span class="coa-tag ctrl">CTRL</span>';
  if (k.isContra) nameHtml += ' <span class="coa-tag contra">CONTRA</span>';
  if (isOverridden) {
    nameHtml += ' <span class="coa-was" title="Original: ' + defaultName.replace(/"/g, '&quot;') + '">was ' + defaultName + '</span>';
    nameHtml += ' <button class="coa-reset-btn" onclick="s2_klayRenameReset(\'' + k.code + '\');event.stopPropagation();" title="Reset to default name">reset</button>';
  }

  var html = '<tr class="' + classes + '">';
  html += '<td class="code editable-cell" onclick="s2_klayRenameStart(\'' + k.code + '\')">' + k.code + '</td>';
  html += '<td class="name editable-cell" onclick="s2_klayRenameStart(\'' + k.code + '\')">' + nameHtml + '</td>';
  html += '<td class="lock-col">';
  if (locked) html += '<span class="coa-lock-ico" title="Code is fixed by the system. Display name is editable.">&#128274;</span>';
  html += '</td>';
  html += '<td class="actions"><button class="coa-row-act" onclick="s2_klayRenameStart(\'' + k.code + '\')" title="Edit account">&#9998;</button></td>';
  html += '</tr>';
  return html;
}

/* Render the inline editor row for renaming an existing account.
   Locked accounts: name editable only. Unlocked: code + name + type editable.
   Tax parents (locked under section 2.2) can have subtypes added — the
   "Add subtype" button is exposed inside the editor for those rows. */
function s2_klayPage_renderEditorRow(k){
  var locked = s2_klayIsLocked(k.code);
  var depth = S2_KLAY_DEPTH2_CODES[k.code] ? 2 : 1;
  var classes = 'coa-row depth-' + depth + ' coa-editing';
  if (locked) classes += ' locked-row';

  var displayName = s2_klayDisplayName(k.code, k.name);
  var inputId = 's2-klay-rename-input-' + k.code;

  var html = '<tr class="' + classes + '">';

  // Column 1 — Code cell IS the code editor. Locked → read-only chip with 🔒.
  // Unlocked → disabled mono input (code editing wired in v1.7+).
  html += '<td class="code">';
  if (locked) {
    html += '<div class="coa-editor-input locked" style="padding:5px 8px;"><span class="small-lock">&#128274;</span><span style="font-family:var(--font-mono);font-size:11px;">' + k.code + '</span></div>';
  } else {
    html += '<input class="coa-editor-input mono" value="' + k.code + '" disabled title="Code editing is disabled in this prototype." style="width:100%;" />';
  }
  html += '</td>';

  // Columns 2–3 — Name editor (spans the name column and the lock column).
  // Helper line + Add-subtype affordance live underneath the input.
  html += '<td colspan="2">';
  html += '<input class="coa-editor-input" id="' + inputId + '" value="' + displayName.replace(/"/g, '&quot;') + '" onkeydown="s2_klayRenameKey(event, \'' + k.code + '\')" style="width:100%;" />';

  // Helper line — different wording for locked vs unlocked
  if (locked) {
    html += '<div class="coa-editor-help">Code is fixed by the system. Only the name can change. <span style="color:var(--color-text-tertiary)">(Press Enter to save &middot; Esc to cancel)</span></div>';
  } else {
    html += '<div class="coa-editor-help">Edit the account name. <span style="color:var(--color-text-tertiary)">(Press Enter to save &middot; Esc to cancel)</span></div>';
  }

  // Inline "+ Add subtype" affordance for locked tax parents (Section 2.2)
  // Only show on the locked rows under TAX_PAYABLE / TAX_RECEIVABLE subSections
  // where the user would plausibly want SPT-level granularity.
  if (locked && (k.subSection === 'Tax Payables' || k.subSection === 'Tax Receivables')) {
    html += '<div style="margin-top:6px;"><button class="coa-add-section" style="float:none;margin:0;" onclick="s2_klayPage_startCreateSubtype(\'' + k.code + '\')">+ Add subtype under this account</button></div>';
  }

  html += '</td>';

  // Column 4 — Save / Cancel
  html += '<td class="actions"><div class="coa-editor-actions">';
  html += '<button class="coa-btn-save" onclick="s2_klayRenameSave(\'' + k.code + '\')">Save</button>';
  html += '<button class="coa-btn-cancel" onclick="s2_klayRenameCancel()">Cancel</button>';
  html += '</div></td>';
  html += '</tr>';
  return html;
}

/* Render the inline subtype-creation row, appearing immediately under the
   parent. Code and name are user-supplied; parent + category are inherited.
   In this prototype, "Add" is acknowledged via an alert — wiring to the
   actual S2_KLAY array is left as a backend exercise. */
function s2_klayPage_renderSubtypeEditorRow(parent){
  // Suggest the next available code under this parent (parent+1 numerically)
  var suggestedCode = parent.code;
  var parts = parent.code.split('-');
  if (parts.length === 2) {

  var html = '<tr class="coa-row depth-2 coa-editing">';

  html += '<td colspan="2">';
  html += '<input class="coa-editor-input" placeholder="e.g. ' + parent.name + ' &mdash; [detail]" autofocus style="width:100%;" />';

  html += '</td>';
  html += '<td class="actions"><div class="coa-editor-actions">';
  html += '<button class="coa-btn-save" onclick="alert(\'Subtype creation is wired in v1.7+. UI flow demonstrated; persistence layer pending.\');s2_klayPage_cancelAdd();">Add</button>';
  html += '<button class="coa-btn-cancel" onclick="s2_klayPage_cancelAdd()">Cancel</button>';
  html += '</div></td>';
  html += '</tr>';
  return html;
}

/* Render the inline add-account row for a section. Suggests the next available
   code in that section's first subSection. Same scaffolding as subtype editor;
   adds an account-type dropdown since an unlocked top-level account requires
   the user to pick its type. */
function s2_klayPage_renderAddAccountRow(section){
  // Suggest next available code = max code in section + 100
  var sectionAccts = S2_KLAY.filter(function(k){return k.mvp === 'IN' && s2_klaySection(k) === section.key && k.code.indexOf('-') > -1;});
  var maxNum = 0;
  sectionAccts.forEach(function(k){
    var n = parseInt((k.code.split('-')[1] || ''), 10);
    if (!isNaN(n) && n > maxNum) maxNum = n;
  });
  // Round up to next 100-block
  var nextNum = Math.ceil((maxNum + 1) / 100) * 100;
  var prefix = '';
  switch (section.key) {
    case 'ca':   prefix = '1'; break;
    case 'fa':   prefix = '1'; break;
    case 'cl':   prefix = '2'; break;
    case 'eq':   prefix = '3'; break;
    case 'rev':  prefix = '4'; break;
    case 'cogs': prefix = '5'; break;
    case 'opex': prefix = '6'; break;
    default:     prefix = '9'; break;
  }
  var suggestedCode = prefix + '-' + nextNum;

  // Type options per section
  var typeOptions = {
    'ca':   ['Cash & Cash Equivalents','Trade Receivables','Other Receivables','Prepaid Expenses','Inventory','Other Current Assets'],
    'fa':   ['Fixed Asset','Accumulated Depreciation','Intangible Asset','Other Non-Current Asset'],
    'cl':   ['Trade Payable','Accrued Expense','Advance from Customer','Short-Term Loan','Other Current Liability'],
    'eq':   ['Paid-in Capital','Retained Earnings','Dividend','Other Equity'],
    'rev':  ['Sales — Goods','Sales — Services','Other Operating Revenue','Contra Revenue'],
    'cogs': ['COGS — Merchandise','COGS — Raw Material','COGS — Labor','COGS — Overhead','Purchase Return','Purchase Discount','COGS — Freight'],
    'opex': ['Personnel','Selling Expense','G&A Expense','Depreciation Expense','Other Operating Expense'],
    'sys':  ['Suspense','Rounding','Other System']
  }[section.key] || ['Other'];

  var html = '<tr class="coa-row depth-1 coa-editing">';
  html += '<td class="code"><input class="coa-editor-input mono" value="' + suggestedCode + '" style="width:100%;" /></td>';
  html += '<td colspan="2">';
  html += '<div class="coa-editor-grid">';
  html += '<div class="coa-editor-fld"><label class="coa-editor-lbl">Account name</label>';
  html += '<input class="coa-editor-input" placeholder="e.g. Pendapatan Konsinyasi" autofocus />';
  html += '</div>';
  html += '<div class="coa-editor-fld medium"><label class="coa-editor-lbl">Account type</label>';
  html += '<select class="coa-editor-input">';
  typeOptions.forEach(function(opt){ html += '<option>' + opt + '</option>'; });
  html += '</select>';
  html += '</div>';
  html += '</div>';
  html += '<div class="coa-editor-help">New account in ' + section.name + '. Suggested code <span class="strong">' + suggestedCode + '</span> is the next available &mdash; change if you want.</div>';
  html += '</td>';
  html += '<td class="actions"><div class="coa-editor-actions">';
  html += '<button class="coa-btn-save" onclick="alert(\'Account creation is wired in v1.7+. UI flow demonstrated; persistence layer pending.\');s2_klayPage_cancelAdd();">Add</button>';
  html += '<button class="coa-btn-cancel" onclick="s2_klayPage_cancelAdd()">Cancel</button>';
  html += '</div></td>';
  html += '</tr>';
  return html;
}

/* Rename a Klay account. Code stays immutable; only the display name changes.
   The override is applied globally — every row in the Workspace and reports
   that displays this Klay code will use the new name. */
function s2_klayRenameStart(code){
  APP.s2.klayRenameOpen = code;
  renderS2();
}
function s2_klayRenameCancel(){
  APP.s2.klayRenameOpen = null;
  renderS2();
}
function s2_klayRenameSave(code){
  var inp = document.getElementById('s2-klay-rename-input-' + code);
  if (!inp) { APP.s2.klayRenameOpen = null; renderS2(); return; }
  var newName = inp.value.trim();
  var k = S2_KLAY_BY_CODE[code];
  var defaultName = k ? k.name : '';
  if (!newName || newName === defaultName) {
    // Empty or same as default — drop any override and exit
    delete S2_KLAY_NAME_OVERRIDES[code];
  } else {
    S2_KLAY_NAME_OVERRIDES[code] = newName;
    // Cascade: update newName on every account already mapped to this code,
    // so the Workspace's Klay column reflects the rename without a full re-resolve.
    S2_ACCOUNTS.forEach(function(a){
      if (a.newCode === code) a.newName = newName;
    });
  }
  APP.s2.klayRenameOpen = null;
  renderS2();
}
function s2_klayRenameReset(code){
  delete S2_KLAY_NAME_OVERRIDES[code];
  // Restore the default name on every account mapped to this code
  var k = S2_KLAY_BY_CODE[code];
  var defaultName = k ? k.name : '';
  S2_ACCOUNTS.forEach(function(a){
    if (a.newCode === code) a.newName = defaultName;
  });
  renderS2();
}
function s2_klayRenameKey(ev, code){
  if (ev.key === 'Enter') { ev.preventDefault(); s2_klayRenameSave(code); }
  else if (ev.key === 'Escape') { ev.preventDefault(); s2_klayRenameCancel(); }
}

/* Helpers for preview tree counts */
function s2_subtreeLeafCount(node){
  if (node.kind === 'leaf') return 1;
  if (!node.children) return 0;
  return node.children.reduce(function(s, c){return s + s2_subtreeLeafCount(c);}, 0);
}
function s2_subtreeMappedCount(node){
  if (node.kind === 'leaf') return (node._ref && node._ref.status === 'confirmed') ? 1 : 0;
  if (!node.children) return 0;
  return node.children.reduce(function(s, c){return s + s2_subtreeMappedCount(c);}, 0);
}

/* ── Type-level mapping summary panel ──
   Compact lookup that shows, for the selected Account Type:
   - Legacy parents (mid-level, e.g. "Kas dan Bank", "Piutang & Uang Muka")
   - Klay parent (the Type itself, since Klay is 1-layer down)
   Each legacy parent is shown with its mapping target as a small flow.
*/
function s2_renderTypeSummary(typeKey){
  var t = S2_TYPES.find(function(x){return x.key === typeKey;});
  if (!t) return '';
  var typeRoots = LEGACY_TREE[typeKey] || [];
  // Collect mid-level parents across all top-level groups for this type
  var midParents = [];
  typeRoots.forEach(function(top){
    top.children.forEach(function(mid){
      midParents.push(mid);
    });
  });
  var klayBucket = KLAY_TREE[typeKey];
  var klayLeafCount = klayBucket ? klayBucket.children.length : 0;

  var html = '<div class="s2-typesum">';
  html += '<div class="s2-typesum-hdr">';
  html += '<span class="s2-typesum-title">Type-level structure</span>';
  html += '<span class="s2-typesum-sub">' + midParents.length + ' legacy sub-groups &rarr; ' + klayLeafCount + ' Klay accounts</span>';
  html += '</div>';
  html += '<div class="s2-typesum-body">';

  // LEFT: legacy mid-level parents
  html += '<div class="s2-typesum-side">';
  html += '<div class="s2-typesum-side-lbl">Legacy structure</div>';
  midParents.forEach(function(mid){
    var mappedN = s2_subtreeMappedCount(mid);
    var totalN = s2_subtreeLeafCount(mid);
    var done = totalN > 0 && mappedN === totalN;
    html += '<div class="s2-typesum-pill ' + (done ? 'done' : '') + '">';
    html += '<span class="s2-typesum-pill-code">' + mid.code + '</span>';
    html += '<span class="s2-typesum-pill-name">' + mid.name + '</span>';
    html += '<span class="s2-typesum-pill-cnt">' + mappedN + '/' + totalN + '</span>';
    html += '</div>';
  });
  html += '</div>';

  // CENTER: arrow
  html += '<div class="s2-typesum-arrow">&rarr;</div>';

  // RIGHT: Klay leaves under this type (1-layer down)
  html += '<div class="s2-typesum-side">';
  html += '<div class="s2-typesum-side-lbl">Klay structure</div>';
  if (klayBucket) {
    klayBucket.children.forEach(function(k){
      // count inbound confirmed
      var inb = S2_ACCOUNTS.filter(function(a){return a.newCode === k.code && a.status === 'confirmed';}).length;
      var hasInb = inb > 0;
      html += '<div class="s2-typesum-pill ' + (hasInb ? 'done' : '') + '">';
      html += '<span class="s2-typesum-pill-code">' + k.code + '</span>';
      html += '<span class="s2-typesum-pill-name">' + s2_klayDisplayName(k.code, k.name) + '</span>';
      if (hasInb) html += '<span class="s2-typesum-pill-cnt">' + inb + '</span>';
      html += '</div>';
    });
  }
  html += '</div>';

  html += '</div></div>';
  return html;
}

/* ── COLUMN 1: Cluster column (CoA browser) ── */
function s2_renderClusterCol(){

    else html += '<strong>' + confirmedN + '</strong> / ' + rows.length + ' confirmed';

/* Issue cluster boxes — surface CoA issue clusters as a 4-col grid above the table.
   Three tiers (hard/soft/warn) are visually distinguished by border color + icon.
   Each box has exactly one action: Filter (filters the table to affected accounts).
   Section is COLLAPSED by default (showing the first row of 4) with a "Show all N"
   toggle — the hard tier comes first, so the most urgent issues are always visible. */
function s2_renderIssueBoxes(){
  // Compute live counts per issue
  var counts = {};
  S2_ACCOUNTS.forEach(function(a){
    if (!a.issues) return;
    a.issues.forEach(function(k){ counts[k] = (counts[k] || 0) + 1; });
  });
  var liveIssues = S2_ISSUES.filter(function(iss){ return counts[iss.key] > 0; });
  if (liveIssues.length === 0) return '';

  // Sort: hard → soft → warn. Within a tier, preserve S2_ISSUES order.
  var tierRank = {hard:0, soft:1, warn:2};
  liveIssues.sort(function(a, b){
    var ra = tierRank[a.kind] != null ? tierRank[a.kind] : 9;
    var rb = tierRank[b.kind] != null ? tierRank[b.kind] : 9;
    return ra - rb;
  });

  // Icon per tier (HTML entity)
  var iconFor = {hard:'&#9940;' /* ⛔ */, soft:'&#9888;' /* ⚠ */, warn:'&#9432;' /* ⓘ */};

  // Collapse logic: by default show only the first row (4 boxes — first row of the
  // 4-col grid). The hard tier is always 4 entries when fully populated, so the
  // collapsed view is naturally "the hard blockers." Expanded view shows all.
  var COLLAPSED_COUNT = 4;
  var expanded = !!APP.s2.issuesExpanded;
  var hidden = liveIssues.length - COLLAPSED_COUNT;
  var canCollapse = liveIssues.length > COLLAPSED_COUNT;
  var visible = (canCollapse && !expanded) ? liveIssues.slice(0, COLLAPSED_COUNT) : liveIssues;

  var html = '<div class="s2-issboxes-section">';
  html += '<div class="s2-issboxes">';
  visible.forEach(function(iss){
    var n = counts[iss.key];
    var icon = iconFor[iss.kind] || '';
    html += '<div class="s2-issbox ' + iss.kind + '">';
    html += '<div class="s2-issbox-hd">';
    html += '<span class="s2-issbox-icon">' + icon + '</span>';
    html += '<div>';
    html += '<div class="s2-issbox-name">' + iss.name + '</div>';
    html += '<div class="s2-issbox-cnt">' + n + ' affected</div>';
    html += '</div>';
    html += '</div>';
    html += '<div class="s2-issbox-actions">';
    html += '<button class="s2-issbox-filter" onclick="s2_filterByIssue(\'' + iss.key + '\')">Filter</button>';
    html += '</div>';
    html += '</div>';
  });
  html += '</div>';
  // Toggle row — only render when there's something to expand/collapse
  if (canCollapse) {
    html += '<div class="s2-issboxes-toggle">';
    if (expanded) {
      html += '<button class="s2-issboxes-toggle-btn" onclick="s2_toggleIssuesExpanded()">&uarr; Show less</button>';
    } else {
      html += '<button class="s2-issboxes-toggle-btn" onclick="s2_toggleIssuesExpanded()">Show all ' + liveIssues.length + ' issues <span class="s2-issboxes-toggle-cnt">(' + hidden + ' more)</span></button>';
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function s2_toggleIssuesExpanded(){
  APP.s2.issuesExpanded = !APP.s2.issuesExpanded;
  renderApp();
}

function s2_filterByIssue(issueKey){
  // Clicking an issue box's Filter button (or an inline badge in a row) filters
  // the workspace table to that issue's affected accounts.
  APP.s2.activeCluster = issueKey;
  APP.s2.wsFilter = 'all';
  APP.s2.acctPage = 0;
  renderApp();
  // Scroll the table into view
  setTimeout(function(){
    var tblTop = document.querySelector('.s2-ws-tbl-wrap');
    if (tblTop) tblTop.scrollIntoView({behavior:'smooth', block:'start'});
  }, 50);
}

/* ── Legacy CoA hierarchy filter ──
   Multi-select tree. Node ids:
     'top:<digit>'    e.g. 'top:1' for ASET (Assets)
     'mid:<2digits>'  e.g. 'mid:11' for Piutang & Uang Muka
   When a parent node is checked, all its children become checked too. The
   parent state is purely derived: parent shows checked iff all its descendant
   leaves are in the filter (binary, no tri-state).
*/
function s2_buildLegacyHierarchy(){
  // Returns: [{id, name, code, count, kind:'top', children:[{id, name, code, count, kind:'mid', leaves:[acct]}]}]
  // Only includes types that actually have accounts.
  var byTop = {};
  S2_ACCOUNTS.forEach(function(a){
    if (a.isHeader) return;
    var top = (a.old || '').charAt(0);
    var mid = (a.old || '').substring(0, 2);
    if (!top || !mid) return;
    if (!byTop[top]) {
      var topInfo = LEGACY_TOP_NAMES[top] || {code:top + '000', name:'Group ' + top};
      byTop[top] = {id:'top:' + top, kind:'top', code:topInfo.code, name:topInfo.name, count:0, children:{}};
    }
    if (!byTop[top].children[mid]) {
      var midName = LEGACY_MID_NAMES[mid] || ('Group ' + mid);
      byTop[top].children[mid] = {id:'mid:' + mid, kind:'mid', code:mid + '00', name:midName, count:0, leaves:[]};
    }
    byTop[top].count++;
    byTop[top].children[mid].count++;
    byTop[top].children[mid].leaves.push(a);
  });
  // Materialize as sorted arrays
  var result = Object.keys(byTop).sort().map(function(k){
    var t = byTop[k];
    var midArr = Object.keys(t.children).sort().map(function(mk){return t.children[mk];});
    return {id:t.id, kind:t.kind, code:t.code, name:t.name, count:t.count, children:midArr};
  });
  return result;
}

function s2_accountsMatchingTypeFilter(filterIds){
  // Returns a set of account.old codes that match the current filter.
  // A node id of 'top:<digit>' matches all accounts with that first digit;
  // 'mid:<2digits>' matches all accounts whose first 2 digits match.
  var topPrefixes = filterIds.filter(function(id){return id.indexOf('top:') === 0;}).map(function(id){return id.substring(4);});
  var midPrefixes = filterIds.filter(function(id){return id.indexOf('mid:') === 0;}).map(function(id){return id.substring(4);});
  var matched = {};
  S2_ACCOUNTS.forEach(function(a){
    if (a.isHeader) return;
    var top = (a.old || '').charAt(0);
    var mid = (a.old || '').substring(0, 2);
    if (topPrefixes.indexOf(top) !== -1) { matched[a.old] = true; return; }
    if (midPrefixes.indexOf(mid) !== -1) { matched[a.old] = true; return; }
  });
  return matched;
}

/* Build the Klay-side hierarchy for the Klay Account filter.
   Two layers: Type group (Assets / Liabilities / Equity / Revenue / Expenses)
   → Sub-section (Cash & Equivalents / AR / Fixed Assets / etc.). Klay leaves
   are not exposed as their own filter level — too many to scan. */
function s2_buildKlayHierarchy(){
  // The S2_KLAY 'type' values are FS sections (ca, fa, cl, eq, rev, cogs, opex, nonop, tax).
  // Group them into broader categories for the controller.
  var typeGroups = [
    {id:'asset',     name:'Assets',      types:['ca', 'fa']},
    {id:'liability', name:'Liabilities', types:['cl']},
    {id:'equity',    name:'Equity',      types:['eq']},
    {id:'revenue',   name:'Revenue',     types:['rev']},
    {id:'expense',   name:'Expenses',    types:['cogs', 'opex', 'nonop', 'tax']},
  ];

  // Group Klay catalog by group → SubSection
  var byGroup = {};
  typeGroups.forEach(function(g){ byGroup[g.id] = {subs:{}, count:0}; });
  S2_KLAY.forEach(function(k){
    if (k.mvp === 'SCHEMA') return;
    var group = typeGroups.find(function(g){return g.types.indexOf(k.type) !== -1;});
    if (!group) return;
    var sub = k.subSection || '(other)';
    if (!byGroup[group.id].subs[sub]) byGroup[group.id].subs[sub] = {codes:[], count:0};
    byGroup[group.id].subs[sub].codes.push(k.code);
  });

  // Tally how many S2_ACCOUNTS map into each (group, sub)
  S2_ACCOUNTS.forEach(function(a){
    if (a.isHeader || !a.newCode) return;
    var k = S2_KLAY_BY_CODE[a.newCode];
    if (!k) return;
    var group = typeGroups.find(function(g){return g.types.indexOf(k.type) !== -1;});
    if (!group) return;
    var sub = k.subSection || '(other)';
    if (!byGroup[group.id].subs[sub]) return;
    byGroup[group.id].subs[sub].count++;
    byGroup[group.id].count++;
  });

  var result = [];
  typeGroups.forEach(function(g){
    var bucket = byGroup[g.id];
    if (!bucket || Object.keys(bucket.subs).length === 0) return;
    var subsArr = Object.keys(bucket.subs).sort().map(function(subKey){
      var sub = bucket.subs[subKey];
      return {
        id: 'klsub:' + g.id + ':' + subKey,
        kind: 'sub',
        code: '',
        name: subKey,
        count: sub.count,
        codes: sub.codes,
      };
    });
    result.push({
      id: 'kltop:' + g.id,
      kind: 'type',
      code: '',
      name: g.name,
      count: bucket.count,
      children: subsArr,
    });
  });
  return result;
}

/* Returns the set of Klay codes that match the current Klay filter selection.
   Selection of a 'kltop:<type>' node = all sub-sections under that type;
   selection of 'klsub:<type>:<sub>' = just that sub. Empty filter = no match
   constraint (caller handles that — don't filter when empty). */
function s2_klayCodesMatchingFilter(filterIds){
  var hier = s2_buildKlayHierarchy();
  var matchedCodes = {};
  filterIds.forEach(function(fid){
    if (fid.indexOf('kltop:') === 0) {
      var t = fid.substring(6);
      var top = hier.find(function(h){return h.id === fid;});
      if (top) top.children.forEach(function(sub){
        sub.codes.forEach(function(c){matchedCodes[c] = true;});
      });
    } else if (fid.indexOf('klsub:') === 0) {
      hier.forEach(function(top){
        var sub = top.children.find(function(s){return s.id === fid;});
        if (sub) sub.codes.forEach(function(c){matchedCodes[c] = true;});
      });
    }
  });
  return matchedCodes;
}

function s2_typeFilterChips(){
  // Returns the (up to 2) primary chips and a "+N more" chip when more selected.
  var ids = APP.s2.typeFilter || [];
  if (ids.length === 0) return [];
  var hier = s2_buildLegacyHierarchy();
  var byId = {};
  hier.forEach(function(t){
    byId[t.id] = {label:t.name, count:t.count, kind:'Type'};
    t.children.forEach(function(m){
      byId[m.id] = {label:m.name, count:m.count, kind:'Group'};
    });
  });
  return ids.map(function(id){
    var info = byId[id];
    return info ? {id:id, label:info.label, count:info.count, kind:info.kind} : null;
  }).filter(Boolean);
}

function s2_renderFilterToolbar(){

/* Combined chip list across all three filters. Each chip has: kind, label,
   removeJs (the inline onclick to remove just that chip). Order: Legacy first,
   then Klay, then More-filters (Confidence/Tier/Dimensions). */
function s2_allFilterChips(){
  var chips = [];
  // Legacy account chips (existing helper builds them)
  s2_typeFilterChips().forEach(function(c){
    chips.push({kind:c.kind, label:c.label, removeJs:'s2_removeTypeFilter(\'' + c.id + '\')'});
  });
  // Klay account chips
  var klayHier = s2_buildKlayHierarchy();
  (APP.s2.klayFilter || []).forEach(function(fid){
    var label = '';
    if (fid.indexOf('kltop:') === 0) {
      var top = klayHier.find(function(h){return h.id === fid;});
      if (top) label = top.name;
    } else if (fid.indexOf('klsub:') === 0) {
      klayHier.forEach(function(top){
        var sub = top.children.find(function(s){return s.id === fid;});
        if (sub) label = top.name + ' / ' + sub.name;
      });
    }
    if (label) chips.push({kind:'Klay', label:label, removeJs:'s2_removeKlayFilter(\'' + fid + '\')'});
  });
  // Confidence
  (APP.s2.confFilter || []).forEach(function(c){
    var lbl = c === 'high' ? 'High' : (c === 'med' ? 'Medium' : 'Low');
    chips.push({kind:'Confidence', label:lbl, removeJs:'s2_toggleConfFilter(\'' + c + '\')'});
  });
  // Tier
  (APP.s2.tierFilter || []).forEach(function(t){
    var lbl = t === 'hard' ? 'Hard block' : (t === 'soft' ? 'Soft' : 'Warning');
    chips.push({kind:'Tier', label:lbl, removeJs:'s2_toggleTierFilter(\'' + t + '\')'});
  });
  // Dimensions
  if (APP.s2.dimFilter) {
    var dlbl = APP.s2.dimFilter === 'with' ? 'Tagged' : 'Untagged';
    chips.push({kind:'Dimensions', label:dlbl, removeJs:'s2_setDimFilter(\'\')'});
  }
  return chips;
}

/* Used by the "+N more" chip-overflow button — opens whichever filter has the
   most non-shown chips, so clicking it reveals the most chips at once. */
function s2_openMostActiveFilter(){
  var counts = {
    legacy: (APP.s2.typeFilter || []).length,
    klay: (APP.s2.klayFilter || []).length,
    more: (APP.s2.confFilter || []).length + (APP.s2.tierFilter || []).length + (APP.s2.dimFilter ? 1 : 0),
  };
  // The two most chips are already visible, so drop them. Whichever pop has the
  // most remaining is the one to open.
  if (counts.more >= counts.legacy && counts.more >= counts.klay) s2_toggleMoreFilterPop();
  else if (counts.klay >= counts.legacy) s2_toggleKlayFilterPop();
  else s2_toggleFilterPop();
}

function s2_renderFilterTreeDropdown(){
  var hier = s2_buildLegacyHierarchy();
  var sel = APP.s2.typeFilter || [];
  var selSet = {};
  sel.forEach(function(id){selSet[id] = true;});
  var expanded = APP.s2.typeFilterExpanded || {};
  var searchQ = (APP.s2.typeFilterSearch || '').trim().toLowerCase();

  var html = '<div class="s2-ft-pop" onclick="event.stopPropagation()">';
  html += '<div class="s2-ft-pop-title">Filter by Legacy Account</div>';
  html += '<div class="s2-ft-pop-search">';
  html += '<span style="font-size:12px;color:var(--color-text-tertiary)">&#128269;</span>';
  html += '<input class="s2-ft-pop-search-input" type="text" placeholder="Search type or group…" value="' + searchQ.replace(/"/g, '&quot;') + '" oninput="s2_onTreeSearch(this.value)" />';
  html += '</div>';

  function nodeMatchesSearch(node){
    if (!searchQ) return true;
    if (node.name.toLowerCase().indexOf(searchQ) !== -1) return true;
    if (node.code.toLowerCase().indexOf(searchQ) !== -1) return true;
    if (node.children) return node.children.some(nodeMatchesSearch);
    return false;
  }

  html += '<div class="s2-ft-pop-tree">';
  hier.forEach(function(top){
    if (!nodeMatchesSearch(top)) return;
    var topExpanded = !!expanded[top.id] || !!searchQ;
    var topChecked = !!selSet[top.id];
    html += '<div class="s2-ft-tree-row' + (topChecked ? ' matched' : '') + '">';
    html += '<span class="s2-ft-tree-chev" onclick="s2_toggleTreeExpand(\'' + top.id + '\')">' + (topExpanded ? '&#9662;' : '&#9656;') + '</span>';
    html += '<input type="checkbox" class="s2-ft-tree-chk" ' + (topChecked ? 'checked' : '') + ' onchange="s2_toggleTreeNode(\'' + top.id + '\')" onclick="event.stopPropagation()" />';
    html += '<span class="s2-ft-tree-name top" onclick="s2_toggleTreeExpand(\'' + top.id + '\')">' + top.code + ' &middot; ' + top.name + '</span>';
    html += '<span class="s2-ft-tree-cnt">' + top.count + '</span>';
    html += '</div>';
    if (topExpanded) {
      top.children.forEach(function(mid){
        if (!nodeMatchesSearch(mid)) return;
        // Mid is checked if its own id is in filter, or its parent top is in filter
        var midChecked = !!selSet[mid.id] || topChecked;
        html += '<div class="s2-ft-tree-row' + (midChecked ? ' matched' : '') + '" style="padding-left:24px">';
        html += '<span class="s2-ft-tree-chev placeholder">&#9656;</span>';
        html += '<input type="checkbox" class="s2-ft-tree-chk" ' + (midChecked ? 'checked' : '') + (topChecked ? ' disabled' : '') + ' onchange="s2_toggleTreeNode(\'' + mid.id + '\')" onclick="event.stopPropagation()" />';
        html += '<span class="s2-ft-tree-name mid">' + mid.code + ' &middot; ' + mid.name + '</span>';
        html += '<span class="s2-ft-tree-cnt">' + mid.count + '</span>';
        html += '</div>';
      });
    }
  });
  html += '</div>';

  html += '<div class="s2-ft-pop-actions">';
  html += '<button class="s2-ft-pop-clear" onclick="s2_clearTypeFilter()" ' + (sel.length === 0 ? 'disabled' : '') + '>Clear all</button>';
  html += '<button class="s2-ft-pop-apply" onclick="s2_toggleFilterPop()">Done</button>';
  html += '</div>';

  html += '</div>';
  return html;
}

function s2_toggleFilterPop(){
  APP.s2.typeFilterOpen = !APP.s2.typeFilterOpen;
  if (APP.s2.typeFilterOpen) { APP.s2.klayFilterOpen = false; APP.s2.moreFilterOpen = false; }
  renderApp();
}

function s2_toggleTreeExpand(nodeId){
  if (!APP.s2.typeFilterExpanded) APP.s2.typeFilterExpanded = {};
  APP.s2.typeFilterExpanded[nodeId] = !APP.s2.typeFilterExpanded[nodeId];
  renderApp();
}

function s2_toggleTreeNode(nodeId){
  // Auto-cascade: checking a parent top adds it to filter (and supersedes any of its mids).
  // Checking/unchecking a mid only changes that mid (children inherit).
  var sel = APP.s2.typeFilter || [];
  var idx = sel.indexOf(nodeId);
  if (idx >= 0) {
    sel.splice(idx, 1);
  } else {
    sel.push(nodeId);
    // If this is a top-level node, remove any of its mid children that were individually selected
    if (nodeId.indexOf('top:') === 0) {
      var topPrefix = nodeId.substring(4);
      sel = sel.filter(function(id){
        if (id.indexOf('mid:') !== 0) return true;
        return id.substring(4).charAt(0) !== topPrefix;
      });
    }
  }
  APP.s2.typeFilter = sel;
  APP.s2.acctPage = 0;
  renderApp();
}

function s2_removeTypeFilter(nodeId){
  var sel = APP.s2.typeFilter || [];
  APP.s2.typeFilter = sel.filter(function(id){return id !== nodeId;});
  APP.s2.acctPage = 0;
  renderApp();
}

function s2_clearTypeFilter(){
  APP.s2.typeFilter = [];
  APP.s2.acctPage = 0;
  renderApp();
}

function s2_toggleKlayTreeExpand(nodeId){

  renderApp();
}
function s2_toggleKlayTreeNode(nodeId){
  // Same cascade semantics as the legacy filter: checking a top node de-checks
  // its children's individual selections (parent owns the selection).
  var sel = APP.s2.klayFilter || [];
  var idx = sel.indexOf(nodeId);
  if (idx === -1) {
    sel = sel.slice();
    sel.push(nodeId);
    // If this is a top node, drop any of its sub-section children from the selection
    if (nodeId.indexOf('kltop:') === 0) {
      var t = nodeId.substring(6);
      sel = sel.filter(function(id){return id.indexOf('klsub:' + t + ':') !== 0;});
    }
  } else {
    sel = sel.filter(function(id){return id !== nodeId;});
  }
  APP.s2.klayFilter = sel;
  APP.s2.acctPage = 0;
  renderApp();
}
function s2_removeKlayFilter(nodeId){
  var sel = APP.s2.klayFilter || [];
  APP.s2.klayFilter = sel.filter(function(id){return id !== nodeId;});
  APP.s2.acctPage = 0;
  renderApp();
}
function s2_clearKlayFilter(){
  APP.s2.klayFilter = [];
  APP.s2.acctPage = 0;

function s2_onKlayTreeSearch(q){
  APP.s2.klayFilterSearch = q;
  renderApp();
  setTimeout(function(){
    var inp = document.querySelectorAll('.s2-ft-pop-search-input');
    // Find the right one — the Klay pop has the second match if both are open;
    // safer to search by current open state
    if (APP.s2.klayFilterOpen && inp.length > 0) {
      var target = inp[inp.length - 1];
      target.focus();
      var v = target.value;
      target.setSelectionRange(v.length, v.length);
    }
  }, 0);
}

function s2_renderMoreFilterDropdown(){
  var conf = APP.s2.confFilter || [];
  var tier = APP.s2.tierFilter || [];
  var dim = APP.s2.dimFilter || '';

  // Live counts so the controller sees how many rows would survive each option
  var leaves = S2_ACCOUNTS.filter(function(a){return !a.isHeader;});
  var confCnt = {high:0, med:0, low:0};
  leaves.forEach(function(a){ if (a.conf && confCnt[a.conf] != null) confCnt[a.conf]++; });
  var tierCnt = {hard:0, soft:0, warn:0};
  leaves.forEach(function(a){
    if (!a.issues) return;
    var seenTiers = {};
    a.issues.forEach(function(k){
      var iss = S2_ISSUES.find(function(i){return i.key === k;});
      if (iss && !seenTiers[iss.kind]) { tierCnt[iss.kind]++; seenTiers[iss.kind] = true; }
    });
  });
  var withDim = leaves.filter(function(a){return a.dimensions && a.dimensions.length > 0;}).length;
  var withoutDim = leaves.length - withDim;

  var html = '<div class="s2-ft-pop s2-ft-pop-multi" onclick="event.stopPropagation()">';
  html += '<div class="s2-ft-pop-title">More filters</div>';

  // AI confidence
  html += '<div class="s2-ft-section">';
  html += '<div class="s2-ft-section-hdr">AI confidence</div>';
  ['high', 'med', 'low'].forEach(function(c){
    var checked = conf.indexOf(c) !== -1;
    var lbl = c === 'high' ? 'High' : (c === 'med' ? 'Medium' : 'Low');
    html += '<label class="s2-ft-chkrow">';
    html += '<input type="checkbox" ' + (checked ? 'checked' : '') + ' onchange="s2_toggleConfFilter(\'' + c + '\')" />';
    html += '<span class="s2-ft-chkrow-lbl">' + lbl + '</span>';
    html += '<span class="s2-ft-tree-cnt">' + confCnt[c] + '</span>';
    html += '</label>';
  });
  html += '</div>';

  // Issue tier
  html += '<div class="s2-ft-section">';
  html += '<div class="s2-ft-section-hdr">Issue tier</div>';
  [
    {key:'hard', lbl:'Hard block', icon:'&#9940;'},
    {key:'soft', lbl:'Soft',       icon:'&#9888;'},
    {key:'warn', lbl:'Warning',    icon:'&#9432;'},
  ].forEach(function(t){
    var checked = tier.indexOf(t.key) !== -1;
    html += '<label class="s2-ft-chkrow">';
    html += '<input type="checkbox" ' + (checked ? 'checked' : '') + ' onchange="s2_toggleTierFilter(\'' + t.key + '\')" />';
    html += '<span class="s2-ft-chkrow-lbl"><span class="s2-ft-tier-icon ' + t.key + '">' + t.icon + '</span> ' + t.lbl + '</span>';
    html += '<span class="s2-ft-tree-cnt">' + tierCnt[t.key] + '</span>';
    html += '</label>';
  });
  html += '</div>';

  // Dimensions
  html += '<div class="s2-ft-section">';
  html += '<div class="s2-ft-section-hdr">Dimensions</div>';
  html += '<label class="s2-ft-chkrow">';
  html += '<input type="radio" name="s2-dim-filter" ' + (dim === '' ? 'checked' : '') + ' onchange="s2_setDimFilter(\'\')" />';
  html += '<span class="s2-ft-chkrow-lbl">Any</span>';
  html += '<span class="s2-ft-tree-cnt">' + leaves.length + '</span>';
  html += '</label>';
  html += '<label class="s2-ft-chkrow">';
  html += '<input type="radio" name="s2-dim-filter" ' + (dim === 'with' ? 'checked' : '') + ' onchange="s2_setDimFilter(\'with\')" />';
  html += '<span class="s2-ft-chkrow-lbl">With dimensions</span>';
  html += '<span class="s2-ft-tree-cnt">' + withDim + '</span>';
  html += '</label>';
  html += '<label class="s2-ft-chkrow">';
  html += '<input type="radio" name="s2-dim-filter" ' + (dim === 'without' ? 'checked' : '') + ' onchange="s2_setDimFilter(\'without\')" />';
  html += '<span class="s2-ft-chkrow-lbl">Without dimensions</span>';
  html += '<span class="s2-ft-tree-cnt">' + withoutDim + '</span>';
  html += '</label>';
  html += '</div>';

  html += '<div class="s2-ft-pop-actions">';
  var hasAny = (conf.length || tier.length || dim);
  html += '<button class="s2-ft-pop-clear" onclick="s2_clearMoreFilters()" ' + (hasAny ? '' : 'disabled') + '>Clear all</button>';
  html += '<button class="s2-ft-pop-apply" onclick="s2_toggleMoreFilterPop()">Done</button>';
  html += '</div>';

  html += '</div>';
  return html;
}

function s2_toggleMoreFilterPop(){
  APP.s2.moreFilterOpen = !APP.s2.moreFilterOpen;
  if (APP.s2.moreFilterOpen) { APP.s2.typeFilterOpen = false; APP.s2.klayFilterOpen = false; }
  renderApp();
}
function s2_toggleConfFilter(c){
  var sel = APP.s2.confFilter || [];
  var idx = sel.indexOf(c);
  if (idx === -1) sel = sel.concat([c]);
  else sel = sel.filter(function(x){return x !== c;});
  APP.s2.confFilter = sel;
  APP.s2.acctPage = 0;
  renderApp();
}
function s2_toggleTierFilter(t){
  var sel = APP.s2.tierFilter || [];
  var idx = sel.indexOf(t);
  if (idx === -1) sel = sel.concat([t]);
  else sel = sel.filter(function(x){return x !== t;});
  APP.s2.tierFilter = sel;
  APP.s2.acctPage = 0;
  renderApp();
}
function s2_setDimFilter(v){
  APP.s2.dimFilter = v;
  APP.s2.acctPage = 0;
  renderApp();
}
function s2_clearMoreFilters(){
  APP.s2.confFilter = [];
  APP.s2.tierFilter = [];
  APP.s2.dimFilter = '';
  APP.s2.acctPage = 0;
  renderApp();
}

function s2_onTreeSearch(q){

  setTimeout(function(){

    if (inp) {
      inp.focus();
      var v = inp.value;
      inp.setSelectionRange(v.length, v.length);
    }
  }, 0);
}

function s2_onSearchInput(q){
  APP.s2.searchQ = q;
  APP.s2.acctPage = 0;
  renderApp();
  // Restore focus to the search input
  setTimeout(function(){
    var inp = document.querySelector('.s2-ft-search-input');
    if (inp) {
      inp.focus();
      var v = inp.value;
      inp.setSelectionRange(v.length, v.length);
    }

function s2_clearSearch(){

  APP.s2.acctPage = 0;
