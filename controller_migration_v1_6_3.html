}

/* Account-level workspace (ALL period) */
function s2_renderAccountWorkspace(clusterKey, filterMode){
  // Filter accounts by selected cluster
  var rows;
  var clusterName = '';
  var clusterSub = '';
  if (!clusterKey || clusterKey === 'all-accounts') {
    rows = S2_ACCOUNTS;
    clusterName = 'All accounts';
    clusterSub = 'Full Chart of Accounts (' + S2_ACCOUNTS.length + ' legacy accounts). Use Show: To review to focus on what still needs your attention.';
  } else if (clusterKey.indexOf('type:') === 0) {
    // Account-type cluster
    var typeKey = clusterKey.substring(5);
    var t = S2_TYPES.find(function(t){return t.key === typeKey;});
    rows = s2_accountsOfType(typeKey);
    clusterName = t ? t.name : '—';
    clusterSub = 'All ' + rows.length + ' legacy accounts classified as ' + (t ? t.name.toLowerCase() : '') + '. The Klay account dropdown is filtered to standardized accounts of the same type.';
  } else if (clusterKey === 'no-issue') {
    rows = S2_ACCOUNTS.filter(function(a){return !a.issues || a.issues.length === 0;});
    clusterName = 'Clean — ready to confirm';
    clusterSub = 'Accounts with no flagged issues. Bulk-confirm or review individually.';
  } else {
    var iss = S2_ISSUES.find(function(i){return i.key === clusterKey;});
    clusterName = iss ? iss.name : '—';
    clusterSub = iss ? (iss.kind === 'hard' ? 'Hard block — must resolve before sign-off.' : 'Soft block — you can resolve directly.') : '';
    rows = S2_ACCOUNTS.filter(function(a){return a.issues && a.issues.indexOf(clusterKey) !== -1;});
  }

  // Apply filter — exclude headers from count totals (they're structural, not mappable)
  var leafRows = rows.filter(function(a){return !a.isHeader;});

  // Apply tree-filter (legacy account hierarchy multi-select) BEFORE status filtering, so all
  // status counts reflect the same scope.
  var typeFilter = APP.s2.typeFilter || [];
  if (typeFilter.length > 0) {
    var matchedSet = s2_accountsMatchingTypeFilter(typeFilter);
    leafRows = leafRows.filter(function(a){return matchedSet[a.old];});
  }

  // Apply Klay-account filter (only when the controller hasn't filtered to Unmapped — the
  // button is disabled there, but a stale klayFilter selection from a previous view should
  // still respect the disabled state and not silently filter out everything).
  var klayFilter = APP.s2.klayFilter || [];
  var statusPillForKlay = APP.s2.wsFilter || 'all';
  if (klayFilter.length > 0 && statusPillForKlay !== 'unmapped') {
    var matchedKlayCodes = s2_klayCodesMatchingFilter(klayFilter);
    leafRows = leafRows.filter(function(a){
      return a.newCode && matchedKlayCodes[a.newCode];
    });
  }

  // Apply AI-confidence filter
  var confFilter = APP.s2.confFilter || [];
  if (confFilter.length > 0) {
    leafRows = leafRows.filter(function(a){return confFilter.indexOf(a.conf) !== -1;});
  }

  // Apply issue-tier filter (any account that carries at least one issue of the
  // selected tier matches)
  var tierFilter = APP.s2.tierFilter || [];
  if (tierFilter.length > 0) {
    leafRows = leafRows.filter(function(a){
      if (!a.issues || a.issues.length === 0) return false;
      return a.issues.some(function(k){
        var iss = S2_ISSUES.find(function(i){return i.key === k;});
        return iss && tierFilter.indexOf(iss.kind) !== -1;
      });
    });
  }

  // Apply dimensions filter
  var dimFilter = APP.s2.dimFilter || '';
  if (dimFilter === 'with') {
    leafRows = leafRows.filter(function(a){return a.dimensions && a.dimensions.length > 0;});
  } else if (dimFilter === 'without') {
    leafRows = leafRows.filter(function(a){return !a.dimensions || a.dimensions.length === 0;});
  }

  // Apply search filter (legacy code or name)
  var searchQ = (APP.s2.searchQ || '').trim().toLowerCase();
  if (searchQ) {
    leafRows = leafRows.filter(function(a){
      return (a.old || '').toLowerCase().indexOf(searchQ) !== -1
          || (a.oldName || '').toLowerCase().indexOf(searchQ) !== -1;
    });
  }

  var unmappedRows = leafRows.filter(function(a){return a.status === 'unconfirmed';});
  var proposedRows = leafRows.filter(function(a){return a.status === 'proposed';});
  var mappedRows   = leafRows.filter(function(a){return a.status === 'confirmed';});
  var laterRows    = leafRows.filter(function(a){return a.status === 'later';});
  var deactRows    = leafRows.filter(function(a){return a.status === 'deactivated';});

  var displayRows;
  if (filterMode === 'unmapped')         displayRows = unmappedRows;
  else if (filterMode === 'proposed')    displayRows = proposedRows;
  else if (filterMode === 'mapped')      displayRows = mappedRows;
  else if (filterMode === 'later')       displayRows = laterRows;
  else if (filterMode === 'deactivated') displayRows = deactRows;
  else {
    // 'all' mode: leafRows already reflects tree-filter and search
    displayRows = leafRows;
  }

  // ── New header: cluster context (only if filtered to issue cluster), then tabs, then toolbar ──
  var html = '';

  // If we're filtered to an issue cluster (e.g. via "Review list" from a banner), show context
  if (clusterKey && clusterKey !== 'all-accounts' && S2_ISSUES.some(function(i){return i.key === clusterKey;})) {
    html += '<div class="s2-ws-hdr">';
    html += '<div><div class="s2-ws-title">' + clusterName + '</div><div class="s2-ws-sub">' + clusterSub + '</div></div>';
    html += '<button class="s2-ws-filt-btn" onclick="s2_setCluster(\'all-accounts\')">&times; Clear issue filter</button>';
    html += '</div>';
  }

  // Informational banner — shown when there are Proposed rows in the current session.
  // Dismissable via the × button (session-scoped: stays dismissed until reload).
  // Per-row Confirm and dropdown re-pick are how the controller actually progresses;
  // a "Confirm all" bulk action would mean rubber-stamping the AI, which defeats the
  // point of strict sign-off.
  var totalProposed = S2_ACCOUNTS.filter(function(a){return !a.isHeader && a.status === 'proposed';}).length;
  if (totalProposed > 0 && !APP.s2.proposedBannerDismissed) {
    html += '<div class="s2-bulkbar">';
    html += '<div class="s2-bulkbar-icon">&#10024;</div>';
    html += '<div class="s2-bulkbar-msg">';
    html += '<div class="s2-bulkbar-title">' + totalProposed + ' AI-proposed mapping' + (totalProposed === 1 ? '' : 's') + ' awaiting your confirmation</div>';
    html += '<div class="s2-bulkbar-sub">Click <strong>Confirm</strong> on each row to accept the suggestion, or pick a different target from the dropdown — that also confirms it. Sign-off is blocked until every Proposed row is resolved.</div>';
    html += '</div>';
    html += '<button class="s2-bulkbar-close" onclick="s2_dismissProposedBanner()" aria-label="Dismiss">&times;</button>';
    html += '</div>';
  }

  // Status filter pills (replaces old underline tabs)
  html += '<div class="s2-pills">';
  function pill(key, label, count){
    var on = (filterMode === key);
    html += '<button class="s2-pill' + (on ? ' on' : '') + '" onclick="s2_setWsFilter(\'' + key + '\')">' + label + ' <span class="s2-pill-cnt">' + count + '</span></button>';
  }
  pill('all',         'All',              leafRows.length);
  pill('unmapped',    'Unmapped',         unmappedRows.length);
  pill('proposed',    'Proposed',         proposedRows.length);
  pill('mapped',      'Mapped',           mappedRows.length);
  pill('later',       'Marked for Later', laterRows.length);
  pill('deactivated', 'Deactivated',      deactRows.length);
  html += '</div>';

  // Filter toolbar: filter button + chips + search
  html += s2_renderFilterToolbar();

  // Table — edge-to-edge, no card wrapper
  if (filterMode === 'unmapped' && unmappedRows.length > 0) {
    html += '<div class="s2-ws-tbl-banner" style="border-radius:0;background:transparent;border:none;padding:8px 0;color:var(--color-text-secondary);font-size:11px;font-weight:400;text-transform:none;letter-spacing:0;">&#8226; ' + unmappedRows.length + ' account' + (unmappedRows.length === 1 ? '' : 's') + ' still unmapped &mdash; pick a Klay account from the dropdown to map, or use the row menu to defer or deactivate.</div>';
  }
  html += '<table class="s2-ws-tbl s2-ws-tbl-flat">';
  html += '<thead><tr>'
    + '<th style="width:30px"><input type="checkbox"/></th>'
    + '<th style="width:200px">Legacy account</th>'
    + '<th style="width:220px">Klay account <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--color-text-disabled)">· AI-suggested, editable</span></th>'
    + '<th>Dimensions</th>'
    + '<th style="width:100px">State</th>'
    + '<th style="text-align:right;width:130px">Action</th>'
    + '</tr></thead><tbody>';

  // Pagination — keep the page snappy when displaying 300+ rows
  var pageSize = 60;
  var page = APP.s2.acctPage || 0;
  var maxPage = Math.max(0, Math.ceil(displayRows.length / pageSize) - 1);
  if (page > maxPage) page = maxPage;
  var pageRows = displayRows.slice(page * pageSize, (page + 1) * pageSize);

  if (displayRows.length === 0) {
    html += '<tr><td colspan="6" style="padding:36px;text-align:center;color:var(--color-text-tertiary);font-size:12px;font-weight:300">No accounts match this view.</td></tr>';
  } else {
    // Group consecutive unconfirmed rows that share the same Klay target into "runs"
    // Each run gets a group header with bulk-Confirm + the rows underneath.
    // Headers (structural) and confirmed rows break runs.
    var i = 0;
    while (i < pageRows.length) {
      var a = pageRows[i];

      // Header row — render as-is, breaks any in-progress run
      if (a.isHeader) {
        html += '<tr class="s2-row s2-row-header">';
        html += '<td></td>';
        html += '<td colspan="5"><span class="s2-ws-acct-code s2-header-code">' + a.old + '</span> <span class="s2-header-name">' + a.oldName + '</span> <span class="s2-header-tag">structural · no mapping needed</span></td>';
        html += '</tr>';
        i++;
        continue;
      }

      // Detect run: consecutive unmapped rows that share the same suggested Klay target.
      // (No longer filtered by confidence — confidence is hidden from the user now.)
      var runEnd = i;
      if (a.status === 'unconfirmed') {
        while (runEnd < pageRows.length) {
          var r = pageRows[runEnd];
          if (r.isHeader) break;
          if (r.status !== 'unconfirmed' || r.newCode !== a.newCode) break;
          runEnd++;
        }
      }

      var runLen = runEnd - i;
      // Only show bulk-confirm groups in "All" filter mode. In "To review" mode,
      // the user is doing focused individual review — bulk-confirm would defeat the purpose.
      var isRun = runLen >= 3 && filterMode === 'all';

      if (isRun) {
        // Emit group header with bulk-confirm button
        var k = S2_KLAY_BY_CODE[a.newCode];
        var idxList = pageRows.slice(i, runEnd).map(function(r){return S2_ACCOUNTS.indexOf(r);});
        html += '<tr class="s2-row s2-row-group-hdr">';
        html += '<td><input type="checkbox" onclick="s2_toggleGroupCheck([' + idxList.join(',') + '], this.checked)"/></td>';
        html += '<td colspan="2">';
        html += '<div class="s2-grp-line">';
        html += '<span class="s2-grp-icon">&#9662;</span>';
        html += '<span class="s2-grp-label">' + runLen + ' accounts &rarr;</span>';
        html += '<span class="s2-grp-target"><span class="s2-grp-tcode">' + a.newCode + '</span> ' + (k ? s2_klayDisplayName(k.code, k.name) : '—') + '</span>';
        html += '</div>';
        html += '</td>';
        html += '<td colspan="2"></td>';
        html += '<td style="text-align:right">';
        html += '<button class="s2-act confirm s2-grp-confirm" onclick="s2_confirmGroup([' + idxList.join(',') + '])">Map all ' + runLen + '</button>';
        html += '</td>';
        html += '</tr>';
      }

      // Render the rows (the run, or just this one row if not a run)
      var sliceEnd = isRun ? runEnd : i + 1;
      for (var j = i; j < sliceEnd; j++) {
        var row = pageRows[j];
        var origIdx = S2_ACCOUNTS.indexOf(row);
        var rowCls = ['s2-row'];
        if (isRun) rowCls.push('s2-row-in-group');

        var rowId = 's2-row-' + row.old.replace(/[^a-zA-Z0-9]/g, '_');
        html += '<tr id="' + rowId + '" class="' + rowCls.join(' ') + '">';
        html += '<td><input type="checkbox"/></td>';
        html += '<td><div class="s2-ws-acct-code">' + row.old + '</div><div class="s2-ws-acct-name">' + row.oldName + '</div>';
        // Inline issue badges (under the legacy account name) — A+C hybrid
        if (row.issues && row.issues.length > 0) {
          html += '<div style="margin-top:4px">';
          row.issues.forEach(function(issKey){
            var iss = S2_ISSUES.find(function(i){return i.key === issKey;});
            if (!iss) return;
            // Per-tier class + icon: hard=⛔ soft=⚠ warn=ⓘ
            var kindCls = iss.kind === 'soft' ? ' soft' : (iss.kind === 'warn' ? ' warn' : '');
            var kindIcon = iss.kind === 'soft' ? '&#9888;' : (iss.kind === 'warn' ? '&#9432;' : '&#9940;');
            html += '<span class="s2-issbadge' + kindCls + '" onclick="s2_filterByIssue(\'' + issKey + '\')" title="' + iss.name + ' &middot; click to filter">';
            html += '<span class="s2-issbadge-icon">' + kindIcon + '</span>';
            html += iss.name;
            html += '</span>';
          });
          html += '</div>';
        }
        html += '</td>';
        html += '<td>' + s2_renderKlayDropdown(row, origIdx) + '</td>';
        // Dimensions cell
        html += '<td>' + s2_renderDimCell(row, origIdx) + '</td>';
        // State text (read-only)
        html += '<td>' + s2_renderStateText(row, origIdx) + '</td>';
        // Action — kebab menu (Mark for Later / Deactivate / Reset)
        html += '<td style="text-align:right">' + s2_renderRowMenu(row, origIdx) + '</td>';
        html += '</tr>';
      }
      i = sliceEnd;
    }
  }

  html += '</tbody></table>';

  // Pagination footer (only show when more than one page)
  if (displayRows.length > pageSize) {
    var fromN = page * pageSize + 1;
    var toN = Math.min((page + 1) * pageSize, displayRows.length);
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;font-size:11px;color:var(--color-text-tertiary)">';
    html += '<span>Showing <strong style="color:var(--color-text-primary)">' + fromN + '–' + toN + '</strong> of ' + displayRows.length.toLocaleString() + '</span>';
    html += '<div style="display:flex;gap:6px">';
    html += '<button class="s2-act ' + (page === 0 ? 'disabled' : '') + '" ' + (page === 0 ? 'disabled' : 'onclick="s2_setAcctPage(' + (page - 1) + ')"') + '>&larr; Prev</button>';
    html += '<span style="padding:5px 10px">Page ' + (page + 1) + ' of ' + (maxPage + 1) + '</span>';
    html += '<button class="s2-act ' + (page >= maxPage ? 'disabled' : '') + '" ' + (page >= maxPage ? 'disabled' : 'onclick="s2_setAcctPage(' + (page + 1) + ')"') + '>Next &rarr;</button>';
    html += '</div></div>';
  }

  return html;
}

/* Transaction-level workspace (specific month) */
/* Monthly view — same column shape as ALL view (account-level mapping)
   PLUS two extra columns for this month's activity: txn count and total volume.
   No transaction-level mapping; transactions can be peeked at via row expand for verification.
*/

/* ── Helpers and event handlers ── */
function s2_fsPill(fs){
  var map = {
    'pl-rev':  {cls:'s2-ws-fs-pl', txt:'P&amp;L · Revenue'},
    'pl-cogs': {cls:'s2-ws-fs-pl', txt:'P&amp;L · COGS'},
    'pl-opex': {cls:'s2-ws-fs-pl', txt:'P&amp;L · OpEx'},
    'bs-ca':   {cls:'s2-ws-fs-bs', txt:'BS · Current Assets'},
    'bs-fa':   {cls:'s2-ws-fs-bs', txt:'BS · Fixed Assets'},
    'bs-cl':   {cls:'s2-ws-fs-bs', txt:'BS · Current Liabilities'}
  };
  var p = map[fs];
  if (!p) return '<span class="s2-ws-fs-pill">—</span>';
  return '<span class="s2-ws-fs-pill ' + p.cls + '">' + p.txt + '</span>';
}

function s2_statusPill(a){
  if (a.status === 'confirmed') return '<span class="s2-ws-status-pill s2-ws-status-confirmed">Confirmed</span>';
  if (a.conf === 'low')  return '<span class="s2-ws-status-pill s2-ws-status-low">Low confidence</span>';
  if (a.conf === 'med')  return '<span class="s2-ws-status-pill s2-ws-status-med">Med confidence</span>';
  return '<span class="s2-ws-status-pill s2-ws-status-high">High confidence</span>';
}

/* ── Dimensions: cell renderer ── */
function s2_dimById(id){ return S2_DIMENSIONS.find(function(d){return d.id === id;}); }

function s2_dimChipColor(dim){
  // Translate the dim's hex color into a (bg, text) pair using a light tint
  var bg, fg;
  switch ((dim && dim.id) || '') {
    case 'department': bg = '#EEEDFE'; fg = '#3C3489'; break;
    case 'location':   bg = '#E6F1FB'; fg = '#0C447C'; break;
    default:           bg = '#F1EFE8'; fg = '#444441';
  }
  return {bg:bg, fg:fg};
}

function s2_renderDimCell(row, origIdx){
  var html = '';
  var dims = row.dimensions || [];
  dims.forEach(function(tag, tIdx){
    var dim = s2_dimById(tag.dim);
    if (!dim) return;
    var c = s2_dimChipColor(dim);
    html += '<span class="s2-dim-chip" style="background:' + c.bg + ';color:' + c.fg + '">';
    html += dim.name + ': ' + tag.value;
    html += ' <span class="s2-dim-chip-x" onclick="s2_removeDim(' + origIdx + ',' + tIdx + ')" title="Remove">&times;</span>';
    html += '</span>';
  });
  // Add button
  if (APP.s2.dimPopoverFor === row.old) {
    // Render inline popover instead of button
    html += s2_renderDimPopover(row, origIdx);
  } else {
    if (dims.length === 0) {
      html += '<span class="s2-dim-empty">— no dimensions —</span> ';
    }
    html += '<button class="s2-dim-add-btn" onclick="s2_openDimPopover(\'' + row.old + '\')">+ Add</button>';
  }
  return html;
}

function s2_dimPopChange(origIdx){
  // When dimension dropdown changes, repopulate the value dropdown
  var dSel = document.getElementById('s2-dim-pop-d-' + origIdx);
  var vSel = document.getElementById('s2-dim-pop-v-' + origIdx);
  if (!dSel || !vSel) return;
  var dim = s2_dimById(dSel.value);
  if (!dim) return;
  vSel.innerHTML = dim.values.map(function(v){return '<option value="' + v + '">' + v + '</option>';}).join('');

function s2_closeDimPopover(){

function s2_addDimFromPopover(origIdx){
  var dSel = document.getElementById('s2-dim-pop-d-' + origIdx);
  var vSel = document.getElementById('s2-dim-pop-v-' + origIdx);
  if (!dSel || !vSel) return;
  var dimId = dSel.value;
  var value = vSel.value;
  if (!S2_ACCOUNTS[origIdx].dimensions) S2_ACCOUNTS[origIdx].dimensions = [];
  // Avoid duplicate (same dim+value); if same dim exists, replace its value
  var existing = S2_ACCOUNTS[origIdx].dimensions.find(function(t){return t.dim === dimId;});
  if (existing) {
    existing.value = value;
  } else {
    S2_ACCOUNTS[origIdx].dimensions.push({dim:dimId, value:value});
  }
  APP.s2.dimPopoverFor = null;
  APP.s2.signedOff = false;
  renderS2();
}
function s2_removeDim(origIdx, tagIdx){
  if (!S2_ACCOUNTS[origIdx].dimensions) return;
  S2_ACCOUNTS[origIdx].dimensions.splice(tagIdx, 1);
  APP.s2.signedOff = false;
  renderS2();
}

/* ── State text (read-only column in workspace) ── */
function s2_renderStateText(row, origIdx){
  if (row.status === 'confirmed') {
    return '<span class="s2-ws-state s2-ws-state-mapped"><span class="s2-ws-state-icon">&#10003;</span>Mapped</span>';
  }
  if (row.status === 'proposed') {
    var html = '<span class="s2-ws-state s2-ws-state-proposed"><span class="s2-ws-state-icon">&#10024;</span>Proposed</span>';
    if (typeof origIdx === 'number') {
      html += '<button class="s2-ws-confirm-btn" onclick="s2_confirmRow(' + origIdx + ')" title="Confirm this mapping">Confirm</button>';
    }
    return html;
  }
  if (row.status === 'later') {
    return '<span class="s2-ws-state s2-ws-state-later">Marked for Later</span>';
  }
  if (row.status === 'deactivated') {
    return '<span class="s2-ws-state s2-ws-state-deactivated">Deactivated</span>';
  }
  return '<span class="s2-ws-state s2-ws-state-unmapped">Unmapped</span>';
}

/* ── Row action menu — kebab popover with Mark for Later / Deactivate / Change to Unmapped ── */
function s2_renderRowMenu(row, origIdx){
  var open = APP.s2.rowMenuOpen === origIdx;
  var html = '<div class="s2-row-menu-wrap">';
  html += '<button class="s2-row-menu-btn" onclick="s2_toggleRowMenu(' + origIdx + ', event)" aria-haspopup="true" aria-expanded="' + open + '" title="Row actions">&#8943;</button>';
  if (open) {
    html += '<div class="s2-row-menu" onclick="event.stopPropagation()">';
    if (row.status === 'later') {
      html += '<button class="s2-row-menu-item active" onclick="s2_toggleLater(' + origIdx + ');s2_closeRowMenu()">&#10003; Marked for Later</button>';
    } else {
      html += '<button class="s2-row-menu-item" onclick="s2_toggleLater(' + origIdx + ');s2_closeRowMenu()">Mark for Later</button>';
    }
    if (row.status === 'deactivated') {
      html += '<button class="s2-row-menu-item active" onclick="s2_toggleDeactivate(' + origIdx + ');s2_closeRowMenu()">&#10003; Deactivated</button>';
    } else {
      html += '<button class="s2-row-menu-item" onclick="s2_toggleDeactivate(' + origIdx + ');s2_closeRowMenu()">Deactivate</button>';
    }
    // "Change to Unmapped" — clears the mapping. Available on any row that has one
    // (Mapped, Proposed, Marked for Later, Deactivated).
    if (row.status === 'confirmed' || row.status === 'proposed' || row.status === 'later' || row.status === 'deactivated') {
      html += '<div class="s2-row-menu-divider"></div>';
      html += '<button class="s2-row-menu-item danger" onclick="s2_resetRow(' + origIdx + ');s2_closeRowMenu()">Change to Unmapped</button>';
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function s2_toggleRowMenu(origIdx, ev){
  if (ev && ev.stopPropagation) ev.stopPropagation();

  renderApp();
}
function s2_closeRowMenu(){
  APP.s2.rowMenuOpen = null;

}
function s2_resetRow(origIdx){
  // Clears the mapping entirely — used by "Change to Unmapped" in the row kebab.
  // Both the AI suggestion and the controller's confirmation are wiped; the row
  // re-enters the Unmapped pool and the controller re-maps from scratch.
  S2_ACCOUNTS[origIdx].status = 'unconfirmed';
  S2_ACCOUNTS[origIdx].newCode = null;
  S2_ACCOUNTS[origIdx].newName = null;
  APP.s2.signedOff = false;

}

/* Promote a single Proposed row to Mapped — used by per-row Confirm button and

/* ── SETTINGS PAGE ──
   Standalone full-page route, accessible via the gear in the top nav or
   Configure buttons in Stage 2. Reuses the dimension card rendering that
   used to live in the drawer. */
function openSettings(sectionKey, returnTo){
  // sectionKey: optional. Lands the user on this section. Defaults to 'profile'.
  // returnTo: optional snapshot of where to return to. If omitted, captures the
  // user's current location automatically.
  if (returnTo === undefined) {
    returnTo = captureReturnTo();
  }
  /* Backward compat: a few legacy callers pass returnTo as the first arg.
     If we receive an object, treat it as returnTo and use the default section. */
  if (sectionKey && typeof sectionKey === 'object') {
    returnTo = sectionKey;
    sectionKey = null;
  }
  APP.settings = { active: sectionKey || 'profile', returnTo: returnTo };
  APP.s2.dimEditingId = null;
  APP.avatarMenuOpen = false;
  renderApp();
  window.scrollTo(0, 0);
}
function closeSettings(){
  // Restore the user's position, if we have a return ticket
  var rt = APP.settings && APP.settings.returnTo;
  APP.settings = null;
  APP.s2.dimEditingId = null;
  if (rt) {
    APP.stage = rt.stage;
    if (rt.s2) {
      APP.s2.substep = rt.s2.substep;
      APP.s2.klayCoaView = rt.s2.klayCoaView || false;
      APP.s2.activeCluster = rt.s2.activeCluster;
      APP.s2.wsFilter = rt.s2.wsFilter;
      APP.s2.acctPage = rt.s2.acctPage;
    }
  }
  renderApp();
  window.scrollTo(0, 0);
}
function captureReturnTo(){
  // Snapshot just enough to land the user back on the same screen
  return {
    stage: APP.stage,
    s2: {
      substep: APP.s2.substep,
      klayCoaView: APP.s2.klayCoaView,
      activeCluster: APP.s2.activeCluster,
      wsFilter: APP.s2.wsFilter,
      acctPage: APP.s2.acctPage
    }
  };
}
function goHome(){
  /* Logo click — navigate to the home/overview screen.
     - If Settings is open, close it (Settings' returnTo brings us back to the prior stage,
       then we override to land on Stage 1 below).
     - Otherwise just navigate to Stage 1, which is the migration overview / starting point.
     - Special case: if already on Stage 1 and Settings is closed, no-op (avoid jarring redraw).
     Closing the avatar menu too, in case it was open. */
  APP.avatarMenuOpen = false;
  if (APP.settings) {
    APP.settings = null;
  } else if (APP.stage === 1) {
    return; // already home
  }
  jumpToStage(1);
}

function renderSettings(){
  // Hide the substep bar — Settings is a top-level route, not part of any stage
  var ssb = document.getElementById('substepbar');
  if (ssb) ssb.style.display = 'none';
  // Rebuild stage bar so it doesn't show any active stage
  renderStageBar();

  var st = APP.settings;
  var rt = st && st.returnTo;
  var active = (st && st.active) || 'profile';

  var html = '<div class="settings-shell">';

  // ── Sidebar (sections) ──
  // Klay CoA is a launcher (closes Settings, opens the Stage-2 CoA overlay).
  // Team & permissions is admin-only — hidden from the sidebar when isAdmin() is false.
  // Help is a real section that shows contact paths to Klay's customer support.
  html += '<div class="settings-sidebar">';
  html += '<div class="settings-sidebar-hdr">User</div>';
  html += renderSettingsSidebarItem('profile', '&#128100;', 'User profile', active);

  html += '<div class="settings-sidebar-hdr" style="margin-top:14px">Organization</div>';
  html += renderSettingsSidebarItem('organization', '&#127970;', 'Organization', active);
  if (isAdmin()) {
    html += renderSettingsSidebarItem('team', '&#128101;', 'Team & permissions', active);
  }
  html += renderSettingsSidebarItem('dimensions', '&#127991;', 'Dimensions', active);
  /* Klay CoA — rendered inside the Settings content pane, same as other sections. */
  html += renderSettingsSidebarItem('klay-coa', '&#128203;', 'Klay CoA', active);

  html += '<div class="settings-sidebar-hdr" style="margin-top:14px">Support</div>';
  html += renderSettingsSidebarItem('help', '&#128172;', 'Help & support', active);
  html += '</div>'; // /settings-sidebar

  // ── Content ──
  html += '<div class="settings-content">';
  // Guard: if the active section is admin-only but we're not admin, bounce to profile
  if (active === 'team' && !isAdmin()) {
    APP.settings.active = 'profile';
    active = 'profile';
  }
  // Top bar — back button + breadcrumb
  var crumb = settingsCrumbLabel(active);
  if (rt) {
    var rtLabel = settingsReturnLabel(rt);
    html += '<div class="settings-topbar">';
    html += '<button class="settings-back" onclick="closeSettings()"><span class="settings-back-arrow">&larr;</span> Back to ' + rtLabel + '</button>';
    html += '<span class="settings-crumb">Settings &middot; ' + crumb + '</span>';
    html += '</div>';
  } else {
    html += '<div class="settings-topbar"><span class="settings-crumb">Settings &middot; ' + crumb + '</span></div>';
  }

  // Section content
  if (active === 'profile')           html += renderSettingsProfile();
  else if (active === 'organization') html += renderSettingsOrganization();
  else if (active === 'team')         html += renderSettingsTeam();
  else if (active === 'help')         html += renderSettingsHelp();
  else if (active === 'klay-coa')     html += renderSettingsKlayCoa();
  else                                html += renderSettingsDimensions();

  html += '</div>'; // /settings-content
  html += '</div>'; // /settings-shell

  document.getElementById('main').innerHTML = html;
}

/* Klay CoA launcher from the Settings sidebar.
   Closes Settings (restoring the original return ticket so the eventual "Back" on the
   Klay CoA page lands the user where they were before they opened Settings), then opens
   the Stage 2 Klay CoA overlay. */
/* Render one sidebar item. */
function renderSettingsSidebarItem(key, iconEntity, label, activeKey) {
  var cls = 'settings-sidebar-section' + (key === activeKey ? ' active' : '');
  return '<div class="' + cls + '" onclick="setSettingsSection(\'' + key + '\')">'
    + '<span class="settings-sidebar-icon">' + iconEntity + '</span>'
    + '<span>' + label + '</span>'
    + '</div>';
}

function settingsCrumbLabel(active) {
  switch (active) {
    case 'profile': return 'User profile';
    case 'organization': return 'Organization';
    case 'team': return 'Team & permissions';
    case 'dimensions': return 'Dimensions';
    case 'klay-coa': return 'Klay CoA';
    case 'help': return 'Help & support';
    default: return 'Settings';
  }
}

/* setSettingsSection retained as a no-op for any callers, but the sidebar that
   drove section switching has been removed — Dimensions is the only section. */
function setSettingsSection(key){
  if (!APP.settings) return;
  /* Permissions guard — non-admins can't reach the team section */
  if (key === 'team' && !isAdmin()) return;
  APP.settings.active = key;
  renderApp();
  window.scrollTo(0, 0);
}

function settingsReturnLabel(rt){
  // Best-effort label for where the user came from
  if (rt.stage === 2) {
    if (rt.s2 && rt.s2.klayCoaView) return 'Klay CoA';
    if (rt.s2 && rt.s2.substep === 1) return 'Structure Overview';
    if (rt.s2 && rt.s2.substep === 2) return 'Workspace';
    if (rt.s2 && rt.s2.substep === 3) return 'Sign off';
    return 'Stage 2 — Account Mapping';
  }
  if (rt.stage === 1) return 'Stage 1 — Master Data';
  if (rt.stage === 3) return 'Stage 3 — GL Mapping';
  if (rt.stage === 4) return 'Stage 4 — Review';
  if (rt.stage === 5) return 'Stage 5 — UAT';
  if (rt.stage === 6) return 'Stage 6 — Sign-off';
  return 'previous page';
}

/* Render a single recommendation card. Shows name/dot, AI reasoning, sample
   values, and Confirm/Dismiss actions. */
function s2_renderDimRecommendationCard(rec){
  var html = '<div class="s2-dim-rec-card">';
  html += '<div class="s2-dim-rec-card-hdr">';
  html += '<span class="s2-dim-card-dot" style="background:' + rec.color + '"></span>';
  html += '<span class="s2-dim-rec-card-name">' + rec.name + '</span>';
  html += '</div>';
  html += '<div class="s2-dim-rec-card-reason">' + rec.reason + '</div>';
  // Sample values (first few)
  if (rec.values && rec.values.length > 0 && rec.values[0] !== '(none configured yet)') {
    html += '<div class="s2-dim-rec-card-vals">';
    var sample = rec.values.slice(0, 4);
    sample.forEach(function(v){
      html += '<span class="s2-dim-rec-card-val">' + v + '</span>';
    });
    if (rec.values.length > 4) {
      html += '<span class="s2-dim-rec-card-val s2-dim-rec-card-val-more">+' + (rec.values.length - 4) + '</span>';
    }
    html += '</div>';
  } else {
    html += '<div class="s2-dim-rec-card-vals s2-dim-rec-card-vals-empty">No values yet — add after confirming</div>';
  }
  html += '<div class="s2-dim-rec-card-meta">' + rec.signals + '</div>';
  html += '<div class="s2-dim-rec-card-actions">';
  html += '<button class="s2-dim-rec-card-btn s2-dim-rec-card-btn-pri" onclick="s2_dimRecConfirm(\'' + rec.id + '\')">Confirm</button>';
  html += '<button class="s2-dim-rec-card-btn" onclick="s2_dimRecDismiss(\'' + rec.id + '\')">Dismiss</button>';
  html += '</div>';
  html += '</div>';
  return html;
}

/* Confirm an AI recommendation: move it from S2_DIM_RECOMMENDATIONS into
   S2_DIMENSIONS, where it'll render in the configured-dimensions table. */
function s2_dimRecConfirm(recId){
  var idx = S2_DIM_RECOMMENDATIONS.findIndex(function(r){return r.id === recId;});
  if (idx === -1) return;
  var rec = S2_DIM_RECOMMENDATIONS[idx];
  // Sanitize values: strip the "(none configured yet)" placeholder
  var values = (rec.values || []).filter(function(v){return v && v !== '(none configured yet)';});
  S2_DIMENSIONS.push({
    id: rec.id,
    name: rec.name,
    color: rec.color,
    values: values,
  });
  S2_DIM_RECOMMENDATIONS.splice(idx, 1);
  renderApp();
}

/* Dismiss an AI recommendation: remove without adding to S2_DIMENSIONS. */
function s2_dimRecDismiss(recId){
  var idx = S2_DIM_RECOMMENDATIONS.findIndex(function(r){return r.id === recId;});
  if (idx === -1) return;
  S2_DIM_RECOMMENDATIONS.splice(idx, 1);
  renderApp();
}

/* Settings handlers — these mutate the dimension catalog and re-render the
   active route (settings page). When called from Stage 2 via the inline +Add
   popover, the same handlers re-render the workspace via renderApp(). */
function s2_dimStartEdit(id){ APP.s2.dimEditingId = id; renderApp(); }
function s2_dimCancelEdit(){ APP.s2.dimEditingId = null; renderApp(); }
function s2_dimSaveEdit(id){
  var input = document.getElementById('s2-dim-edit-name-' + id);
  if (!input) return;
  var newName = input.value.trim();
  if (!newName) return;
  var dim = s2_dimById(id);
  if (dim) dim.name = newName;
  APP.s2.dimEditingId = null;
  renderApp();
}
function s2_dimDelete(id){
  if (!confirm('Delete this dimension? Any tags using it will also be removed from accounts.')) return;
  S2_DIMENSIONS = S2_DIMENSIONS.filter(function(d){return d.id !== id;});
  // Cascade: strip tags using this dim from all accounts
  S2_ACCOUNTS.forEach(function(a){
    if (a.dimensions) a.dimensions = a.dimensions.filter(function(t){return t.dim !== id;});
  });
  APP.s2.signedOff = false;
  renderApp();
}
function s2_dimStartAddValue(id){ APP.s2.dimEditingId = '__addval__:' + id; renderApp(); }
function s2_dimSaveValue(id){
  var input = document.getElementById('s2-dim-newval-' + id);
  if (!input) return;
  var newVal = input.value.trim();
  if (!newVal) return;
  var dim = s2_dimById(id);
  if (dim && dim.values.indexOf(newVal) === -1) dim.values.push(newVal);
  APP.s2.dimEditingId = null;
  renderApp();
}
function s2_dimRemoveValue(id, vIdx){
  var dim = s2_dimById(id);
  if (!dim) return;
  var removedVal = dim.values[vIdx];
  dim.values.splice(vIdx, 1);
  // Cascade: strip tags using this {dim, value} from accounts
  S2_ACCOUNTS.forEach(function(a){
    if (a.dimensions) a.dimensions = a.dimensions.filter(function(t){return !(t.dim === id && t.value === removedVal);});
  });

   Balances are deterministically generated from a seed so they're stable per render. */
function s3_buildStatements(period){
  // period: 'cumulative' (YTD) or 0-8 (month index 0=Jan, 8=Sep)
  // For BS amounts (point-in-time): scale by (monthIdx+1)/9 — Jan = 11%, Sep = 100%
  // For P&L amounts (period flow): use 1/9 with monthly variation
  if (period == null) period = APP.s3 ? APP.s3.period : 'cumulative';
  var isCumulative = (period === 'cumulative');
  var monthIdx = isCumulative ? 8 : parseInt(period, 10);  // Sep = 8
  // BS scaling factor: cumulative through end-of-month
  var bsFactor = isCumulative ? 1 : (monthIdx + 1) / 9;
  // P&L: a per-month "weight" with deterministic variation around 1/9.
  // Months [10, 9, 11, 12, 11, 10, 12, 13, 12] / 100 (sum = 100% across 9 months)
  var monthWeights = [0.10, 0.09, 0.11, 0.12, 0.11, 0.10, 0.12, 0.13, 0.12];
  var plFactor = isCumulative ? 1 : monthWeights[monthIdx];

  // Per-month FX variance on Klay 7-1200 (Realized FX Gain).
  // Small amounts (Rp 5-30M, varying sign per month). Sum across 9 months ≈ small net.
  var fxNoiseByMonth = [
    +18_000_000,   // Jan: Klay realized gain higher
    -12_000_000,   // Feb: Klay lower
    + 8_000_000,   // Mar
    -22_000_000,   // Apr
    +15_000_000,   // May
    -10_000_000,   // Jun
    + 5_000_000,   // Jul
    +25_000_000,   // Aug
    -18_000_000,   // Sep

    else if (code === '6-3000') base = 180_000_000;    // Depreciation (per)
    else if (code === '6-3100') base = 65_000_000;     // Amortization (per)
    else if (code === '6-4000') base = 95_000_000;     // Advertising (per)
    else if (code === '6-4100') base = 145_000_000;    // Logistics
    else if (code === '6-5000') base = 75_000_000;     // Professional Services (per)
    else if (code === '6-5100') base = 22_000_000;     // Office Supplies (per)
    else if (code === '6-5200') base = 55_000_000;     // Business Travel (per)
    else if (code === '6-5300') base = 35_000_000;     // Entertainment
    else if (code === '6-5400') base = 28_000_000;     // Insurance (per)
    else if (code === '6-5500') base = 18_000_000;     // Licenses & Regulatory
    else if (code === '6-5600') base = 45_000_000;     // Bad Debt
    else if (code === '6-5700') base = 20_000_000;     // Other G&A (per)
    // ── NON-OP ──
    else if (code === '7-1000') base = 35_000_000;     // Interest income
    else if (code === '7-1100') base = 20_000_000;     // Gain on disposal
    else if (code === '7-1200') base = 75_000_000;     // Realized FX gain
    else if (code === '7-1300') base = 0;              // Unrealized FX gain (SCHEMA)
    else if (code === '7-1400') base = 15_000_000;     // Other Non-Op Income
    else if (code === '7-2000') base = 240_000_000;    // Interest expense
    else if (code === '7-2100') base = 12_000_000;     // Loss on disposal
    else if (code === '7-2200') base = 55_000_000;     // Realized FX loss
    else if (code === '7-2300') base = 0;              // Unrealized FX loss (SCHEMA)
    else if (code === '7-2400') base = 8_000_000;      // Other Non-Op Expense
    // ── INCOME TAX ──
    else if (code === '8-1000') base = 600_000_000;     // Income Tax (per account; ~3 contribs sum to ≈25% of pre-tax)
    else base = 25_000_000;                             // fallback

    // Slight per-contributor variance so multiple accounts mapping to same Klay code aren't identical
    return Math.round(base * mul / 1_000_000) * 1_000_000;
  }

  // Group S2_ACCOUNTS by newCode (Klay account)
  var byKlay = {};
  S2_ACCOUNTS.forEach(function(a, idx){
    if (a.isHeader) return; // skip structural rows
    var code = a.newCode;
    var meta = S3_KLAY_META[code];
    if (!meta) return;
    if (!byKlay[code]) byKlay[code] = {meta:meta, contribs:[]};
    var bal = balanceForKlay(code, idx);
    // Scale by period: BS sections (Assets/Liab/Equity) use BS cumulative factor;
    // P&L sections (Rev/COGS/OpEx/NonOp/Tax) use period flow factor.
    var isPL = (meta.section === 'REVENUE' || meta.section === 'COGS' || meta.section === 'OPEX' ||
                meta.section === 'NONOP' || meta.section === 'TAX');
    var factor = isPL ? plFactor : bsFactor;
    bal = Math.round(bal * factor / 1_000_000) * 1_000_000;
    byKlay[code].contribs.push({old:a.old, oldName:a.oldName, legacy:bal, klay:bal, _ref:a});
  });

  // ── Variance scenario: placement-error correction ──
  // Legacy account `12310,0,20 Account Payable` is filed under Current Assets in PT. ABC's CoA
  // (a long-standing bookkeeping error — see Stage 2 reason). The AI correctly maps it to
  // Klay's `2-1000 Utang Usaha` (Trade Payable, Liability section).
  //
  // To reconcile against the legacy reference, the legacy-side amount needs to appear in
  // Legacy Assets, while the klay-side amount appears in Klay Liabilities. We accomplish this by:
  //   1. Stripping the legacy amount from the 2-1000 contributor (so Legacy Liabilities total
  //      doesn't include it — it's only in the Klay-derived view)
  //   2. Injecting a phantom "Legacy-only" asset row (so Legacy Assets total picks it up)
  //
  // Result:
  //   - Klay Total Assets < Legacy Total Assets by the placement amount
  //   - Klay Total Liabilities > Legacy Total Liabilities by the same amount
  //   - Both balance sheets still tie (A = L + E on each side)
  //   - User sees the variance, clicks Investigate, jumps to Stage 2 and sees the placement annotation
  var placementVariance = 0;
  var placementOldName = '';
  if (byKlay['2-1000']) {
    var pe = byKlay['2-1000'].contribs.find(function(c){return c.old === '12310,0,20';});
    if (pe) {
      // For demo, use a small but meaningful amount — a year-old vendor invoice that got
      // misfiled. Real-world placement errors tend to be modest amounts like this.
      // Scale by BS cumulative factor — Jan-end shows partial accumulation, Sep/YTD shows full.
      var smallAmt = Math.round(185_000_000 * bsFactor / 1_000_000) * 1_000_000;
      pe.legacy = 0;
      pe.klay = smallAmt;
      placementVariance = smallAmt;
      placementOldName = pe.oldName;
      pe.varNote = 'Placement-error correction: legacy CoA filed this under Assets, Klay correctly classifies it as Liability.';
    }
  }
  // Inject a phantom legacy-side asset entry so Legacy Total Assets picks up the amount
  // while Klay Total Assets does not. We attach it to 1-1700 Other Current Assets (where a
  // mis-filed AP would have sat under generic "Other CA" if not specifically classified).
  if (placementVariance > 0) {
    if (!byKlay['1-1700']) byKlay['1-1700'] = {meta:S3_KLAY_META['1-1700'], contribs:[]};
    byKlay['1-1700'].contribs.push({
      old:'12310,0,20',
      oldName:placementOldName + ' (legacy CoA placement)',
      legacy:placementVariance, klay:0,
      varNote:'Legacy-only — Klay reclassifies this account to 2-1000 Utang Usaha (Liability). Investigate to remove from assets.'
    });
  }

  // ── Variance scenario 2: FX revaluation timing differences ──
  // Indonesian companies with USD/JPY exposure see small month-end FX revaluation
  // variances between systems (different rate sources or timing). The amount varies by month.
  // Applied to Klay 7-1200 (Realized FX Gain) — the user's primary FX touchpoint.
  if (fxVarianceForPeriod !== 0 && byKlay['7-1200']) {
    byKlay['7-1200'].contribs.push({
      old:'—',
      oldName:'FX revaluation timing difference' + (isCumulative ? ' (YTD net)' : ''),
      legacy:0, klay:fxVarianceForPeriod,
      varNote:isCumulative
        ? 'Sum of month-end FX revaluation differences across Jan-Sep. Mostly offsetting; small net residual.'
        : 'Month-end FX revaluation rate difference. Will reverse next month.'
    });
  }

  // ── Roll up totals per Klay row (preliminary, to compute residual equity) ──
  Object.keys(byKlay).forEach(function(k){
    var row = byKlay[k];
    row.legacy = row.contribs.reduce(function(s,c){return s+c.legacy;}, 0);
    row.klay   = row.contribs.reduce(function(s,c){return s+c.klay;},   0);
  });

  // ── Compute P&L flows (Pre-tax → Tax → Net income) FIRST ──
  // Tax already comes from the S2 OPEX dataset (8-1000); we don't need to synthesize it.
  // But the existing S2 mapping puts deferred tax accounts there too — which is fine for now.
  var sumSection = function(secName, side){
    return Object.keys(byKlay)
      .filter(function(k){return byKlay[k].meta.section === secName;})
      .reduce(function(s, k){return s + byKlay[k][side];}, 0);
  };
  var revL = sumSection('REVENUE', 'legacy'), revK = sumSection('REVENUE', 'klay');
  var cogsL = sumSection('COGS', 'legacy'), cogsK = sumSection('COGS', 'klay');
  var opexL = sumSection('OPEX', 'legacy'), opexK = sumSection('OPEX', 'klay');

  // Non-op net (income − expense) within section 7
  var nonopIncomeL = ['7-1000','7-1100','7-1200','7-1400'].reduce(function(s,k){return s + (byKlay[k] ? byKlay[k].legacy : 0);}, 0);
  var nonopIncomeK = ['7-1000','7-1100','7-1200','7-1400'].reduce(function(s,k){return s + (byKlay[k] ? byKlay[k].klay : 0);}, 0);
  var nonopExpL = ['7-2000','7-2100','7-2200','7-2400'].reduce(function(s,k){return s + (byKlay[k] ? byKlay[k].legacy : 0);}, 0);
  var nonopExpK = ['7-2000','7-2100','7-2200','7-2400'].reduce(function(s,k){return s + (byKlay[k] ? byKlay[k].klay : 0);}, 0);

  // Pre-tax = Revenue − COGS − OpEx + NonOp Income − NonOp Expense
  var pretaxL = revL - cogsL - opexL + nonopIncomeL - nonopExpL;
  var pretaxK = revK - cogsK - opexK + nonopIncomeK - nonopExpK;

  // Tax — from S2 if present (8-1000), otherwise compute as 25% of pre-tax
  var taxL, taxK;
  if (byKlay['8-1000']) {
    taxL = byKlay['8-1000'].legacy;
    taxK = byKlay['8-1000'].klay;
  } else {
    taxL = Math.round(pretaxL * 0.25 / 1_000_000) * 1_000_000;
    taxK = Math.round(pretaxK * 0.25 / 1_000_000) * 1_000_000;
    byKlay['8-1000'] = {meta:S3_KLAY_META['8-1000'], contribs:[
      {old:'—', oldName:'Computed: 25% × Pre-tax income (synthesized)', legacy:taxL, klay:taxK}
    ]};
    byKlay['8-1000'].legacy = taxL;
    byKlay['8-1000'].klay = taxK;
  }

  // Net income = Pre-tax − Tax
  var netL = pretaxL - taxL;
  var netK = pretaxK - taxK;

  // ── Equity: Modal Disetor fixed; Saldo Laba computed as residual so BS balances ──
  // BS balance: Total Assets = Total Liabilities + Modal Disetor + Saldo Laba + Net Income
  // ⇒ Saldo Laba = Total Assets − Total Liabilities − Modal Disetor − Net Income
  var totalAssetsL = sumSection('ASSETS', 'legacy');
  var totalAssetsK = sumSection('ASSETS', 'klay');
  var totalLiabL = sumSection('LIABILITIES', 'legacy');
  var totalLiabK = sumSection('LIABILITIES', 'klay');
  var modalDisetor = 20_000_000_000;
  var saldoLabaL = totalAssetsL - totalLiabL - modalDisetor - netL;
  var saldoLabaK = totalAssetsK - totalLiabK - modalDisetor - netK;

  byKlay['3-1000'] = {
    meta: S3_KLAY_META['3-1000'],
    contribs: [{old:'3100', oldName:'Modal Disetor', legacy:modalDisetor, klay:modalDisetor}],
    legacy: modalDisetor, klay: modalDisetor,
  };
  byKlay['3-2000'] = {
    meta: S3_KLAY_META['3-2000'],
    contribs: [{old:'3200', oldName:'Saldo Laba (Retained Earnings)', legacy:saldoLabaL, klay:saldoLabaK,
                varNote: (saldoLabaL !== saldoLabaK) ? 'Variance flows from Asset/Liability variances above' : ''}],
    legacy: saldoLabaL, klay: saldoLabaK,
  };


  byKlay['3-3000'] = {meta:S3_KLAY_META['3-3000'], contribs:[
    {old:'—', oldName:'Computed: Pre-tax income − Tax expense',
     legacy:netL, klay:netK,
     varNote: (netK !== netL) ? 'Variance flows from P&L (' + (netK > netL ? '+' : '') + 'Rp ' + Math.abs(netK - netL).toLocaleString() + ')' : ''}
  ]};
  byKlay['3-3000'].legacy = netL;
  byKlay['3-3000'].klay = netK;

  // ── Build sectioned arrays for TB and P&L ──
  function buildSectioned(sectionList, sectionLabels){
    var out = [];
    sectionList.forEach(function(secName){
      // Section header
      out.push({section:secName, label:sectionLabels[secName], kind:'section'});
      // All Klay rows in this section, sorted by order
      var rows = Object.keys(byKlay)
        .filter(function(k){return byKlay[k].meta.section === secName;})
        .sort(function(a,b){return byKlay[a].meta.order - byKlay[b].meta.order;});
      rows.forEach(function(k){
        var r = byKlay[k];
        // Skip rows with zero balance on both sides
        if (r.legacy === 0 && r.klay === 0) return;
        out.push({
          acct: k,
          name: r.meta.name,
          legacy: r.legacy,
          klay:   r.klay,
          contribs: r.contribs
        });
      });
    });
    return out;
  }

  var tbSections = ['ASSETS', 'LIABILITIES', 'EQUITY'];
  var tbLabels = {ASSETS:'Assets', LIABILITIES:'Liabilities', EQUITY:'Equity'};
  var tb = buildSectioned(tbSections, tbLabels);

  // Compute and inject subtotals/totals after each section.
  // For TB: the grand total is "Total liabilities & equity" — sums only L+E (not Assets), since A = L + E.
  var injectSubtotals = function(rows, sectionList, labelPrefix, finalKey, finalLabel, finalSections){
    var result = [];
    sectionList.forEach(function(secName){
      // Find this section's slice
      var slice = [];
      var mode = false;
      rows.forEach(function(r){
        if (r.section === secName) { mode = true; result.push(r); return; }
        if (r.section && r.section !== secName && mode) { mode = false; }
        if (mode) { slice.push(r); result.push(r); }
      });
      var legSum = slice.reduce(function(s,r){return s + (r.legacy||0);}, 0);
      var klaySum = slice.reduce(function(s,r){return s + (r.klay||0);}, 0);
      result.push({section:'TOTAL_'+secName, label:'Total ' + (labelPrefix[secName] || secName.toLowerCase()), kind:'subtotal', legacy:legSum, klay:klaySum});
    });
    // Grand total — sums only the sections specified by finalSections (allowing TB to use L+E only)
    if (finalKey) {
      var totalL = 0, totalK = 0;
      var sectionsToSum = finalSections || sectionList;
      sectionsToSum.forEach(function(secName){
        var st = result.find(function(r){return r.section === 'TOTAL_'+secName;});
        if (st) { totalL += st.legacy; totalK += st.klay; }
      });
      result.push({section:finalKey, label:finalLabel, kind:'total', legacy:totalL, klay:totalK});
    }
    return result;
  };

  // Add legacy-only structural rows (parent groupings)
  var legacyOnlyAssets = [
    {acct:'L:1000', name:'ASET (parent grouping)',         legacy:null, klay:null, legacyOnly:true,
      note:'Top-level Indonesian parent — Klay structure has no equivalent.'},
    {acct:'L:1100', name:'Aset Lancar (parent grouping)',  legacy:null, klay:null, legacyOnly:true,
      note:'Mid-level grouping — collapsed into Klay\'s flat structure.'},
    {acct:'L:1500', name:'Aset Tetap (parent grouping)',   legacy:null, klay:null, legacyOnly:true,
      note:'Mid-level grouping — collapsed into Klay\'s flat structure.'},
  ];
  // Build TB with subtotals (grand total = LIABILITIES + EQUITY only)
  var tbWithSubtotals = injectSubtotals(tb, tbSections, {ASSETS:'assets', LIABILITIES:'liabilities', EQUITY:'equity'}, 'TOTAL_LE', 'Total liabilities & equity', ['LIABILITIES', 'EQUITY']);
  // Splice legacy-only rows just before TOTAL_ASSETS
  var assetSubIdx = tbWithSubtotals.findIndex(function(r){return r.section === 'TOTAL_ASSETS';});
  if (assetSubIdx > -1) tbWithSubtotals.splice.apply(tbWithSubtotals, [assetSubIdx, 0].concat(legacyOnlyAssets));

  // Force the BS to balance: A = L + E.
  // Compute deltaL/deltaK = (Liabilities + Equity) - Assets, and subtract from Retained earnings.
  var assetTotal = tbWithSubtotals.find(function(r){return r.section === 'TOTAL_ASSETS';});
  var liabTotal = tbWithSubtotals.find(function(r){return r.section === 'TOTAL_LIABILITIES';});
  var eqTotal = tbWithSubtotals.find(function(r){return r.section === 'TOTAL_EQUITY';});
  var grand = tbWithSubtotals.find(function(r){return r.section === 'TOTAL_LE';});
  if (assetTotal && liabTotal && eqTotal && grand) {
    var deltaL = (liabTotal.legacy + eqTotal.legacy) - assetTotal.legacy; // by how much L+E exceeds A
    var deltaK = (liabTotal.klay   + eqTotal.klay)   - assetTotal.klay;
    // Adjust Retained earnings DOWN by delta (so L+E shrinks to match A)
    var retained = byKlay['3-2000'];
    var retainedRow = tbWithSubtotals.find(function(r){return r.acct === '3-2000';});
    if (retained && retainedRow) {
      retained.legacy -= deltaL; retained.klay -= deltaK;
      retained.contribs[0].legacy -= deltaL; retained.contribs[0].klay -= deltaK;
      retainedRow.legacy = retained.legacy; retainedRow.klay = retained.klay; retainedRow.contribs = retained.contribs;
      eqTotal.legacy -= deltaL; eqTotal.klay -= deltaK;
      grand.legacy -= deltaL;   grand.klay -= deltaK;
    }
  }

  // Build P&L — full structure: Revenue → COGS → Gross → OpEx → OpInc → NonOp → Pre-tax → Tax → Net
  var plSections = ['REVENUE', 'COGS', 'OPEX', 'NONOP', 'TAX'];
  var plLabels = {REVENUE:'Revenue', COGS:'Cost of sales', OPEX:'Operating expenses', NONOP:'Non-operating income / expense', TAX:'Income tax'};
  var pl = buildSectioned(plSections, plLabels);
  // Add legacy-only P&L row
  pl.push({acct:'L:6000', name:'BEBAN OPERASIONAL (parent grouping)', legacy:null, klay:null, legacyOnly:true,
    note:'Top-level Indonesian P&L parent — Klay has no equivalent.'});
  var plWithSubtotals = injectSubtotals(pl, plSections, {REVENUE:'revenue', COGS:'cost of sales', OPEX:'operating expenses', NONOP:'non-operating', TAX:'income tax'}, null, null);

  // Insert Gross profit after COGS subtotal
  var cogsSubIdx = plWithSubtotals.findIndex(function(r){return r.section === 'TOTAL_COGS';});
  if (cogsSubIdx > -1) {
    var revSub = plWithSubtotals.find(function(r){return r.section === 'TOTAL_REVENUE';});
    var cogsSub = plWithSubtotals[cogsSubIdx];
    plWithSubtotals.splice(cogsSubIdx + 1, 0,
      {section:'GROSS', label:'Gross profit', kind:'subtotal',
       legacy:revSub.legacy - cogsSub.legacy, klay:revSub.klay - cogsSub.klay});
  }
  // Insert Operating income after OPEX subtotal
  var opexSubIdx = plWithSubtotals.findIndex(function(r){return r.section === 'TOTAL_OPEX';});
  if (opexSubIdx > -1) {
    var gross = plWithSubtotals.find(function(r){return r.section === 'GROSS';});
    var opexSub = plWithSubtotals[opexSubIdx];
    plWithSubtotals.splice(opexSubIdx + 1, 0,
      {section:'OPINC', label:'Operating income', kind:'subtotal',
       legacy:gross.legacy - opexSub.legacy, klay:gross.klay - opexSub.klay});
  }
  // Insert Pre-tax income after NONOP subtotal: OpInc + NonOp net
  var nonopSubIdx = plWithSubtotals.findIndex(function(r){return r.section === 'TOTAL_NONOP';});
  if (nonopSubIdx > -1) {
    var opinc = plWithSubtotals.find(function(r){return r.section === 'OPINC';});
    // The NONOP subtotal sums all non-op rows (income + expense as positive numbers since both are stored positive).
    // To compute the "net" non-op effect, recompute from byKlay
    var nonopNetL = nonopIncomeL - nonopExpL;
    var nonopNetK = nonopIncomeK - nonopExpK;
    plWithSubtotals.splice(nonopSubIdx + 1, 0,
      {section:'PRETAX', label:'Pre-tax income', kind:'subtotal',
       legacy:opinc.legacy + nonopNetL, klay:opinc.klay + nonopNetK});
  }
  // Net income = Pre-tax − Tax (placed at the very end after the TAX section subtotal)
  var taxSubIdx = plWithSubtotals.findIndex(function(r){return r.section === 'TOTAL_TAX';});
  if (taxSubIdx > -1) {
    var pretax = plWithSubtotals.find(function(r){return r.section === 'PRETAX';});
    var taxSub = plWithSubtotals[taxSubIdx];
    plWithSubtotals.push({section:'NET', label:'Net income', kind:'total',
      legacy:pretax.legacy - taxSub.legacy, klay:pretax.klay - taxSub.klay});
  } else {
    // Fallback if no TAX section
    var opincFallback = plWithSubtotals.find(function(r){return r.section === 'OPINC';});
    if (opincFallback) {
      plWithSubtotals.push({section:'NET', label:'Net income', kind:'total',
        legacy:opincFallback.legacy, klay:opincFallback.klay});
    }
  }

  return {tb:tbWithSubtotals, pl:plWithSubtotals};
}

/* Balance Sheet just rolls up TB into a presentation order; reuse for prototype */
function s3_buildBS(){
  // Mirror TB but presented BS-style. For prototype, reuse TB rows.
  return S3_TB;
}

function fmt(n){
  if (n === 0 || n == null) return '—';
  var abs = Math.abs(n);
  // Format in IDR billions/millions for readability
  var s = 'Rp ' + (n < 0 ? '(' : '') + abs.toLocaleString('en-US') + (n < 0 ? ')' : '');
  return s;
}

function fmtVar(legacy, klay){
  if (legacy == null || klay == null) return {text:'—', cls:''};
  var v = klay - legacy;
  if (v === 0) return {text:'—', cls:'var-zero'};
  return {text:(v > 0 ? '+' : '') + 'Rp ' + Math.abs(v).toLocaleString('en-US'), cls: v > 0 ? 'var-pos' : 'var-neg'};
}

/* Month catalogue — mirrors revised file. Status drives the skinny rail card style;

/* Top-level Stage 3 (GL Mapping) renderer. */
function renderS3GL(){
  var ssb = document.getElementById('substepbar');
  ssb.style.display = 'none';
  ssb.innerHTML = '';

  /* Stage 4-style page header: title, description, day badge, then content below.
     The overall (year-wide) progress sits between the description and the workspace
     shell — it doesn't change as the user navigates between months in the rail.
     Per-month progress still appears as mini-bars inside each rail card. */
  var html = '<h1 class="stage-title">Transaction Mapping</h1>'
    + '<p class="stage-sub">Confirm how each transaction line has been mapped. Klay has auto-mapped every posting based on its legacy account, but you should verify that each line lands in the right Klay account and carries the right dimensions. Edit the Klay account or dimensions if needed, mark a line for later, or flag it to re-investigate the account mapping in Stage 2.</p>'
    + '<div class="stage-meta"><span>Day 18 of 30</span></div>';

  /* Overall progress bar — aggregated across every closed month. */
  html += glm_renderOverallProgress();

  /* Mount point for the workspace shell. renderS3GL_MonthWorkspace renders into here
     so per-action re-renders don't wipe the title/description/progress above. */
  html += '<div id="glm-shell-mount"></div>';

  /* Bottom nav at the page level (mirrors Stage 4) */
  html += '<div class="signoff-row" id="glm-bottom-nav">'
    + '<button class="btn-ghost" onclick="jumpToStage(2)">&larr; Back to Stage 2 — Account Mapping</button>'
    + '<button class="btn-cont" onclick="jumpToStage(4)">Continue to Stage 4 — Review &rsaquo;</button>'
    + '</div>';

  document.getElementById('main').innerHTML = html;

  /* Render the workspace shell into its mount point */
  renderS3GL_MonthWorkspace(APP.s3gl.ws.activeMonth);
}

function openMonthWorkspace(idx) {
  APP.s3gl.ws.activeMonth = idx;
  if (idx !== 'all' && S3GL_MONTHS[idx] && S3GL_MONTHS[idx].status === 'todo' && idx > 5) {
    /* prototype: only April allowed open for demo; September etc. are placeholder */
  }
  renderMonthWorkspace(idx);
}

function renderMonthWorkspace(monthIdx) {
  /* monthIdx may be a number (0-11) or the string 'all' for the All-months coverage view. */
  var isAllMode = (monthIdx === 'all');
  var mo = isAllMode ? null : S3GL_MONTHS[monthIdx];
  APP.s3gl.ws.activeMonth = monthIdx;

  /* When switching active month/scope, reset cluster/coverage selection so we land on overview */
  if (APP.s3gl.ws._lastMonth !== monthIdx) {
    APP.s3gl.ws.selectedCluster = null;
    APP.s3gl.ws.selectedCoverage = null;
    APP.s3gl.ws.page = 0;
    APP.s3gl.ws.editingRow = null;
    APP.s3gl.ws._lastMonth = monthIdx;
  }

  var totalMapped = S3GL_MONTHS.reduce(function(s,m){return s+m.mapped;},0);
  var totalTxn = S3GL_MONTHS.reduce(function(s,m){return s+m.txn;},0);
  var pct = Math.round(totalMapped/totalTxn*100);

  /* === Skinny month rail (column 1) === */
  /* "All months" pinned at the top, then a divider, then the 12 months. */
  var monthRailHtml = '';
  var allActive = isAllMode;
  var allCardCls = 'skinny-mc-card all-pin' + (allActive ? ' active-all' : '');
  monthRailHtml += '<div class="' + allCardCls + '" onclick="openMonthWorkspace(\'all\')">'
    + '<div class="skinny-mc">'
    +   '<span class="skinny-mc-dot all-dot"></span>'
    +   '<span class="skinny-mc-name all-name">All</span>'
    + '</div>'
    + '<div class="skinny-mc-prog all-bg"><div class="skinny-mc-prog-fill all" style="width:' + getCoverageOverallPct() + '%"></div></div>'
    + '<div class="skinny-mc-all-meta">Coverage</div>'
    + '</div>'
    + '<div class="skinny-mc-divider"></div>';

  S3GL_MONTHS.forEach(function(m, i) {
    var isActive = (!isAllMode) && (i === monthIdx);
    var cardCls = 'skinny-mc-card';
    var dotCls = '';
    var nameCls = '';
    var pillHtml = '';
    var progBar = '';
    var flagsHtml = '';

    if (isActive) cardCls += ' active';

    if (m.status === 'done') {
      if (!isActive) cardCls += ' done';
      dotCls = ' done'; nameCls = ' done';
      pillHtml = '<span class="skinny-mc-pill done">&#10003;</span>';
      progBar = '<div class="skinny-mc-prog done-bg"><div class="skinny-mc-prog-fill done" style="width:100%"></div></div>';
    } else if (m.status === 'active') {
      dotCls = ' active'; nameCls = ' active';
      pillHtml = '<span class="skinny-mc-pill active">' + (m.review || 0) + '</span>';
      progBar = '<div class="skinny-mc-prog active-bg"><div class="skinny-mc-prog-fill active" style="width:' + m.pct + '%"></div></div>';
    } else if (m.status === 'warn') {
      dotCls = ' warn'; nameCls = ' warn';
      pillHtml = '<span class="skinny-mc-pill warn">' + (m.review || 0) + '</span>';
      progBar = '<div class="skinny-mc-prog"><div class="skinny-mc-prog-fill warn" style="width:' + m.pct + '%"></div></div>';
    } else if (m.scenario === 'cutoff-warn') {
      cardCls += ' notclosed'; dotCls = ' todo'; nameCls = ' notclosed';
      pillHtml = '<span class="skinny-mc-pill" style="color:var(--color-warning-text)">&#9651;</span>';
    } else {
      dotCls = ' todo'; nameCls = ' todo';
    }

    /* flag indicators */
    var flagBadges = [];
    if (m.varDetected || (m.varAcct && m.status !== 'todo')) flagBadges.push('<span class="skinny-mc-flag var">&#9651;</span>');
    if (m.flagsOpen && m.flagsOpen > 0) flagBadges.push('<span class="skinny-mc-flag flag-ia">&#128681;' + m.flagsOpen + '</span>');
    if (flagBadges.length > 0) flagsHtml = '<div class="skinny-mc-flags">' + flagBadges.join('') + '</div>';

    monthRailHtml += '<div class="' + cardCls + '" onclick="openMonthWorkspace(' + i + ')">'
      + '<div class="skinny-mc">'
      +   '<span class="skinny-mc-dot' + dotCls + '"></span>'
      +   '<span class="skinny-mc-name' + nameCls + '">' + m.m.substring(0, 3) + '</span>'
      +   pillHtml

  monthRailHtml += '<div class="skinny-mc-rail-overall">'
    + '<div class="skinny-mc-rail-overall-lbl">Overall</div>'
    + '<div class="skinny-mc-rail-overall-bar"><div class="skinny-mc-rail-overall-fill" style="width:' + pct + '%"></div></div>'

  /* ═══════════════════════════════════════════════════════════════
     NEW: 2-column shell — skinny month rail + verification workspace.
     Replaces the original 3-column (rail + cluster col + workspace pane) layout.
     Coverage tiles + pill filters + filter bar + table live in the workspace itself.
     ═══════════════════════════════════════════════════════════════ */

  /* All-months and December not-closed both share the workspace shell now; the
     workspace content adapts based on whether we have a real month or the cross-month roll-up.
     Renders into #glm-shell-mount (created by renderS3GL) so the page-level title,
     description, and overall progress bar above stay intact across action re-renders.
     Falls back to #main only if the mount point isn't present (defensive). */
  var shellHtml = '<div class="ws-shell">'
    +   '<div class="ws-month-rail-skinny">' + monthRailHtml + '</div>'

/* ═══════════════════════════════════════════════════════════════
   GL MAPPING VERIFICATION — workspace renderer + supporting fns.
   Pattern: progress bar → coverage tiles → pill strip → filter bar → table.
