/* Build a canonical TB / P&L from S2_ACCOUNTS.
   Each Klay row aggregates all S2_ACCOUNTS that map to it (its `contribs`).
   Balances are deterministically generated from a seed so they're stable per render. */
function s3_buildStatements(period){
  // period: 'cumulative' (YTD) or 0-8 (month index 0=Jan, 8=Sep)
  // For BS amounts (point-in-time): scale by (monthIdx+1)/9 — Jan = 11%, Sep = 100%
  // For P&L amounts (period flow): use 1/9 with monthly variation
  if (period == null) period = APP.s3 ? APP.s3.period : 'cumulative';
  var isCumulative = (period === 'cumulative');
  var monthIdx = isCumulative ? 8 : parseInt(period, 10);  // Sep = 8
  // BS scaling factor: cumulative through end-of-month
  var bsFactor = isCumulative ? 1 : (monthIdx + 1) / 9;
  // P&L: a per-month "weight" with deterministic variation around 1/9.
  // Months [10, 9, 11, 12, 11, 10, 12, 13, 12] / 100 (sum = 100% across 9 months)
  var monthWeights = [0.10, 0.09, 0.11, 0.12, 0.11, 0.10, 0.12, 0.13, 0.12];
  var plFactor = isCumulative ? 1 : monthWeights[monthIdx];

  // Per-month FX variance on Klay 7-1200 (Realized FX Gain).
  // Small amounts (Rp 5-30M, varying sign per month). Sum across 9 months ≈ small net.
  var fxNoiseByMonth = [
    +18_000_000,   // Jan: Klay realized gain higher
    -12_000_000,   // Feb: Klay lower
    + 8_000_000,   // Mar
    -22_000_000,   // Apr
    +15_000_000,   // May
    -10_000_000,   // Jun
    + 5_000_000,   // Jul
    +25_000_000,   // Aug
    -18_000_000,   // Sep
  ];
  var fxVarianceForPeriod = isCumulative
    ? fxNoiseByMonth.reduce(function(s,v){return s+v;}, 0)
    : fxNoiseByMonth[monthIdx];

  // ── Generate realistic per-account balances based on Klay account category ──
  // Different account categories have different magnitudes — Cash is small, Buildings large,
  // Revenue is the largest. The values approximate an Indonesian trading company at
  // PT. ABC's scale (annual revenue Rp 30-60B, total assets Rp 30-50B).
  function balanceForKlay(code, idx){
    // Deterministic-but-pseudo-random multiplier per account
    var mul = ((idx * 131 + code.charCodeAt(0) * 7 + code.charCodeAt(code.length-1)) % 100) / 100; // 0.00-0.99
    mul = 0.5 + mul; // 0.5-1.49 — keeps variance moderate

    var base = 0;
    // ── ASSETS ──
    if (code === '1-1100') base = 50_000_000;          // Petty Cash
    else if (code === '1-1110') base = 1_500_000_000;  // Bank IDR
    else if (code === '1-1120') base = 800_000_000;    // Bank Foreign
    else if (code === '1-1130') base = 2_000_000_000;  // Time Deposit
    else if (code === '1-1200') base = 6_000_000_000;  // Trade Receivable
    else if (code === '1-1210') base = 1_200_000_000;  // AR Related Party
    else if (code === '1-1220') base = -200_000_000;   // Allowance for Doubtful (contra)
    else if (code === '1-1300') base = 300_000_000;    // Other Receivables
    else if (code === '1-1310') base = 400_000_000;    // Purchase Advances
    else if (code === '1-1320') base = 80_000_000;     // Employee Receivables
    else if (code === '1-1400') base = 250_000_000;    // PPN Masukan
    else if (code === '1-1410') base = 120_000_000;    // PPh 22 Prepayment
    else if (code === '1-1420') base = 180_000_000;    // PPh 25 Installment
    else if (code === '1-1430') base = 60_000_000;     // PPh 29 Overpayment
    else if (code === '1-1500') base = 150_000_000;    // Prepaid Expenses
    else if (code === '1-1510') base = 200_000_000;    // Prepaid Rent
    else if (code === '1-1520') base = 100_000_000;    // Prepaid Insurance
    else if (code === '1-1600') base = 4_500_000_000;  // Merchandise Inventory
    else if (code === '1-1610') base = 1_800_000_000;  // Raw Material
    else if (code === '1-1620') base = 2_200_000_000;  // Finished Goods
    else if (code === '1-1630') base = 350_000_000;    // Supplies
    else if (code === '1-1700') base = 250_000_000;    // Other Current Assets
    else if (code === '1-2100') base = 3_500_000_000;  // Land
    else if (code === '1-2110') base = 5_500_000_000;  // Buildings
    else if (code === '1-2120') base = 1_400_000_000;  // Vehicles
    else if (code === '1-2130') base = 3_200_000_000;  // Equipment & Machinery
    else if (code === '1-2140') base = 600_000_000;    // Office Equipment
    else if (code === '1-2200') base = -1_800_000_000; // Acc. Dep. Buildings
    else if (code === '1-2210') base = -700_000_000;   // Acc. Dep. Vehicles
    else if (code === '1-2220') base = -1_400_000_000; // Acc. Dep. Equipment
    else if (code === '1-2230') base = -300_000_000;   // Acc. Dep. Office Equipment
    else if (code === '1-2300') base = 400_000_000;    // Intangibles
    else if (code === '1-2310') base = -180_000_000;   // Acc. Amort.
    // ── LIABILITIES ──
    else if (code === '2-1000') base = 3_800_000_000;  // Trade Payable
    else if (code === '2-1100') base = 450_000_000;    // Accrued Expenses
    else if (code === '2-1110') base = 380_000_000;    // Accrued Salaries
    else if (code === '2-1200') base = 250_000_000;    // Advance from Customer
    else if (code === '2-1400') base = 0;              // Dividends Payable
    else if (code === '2-1500') base = 200_000_000;    // Other Current Liab
    else if (code === '2-2000') base = 320_000_000;    // PPN Keluaran
    else if (code === '2-2100') base = 85_000_000;     // PPh 21 Payable
    else if (code === '2-2120') base = 45_000_000;     // PPh 23 Payable
    else if (code === '2-2130') base = 30_000_000;     // PPh 4(2) Payable
    else if (code === '2-2150') base = 220_000_000;    // PPh 29 Payable
    else if (code === '2-2300') base = 25_000_000;     // Other Tax Payable
    else if (code === '2-3200') base = 1_500_000_000;  // Related Party LT Loan
    else if (code === '2-3400') base = 800_000_000;    // Employee Benefit Provision
    // ── REVENUE ──
    else if (code === '4-1000') base = 3_200_000_000;  // Sales Revenue — Goods (per account; many feed in)
    else if (code === '4-1200') base = 4_500_000_000;  // Export Revenue
    else if (code === '4-3000') base = -180_000_000;   // Sales Discount (contra)
    else if (code === '4-4000') base = 50_000_000;     // Other Operating Revenue
    // ── COGS ──
    else if (code === '5-1000') base = 1_400_000_000;  // COGS Merchandise (per account)
    else if (code === '5-4000') base = 320_000_000;    // Inbound Freight (per account)
    // ── OPEX ──
    else if (code === '6-1000') base = 380_000_000;    // Salaries (per account)
    else if (code === '6-1100') base = 90_000_000;     // Allowances (per account)
    else if (code === '6-1300') base = 220_000_000;    // THR
    else if (code === '6-1400') base = 75_000_000;     // BPJS Employer (per account)
    else if (code === '6-1500') base = 35_000_000;     // Training
    else if (code === '6-2000') base = 240_000_000;    // Rent
    else if (code === '6-2100') base = 95_000_000;     // Utilities
    else if (code === '6-2200') base = 28_000_000;     // Telecommunications (per)
    else if (code === '6-2300') base = 65_000_000;     // Maintenance
    else if (code === '6-3000') base = 180_000_000;    // Depreciation (per)
    else if (code === '6-3100') base = 65_000_000;     // Amortization (per)
    else if (code === '6-4000') base = 95_000_000;     // Advertising (per)
    else if (code === '6-4100') base = 145_000_000;    // Logistics
    else if (code === '6-5000') base = 75_000_000;     // Professional Services (per)
    else if (code === '6-5100') base = 22_000_000;     // Office Supplies (per)
    else if (code === '6-5200') base = 55_000_000;     // Business Travel (per)
    else if (code === '6-5300') base = 35_000_000;     // Entertainment
    else if (code === '6-5400') base = 28_000_000;     // Insurance (per)
    else if (code === '6-5500') base = 18_000_000;     // Licenses & Regulatory
    else if (code === '6-5600') base = 45_000_000;     // Bad Debt
    else if (code === '6-5700') base = 20_000_000;     // Other G&A (per)
    // ── NON-OP ──
    else if (code === '7-1000') base = 35_000_000;     // Interest income
    else if (code === '7-1100') base = 20_000_000;     // Gain on disposal
    else if (code === '7-1200') base = 75_000_000;     // Realized FX gain
    else if (code === '7-1300') base = 0;              // Unrealized FX gain (SCHEMA)
    else if (code === '7-1400') base = 15_000_000;     // Other Non-Op Income
    else if (code === '7-2000') base = 240_000_000;    // Interest expense
    else if (code === '7-2100') base = 12_000_000;     // Loss on disposal
    else if (code === '7-2200') base = 55_000_000;     // Realized FX loss
    else if (code === '7-2300') base = 0;              // Unrealized FX loss (SCHEMA)
    else if (code === '7-2400') base = 8_000_000;      // Other Non-Op Expense
    // ── INCOME TAX ──
    else if (code === '8-1000') base = 600_000_000;     // Income Tax (per account; ~3 contribs sum to ≈25% of pre-tax)
    else base = 25_000_000;                             // fallback

    // Slight per-contributor variance so multiple accounts mapping to same Klay code aren't identical
    return Math.round(base * mul / 1_000_000) * 1_000_000;
  }

  // Group S2_ACCOUNTS by newCode (Klay account)
  var byKlay = {};
  S2_ACCOUNTS.forEach(function(a, idx){
    if (a.isHeader) return; // skip structural rows
    var code = a.newCode;
    var meta = S3_KLAY_META[code];
    if (!meta) return;
    if (!byKlay[code]) byKlay[code] = {meta:meta, contribs:[]};
    var bal = balanceForKlay(code, idx);
    // Scale by period: BS sections (Assets/Liab/Equity) use BS cumulative factor;
    // P&L sections (Rev/COGS/OpEx/NonOp/Tax) use period flow factor.
    var isPL = (meta.section === 'REVENUE' || meta.section === 'COGS' || meta.section === 'OPEX' ||
                meta.section === 'NONOP' || meta.section === 'TAX');
    var factor = isPL ? plFactor : bsFactor;
    bal = Math.round(bal * factor / 1_000_000) * 1_000_000;
    byKlay[code].contribs.push({old:a.old, oldName:a.oldName, legacy:bal, klay:bal, _ref:a});
  });

  // ── Variance scenario: placement-error correction ──
  // Legacy account `12310,0,20 Account Payable` is filed under Current Assets in PT. ABC's CoA
  // (a long-standing bookkeeping error — see Stage 2 reason). The AI correctly maps it to
  // Klay's `2-1000 Utang Usaha` (Trade Payable, Liability section).
  //
  // To reconcile against the legacy reference, the legacy-side amount needs to appear in
  // Legacy Assets, while the klay-side amount appears in Klay Liabilities. We accomplish this by:
  //   1. Stripping the legacy amount from the 2-1000 contributor (so Legacy Liabilities total
  //      doesn't include it — it's only in the Klay-derived view)
  //   2. Injecting a phantom "Legacy-only" asset row (so Legacy Assets total picks it up)
  //
  // Result:
  //   - Klay Total Assets < Legacy Total Assets by the placement amount
  //   - Klay Total Liabilities > Legacy Total Liabilities by the same amount
  //   - Both balance sheets still tie (A = L + E on each side)
  //   - User sees the variance, clicks Investigate, jumps to Stage 2 and sees the placement annotation
  var placementVariance = 0;
  var placementOldName = '';
  if (byKlay['2-1000']) {
    var pe = byKlay['2-1000'].contribs.find(function(c){return c.old === '12310,0,20';});
    if (pe) {
      // For demo, use a small but meaningful amount — a year-old vendor invoice that got
      // misfiled. Real-world placement errors tend to be modest amounts like this.
      // Scale by BS cumulative factor — Jan-end shows partial accumulation, Sep/YTD shows full.
      var smallAmt = Math.round(185_000_000 * bsFactor / 1_000_000) * 1_000_000;
      pe.legacy = 0;
      pe.klay = smallAmt;
      placementVariance = smallAmt;
      placementOldName = pe.oldName;
      pe.varNote = 'Placement-error correction: legacy CoA filed this under Assets, Klay correctly classifies it as Liability.';
    }
  }
  // Inject a phantom legacy-side asset entry so Legacy Total Assets picks up the amount
  // while Klay Total Assets does not. We attach it to 1-1700 Other Current Assets (where a
  // mis-filed AP would have sat under generic "Other CA" if not specifically classified).
  if (placementVariance > 0) {
    if (!byKlay['1-1700']) byKlay['1-1700'] = {meta:S3_KLAY_META['1-1700'], contribs:[]};
    byKlay['1-1700'].contribs.push({
      old:'12310,0,20',
      oldName:placementOldName + ' (legacy CoA placement)',
      legacy:placementVariance, klay:0,
      varNote:'Legacy-only — Klay reclassifies this account to 2-1000 Utang Usaha (Liability). Investigate to remove from assets.'
    });
  }

  // ── Variance scenario 2: FX revaluation timing differences ──
  // Indonesian companies with USD/JPY exposure see small month-end FX revaluation
  // variances between systems (different rate sources or timing). The amount varies by month.
  // Applied to Klay 7-1200 (Realized FX Gain) — the user's primary FX touchpoint.
  if (fxVarianceForPeriod !== 0 && byKlay['7-1200']) {
    byKlay['7-1200'].contribs.push({
      old:'—',
      oldName:'FX revaluation timing difference' + (isCumulative ? ' (YTD net)' : ''),
      legacy:0, klay:fxVarianceForPeriod,
      varNote:isCumulative
        ? 'Sum of month-end FX revaluation differences across Jan-Sep. Mostly offsetting; small net residual.'
        : 'Month-end FX revaluation rate difference. Will reverse next month.'
    });
  }

  // ── Roll up totals per Klay row (preliminary, to compute residual equity) ──
  Object.keys(byKlay).forEach(function(k){
    var row = byKlay[k];
    row.legacy = row.contribs.reduce(function(s,c){return s+c.legacy;}, 0);
    row.klay   = row.contribs.reduce(function(s,c){return s+c.klay;},   0);
  });

  // ── Compute P&L flows (Pre-tax → Tax → Net income) FIRST ──
  // Tax already comes from the S2 OPEX dataset (8-1000); we don't need to synthesize it.
  // But the existing S2 mapping puts deferred tax accounts there too — which is fine for now.
  var sumSection = function(secName, side){
    return Object.keys(byKlay)
      .filter(function(k){return byKlay[k].meta.section === secName;})
      .reduce(function(s, k){return s + byKlay[k][side];}, 0);
  };
  var revL = sumSection('REVENUE', 'legacy'), revK = sumSection('REVENUE', 'klay');
  var cogsL = sumSection('COGS', 'legacy'), cogsK = sumSection('COGS', 'klay');
  var opexL = sumSection('OPEX', 'legacy'), opexK = sumSection('OPEX', 'klay');

  // Non-op net (income − expense) within section 7
  var nonopIncomeL = ['7-1000','7-1100','7-1200','7-1400'].reduce(function(s,k){return s + (byKlay[k] ? byKlay[k].legacy : 0);}, 0);
  var nonopIncomeK = ['7-1000','7-1100','7-1200','7-1400'].reduce(function(s,k){return s + (byKlay[k] ? byKlay[k].klay : 0);}, 0);
  var nonopExpL = ['7-2000','7-2100','7-2200','7-2400'].reduce(function(s,k){return s + (byKlay[k] ? byKlay[k].legacy : 0);}, 0);
  var nonopExpK = ['7-2000','7-2100','7-2200','7-2400'].reduce(function(s,k){return s + (byKlay[k] ? byKlay[k].klay : 0);}, 0);

  // Pre-tax = Revenue − COGS − OpEx + NonOp Income − NonOp Expense
  var pretaxL = revL - cogsL - opexL + nonopIncomeL - nonopExpL;
  var pretaxK = revK - cogsK - opexK + nonopIncomeK - nonopExpK;

  // Tax — from S2 if present (8-1000), otherwise compute as 25% of pre-tax
  var taxL, taxK;
  if (byKlay['8-1000']) {
    taxL = byKlay['8-1000'].legacy;
    taxK = byKlay['8-1000'].klay;
  } else {
    taxL = Math.round(pretaxL * 0.25 / 1_000_000) * 1_000_000;
    taxK = Math.round(pretaxK * 0.25 / 1_000_000) * 1_000_000;
    byKlay['8-1000'] = {meta:S3_KLAY_META['8-1000'], contribs:[
      {old:'—', oldName:'Computed: 25% × Pre-tax income (synthesized)', legacy:taxL, klay:taxK}
    ]};
    byKlay['8-1000'].legacy = taxL;
    byKlay['8-1000'].klay = taxK;
  }

  // Net income = Pre-tax − Tax
  var netL = pretaxL - taxL;
  var netK = pretaxK - taxK;

  // ── Equity: Modal Disetor fixed; Saldo Laba computed as residual so BS balances ──
  // BS balance: Total Assets = Total Liabilities + Modal Disetor + Saldo Laba + Net Income
  // ⇒ Saldo Laba = Total Assets − Total Liabilities − Modal Disetor − Net Income
  var totalAssetsL = sumSection('ASSETS', 'legacy');
  var totalAssetsK = sumSection('ASSETS', 'klay');
  var totalLiabL = sumSection('LIABILITIES', 'legacy');
  var totalLiabK = sumSection('LIABILITIES', 'klay');
  var modalDisetor = 20_000_000_000;
  var saldoLabaL = totalAssetsL - totalLiabL - modalDisetor - netL;
  var saldoLabaK = totalAssetsK - totalLiabK - modalDisetor - netK;

  byKlay['3-1000'] = {
    meta: S3_KLAY_META['3-1000'],
    contribs: [{old:'3100', oldName:'Modal Disetor', legacy:modalDisetor, klay:modalDisetor}],
    legacy: modalDisetor, klay: modalDisetor,
  };
  byKlay['3-2000'] = {
    meta: S3_KLAY_META['3-2000'],
    contribs: [{old:'3200', oldName:'Saldo Laba (Retained Earnings)', legacy:saldoLabaL, klay:saldoLabaK,
                varNote: (saldoLabaL !== saldoLabaK) ? 'Variance flows from Asset/Liability variances above' : ''}],
    legacy: saldoLabaL, klay: saldoLabaK,
  };


  byKlay['3-3000'] = {meta:S3_KLAY_META['3-3000'], contribs:[
    {old:'—', oldName:'Computed: Pre-tax income − Tax expense',
     legacy:netL, klay:netK,
     varNote: (netK !== netL) ? 'Variance flows from P&L (' + (netK > netL ? '+' : '') + 'Rp ' + Math.abs(netK - netL).toLocaleString() + ')' : ''}
  ]};
  byKlay['3-3000'].legacy = netL;
  byKlay['3-3000'].klay = netK;

  // ── Build sectioned arrays for TB and P&L ──
  function buildSectioned(sectionList, sectionLabels){
    var out = [];
    sectionList.forEach(function(secName){
      // Section header
      out.push({section:secName, label:sectionLabels[secName], kind:'section'});
      // All Klay rows in this section, sorted by order
      var rows = Object.keys(byKlay)
        .filter(function(k){return byKlay[k].meta.section === secName;})
        .sort(function(a,b){return byKlay[a].meta.order - byKlay[b].meta.order;});
      rows.forEach(function(k){
        var r = byKlay[k];
        // Skip rows with zero balance on both sides
        if (r.legacy === 0 && r.klay === 0) return;
        out.push({
          acct: k,
          name: r.meta.name,
          legacy: r.legacy,
          klay:   r.klay,
          contribs: r.contribs
        });
      });
    });
    return out;
  }

  var tbSections = ['ASSETS', 'LIABILITIES', 'EQUITY'];
  var tbLabels = {ASSETS:'Assets', LIABILITIES:'Liabilities', EQUITY:'Equity'};
  var tb = buildSectioned(tbSections, tbLabels);

  // Compute and inject subtotals/totals after each section.
  // For TB: the grand total is "Total liabilities & equity" — sums only L+E (not Assets), since A = L + E.
  var injectSubtotals = function(rows, sectionList, labelPrefix, finalKey, finalLabel, finalSections){
    var result = [];
    sectionList.forEach(function(secName){
      // Find this section's slice
      var slice = [];
      var mode = false;
      rows.forEach(function(r){
        if (r.section === secName) { mode = true; result.push(r); return; }
        if (r.section && r.section !== secName && mode) { mode = false; }
        if (mode) { slice.push(r); result.push(r); }
      });
      var legSum = slice.reduce(function(s,r){return s + (r.legacy||0);}, 0);
      var klaySum = slice.reduce(function(s,r){return s + (r.klay||0);}, 0);
      result.push({section:'TOTAL_'+secName, label:'Total ' + (labelPrefix[secName] || secName.toLowerCase()), kind:'subtotal', legacy:legSum, klay:klaySum});
    });
    // Grand total — sums only the sections specified by finalSections (allowing TB to use L+E only)
    if (finalKey) {
      var totalL = 0, totalK = 0;
      var sectionsToSum = finalSections || sectionList;
      sectionsToSum.forEach(function(secName){
        var st = result.find(function(r){return r.section === 'TOTAL_'+secName;});
        if (st) { totalL += st.legacy; totalK += st.klay; }
      });
      result.push({section:finalKey, label:finalLabel, kind:'total', legacy:totalL, klay:totalK});
    }
    return result;
  };

  // Add legacy-only structural rows (parent groupings)
  var legacyOnlyAssets = [
    {acct:'L:1000', name:'ASET (parent grouping)',         legacy:null, klay:null, legacyOnly:true,
      note:'Top-level Indonesian parent — Klay structure has no equivalent.'},
    {acct:'L:1100', name:'Aset Lancar (parent grouping)',  legacy:null, klay:null, legacyOnly:true,
      note:'Mid-level grouping — collapsed into Klay\'s flat structure.'},
    {acct:'L:1500', name:'Aset Tetap (parent grouping)',   legacy:null, klay:null, legacyOnly:true,
      note:'Mid-level grouping — collapsed into Klay\'s flat structure.'},
  ];
  // Build TB with subtotals (grand total = LIABILITIES + EQUITY only)
  var tbWithSubtotals = injectSubtotals(tb, tbSections, {ASSETS:'assets', LIABILITIES:'liabilities', EQUITY:'equity'}, 'TOTAL_LE', 'Total liabilities & equity', ['LIABILITIES', 'EQUITY']);
  // Splice legacy-only rows just before TOTAL_ASSETS
  var assetSubIdx = tbWithSubtotals.findIndex(function(r){return r.section === 'TOTAL_ASSETS';});
  if (assetSubIdx > -1) tbWithSubtotals.splice.apply(tbWithSubtotals, [assetSubIdx, 0].concat(legacyOnlyAssets));

  // Force the BS to balance: A = L + E.
  // Compute deltaL/deltaK = (Liabilities + Equity) - Assets, and subtract from Retained earnings.
  var assetTotal = tbWithSubtotals.find(function(r){return r.section === 'TOTAL_ASSETS';});
  var liabTotal = tbWithSubtotals.find(function(r){return r.section === 'TOTAL_LIABILITIES';});
  var eqTotal = tbWithSubtotals.find(function(r){return r.section === 'TOTAL_EQUITY';});
  var grand = tbWithSubtotals.find(function(r){return r.section === 'TOTAL_LE';});
  if (assetTotal && liabTotal && eqTotal && grand) {
    var deltaL = (liabTotal.legacy + eqTotal.legacy) - assetTotal.legacy; // by how much L+E exceeds A
    var deltaK = (liabTotal.klay   + eqTotal.klay)   - assetTotal.klay;
    // Adjust Retained earnings DOWN by delta (so L+E shrinks to match A)
    var retained = byKlay['3-2000'];
    var retainedRow = tbWithSubtotals.find(function(r){return r.acct === '3-2000';});
    if (retained && retainedRow) {
      retained.legacy -= deltaL; retained.klay -= deltaK;
      retained.contribs[0].legacy -= deltaL; retained.contribs[0].klay -= deltaK;
      retainedRow.legacy = retained.legacy; retainedRow.klay = retained.klay; retainedRow.contribs = retained.contribs;
      eqTotal.legacy -= deltaL; eqTotal.klay -= deltaK;
      grand.legacy -= deltaL;   grand.klay -= deltaK;
    }
  }

  // Build P&L — full structure: Revenue → COGS → Gross → OpEx → OpInc → NonOp → Pre-tax → Tax → Net
  var plSections = ['REVENUE', 'COGS', 'OPEX', 'NONOP', 'TAX'];
  var plLabels = {REVENUE:'Revenue', COGS:'Cost of sales', OPEX:'Operating expenses', NONOP:'Non-operating income / expense', TAX:'Income tax'};
  var pl = buildSectioned(plSections, plLabels);
  // Add legacy-only P&L row
  pl.push({acct:'L:6000', name:'BEBAN OPERASIONAL (parent grouping)', legacy:null, klay:null, legacyOnly:true,
    note:'Top-level Indonesian P&L parent — Klay has no equivalent.'});
  var plWithSubtotals = injectSubtotals(pl, plSections, {REVENUE:'revenue', COGS:'cost of sales', OPEX:'operating expenses', NONOP:'non-operating', TAX:'income tax'}, null, null);

  // Insert Gross profit after COGS subtotal
  var cogsSubIdx = plWithSubtotals.findIndex(function(r){return r.section === 'TOTAL_COGS';});
  if (cogsSubIdx > -1) {
    var revSub = plWithSubtotals.find(function(r){return r.section === 'TOTAL_REVENUE';});
    var cogsSub = plWithSubtotals[cogsSubIdx];
    plWithSubtotals.splice(cogsSubIdx + 1, 0,
      {section:'GROSS', label:'Gross profit', kind:'subtotal',
       legacy:revSub.legacy - cogsSub.legacy, klay:revSub.klay - cogsSub.klay});
  }
  // Insert Operating income after OPEX subtotal
  var opexSubIdx = plWithSubtotals.findIndex(function(r){return r.section === 'TOTAL_OPEX';});
  if (opexSubIdx > -1) {
    var gross = plWithSubtotals.find(function(r){return r.section === 'GROSS';});
    var opexSub = plWithSubtotals[opexSubIdx];
    plWithSubtotals.splice(opexSubIdx + 1, 0,
      {section:'OPINC', label:'Operating income', kind:'subtotal',
       legacy:gross.legacy - opexSub.legacy, klay:gross.klay - opexSub.klay});
  }
  // Insert Pre-tax income after NONOP subtotal: OpInc + NonOp net
  var nonopSubIdx = plWithSubtotals.findIndex(function(r){return r.section === 'TOTAL_NONOP';});
  if (nonopSubIdx > -1) {
    var opinc = plWithSubtotals.find(function(r){return r.section === 'OPINC';});
    // The NONOP subtotal sums all non-op rows (income + expense as positive numbers since both are stored positive).
    // To compute the "net" non-op effect, recompute from byKlay
    var nonopNetL = nonopIncomeL - nonopExpL;
    var nonopNetK = nonopIncomeK - nonopExpK;
    plWithSubtotals.splice(nonopSubIdx + 1, 0,
      {section:'PRETAX', label:'Pre-tax income', kind:'subtotal',
       legacy:opinc.legacy + nonopNetL, klay:opinc.klay + nonopNetK});
  }
  // Net income = Pre-tax − Tax (placed at the very end after the TAX section subtotal)
  var taxSubIdx = plWithSubtotals.findIndex(function(r){return r.section === 'TOTAL_TAX';});
  if (taxSubIdx > -1) {
    var pretax = plWithSubtotals.find(function(r){return r.section === 'PRETAX';});
    var taxSub = plWithSubtotals[taxSubIdx];
    plWithSubtotals.push({section:'NET', label:'Net income', kind:'total',
      legacy:pretax.legacy - taxSub.legacy, klay:pretax.klay - taxSub.klay});
  } else {
    // Fallback if no TAX section
    var opincFallback = plWithSubtotals.find(function(r){return r.section === 'OPINC';});
    if (opincFallback) {
      plWithSubtotals.push({section:'NET', label:'Net income', kind:'total',
        legacy:opincFallback.legacy, klay:opincFallback.klay});
    }
  }

  return {tb:tbWithSubtotals, pl:plWithSubtotals};
}

// Initial data — rebuilt per-render in renderS3() based on APP.s3.period
var __S3_DATA = s3_buildStatements();
var S3_TB = __S3_DATA.tb;
var S3_PL = __S3_DATA.pl;

function s3_refreshData(){
  __S3_DATA = s3_buildStatements(APP.s3.period);
  S3_TB = __S3_DATA.tb;
  S3_PL = __S3_DATA.pl;
}

/* Balance Sheet just rolls up TB into a presentation order; reuse for prototype */
function s3_buildBS(){
  // Mirror TB but presented BS-style. For prototype, reuse TB rows.
  return S3_TB;
}

function fmt(n){
  if (n === 0 || n == null) return '—';
  var abs = Math.abs(n);
  // Format in IDR billions/millions for readability
  var s = 'Rp ' + (n < 0 ? '(' : '') + abs.toLocaleString('en-US') + (n < 0 ? ')' : '');
  return s;
}

function fmtVar(legacy, klay){
  if (legacy == null || klay == null) return {text:'—', cls:''};
  var v = klay - legacy;
  if (v === 0) return {text:'—', cls:'var-zero'};
  return {text:(v > 0 ? '+' : '') + 'Rp ' + Math.abs(v).toLocaleString('en-US'), cls: v > 0 ? 'var-pos' : 'var-neg'};
}

function renderS3(){
  // Hide the substep bar — Stage 3 is now a single workspace, no stepper
  var ssb = document.getElementById('substepbar');
  ssb.style.display = 'none';
  ssb.innerHTML = '';

  // Recompute statements based on current period selection (YTD or specific month)
  s3_refreshData();

  var html = '<h1 class="stage-title">Financial Statement Reviews</h1>'
    + '<p class="stage-sub">Reconcile your Klay-derived financial statements against the Legacy reference uploaded in Stage 1. Investigate any variance — if a row needs remapping, jump back to Stage 2.</p>'
    + '<div class="stage-meta"><span>Days 18–22 of 30</span></div>';

  // ── 2-COLUMN SHELL (mirrors Stage 2) ──
  html += '<div class="s3-shell">';
  html += s3_renderPeriodCol();
  html += s3_renderMainCol();
  html += '</div>';

  // ── BOTTOM NAV ──
  html += '<div class="signoff-row">';
  html += '<button class="btn-ghost" onclick="jumpToStage(2)">&larr; Back to Stage 2 — Account Mapping</button>';
  html += '<button class="btn-cont" onclick="jumpToStage(4)">Continue to UAT &rsaquo;</button>';
  html += '</div>';

  document.getElementById('main').innerHTML = html;
}

/* ── COLUMN 1: Period rail (ALL + months) ── */
function s3_renderPeriodCol(){
  var p = APP.s3.period;
  var html = '<div class="s2-prail">';
  html += '<div class="s2-prail-list">';

  // Compute variance count for a given period (used for status indicators)
  function varCountFor(period){
    var data = s3_buildStatements(period);
    return data.tb.filter(function(r){
      if (r.kind || r.section || r.legacyOnly) return false;
      return r.legacy !== r.klay;
    }).length;
  }

  // ALL row
  var allVarCount = varCountFor('cumulative');
  html += '<div class="s2-prail-item all ' + (p === 'cumulative' ? 'active' : '') + '" onclick="s3_setPeriod(\'cumulative\')">'
    + '<span>ALL</span>'
    + '<span class="s2-prail-num">YTD</span>'
    + '</div>';

  S2_MONTHS.forEach(function(m, i){
    var active = (p === i || p === String(i));
    var monthVarCount = varCountFor(i);
    // Status: green check if no variance, amber dot if small, red ! if material
    // (For our demo: the placement-error always shows as variance, plus per-month FX noise)
    var markCls, markIcon;
    if (monthVarCount === 0) { markCls = 'done'; markIcon = '&#10003;'; }
    else { markCls = 'flag'; markIcon = '!'; }
    html += '<div class="s2-prail-item ' + (active ? 'active' : '') + '" onclick="s3_setPeriod(' + i + ')">'
      + '<span class="s2-prail-mark ' + markCls + '">' + markIcon + '</span>'
      + '<span>' + m.m + '</span>';
    html += '</div>';
  });
  html += '</div>';

  // Footer — summary of variance count for current period
  var varCount = S3_TB.filter(function(r){
    if (r.kind || r.section || r.legacyOnly) return false;
    return r.legacy !== r.klay;
  }).length;
  html += '<div class="s2-prail-foot">'
    + '<div class="s2-prail-foot-lbl">Variances</div>'
    + '<div class="s2-prail-foot-val">' + varCount + ' account' + (varCount === 1 ? '' : 's')
    + '</div></div>';

  html += '</div>';
  return html;
}

/* ── COLUMN 2: Main content (tabs + summary + table) ── */
function s3_renderMainCol(){
  var v = APP.s3.view;
  var p = APP.s3.period;
  var periodLabel = (p === 'cumulative') ? 'YTD · Jan–Sep 2025' : (S2_MONTHS[parseInt(p, 10)] && S2_MONTHS[parseInt(p, 10)].full) || 'Selected period';

  var html = '<div class="s3-main">';

  // Tabs at the top of the main area
  var tabs = [
    {k:'tb', l:'Trial Balance'},
    {k:'bs', l:'Balance Sheet'},
    {k:'pl', l:'P&L'}
  ];
  html += '<div class="s3-tabs">';
  tabs.forEach(function(t){
    var cls = v === t.k ? 'active' : '';
    html += '<button class="s3-tab ' + cls + '" onclick="s3_setView(\'' + t.k + '\')">' + t.l + '</button>';
  });
  html += '<div class="s3-period-lbl">' + periodLabel + '</div>';
  html += '</div>';

  // Resolve dataset and totals for the active tab
  var ds = s3_datasetFor(v);
  var totals = s3_totalsFor(v);

  // ── 3 SUMMARY BOXES ──
  html += s3_renderSummary(totals);

  // Variance handling
  var diffSubset = ds.filter(function(r){ return !(r.kind || r.section) && !r.legacyOnly && r.legacy !== r.klay; });
  var hasVariance = diffSubset.length > 0;

  // Filter + ViewBy toggles
  var showAll = APP.s3.showAll || false;
  var viewBy = APP.s3.viewBy || 'klay';
  html += '<div class="s3-filter-row">';
  // Count legacy contributors across all Klay rows for accurate label
  var legacyContribCount = ds.reduce(function(s, r){
    if (r.kind || r.section || r.legacyOnly) return s;
    return s + (r.contribs ? r.contribs.length : 0);
  }, 0);
  var klayRowCount = ds.filter(function(r){return !(r.kind || r.section || r.legacyOnly);}).length;

  html += '<div class="s3-filter-grp">';
  html += '<button class="s2-ws-filt-btn ' + (!showAll ? 'active' : '') + '" onclick="s3_setShowAll(false)">Variances only (' + diffSubset.length + ')</button>';
  html += '<button class="s2-ws-filt-btn ' + (showAll ? 'active' : '') + '" onclick="s3_setShowAll(true)">All accounts</button>';
  html += '</div>';
  // View by toggle — three options
  html += '<div class="s3-viewby">';
  html += '<span class="s3-viewby-lbl">View by:</span>';
  html += '<button class="s2-ws-filt-btn ' + (viewBy === 'klay' ? 'active' : '') + '" onclick="s3_setViewBy(\'klay\')">Klay account (' + klayRowCount + ')</button>';
  html += '<button class="s2-ws-filt-btn ' + (viewBy === 'bylegacy' ? 'active' : '') + '" onclick="s3_setViewBy(\'bylegacy\')">Legacy account (' + legacyContribCount + ')</button>';
  html += '<button class="s2-ws-filt-btn ' + (viewBy === 'legacy' ? 'active' : '') + '" onclick="s3_setViewBy(\'legacy\')">Side-by-side</button>';
  html += '</div>';
  html += '</div>';

  if (hasVariance && viewBy === 'klay') {
    html += '<div class="s3-help-row">Click ▶ to expand a Klay row and see its legacy contributors. <strong>Investigate</strong> jumps back to Stage 2 mapping.</div>';
  } else if (viewBy === 'bylegacy') {
    html += '<div class="s3-help-row">One row per legacy account. Rows grouped by their Klay mapping target — adjacent rows with the same target represent many-to-one consolidations.</div>';
  }

  // Table
  if (viewBy === 'klay') {
    html += s3_renderTable(ds, v, showAll);
  } else if (viewBy === 'bylegacy') {
    html += s3_renderByLegacy(ds, v, showAll);
  } else {
    html += s3_renderLegacyView(ds, v, showAll);
  }

  html += '</div>'; // /s3-main
  return html;
}

/* Choose dataset based on view */
function s3_datasetFor(view){
  if (view === 'tb') return S3_TB;
  if (view === 'pl') return S3_PL;
  // 'bs' — only A/L/E sections of TB
  return S3_TB.filter(function(r){
    if (!r.kind && !r.section) return true;
    return ['ASSETS','TOTAL_ASSETS','LIABILITIES','TOTAL_LIABILITIES','EQUITY','TOTAL_EQUITY','TOTAL_LE'].indexOf(r.section) !== -1;
  });
}

/* Totals for header summary boxes */
function s3_totalsFor(view){
  var ds = s3_datasetFor(view);
  // Strategy: pick a representative grand-total row.
  var key;
  if (view === 'tb') key = 'TOTAL_LE';   // use total L+E (matches total assets)
  else if (view === 'bs') key = 'TOTAL_LE';
  else key = 'NET'; // P&L → net income
  var row = ds.find(function(r){return r.section === key;});
  if (!row) return {legacy:0, klay:0, label:'Total'};
  // Friendly label
  var label = key === 'NET' ? 'Net income' : (key === 'TOTAL_LE' ? 'Total assets' : (row.label || 'Total'));
  return {legacy: row.legacy, klay: row.klay, label: label};
}

/* Render the 3 summary boxes */
function s3_renderSummary(t){
  var v = (t.klay || 0) - (t.legacy || 0);
  var pct = (t.legacy && t.legacy !== 0) ? (v / Math.abs(t.legacy)) * 100 : 0;

  var box;
  if (v === 0) box = {tone:'ok', icon:'&#10003;', label:'In sync', sub:'Klay matches Legacy exactly'};
  else if (Math.abs(pct) <= 0.1) box = {tone:'warn', icon:'!', label:'Within tolerance', sub:'Δ less than 0.1% of Legacy'};
  else box = {tone:'bad', icon:'&times;', label:'Material variance', sub:'Δ exceeds 0.1% threshold'};

  var html = '<div class="s3-summary">';
  // Legacy
  html += '<div class="s3-sumbox">';
  html += '<div class="s3-sumbox-lbl">Legacy ' + t.label.toLowerCase() + '</div>';
  html += '<div class="s3-sumbox-val">' + s3_fmtIDR(t.legacy) + '</div>';
  html += '<div class="s3-sumbox-sub">Reference (Stage 1 upload)</div>';
  html += '</div>';
  // Klay
  html += '<div class="s3-sumbox">';
  html += '<div class="s3-sumbox-lbl">Klay ' + t.label.toLowerCase() + '</div>';
  html += '<div class="s3-sumbox-val">' + s3_fmtIDR(t.klay) + '</div>';
  html += '<div class="s3-sumbox-sub">Derived from mapped GL</div>';
  html += '</div>';
  // Variance
  html += '<div class="s3-sumbox s3-sumbox-' + box.tone + '">';
  html += '<div class="s3-sumbox-lbl">Variance</div>';
  var sign = v > 0 ? '+' : v < 0 ? '−' : '';
  var absStr = (v === 0) ? '—' : ('Rp ' + Math.abs(v).toLocaleString('en-US'));
  html += '<div class="s3-sumbox-val">' + sign + (v === 0 ? '' : ' ') + absStr + '</div>';
  html += '<div class="s3-sumbox-sub"><span class="s3-sumbox-icon">' + box.icon + '</span> ' + box.label + ' &middot; ' + box.sub + '</div>';
  html += '</div>';
  html += '</div>';
  return html;
}

function s3_fmtIDR(n){
  if (n === 0 || n == null) return 'Rp 0';
  var abs = Math.abs(n);
  // For summary boxes we prefer Bn/Mn for readability
  if (abs >= 1_000_000_000) return 'Rp ' + (n / 1_000_000_000).toFixed(2) + 'B';
  if (abs >= 1_000_000) return 'Rp ' + (n / 1_000_000).toFixed(1) + 'M';
  return 'Rp ' + n.toLocaleString('en-US');
}

/* Comparison table */
/* ── PATTERN 1: Klay-anchored with expand-to-show-legacy-contributors ── */
function s3_renderTable(ds, view, showAll){
  var html = '<div class="compare-table-wrap"><table class="compare-table">';
  var legacyHdr, klayHdr;
  if (view === 'tb') { legacyHdr = 'Legacy TB'; klayHdr = 'Klay TB'; }
  else if (view === 'bs') { legacyHdr = 'Legacy'; klayHdr = 'Klay'; }
  else { legacyHdr = 'Legacy P&L'; klayHdr = 'Klay P&L'; }

  html += '<thead><tr>'
    + '<th style="width:30px"></th>'
    + '<th style="width:120px">Account</th>'
    + '<th>Name</th>'
    + '<th class="num">' + legacyHdr + '</th>'
    + '<th class="num">' + klayHdr + '</th>'
    + '<th class="num" style="width:170px">Variance</th>'
    + '<th style="width:120px"></th>'
    + '</tr></thead><tbody>';

  // Helper: find the subtotal that follows a given section header.
  // The TOTAL_ row's `legacy` value is what the Stage 1 Legacy TB upload would have totaled
  // for this section; `klay` is what Klay computed.
  function findSectionSubtotal(secName, fromIdx){
    // Section name 'ASSETS' → subtotal 'TOTAL_ASSETS'; equity sums into 'TOTAL_EQUITY' but the BS grand total is 'TOTAL_LE'
    var key = 'TOTAL_' + secName;
    for (var j = fromIdx; j < ds.length; j++) {
      if (ds[j].section === key) return ds[j];
    }
    return null;
  }

  // Group rows into a structured pass: section banner → klay accounts → legacy-only group → subtotal
  var i = 0;
  while (i < ds.length) {
    var r = ds[i];
    if (r.kind === 'section') {
      // Emit a section banner that shows the Stage 1 upload reconciliation
      var sub = findSectionSubtotal(r.section, i + 1);
      if (sub) {
        var sv = fmtVar(sub.legacy, sub.klay);
        var diff = sub.klay - sub.legacy;
        var pctOfLegacy = (sub.legacy !== 0) ? Math.abs(diff) / Math.abs(sub.legacy) * 100 : 0;
        var tone;
        if (diff === 0) tone = 'ok';
        else if (pctOfLegacy <= 0.1) tone = 'warn';
        else tone = 'bad';
        html += '<tr class="s3-secbanner s3-secbanner-' + tone + '"><td colspan="7">';
        html += '<div class="s3-secbanner-row">';
        html += '<div class="s3-secbanner-label">' + r.label + '</div>';
        html += '<div class="s3-secbanner-pair">';
        html += '<span class="s3-secbanner-side"><span class="s3-secbanner-side-lbl">Stage 1 upload</span><span class="s3-secbanner-side-val">' + fmt(sub.legacy) + '</span></span>';
        html += '<span class="s3-secbanner-arrow">→</span>';
        html += '<span class="s3-secbanner-side"><span class="s3-secbanner-side-lbl">Klay derived</span><span class="s3-secbanner-side-val">' + fmt(sub.klay) + '</span></span>';
        html += '</div>';
        html += '<div class="s3-secbanner-var ' + tone + '">';
        if (diff === 0) html += '<span class="s3-secbanner-var-icon">&#10003;</span> Reconciled';
        else html += '<span class="s3-secbanner-var-icon">' + (tone === 'bad' ? '&times;' : '!') + '</span> Δ ' + sv.text;
        html += '</div>';
        html += '</div>';
        html += '</td></tr>';
      } else {
        // Fallback for sections that don't have a paired subtotal (shouldn't happen)
        html += '<tr class="section-row"><td colspan="7">' + r.label + '</td></tr>';
      }
      i++;
      continue;
    }
    if (r.kind === 'subtotal' || r.kind === 'total') {
      var v = fmtVar(r.legacy, r.klay);
      html += '<tr class="' + (r.kind === 'total' ? 'total-row' : 'subtotal-row') + '">';
      html += '<td></td><td></td><td>' + r.label + '</td>';
      html += '<td class="num legacy">' + fmt(r.legacy) + '</td>';
      html += '<td class="num klay">' + fmt(r.klay) + '</td>';
      html += '<td class="num ' + v.cls + '">' + v.text + '</td><td></td></tr>';
      i++;
      continue;
    }
    // Skip legacy-only rows here — handled in second pass per section
    if (r.legacyOnly) { i++; continue; }

    // Klay account row
    var hasVar = (r.legacy !== r.klay);
    if (!showAll && !hasVar) { i++; continue; }
    var v2 = fmtVar(r.legacy, r.klay);
    var hasContribs = r.contribs && r.contribs.length > 0;
    var multiContrib = hasContribs && r.contribs.length > 1;
    // Auto-expand if variance row (so user immediately sees which contributor caused it)
    var defaultExpand = hasVar && hasContribs;
    var isExpanded = APP.s3.expanded[r.acct] != null ? APP.s3.expanded[r.acct] : defaultExpand;
    var chevron = hasContribs ? (isExpanded ? '▼' : '▶') : '';

    html += '<tr' + (hasVar ? ' class="s3-var-row"' : '') + '>';
    html += '<td class="s3-chev">' + (hasContribs ? '<span class="s3-chev-btn" onclick="s3_toggleExpand(\'' + r.acct + '\')">' + chevron + '</span>' : '') + '</td>';
    html += '<td class="acct">' + r.acct + '</td>';
    html += '<td class="acct-name">' + r.name;
    if (multiContrib) html += ' <span class="s3-contrib-badge">' + r.contribs.length + ' legacy</span>';
    html += '</td>';
    html += '<td class="num legacy">' + fmt(r.legacy) + '</td>';
    html += '<td class="num klay">' + fmt(r.klay) + '</td>';
    html += '<td class="num ' + v2.cls + '">' + v2.text + '</td>';
    html += '<td>';
    if (hasVar) {
      // Find the contributor responsible for the variance (if any) — pass its old code
      var varContrib = r.contribs ? r.contribs.find(function(c){return c.legacy !== c.klay && c.old !== '—';}) : null;
      var legacyOld = varContrib ? varContrib.old : '';
      html += '<button class="btn-investigate" onclick="s3_investigate(\'' + r.acct + '\', \'' + legacyOld + '\')" title="Jump to Stage 2 — Individual Mapping"><span>Investigate</span><span class="btn-investigate-arrow">&rarr;</span></button>';
    }
    html += '</td>';
    html += '</tr>';

    // Render contributors when expanded
    if (isExpanded && hasContribs) {
      r.contribs.forEach(function(c){
        var cv = fmtVar(c.legacy, c.klay);
        var cVar = (c.legacy !== c.klay);
        html += '<tr class="s3-contrib-row' + (cVar ? ' s3-contrib-var' : '') + '">';
        html += '<td></td>';
        html += '<td class="acct s3-contrib-code">' + c.old + '</td>';
        html += '<td class="acct-name s3-contrib-name">↳ ' + c.oldName + (c.varNote ? ' <span class="s3-contrib-note">' + c.varNote + '</span>' : '') + '</td>';
        html += '<td class="num legacy">' + fmt(c.legacy) + '</td>';
        html += '<td class="num klay">' + fmt(c.klay) + '</td>';
        html += '<td class="num ' + cv.cls + '">' + cv.text + '</td>';
        html += '<td>';
        if (cVar && c.old !== '—') {
          html += '<button class="btn-investigate btn-investigate-sm" onclick="s3_investigate(\'' + r.acct + '\', \'' + c.old + '\')" title="Jump to Stage 2 — Individual Mapping for this account"><span>Investigate</span><span class="btn-investigate-arrow">&rarr;</span></button>';
        }
        html += '</td>';
        html += '</tr>';
      });
    }

    i++;
  }

  // Second pass: append legacy-only sub-sections at the bottom of each main section
  // (For prototype simplicity, we render a single "Legacy-only accounts" group at the end, before grand total)
  var legacyOnly = ds.filter(function(r){return r.legacyOnly;});
  if (legacyOnly.length > 0) {
    html += '<tr class="section-row s3-legacy-only-hdr"><td colspan="7">Legacy-only accounts <span class="s3-legacy-only-tag">no Klay equivalent</span></td></tr>';
    legacyOnly.forEach(function(r){
      html += '<tr class="s3-legacy-only-row">';
      html += '<td></td>';
      html += '<td class="acct">' + (r.acct || '').replace(/^L:/, '') + '</td>';
      html += '<td class="acct-name">' + r.name + (r.note ? '<div class="s3-legacy-only-note">' + r.note + '</div>' : '') + '</td>';
      html += '<td class="num legacy" style="color:var(--color-text-tertiary);font-style:italic">structural</td>';
      html += '<td class="num klay" style="color:var(--color-text-tertiary)">—</td>';
      html += '<td class="num var-zero">—</td>';
      html += '<td></td>';
      html += '</tr>';
    });
  }

  html += '</tbody></table></div>';
  return html;
}

/* ── BY LEGACY: one row per legacy account, grouped by section, with mapping target visible ──
   Same single-table layout as the by-Klay view, but pivoted: each row is a legacy account
   showing where it lands in Klay. Rows with the same Klay target are visually grouped
   so many-to-one consolidations are easy to spot. */
function s3_renderByLegacy(ds, view, showAll){
  var html = '<div class="compare-table-wrap"><table class="compare-table">';
  var legacyHdr, klayHdr;
  if (view === 'tb') { legacyHdr = 'Legacy TB'; klayHdr = 'Klay TB'; }
  else if (view === 'bs') { legacyHdr = 'Legacy'; klayHdr = 'Klay'; }
  else { legacyHdr = 'Legacy P&L'; klayHdr = 'Klay P&L'; }

  html += '<thead><tr>'
    + '<th style="width:90px">Legacy code</th>'
    + '<th>Legacy name</th>'
    + '<th style="width:280px">Mapped to (Klay)</th>'
    + '<th class="num">' + legacyHdr + '</th>'
    + '<th class="num">' + klayHdr + '</th>'
    + '<th class="num" style="width:140px">Variance</th>'
    + '<th style="width:110px"></th>'
    + '</tr></thead><tbody>';

  // Helper: find subtotal for section banner
  function findSectionSubtotal(secName, fromIdx){
    var key = 'TOTAL_' + secName;
    for (var j = fromIdx; j < ds.length; j++) {
      if (ds[j].section === key) return ds[j];
    }
    return null;
  }

  // Walk ds: emit section banner, then for each Klay row in the section, expand its legacy contributors
  var i = 0;
  while (i < ds.length) {
    var r = ds[i];

    if (r.kind === 'section') {
      var sub = findSectionSubtotal(r.section, i + 1);
      if (sub) {
        var sv = fmtVar(sub.legacy, sub.klay);
        var diff = sub.klay - sub.legacy;
        var pctOfLegacy = (sub.legacy !== 0) ? Math.abs(diff) / Math.abs(sub.legacy) * 100 : 0;
        var tone;
        if (diff === 0) tone = 'ok';
        else if (pctOfLegacy <= 0.1) tone = 'warn';
        else tone = 'bad';
        html += '<tr class="s3-secbanner s3-secbanner-' + tone + '"><td colspan="7">';
        html += '<div class="s3-secbanner-row">';
        html += '<div class="s3-secbanner-label">' + r.label + '</div>';
        html += '<div class="s3-secbanner-pair">';
        html += '<span class="s3-secbanner-side"><span class="s3-secbanner-side-lbl">Stage 1 upload</span><span class="s3-secbanner-side-val">' + fmt(sub.legacy) + '</span></span>';
        html += '<span class="s3-secbanner-arrow">→</span>';
        html += '<span class="s3-secbanner-side"><span class="s3-secbanner-side-lbl">Klay derived</span><span class="s3-secbanner-side-val">' + fmt(sub.klay) + '</span></span>';
        html += '</div>';
        html += '<div class="s3-secbanner-var ' + tone + '">';
        if (diff === 0) html += '<span class="s3-secbanner-var-icon">&#10003;</span> Reconciled';
        else html += '<span class="s3-secbanner-var-icon">' + (tone === 'bad' ? '&times;' : '!') + '</span> Δ ' + sv.text;
        html += '</div>';
        html += '</div>';
        html += '</td></tr>';
      }
      i++;
      continue;
    }

    if (r.kind === 'subtotal' || r.kind === 'total') {
      var v = fmtVar(r.legacy, r.klay);
      html += '<tr class="' + (r.kind === 'total' ? 'total-row' : 'subtotal-row') + '">';
      html += '<td></td><td></td><td>' + r.label + '</td>';
      html += '<td class="num legacy">' + fmt(r.legacy) + '</td>';
      html += '<td class="num klay">' + fmt(r.klay) + '</td>';
      html += '<td class="num ' + v.cls + '">' + v.text + '</td><td></td></tr>';
      i++;
      continue;
    }

    if (r.legacyOnly) { i++; continue; } // handled in second pass

    // Klay account row → expand into one row per contributor
    if (r.contribs && r.contribs.length > 0) {
      r.contribs.forEach(function(c, cidx){
        var cVar = (c.legacy !== c.klay);
        if (!showAll && !cVar) return;
        var cv = fmtVar(c.legacy, c.klay);
        var isFirstInGroup = cidx === 0;
        var groupSize = r.contribs.length;
        var multiContrib = groupSize > 1;

        html += '<tr class="s3-bylegacy-row' + (cVar ? ' s3-var-row' : '') + (multiContrib && isFirstInGroup ? ' group-start' : '') + (multiContrib && cidx > 0 ? ' group-cont' : '') + '">';
        html += '<td class="acct">' + c.old + '</td>';
        html += '<td class="acct-name">' + c.oldName + (c.varNote ? ' <span class="s3-contrib-note">' + c.varNote + '</span>' : '') + '</td>';
        html += '<td class="s3-bylegacy-target">';
        if (multiContrib && !isFirstInGroup) {
          html += '<span class="s3-bylegacy-target-cont">↳ same target</span>';
        } else {
          html += '<span class="s3-bylegacy-target-code">' + r.acct + '</span>';
          html += '<span class="s3-bylegacy-target-name">' + r.name + '</span>';
          if (multiContrib) html += '<span class="s3-contrib-badge">' + groupSize + ' legacy</span>';
        }
        html += '</td>';
        html += '<td class="num legacy">' + fmt(c.legacy) + '</td>';
        html += '<td class="num klay">' + fmt(c.klay) + '</td>';
        html += '<td class="num ' + cv.cls + '">' + cv.text + '</td>';
        html += '<td>';
        if (cVar && c.old !== '—') {
          html += '<button class="btn-investigate btn-investigate-sm" onclick="s3_investigate(\'' + r.acct + '\', \'' + c.old + '\')" title="Jump to Stage 2 — Individual Mapping for this account"><span>Investigate</span><span class="btn-investigate-arrow">&rarr;</span></button>';
        }
        html += '</td>';
        html += '</tr>';
      });
    }

    i++;
  }

  // Legacy-only sub-section at the bottom
  var legacyOnly = ds.filter(function(r){return r.legacyOnly;});
  if (legacyOnly.length > 0) {
    html += '<tr class="section-row s3-legacy-only-hdr"><td colspan="7">Legacy-only accounts <span class="s3-legacy-only-tag">no Klay equivalent</span></td></tr>';
    legacyOnly.forEach(function(r){
      html += '<tr class="s3-legacy-only-row">';
      html += '<td class="acct">' + (r.acct || '').replace(/^L:/, '') + '</td>';
      html += '<td class="acct-name">' + r.name + (r.note ? '<div class="s3-legacy-only-note">' + r.note + '</div>' : '') + '</td>';
      html += '<td class="acct-name" style="color:var(--color-text-tertiary);font-style:italic">no Klay target</td>';
      html += '<td class="num legacy" style="color:var(--color-text-tertiary);font-style:italic">structural</td>';
      html += '<td class="num klay" style="color:var(--color-text-tertiary)">—</td>';
      html += '<td class="num var-zero">—</td>';
      html += '<td></td>';
      html += '</tr>';
    });
  }

  html += '</tbody></table></div>';
  return html;
}

/* ── SIDE-BY-SIDE: Pattern 2 — Legacy and Klay TBs in two panes ── */
function s3_renderLegacyView(ds, view, showAll){
  // Build two parallel datasets:
  //  - LEFT (Legacy): every contributor, plus legacy-only rows, organized by section
  //  - RIGHT (Klay): every Klay row, organized by section
  // Section subtotals reconcile across both sides.

  var html = '<div class="s3-sbs">';

  // We render section by section so subtotals line up.
  // Walk ds and split into sections.
  var sections = [];
  var current = null;
  ds.forEach(function(r){
    if (r.kind === 'section') {
      current = {label:r.label, klay:[], legacy:[], subtotal:null};
      sections.push(current);
      return;
    }
    if (r.kind === 'subtotal' || r.kind === 'total') {
      if (current) current.subtotal = r;
      else sections.push({label:r.label, klay:[], legacy:[], subtotal:r}); // grand total floats own section
      // For 'total' row (TOTAL_LE), end the current section
      if (r.kind === 'total') current = null;
      return;
    }
    if (!current) return;
    if (r.legacyOnly) {
      current.legacy.push({code:(r.acct || '').replace(/^L:/,''), name:r.name, note:r.note, structural:true});
    } else {
      current.klay.push(r);
      // expand contributors as legacy entries on the left
      if (r.contribs) {
        r.contribs.forEach(function(c){
          current.legacy.push({code:c.old, name:c.oldName, legacy:c.legacy, klay:c.klay, mappedTo:r.acct, mappedToName:r.name, varNote:c.varNote});
        });
      }
    }
  });

  sections.forEach(function(sec){
    if (sec.klay.length === 0 && sec.legacy.length === 0 && !sec.subtotal) return;

    html += '<div class="s3-sbs-section">';
    html += '<div class="s3-sbs-section-hdr">' + sec.label + '</div>';
    html += '<div class="s3-sbs-grid">';

    // LEFT pane: Legacy accounts with their balances
    html += '<div class="s3-sbs-pane">';
    html += '<div class="s3-sbs-pane-hdr"><span>Legacy CoA</span><span class="s3-sbs-pane-meta">' + sec.legacy.length + ' accounts</span></div>';
    html += '<table class="s3-sbs-tbl"><tbody>';
    sec.legacy.forEach(function(l){
      if (l.structural) {
        html += '<tr class="s3-sbs-row legacy-only">';
        html += '<td class="acct" style="width:70px">' + l.code + '</td>';
        html += '<td class="acct-name"><em>' + l.name + '</em></td>';
        html += '<td class="num" style="color:var(--color-text-tertiary);width:120px">structural</td>';
        html += '</tr>';
      } else {
        var rowVar = (l.legacy !== l.klay);
        if (!showAll && !rowVar) return;
        html += '<tr class="s3-sbs-row' + (rowVar ? ' s3-var-row' : '') + '">';
        html += '<td class="acct" style="width:70px">' + l.code + '</td>';
        html += '<td class="acct-name">' + l.name + '<div class="s3-sbs-mapto">→ ' + l.mappedTo + ' · ' + l.mappedToName + '</div></td>';
        html += '<td class="num" style="width:120px">' + fmt(l.legacy) + '</td>';
        html += '</tr>';
      }
    });
    if (sec.subtotal) {
      html += '<tr class="s3-sbs-subtotal"><td></td><td>' + sec.subtotal.label + '</td><td class="num">' + fmt(sec.subtotal.legacy) + '</td></tr>';
    }
    html += '</tbody></table>';
    html += '</div>';

    // RIGHT pane: Klay accounts with their balances
    html += '<div class="s3-sbs-pane">';
    html += '<div class="s3-sbs-pane-hdr"><span>Klay CoA</span><span class="s3-sbs-pane-meta">' + sec.klay.length + ' accounts</span></div>';
    html += '<table class="s3-sbs-tbl"><tbody>';
    sec.klay.forEach(function(k){
      var rowVar = (k.legacy !== k.klay);
      if (!showAll && !rowVar) return;
      var v = fmtVar(k.legacy, k.klay);
      html += '<tr class="s3-sbs-row' + (rowVar ? ' s3-var-row' : '') + '">';
      html += '<td class="acct" style="width:80px">' + k.acct + '</td>';
      html += '<td class="acct-name">' + k.name;
      if (rowVar) html += '<div class="s3-sbs-varnote">Δ ' + v.text + '</div>';
      html += '</td>';
      html += '<td class="num" style="width:120px">' + fmt(k.klay) + '</td>';
      html += '</tr>';
    });
    if (sec.subtotal) {
      var subVar = fmtVar(sec.subtotal.legacy, sec.subtotal.klay);
      html += '<tr class="s3-sbs-subtotal"><td></td><td>' + sec.subtotal.label + (subVar.cls === 'var-pos' || subVar.cls === 'var-neg' ? ' <span class="s3-sbs-subvar">Δ ' + subVar.text + '</span>' : '') + '</td><td class="num">' + fmt(sec.subtotal.klay) + '</td></tr>';
    }
    html += '</tbody></table>';
    html += '</div>';

    html += '</div></div>'; // /grid /section
  });

  html += '</div>'; // /sbs
  return html;
}

function s3_setView(v){
  APP.s3.view = v;
  renderS3();
  window.scrollTo(0, 0);
}
function s3_setPeriod(p){
  APP.s3.period = p;
  renderS3();
}
function s3_setShowAll(b){
  APP.s3.showAll = b;
  renderS3();
}
function s3_setViewBy(vb){
  APP.s3.viewBy = vb;
  // Reset expanded state when switching views
  if (vb === 'klay') APP.s3.expanded = {};
  renderS3();
  window.scrollTo(0, 0);
}
function s3_toggleExpand(acct){
  // If undefined, the row's auto-expanded by default, so toggle starts as collapsing
  var current = APP.s3.expanded[acct];
  if (current == null) {
    // Determine current default — variance rows are auto-expanded
    var ds = s3_datasetFor(APP.s3.view);
    var row = ds.find(function(r){return r.acct === acct;});
    var defaultExpand = row && row.contribs && row.legacy !== row.klay;
    APP.s3.expanded[acct] = !defaultExpand;
  } else {
    APP.s3.expanded[acct] = !current;
  }
  renderS3();
}

function s3_investigate(klayAcct, legacyAcct){
  // Map the Klay account code to the right Substep 3 account-type tab
  var firstDigit = klayAcct.charAt(0);
  var clusterKey = 'all-accounts';
  if (firstDigit === '1') {
    // Assets — split between current and fixed by code
    clusterKey = (klayAcct.indexOf('1-2') === 0) ? 'type:fa' : 'type:ca';
  }
  else if (firstDigit === '2') clusterKey = 'type:cl';
  else if (firstDigit === '4') clusterKey = 'type:rev';
  else if (firstDigit === '5') clusterKey = 'type:cogs';
  else if (firstDigit === '6' || firstDigit === '7' || firstDigit === '8') clusterKey = 'type:opex';

  // Special case: placement-error account 12310,0,20 lives under the "Account type missing"
  // issue cluster. Route there instead so the user lands on the annotated reason.
  if (legacyAcct === '12310,0,20') {
    clusterKey = 'type-missing';
  }

  // Set Stage 2 state — go to Substep 3 (Individual Mapping), filter to "review" for context
  APP.s2.substep = 3;
  APP.s2.activeCluster = clusterKey;
  APP.s2.wsFilter = 'review';
  APP.s2.subView = 'workspace';
  // Stash the account to highlight after render
  APP.s2.highlightAccount = legacyAcct || null;
  jumpToStage(2);

  // After render, scroll to the highlighted account and pulse it
  if (legacyAcct) {
    setTimeout(function(){
      var rowId = 's2-row-' + legacyAcct.replace(/[^a-zA-Z0-9]/g, '_');
      var row = document.getElementById(rowId);
      if (row) {
        row.scrollIntoView({behavior:'smooth', block:'center'});
        row.classList.add('s2-row-highlight');
        setTimeout(function(){ row.classList.remove('s2-row-highlight'); }, 2400);
      }
    }, 150);
  }
}
