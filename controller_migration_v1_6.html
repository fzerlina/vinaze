/* ──────────────────────────────────────────────────────────
   CLUSTER DETECTION
   A cluster = the deepest-meaningful-grouping in the legacy tree.
   For PT. ABC's CoA, clusters are the parent nodes whose children are leaves
   (or whose grandchildren are leaves, recursively the deepest such grouping).

   We build clusters by walking S2_ACCOUNTS (which has parent links from the
   PT. ABC dataset). For accounts that don't have parent links (the synthesized
   non-CA sections), we synthesize lightweight clusters per FS placement.

   Each cluster object:
   {
     id:           unique key
     code:         legacy code (header) or synthesized
     name:         human-readable cluster name
     fs:           which FS section (bs-ca, bs-fa, bs-cl, pl-rev, pl-cogs, pl-opex)
     leafCount:    number of postable leaves under this cluster
     leafIndices:  array of indices into S2_ACCOUNTS for the leaves
     aiTargets:    array of suggested Klay codes (could be 1 = clean, 2+ = split)
     aiTargetCounts: {klayCode: leafCountThatMapsToIt}
     pattern:      'clean' | 'split' | 'review'
     reasoning:    string explaining the AI's suggestion (esp. for split/review)
   }
*/
function s2_detectClusters(){
  var clusters = [];

  // PT. ABC tree-based detection across all 5 sections.
  // For each header in the tree, walk recursively. A header IS a cluster if all its
  // direct kids are leaves (no header kids). Otherwise its header kids become clusters.
  var allFs = ['bs-ca', 'bs-fa', 'bs-cl', 'pl-rev', 'pl-cogs', 'pl-opex'];

  allFs.forEach(function(fs){
    var headers = S2_ACCOUNTS.filter(function(a){return a.fs === fs && a.isHeader;});
    var leaves  = S2_ACCOUNTS.filter(function(a){return a.fs === fs && !a.isHeader;});

    // 1. Headers whose direct kids are all leaves → these are clusters
    //    Headers with MIXED kids (some leaves, some sub-headers) → the direct-leaf
    //    children form a cluster (using the parent header as the cluster name);
    //    sub-headers themselves recursively become their own clusters.
    headers.forEach(function(h){
      var directKids = S2_ACCOUNTS.filter(function(a){return a.parent === h.old;});
      // Direct leaf children only
      var leavesInCluster = directKids.filter(function(k){return !k.isHeader;});
      if (leavesInCluster.length === 0) return; // no direct leaves — sub-headers will handle their own

      // Compute AI target consensus
      var targetCounts = {};
      leavesInCluster.forEach(function(l){
        targetCounts[l.newCode] = (targetCounts[l.newCode] || 0) + 1;
      });
      var targets = Object.keys(targetCounts);
      var pattern = 'clean';
      var reasoning = '';
      if (targets.length === 1) {
        var tk = S2_KLAY_BY_CODE[targets[0]];
        reasoning = leavesInCluster.length + ' account' + (leavesInCluster.length === 1 ? '' : 's') + ' map to ' + targets[0] + (tk ? ' · ' + tk.subSection : '') + '.';
      } else {
        pattern = 'split';
        var bits = targets.map(function(t){
          var subSec = (S2_KLAY_BY_CODE[t] || {}).subSection || '';
          return targetCounts[t] + ' → ' + t + ' ' + subSec;
        });
        reasoning = 'AI splits across ' + targets.length + ' Klay accounts: ' + bits.join('; ') + '.';
      }
      // Mark "review" if any leaves have low confidence
      var lowCount = leavesInCluster.filter(function(l){return l.conf === 'low';}).length;
      if (lowCount > 0 && pattern === 'clean') {
        pattern = 'review';
        reasoning = leavesInCluster.length + ' account' + (leavesInCluster.length === 1 ? '' : 's') + ' to ' + targets[0] + '; ' + lowCount + ' need review (low confidence).';
      } else if (lowCount > 0 && pattern === 'split') {
        reasoning += ' ' + lowCount + ' account' + (lowCount === 1 ? '' : 's') + ' need review.';
      }

      clusters.push({
        id: 'cl:' + h.old,
        code: h.old,
        name: h.oldName,
        fs: h.fs,
        leafCount: leavesInCluster.length,
        leafIndices: leavesInCluster.map(function(l){return S2_ACCOUNTS.indexOf(l);}),
        aiTargets: targets,
        aiTargetCounts: targetCounts,
        pattern: pattern,
        reasoning: reasoning,
      });
    });

    // 2. Top-level leaves with no header parent → 1-leaf clusters
    leaves.forEach(function(l){
      var idx = S2_ACCOUNTS.indexOf(l);
      var alreadyInCluster = clusters.some(function(c){return c.leafIndices.indexOf(idx) !== -1;});
      if (alreadyInCluster) return;
      if (!l.parent) {
        var pattern = (l.conf === 'low') ? 'review' : 'clean';
        var subSec = (S2_KLAY_BY_CODE[l.newCode] || {}).subSection || '';
        clusters.push({
          id: 'cl:leaf:' + l.old,
          code: l.old,
          name: l.oldName,
          fs: l.fs,
          leafCount: 1,
          leafIndices: [idx],
          aiTargets: [l.newCode],
          aiTargetCounts: (function(o){o[l.newCode] = 1; return o;})({}),
          pattern: pattern,
          reasoning: l.reason || ('Single-account group — maps to ' + l.newCode + ' · ' + subSec + '.'),
        });
      }
    });
  });

  return clusters;
}

var S2_CLUSTERS = s2_detectClusters();
var S2_CLUSTERS_BY_ID = {};
S2_CLUSTERS.forEach(function(c){ S2_CLUSTERS_BY_ID[c.id] = c; });

/* Cluster cascade: when user confirms a cluster mapping, propagate to all its leaves.
   - Sets each leaf to status='confirmed' (per Q3=b answer: cluster confirm cascades regardless of confidence)
   - User can still override individual leaves in Substep 3 (Account mapping)
*/
function s2_cascadeCluster(clusterId, action){
  var c = S2_CLUSTERS_BY_ID[clusterId];
  if (!c) return;
  if (action === 'confirm') {
    APP.s2.clusterMappings[clusterId] = {status:'confirmed', cascade:true};
    c.leafIndices.forEach(function(idx){
      S2_ACCOUNTS[idx].status = 'confirmed';
    });
  } else if (action === 'review') {
    APP.s2.clusterMappings[clusterId] = {status:'review', cascade:false};
    // Don't change leaf status — leaves stay unconfirmed for individual handling
  } else if (action === 'unconfirm') {
    delete APP.s2.clusterMappings[clusterId];
    c.leafIndices.forEach(function(idx){
      S2_ACCOUNTS[idx].status = 'unconfirmed';
    });
  }
}

/* Helper: get clusters for an FS section (used by Substep 2 cards) */
function s2_clustersForSection(fs){
  return S2_CLUSTERS.filter(function(c){return c.fs === fs;});
}

function s2_klayOptionsFor(typeKey){
  // Filter Klay catalog to entries of the same type that are MVP-available.
  return S2_KLAY.filter(function(k){
    if (k.type !== typeKey) return false;
    if (k.mvp === 'SCHEMA') return false; // hide deferred from dropdowns
    return true;
  });
}

/* Render a Klay-account <select> grouped by sub-section.
   Used by the workspace tables in both ALL view and monthly view. */
function s2_renderKlayDropdown(account, origIdx){
  var typeKey = s2_typeOf(account);
  var options = s2_klayOptionsFor(typeKey);
  // Make sure the current newCode is in the list (legacy mappings may reference SCHEMA accounts)
  var currentInOptions = options.some(function(o){return o.code === account.newCode;});
  if (!currentInOptions) {
    options = [{code:account.newCode, name:account.newName, subSection:'(currently mapped)'}].concat(options);
  }
  // Group by subSection
  var groups = {};
  var groupOrder = [];
  options.forEach(function(opt){
    var key = opt.subSection || 'Other';
    if (!groups[key]) { groups[key] = []; groupOrder.push(key); }
    groups[key].push(opt);
  });

  var html = '<select class="s2-klay-sel" onchange="s2_changeKlay(' + origIdx + ', this.value)"' + (account.status === 'confirmed' ? ' disabled' : '') + '>';
  groupOrder.forEach(function(grp){
    html += '<optgroup label="' + grp + '">';
    groups[grp].forEach(function(opt){
      var sel = (opt.code === account.newCode) ? ' selected' : '';
      html += '<option value="' + opt.code + '"' + sel + '>' + opt.code + ' · ' + opt.name + '</option>';
    });
    html += '</optgroup>';
  });
  html += '</select>';
  return html;
}

/* ── LEGACY CoA TREE (2-3 layers) ──
   Build a hierarchical tree from flat S2_ACCOUNTS by grouping on code prefix.
   Indonesian convention: 4-digit codes; we group by first digit (top), first 2 digits (mid), leaf.
   E.g., 1001 Kas Besar → Asset (1xxx) → Cash & Bank (10xx) → 1001 Kas Besar (leaf)
*/
var LEGACY_TOP_NAMES = {
  '1':{code:'1000', name:'ASET (Assets)'},
  '2':{code:'2000', name:'KEWAJIBAN (Liabilities)'},
  '3':{code:'3000', name:'EKUITAS (Equity)'},
  '4':{code:'4000', name:'PENDAPATAN (Revenue)'},
  '5':{code:'5000', name:'HARGA POKOK (Cost of Sales)'},
  '6':{code:'6000', name:'BEBAN OPERASIONAL (Operating Expenses)'},
  '7':{code:'7000', name:'BEBAN LAIN-LAIN (Other Expenses)'},
};
var LEGACY_MID_NAMES = {
  '10':'Kas dan Bank',     '11':'Piutang & Uang Muka', '12':'Persediaan',     '13':'Biaya Dibayar Dimuka',
  '14':'Pajak Dibayar Dimuka', '15':'Aset Tetap',     '16':'Aset Tidak Berwujud', '17':'Akumulasi Penyusutan',
  '18':'Aset Lain-Lain',   '19':'Investasi',
  '20':'Hutang Jangka Pendek', '21':'Hutang Pajak',   '22':'Hutang Gaji',     '23':'Hutang Lain-Lain',
  '24':'Pendapatan Diterima Dimuka', '25':'Hutang Bank Jangka Pendek',
  '30':'Modal Disetor',    '31':'Laba Ditahan',
  '40':'Penjualan',        '41':'Pendapatan Lain',    '42':'Diskon & Retur',
  '50':'HPP Bahan',        '51':'HPP Tenaga Kerja',   '52':'HPP Overhead',
  '60':'Beban Gaji & Tunjangan', '61':'Beban Sewa & Utilitas', '62':'Beban Operasional Kendaraan',
  '63':'Beban Pemeliharaan', '64':'Beban Pemasaran',  '65':'Beban Perjalanan & Training',
  '66':'Beban Profesional', '67':'Beban Administrasi & Pajak', '68':'Beban Asuransi',
  '70':'Beban Bunga',      '71':'Beban Lain-Lain',
};
function s2_buildLegacyTree(){
  // Returns: typeKey → [ {code, name, kind:'top', children:[ {code, name, kind:'mid', children:[ <leaves> ] } ]} ]
  var byType = {};
  S2_TYPES.forEach(function(t){ byType[t.key] = []; });

  S2_ACCOUNTS.forEach(function(a){
    var typeKey = s2_typeOf(a);
    if (!typeKey) return;
    var topDigit = a.old.charAt(0);
    var midPrefix = a.old.substring(0, 2);

    if (!byType[typeKey]) byType[typeKey] = [];
    var typeArr = byType[typeKey];

    // Find or create top
    var topName = LEGACY_TOP_NAMES[topDigit] || {code:topDigit + '000', name:'Group ' + topDigit};
    var top = typeArr.find(function(n){return n.code === topName.code;});
    if (!top) {
      top = {code:topName.code, name:topName.name, kind:'top', children:[]};
      typeArr.push(top);
    }
    // Find or create mid
    var midName = LEGACY_MID_NAMES[midPrefix] || ('Group ' + midPrefix);
    var midCode = midPrefix + '00';
    var mid = top.children.find(function(n){return n.code === midCode;});
    if (!mid) {
      mid = {code:midCode, name:midName, kind:'mid', children:[]};
      top.children.push(mid);
    }
    // Leaf
    mid.children.push({code:a.old, name:a.oldName, kind:'leaf', _ref:a});
  });

  // Sort children at each level
  Object.keys(byType).forEach(function(t){
    byType[t].sort(function(a,b){return a.code < b.code ? -1 : 1;});
    byType[t].forEach(function(top){
      top.children.sort(function(a,b){return a.code < b.code ? -1 : 1;});
      top.children.forEach(function(mid){
        mid.children.sort(function(a,b){return a.code < b.code ? -1 : 1;});
      });
    });
  });
  return byType;
}

/* ── KLAY CoA TREE (2-layer: Type → Sub-section → Leaf) ──
   Klay catalog grouped by Type, then by Sub-section. Reflects the real Klay structure
   from the Account Type Taxonomy doc (e.g. Current Assets → Cash & Cash Equivalents → Kas).
*/
function s2_buildKlayTree(){
  var byType = {};
  S2_TYPES.forEach(function(t){
    byType[t.key] = {code:t.key.toUpperCase(), name:t.name, children:[]};
  });
  // Group catalog entries by type → sub-section
  var subSectionsByType = {}; // type → {subSection: [{leaf}]}
  S2_KLAY.forEach(function(k){
    if (k.mvp === 'SCHEMA') return; // hide deferred from preview
    if (!byType[k.type]) return; // type not modeled in S2_TYPES (e.g. nonop, tax aren't BS-relevant)
    if (!subSectionsByType[k.type]) subSectionsByType[k.type] = {};
    var sub = subSectionsByType[k.type];
    if (!sub[k.subSection]) sub[k.subSection] = [];
    sub[k.subSection].push({code:k.code, name:k.name, kind:'leaf', _klay:k});
  });
  // Materialize: each Type gets sub-section nodes (kind:'mid'), each containing leaves
  Object.keys(subSectionsByType).forEach(function(t){
    var subs = subSectionsByType[t];
    Object.keys(subs).forEach(function(subName){
      var leaves = subs[subName].slice().sort(function(a,b){return a.code < b.code ? -1 : 1;});
      // Sub-section node code = first part of leaf codes (e.g., '1-11' for Cash & Cash Equivalents)
      var subCode = leaves[0] ? leaves[0].code.substring(0, leaves[0].code.indexOf('-') + 3) : '';
      byType[t].children.push({code:subCode, name:subName, kind:'mid', children:leaves});
    });
    byType[t].children.sort(function(a,b){return a.code < b.code ? -1 : 1;});
  });
  return byType;
}

var LEGACY_TREE = s2_buildLegacyTree();
var KLAY_TREE   = s2_buildKlayTree();

/* ── ACCOUNT ACTIVITY PER MONTH ──
   For each account that had activity in a month, record txn count + total volume in IDR.
   Synthesized so the monthly view feels real. Deterministic per (month, account).
*/
function s2_fmtRupiah(v){
  if (v >= 1_000_000_000) return 'Rp ' + (v / 1_000_000_000).toFixed(1) + 'B';
  if (v >= 1_000_000) return 'Rp ' + (v / 1_000_000).toFixed(0) + 'M';
  if (v >= 1_000) return 'Rp ' + (v / 1_000).toFixed(0) + 'K';
  return 'Rp ' + v.toLocaleString();
}

/* ═══════════════════════════════════════
   MAIN ENTRY — renders the unified 2-col layout (CoA browser + workspace)
═══════════════════════════════════════ */
function renderS2(){
  // Substep bar is always visible across all substeps. Preview toggle is global.
  var ssb = document.getElementById('substepbar');
  ssb.style.display = '';
  var subView = APP.s2.subView || 'workspace';
  var substep = APP.s2.substep || 1;

  // Compute progress per substep for nav indicators
  var step2Total = S2_CLUSTERS.length;
  var step2Done = Object.keys(APP.s2.clusterMappings).length;
  var step3Total = S2_ACCOUNTS.filter(function(a){return !a.isHeader;}).length;
  var step3Done = S2_ACCOUNTS.filter(function(a){return !a.isHeader && a.status === 'confirmed';}).length;

  function ssitem(n, label, count){
    var on = (substep === n) && (subView === 'workspace');
    var done = (n === 1 && substep > 1) || (n === 2 && substep > 2 && step2Done === step2Total) || (n === 3 && step3Done === step3Total && step3Total > 0);
    var cls = ['ssi'];
    if (on) cls.push('on');
    if (done) cls.push('done');
    var icon = done ? '&#10003;' : n;
    var iconCls = on ? 'on' : (done ? 'done' : '');
    var html = '<div class="' + cls.join(' ') + '" onclick="s2_setSubstep(' + n + ')">';
    html += '<span class="ssc ' + iconCls + '">' + icon + '</span>';
    html += '<span class="ssl ' + iconCls + '">' + label + '</span>';
    if (count) html += '<span class="ssn">' + count + '</span>';
    html += '</div>';
    return html;
  }

  var ssbHtml = '';
  ssbHtml += ssitem(1, 'Structure Overview', '');
  ssbHtml += '<span class="ss-divider">·</span>';
  ssbHtml += ssitem(2, 'Bulk Mapping', step2Done + '/' + step2Total);
  ssbHtml += '<span class="ss-divider">·</span>';
  ssbHtml += ssitem(3, 'Individual Mapping', step3Done + '/' + step3Total);

  ssbHtml += '<div class="ss-toggle">'
    + '<button class="ss-tbtn ' + (subView === 'workspace' ? 'active' : '') + '" onclick="s2_setSubView(\'workspace\')">Workspace</button>'
    + '<button class="ss-tbtn ' + (subView === 'preview' ? 'active' : '') + '" onclick="s2_setSubView(\'preview\')">Preview · Before &rarr; After</button>'
    + '</div>';
  ssb.innerHTML = ssbHtml;

  // Preview is a full-screen view across all substeps
  if (subView === 'preview') {
    s2_renderPreview();
    return;
  }

  // Workspace mode — dispatch to the appropriate substep renderer
  if (substep === 1) {
    s2_renderSubstep1();
  } else if (substep === 2) {
    s2_renderSubstep2();
  } else {
    s2_renderSubstep3();
  }
}

function s2_setSubView(v){ APP.s2.subView = v; renderS2(); window.scrollTo(0, 0); }
function s2_setSubstep(n){
  APP.s2.substep = n;
  APP.s2.subView = 'workspace';
  renderS2();
  window.scrollTo(0, 0);
}

/* ── SUBSTEP 1: Klay structure orientation (read-only) ──
   Side-by-side: full legacy CoA on the left, Klay's CoA template on the right.
   No mappings drawn, no AI suggestions visible. The user's job is to read
   Klay's structure before mapping anything. */
function s2_renderSubstep1(){
  var html = '<h1 class="stage-title">Structure Overview</h1>';
  html += '<p class="stage-sub">First, get familiar with Klay\'s structure. The right pane shows every account Klay provides — read it, recognize what\'s familiar, notice what\'s new. Mapping happens in the next step.</p>';

  // Top continue button (page can be long — let user advance from anywhere)
  html += '<div class="s2-top-cta">';
  html += '<button class="btn-cont" onclick="s2_setSubstep(2)">Continue to Bulk Mapping &rsaquo;</button>';
  html += '</div>';

  // Legend
  html += '<div class="s2-legend">';
  html += '<span class="s2-legend-item"><span class="s2-flag-mini sys">SYS</span> System-reserved (auto-created, immutable)</span>';
  html += '<span class="s2-legend-item"><span class="s2-flag-mini ctrl">CTRL</span> Control account (no manual JE)</span>';
  html += '</div>';

  html += '<div class="s2-orient-shell">';

  // LEFT: full legacy CoA tree
  html += '<div class="s2-orient-side">';
  html += '<div class="s2-orient-hdr">';
  html += '<div class="s2-orient-title">Your legacy CoA</div>';
  var leafTotal = S2_ACCOUNTS.filter(function(a){return !a.isHeader;}).length;
  html += '<div class="s2-orient-meta">' + leafTotal + ' postable accounts &middot; PT. ABC Indonesia source</div>';
  html += '</div>';
  html += '<div class="s2-orient-body">';

  // Build a hierarchical tree view of the legacy accounts (PT. ABC structured CA + sectioned non-CA)
  // Group by FS section first
  var fsLabels = {'bs-ca':'Current Assets', 'bs-fa':'Fixed Assets', 'bs-cl':'Current Liabilities', 'pl-rev':'Revenue', 'pl-cogs':'Cost of Sales', 'pl-opex':'Operating Expenses'};
  var fsOrder = ['bs-ca','bs-fa','bs-cl','pl-rev','pl-cogs','pl-opex'];
  fsOrder.forEach(function(fs){
    var accountsInFs = S2_ACCOUNTS.filter(function(a){return a.fs === fs;});
    if (accountsInFs.length === 0) return;
    var leafCount = accountsInFs.filter(function(a){return !a.isHeader;}).length;
    html += '<div class="s2-orient-fs-hdr">' + fsLabels[fs] + ' <span class="s2-orient-fs-cnt">' + leafCount + '</span></div>';

    // Render PT. ABC tree structure for bs-ca, flat list for others
    if (fs === 'bs-ca') {
      // Tree-style render — top-level rows first, then descend
      var topLevel = accountsInFs.filter(function(a){return !a.parent;});
      topLevel.forEach(function(a){
        html += s2_renderOrientLegacyNode(a, accountsInFs, 0);
      });
    } else {
      // Synthesized sections: group leaves by their AI-suggested Klay sub-section
      // so the user sees implicit structure (these become the "groups" in Substep 2)
      var leavesInFs = accountsInFs.filter(function(a){return !a.isHeader;});
      var bySubSec = {};
      leavesInFs.forEach(function(a){
        var k = S2_KLAY_BY_CODE[a.newCode];
        var subSec = k ? k.subSection : 'Unmapped';
        if (!bySubSec[subSec]) bySubSec[subSec] = [];
        bySubSec[subSec].push(a);
      });
      Object.keys(bySubSec).forEach(function(subSec){
        var grp = bySubSec[subSec];
        // Group header
        html += '<div class="s2-orient-mid s2-orient-mid-d0">';
        html += '<span class="s2-orient-mid-name">' + subSec + '</span>';
        html += '<span class="s2-orient-mid-cnt">' + grp.length + '</span>';
        html += '</div>';
        grp.forEach(function(a){
          html += '<div class="s2-orient-leaf s2-orient-leaf-d1">';
          html += '<span class="s2-orient-leaf-code">' + a.old + '</span>';
          html += '<span class="s2-orient-leaf-name">' + a.oldName + '</span>';
          html += '</div>';
        });
      });
    }
  });
  html += '</div></div>';

  // RIGHT: Klay structure template (no mappings)
  html += '<div class="s2-orient-side">';
  html += '<div class="s2-orient-hdr">';
  html += '<div class="s2-orient-title">Klay CoA <span class="s2-orient-tag">template</span></div>';
  var klayMvp = S2_KLAY.filter(function(k){return k.mvp === 'IN';}).length;
  html += '<div class="s2-orient-meta">' + klayMvp + ' standardized accounts &middot; 2-layer structure</div>';
  html += '</div>';
  html += '<div class="s2-orient-body">';

  // Group Klay catalog by Type
  var klayByType = {};
  S2_KLAY.forEach(function(k){
    if (k.mvp === 'SCHEMA') return;
    if (!klayByType[k.type]) klayByType[k.type] = {};
    if (!klayByType[k.type][k.subSection]) klayByType[k.type][k.subSection] = [];
    klayByType[k.type][k.subSection].push(k);
  });

  // Render Type → Sub-section → Leaf
  S2_TYPES.forEach(function(t){
    var subs = klayByType[t.key];
    if (!subs) return;
    var totalInType = 0;
    Object.keys(subs).forEach(function(s){totalInType += subs[s].length;});
    html += '<div class="s2-orient-fs-hdr">' + t.name + ' <span class="s2-orient-fs-cnt">' + totalInType + '</span></div>';
    Object.keys(subs).forEach(function(subSec){
      // Sub-section node
      var leaves = subs[subSec];
      var subCode = leaves[0] ? leaves[0].code.substring(0, leaves[0].code.indexOf('-') + 3) : '';
      html += '<div class="s2-orient-mid">';
      html += '<span class="s2-orient-mid-code">' + subCode + '</span>';
      html += '<span class="s2-orient-mid-name">' + subSec + '</span>';
      html += '<span class="s2-orient-mid-cnt">' + leaves.length + '</span>';
      html += '</div>';
      leaves.forEach(function(k){
        var flags = '';
        if (k.sysReserved) flags += ' <span class="s2-flag-mini sys">SYS</span>';
        if (k.controlAcct) flags += ' <span class="s2-flag-mini ctrl">CTRL</span>';
        html += '<div class="s2-orient-leaf klay">';
        html += '<span class="s2-orient-leaf-code">' + k.code + '</span>';
        html += '<span class="s2-orient-leaf-name">' + k.name + flags + '</span>';
        html += '</div>';
      });
    });
  });
  html += '</div></div>';

  html += '</div>'; // /s2-orient-shell

  // Continue button
  html += '<div class="signoff-row">';
  html += '<span class="btn-signoff-help">Take a moment to scan Klay\'s structure. When ready, continue to Bulk Mapping.</span>';
  html += '<button class="btn-cont" onclick="s2_setSubstep(2)">Continue to Bulk Mapping &rsaquo;</button>';
  html += '</div>';

  document.getElementById('main').innerHTML = html;
}

/* Recursive render of a legacy CoA node (header or leaf) for orientation */
function s2_renderOrientLegacyNode(node, allInFs, depth){
  var html = '';
  if (node.isHeader) {
    html += '<div class="s2-orient-mid s2-orient-mid-d' + Math.min(depth, 2) + '">';
    html += '<span class="s2-orient-mid-code">' + node.old + '</span>';
    html += '<span class="s2-orient-mid-name">' + node.oldName + '</span>';
    html += '</div>';
    var children = allInFs.filter(function(a){return a.parent === node.old;});
    children.forEach(function(c){
      html += s2_renderOrientLegacyNode(c, allInFs, depth + 1);
    });
  } else {
    html += '<div class="s2-orient-leaf s2-orient-leaf-d' + Math.min(depth, 3) + '">';
    html += '<span class="s2-orient-leaf-code">' + node.old + '</span>';
    html += '<span class="s2-orient-leaf-name">' + node.oldName + '</span>';
    html += '</div>';
  }
  return html;
}

/* ── SUBSTEP 2: Cluster mapping (cluster cards) ──
   Cards listed by FS section. Each card is a legacy cluster with its AI-suggested
   Klay target(s), pattern (clean/split/review), reasoning, and confirm/override actions.
   Confirming cascades to all leaves in the cluster. */
function s2_renderSubstep2(){
  var html = '<h1 class="stage-title">Bulk Mapping</h1>';
  html += '<p class="stage-sub">Work on the big chunks first. Each card is an account-type group from your legacy CoA — confirm the group mapping in one click, then refine individual accounts later in step 3 if needed.</p>';

  // Top continue button
  html += '<div class="s2-top-cta">';
  html += '<button class="btn-cont" onclick="s2_setSubstep(3)">Continue to Individual Mapping &rsaquo;</button>';
  html += '</div>';

  // Section tabs (FS sections)
  var fsLabels = {'bs-ca':'Current Assets', 'bs-fa':'Fixed Assets', 'bs-cl':'Current Liabilities', 'pl-rev':'Revenue', 'pl-cogs':'Cost of Sales', 'pl-opex':'Operating Expenses'};
  var fsOrder = ['bs-ca','bs-fa','bs-cl','pl-rev','pl-cogs','pl-opex'];
  var activeSection = APP.s2.activeSection || 'bs-ca';

  // Top-level overall progress
  var allClusters = S2_CLUSTERS.length;
  var doneClusters = Object.keys(APP.s2.clusterMappings).filter(function(k){return APP.s2.clusterMappings[k].status === 'confirmed';}).length;
  var pctOverall = allClusters > 0 ? Math.round(doneClusters / allClusters * 100) : 0;
  html += '<div class="s2-progress">';
  html += '<div class="s2-prog-row">';
  html += '<span class="s2-prog-num">' + doneClusters + '</span>';
  html += '<span class="s2-prog-tot">/ ' + allClusters + '</span>';
  html += '<span class="s2-prog-lbl">groups reviewed</span>';
  html += '<span class="s2-prog-pct"><strong>' + pctOverall + '%</strong></span>';
  html += '</div>';
  html += '<div class="s2-prog-bar"><div class="s2-prog-fill" style="width:' + pctOverall + '%"></div></div>';
  html += '</div>';

  // Section tabs
  html += '<div class="s2-sec-tabs">';
  fsOrder.forEach(function(fs){
    var clustersInFs = s2_clustersForSection(fs);
    if (clustersInFs.length === 0) return;
    var doneInFs = clustersInFs.filter(function(c){
      var m = APP.s2.clusterMappings[c.id];
      return m && m.status === 'confirmed';
    }).length;
    var on = activeSection === fs;
    html += '<div class="s2-sec-tab ' + (on ? 'on' : '') + '" onclick="s2_setActiveSection(\'' + fs + '\')">';
    html += fsLabels[fs];
    html += ' <span class="s2-sec-tab-cnt">' + doneInFs + '/' + clustersInFs.length + '</span>';
    html += '</div>';
  });
  html += '</div>';

  // Render cluster cards for the active section
  var clusters = s2_clustersForSection(activeSection);

  // Sort: review/needs-attention first, then split, then clean, then confirmed at the bottom
  var orderRank = {'review':0, 'split':1, 'clean':2};
  clusters.sort(function(a, b){
    var aMap = APP.s2.clusterMappings[a.id];
    var bMap = APP.s2.clusterMappings[b.id];
    var aDone = aMap && aMap.status === 'confirmed';
    var bDone = bMap && bMap.status === 'confirmed';
    if (aDone !== bDone) return aDone ? 1 : -1;
    return (orderRank[a.pattern] || 9) - (orderRank[b.pattern] || 9);
  });

  html += '<div class="s2-cards">';
  if (clusters.length === 0) {
    html += '<div class="s2-cards-empty">No clusters detected for this section.</div>';
  } else {
    clusters.forEach(function(c){
      html += s2_renderClusterCard(c);
    });
  }
  html += '</div>';

  // Continue button
  var allBsCaConfirmed = s2_clustersForSection('bs-ca').every(function(c){
    var m = APP.s2.clusterMappings[c.id];
    return m && m.status === 'confirmed';
  });
  html += '<div class="signoff-row">';
  if (!allBsCaConfirmed) {
    var caClusters = s2_clustersForSection('bs-ca');
    var caDone = caClusters.filter(function(c){
      var m = APP.s2.clusterMappings[c.id];
      return m && m.status === 'confirmed';
    }).length;
    html += '<span class="btn-signoff-help">Current Assets: ' + caDone + '/' + caClusters.length + ' groups reviewed. You can adjust details for individual accounts in the next step.</span>';
  } else {
    html += '<span class="btn-signoff-help">All Current Assets groups reviewed. Continue to individual mapping.</span>';
  }
  html += '<button class="btn-cont" onclick="s2_setSubstep(3)">Continue to Individual Mapping &rsaquo;</button>';
  html += '</div>';

  document.getElementById('main').innerHTML = html;
}

/* Render a single cluster card */
function s2_renderClusterCard(c){
  var mapping = APP.s2.clusterMappings[c.id];
  var isConfirmed = mapping && mapping.status === 'confirmed';
  var isReview = mapping && mapping.status === 'review';
  var isExpanded = !!APP.s2.expandedClusters[c.id];

  var cardCls = ['s2-card'];
  cardCls.push('pat-' + c.pattern);
  if (isConfirmed) cardCls.push('confirmed');
  if (isReview) cardCls.push('review-marked');
  if (isExpanded) cardCls.push('expanded');

  var html = '<div class="' + cardCls.join(' ') + '">';

  // Header: cluster code + name + pattern tag + leaf count + expand toggle
  html += '<div class="s2-card-hdr">';
  html += '<div class="s2-card-hdr-l">';
  if (c.code !== '—') html += '<span class="s2-card-code">' + c.code + '</span>';
  html += '<span class="s2-card-name">' + c.name + '</span>';
  // Pattern tag
  var patternTags = {'clean':'Clean', 'split':'Split', 'review':'Needs review'};
  html += '<span class="s2-pat-tag s2-pat-' + c.pattern + '">' + (patternTags[c.pattern] || c.pattern) + '</span>';
  html += '</div>';
  html += '<div class="s2-card-hdr-r">';
  html += '<button class="s2-card-expand" onclick="s2_toggleClusterExpand(\'' + c.id + '\')" title="' + (isExpanded ? 'Hide accounts' : 'Show all accounts in this group') + '">';
  html += '<span class="s2-card-leaves">' + c.leafCount + ' account' + (c.leafCount === 1 ? '' : 's') + '</span>';
  html += '<span class="s2-card-chevron">' + (isExpanded ? '&#9662;' : '&#9656;') + '</span>';
  html += '</button>';
  html += '</div>';
  html += '</div>';

  // Targets
  html += '<div class="s2-card-targets">';
  html += '<span class="s2-card-arrow">&rarr;</span>';
  if (c.aiTargets.length === 1) {
    var k = S2_KLAY_BY_CODE[c.aiTargets[0]];
    html += '<span class="s2-card-target-pill ' + (isConfirmed ? 'confirmed' : '') + '">';
    html += '<span class="s2-card-target-code">' + c.aiTargets[0] + '</span>';
    html += '<span class="s2-card-target-name">' + (k ? k.name : '—') + '</span>';
    html += '</span>';
  } else {
    html += '<div class="s2-card-target-multi">';
    c.aiTargets.forEach(function(t){
      var k = S2_KLAY_BY_CODE[t];
      var cnt = c.aiTargetCounts[t];
      html += '<div class="s2-card-target-row">';
      html += '<span class="s2-card-target-pill ' + (isConfirmed ? 'confirmed' : '') + '">';
      html += '<span class="s2-card-target-code">' + t + '</span>';
      html += '<span class="s2-card-target-name">' + (k ? k.name : '—') + '</span>';
      html += '</span>';
      html += '<span class="s2-card-target-meta">' + cnt + ' account' + (cnt === 1 ? '' : 's') + '</span>';
      html += '</div>';
    });
    html += '</div>';
  }
  html += '</div>';

  // Reasoning note
  if (c.reasoning) {
    html += '<div class="s2-card-note">' + c.reasoning + '</div>';
  }

  // Expanded detail — list of accounts in this group with their targets
  if (isExpanded) {
    html += '<div class="s2-card-detail">';
    html += '<div class="s2-card-detail-hdr">Accounts in this group</div>';
    html += '<table class="s2-card-detail-tbl">';
    html += '<thead><tr><th>Legacy account</th><th></th><th>Klay target</th><th class="s2-cd-conf">Confidence</th></tr></thead>';
    html += '<tbody>';
    c.leafIndices.forEach(function(idx){
      var a = S2_ACCOUNTS[idx];
      var k = S2_KLAY_BY_CODE[a.newCode];
      var confLbl = a.conf === 'high' ? 'High' : a.conf === 'med' ? 'Med' : 'Low';
      var confCls = 's2-cd-conf-' + a.conf;
      html += '<tr>';
      html += '<td><span class="s2-cd-code">' + a.old + '</span> <span class="s2-cd-name">' + a.oldName + '</span></td>';
      html += '<td class="s2-cd-arrow">&rarr;</td>';
      html += '<td><span class="s2-cd-tcode">' + a.newCode + '</span> <span class="s2-cd-tname">' + (k ? k.name : a.newName || '—') + '</span></td>';
      html += '<td class="s2-cd-conf"><span class="s2-cd-conf-pill ' + confCls + '">' + confLbl + '</span></td>';
      html += '</tr>';
      // Reason row for non-high confidence
      if (a.reason) {
        html += '<tr class="s2-cd-reason-row"><td colspan="4"><span class="s2-cd-reason s2-cd-reason-' + a.conf + '">' + a.reason + '</span></td></tr>';
      }
    });
    html += '</tbody></table>';
    html += '<div class="s2-card-detail-foot">To override individual accounts in this group, go to step 3 (Individual Mapping).</div>';
    html += '</div>';
  }

  // Actions
  html += '<div class="s2-card-actions">';
  if (isConfirmed) {
    html += '<button class="btn-conf-done" onclick="s2_clusterAction(\'' + c.id + '\', \'unconfirm\')">&#10003; Reviewed &middot; ' + c.leafCount + ' account' + (c.leafCount === 1 ? '' : 's') + '</button>';
    html += '<button class="btn-conf-secondary" onclick="s2_clusterAction(\'' + c.id + '\', \'unconfirm\')">Undo</button>';
  } else {
    html += '<button class="btn-conf-primary" onclick="s2_clusterAction(\'' + c.id + '\', \'confirm\')">Confirm</button>';
    html += '<button class="btn-conf-secondary" onclick="s2_clusterAction(\'' + c.id + '\', \'review\')">Mark for review</button>';
  }
  html += '</div>';

  html += '</div>';
  return html;
}

/* User clicks Confirm / Mark for review / Undo on a cluster card */
function s2_clusterAction(clusterId, action){
  s2_cascadeCluster(clusterId, action);
  renderS2();
}
function s2_toggleClusterExpand(clusterId){
  APP.s2.expandedClusters[clusterId] = !APP.s2.expandedClusters[clusterId];
  renderS2();
}
function s2_setActiveSection(fs){
  APP.s2.activeSection = fs;
  renderS2();
}

/* ── SUBSTEP 3: Account mapping (existing workspace, refit for cluster cascade) ──
   The cluster column on the left is the navigator. The workspace shows leaves —
   cluster-confirmed leaves appear as 'Confirmed' (cascaded), low/med-confidence
   leaves still need individual review. */
function s2_renderSubstep3(){
  var total = S2_ACCOUNTS.filter(function(a){return !a.isHeader;}).length;
  var reviewed = S2_ACCOUNTS.filter(function(a){return !a.isHeader && a.status === 'confirmed';}).length;
  var pct = total > 0 ? Math.round(reviewed / total * 100) : 0;

  var html = '<h1 class="stage-title">Individual Mapping</h1>'
    + '<p class="stage-sub">Cluster-confirmed accounts are auto-confirmed. Browse by account type, or review issue clusters that need cleanup. Accounts with low or medium confidence still need your individual attention.</p>';

  // Progress bar
  html += '<div class="s2-progress">';
  html += '<div class="s2-prog-row">';
  html += '<span class="s2-prog-num">' + reviewed + '</span>';
  html += '<span class="s2-prog-tot">/ ' + total + '</span>';
  html += '<span class="s2-prog-lbl">accounts confirmed</span>';
  html += '<span class="s2-prog-pct"><strong>' + pct + '%</strong></span>';
  html += '</div>';
  html += '<div class="s2-prog-bar"><div class="s2-prog-fill" style="width:' + pct + '%"></div></div>';
  html += '</div>';

  // Account-type tabs (consistent with Substep 2's section tabs)
  // Default tab: 'all-accounts'. Issue-cluster tabs: issue keys.
  var activeCluster = APP.s2.activeCluster || 'all-accounts';
  // Account-type tabs
  html += '<div class="s2-sec-tabs">';
  // All tab
  var allConfirmed = S2_ACCOUNTS.filter(function(a){return !a.isHeader && a.status === 'confirmed';}).length;
  html += '<div class="s2-sec-tab ' + (activeCluster === 'all-accounts' ? 'on' : '') + '" onclick="s2_setCluster(\'all-accounts\')">';
  html += 'All';
  html += ' <span class="s2-sec-tab-cnt">' + allConfirmed + '/' + total + '</span>';
  html += '</div>';
  // Type tabs (skip 'eq' if no accounts; rest match S2_TYPES order)
  S2_TYPES.forEach(function(t){
    var rows = s2_accountsOfType(t.key).filter(function(a){return !a.isHeader;});
    if (rows.length === 0) return;
    var confirmedN = rows.filter(function(a){return a.status === 'confirmed';}).length;
    var on = activeCluster === ('type:' + t.key);
    html += '<div class="s2-sec-tab ' + (on ? 'on' : '') + '" onclick="s2_setCluster(\'type:' + t.key + '\')">';
    html += t.name;
    html += ' <span class="s2-sec-tab-cnt">' + confirmedN + '/' + rows.length + '</span>';
    html += '</div>';
  });
  html += '</div>';

  // Issue boxes — only on "All" tab; when an issue is the active cluster, also show the boxes
  // (so the user can pick another issue / clear the filter)
  var isOnAllTab = (activeCluster === 'all-accounts') || S2_ISSUES.some(function(i){return i.key === activeCluster;});
  if (isOnAllTab) {
    html += '<div class="s2-issue-boxes">';
    html += '<div class="s2-issue-boxes-hdr">Issue clusters &middot; cross-cutting accounts that need cleanup</div>';
    html += '<div class="s2-issue-boxes-grid">';
    S2_ISSUES.forEach(function(iss){
      var on = activeCluster === iss.key;
      var cls = ['s2-issue-box'];
      cls.push('s2-issue-' + iss.kind);
      if (on) cls.push('on');
      html += '<div class="' + cls.join(' ') + '" onclick="s2_setCluster(\'' + (on ? 'all-accounts' : iss.key) + '\')">';
      html += '<div class="s2-issue-box-cnt">' + iss.count + '</div>';
      html += '<div class="s2-issue-box-name">' + iss.name + '</div>';
      html += '<div class="s2-issue-box-kind">' + (iss.kind === 'hard' ? 'Hard block' : 'Soft block') + '</div>';
      html += '</div>';
    });
    html += '</div>';
    html += '</div>';
  }

  // Workspace (full-width — no sidebar)
  html += '<div class="s2-ws s2-ws-full">';
  html += s2_renderAccountWorkspace(activeCluster, APP.s2.wsFilter || 'review');
  html += '</div>';

  // Continue
  var unmapped = S2_ACCOUNTS.filter(function(a){return !a.isHeader && a.status === 'unconfirmed';}).length;
  var canContinue = (unmapped === 0);
  html += '<div class="signoff-row">';
  if (!canContinue) {
    html += '<span class="btn-signoff-help">' + unmapped + ' account' + (unmapped === 1 ? '' : 's') + ' still need to be confirmed</span>';
  }
  html += '<button class="btn-cont" ' + (canContinue ? '' : 'disabled') + ' onclick="jumpToStage(3)">Continue to Stage 3 — Review &rsaquo;</button>';
  html += '</div>';

  document.getElementById('main').innerHTML = html;
}

/* ── PREVIEW: Old vs New CoA structure side-by-side ── */
function s2_renderPreview(){
  var total = S2_ACCOUNTS.length;
  var reviewed = S2_ACCOUNTS.filter(function(a){return a.status === 'confirmed';}).length;
  var pct = Math.round(reviewed / total * 100);
  var unmapped = S2_ACCOUNTS.filter(function(a){return a.status === 'unconfirmed';}).length;

  var html = '<h1 class="stage-title">Account Mapping &middot; Preview</h1>'
    + '<p class="stage-sub">Side-by-side view of your Legacy CoA and the resulting Klay CoA. Green rows are confirmed mappings; uncolored rows are not yet mapped. Click a legacy account to highlight its corresponding Klay account.</p>';

  // Progress bar
  html += '<div class="s2-progress">';
  html += '<div class="s2-prog-row">';
  html += '<span class="s2-prog-num">' + reviewed + '</span>';
  html += '<span class="s2-prog-tot">/ ' + total + '</span>';
  html += '<span class="s2-prog-lbl">accounts mapped</span>';
  html += '<span class="s2-prog-pct"><strong>' + pct + '%</strong> · 47 inactive excluded</span>';
  html += '</div>';
  html += '<div class="s2-prog-bar"><div class="s2-prog-fill" style="width:' + pct + '%"></div></div>';
  html += '</div>';

  // Legend — only Mapped / Unmapped
  html += '<div style="display:flex;gap:18px;margin-bottom:12px;font-size:11px;color:var(--color-text-secondary)">';
  html += '<span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--color-success-surface);border:1px solid var(--color-success-border);margin-right:5px;vertical-align:middle"></span>Mapped (confirmed)</span>';
  html += '<span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--color-surface-raised);border:1px solid var(--color-border-default);margin-right:5px;vertical-align:middle"></span>Unmapped</span>';
  html += '</div>';

  html += '<div class="s2-prev-shell">';

  // ── LEFT: Legacy CoA (nested 3-layer tree: top → mid → leaf) ──
  html += '<div class="s2-prev-side">';
  html += '<div class="s2-prev-side-hdr">';
  html += '<div><div class="s2-prev-side-title">Legacy CoA</div>'
    + '<div class="s2-prev-side-sub">' + total + ' accounts &middot; ' + reviewed + ' mapped &middot; PT Makmur Jaya source</div></div>';
  html += '</div>';
  html += '<div class="s2-prev-tree">';

  S2_TYPES.forEach(function(t){
    var typeRoots = LEGACY_TREE[t.key] || [];
    if (typeRoots.length === 0) return;
    // Type-level group header (acts as top-level header even though it's the Type)
    var typeAccounts = s2_accountsOfType(t.key);
    var typeMapped = typeAccounts.filter(function(a){return a.status === 'confirmed';}).length;
    html += '<div class="s2-prev-grp">';
    html += '<div class="s2-prev-grp-hdr">' + t.name + ' <span class="s2-prev-grp-cnt">' + typeMapped + '/' + typeAccounts.length + '</span></div>';

    typeRoots.forEach(function(top){
      // TOP node
      var topMapped = s2_subtreeMappedCount(top);
      var topTotal  = s2_subtreeLeafCount(top);
      var topAllMapped = topTotal > 0 && topMapped === topTotal;
      html += '<div class="s2-prev-node node-top ' + (topAllMapped ? 'all-mapped' : '') + '">';
      html += '<span class="s2-prev-node-code">' + top.code + '</span>';
      html += '<span class="s2-prev-node-name">' + top.name + '</span>';
      html += '<span class="s2-prev-node-cnt">' + topMapped + '/' + topTotal + '</span>';
      html += '</div>';

      top.children.forEach(function(mid){
        // MID node
        var midMapped = s2_subtreeMappedCount(mid);
        var midTotal  = s2_subtreeLeafCount(mid);
        var midAllMapped = midTotal > 0 && midMapped === midTotal;
        html += '<div class="s2-prev-node node-mid ' + (midAllMapped ? 'all-mapped' : '') + '">';
        html += '<span class="s2-prev-node-code">' + mid.code + '</span>';
        html += '<span class="s2-prev-node-name">' + mid.name + '</span>';
        html += '<span class="s2-prev-node-cnt">' + midMapped + '/' + midTotal + '</span>';
        html += '</div>';

        mid.children.forEach(function(leaf){
          var a = leaf._ref;
          var origIdx = S2_ACCOUNTS.indexOf(a);
          // Mapped = confirmed; Unmapped = not confirmed (NO amber for "pending suggestion")
          var stateCls = a.status === 'confirmed' ? 'mapped' : 'unmapped';
          var hi = APP.s2.previewHighlight === origIdx ? ' highlighted' : '';
          html += '<div class="s2-prev-leaf ' + stateCls + hi + '" onclick="s2_previewSelect(' + origIdx + ')">';
          html += '<span class="s2-prev-leaf-code">' + a.old + '</span>';
          html += '<span class="s2-prev-leaf-name">' + a.oldName + '</span>';
          if (a.status === 'confirmed') {
            html += '<span class="s2-prev-leaf-arrow">&rarr; ' + a.newCode + '</span>';
          }
          html += '</div>';
        });
      });
    });
    html += '</div>'; // /grp
  });

  html += '</div></div>'; // /tree /side

  // ── RIGHT: Klay CoA (2-layer: Type → Sub-section → Leaf) ──
  html += '<div class="s2-prev-side">';
  html += '<div class="s2-prev-side-hdr">';
  var mvpCount = S2_KLAY.filter(function(k){return k.mvp === 'IN';}).length;
  html += '<div><div class="s2-prev-side-title">Klay CoA <span style="font-size:11px;color:var(--color-text-tertiary);font-weight:500">(post-migration)</span></div>'
    + '<div class="s2-prev-side-sub">' + mvpCount + ' standardized accounts &middot; 2-layer structure</div></div>';
  html += '</div>';
  html += '<div class="s2-prev-tree" id="s2-prev-tree-klay">';

  // Build inbound count once for efficiency
  var klayInbound = {}; // code → {confirmed, total}
  S2_ACCOUNTS.forEach(function(a){
    if (!klayInbound[a.newCode]) klayInbound[a.newCode] = {confirmed:0, total:0};
    klayInbound[a.newCode].total++;
    if (a.status === 'confirmed') klayInbound[a.newCode].confirmed++;
  });

  S2_TYPES.forEach(function(t){
    var bucket = KLAY_TREE[t.key];
    if (!bucket || bucket.children.length === 0) return;

    // Count totals across all sub-sections under this type
    var typeLeafCount = 0, typeMappedCount = 0;
    bucket.children.forEach(function(sub){
      sub.children.forEach(function(leaf){
        typeLeafCount++;
        var ib = klayInbound[leaf.code] || {confirmed:0};
        if (ib.confirmed > 0) typeMappedCount++;
      });
    });

    html += '<div class="s2-prev-grp">';
    html += '<div class="s2-prev-grp-hdr">' + t.name + ' <span class="s2-prev-grp-cnt">' + typeMappedCount + '/' + typeLeafCount + '</span></div>';

    // Sub-section nodes (mid-level) → leaves
    bucket.children.forEach(function(sub){
      // Count mapped in this sub-section
      var subLeafCount = sub.children.length;
      var subMappedCount = 0;
      sub.children.forEach(function(leaf){
        var ib = klayInbound[leaf.code] || {confirmed:0};
        if (ib.confirmed > 0) subMappedCount++;
      });
      var subAllMapped = subLeafCount > 0 && subMappedCount === subLeafCount;

      // Sub-section header (mid-level node)
      html += '<div class="s2-prev-node node-mid ' + (subAllMapped ? 'all-mapped' : '') + '">';
      html += '<span class="s2-prev-node-code">' + (sub.code || '') + '</span>';
      html += '<span class="s2-prev-node-name">' + sub.name + '</span>';
      html += '<span class="s2-prev-node-cnt">' + subMappedCount + '/' + subLeafCount + '</span>';
      html += '</div>';

      // Leaves
      sub.children.forEach(function(leaf){
        var ib = klayInbound[leaf.code] || {confirmed:0, total:0};
        var stateCls = ib.confirmed > 0 ? 'mapped' : 'unmapped';
        var targetCode = APP.s2.previewHighlight != null ? S2_ACCOUNTS[APP.s2.previewHighlight].newCode : null;
        var hi = targetCode === leaf.code ? ' highlighted' : '';
        // Add system-reserved / control account flags
        var flagsHtml = '';
        if (leaf._klay && leaf._klay.sysReserved) flagsHtml += ' <span class="s2-prev-flag sys">sys</span>';
        if (leaf._klay && leaf._klay.controlAcct) flagsHtml += ' <span class="s2-prev-flag ctrl">ctrl</span>';
        html += '<div class="s2-prev-leaf ' + stateCls + hi + '" id="s2-prev-klay-' + leaf.code + '">';
        html += '<span class="s2-prev-leaf-code">' + leaf.code + '</span>';
        html += '<span class="s2-prev-leaf-name">' + leaf.name + flagsHtml + '</span>';
        if (ib.confirmed > 0) {
          html += '<span class="s2-prev-leaf-arrow">' + ib.confirmed + ' inbound</span>';
        }
        html += '</div>';
      });
    });
    html += '</div>'; // /grp
  });

  html += '</div></div></div>'; // /tree /side /shell

  // Continue
  var canContinue = (unmapped === 0);
  html += '<div class="signoff-row">';
  if (!canContinue) {
    html += '<span class="btn-signoff-help">' + unmapped + ' account' + (unmapped === 1 ? '' : 's') + ' still need to be confirmed</span>';
  }
  html += '<button class="btn-cont" ' + (canContinue ? '' : 'disabled') + ' onclick="jumpToStage(3)">Continue to Stage 3 — Review &rsaquo;</button>';
  html += '</div>';

  document.getElementById('main').innerHTML = html;

  if (APP.s2.previewHighlight != null) {
    var target = S2_ACCOUNTS[APP.s2.previewHighlight].newCode;
    var el = document.getElementById('s2-prev-klay-' + target);
    if (el) el.scrollIntoView({block:'center', behavior:'smooth'});
  }
}

/* Helpers for preview tree counts */
function s2_subtreeLeafCount(node){
  if (node.kind === 'leaf') return 1;
  if (!node.children) return 0;
  return node.children.reduce(function(s, c){return s + s2_subtreeLeafCount(c);}, 0);
}
function s2_subtreeMappedCount(node){
  if (node.kind === 'leaf') return (node._ref && node._ref.status === 'confirmed') ? 1 : 0;
  if (!node.children) return 0;
  return node.children.reduce(function(s, c){return s + s2_subtreeMappedCount(c);}, 0);
}

/* ── Type-level mapping summary panel ──
   Compact lookup that shows, for the selected Account Type:
   - Legacy parents (mid-level, e.g. "Kas dan Bank", "Piutang & Uang Muka")
   - Klay parent (the Type itself, since Klay is 1-layer down)
   Each legacy parent is shown with its mapping target as a small flow.
*/
function s2_renderTypeSummary(typeKey){
  var t = S2_TYPES.find(function(x){return x.key === typeKey;});
  if (!t) return '';
  var typeRoots = LEGACY_TREE[typeKey] || [];
  // Collect mid-level parents across all top-level groups for this type
  var midParents = [];
  typeRoots.forEach(function(top){
    top.children.forEach(function(mid){
      midParents.push(mid);
    });
  });
  var klayBucket = KLAY_TREE[typeKey];
  var klayLeafCount = klayBucket ? klayBucket.children.length : 0;

  var html = '<div class="s2-typesum">';
  html += '<div class="s2-typesum-hdr">';
  html += '<span class="s2-typesum-title">Type-level structure</span>';
  html += '<span class="s2-typesum-sub">' + midParents.length + ' legacy sub-groups &rarr; ' + klayLeafCount + ' Klay accounts</span>';
  html += '</div>';
  html += '<div class="s2-typesum-body">';

  // LEFT: legacy mid-level parents
  html += '<div class="s2-typesum-side">';
  html += '<div class="s2-typesum-side-lbl">Legacy structure</div>';
  midParents.forEach(function(mid){
    var mappedN = s2_subtreeMappedCount(mid);
    var totalN = s2_subtreeLeafCount(mid);
    var done = totalN > 0 && mappedN === totalN;
    html += '<div class="s2-typesum-pill ' + (done ? 'done' : '') + '">';
    html += '<span class="s2-typesum-pill-code">' + mid.code + '</span>';
    html += '<span class="s2-typesum-pill-name">' + mid.name + '</span>';
    html += '<span class="s2-typesum-pill-cnt">' + mappedN + '/' + totalN + '</span>';
    html += '</div>';
  });
  html += '</div>';

  // CENTER: arrow
  html += '<div class="s2-typesum-arrow">&rarr;</div>';

  // RIGHT: Klay leaves under this type (1-layer down)
  html += '<div class="s2-typesum-side">';
  html += '<div class="s2-typesum-side-lbl">Klay structure</div>';
  if (klayBucket) {
    klayBucket.children.forEach(function(k){
      // count inbound confirmed
      var inb = S2_ACCOUNTS.filter(function(a){return a.newCode === k.code && a.status === 'confirmed';}).length;
      var hasInb = inb > 0;
      html += '<div class="s2-typesum-pill ' + (hasInb ? 'done' : '') + '">';
      html += '<span class="s2-typesum-pill-code">' + k.code + '</span>';
      html += '<span class="s2-typesum-pill-name">' + k.name + '</span>';
      if (hasInb) html += '<span class="s2-typesum-pill-cnt">' + inb + '</span>';
      html += '</div>';
    });
  }
  html += '</div>';

  html += '</div></div>';
  return html;
}

/* Account-level workspace (ALL period) */
function s2_renderAccountWorkspace(clusterKey, filterMode){
  // Filter accounts by selected cluster
  var rows;
  var clusterName = '';
  var clusterSub = '';
  if (!clusterKey || clusterKey === 'all-accounts') {
    rows = S2_ACCOUNTS;
    clusterName = 'All accounts';
    clusterSub = 'Full Chart of Accounts (' + S2_ACCOUNTS.length + ' legacy accounts). Use Show: To review to focus on what still needs your attention.';
  } else if (clusterKey.indexOf('type:') === 0) {
    // Account-type cluster
    var typeKey = clusterKey.substring(5);
    var t = S2_TYPES.find(function(t){return t.key === typeKey;});
    rows = s2_accountsOfType(typeKey);
    clusterName = t ? t.name : '—';
    clusterSub = 'All ' + rows.length + ' legacy accounts classified as ' + (t ? t.name.toLowerCase() : '') + '. The Klay account dropdown is filtered to standardized accounts of the same type.';
  } else if (clusterKey === 'no-issue') {
    rows = S2_ACCOUNTS.filter(function(a){return !a.issues || a.issues.length === 0;});
    clusterName = 'Clean — ready to confirm';
    clusterSub = 'Accounts with no flagged issues. Bulk-confirm or review individually.';
  } else {
    var iss = S2_ISSUES.find(function(i){return i.key === clusterKey;});
    clusterName = iss ? iss.name : '—';
    clusterSub = iss ? (iss.kind === 'hard' ? 'Hard block — must resolve before sign-off.' : 'Soft block — you can resolve directly.') : '';
    rows = S2_ACCOUNTS.filter(function(a){return a.issues && a.issues.indexOf(clusterKey) !== -1;});
  }

  // Apply filter (review/all/confirmed) — exclude headers from count totals (they're structural, not mappable)
  var leafRows = rows.filter(function(a){return !a.isHeader;});

  // "To review" semantics — accounts that need the user's individual attention:
  //  1. Account is unconfirmed (cluster wasn't bulk-confirmed in Step 2)
  //  2. OR account has low/med confidence (deserves a second look even if cluster was bulk-confirmed)
  function needsReview(a){
    if (a.status === 'unconfirmed') return true;
    if (a.conf === 'low' || a.conf === 'med') return true;
    return false;
  }
  var reviewRows = leafRows.filter(needsReview);
  var confirmedRows = leafRows.filter(function(a){return a.status === 'confirmed' && !needsReview(a);});
  // (an account that's both confirmed AND low-confidence shows in Review, not Confirmed —
  // it counts as "still deserves attention" even though it's been confirmed)

  var unconfirmedCount = reviewRows.length;
  var confirmedCount   = confirmedRows.length;
  var displayRows;
  if (filterMode === 'review') displayRows = reviewRows;
  else if (filterMode === 'confirmed') displayRows = confirmedRows;
  else {
    // 'all' mode: include headers interleaved with leaves so the tree shape is visible
    displayRows = rows;
  }

  var html = '<div class="s2-ws-hdr">';
  html += '<div><div class="s2-ws-title">' + clusterName + '</div><div class="s2-ws-sub">' + clusterSub + '</div></div>';
  html += '<div class="s2-ws-show"><span class="s2-ws-show-lbl">Show:</span>'
    + '<button class="s2-ws-filt-btn ' + (filterMode === 'review' ? 'active' : '') + '" onclick="s2_setWsFilter(\'review\')">To review (' + unconfirmedCount + ')</button>'
    + '<button class="s2-ws-filt-btn ' + (filterMode === 'all' ? 'active' : '') + '" onclick="s2_setWsFilter(\'all\')">All (' + leafRows.length + ')</button>'
    + '<button class="s2-ws-filt-btn ' + (filterMode === 'confirmed' ? 'active' : '') + '" onclick="s2_setWsFilter(\'confirmed\')">Confirmed (' + confirmedCount + ')</button>';
  html += '</div></div>';

  // Table
  html += '<div class="s2-ws-tbl-wrap">';
  if (filterMode === 'review' && unconfirmedCount > 0) {
    html += '<div class="s2-ws-tbl-banner">' + unconfirmedCount + ' account' + (unconfirmedCount === 1 ? '' : 's') + ' to review &mdash; not yet mapped, or AI flagged low/medium confidence</div>';
  }
  html += '<table class="s2-ws-tbl">';
  html += '<thead><tr>'
    + '<th style="width:30px"><input type="checkbox"/></th>'
    + '<th style="width:240px">Legacy account</th>'
    + '<th>Klay account <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--color-text-disabled)">· AI-suggested, editable</span></th>'
    + '<th style="text-align:right;width:140px">Action</th>'
    + '</tr></thead><tbody>';

  // Pagination — keep the page snappy when displaying 300+ rows
  var pageSize = 60;
  var page = APP.s2.acctPage || 0;
  var maxPage = Math.max(0, Math.ceil(displayRows.length / pageSize) - 1);
  if (page > maxPage) page = maxPage;
  var pageRows = displayRows.slice(page * pageSize, (page + 1) * pageSize);

  if (displayRows.length === 0) {
    html += '<tr><td colspan="4" style="padding:36px;text-align:center;color:var(--color-text-tertiary);font-size:12px;font-weight:300">No accounts match this view.</td></tr>';
  } else {
    // Group consecutive unconfirmed rows that share the same Klay target into "runs"
    // Each run gets a group header with bulk-Confirm + the rows underneath.
    // Headers (structural) and confirmed rows break runs.
    var i = 0;
    while (i < pageRows.length) {
      var a = pageRows[i];

      // Header row — render as-is, breaks any in-progress run
      if (a.isHeader) {
        html += '<tr class="s2-row s2-row-header">';
        html += '<td></td>';
        html += '<td colspan="3"><span class="s2-ws-acct-code s2-header-code">' + a.old + '</span> <span class="s2-header-name">' + a.oldName + '</span> <span class="s2-header-tag">structural · no mapping needed</span></td>';
        html += '</tr>';
        i++;
        continue;
      }

      // Detect run: consecutive rows, same newCode, all unconfirmed, all high-confidence
      // (Low/med rows stay individual so user reviews each — bulk-confirming low-confidence
      // would defeat the purpose of the confidence flag.)
      var runEnd = i;
      if (a.status === 'unconfirmed' && a.conf === 'high') {
        while (runEnd < pageRows.length) {
          var r = pageRows[runEnd];
          if (r.isHeader) break;
          if (r.status !== 'unconfirmed' || r.conf !== 'high' || r.newCode !== a.newCode) break;
          runEnd++;
        }
      }

      var runLen = runEnd - i;
      // Only show bulk-confirm groups in "All" filter mode. In "To review" mode,
      // the user is doing focused individual review — bulk-confirm would defeat the purpose.
      var isRun = runLen >= 3 && filterMode === 'all';

      if (isRun) {
        // Emit group header with bulk-confirm button
        var k = S2_KLAY_BY_CODE[a.newCode];
        var idxList = pageRows.slice(i, runEnd).map(function(r){return S2_ACCOUNTS.indexOf(r);});
        html += '<tr class="s2-row s2-row-group-hdr">';
        html += '<td><input type="checkbox" onclick="s2_toggleGroupCheck([' + idxList.join(',') + '], this.checked)"/></td>';
        html += '<td colspan="2">';
        html += '<div class="s2-grp-line">';
        html += '<span class="s2-grp-icon">&#9662;</span>';
        html += '<span class="s2-grp-label">' + runLen + ' high-confidence accounts &rarr;</span>';
        html += '<span class="s2-grp-target"><span class="s2-grp-tcode">' + a.newCode + '</span> ' + (k ? k.name : '—') + '</span>';
        html += '</div>';
        html += '</td>';
        html += '<td style="text-align:right">';
        html += '<button class="s2-act confirm s2-grp-confirm" onclick="s2_confirmGroup([' + idxList.join(',') + '])">Confirm ' + runLen + ' high-confidence</button>';
        html += '</td>';
        html += '</tr>';
      }

      // Render the rows (the run, or just this one row if not a run)
      var sliceEnd = isRun ? runEnd : i + 1;
      for (var j = i; j < sliceEnd; j++) {
        var row = pageRows[j];
        var origIdx = S2_ACCOUNTS.indexOf(row);
        var rowCls = ['s2-row'];
        if (row.status === 'unconfirmed' && row.conf === 'low') rowCls.push('s2-row-low');
        else if (row.status === 'unconfirmed' && row.conf === 'med') rowCls.push('s2-row-med');
        if (isRun) rowCls.push('s2-row-in-group');

        var rowId = 's2-row-' + row.old.replace(/[^a-zA-Z0-9]/g, '_');
        html += '<tr id="' + rowId + '" class="' + rowCls.join(' ') + '">';
        html += '<td><input type="checkbox"/></td>';
        html += '<td><div class="s2-ws-acct-code">' + row.old + '</div><div class="s2-ws-acct-name">' + row.oldName + '</div>';
        if (row.status === 'unconfirmed' && row.reason) {
          html += '<div class="s2-row-reason s2-row-reason-' + row.conf + '">' + row.reason + '</div>';
        }
        html += '</td>';
        html += '<td>' + s2_renderKlayDropdown(row, origIdx) + '</td>';
        html += '<td style="text-align:right">';
        if (row.status === 'confirmed') {
          html += '<button class="s2-act unconfirm" onclick="s2_unconfirmRule(' + origIdx + ')">&#10003; Confirmed</button>';
        } else {
          html += '<button class="s2-act confirm" onclick="s2_confirmRule(' + origIdx + ')">Confirm</button>';
        }
        html += '</td>';
        html += '</tr>';
      }
      i = sliceEnd;
    }
  }

  html += '</tbody></table></div>';

  // Pagination footer (only show when more than one page)
  if (displayRows.length > pageSize) {
    var fromN = page * pageSize + 1;
    var toN = Math.min((page + 1) * pageSize, displayRows.length);
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;font-size:11px;color:var(--color-text-tertiary)">';
    html += '<span>Showing <strong style="color:var(--color-text-primary)">' + fromN + '–' + toN + '</strong> of ' + displayRows.length.toLocaleString() + '</span>';
    html += '<div style="display:flex;gap:6px">';
    html += '<button class="s2-act ' + (page === 0 ? 'disabled' : '') + '" ' + (page === 0 ? 'disabled' : 'onclick="s2_setAcctPage(' + (page - 1) + ')"') + '>&larr; Prev</button>';
    html += '<span style="padding:5px 10px">Page ' + (page + 1) + ' of ' + (maxPage + 1) + '</span>';
    html += '<button class="s2-act ' + (page >= maxPage ? 'disabled' : '') + '" ' + (page >= maxPage ? 'disabled' : 'onclick="s2_setAcctPage(' + (page + 1) + ')"') + '>Next &rarr;</button>';
    html += '</div></div>';
  }

  return html;
}

/* Klay code → friendly name + section anchor for TB display */
/* Klay code → friendly name + section anchor for TB/P&L display.
   Keys are the full Klay codes (e.g. '1-1100'). Section drives which statement and ordering.
   Sections: ASSETS, LIABILITIES, EQUITY (TB/BS) · REVENUE, COGS, OPEX, NONOP, TAX (P&L) */
var S3_KLAY_META = {
  // ── Section 1 — Assets ──
  // Cash & Cash Equivalents
  '1-1100':{name:'Kas (Petty Cash)',                          section:'ASSETS', order:10},
