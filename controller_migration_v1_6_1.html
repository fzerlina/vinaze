/* Issue cluster boxes — surface CoA issue clusters as a 4-col grid above the table.
   Three tiers (hard/soft/warn) are visually distinguished by border color + icon.
   Each box has exactly one action: Filter (filters the table to affected accounts).
   Section is COLLAPSED by default (showing the first row of 4) with a "Show all N"
   toggle — the hard tier comes first, so the most urgent issues are always visible. */
function s2_renderIssueBoxes(){
  // Compute live counts per issue
  var counts = {};
  S2_ACCOUNTS.forEach(function(a){
    if (!a.issues) return;
    a.issues.forEach(function(k){ counts[k] = (counts[k] || 0) + 1; });
  });
  var liveIssues = S2_ISSUES.filter(function(iss){ return counts[iss.key] > 0; });
  if (liveIssues.length === 0) return '';

  // Sort: hard → soft → warn. Within a tier, preserve S2_ISSUES order.
  var tierRank = {hard:0, soft:1, warn:2};
  liveIssues.sort(function(a, b){
    var ra = tierRank[a.kind] != null ? tierRank[a.kind] : 9;
    var rb = tierRank[b.kind] != null ? tierRank[b.kind] : 9;
    return ra - rb;
  });

  // Icon per tier (HTML entity)
  var iconFor = {hard:'&#9940;' /* ⛔ */, soft:'&#9888;' /* ⚠ */, warn:'&#9432;' /* ⓘ */};

  // Collapse logic: by default show only the first row (4 boxes — first row of the
  // 4-col grid). The hard tier is always 4 entries when fully populated, so the
  // collapsed view is naturally "the hard blockers." Expanded view shows all.
  var COLLAPSED_COUNT = 4;
  var expanded = !!APP.s2.issuesExpanded;
  var hidden = liveIssues.length - COLLAPSED_COUNT;
  var canCollapse = liveIssues.length > COLLAPSED_COUNT;
  var visible = (canCollapse && !expanded) ? liveIssues.slice(0, COLLAPSED_COUNT) : liveIssues;

  var html = '<div class="s2-issboxes-section">';
  html += '<div class="s2-issboxes">';
  visible.forEach(function(iss){
    var n = counts[iss.key];
    var icon = iconFor[iss.kind] || '';
    html += '<div class="s2-issbox ' + iss.kind + '">';
    html += '<div class="s2-issbox-hd">';
    html += '<span class="s2-issbox-icon">' + icon + '</span>';
    html += '<div>';
    html += '<div class="s2-issbox-name">' + iss.name + '</div>';
    html += '<div class="s2-issbox-cnt">' + n + ' affected</div>';
    html += '</div>';
    html += '</div>';
    html += '<div class="s2-issbox-actions">';
    html += '<button class="s2-issbox-filter" onclick="s2_filterByIssue(\'' + iss.key + '\')">Filter</button>';
    html += '</div>';
    html += '</div>';
  });
  html += '</div>';
  // Toggle row — only render when there's something to expand/collapse
  if (canCollapse) {
    html += '<div class="s2-issboxes-toggle">';
    if (expanded) {
      html += '<button class="s2-issboxes-toggle-btn" onclick="s2_toggleIssuesExpanded()">&uarr; Show less</button>';
    } else {
      html += '<button class="s2-issboxes-toggle-btn" onclick="s2_toggleIssuesExpanded()">Show all ' + liveIssues.length + ' issues <span class="s2-issboxes-toggle-cnt">(' + hidden + ' more)</span></button>';
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function s2_toggleIssuesExpanded(){
  APP.s2.issuesExpanded = !APP.s2.issuesExpanded;
  renderApp();
}

function s2_filterByIssue(issueKey){
  // Clicking an issue box's Filter button (or an inline badge in a row) filters
  // the workspace table to that issue's affected accounts.
  APP.s2.activeCluster = issueKey;
  APP.s2.wsFilter = 'all';
  APP.s2.acctPage = 0;
  renderApp();
  // Scroll the table into view
  setTimeout(function(){
    var tblTop = document.querySelector('.s2-ws-tbl-wrap');
    if (tblTop) tblTop.scrollIntoView({behavior:'smooth', block:'start'});
  }, 50);
}

/* ── Legacy CoA hierarchy filter ──
   Multi-select tree. Node ids:
     'top:<digit>'    e.g. 'top:1' for ASET (Assets)
     'mid:<2digits>'  e.g. 'mid:11' for Piutang & Uang Muka
   When a parent node is checked, all its children become checked too. The
   parent state is purely derived: parent shows checked iff all its descendant
   leaves are in the filter (binary, no tri-state).
*/
function s2_buildLegacyHierarchy(){
  // Returns: [{id, name, code, count, kind:'top', children:[{id, name, code, count, kind:'mid', leaves:[acct]}]}]
  // Only includes types that actually have accounts.
  var byTop = {};
  S2_ACCOUNTS.forEach(function(a){
    if (a.isHeader) return;
    var top = (a.old || '').charAt(0);
    var mid = (a.old || '').substring(0, 2);
    if (!top || !mid) return;
    if (!byTop[top]) {
      var topInfo = LEGACY_TOP_NAMES[top] || {code:top + '000', name:'Group ' + top};
      byTop[top] = {id:'top:' + top, kind:'top', code:topInfo.code, name:topInfo.name, count:0, children:{}};
    }
    if (!byTop[top].children[mid]) {
      var midName = LEGACY_MID_NAMES[mid] || ('Group ' + mid);
      byTop[top].children[mid] = {id:'mid:' + mid, kind:'mid', code:mid + '00', name:midName, count:0, leaves:[]};
    }
    byTop[top].count++;
    byTop[top].children[mid].count++;
    byTop[top].children[mid].leaves.push(a);
  });
  // Materialize as sorted arrays
  var result = Object.keys(byTop).sort().map(function(k){
    var t = byTop[k];
    var midArr = Object.keys(t.children).sort().map(function(mk){return t.children[mk];});
    return {id:t.id, kind:t.kind, code:t.code, name:t.name, count:t.count, children:midArr};
  });
  return result;
}

function s2_accountsMatchingTypeFilter(filterIds){
  // Returns a set of account.old codes that match the current filter.
  // A node id of 'top:<digit>' matches all accounts with that first digit;
  // 'mid:<2digits>' matches all accounts whose first 2 digits match.
  var topPrefixes = filterIds.filter(function(id){return id.indexOf('top:') === 0;}).map(function(id){return id.substring(4);});
  var midPrefixes = filterIds.filter(function(id){return id.indexOf('mid:') === 0;}).map(function(id){return id.substring(4);});
  var matched = {};
  S2_ACCOUNTS.forEach(function(a){
    if (a.isHeader) return;
    var top = (a.old || '').charAt(0);
    var mid = (a.old || '').substring(0, 2);
    if (topPrefixes.indexOf(top) !== -1) { matched[a.old] = true; return; }
    if (midPrefixes.indexOf(mid) !== -1) { matched[a.old] = true; return; }
  });
  return matched;
}

/* Build the Klay-side hierarchy for the Klay Account filter.
   Two layers: Type group (Assets / Liabilities / Equity / Revenue / Expenses)
   → Sub-section (Cash & Equivalents / AR / Fixed Assets / etc.). Klay leaves
   are not exposed as their own filter level — too many to scan. */
function s2_buildKlayHierarchy(){
  // The S2_KLAY 'type' values are FS sections (ca, fa, cl, eq, rev, cogs, opex, nonop, tax).
  // Group them into broader categories for the controller.
  var typeGroups = [
    {id:'asset',     name:'Assets',      types:['ca', 'fa']},
    {id:'liability', name:'Liabilities', types:['cl']},
    {id:'equity',    name:'Equity',      types:['eq']},
    {id:'revenue',   name:'Revenue',     types:['rev']},
    {id:'expense',   name:'Expenses',    types:['cogs', 'opex', 'nonop', 'tax']},
  ];

  // Group Klay catalog by group → SubSection
  var byGroup = {};
  typeGroups.forEach(function(g){ byGroup[g.id] = {subs:{}, count:0}; });
  S2_KLAY.forEach(function(k){
    if (k.mvp === 'SCHEMA') return;
    var group = typeGroups.find(function(g){return g.types.indexOf(k.type) !== -1;});
    if (!group) return;
    var sub = k.subSection || '(other)';
    if (!byGroup[group.id].subs[sub]) byGroup[group.id].subs[sub] = {codes:[], count:0};
    byGroup[group.id].subs[sub].codes.push(k.code);
  });

  // Tally how many S2_ACCOUNTS map into each (group, sub)
  S2_ACCOUNTS.forEach(function(a){
    if (a.isHeader || !a.newCode) return;
    var k = S2_KLAY_BY_CODE[a.newCode];
    if (!k) return;
    var group = typeGroups.find(function(g){return g.types.indexOf(k.type) !== -1;});
    if (!group) return;
    var sub = k.subSection || '(other)';
    if (!byGroup[group.id].subs[sub]) return;
    byGroup[group.id].subs[sub].count++;
    byGroup[group.id].count++;
  });

  var result = [];
  typeGroups.forEach(function(g){
    var bucket = byGroup[g.id];
    if (!bucket || Object.keys(bucket.subs).length === 0) return;
    var subsArr = Object.keys(bucket.subs).sort().map(function(subKey){
      var sub = bucket.subs[subKey];
      return {
        id: 'klsub:' + g.id + ':' + subKey,
        kind: 'sub',
        code: '',
        name: subKey,
        count: sub.count,
        codes: sub.codes,
      };
    });
    result.push({
      id: 'kltop:' + g.id,
      kind: 'type',
      code: '',
      name: g.name,
      count: bucket.count,
      children: subsArr,
    });
  });
  return result;
}

/* Returns the set of Klay codes that match the current Klay filter selection.
   Selection of a 'kltop:<type>' node = all sub-sections under that type;
   selection of 'klsub:<type>:<sub>' = just that sub. Empty filter = no match
   constraint (caller handles that — don't filter when empty). */
function s2_klayCodesMatchingFilter(filterIds){
  var hier = s2_buildKlayHierarchy();
  var matchedCodes = {};
  filterIds.forEach(function(fid){
    if (fid.indexOf('kltop:') === 0) {
      var t = fid.substring(6);
      var top = hier.find(function(h){return h.id === fid;});
      if (top) top.children.forEach(function(sub){
        sub.codes.forEach(function(c){matchedCodes[c] = true;});
      });
    } else if (fid.indexOf('klsub:') === 0) {
      hier.forEach(function(top){
        var sub = top.children.find(function(s){return s.id === fid;});
        if (sub) sub.codes.forEach(function(c){matchedCodes[c] = true;});
      });
    }
  });
  return matchedCodes;
}

function s2_typeFilterChips(){
  // Returns the (up to 2) primary chips and a "+N more" chip when more selected.
  var ids = APP.s2.typeFilter || [];
  if (ids.length === 0) return [];
  var hier = s2_buildLegacyHierarchy();
  var byId = {};
  hier.forEach(function(t){
    byId[t.id] = {label:t.name, count:t.count, kind:'Type'};
    t.children.forEach(function(m){
      byId[m.id] = {label:m.name, count:m.count, kind:'Group'};
    });
  });
  return ids.map(function(id){
    var info = byId[id];
    return info ? {id:id, label:info.label, count:info.count, kind:info.kind} : null;
  }).filter(Boolean);
}

function s2_renderFilterToolbar(){
  var typeFilter = APP.s2.typeFilter || [];
  var klayFilter = APP.s2.klayFilter || [];
  var confFilter = APP.s2.confFilter || [];
  var tierFilter = APP.s2.tierFilter || [];
  var dimFilter = APP.s2.dimFilter || '';
  var hasSearch = !!(APP.s2.searchQ || '');

  // Klay Account filter is disabled when the active status pill is "unmapped" —
  // unmapped rows have no Klay target, so the filter is meaningless on that view.
  var statusPill = APP.s2.wsFilter || 'all';
  var klayDisabled = (statusPill === 'unmapped');

  var legacyOpen = !!APP.s2.typeFilterOpen;
  var klayOpen   = !!APP.s2.klayFilterOpen && !klayDisabled;
  var moreOpen   = !!APP.s2.moreFilterOpen;
  var moreCount  = confFilter.length + tierFilter.length + (dimFilter ? 1 : 0);

  var html = '<div class="s2-ftbar">';

  // ── Legacy Account filter (was the old "Filter" button) ──
  html += '<div class="s2-ft-pop-anchor">';
  html += '<button class="s2-ft-btn' + (typeFilter.length || legacyOpen ? ' active' : '') + '" onclick="s2_toggleFilterPop()" aria-haspopup="true" aria-expanded="' + legacyOpen + '">';
  html += '<span class="s2-ft-btn-icon">&#9776;</span>Legacy Account';
  if (typeFilter.length > 0) html += '<span class="s2-ft-badge">' + typeFilter.length + '</span>';
  html += '<span class="s2-ft-btn-caret">&#9662;</span>';
  html += '</button>';
  if (legacyOpen) html += s2_renderFilterTreeDropdown();
  html += '</div>';

  // ── Klay Account filter ──
  html += '<div class="s2-ft-pop-anchor">';
  var klayBtnCls = 's2-ft-btn' + (klayFilter.length || klayOpen ? ' active' : '') + (klayDisabled ? ' disabled' : '');
  var klayClick = klayDisabled ? '' : ' onclick="s2_toggleKlayFilterPop()"';
  var klayTitle = klayDisabled ? ' title="Klay Account filter doesn\'t apply when viewing Unmapped rows"' : '';
  html += '<button class="' + klayBtnCls + '"' + klayClick + klayTitle + ' aria-haspopup="true" aria-expanded="' + klayOpen + '"' + (klayDisabled ? ' disabled' : '') + '>';
  html += '<span class="s2-ft-btn-icon">&#9776;</span>Klay Account';
  if (klayFilter.length > 0 && !klayDisabled) html += '<span class="s2-ft-badge">' + klayFilter.length + '</span>';
  html += '<span class="s2-ft-btn-caret">&#9662;</span>';
  html += '</button>';
  if (klayOpen) html += s2_renderKlayFilterDropdown();
  html += '</div>';

  // ── More filters (overflow: AI confidence, Issue tier, Dimensions) ──
  html += '<div class="s2-ft-pop-anchor">';
  html += '<button class="s2-ft-btn' + (moreCount || moreOpen ? ' active' : '') + '" onclick="s2_toggleMoreFilterPop()" aria-haspopup="true" aria-expanded="' + moreOpen + '">';
  html += '<span class="s2-ft-btn-icon">&#9881;</span>Filter';
  if (moreCount > 0) html += '<span class="s2-ft-badge">' + moreCount + '</span>';
  html += '<span class="s2-ft-btn-caret">&#9662;</span>';
  html += '</button>';
  if (moreOpen) html += s2_renderMoreFilterDropdown();
  html += '</div>';

  // ── Selected chips (legacy + klay + more — first 2, then "+N more") ──
  var chips = s2_allFilterChips();
  if (chips.length > 0) {
    var visibleChips = chips.slice(0, 2);
    visibleChips.forEach(function(c){
      html += '<span class="s2-ft-chip">';
      html += '<span class="s2-ft-chip-lbl">' + c.kind + ':</span> ' + c.label;
      html += ' <span class="s2-ft-chip-x" onclick="' + c.removeJs + '" title="Remove">&times;</span>';
      html += '</span>';
    });
    if (chips.length > 2) {
      html += '<button class="s2-ft-chip-more" onclick="s2_openMostActiveFilter()">+' + (chips.length - 2) + ' more</button>';
    }

  // ── Search input ──
  html += '<div class="s2-ft-search">';
  html += '<span class="s2-ft-search-icon">&#128269;</span>';
  html += '<input class="s2-ft-search-input" type="text" placeholder="Search legacy account name or code…" value="' + (APP.s2.searchQ || '').replace(/"/g, '&quot;') + '" oninput="s2_onSearchInput(this.value)" />';
  if (hasSearch) {
    html += '<button class="s2-ft-search-clear" onclick="s2_clearSearch()" title="Clear">&times;</button>';
  }
  html += '</div>';

  html += '</div>';
  return html;
}

/* Combined chip list across all three filters. Each chip has: kind, label,
   removeJs (the inline onclick to remove just that chip). Order: Legacy first,
   then Klay, then More-filters (Confidence/Tier/Dimensions). */
function s2_allFilterChips(){
  var chips = [];
  // Legacy account chips (existing helper builds them)
  s2_typeFilterChips().forEach(function(c){
    chips.push({kind:c.kind, label:c.label, removeJs:'s2_removeTypeFilter(\'' + c.id + '\')'});
  });
  // Klay account chips
  var klayHier = s2_buildKlayHierarchy();
  (APP.s2.klayFilter || []).forEach(function(fid){
    var label = '';
    if (fid.indexOf('kltop:') === 0) {
      var top = klayHier.find(function(h){return h.id === fid;});
      if (top) label = top.name;
    } else if (fid.indexOf('klsub:') === 0) {
      klayHier.forEach(function(top){
        var sub = top.children.find(function(s){return s.id === fid;});
        if (sub) label = top.name + ' / ' + sub.name;
      });
    }
    if (label) chips.push({kind:'Klay', label:label, removeJs:'s2_removeKlayFilter(\'' + fid + '\')'});
  });
  // Confidence
  (APP.s2.confFilter || []).forEach(function(c){
    var lbl = c === 'high' ? 'High' : (c === 'med' ? 'Medium' : 'Low');
    chips.push({kind:'Confidence', label:lbl, removeJs:'s2_toggleConfFilter(\'' + c + '\')'});
  });
  // Tier
  (APP.s2.tierFilter || []).forEach(function(t){
    var lbl = t === 'hard' ? 'Hard block' : (t === 'soft' ? 'Soft' : 'Warning');
    chips.push({kind:'Tier', label:lbl, removeJs:'s2_toggleTierFilter(\'' + t + '\')'});
  });
  // Dimensions
  if (APP.s2.dimFilter) {
    var dlbl = APP.s2.dimFilter === 'with' ? 'Tagged' : 'Untagged';
    chips.push({kind:'Dimensions', label:dlbl, removeJs:'s2_setDimFilter(\'\')'});
  }
  return chips;
}

/* Used by the "+N more" chip-overflow button — opens whichever filter has the
   most non-shown chips, so clicking it reveals the most chips at once. */
function s2_openMostActiveFilter(){
  var counts = {
    legacy: (APP.s2.typeFilter || []).length,
    klay: (APP.s2.klayFilter || []).length,
    more: (APP.s2.confFilter || []).length + (APP.s2.tierFilter || []).length + (APP.s2.dimFilter ? 1 : 0),
  };
  // The two most chips are already visible, so drop them. Whichever pop has the
  // most remaining is the one to open.
  if (counts.more >= counts.legacy && counts.more >= counts.klay) s2_toggleMoreFilterPop();
  else if (counts.klay >= counts.legacy) s2_toggleKlayFilterPop();
  else s2_toggleFilterPop();
}

function s2_renderFilterTreeDropdown(){
  var hier = s2_buildLegacyHierarchy();
  var sel = APP.s2.typeFilter || [];
  var selSet = {};
  sel.forEach(function(id){selSet[id] = true;});
  var expanded = APP.s2.typeFilterExpanded || {};
  var searchQ = (APP.s2.typeFilterSearch || '').trim().toLowerCase();

  var html = '<div class="s2-ft-pop" onclick="event.stopPropagation()">';
  html += '<div class="s2-ft-pop-title">Filter by Legacy Account</div>';
  html += '<div class="s2-ft-pop-search">';
  html += '<span style="font-size:12px;color:var(--color-text-tertiary)">&#128269;</span>';
  html += '<input class="s2-ft-pop-search-input" type="text" placeholder="Search type or group…" value="' + searchQ.replace(/"/g, '&quot;') + '" oninput="s2_onTreeSearch(this.value)" />';
  html += '</div>';

  function nodeMatchesSearch(node){
    if (!searchQ) return true;
    if (node.name.toLowerCase().indexOf(searchQ) !== -1) return true;
    if (node.code.toLowerCase().indexOf(searchQ) !== -1) return true;
    if (node.children) return node.children.some(nodeMatchesSearch);
    return false;
  }

  html += '<div class="s2-ft-pop-tree">';
  hier.forEach(function(top){
    if (!nodeMatchesSearch(top)) return;
    var topExpanded = !!expanded[top.id] || !!searchQ;
    var topChecked = !!selSet[top.id];
    html += '<div class="s2-ft-tree-row' + (topChecked ? ' matched' : '') + '">';
    html += '<span class="s2-ft-tree-chev" onclick="s2_toggleTreeExpand(\'' + top.id + '\')">' + (topExpanded ? '&#9662;' : '&#9656;') + '</span>';
    html += '<input type="checkbox" class="s2-ft-tree-chk" ' + (topChecked ? 'checked' : '') + ' onchange="s2_toggleTreeNode(\'' + top.id + '\')" onclick="event.stopPropagation()" />';
    html += '<span class="s2-ft-tree-name top" onclick="s2_toggleTreeExpand(\'' + top.id + '\')">' + top.code + ' &middot; ' + top.name + '</span>';
    html += '<span class="s2-ft-tree-cnt">' + top.count + '</span>';
    html += '</div>';
    if (topExpanded) {
      top.children.forEach(function(mid){
        if (!nodeMatchesSearch(mid)) return;
        // Mid is checked if its own id is in filter, or its parent top is in filter
        var midChecked = !!selSet[mid.id] || topChecked;
        html += '<div class="s2-ft-tree-row' + (midChecked ? ' matched' : '') + '" style="padding-left:24px">';
        html += '<span class="s2-ft-tree-chev placeholder">&#9656;</span>';
        html += '<input type="checkbox" class="s2-ft-tree-chk" ' + (midChecked ? 'checked' : '') + (topChecked ? ' disabled' : '') + ' onchange="s2_toggleTreeNode(\'' + mid.id + '\')" onclick="event.stopPropagation()" />';
        html += '<span class="s2-ft-tree-name mid">' + mid.code + ' &middot; ' + mid.name + '</span>';
        html += '<span class="s2-ft-tree-cnt">' + mid.count + '</span>';
        html += '</div>';
      });
    }
  });
  html += '</div>';

  html += '<div class="s2-ft-pop-actions">';
  html += '<button class="s2-ft-pop-clear" onclick="s2_clearTypeFilter()" ' + (sel.length === 0 ? 'disabled' : '') + '>Clear all</button>';
  html += '<button class="s2-ft-pop-apply" onclick="s2_toggleFilterPop()">Done</button>';
  html += '</div>';

  html += '</div>';
  return html;
}

function s2_toggleFilterPop(){
  APP.s2.typeFilterOpen = !APP.s2.typeFilterOpen;
  if (APP.s2.typeFilterOpen) { APP.s2.klayFilterOpen = false; APP.s2.moreFilterOpen = false; }
  renderApp();
}

function s2_toggleTreeExpand(nodeId){
  if (!APP.s2.typeFilterExpanded) APP.s2.typeFilterExpanded = {};
  APP.s2.typeFilterExpanded[nodeId] = !APP.s2.typeFilterExpanded[nodeId];
  renderApp();
}

function s2_toggleTreeNode(nodeId){
  // Auto-cascade: checking a parent top adds it to filter (and supersedes any of its mids).
  // Checking/unchecking a mid only changes that mid (children inherit).
  var sel = APP.s2.typeFilter || [];
  var idx = sel.indexOf(nodeId);
  if (idx >= 0) {
    sel.splice(idx, 1);
  } else {
    sel.push(nodeId);
    // If this is a top-level node, remove any of its mid children that were individually selected
    if (nodeId.indexOf('top:') === 0) {
      var topPrefix = nodeId.substring(4);
      sel = sel.filter(function(id){
        if (id.indexOf('mid:') !== 0) return true;
        return id.substring(4).charAt(0) !== topPrefix;
      });
    }
  }
  APP.s2.typeFilter = sel;
  APP.s2.acctPage = 0;
  renderApp();
}

function s2_removeTypeFilter(nodeId){
  var sel = APP.s2.typeFilter || [];
  APP.s2.typeFilter = sel.filter(function(id){return id !== nodeId;});
  APP.s2.acctPage = 0;
  renderApp();
}

function s2_clearTypeFilter(){
  APP.s2.typeFilter = [];
  APP.s2.acctPage = 0;
  renderApp();
}

/* ── KLAY ACCOUNT FILTER ── (mirror of the legacy filter, on the Klay side) */

  html += '<span style="font-size:12px;color:var(--color-text-tertiary)">&#128269;</span>';
  html += '<input class="s2-ft-pop-search-input" type="text" placeholder="Search type or sub-section…" value="' + searchQ.replace(/"/g, '&quot;') + '" oninput="s2_onKlayTreeSearch(this.value)" />';
  html += '</div>';

  function nodeMatchesSearch(node){
    if (!searchQ) return true;
    if (node.name && node.name.toLowerCase().indexOf(searchQ) !== -1) return true;
    if (node.children) return node.children.some(nodeMatchesSearch);
    return false;
  }

  html += '<div class="s2-ft-pop-tree">';
  hier.forEach(function(top){
    if (!nodeMatchesSearch(top)) return;
    var topExpanded = !!expanded[top.id] || !!searchQ;
    var topChecked = !!selSet[top.id];
    html += '<div class="s2-ft-tree-row' + (topChecked ? ' matched' : '') + '">';
    html += '<span class="s2-ft-tree-chev" onclick="s2_toggleKlayTreeExpand(\'' + top.id + '\')">' + (topExpanded ? '&#9662;' : '&#9656;') + '</span>';
    html += '<input type="checkbox" class="s2-ft-tree-chk" ' + (topChecked ? 'checked' : '') + ' onchange="s2_toggleKlayTreeNode(\'' + top.id + '\')" onclick="event.stopPropagation()" />';
    html += '<span class="s2-ft-tree-name top" onclick="s2_toggleKlayTreeExpand(\'' + top.id + '\')">' + top.name + '</span>';
    html += '<span class="s2-ft-tree-cnt">' + top.count + '</span>';
    html += '</div>';
    if (topExpanded) {
      top.children.forEach(function(sub){
        if (!nodeMatchesSearch(sub)) return;
        var subChecked = !!selSet[sub.id] || topChecked;
        html += '<div class="s2-ft-tree-row' + (subChecked ? ' matched' : '') + '" style="padding-left:24px">';
        html += '<span class="s2-ft-tree-chev placeholder">&#9656;</span>';
        html += '<input type="checkbox" class="s2-ft-tree-chk" ' + (subChecked ? 'checked' : '') + (topChecked ? ' disabled' : '') + ' onchange="s2_toggleKlayTreeNode(\'' + sub.id + '\')" onclick="event.stopPropagation()" />';
        html += '<span class="s2-ft-tree-name mid">' + sub.name + '</span>';
        html += '<span class="s2-ft-tree-cnt">' + sub.count + '</span>';
        html += '</div>';
      });
    }
  });
  html += '</div>';

  html += '<div class="s2-ft-pop-actions">';
  html += '<button class="s2-ft-pop-clear" onclick="s2_clearKlayFilter()" ' + (sel.length === 0 ? 'disabled' : '') + '>Clear all</button>';
  html += '<button class="s2-ft-pop-apply" onclick="s2_toggleKlayFilterPop()">Done</button>';
  html += '</div>';

  html += '</div>';
  return html;
}

function s2_toggleKlayFilterPop(){
  APP.s2.klayFilterOpen = !APP.s2.klayFilterOpen;
  // Close other pops to keep one open at a time
  if (APP.s2.klayFilterOpen) { APP.s2.typeFilterOpen = false; APP.s2.moreFilterOpen = false; }
  renderApp();
}
function s2_toggleKlayTreeExpand(nodeId){
  if (!APP.s2.klayFilterExpanded) APP.s2.klayFilterExpanded = {};
  APP.s2.klayFilterExpanded[nodeId] = !APP.s2.klayFilterExpanded[nodeId];
  renderApp();
}
function s2_toggleKlayTreeNode(nodeId){
  // Same cascade semantics as the legacy filter: checking a top node de-checks
  // its children's individual selections (parent owns the selection).
  var sel = APP.s2.klayFilter || [];
  var idx = sel.indexOf(nodeId);
  if (idx === -1) {
    sel = sel.slice();
    sel.push(nodeId);
    // If this is a top node, drop any of its sub-section children from the selection
    if (nodeId.indexOf('kltop:') === 0) {
      var t = nodeId.substring(6);
      sel = sel.filter(function(id){return id.indexOf('klsub:' + t + ':') !== 0;});
    }
  } else {
    sel = sel.filter(function(id){return id !== nodeId;});
  }
  APP.s2.klayFilter = sel;
  APP.s2.acctPage = 0;
  renderApp();
}
function s2_removeKlayFilter(nodeId){
  var sel = APP.s2.klayFilter || [];
  APP.s2.klayFilter = sel.filter(function(id){return id !== nodeId;});
  APP.s2.acctPage = 0;
  renderApp();
}
function s2_clearKlayFilter(){
  APP.s2.klayFilter = [];
  APP.s2.acctPage = 0;
  renderApp();
}
function s2_onKlayTreeSearch(q){
  APP.s2.klayFilterSearch = q;
  renderApp();
  setTimeout(function(){
    var inp = document.querySelectorAll('.s2-ft-pop-search-input');
    // Find the right one — the Klay pop has the second match if both are open;
    // safer to search by current open state
    if (APP.s2.klayFilterOpen && inp.length > 0) {
      var target = inp[inp.length - 1];
      target.focus();
      var v = target.value;
      target.setSelectionRange(v.length, v.length);
    }
  }, 0);
}

/* ── MORE FILTERS PANEL ── (overflow: AI confidence, Issue tier, Dimensions) */
function s2_renderMoreFilterDropdown(){
  var conf = APP.s2.confFilter || [];
  var tier = APP.s2.tierFilter || [];
  var dim = APP.s2.dimFilter || '';

  // Live counts so the controller sees how many rows would survive each option
  var leaves = S2_ACCOUNTS.filter(function(a){return !a.isHeader;});
  var confCnt = {high:0, med:0, low:0};
  leaves.forEach(function(a){ if (a.conf && confCnt[a.conf] != null) confCnt[a.conf]++; });
  var tierCnt = {hard:0, soft:0, warn:0};
  leaves.forEach(function(a){
    if (!a.issues) return;
    var seenTiers = {};
    a.issues.forEach(function(k){
      var iss = S2_ISSUES.find(function(i){return i.key === k;});
      if (iss && !seenTiers[iss.kind]) { tierCnt[iss.kind]++; seenTiers[iss.kind] = true; }
    });
  });
  var withDim = leaves.filter(function(a){return a.dimensions && a.dimensions.length > 0;}).length;
  var withoutDim = leaves.length - withDim;

  var html = '<div class="s2-ft-pop s2-ft-pop-multi" onclick="event.stopPropagation()">';
  html += '<div class="s2-ft-pop-title">More filters</div>';

  // AI confidence
  html += '<div class="s2-ft-section">';
  html += '<div class="s2-ft-section-hdr">AI confidence</div>';
  ['high', 'med', 'low'].forEach(function(c){
    var checked = conf.indexOf(c) !== -1;
    var lbl = c === 'high' ? 'High' : (c === 'med' ? 'Medium' : 'Low');
    html += '<label class="s2-ft-chkrow">';
    html += '<input type="checkbox" ' + (checked ? 'checked' : '') + ' onchange="s2_toggleConfFilter(\'' + c + '\')" />';
    html += '<span class="s2-ft-chkrow-lbl">' + lbl + '</span>';
    html += '<span class="s2-ft-tree-cnt">' + confCnt[c] + '</span>';
    html += '</label>';
  });
  html += '</div>';

  // Issue tier
  html += '<div class="s2-ft-section">';
  html += '<div class="s2-ft-section-hdr">Issue tier</div>';
  [
    {key:'hard', lbl:'Hard block', icon:'&#9940;'},
    {key:'soft', lbl:'Soft',       icon:'&#9888;'},
    {key:'warn', lbl:'Warning',    icon:'&#9432;'},
  ].forEach(function(t){
    var checked = tier.indexOf(t.key) !== -1;
    html += '<label class="s2-ft-chkrow">';
    html += '<input type="checkbox" ' + (checked ? 'checked' : '') + ' onchange="s2_toggleTierFilter(\'' + t.key + '\')" />';
    html += '<span class="s2-ft-chkrow-lbl"><span class="s2-ft-tier-icon ' + t.key + '">' + t.icon + '</span> ' + t.lbl + '</span>';
    html += '<span class="s2-ft-tree-cnt">' + tierCnt[t.key] + '</span>';
    html += '</label>';
  });
  html += '</div>';

  // Dimensions
  html += '<div class="s2-ft-section">';
  html += '<div class="s2-ft-section-hdr">Dimensions</div>';
  html += '<label class="s2-ft-chkrow">';
  html += '<input type="radio" name="s2-dim-filter" ' + (dim === '' ? 'checked' : '') + ' onchange="s2_setDimFilter(\'\')" />';
  html += '<span class="s2-ft-chkrow-lbl">Any</span>';
  html += '<span class="s2-ft-tree-cnt">' + leaves.length + '</span>';
  html += '</label>';
  html += '<label class="s2-ft-chkrow">';
  html += '<input type="radio" name="s2-dim-filter" ' + (dim === 'with' ? 'checked' : '') + ' onchange="s2_setDimFilter(\'with\')" />';
  html += '<span class="s2-ft-chkrow-lbl">With dimensions</span>';
  html += '<span class="s2-ft-tree-cnt">' + withDim + '</span>';
  html += '</label>';
  html += '<label class="s2-ft-chkrow">';
  html += '<input type="radio" name="s2-dim-filter" ' + (dim === 'without' ? 'checked' : '') + ' onchange="s2_setDimFilter(\'without\')" />';
  html += '<span class="s2-ft-chkrow-lbl">Without dimensions</span>';
  html += '<span class="s2-ft-tree-cnt">' + withoutDim + '</span>';
  html += '</label>';
  html += '</div>';

  html += '<div class="s2-ft-pop-actions">';
  var hasAny = (conf.length || tier.length || dim);
  html += '<button class="s2-ft-pop-clear" onclick="s2_clearMoreFilters()" ' + (hasAny ? '' : 'disabled') + '>Clear all</button>';
  html += '<button class="s2-ft-pop-apply" onclick="s2_toggleMoreFilterPop()">Done</button>';
  html += '</div>';

  html += '</div>';
  return html;
}

function s2_toggleMoreFilterPop(){
  APP.s2.moreFilterOpen = !APP.s2.moreFilterOpen;
  if (APP.s2.moreFilterOpen) { APP.s2.typeFilterOpen = false; APP.s2.klayFilterOpen = false; }
  renderApp();
}

}
function s2_setDimFilter(v){
  APP.s2.dimFilter = v;

function s2_clearMoreFilters(){

function s2_onTreeSearch(q){
  APP.s2.typeFilterSearch = q;
  renderApp();
  // Restore focus to the search input
  setTimeout(function(){
    var inp = document.querySelector('.s2-ft-pop-search-input');
    if (inp) {
      inp.focus();
      var v = inp.value;
      inp.setSelectionRange(v.length, v.length);
    }
  }, 0);
}

function s2_onSearchInput(q){
  APP.s2.searchQ = q;
  APP.s2.acctPage = 0;
  renderApp();
  // Restore focus to the search input
  setTimeout(function(){
    var inp = document.querySelector('.s2-ft-search-input');
    if (inp) {
      inp.focus();
      var v = inp.value;
      inp.setSelectionRange(v.length, v.length);
    }
  }, 0);
}

function s2_clearSearch(){
  APP.s2.searchQ = '';
  APP.s2.acctPage = 0;
  renderApp();
}

/* Account-level workspace (ALL period) */
function s2_renderAccountWorkspace(clusterKey, filterMode){
  // Filter accounts by selected cluster
  var rows;
  var clusterName = '';
  var clusterSub = '';
  if (!clusterKey || clusterKey === 'all-accounts') {
    rows = S2_ACCOUNTS;
    clusterName = 'All accounts';
    clusterSub = 'Full Chart of Accounts (' + S2_ACCOUNTS.length + ' legacy accounts). Use Show: To review to focus on what still needs your attention.';
  } else if (clusterKey.indexOf('type:') === 0) {
    // Account-type cluster
    var typeKey = clusterKey.substring(5);
    var t = S2_TYPES.find(function(t){return t.key === typeKey;});
    rows = s2_accountsOfType(typeKey);
    clusterName = t ? t.name : '—';
    clusterSub = 'All ' + rows.length + ' legacy accounts classified as ' + (t ? t.name.toLowerCase() : '') + '. The Klay account dropdown is filtered to standardized accounts of the same type.';
  } else if (clusterKey === 'no-issue') {
    rows = S2_ACCOUNTS.filter(function(a){return !a.issues || a.issues.length === 0;});
    clusterName = 'Clean — ready to confirm';
    clusterSub = 'Accounts with no flagged issues. Bulk-confirm or review individually.';
  } else {
    var iss = S2_ISSUES.find(function(i){return i.key === clusterKey;});
    clusterName = iss ? iss.name : '—';
    clusterSub = iss ? (iss.kind === 'hard' ? 'Hard block — must resolve before sign-off.' : 'Soft block — you can resolve directly.') : '';
    rows = S2_ACCOUNTS.filter(function(a){return a.issues && a.issues.indexOf(clusterKey) !== -1;});
  }

  // Apply filter — exclude headers from count totals (they're structural, not mappable)
  var leafRows = rows.filter(function(a){return !a.isHeader;});

  // Apply tree-filter (legacy account hierarchy multi-select) BEFORE status filtering, so all
  // status counts reflect the same scope.
  var typeFilter = APP.s2.typeFilter || [];
  if (typeFilter.length > 0) {
    var matchedSet = s2_accountsMatchingTypeFilter(typeFilter);
    leafRows = leafRows.filter(function(a){return matchedSet[a.old];});
  }

  // Apply Klay-account filter (only when the controller hasn't filtered to Unmapped — the
  // button is disabled there, but a stale klayFilter selection from a previous view should
  // still respect the disabled state and not silently filter out everything).
  var klayFilter = APP.s2.klayFilter || [];
  var statusPillForKlay = APP.s2.wsFilter || 'all';
  if (klayFilter.length > 0 && statusPillForKlay !== 'unmapped') {
    var matchedKlayCodes = s2_klayCodesMatchingFilter(klayFilter);
    leafRows = leafRows.filter(function(a){
      return a.newCode && matchedKlayCodes[a.newCode];
    });
  }

  // Apply AI-confidence filter
  var confFilter = APP.s2.confFilter || [];
  if (confFilter.length > 0) {
    leafRows = leafRows.filter(function(a){return confFilter.indexOf(a.conf) !== -1;});
  }

  // Apply issue-tier filter (any account that carries at least one issue of the
  // selected tier matches)
  var tierFilter = APP.s2.tierFilter || [];
  if (tierFilter.length > 0) {
    leafRows = leafRows.filter(function(a){
      if (!a.issues || a.issues.length === 0) return false;
      return a.issues.some(function(k){
        var iss = S2_ISSUES.find(function(i){return i.key === k;});
        return iss && tierFilter.indexOf(iss.kind) !== -1;
      });
    });
  }

  // Apply dimensions filter
  var dimFilter = APP.s2.dimFilter || '';
  if (dimFilter === 'with') {
    leafRows = leafRows.filter(function(a){return a.dimensions && a.dimensions.length > 0;});
  } else if (dimFilter === 'without') {
    leafRows = leafRows.filter(function(a){return !a.dimensions || a.dimensions.length === 0;});
  }

  // Apply search filter (legacy code or name)
  var searchQ = (APP.s2.searchQ || '').trim().toLowerCase();
  if (searchQ) {
    leafRows = leafRows.filter(function(a){
      return (a.old || '').toLowerCase().indexOf(searchQ) !== -1
          || (a.oldName || '').toLowerCase().indexOf(searchQ) !== -1;
    });
  }

  var unmappedRows = leafRows.filter(function(a){return a.status === 'unconfirmed';});
  var proposedRows = leafRows.filter(function(a){return a.status === 'proposed';});
  var mappedRows   = leafRows.filter(function(a){return a.status === 'confirmed';});
  var laterRows    = leafRows.filter(function(a){return a.status === 'later';});
  var deactRows    = leafRows.filter(function(a){return a.status === 'deactivated';});

  var displayRows;
  if (filterMode === 'unmapped')         displayRows = unmappedRows;
  else if (filterMode === 'proposed')    displayRows = proposedRows;
  else if (filterMode === 'mapped')      displayRows = mappedRows;
  else if (filterMode === 'later')       displayRows = laterRows;
  else if (filterMode === 'deactivated') displayRows = deactRows;
  else {
    // 'all' mode: leafRows already reflects tree-filter and search
    displayRows = leafRows;
  }

  // ── New header: cluster context (only if filtered to issue cluster), then tabs, then toolbar ──
  var html = '';

  // If we're filtered to an issue cluster (e.g. via "Review list" from a banner), show context
  if (clusterKey && clusterKey !== 'all-accounts' && S2_ISSUES.some(function(i){return i.key === clusterKey;})) {
    html += '<div class="s2-ws-hdr">';
    html += '<div><div class="s2-ws-title">' + clusterName + '</div><div class="s2-ws-sub">' + clusterSub + '</div></div>';
    html += '<button class="s2-ws-filt-btn" onclick="s2_setCluster(\'all-accounts\')">&times; Clear issue filter</button>';
    html += '</div>';
  }

  // Informational banner — shown when there are Proposed rows in the current session.
  // Dismissable via the × button (session-scoped: stays dismissed until reload).
  // Per-row Confirm and dropdown re-pick are how the controller actually progresses;
  // a "Confirm all" bulk action would mean rubber-stamping the AI, which defeats the
  // point of strict sign-off.
  var totalProposed = S2_ACCOUNTS.filter(function(a){return !a.isHeader && a.status === 'proposed';}).length;
  if (totalProposed > 0 && !APP.s2.proposedBannerDismissed) {
    html += '<div class="s2-bulkbar">';
    html += '<div class="s2-bulkbar-icon">&#10024;</div>';
    html += '<div class="s2-bulkbar-msg">';
    html += '<div class="s2-bulkbar-title">' + totalProposed + ' AI-proposed mapping' + (totalProposed === 1 ? '' : 's') + ' awaiting your confirmation</div>';
    html += '<div class="s2-bulkbar-sub">Click <strong>Confirm</strong> on each row to accept the suggestion, or pick a different target from the dropdown — that also confirms it. Sign-off is blocked until every Proposed row is resolved.</div>';
    html += '</div>';
    html += '<button class="s2-bulkbar-close" onclick="s2_dismissProposedBanner()" aria-label="Dismiss">&times;</button>';
    html += '</div>';
  }

  // Status filter pills (replaces old underline tabs)
  html += '<div class="s2-pills">';
  function pill(key, label, count){
    var on = (filterMode === key);
    html += '<button class="s2-pill' + (on ? ' on' : '') + '" onclick="s2_setWsFilter(\'' + key + '\')">' + label + ' <span class="s2-pill-cnt">' + count + '</span></button>';
  }
  pill('all',         'All',              leafRows.length);
  pill('unmapped',    'Unmapped',         unmappedRows.length);
  pill('proposed',    'Proposed',         proposedRows.length);
  pill('mapped',      'Mapped',           mappedRows.length);
  pill('later',       'Marked for Later', laterRows.length);
  pill('deactivated', 'Deactivated',      deactRows.length);
  html += '</div>';

  // Filter toolbar: filter button + chips + search
  html += s2_renderFilterToolbar();

  // Table — edge-to-edge, no card wrapper
  if (filterMode === 'unmapped' && unmappedRows.length > 0) {
    html += '<div class="s2-ws-tbl-banner" style="border-radius:0;background:transparent;border:none;padding:8px 0;color:var(--color-text-secondary);font-size:11px;font-weight:400;text-transform:none;letter-spacing:0;">&#8226; ' + unmappedRows.length + ' account' + (unmappedRows.length === 1 ? '' : 's') + ' still unmapped &mdash; pick a Klay account from the dropdown to map, or use the row menu to defer or deactivate.</div>';
  }
  html += '<table class="s2-ws-tbl s2-ws-tbl-flat">';
  html += '<thead><tr>'
    + '<th style="width:30px"><input type="checkbox"/></th>'
    + '<th style="width:200px">Legacy account</th>'
    + '<th style="width:220px">Klay account <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--color-text-disabled)">· AI-suggested, editable</span></th>'
    + '<th>Dimensions</th>'
    + '<th style="width:100px">State</th>'
    + '<th style="text-align:right;width:130px">Action</th>'
    + '</tr></thead><tbody>';

  // Pagination — keep the page snappy when displaying 300+ rows
  var pageSize = 60;
  var page = APP.s2.acctPage || 0;
  var maxPage = Math.max(0, Math.ceil(displayRows.length / pageSize) - 1);
  if (page > maxPage) page = maxPage;
  var pageRows = displayRows.slice(page * pageSize, (page + 1) * pageSize);

  if (displayRows.length === 0) {
    html += '<tr><td colspan="6" style="padding:36px;text-align:center;color:var(--color-text-tertiary);font-size:12px;font-weight:300">No accounts match this view.</td></tr>';
  } else {
    // Group consecutive unconfirmed rows that share the same Klay target into "runs"
    // Each run gets a group header with bulk-Confirm + the rows underneath.
    // Headers (structural) and confirmed rows break runs.
    var i = 0;
    while (i < pageRows.length) {
      var a = pageRows[i];

      // Header row — render as-is, breaks any in-progress run
      if (a.isHeader) {
        html += '<tr class="s2-row s2-row-header">';
        html += '<td></td>';
        html += '<td colspan="5"><span class="s2-ws-acct-code s2-header-code">' + a.old + '</span> <span class="s2-header-name">' + a.oldName + '</span> <span class="s2-header-tag">structural · no mapping needed</span></td>';
        html += '</tr>';
        i++;
        continue;
      }

      // Detect run: consecutive unmapped rows that share the same suggested Klay target.
      // (No longer filtered by confidence — confidence is hidden from the user now.)
      var runEnd = i;
      if (a.status === 'unconfirmed') {
        while (runEnd < pageRows.length) {
          var r = pageRows[runEnd];
          if (r.isHeader) break;
          if (r.status !== 'unconfirmed' || r.newCode !== a.newCode) break;
          runEnd++;
        }
      }

      var runLen = runEnd - i;
      // Only show bulk-confirm groups in "All" filter mode. In "To review" mode,
      // the user is doing focused individual review — bulk-confirm would defeat the purpose.
      var isRun = runLen >= 3 && filterMode === 'all';

      if (isRun) {
        // Emit group header with bulk-confirm button
        var k = S2_KLAY_BY_CODE[a.newCode];
        var idxList = pageRows.slice(i, runEnd).map(function(r){return S2_ACCOUNTS.indexOf(r);});
        html += '<tr class="s2-row s2-row-group-hdr">';
        html += '<td><input type="checkbox" onclick="s2_toggleGroupCheck([' + idxList.join(',') + '], this.checked)"/></td>';
        html += '<td colspan="2">';
        html += '<div class="s2-grp-line">';
        html += '<span class="s2-grp-icon">&#9662;</span>';
        html += '<span class="s2-grp-label">' + runLen + ' accounts &rarr;</span>';
        html += '<span class="s2-grp-target"><span class="s2-grp-tcode">' + a.newCode + '</span> ' + (k ? s2_klayDisplayName(k.code, k.name) : '—') + '</span>';
        html += '</div>';
        html += '</td>';
        html += '<td colspan="2"></td>';
        html += '<td style="text-align:right">';
        html += '<button class="s2-act confirm s2-grp-confirm" onclick="s2_confirmGroup([' + idxList.join(',') + '])">Map all ' + runLen + '</button>';
        html += '</td>';
        html += '</tr>';
      }

      // Render the rows (the run, or just this one row if not a run)
      var sliceEnd = isRun ? runEnd : i + 1;
      for (var j = i; j < sliceEnd; j++) {
        var row = pageRows[j];
        var origIdx = S2_ACCOUNTS.indexOf(row);
        var rowCls = ['s2-row'];
        if (isRun) rowCls.push('s2-row-in-group');

        var rowId = 's2-row-' + row.old.replace(/[^a-zA-Z0-9]/g, '_');
        html += '<tr id="' + rowId + '" class="' + rowCls.join(' ') + '">';
        html += '<td><input type="checkbox"/></td>';
        html += '<td><div class="s2-ws-acct-code">' + row.old + '</div><div class="s2-ws-acct-name">' + row.oldName + '</div>';
        // Inline issue badges (under the legacy account name) — A+C hybrid
        if (row.issues && row.issues.length > 0) {
          html += '<div style="margin-top:4px">';
          row.issues.forEach(function(issKey){
            var iss = S2_ISSUES.find(function(i){return i.key === issKey;});
            if (!iss) return;
            // Per-tier class + icon: hard=⛔ soft=⚠ warn=ⓘ
            var kindCls = iss.kind === 'soft' ? ' soft' : (iss.kind === 'warn' ? ' warn' : '');
            var kindIcon = iss.kind === 'soft' ? '&#9888;' : (iss.kind === 'warn' ? '&#9432;' : '&#9940;');
            html += '<span class="s2-issbadge' + kindCls + '" onclick="s2_filterByIssue(\'' + issKey + '\')" title="' + iss.name + ' &middot; click to filter">';
            html += '<span class="s2-issbadge-icon">' + kindIcon + '</span>';
            html += iss.name;
            html += '</span>';
          });
          html += '</div>';
        }
        html += '</td>';
        html += '<td>' + s2_renderKlayDropdown(row, origIdx) + '</td>';
        // Dimensions cell
        html += '<td>' + s2_renderDimCell(row, origIdx) + '</td>';
        // State text (read-only)
        html += '<td>' + s2_renderStateText(row, origIdx) + '</td>';
        // Action — kebab menu (Mark for Later / Deactivate / Reset)
        html += '<td style="text-align:right">' + s2_renderRowMenu(row, origIdx) + '</td>';
        html += '</tr>';
      }
      i = sliceEnd;
    }
  }

  html += '</tbody></table>';

  // Pagination footer (only show when more than one page)
  if (displayRows.length > pageSize) {
    var fromN = page * pageSize + 1;
    var toN = Math.min((page + 1) * pageSize, displayRows.length);
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;font-size:11px;color:var(--color-text-tertiary)">';
    html += '<span>Showing <strong style="color:var(--color-text-primary)">' + fromN + '–' + toN + '</strong> of ' + displayRows.length.toLocaleString() + '</span>';
    html += '<div style="display:flex;gap:6px">';
    html += '<button class="s2-act ' + (page === 0 ? 'disabled' : '') + '" ' + (page === 0 ? 'disabled' : 'onclick="s2_setAcctPage(' + (page - 1) + ')"') + '>&larr; Prev</button>';
    html += '<span style="padding:5px 10px">Page ' + (page + 1) + ' of ' + (maxPage + 1) + '</span>';
    html += '<button class="s2-act ' + (page >= maxPage ? 'disabled' : '') + '" ' + (page >= maxPage ? 'disabled' : 'onclick="s2_setAcctPage(' + (page + 1) + ')"') + '>Next &rarr;</button>';
    html += '</div></div>';
  }

  return html;
}

/* Transaction-level workspace (specific month) */
/* Monthly view — same column shape as ALL view (account-level mapping)
   PLUS two extra columns for this month's activity: txn count and total volume.
   No transaction-level mapping; transactions can be peeked at via row expand for verification.
*/

/* ── Helpers and event handlers ── */
function s2_fsPill(fs){
  var map = {
    'pl-rev':  {cls:'s2-ws-fs-pl', txt:'P&amp;L · Revenue'},
    'pl-cogs': {cls:'s2-ws-fs-pl', txt:'P&amp;L · COGS'},
    'pl-opex': {cls:'s2-ws-fs-pl', txt:'P&amp;L · OpEx'},
    'bs-ca':   {cls:'s2-ws-fs-bs', txt:'BS · Current Assets'},
    'bs-fa':   {cls:'s2-ws-fs-bs', txt:'BS · Fixed Assets'},
    'bs-cl':   {cls:'s2-ws-fs-bs', txt:'BS · Current Liabilities'}
  };
  var p = map[fs];
  if (!p) return '<span class="s2-ws-fs-pill">—</span>';
  return '<span class="s2-ws-fs-pill ' + p.cls + '">' + p.txt + '</span>';
}

function s2_statusPill(a){
  if (a.status === 'confirmed') return '<span class="s2-ws-status-pill s2-ws-status-confirmed">Confirmed</span>';
  if (a.conf === 'low')  return '<span class="s2-ws-status-pill s2-ws-status-low">Low confidence</span>';
  if (a.conf === 'med')  return '<span class="s2-ws-status-pill s2-ws-status-med">Med confidence</span>';
  return '<span class="s2-ws-status-pill s2-ws-status-high">High confidence</span>';
}

/* ── Dimensions: cell renderer ── */
function s2_dimById(id){ return S2_DIMENSIONS.find(function(d){return d.id === id;}); }

function s2_dimChipColor(dim){
  // Translate the dim's hex color into a (bg, text) pair using a light tint
  var bg, fg;
  switch ((dim && dim.id) || '') {
    case 'department': bg = '#EEEDFE'; fg = '#3C3489'; break;
    case 'location':   bg = '#E6F1FB'; fg = '#0C447C'; break;
    default:           bg = '#F1EFE8'; fg = '#444441';
  }
  return {bg:bg, fg:fg};
}

function s2_renderDimCell(row, origIdx){
  var html = '';
  var dims = row.dimensions || [];
  dims.forEach(function(tag, tIdx){
    var dim = s2_dimById(tag.dim);
    if (!dim) return;
    var c = s2_dimChipColor(dim);
    html += '<span class="s2-dim-chip" style="background:' + c.bg + ';color:' + c.fg + '">';
    html += dim.name + ': ' + tag.value;
    html += ' <span class="s2-dim-chip-x" onclick="s2_removeDim(' + origIdx + ',' + tIdx + ')" title="Remove">&times;</span>';
    html += '</span>';
  });
  // Add button
  if (APP.s2.dimPopoverFor === row.old) {
    // Render inline popover instead of button
    html += s2_renderDimPopover(row, origIdx);
  } else {
    if (dims.length === 0) {
      html += '<span class="s2-dim-empty">— no dimensions —</span> ';
    }
    html += '<button class="s2-dim-add-btn" onclick="s2_openDimPopover(\'' + row.old + '\')">+ Add</button>';
  }
  return html;
}

function s2_renderDimPopover(row, origIdx){
  // Inline popover — sits where the +Add button used to be in the cell
  var html = '<div class="s2-dim-pop">';
  html += '<div class="s2-dim-pop-hdr">';
  html += '<div class="s2-dim-pop-title">Add dimension</div>';
  // Link to the full Dimensions settings page so the controller can add/edit
  // dimensions or values without leaving the workspace. The existing settings
  // return-ticket mechanism brings them back here.
  html += '<button class="s2-dim-pop-manage" onclick="s2_openDimSettingsFromPopover()">Manage dimensions &rsaquo;</button>';
  html += '</div>';
  html += '<div class="s2-dim-pop-row">';
  html += '<label class="s2-dim-pop-lbl">Dimension</label>';
  html += '<select id="s2-dim-pop-d-' + origIdx + '" class="s2-dim-pop-sel" onchange="s2_dimPopChange(' + origIdx + ')">';
  S2_DIMENSIONS.forEach(function(d){
    html += '<option value="' + d.id + '">' + d.name + '</option>';
  });
  html += '</select>';
  html += '</div>';
  html += '<div class="s2-dim-pop-row">';
  html += '<label class="s2-dim-pop-lbl">Value</label>';
  html += '<select id="s2-dim-pop-v-' + origIdx + '" class="s2-dim-pop-sel">';
  // Populate values for the first dimension by default
  if (S2_DIMENSIONS.length > 0) {
    S2_DIMENSIONS[0].values.forEach(function(v){
      html += '<option value="' + v + '">' + v + '</option>';
    });
  }
  html += '</select>';
  html += '</div>';
  html += '<div class="s2-dim-pop-actions">';
  html += '<button class="s2-dim-pop-btn" onclick="s2_closeDimPopover()">Cancel</button>';
  html += '<button class="s2-dim-pop-btn s2-dim-pop-btn-pri" onclick="s2_addDimFromPopover(' + origIdx + ')">Add</button>';
  html += '</div>';
  html += '</div>';
  return html;
}

/* Open the Dimensions settings page from the inline popover. Closes the popover
   first so it doesn't linger when the user comes back from settings. */
function s2_openDimSettingsFromPopover(){
  APP.s2.dimPopoverFor = null;
  openSettings();
}

function s2_dimPopChange(origIdx){
  // When dimension dropdown changes, repopulate the value dropdown
  var dSel = document.getElementById('s2-dim-pop-d-' + origIdx);
  var vSel = document.getElementById('s2-dim-pop-v-' + origIdx);
  if (!dSel || !vSel) return;
  var dim = s2_dimById(dSel.value);
  if (!dim) return;
  vSel.innerHTML = dim.values.map(function(v){return '<option value="' + v + '">' + v + '</option>';}).join('');
}

function s2_openDimPopover(legacyCode){
  APP.s2.dimPopoverFor = legacyCode;
  renderS2();
}
function s2_closeDimPopover(){
  APP.s2.dimPopoverFor = null;
  renderS2();
}
function s2_addDimFromPopover(origIdx){
  var dSel = document.getElementById('s2-dim-pop-d-' + origIdx);
  var vSel = document.getElementById('s2-dim-pop-v-' + origIdx);
  if (!dSel || !vSel) return;
  var dimId = dSel.value;
  var value = vSel.value;
  if (!S2_ACCOUNTS[origIdx].dimensions) S2_ACCOUNTS[origIdx].dimensions = [];
  // Avoid duplicate (same dim+value); if same dim exists, replace its value
  var existing = S2_ACCOUNTS[origIdx].dimensions.find(function(t){return t.dim === dimId;});
  if (existing) {
    existing.value = value;
  } else {
    S2_ACCOUNTS[origIdx].dimensions.push({dim:dimId, value:value});
  }
  APP.s2.dimPopoverFor = null;
  APP.s2.signedOff = false;
  renderS2();
}
function s2_removeDim(origIdx, tagIdx){
  if (!S2_ACCOUNTS[origIdx].dimensions) return;
  S2_ACCOUNTS[origIdx].dimensions.splice(tagIdx, 1);
  APP.s2.signedOff = false;
  renderS2();
}

/* ── State text (read-only column in workspace) ── */
function s2_renderStateText(row, origIdx){
  if (row.status === 'confirmed') {
    return '<span class="s2-ws-state s2-ws-state-mapped"><span class="s2-ws-state-icon">&#10003;</span>Mapped</span>';
  }
  if (row.status === 'proposed') {
    var html = '<span class="s2-ws-state s2-ws-state-proposed"><span class="s2-ws-state-icon">&#10024;</span>Proposed</span>';
    if (typeof origIdx === 'number') {
      html += '<button class="s2-ws-confirm-btn" onclick="s2_confirmRow(' + origIdx + ')" title="Confirm this mapping">Confirm</button>';
    }
    return html;
  }
  if (row.status === 'later') {
    return '<span class="s2-ws-state s2-ws-state-later">Marked for Later</span>';
  }
  if (row.status === 'deactivated') {
    return '<span class="s2-ws-state s2-ws-state-deactivated">Deactivated</span>';
  }
  return '<span class="s2-ws-state s2-ws-state-unmapped">Unmapped</span>';
}

/* ── Row action menu — kebab popover with Mark for Later / Deactivate / Change to Unmapped ── */
function s2_renderRowMenu(row, origIdx){
  var open = APP.s2.rowMenuOpen === origIdx;
  var html = '<div class="s2-row-menu-wrap">';
  html += '<button class="s2-row-menu-btn" onclick="s2_toggleRowMenu(' + origIdx + ', event)" aria-haspopup="true" aria-expanded="' + open + '" title="Row actions">&#8943;</button>';
  if (open) {
    html += '<div class="s2-row-menu" onclick="event.stopPropagation()">';
    if (row.status === 'later') {
      html += '<button class="s2-row-menu-item active" onclick="s2_toggleLater(' + origIdx + ');s2_closeRowMenu()">&#10003; Marked for Later</button>';
    } else {
      html += '<button class="s2-row-menu-item" onclick="s2_toggleLater(' + origIdx + ');s2_closeRowMenu()">Mark for Later</button>';
    }
    if (row.status === 'deactivated') {
      html += '<button class="s2-row-menu-item active" onclick="s2_toggleDeactivate(' + origIdx + ');s2_closeRowMenu()">&#10003; Deactivated</button>';
    } else {
      html += '<button class="s2-row-menu-item" onclick="s2_toggleDeactivate(' + origIdx + ');s2_closeRowMenu()">Deactivate</button>';
    }
    // "Change to Unmapped" — clears the mapping. Available on any row that has one
    // (Mapped, Proposed, Marked for Later, Deactivated).
    if (row.status === 'confirmed' || row.status === 'proposed' || row.status === 'later' || row.status === 'deactivated') {
      html += '<div class="s2-row-menu-divider"></div>';
      html += '<button class="s2-row-menu-item danger" onclick="s2_resetRow(' + origIdx + ');s2_closeRowMenu()">Change to Unmapped</button>';
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function s2_toggleRowMenu(origIdx, ev){
  if (ev && ev.stopPropagation) ev.stopPropagation();
  APP.s2.rowMenuOpen = (APP.s2.rowMenuOpen === origIdx) ? null : origIdx;
  renderApp();
}
function s2_closeRowMenu(){
  APP.s2.rowMenuOpen = null;
  // No re-render needed — the action handler re-renders
}
function s2_resetRow(origIdx){
  // Clears the mapping entirely — used by "Change to Unmapped" in the row kebab.
  // Both the AI suggestion and the controller's confirmation are wiped; the row
  // re-enters the Unmapped pool and the controller re-maps from scratch.
  S2_ACCOUNTS[origIdx].status = 'unconfirmed';
  S2_ACCOUNTS[origIdx].newCode = null;
  S2_ACCOUNTS[origIdx].newName = null;

/* ── SETTINGS PAGE ──
   Standalone full-page route, accessible via the gear in the top nav or
   Configure buttons in Stage 2. Reuses the dimension card rendering that
   used to live in the drawer. */
function openSettings(returnTo){
  // returnTo: optional snapshot of where to return to. If omitted, captures the
  // user's current location automatically.
  if (returnTo === undefined) {
    returnTo = captureReturnTo();
  }
  APP.settings = { active: 'dimensions', returnTo: returnTo };
  APP.s2.dimEditingId = null;
  renderApp();
  window.scrollTo(0, 0);
}
function closeSettings(){
  // Restore the user's position, if we have a return ticket
  var rt = APP.settings && APP.settings.returnTo;
  APP.settings = null;
  APP.s2.dimEditingId = null;
  if (rt) {
    APP.stage = rt.stage;
    if (rt.s2) {
      APP.s2.substep = rt.s2.substep;
      APP.s2.klayCoaView = rt.s2.klayCoaView || false;
      APP.s2.activeCluster = rt.s2.activeCluster;
      APP.s2.wsFilter = rt.s2.wsFilter;
      APP.s2.acctPage = rt.s2.acctPage;
    }
  }
  renderApp();
  window.scrollTo(0, 0);
}
function captureReturnTo(){
  // Snapshot just enough to land the user back on the same screen
  return {
    stage: APP.stage,
    s2: {
      substep: APP.s2.substep,
      klayCoaView: APP.s2.klayCoaView,
      activeCluster: APP.s2.activeCluster,
      wsFilter: APP.s2.wsFilter,
      acctPage: APP.s2.acctPage
    }
  };
}
function goHome(){
  // Logo click — for now, just close settings and go to current stage
  if (APP.settings) closeSettings();
}

function renderSettings(){
  // Hide the substep bar — Settings is a top-level route, not part of any stage
  var ssb = document.getElementById('substepbar');
  if (ssb) ssb.style.display = 'none';
  // Rebuild stage bar so it doesn't show any active stage
  renderStageBar();

  var rt = APP.settings && APP.settings.returnTo;

  var html = '<div class="settings-shell">';

  html += '<div class="settings-content">';

    html += '<div class="settings-topbar">';
    html += '<button class="settings-back" onclick="closeSettings()"><span class="settings-back-arrow">&larr;</span> Back to ' + rtLabel + '</button>';

/* setSettingsSection retained as a no-op for any callers, but the sidebar that
   drove section switching has been removed — Dimensions is the only section. */
function setSettingsSection(key){

  APP.settings.active = key;

function settingsReturnLabel(rt){
  // Best-effort label for where the user came from
  if (rt.stage === 2) {
    if (rt.s2 && rt.s2.klayCoaView) return 'Klay CoA';
    if (rt.s2 && rt.s2.substep === 1) return 'Structure Overview';
    if (rt.s2 && rt.s2.substep === 2) return 'Workspace';
    if (rt.s2 && rt.s2.substep === 3) return 'Sign off';
    return 'Stage 2 — Account Mapping';
  }
  if (rt.stage === 1) return 'Stage 1 — Master Data';
  if (rt.stage === 3) return 'Stage 3 — Review';
  if (rt.stage === 4) return 'Stage 4 — UAT';
  if (rt.stage === 5) return 'Stage 5 — Sign-off';
  return 'previous page';
}

/* Render one row of the configured-dimensions table. Each row supports inline
   rename, value editing, and delete. */
function s2_renderDimRow(dim){
  var c = s2_dimChipColor(dim);
  var isEditingName = APP.s2.dimEditingId === dim.id;
  var isAddingValue = APP.s2.dimEditingId === '__addval__:' + dim.id;

  var html = '<tr class="s2-dim-tbl-row">';

  // Name cell
  html += '<td class="s2-dim-tbl-name-cell">';
  if (isEditingName) {
    html += '<input id="s2-dim-edit-name-' + dim.id + '" class="s2-dim-edit-input" value="' + dim.name + '" autofocus />';
  } else {
    html += '<div class="s2-dim-tbl-name"><span class="s2-dim-card-dot" style="background:' + dim.color + '"></span>' + dim.name + '</div>';
  }
  html += '</td>';

  // Values cell
  html += '<td class="s2-dim-tbl-vals-cell">';
  html += '<div class="s2-dim-card-values">';
  dim.values.forEach(function(v, vi){
    html += '<span class="s2-dim-val-chip" style="background:' + c.bg + ';color:' + c.fg + '">';
    html += v;
    html += ' <span class="s2-dim-val-chip-x" onclick="s2_dimRemoveValue(\'' + dim.id + '\',' + vi + ')" title="Remove">&times;</span>';
    html += '</span>';
  });
  if (isAddingValue) {
    html += '<input id="s2-dim-newval-' + dim.id + '" class="s2-dim-edit-input" style="width:120px;font-size:11px;padding:3px 6px" placeholder="New value" autofocus />';
    html += '<button class="s2-dim-val-add" onclick="s2_dimSaveValue(\'' + dim.id + '\')">Add</button>';
    html += '<button class="s2-dim-val-add" onclick="s2_dimCancelEdit()">Cancel</button>';
  } else {
    html += '<button class="s2-dim-val-add" onclick="s2_dimStartAddValue(\'' + dim.id + '\')">+ value</button>';
  }
  html += '</div>';
  html += '</td>';

  // Actions cell
  html += '<td style="text-align:right" class="s2-dim-tbl-actions-cell">';
  if (isEditingName) {
    html += '<button class="s2-dim-card-act" onclick="s2_dimCancelEdit()">Cancel</button> ';
    html += '<button class="s2-dim-card-act s2-dim-pop-btn-pri" style="color:#fff" onclick="s2_dimSaveEdit(\'' + dim.id + '\')">Save</button>';
  } else {
    html += '<button class="s2-dim-card-act" onclick="s2_dimStartEdit(\'' + dim.id + '\')">Rename</button> ';
    html += '<button class="s2-dim-card-act s2-dim-card-act-danger" onclick="s2_dimDelete(\'' + dim.id + '\')">Delete</button>';
  }
  html += '</td>';

  html += '</tr>';
  return html;
}

/* Render a single recommendation card. Shows name/dot, AI reasoning, sample
   values, and Confirm/Dismiss actions. */
function s2_renderDimRecommendationCard(rec){
  var html = '<div class="s2-dim-rec-card">';
  html += '<div class="s2-dim-rec-card-hdr">';
  html += '<span class="s2-dim-card-dot" style="background:' + rec.color + '"></span>';
  html += '<span class="s2-dim-rec-card-name">' + rec.name + '</span>';
  html += '</div>';
  html += '<div class="s2-dim-rec-card-reason">' + rec.reason + '</div>';
  // Sample values (first few)
  if (rec.values && rec.values.length > 0 && rec.values[0] !== '(none configured yet)') {
    html += '<div class="s2-dim-rec-card-vals">';
    var sample = rec.values.slice(0, 4);
    sample.forEach(function(v){
      html += '<span class="s2-dim-rec-card-val">' + v + '</span>';
    });
    if (rec.values.length > 4) {
      html += '<span class="s2-dim-rec-card-val s2-dim-rec-card-val-more">+' + (rec.values.length - 4) + '</span>';
    }
    html += '</div>';
  } else {
    html += '<div class="s2-dim-rec-card-vals s2-dim-rec-card-vals-empty">No values yet — add after confirming</div>';
  }
  html += '<div class="s2-dim-rec-card-meta">' + rec.signals + '</div>';
  html += '<div class="s2-dim-rec-card-actions">';
  html += '<button class="s2-dim-rec-card-btn s2-dim-rec-card-btn-pri" onclick="s2_dimRecConfirm(\'' + rec.id + '\')">Confirm</button>';
  html += '<button class="s2-dim-rec-card-btn" onclick="s2_dimRecDismiss(\'' + rec.id + '\')">Dismiss</button>';
  html += '</div>';
  html += '</div>';
  return html;
}

/* Confirm an AI recommendation: move it from S2_DIM_RECOMMENDATIONS into
   S2_DIMENSIONS, where it'll render in the configured-dimensions table. */
function s2_dimRecConfirm(recId){
  var idx = S2_DIM_RECOMMENDATIONS.findIndex(function(r){return r.id === recId;});
  if (idx === -1) return;
  var rec = S2_DIM_RECOMMENDATIONS[idx];
  // Sanitize values: strip the "(none configured yet)" placeholder
  var values = (rec.values || []).filter(function(v){return v && v !== '(none configured yet)';});
  S2_DIMENSIONS.push({
    id: rec.id,
    name: rec.name,
    color: rec.color,
    values: values,
  });
  S2_DIM_RECOMMENDATIONS.splice(idx, 1);
  renderApp();
}

/* Dismiss an AI recommendation: remove without adding to S2_DIMENSIONS. */
function s2_dimRecDismiss(recId){
  var idx = S2_DIM_RECOMMENDATIONS.findIndex(function(r){return r.id === recId;});
  if (idx === -1) return;
  S2_DIM_RECOMMENDATIONS.splice(idx, 1);
  renderApp();
}

/* Settings handlers — these mutate the dimension catalog and re-render the
   active route (settings page). When called from Stage 2 via the inline +Add
   popover, the same handlers re-render the workspace via renderApp(). */
function s2_dimStartEdit(id){ APP.s2.dimEditingId = id; renderApp(); }
function s2_dimCancelEdit(){ APP.s2.dimEditingId = null; renderApp(); }
function s2_dimSaveEdit(id){
  var input = document.getElementById('s2-dim-edit-name-' + id);
  if (!input) return;
  var newName = input.value.trim();
  if (!newName) return;
  var dim = s2_dimById(id);
  if (dim) dim.name = newName;
  APP.s2.dimEditingId = null;
  renderApp();
}
function s2_dimDelete(id){
  if (!confirm('Delete this dimension? Any tags using it will also be removed from accounts.')) return;
  S2_DIMENSIONS = S2_DIMENSIONS.filter(function(d){return d.id !== id;});
  // Cascade: strip tags using this dim from all accounts
  S2_ACCOUNTS.forEach(function(a){
    if (a.dimensions) a.dimensions = a.dimensions.filter(function(t){return t.dim !== id;});
  });
  APP.s2.signedOff = false;
  renderApp();
}
function s2_dimStartAddValue(id){ APP.s2.dimEditingId = '__addval__:' + id; renderApp(); }
function s2_dimSaveValue(id){
  var input = document.getElementById('s2-dim-newval-' + id);
  if (!input) return;
  var newVal = input.value.trim();
  if (!newVal) return;
  var dim = s2_dimById(id);
  if (dim && dim.values.indexOf(newVal) === -1) dim.values.push(newVal);
  APP.s2.dimEditingId = null;
  renderApp();
}
function s2_dimRemoveValue(id, vIdx){
  var dim = s2_dimById(id);
  if (!dim) return;
  var removedVal = dim.values[vIdx];
  dim.values.splice(vIdx, 1);
  // Cascade: strip tags using this {dim, value} from accounts
  S2_ACCOUNTS.forEach(function(a){
    if (a.dimensions) a.dimensions = a.dimensions.filter(function(t){return !(t.dim === id && t.value === removedVal);});
  });
  APP.s2.signedOff = false;
  renderApp();
}
function s2_dimStartNew(){ APP.s2.dimEditingId = '__new__'; renderApp(); }
function s2_dimCancelNew(){ APP.s2.dimEditingId = null; renderApp(); }
function s2_dimSaveNew(){
  var input = document.getElementById('s2-dim-new-name');
  if (!input) return;
  var name = input.value.trim();
  if (!name) return;
  // Generate id from name
  var id = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || ('dim-' + Date.now());
  // Avoid collision
  if (s2_dimById(id)) id = id + '-' + Date.now();
  var palette = ['#7F77DD', '#378ADD', '#1D9E75', '#D4537E', '#BA7517', '#5DCAA5'];
  var color = palette[S2_DIMENSIONS.length % palette.length];
  S2_DIMENSIONS.push({id:id, name:name, color:color, values:[]});
  APP.s2.dimEditingId = null;
  renderApp();
}

function s2_toggleDeactivate(i){
  // Deactivate toggle — account is brought over but inactive in Klay (semantically distinct

  if (S2_ACCOUNTS[i].status === 'deactivated') {

function s2_changeKlay(i, newCode){
  // User picked a Klay account in the dropdown — update the mapping AND auto-mark as Mapped
  // (per new spec: row becomes Mapped automatically when user picks a Klay account)
  var k = S2_KLAY.find(function(x){return x.code === newCode;});
  if (k) {
    S2_ACCOUNTS[i].newCode = k.code;

    S2_ACCOUNTS[i].status = 'confirmed';
    APP.s2.signedOff = false;
  }
  renderS2();
}
