<div class="layout">
  <div class="content" id="main"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   APP STATE
   New 5-stage flow:
     1 = Master data (CoA + GL + TB uploads, plus 6 master-data tiles)
     2 = Mapping (combined account-level + per-month transaction view)
     3 = TB / BS / P&L review (Legacy vs Klay reconciliation)
     4 = UAT
     5 = Sign-off
═══════════════════════════════════════════════════════════════ */

var APP = {
  stage: 1,
  /* When non-null, Settings is showing instead of any stage. Stores the return ticket
     so 'Back to Workspace' lands the user back where they were. */
  settings: null,          // null | { active:'dimensions', returnTo: {stage, s2:{substep, klayCoaView, activeCluster, wsFilter, acctPage}} | null }
  /* Stage 1 state — 9 items: 3 uploads + 6 master data tiles
     Each item state: 0=not started, 1=uploading, 2=uploaded/HC review, 3=confirmed
  */
  s1: {
    items: [3, 3, 3,    // CoA, GL, TB (pre-confirmed for demo)
            3, 3, 3, 3, 2, 0],  // Inv, FA, Vendor, Customer, OpenAP review, OpenAR locked
    detailIdx: null,  // when null, show overview; when set (0-8), show detail
  },
  /* Stage 2 state */
  s2: {
    substep: 1,              // 1 = Klay orientation, 2 = Workspace, 3 = Sign off
    klayCoaView: false,      // true when "Review Klay CoA" is open as an overlay over substep 2
    klayRenameOpen: null,    // Klay code currently in rename-edit mode (or null)
    activeCluster: 'all-accounts', // for the workspace navigator
    activeSection: 'bs-ca',  // (legacy) FS section state, retained for backward compat
    signedOff: false,        // true once mapping sign-off is confirmed in substep 3
    dimPopoverFor: null,     // legacy account code that has the +Add-dimension popover open
    dimEditingId: null,      // dimension currently in edit mode on Settings page
    wsFilter: 'all',         // 'all' | 'unmapped' | 'proposed' | 'mapped' | 'later' | 'deactivated'
    issuesExpanded: false,   // false = show only first row of issue boxes (4) + "Show all" CTA
    proposedBannerDismissed: false, // session flag — set true when user × the bulk-info banner
    typeFilter: [],          // multi-select legacy CoA hierarchy node ids that are checked
    typeFilterOpen: false,   // whether the legacy filter dropdown is open
    typeFilterExpanded: {},  // hierarchy nodeId → bool, for tree expand/collapse
    klayFilter: [],          // multi-select Klay CoA hierarchy node ids that are checked
    klayFilterOpen: false,   // whether the Klay filter dropdown is open
    klayFilterExpanded: {},  // hierarchy nodeId → bool, for tree expand/collapse
    klayFilterSearch: '',    // search within the Klay filter tree
    moreFilterOpen: false,   // whether the overflow Filter panel is open
    confFilter: [],          // ['high','med','low'] — filter rows by AI confidence
    tierFilter: [],          // ['hard','soft','warn'] — filter rows by issue tier
    dimFilter: '',           // '' | 'with' | 'without' — filter by has-dimensions
    acctPage: 0,             // pagination cursor for account workspace
    previewHighlight: null,  // index into S2_ACCOUNTS — highlighted in preview tree
    clusterMappings: {},     // clusterId → {targets: [klayCode], status: 'unconfirmed'|'confirmed'|'review', cascade: bool}
    expandedClusters: {},    // clusterId → bool — for showing per-account detail in cluster cards
  },
  /* Stage 3 state */
  s3: {
    view: 'tb',            // 'tb', 'bs', or 'pl'
    period: 'cumulative',  // 'cumulative' or month index 0..8
    showAll: false,        // false = variances only (default); true = all accounts
    viewBy: 'klay',        // 'klay' (Pattern 1: Klay-anchored) or 'legacy' (Pattern 2: side-by-side)
    expanded: {},          // map of klay-acct → bool, for expand-to-show-contributors
  }
};

/* ═══════════════════════════════════════
   STAGES TOP NAV
═══════════════════════════════════════ */
var STAGES = [
  {n:1, lbl:'Master data'},
  {n:2, lbl:'Account Mapping'},
  {n:3, lbl:'Review'},
  {n:4, lbl:'UAT'},
  {n:5, lbl:'Sign-off'}
];

function renderStageBar(){
  var s = APP.stage;
  var inSettings = !!APP.settings;
  var html = '';
  STAGES.forEach(function(st, i){
    // In Settings: every stage is shown as 'off' (dimmed) since none is active.
    // Past stages in the migration flow stay 'done' for context.
    var cls;
    if (inSettings) {
      cls = s > st.n ? 'done' : 'off';
    } else {
      cls = s > st.n ? 'done' : s === st.n ? 'on' : 'off';
    }
    var icon = cls === 'done' ? '&#10003;' : st.n;
    html += '<div class="sti clickable ' + cls + '" onclick="jumpToStage(' + st.n + ')">'
      + '<div class="stc ' + cls + '">' + icon + '</div>'
      + '<div class="stl ' + cls + '">' + st.lbl + '</div>'
      + '</div>';
    if (i < STAGES.length - 1) html += '<div class="conn"></div>';
  });
  document.getElementById('stagebar').innerHTML = html;
}

function jumpToStage(n){
  // Leaving settings if active
  APP.settings = null;
  APP.stage = n;
  // Reset detail view when jumping
  APP.s1.detailIdx = null;
  // Day badge
  var day = n === 1 ? 5 : n === 2 ? 12 : n === 3 ? 18 : n === 4 ? 22 : 28;
  var b = document.getElementById('daybadge');
  b.textContent = 'Day ' + day + ' of 30';
  b.className = 'day-badge act';
  // Substep bar visibility (stage 2 has Account/Transaction toggle; stage 3 has TB/BS/PL tabs)
  var ssb = document.getElementById('substepbar');
  ssb.style.display = 'none';
  ssb.innerHTML = '';
  // Render the stage
  renderStageBar();
  if (n === 1) renderS1();
  else if (n === 2) renderS2();
  else if (n === 3) renderS3();
  else if (n === 4) renderS4();
  else renderS5();
  window.scrollTo(0, 0);
}

/* Top-level renderer. Routes to the Settings page when APP.settings is set,
   otherwise to the active stage. Use this instead of calling render fns directly
   when something might cross routes (e.g. dimension handlers run from both
   Settings and the Workspace). */
function renderApp(){
  // Update the gear's active state
  var gear = document.querySelector('.nav-gear');
  if (gear) {
    if (APP.settings) gear.classList.add('active');
    else gear.classList.remove('active');
  }
  if (APP.settings) {
    renderSettings();
    return;
  }
  // Otherwise, re-render the current stage
  if (APP.stage === 1) renderS1();
  else if (APP.stage === 2) renderS2();
  else if (APP.stage === 3) renderS3();
  else if (APP.stage === 4) renderS4();
  else renderS5();
}

  {

function s1_nConfirmed(){ return APP.s1.items.filter(function(s){return s===3;}).length; }
function s1_gateClear(idx){ return APP.s1.items[idx] === 3; }

function s1_tileStatus(idx){
  var item = S1_ITEMS[idx];
  var s = APP.s1.items[idx];
  var locked = item.gate != null && !s1_gateClear(item.gate) && s === 0;
  if (locked) return {cls:'ts-locked', txt:'Locked'};
  if (s === 0) return {cls:'ts-pending', txt:'Pending'};
  if (s === 1) return {cls:'ts-uploaded', txt:'Uploading…'};
  if (s === 2) return {cls:'ts-review', txt:'Review'};
  return {cls:'ts-done', txt:'Confirmed'};
}


/* ── STAGE 1 RENDER ── */
function renderS1(){
  var ssb = document.getElementById('substepbar');
  ssb.style.display = 'none';
  if (APP.s1.detailIdx == null) {
    s1_renderOverview();
  } else {
    s1_renderDetail(APP.s1.detailIdx);
  }
}

function s1_renderOverview(){
  var done = s1_nConfirmed();
  var total = S1_ITEMS.length;
  var html = '<h1 class="stage-title">Upload Data</h1>'
    + '<p class="stage-sub">Upload the foundational data Klay needs: your Chart of Accounts, full General Ledger, and Legacy Trial Balance — plus the master data Klay will use as reference for every transaction from go-live.</p>'
    + '<div class="stage-meta">'
    + '<span><strong>' + done + ' of ' + total + '</strong> items confirmed</span>'
    + '<span>·</span><span>Days 1–10 of 30</span>'
    + '</div>';

  if (done < 3) {
    html += '<div class="hint-banner">'
      + '<div class="hint-icon">i</div>'
      + '<div><strong>Start with Chart of Accounts, GL, and Trial Balance</strong> — these are the foundational uploads. Once confirmed, master data (Inventory, Fixed Assets, Vendors, Customers) can all be worked in parallel.</div>'
      + '</div>';
  }

  // Foundation row
  html += '<div class="bento-section-lbl">Foundational uploads</div>';
  html += '<div class="bento">';
  for (var i = 0; i < 3; i++) html += s1_renderTile(i);
  html += '</div>';

  // Master data row
  html += '<div class="bento-section-lbl">Master data</div>';
  html += '<div class="bento">';
  for (var j = 3; j < S1_ITEMS.length; j++) html += s1_renderTile(j);
  html += '</div>';

  // Continue button
  var canContinue = (done === total);
  html += '<div class="signoff-row">';
  if (!canContinue) {
    var rem = total - done;
    html += '<span class="btn-signoff-help">' + rem + ' item' + (rem === 1 ? '' : 's') + ' still need to be confirmed</span>';
  }
  html += '<button class="btn-cont" ' + (canContinue ? '' : 'disabled') + ' onclick="jumpToStage(2)">Continue to Stage 2 — Account Mapping &rsaquo;</button>';
  html += '</div>';

  document.getElementById('main').innerHTML = html;
}

function s1_renderTile(idx){
  var item = S1_ITEMS[idx];
  var s = APP.s1.items[idx];
  var status = s1_tileStatus(idx);
  var locked = item.gate != null && !s1_gateClear(item.gate) && s === 0;
  var classes = ['tile'];
  if (s === 3) classes.push('done');
  if (locked) classes.push('locked');
  if (s === 0 && !locked) classes.push('skel');

  var html = '<div class="' + classes.join(' ') + '" onclick="s1_openDetail(' + idx + ')">';
  html += '<div class="tile-hdr">';
  html += '<div><span class="tile-num">' + item.num + '</span><div class="tile-name">' + item.name + '</div></div>';
  html += '<span class="tile-status ' + status.cls + '">' + status.txt + '</span>';
  html += '</div>';

  if (locked) {
    html += '<div class="tile-desc">' + item.desc + '</div>';
    html += '<div class="tile-foot lock">Unlocks once ' + S1_ITEMS[item.gate].name + ' is confirmed</div>';
  } else if (s === 0) {
    html += '<div class="tile-desc">' + item.desc + '</div>';
    html += '<div class="tile-foot">Click to upload</div>';
  } else if (s === 2) {
    html += '<div class="tile-desc">' + item.detected + ' — review needed before confirming</div>';
    var hb = item.hc.hb.length, sb = item.hc.sb.length, wb = item.hc.wb.length;
    html += '<div class="tile-foot warn">' + (hb + sb) + ' health-check items to review</div>';
  } else if (s === 3) {
    html += '<div class="tile-stats">';
    item.stats.forEach(function(st){
      html += '<div><div class="tile-stat-n">' + st.n + '</div><div class="tile-stat-l">' + st.l + '</div></div>';
    });
    html += '</div>';
  }

  html += '</div>';
  return html;
}

function s1_openDetail(idx){
  var item = S1_ITEMS[idx];
  if (item.gate != null && !s1_gateClear(item.gate) && APP.s1.items[idx] === 0) {
    // Show locked detail message inline
    APP.s1.detailIdx = idx;
    s1_renderDetail(idx);
    return;
  }
  APP.s1.detailIdx = idx;
  s1_renderDetail(idx);
  window.scrollTo(0, 0);
}

function s1_renderDetail(idx){
  var item = S1_ITEMS[idx];
  var s = APP.s1.items[idx];
  var locked = item.gate != null && !s1_gateClear(item.gate) && s === 0;

  var html = '<button class="btn-back" onclick="s1_backToOverview()">&larr; Back to Stage 1</button>';
  html += '<div class="detail-num">Stage 1 · ' + item.num + '</div>';
  html += '<div class="detail-name">' + item.name + '</div>';
  html += '<div class="detail-desc">' + item.desc + '</div>';

  if (locked) {
    html += '<div class="alert amber"><div class="alert-icon">&#9888;</div>'
      + '<div class="alert-body">This step is locked until <strong>' + S1_ITEMS[item.gate].name + '</strong> is confirmed. ' + item.name + ' references entries from that list and cannot be processed until those references are stable.</div></div>';
    document.getElementById('main').innerHTML = html;
    return;
  }

  // Required columns hint
  html += '<div style="margin-top:18px;font-size:11px;color:var(--color-text-tertiary);font-weight:600;letter-spacing:.05em;text-transform:uppercase;">Required columns</div>';
  html += '<ul style="margin-top:6px;padding-left:18px;font-size:12px;color:var(--color-text-secondary);font-weight:300;line-height:1.7;">';
  item.cl.forEach(function(c){ html += '<li>' + c + '</li>'; });
  html += '</ul>';

  // State-specific content
  if (s === 0) {
    html += '<div class="upload-zone">'
      + '<div class="upload-zone-title">Drop your file here, or browse</div>'
      + '<div class="upload-zone-sub">Excel (.xlsx) or CSV up to 10 MB</div>'
      + '<button class="btn-upload" onclick="s1_simulateUpload(' + idx + ')">Browse files</button>'
      + '</div>';
  } else if (s === 2 || s === 3) {
    // File strip
    html += '<div class="file-strip">'
      + '<div class="file-info">'
      + '<div class="file-icon">XLS</div>'
      + '<div><div class="file-name">' + item.fn + '</div><div class="file-meta">' + item.fs + ' · ' + item.detected + '</div></div>'
      + '</div>'
      + '<button class="btn-ghost" style="font-size:11px;padding:5px 10px">Replace</button>'
      + '</div>';

    // HC sections
    if (item.hc.hb.length > 0) {
      html += s1_renderHC('hb', 'Hard blocks — must resolve', item.hc.hb);
    }
    if (item.hc.sb.length > 0) {
      html += s1_renderHC('sb', 'Soft blocks — review and acknowledge', item.hc.sb);
    }
    if (item.hc.wb.length > 0) {
      html += s1_renderHC('wb', 'Warnings (informational)', item.hc.wb);
    }
    if (item.hc.hb.length === 0 && item.hc.sb.length === 0 && item.hc.wb.length === 0) {
      html += '<div class="alert green"><div class="alert-icon">&#10003;</div><div class="alert-body"><strong>Health check passed</strong> — no issues detected.</div></div>';
    }

    // Confirm box
    if (s === 2) {
      html += '<div class="confirm-box">'
        + '<div class="confirm-title">Confirm to proceed</div>'
        + '<div class="confirm-copy">' + item.confirmCopy + '</div>'
        + '<div class="confirm-actions">'
        + '<button class="btn-confirm" onclick="s1_confirm(' + idx + ')">Confirm &amp; lock</button>'
        + '</div></div>';
    } else {
      html += '<div class="alert green"><div class="alert-icon">&#10003;</div><div class="alert-body"><strong>Confirmed.</strong> ' + item.confirmCopy + '</div></div>';
      html += '<div style="margin-top:14px"><button class="btn-ghost" onclick="s1_unconfirm(' + idx + ')">Reopen for revision</button></div>';
    }
  }

  document.getElementById('main').innerHTML = html;
}

function s1_renderHC(kind, title, rows){
  var html = '<div class="hc-section ' + kind + '">';
  html += '<div class="hc-section-hdr"><span class="hc-section-title">' + title + '</span><span class="hc-section-cnt">' + rows.length + ' item' + (rows.length === 1 ? '' : 's') + '</span></div>';
  html += '<div class="hc-section-body">';
  rows.forEach(function(r){
    html += '<div class="hc-row">'
      + '<div class="hc-row-title">' + r.t + '</div>'
      + '<div class="hc-row-info">' + r.i + '</div>';
    if (r.a) {
      html += '<div class="hc-row-action"><button class="btn-ghost">' + (r.b || 'Review') + '</button><span style="font-size:11px;color:var(--color-text-tertiary);font-weight:300">' + r.a + '</span></div>';
    }
    html += '</div>';
  });
  html += '</div></div>';
  return html;
}

function s1_simulateUpload(idx){
  // Skip processing simulation for prototype — go straight to review state
  APP.s1.items[idx] = 2;
  s1_renderDetail(idx);
}

function s1_confirm(idx){
  APP.s1.items[idx] = 3;
  s1_renderDetail(idx);
}

function s1_unconfirm(idx){
  APP.s1.items[idx] = 2;
  s1_renderDetail(idx);
}

function s1_backToOverview(){
  APP.s1.detailIdx = null;
  s1_renderOverview();

/* Compile a PT. ABC dataset into the S2_ACCOUNTS shape that the rest of the app expects.
   Headers and leaves both go in (renderers will skip headers where appropriate).
   Any leaf with a newCode (AI-seeded mapping) is treated as Mapped (status:'confirmed')
   on first load — issue flags are orthogonal to mapping status. */
function s2_ptabcToFlat(dataset, fs){
  return dataset.map(function(r){
    var flat = {
      old: r.code,
      oldName: r.name,
      fs: fs,
      isHeader: !!r.isHeader,
      parent: r.parent || null,
    };
    if (!r.isHeader) {
      flat.newCode = r.newCode;
      flat.newName = r.newName;
      flat.conf = r.conf;
      // AI-seeded mapping → 'proposed' on first load. The controller still has to confirm
      // (or change) before it counts as Mapped. Falls back to row's status only if no newCode.
      flat.status = r.newCode ? 'proposed' : (r.status || 'unconfirmed');
      if (r.reason) flat.reason = r.reason;
      if (r.issues) flat.issues = r.issues.slice();
    }
    return flat;
  });
}

/* Backward-compatible name (Current Assets only) — used by the synthesizer below */
function s2_ptabcCurrentAssetsToFlat(){
  return s2_ptabcToFlat(S2_PTABC_CA, 'bs-ca');
}

/* ──────────────────────────────────────────────────────────
   CLUSTER DETECTION
   A cluster = the deepest-meaningful-grouping in the legacy tree.
   For PT. ABC's CoA, clusters are the parent nodes whose children are leaves
   (or whose grandchildren are leaves, recursively the deepest such grouping).

   We build clusters by walking S2_ACCOUNTS (which has parent links from the
   PT. ABC dataset). For accounts that don't have parent links (the synthesized
   non-CA sections), we synthesize lightweight clusters per FS placement.

   Each cluster object:
   {
     id:           unique key
     code:         legacy code (header) or synthesized
     name:         human-readable cluster name
     fs:           which FS section (bs-ca, bs-fa, bs-cl, pl-rev, pl-cogs, pl-opex)
     leafCount:    number of postable leaves under this cluster
     leafIndices:  array of indices into S2_ACCOUNTS for the leaves
     aiTargets:    array of suggested Klay codes (could be 1 = clean, 2+ = split)
     aiTargetCounts: {klayCode: leafCountThatMapsToIt}
     pattern:      'clean' | 'split' | 'review'
     reasoning:    string explaining the AI's suggestion (esp. for split/review)
   }
*/
function s2_detectClusters(){
  var clusters = [];

  // PT. ABC tree-based detection across all 5 sections.
  // For each header in the tree, walk recursively. A header IS a cluster if all its
  // direct kids are leaves (no header kids). Otherwise its header kids become clusters.
  var allFs = ['bs-ca', 'bs-fa', 'bs-cl', 'pl-rev', 'pl-cogs', 'pl-opex'];

  allFs.forEach(function(fs){
    var headers = S2_ACCOUNTS.filter(function(a){return a.fs === fs && a.isHeader;});
    var leaves  = S2_ACCOUNTS.filter(function(a){return a.fs === fs && !a.isHeader;});

    // 1. Headers whose direct kids are all leaves → these are clusters
    //    Headers with MIXED kids (some leaves, some sub-headers) → the direct-leaf
    //    children form a cluster (using the parent header as the cluster name);
    //    sub-headers themselves recursively become their own clusters.
    headers.forEach(function(h){
      var directKids = S2_ACCOUNTS.filter(function(a){return a.parent === h.old;});
      // Direct leaf children only
      var leavesInCluster = directKids.filter(function(k){return !k.isHeader;});
      if (leavesInCluster.length === 0) return; // no direct leaves — sub-headers will handle their own

      // Compute AI target consensus
      var targetCounts = {};
      leavesInCluster.forEach(function(l){
        targetCounts[l.newCode] = (targetCounts[l.newCode] || 0) + 1;
      });
      var targets = Object.keys(targetCounts);
      var pattern = 'clean';
      var reasoning = '';
      if (targets.length === 1) {
        var tk = S2_KLAY_BY_CODE[targets[0]];
        reasoning = leavesInCluster.length + ' account' + (leavesInCluster.length === 1 ? '' : 's') + ' map to ' + targets[0] + (tk ? ' · ' + tk.subSection : '') + '.';
      } else {
        pattern = 'split';
        var bits = targets.map(function(t){
          var subSec = (S2_KLAY_BY_CODE[t] || {}).subSection || '';
          return targetCounts[t] + ' → ' + t + ' ' + subSec;
        });
        reasoning = 'AI splits across ' + targets.length + ' Klay accounts: ' + bits.join('; ') + '.';
      }
      // Mark "review" if any leaves have low confidence
      var lowCount = leavesInCluster.filter(function(l){return l.conf === 'low';}).length;
      if (lowCount > 0 && pattern === 'clean') {
        pattern = 'review';
        reasoning = leavesInCluster.length + ' account' + (leavesInCluster.length === 1 ? '' : 's') + ' to ' + targets[0] + '; ' + lowCount + ' need review (low confidence).';
      } else if (lowCount > 0 && pattern === 'split') {
        reasoning += ' ' + lowCount + ' account' + (lowCount === 1 ? '' : 's') + ' need review.';
      }

      clusters.push({
        id: 'cl:' + h.old,
        code: h.old,
        name: h.oldName,
        fs: h.fs,
        leafCount: leavesInCluster.length,
        leafIndices: leavesInCluster.map(function(l){return S2_ACCOUNTS.indexOf(l);}),
        aiTargets: targets,
        aiTargetCounts: targetCounts,
        pattern: pattern,
        reasoning: reasoning,
      });
    });

    // 2. Top-level leaves with no header parent → 1-leaf clusters
    leaves.forEach(function(l){
      var idx = S2_ACCOUNTS.indexOf(l);
      var alreadyInCluster = clusters.some(function(c){return c.leafIndices.indexOf(idx) !== -1;});
      if (alreadyInCluster) return;
      if (!l.parent) {
        var pattern = (l.conf === 'low') ? 'review' : 'clean';
        var subSec = (S2_KLAY_BY_CODE[l.newCode] || {}).subSection || '';
        clusters.push({
          id: 'cl:leaf:' + l.old,
          code: l.old,
          name: l.oldName,
          fs: l.fs,
          leafCount: 1,
          leafIndices: [idx],
          aiTargets: [l.newCode],
          aiTargetCounts: (function(o){o[l.newCode] = 1; return o;})({}),
          pattern: pattern,
          reasoning: l.reason || ('Single-account group — maps to ' + l.newCode + ' · ' + subSec + '.'),
        });
      }
    });
  });

  return clusters;
}

var S2_CLUSTERS = s2_detectClusters();
var S2_CLUSTERS_BY_ID = {};
S2_CLUSTERS.forEach(function(c){ S2_CLUSTERS_BY_ID[c.id] = c; });

/* Cluster cascade: when user confirms a cluster mapping, propagate to all its leaves.
   - Sets each leaf to status='confirmed' (per Q3=b answer: cluster confirm cascades regardless of confidence)
   - User can still override individual leaves in Substep 3 (Account mapping)
*/
function s2_cascadeCluster(clusterId, action){
  var c = S2_CLUSTERS_BY_ID[clusterId];
  if (!c) return;
  if (action === 'confirm') {
    APP.s2.clusterMappings[clusterId] = {status:'confirmed', cascade:true};
    c.leafIndices.forEach(function(idx){
      S2_ACCOUNTS[idx].status = 'confirmed';
    });
  } else if (action === 'review') {
    APP.s2.clusterMappings[clusterId] = {status:'review', cascade:false};
    // Don't change leaf status — leaves stay unconfirmed for individual handling
  } else if (action === 'unconfirm') {
    delete APP.s2.clusterMappings[clusterId];
    c.leafIndices.forEach(function(idx){
      S2_ACCOUNTS[idx].status = 'unconfirmed';
    });
  }
}

/* Helper: get clusters for an FS section (used by Substep 2 cards) */
function s2_clustersForSection(fs){
  return S2_CLUSTERS.filter(function(c){return c.fs === fs;});
}

function s2_klayOptionsFor(typeKey){
  // Filter Klay catalog to entries of the same type that are MVP-available.
  return S2_KLAY.filter(function(k){
    if (k.type !== typeKey) return false;
    if (k.mvp === 'SCHEMA') return false; // hide deferred from dropdowns
    return true;
  });
}

/* Render a Klay-account <select> grouped by sub-section.
   Used by the workspace tables in both ALL view and monthly view.
   - Disabled when status === 'confirmed' (Mapped). To re-pick, controller uses
     "Change to Unmapped" in the kebab and starts over.
   - When newCode is null (no AI suggestion or after Change-to-Unmapped), shows
     a placeholder option until the controller picks one. */
function s2_renderKlayDropdown(account, origIdx){
  var typeKey = s2_typeOf(account);
  var options = s2_klayOptionsFor(typeKey);
  var hasMapping = !!account.newCode;
  // If there's a current mapping not in the type-filtered list, prepend it so
  // the dropdown can display it. Skip when newCode is null.
  if (hasMapping) {
    var currentInOptions = options.some(function(o){return o.code === account.newCode;});
    if (!currentInOptions) {
      options = [{code:account.newCode, name:account.newName, subSection:'(currently mapped)'}].concat(options);
    }
  }
  // Group by subSection
  var groups = {};
  var groupOrder = [];
  options.forEach(function(opt){
    var key = opt.subSection || 'Other';
    if (!groups[key]) { groups[key] = []; groupOrder.push(key); }
    groups[key].push(opt);
  });

  var html = '<select class="s2-klay-sel" onchange="s2_changeKlay(' + origIdx + ', this.value)"' + (account.status === 'confirmed' ? ' disabled' : '') + '>';
  // Placeholder option when there's no current mapping
  if (!hasMapping) {
    html += '<option value="" selected disabled>Pick a Klay account…</option>';
  }
  groupOrder.forEach(function(grp){
    html += '<optgroup label="' + grp + '">';
    groups[grp].forEach(function(opt){
      var sel = (opt.code === account.newCode) ? ' selected' : '';
      html += '<option value="' + opt.code + '"' + sel + '>' + opt.code + ' · ' + s2_klayDisplayName(opt.code, opt.name) + '</option>';
    });
    html += '</optgroup>';
  });
  html += '</select>';
  return html;
}

/* ── LEGACY CoA TREE (2-3 layers) ──
   Build a hierarchical tree from flat S2_ACCOUNTS by grouping on code prefix.
   Indonesian convention: 4-digit codes; we group by first digit (top), first 2 digits (mid), leaf.
   E.g., 1001 Kas Besar → Asset (1xxx) → Cash & Bank (10xx) → 1001 Kas Besar (leaf)
*/
var LEGACY_TOP_NAMES = {
  '1':{code:'1000', name:'ASET (Assets)'},
  '2':{code:'2000', name:'KEWAJIBAN (Liabilities)'},
  '3':{code:'3000', name:'EKUITAS (Equity)'},
  '4':{code:'4000', name:'PENDAPATAN (Revenue)'},
  '5':{code:'5000', name:'HARGA POKOK (Cost of Sales)'},
  '6':{code:'6000', name:'BEBAN OPERASIONAL (Operating Expenses)'},
  '7':{code:'7000', name:'BEBAN LAIN-LAIN (Other Expenses)'},
};
var LEGACY_MID_NAMES = {
  '10':'Kas dan Bank',     '11':'Piutang & Uang Muka', '12':'Persediaan',     '13':'Biaya Dibayar Dimuka',
  '14':'Pajak Dibayar Dimuka', '15':'Aset Tetap',     '16':'Aset Tidak Berwujud', '17':'Akumulasi Penyusutan',
  '18':'Aset Lain-Lain',   '19':'Investasi',
  '20':'Hutang Jangka Pendek', '21':'Hutang Pajak',   '22':'Hutang Gaji',     '23':'Hutang Lain-Lain',
  '24':'Pendapatan Diterima Dimuka', '25':'Hutang Bank Jangka Pendek',
  '30':'Modal Disetor',    '31':'Laba Ditahan',
  '40':'Penjualan',        '41':'Pendapatan Lain',    '42':'Diskon & Retur',
  '50':'HPP Bahan',        '51':'HPP Tenaga Kerja',   '52':'HPP Overhead',
  '60':'Beban Gaji & Tunjangan', '61':'Beban Sewa & Utilitas', '62':'Beban Operasional Kendaraan',
  '63':'Beban Pemeliharaan', '64':'Beban Pemasaran',  '65':'Beban Perjalanan & Training',
  '66':'Beban Profesional', '67':'Beban Administrasi & Pajak', '68':'Beban Asuransi',
  '70':'Beban Bunga',      '71':'Beban Lain-Lain',
};
function s2_buildLegacyTree(){
  // Returns: typeKey → [ {code, name, kind:'top', children:[ {code, name, kind:'mid', children:[ <leaves> ] } ]} ]
  var byType = {};
  S2_TYPES.forEach(function(t){ byType[t.key] = []; });

  S2_ACCOUNTS.forEach(function(a){
    var typeKey = s2_typeOf(a);
    if (!typeKey) return;
    var topDigit = a.old.charAt(0);
    var midPrefix = a.old.substring(0, 2);

    if (!byType[typeKey]) byType[typeKey] = [];
    var typeArr = byType[typeKey];

    // Find or create top
    var topName = LEGACY_TOP_NAMES[topDigit] || {code:topDigit + '000', name:'Group ' + topDigit};
    var top = typeArr.find(function(n){return n.code === topName.code;});
    if (!top) {
      top = {code:topName.code, name:topName.name, kind:'top', children:[]};
      typeArr.push(top);
    }
    // Find or create mid
    var midName = LEGACY_MID_NAMES[midPrefix] || ('Group ' + midPrefix);
    var midCode = midPrefix + '00';
    var mid = top.children.find(function(n){return n.code === midCode;});
    if (!mid) {
      mid = {code:midCode, name:midName, kind:'mid', children:[]};
      top.children.push(mid);
    }
    // Leaf
    mid.children.push({code:a.old, name:a.oldName, kind:'leaf', _ref:a});
  });

  // Sort children at each level
  Object.keys(byType).forEach(function(t){
    byType[t].sort(function(a,b){return a.code < b.code ? -1 : 1;});
    byType[t].forEach(function(top){
      top.children.sort(function(a,b){return a.code < b.code ? -1 : 1;});
      top.children.forEach(function(mid){
        mid.children.sort(function(a,b){return a.code < b.code ? -1 : 1;});
      });
    });
  });
  return byType;
}

/* ── KLAY CoA TREE (2-layer: Type → Sub-section → Leaf) ──
   Klay catalog grouped by Type, then by Sub-section. Reflects the real Klay structure
   from the Account Type Taxonomy doc (e.g. Current Assets → Cash & Cash Equivalents → Kas).
*/
function s2_buildKlayTree(){
  var byType = {};
  S2_TYPES.forEach(function(t){
    byType[t.key] = {code:t.key.toUpperCase(), name:t.name, children:[]};
  });
  // Group catalog entries by type → sub-section
  var subSectionsByType = {}; // type → {subSection: [{leaf}]}
  S2_KLAY.forEach(function(k){
    if (k.mvp === 'SCHEMA') return; // hide deferred from preview
    if (!byType[k.type]) return; // type not modeled in S2_TYPES (e.g. nonop, tax aren't BS-relevant)
    if (!subSectionsByType[k.type]) subSectionsByType[k.type] = {};
    var sub = subSectionsByType[k.type];
    if (!sub[k.subSection]) sub[k.subSection] = [];
    sub[k.subSection].push({code:k.code, name:k.name, kind:'leaf', _klay:k});
  });
  // Materialize: each Type gets sub-section nodes (kind:'mid'), each containing leaves
  Object.keys(subSectionsByType).forEach(function(t){
    var subs = subSectionsByType[t];
    Object.keys(subs).forEach(function(subName){
      var leaves = subs[subName].slice().sort(function(a,b){return a.code < b.code ? -1 : 1;});
      // Sub-section node code = first part of leaf codes (e.g., '1-11' for Cash & Cash Equivalents)
      var subCode = leaves[0] ? leaves[0].code.substring(0, leaves[0].code.indexOf('-') + 3) : '';
      byType[t].children.push({code:subCode, name:subName, kind:'mid', children:leaves});
    });
    byType[t].children.sort(function(a,b){return a.code < b.code ? -1 : 1;});
  });
  return byType;
}

var LEGACY_TREE = s2_buildLegacyTree();
var KLAY_TREE   = s2_buildKlayTree();

/* ── ACCOUNT ACTIVITY PER MONTH ──
   For each account that had activity in a month, record txn count + total volume in IDR.
   Synthesized so the monthly view feels real. Deterministic per (month, account).
*/
function s2_fmtRupiah(v){
  if (v >= 1_000_000_000) return 'Rp ' + (v / 1_000_000_000).toFixed(1) + 'B';
  if (v >= 1_000_000) return 'Rp ' + (v / 1_000_000).toFixed(0) + 'M';
  if (v >= 1_000) return 'Rp ' + (v / 1_000).toFixed(0) + 'K';
  return 'Rp ' + v.toLocaleString();
}

/* ═══════════════════════════════════════
   MAIN ENTRY — renders the unified 2-col layout (CoA browser + workspace)
═══════════════════════════════════════ */
function renderS2(){
  // Substep bar is always visible across all substeps.
  var ssb = document.getElementById('substepbar');
  ssb.style.display = '';
  var substep = APP.s2.substep || 1;

  // Compute progress for the workspace substep nav indicator.
  // An account is "handled" if it's Mapped (confirmed) OR explicitly Marked for Later —
  // either way the Controller has acknowledged it, so sign-off is unblocked.
  var wsTotal = S2_ACCOUNTS.filter(function(a){return !a.isHeader;}).length;
  var wsDone = S2_ACCOUNTS.filter(function(a){return !a.isHeader && a.status === 'confirmed';}).length;
  var wsHandled = S2_ACCOUNTS.filter(function(a){return !a.isHeader && (a.status === 'confirmed' || a.status === 'later');}).length;
  var wsComplete = (wsHandled === wsTotal && wsTotal > 0);

  function ssitem(n, label, count){
    var on = (substep === n) && !APP.s2.klayCoaView;
    var done = (n === 1 && substep > 1)
            || (n === 2 && wsComplete && substep !== 2)
            || (n === 3 && APP.s2.signedOff);
    var locked = (n === 3 && !wsComplete);
    var cls = ['ssi'];
    if (on) cls.push('on');
    if (done) cls.push('done');
    if (locked) cls.push('locked');
    var icon = done ? '&#10003;' : n;
    var iconCls = on ? 'on' : (done ? 'done' : (locked ? 'locked' : 'available'));
    var clickHandler = locked ? '' : ' onclick="s2_setSubstep(' + n + ')"';
    var html = '<div class="' + cls.join(' ') + '"' + clickHandler + '>';
    html += '<span class="ssc ' + iconCls + '">' + icon + '</span>';
    html += '<span class="ssl ' + iconCls + '">' + label + '</span>';
    if (count) html += '<span class="ssn">' + count + '</span>';
    html += '</div>';
    return html;
  }

  var ssbHtml = '';
  ssbHtml += ssitem(1, 'Structure Overview', '');
  ssbHtml += '<span class="ss-divider">·</span>';
  ssbHtml += ssitem(2, 'Workspace', wsDone + '/' + wsTotal);
  ssbHtml += '<span class="ss-divider">·</span>';
  ssbHtml += ssitem(3, 'Sign off', '');
  ssb.innerHTML = ssbHtml;

  // "Review Klay CoA" overlay — invoked from the Workspace header, returns to substep 2.
  if (APP.s2.klayCoaView) {
    s2_renderKlayCoa();
    return;
  }

  // Workspace mode — dispatch to the appropriate substep renderer
  if (substep === 1) {
    s2_renderSubstep1();
  } else if (substep === 3) {
    s2_renderSignoff();
  } else {
    s2_renderSubstep3();
  }
}

function s2_openKlayCoa(){ APP.s2.klayCoaView = true; renderS2(); window.scrollTo(0, 0); }
function s2_closeKlayCoa(){ APP.s2.klayCoaView = false; renderS2(); window.scrollTo(0, 0); }
function s2_setSubstep(n){
  APP.s2.substep = n;
  APP.s2.klayCoaView = false;
  renderS2();
  window.scrollTo(0, 0);
}

/* ── SUBSTEP 1: Klay structure orientation (read-only) ──
   Side-by-side: full legacy CoA on the left, Klay's CoA template on the right.
   No mappings drawn, no AI suggestions visible. The user's job is to read
   Klay's structure before mapping anything. */
function s2_renderSubstep1(){
  var html = '<h1 class="stage-title">Structure Overview</h1>';
  html += '<p class="stage-sub">First, get familiar with Klay\'s structure. The right pane shows every account Klay provides — read it, recognize what\'s familiar, notice what\'s new. Mapping happens in the next step.</p>';

  // Top continue button (page can be long — let user advance from anywhere)
  html += '<div class="s2-top-cta">';
  html += '<button class="btn-cont" onclick="s2_setSubstep(2)">Continue to Workspace &rsaquo;</button>';
  html += '</div>';

  // Legend
  html += '<div class="s2-legend">';
  html += '<span class="s2-legend-item"><span class="s2-flag-mini sys">SYS</span> System-reserved (auto-created, immutable)</span>';
  html += '<span class="s2-legend-item"><span class="s2-flag-mini ctrl">CTRL</span> Control account (no manual JE)</span>';
  html += '</div>';

  html += '<div class="s2-orient-shell">';

  // LEFT: full legacy CoA tree
  html += '<div class="s2-orient-side">';
  html += '<div class="s2-orient-hdr">';
  html += '<div class="s2-orient-title">Your legacy CoA</div>';
  var leafTotal = S2_ACCOUNTS.filter(function(a){return !a.isHeader;}).length;
  html += '<div class="s2-orient-meta">' + leafTotal + ' postable accounts &middot; PT. ABC Indonesia source</div>';
  html += '</div>';
  html += '<div class="s2-orient-body">';

  // Build a hierarchical tree view of the legacy accounts (PT. ABC structured CA + sectioned non-CA)
  // Group by FS section first
  var fsLabels = {'bs-ca':'Current Assets', 'bs-fa':'Fixed Assets', 'bs-cl':'Current Liabilities', 'pl-rev':'Revenue', 'pl-cogs':'Cost of Sales', 'pl-opex':'Operating Expenses'};
  var fsOrder = ['bs-ca','bs-fa','bs-cl','pl-rev','pl-cogs','pl-opex'];
  fsOrder.forEach(function(fs){
    var accountsInFs = S2_ACCOUNTS.filter(function(a){return a.fs === fs;});
    if (accountsInFs.length === 0) return;
    var leafCount = accountsInFs.filter(function(a){return !a.isHeader;}).length;
    html += '<div class="s2-orient-fs-hdr">' + fsLabels[fs] + ' <span class="s2-orient-fs-cnt">' + leafCount + '</span></div>';

    // Render PT. ABC tree structure for bs-ca, flat list for others
    if (fs === 'bs-ca') {
      // Tree-style render — top-level rows first, then descend
      var topLevel = accountsInFs.filter(function(a){return !a.parent;});
      topLevel.forEach(function(a){
        html += s2_renderOrientLegacyNode(a, accountsInFs, 0);
      });
    } else {
      // Synthesized sections: group leaves by their AI-suggested Klay sub-section
      // so the user sees implicit structure (these become the "groups" in Substep 2)
      var leavesInFs = accountsInFs.filter(function(a){return !a.isHeader;});
      var bySubSec = {};
      leavesInFs.forEach(function(a){
        var k = S2_KLAY_BY_CODE[a.newCode];
        var subSec = k ? k.subSection : 'Unmapped';
        if (!bySubSec[subSec]) bySubSec[subSec] = [];
        bySubSec[subSec].push(a);
      });
      Object.keys(bySubSec).forEach(function(subSec){
        var grp = bySubSec[subSec];
        // Group header
        html += '<div class="s2-orient-mid s2-orient-mid-d0">';
        html += '<span class="s2-orient-mid-name">' + subSec + '</span>';
        html += '<span class="s2-orient-mid-cnt">' + grp.length + '</span>';
        html += '</div>';
        grp.forEach(function(a){
          html += '<div class="s2-orient-leaf s2-orient-leaf-d1">';
          html += '<span class="s2-orient-leaf-code">' + a.old + '</span>';
          html += '<span class="s2-orient-leaf-name">' + a.oldName + '</span>';
          html += '</div>';
        });
      });
    }
  });
  html += '</div></div>';

  // RIGHT: Klay structure template (no mappings)
  html += '<div class="s2-orient-side">';
  html += '<div class="s2-orient-hdr">';
  html += '<div class="s2-orient-title">Klay CoA <span class="s2-orient-tag">template</span></div>';
  var klayMvp = S2_KLAY.filter(function(k){return k.mvp === 'IN';}).length;
  html += '<div class="s2-orient-meta">' + klayMvp + ' standardized accounts &middot; 2-layer structure</div>';
  html += '</div>';
  // Discoverability note — rename happens later, in Review Klay CoA. Surfacing
  // the capability here so controllers don't think the names are immutable.
  html += '<div class="s2-orient-rename-hint"><span class="s2-orient-rename-hint-icon">&#9998;</span>Account names can be renamed from <strong>Review Klay accounts</strong> in the Workspace. Codes stay fixed.</div>';
  html += '<div class="s2-orient-body">';

  // Group Klay catalog by Type
  var klayByType = {};
  S2_KLAY.forEach(function(k){
    if (k.mvp === 'SCHEMA') return;
    if (!klayByType[k.type]) klayByType[k.type] = {};
    if (!klayByType[k.type][k.subSection]) klayByType[k.type][k.subSection] = [];
    klayByType[k.type][k.subSection].push(k);
  });

  // Render Type → Sub-section → Leaf
  S2_TYPES.forEach(function(t){
    var subs = klayByType[t.key];
    if (!subs) return;
    var totalInType = 0;
    Object.keys(subs).forEach(function(s){totalInType += subs[s].length;});
    html += '<div class="s2-orient-fs-hdr">' + t.name + ' <span class="s2-orient-fs-cnt">' + totalInType + '</span></div>';
    Object.keys(subs).forEach(function(subSec){
      // Sub-section node
      var leaves = subs[subSec];
      var subCode = leaves[0] ? leaves[0].code.substring(0, leaves[0].code.indexOf('-') + 3) : '';
      html += '<div class="s2-orient-mid">';
      html += '<span class="s2-orient-mid-code">' + subCode + '</span>';
      html += '<span class="s2-orient-mid-name">' + subSec + '</span>';
      html += '<span class="s2-orient-mid-cnt">' + leaves.length + '</span>';
      html += '</div>';
      leaves.forEach(function(k){
        var flags = '';
        if (k.sysReserved) flags += ' <span class="s2-flag-mini sys">SYS</span>';
        if (k.controlAcct) flags += ' <span class="s2-flag-mini ctrl">CTRL</span>';
        html += '<div class="s2-orient-leaf klay">';
        html += '<span class="s2-orient-leaf-code">' + k.code + '</span>';
        html += '<span class="s2-orient-leaf-name">' + s2_klayDisplayName(k.code, k.name) + flags + '</span>';
        html += '</div>';
      });
    });
  });
  html += '</div></div>';

  html += '</div>'; // /s2-orient-shell

  // Dimensions strip — surfaces what's configured, click-through to Settings drawer
  html += '<div class="s2-orient-dim-strip">';
  html += '<div class="s2-orient-dim-strip-hdr">';
  html += '<span class="s2-orient-dim-strip-lbl">Dimensions configured &middot; ' + S2_DIMENSIONS.length + '</span>';
  html += '<button class="s2-dim-cfg-btn" onclick="openSettings()"><span class="s2-dim-cfg-icon">&#9881;</span>Configure</button>';
  html += '</div>';
  html += '<div class="s2-orient-dim-cards">';
  S2_DIMENSIONS.forEach(function(dim){
    html += '<div class="s2-orient-dim-card">';
    html += '<div class="s2-orient-dim-card-name"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + dim.color + '"></span>' + dim.name + '</div>';
    html += '<div class="s2-orient-dim-card-meta">' + dim.values.length + ' value' + (dim.values.length === 1 ? '' : 's') + ' &middot; optional</div>';
    html += '</div>';
  });
  html += '<div class="s2-orient-dim-card s2-orient-dim-card-add" onclick="openSettings()">+ Add dimension</div>';
  html += '</div>';
  html += '</div>';

  // Continue button
  html += '<div class="signoff-row">';
  html += '<span class="btn-signoff-help">Take a moment to scan Klay\'s structure. When ready, continue to the mapping Workspace.</span>';
  html += '<button class="btn-cont" onclick="s2_setSubstep(2)">Continue to Workspace &rsaquo;</button>';
  html += '</div>';

  document.getElementById('main').innerHTML = html;
}

/* Recursive render of a legacy CoA node (header or leaf) for orientation */
function s2_renderOrientLegacyNode(node, allInFs, depth){
  var html = '';
  if (node.isHeader) {
    html += '<div class="s2-orient-mid s2-orient-mid-d' + Math.min(depth, 2) + '">';
    html += '<span class="s2-orient-mid-code">' + node.old + '</span>';
    html += '<span class="s2-orient-mid-name">' + node.oldName + '</span>';
    html += '</div>';
    var children = allInFs.filter(function(a){return a.parent === node.old;});
    children.forEach(function(c){
      html += s2_renderOrientLegacyNode(c, allInFs, depth + 1);
    });
  } else {
    html += '<div class="s2-orient-leaf s2-orient-leaf-d' + Math.min(depth, 3) + '">';
    html += '<span class="s2-orient-leaf-code">' + node.old + '</span>';
    html += '<span class="s2-orient-leaf-name">' + node.oldName + '</span>';
    html += '</div>';
  }
  return html;
}

/* ── SUBSTEP 2: Workspace (account mapping with bulk-confirm group headers) ──
   The cluster column on the left is the navigator. The workspace shows leaves
   grouped by run; each group has a bulk-Confirm header for one-click cascade.
   Low/med-confidence leaves still need individual review. */
function s2_renderSubstep3(){
  var leaves = S2_ACCOUNTS.filter(function(a){return !a.isHeader;});
  var total = leaves.length;
  var mappedN   = leaves.filter(function(a){return a.status === 'confirmed';}).length;
  var proposedN = leaves.filter(function(a){return a.status === 'proposed';}).length;
  var unmappedN = leaves.filter(function(a){return a.status === 'unconfirmed';}).length;
  var laterN    = leaves.filter(function(a){return a.status === 'later';}).length;
  var deactN    = leaves.filter(function(a){return a.status === 'deactivated';}).length;
  // Mapped pct counts only confirmed (not proposed) — proposed is acknowledged but not signed off
  var pct = total > 0 ? Math.round(mappedN / total * 100) : 0;

  var html = '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px">';
  html += '<div style="flex:1"><h1 class="stage-title">Workspace</h1>';
  html += '<p class="stage-sub">Map your legacy accounts to Klay. Pick a Klay account from the dropdown to map, tag with dimensions, mark to revisit later, or deactivate. Bulk-map runs of similar accounts using the group headers.</p></div>';
  html += '<div style="display:flex;gap:8px;flex-shrink:0;margin-top:6px;">';
  html += '<button class="s2-dim-cfg-btn" onclick="s2_openKlayCoa()" title="See your post-migration Klay accounts side-by-side with the legacy CoA, and rename Klay account labels"><span class="s2-dim-cfg-icon">&#128203;</span>Review Klay accounts</button>';
  html += '<button class="s2-dim-cfg-btn" onclick="openSettings()"><span class="s2-dim-cfg-icon">&#9881;</span>Configure dimensions</button>';
  html += '</div>';
  html += '</div>';

  // Multi-color stacked progress bar
  html += '<div class="s2-prog2">';
  html += '<div class="s2-prog2-row">';
  html += '<span class="s2-prog2-num">' + mappedN + '</span>';
  html += '<span class="s2-prog2-tot">/ ' + total + ' accounts mapped</span>';
  html += '<span class="s2-prog2-pct">' + pct + '%</span>';
  html += '</div>';
  // Stacked bar — order: Mapped → Proposed → Unmapped → Later → Deactivated
  function pctOf(n){ return total > 0 ? (n / total * 100) : 0; }
  html += '<div class="s2-prog2-bar">';
  html += '<div class="s2-prog2-seg s2-prog2-seg-mapped" style="width:' + pctOf(mappedN) + '%"></div>';
  html += '<div class="s2-prog2-seg s2-prog2-seg-proposed" style="width:' + pctOf(proposedN) + '%"></div>';
  html += '<div class="s2-prog2-seg s2-prog2-seg-unmapped" style="width:' + pctOf(unmappedN) + '%"></div>';
  html += '<div class="s2-prog2-seg s2-prog2-seg-later" style="width:' + pctOf(laterN) + '%"></div>';
  html += '<div class="s2-prog2-seg s2-prog2-seg-deact" style="width:' + pctOf(deactN) + '%"></div>';
  html += '</div>';
  // Legend
  html += '<div class="s2-prog2-legend">';
  html += '<span class="s2-prog2-legend-item"><span class="s2-prog2-legend-dot" style="background:#1D9E75"></span>Mapped <span class="s2-prog2-legend-cnt">' + mappedN + '</span></span>';
  html += '<span class="s2-prog2-legend-item"><span class="s2-prog2-legend-dot" style="background:#7F77DD"></span>Proposed <span class="s2-prog2-legend-cnt">' + proposedN + '</span></span>';
  html += '<span class="s2-prog2-legend-item"><span class="s2-prog2-legend-dot" style="background:#D3D1C7"></span>Unmapped <span class="s2-prog2-legend-cnt">' + unmappedN + '</span></span>';
  html += '<span class="s2-prog2-legend-item"><span class="s2-prog2-legend-dot" style="background:#BA7517"></span>Marked for Later <span class="s2-prog2-legend-cnt">' + laterN + '</span></span>';
  html += '<span class="s2-prog2-legend-item"><span class="s2-prog2-legend-dot" style="background:#378ADD"></span>Deactivated <span class="s2-prog2-legend-cnt">' + deactN + '</span></span>';
  html += '</div>';
  html += '</div>';

  // Issues banner — surface CoA issue clusters at the top of the workspace
  html += s2_renderIssueBoxes();

  // Workspace (full-width)
  // Note: account-type cluster filtering is no longer driven by tabs; the user filters
  // via the Filter button (multi-select tree). activeCluster is now used only by s3_investigate
  // to pre-filter the workspace to a specific issue type.
  html += '<div class="s2-ws s2-ws-full">';
  html += s2_renderAccountWorkspace(APP.s2.activeCluster || 'all-accounts', APP.s2.wsFilter || 'all');
  html += '</div>';

  // Continue — blocks if anything is Unmapped or Proposed (strict sign-off rule).
  // Marked-for-Later and Deactivated are explicit acknowledgments and don't block.
  var canContinue = (unmappedN === 0 && proposedN === 0);
  html += '<div class="signoff-row">';
  if (!canContinue) {
    var bits = [];
    if (unmappedN > 0) bits.push(unmappedN + ' unmapped');
    if (proposedN > 0) bits.push(proposedN + ' proposed');
    html += '<span class="btn-signoff-help">' + bits.join(', ') + ' &mdash; resolve before sign-off (Confirm, Mark for Later, or Deactivate)</span>';
  }
  html += '<button class="btn-cont" ' + (canContinue ? '' : 'disabled') + ' onclick="s2_setSubstep(3)">Continue to Sign off &rsaquo;</button>';
  html += '</div>';

  document.getElementById('main').innerHTML = html;
}

/* ── SUBSTEP 3: Sign off ──
   Stage 2 mapping sign-off. The Controller certifies that every legacy account
   has been mapped, low/medium-confidence mappings were reviewed, and the
   resulting Klay structure is what they intend. Once signed off, advance to
   Stage 3 — Review for the numbers reconciliation. */
function s2_renderSignoff(){
  var leaves    = S2_ACCOUNTS.filter(function(a){return !a.isHeader;});
  var total     = leaves.length;
  var confirmed = leaves.filter(function(a){return a.status === 'confirmed';}).length;
  var proposed  = leaves.filter(function(a){return a.status === 'proposed';}).length;
  var laterCount= leaves.filter(function(a){return a.status === 'later';}).length;
  var deactCount= leaves.filter(function(a){return a.status === 'deactivated';}).length;
  // Anything not in one of the four "handled" states is Unmapped.
  var unmapped  = total - confirmed - proposed - laterCount - deactCount;
  var taggedCount = leaves.filter(function(a){
    return a.dimensions && a.dimensions.length > 0;
  }).length;

  // Strict sign-off (per spec): every account must be Mapped, Marked for Later, or
  // Deactivated. Proposed mappings count as "AI-suggested but not signed off by the
  // controller" and block sign-off until they're confirmed (per-row, bulk, or by
  // editing the Klay target).
  var canSignoff = (unmapped === 0 && proposed === 0);
  var signedOff = !!APP.s2.signedOff;

  var html = '<h1 class="stage-title">Sign off</h1>'
    + '<p class="stage-sub">Confirm that the account mapping is complete and accurate. After sign-off, you\'ll move to Stage 3 — Review to reconcile the numbers. You can come back to revise the mapping if needed.</p>';

  // Summary cards
  html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:20px;">';
  html += '<div style="border:1px solid var(--color-border-default);border-radius:var(--radius-md);padding:14px 16px;background:var(--color-surface-raised);">';
  html += '<div style="font-size:11px;color:var(--color-text-tertiary);font-weight:500;text-transform:uppercase;letter-spacing:0.04em;">Mapped</div>';
  html += '<div style="font-size:22px;font-weight:700;color:var(--color-text-primary);margin-top:4px;">' + confirmed + ' <span style="font-size:14px;color:var(--color-text-tertiary);font-weight:500;">/ ' + total + '</span></div>';
  // Sub-lines: proposed (purple) and later (amber)
  if (proposed > 0) {
    html += '<div style="font-size:11px;color:#534AB7;margin-top:3px;">' + proposed + ' proposed &middot; awaiting your confirmation</div>';
  }
  if (laterCount > 0) {
    html += '<div style="font-size:11px;color:var(--color-warning-text);margin-top:3px;">' + laterCount + ' marked for later</div>';
  }
  html += '</div>';
  html += '<div style="border:1px solid var(--color-border-default);border-radius:var(--radius-md);padding:14px 16px;background:var(--color-surface-raised);">';
  html += '<div style="font-size:11px;color:var(--color-text-tertiary);font-weight:500;text-transform:uppercase;letter-spacing:0.04em;">Tagged with dimensions</div>';
  html += '<div style="font-size:22px;font-weight:700;color:var(--color-text-primary);margin-top:4px;">' + taggedCount + ' <span style="font-size:14px;color:var(--color-text-tertiary);font-weight:500;">/ ' + total + '</span></div>';
  html += '<div style="font-size:11px;color:var(--color-text-tertiary);margin-top:3px;">' + S2_DIMENSIONS.length + ' dimension' + (S2_DIMENSIONS.length === 1 ? '' : 's') + ' configured &middot; optional</div>';
  html += '</div>';
  html += '<div style="border:1px solid var(--color-border-default);border-radius:var(--radius-md);padding:14px 16px;background:var(--color-surface-raised);">';
  html += '<div style="font-size:11px;color:var(--color-text-tertiary);font-weight:500;text-transform:uppercase;letter-spacing:0.04em;">Status</div>';
  if (signedOff) {
    html += '<div style="font-size:14px;font-weight:600;color:var(--color-success-text);margin-top:8px;">&#10003; Signed off</div>';
  } else if (canSignoff) {
    html += '<div style="font-size:14px;font-weight:600;color:var(--color-warning-text);margin-top:8px;">Ready to sign off</div>';
  } else {
    var blockerLines = [];
    if (unmapped > 0) blockerLines.push(unmapped + ' unmapped');
    if (proposed > 0) blockerLines.push(proposed + ' proposed');
    html += '<div style="font-size:14px;font-weight:600;color:var(--color-danger-text);margin-top:8px;">' + blockerLines.join(', ') + '</div>';
  }
  html += '</div>';
  html += '</div>';

  // Block alert if not all accounts handled
  if (!canSignoff) {
    var blockers = [];
    if (unmapped > 0) blockers.push('<strong>' + unmapped + '</strong> still unmapped');
    if (proposed > 0) blockers.push('<strong>' + proposed + '</strong> proposed by AI but not yet confirmed');
    var blockerText = blockers.join(' &middot; ');
    html += '<div class="alert" style="margin-top:18px;background:var(--color-danger-surface);border:1px solid var(--color-danger-border);color:var(--color-danger-text);border-radius:var(--radius-md);padding:14px 16px;display:flex;gap:12px;align-items:flex-start;">';
    html += '<div class="alert-icon" style="flex-shrink:0;width:18px;height:18px;border-radius:50%;background:var(--color-danger-text);color:var(--color-text-inverse);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;">!</div>';
    html += '<div class="alert-body" style="font-size:12px;line-height:1.5;">' + blockerText + '. Go back to the Workspace to resolve them — Confirm individual rows, use the bulk actions, or Mark for Later.</div>';
    html += '</div>';
  } else {
    html += '<div class="alert blue" style="margin-top:18px"><div class="alert-icon">i</div>'
      + '<div class="alert-body"><strong>Sign-off is reversible.</strong> If you spot an issue in Stage 3 — Review, you can come back here, undo, and edit the mapping.</div></div>';
  }

  // Certification statements
  var certs = [
    {t:'Every legacy account is handled', d:'All ' + total + ' legacy GL accounts have either been mapped to a Klay account, or explicitly marked for later.'},
    {t:'Mappings reflect intent', d:'Splits, merges, and renames produce the structure I want in Klay. Group-level mappings were reviewed before bulk-confirming.'},
    {t:'Dimension tags are accurate', d:'Where dimensions were applied, the values are correct. Untagged accounts will land without analytical tags — fine if not needed.'},
  ];

  html += '<div style="margin-top:20px">';
  certs.forEach(function(c, i){
    var checked = signedOff ? ' checked' : '';
    var disabled = (!canSignoff || signedOff) ? ' disabled' : '';
    html += '<div style="border:1px solid var(--color-border-default);border-radius:var(--radius-md);padding:14px 16px;margin-bottom:8px;background:var(--color-surface-raised);' + (signedOff ? 'opacity:0.7;' : '') + '">';
    html += '<label style="display:flex;align-items:flex-start;gap:12px;cursor:' + ((!canSignoff || signedOff) ? 'not-allowed' : 'pointer') + ';">';
    html += '<input type="checkbox" id="s2-cert-' + i + '"' + checked + disabled + ' onchange="s2_updateSignoffBtn()" style="margin-top:2px;cursor:inherit;" />';
    html += '<div><div style="font-size:13px;font-weight:600;color:var(--color-text-primary);">' + c.t + '</div><div style="font-size:11px;color:var(--color-text-secondary);font-weight:300;margin-top:3px;line-height:1.5;">' + c.d + '</div></div>';
    html += '</label></div>';
  });
  html += '</div>';

  // Action row
  html += '<div class="signoff-row">';
  html += '<button class="btn-ghost" onclick="s2_setSubstep(2)">&larr; Back to Workspace</button>';
  if (signedOff) {
    html += '<button class="btn-conf-secondary" onclick="s2_undoSignoff()" style="margin-left:auto;margin-right:8px;">Undo sign-off</button>';
    html += '<button class="btn-cont" onclick="jumpToStage(3)">Continue to Stage 3 — Review &rsaquo;</button>';
  } else {
    html += '<button id="s2-signoff-btn" class="btn-cont" disabled onclick="s2_doSignoff()" style="margin-left:auto;">Sign off mapping &rsaquo;</button>';
  }
  html += '</div>';

  document.getElementById('main').innerHTML = html;
}

function s2_updateSignoffBtn(){
  var btn = document.getElementById('s2-signoff-btn');
  if (!btn) return;
  var allChecked = true;
  for (var i = 0; i < 3; i++) {
    var cb = document.getElementById('s2-cert-' + i);
    if (!cb || !cb.checked) { allChecked = false; break; }
  }
  btn.disabled = !allChecked;
}

function s2_doSignoff(){
  APP.s2.signedOff = true;
  renderS2();
  window.scrollTo(0, 0);
}

function s2_undoSignoff(){
  APP.s2.signedOff = false;
  renderS2();
  window.scrollTo(0, 0);
}

/* ── PREVIEW: Old vs New CoA structure side-by-side ── */
function s2_renderKlayCoa(){
  var total = S2_ACCOUNTS.filter(function(a){return !a.isHeader;}).length;
  var reviewed = S2_ACCOUNTS.filter(function(a){return !a.isHeader && a.status === 'confirmed';}).length;

  // Top bar: back to workspace
  var html = '<div class="s2-klaycoa-topbar">';
  html += '<button class="s2-klaycoa-back" onclick="s2_closeKlayCoa()"><span class="s2-klaycoa-back-arrow">&larr;</span> Back to Workspace</button>';
  html += '</div>';

  html += '<h1 class="stage-title">Klay Chart of Accounts</h1>';
  html += '<p class="stage-sub">Your post-migration Chart of Accounts, populated by your mapping decisions, shown side-by-side with the legacy CoA for reference. Account names are editable — click the pencil next to any Klay account to rename it. Codes stay fixed.</p>';

  // Legend — only Mapped / Unmapped
  html += '<div style="display:flex;gap:18px;margin:14px 0 12px;font-size:11px;color:var(--color-text-secondary)">';
  html += '<span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--color-success-surface);border:1px solid var(--color-success-border);margin-right:5px;vertical-align:middle"></span>Mapped (confirmed)</span>';
  html += '<span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--color-surface-raised);border:1px solid var(--color-border-default);margin-right:5px;vertical-align:middle"></span>Unmapped</span>';
  html += '</div>';

  html += '<div class="s2-prev-shell">';

  // ── LEFT: Legacy CoA (reference) ──
  html += '<div class="s2-prev-side">';
  html += '<div class="s2-prev-side-hdr">';
  html += '<div><div class="s2-prev-side-title">Legacy CoA <span style="font-size:11px;color:var(--color-text-tertiary);font-weight:500">(source)</span></div>'
    + '<div class="s2-prev-side-sub">' + total + ' accounts &middot; ' + reviewed + ' mapped &middot; PT. ABC Indonesia</div></div>';
  html += '</div>';
  html += '<div class="s2-prev-tree">';

  S2_TYPES.forEach(function(t){
    var typeRoots = LEGACY_TREE[t.key] || [];
    if (typeRoots.length === 0) return;
    var typeAccounts = s2_accountsOfType(t.key);
    var typeMapped = typeAccounts.filter(function(a){return a.status === 'confirmed';}).length;
    html += '<div class="s2-prev-grp">';
    html += '<div class="s2-prev-grp-hdr">' + t.name + ' <span class="s2-prev-grp-cnt">' + typeMapped + '/' + typeAccounts.length + '</span></div>';

    typeRoots.forEach(function(top){
      var topMapped = s2_subtreeMappedCount(top);
      var topTotal  = s2_subtreeLeafCount(top);
      var topAllMapped = topTotal > 0 && topMapped === topTotal;
      html += '<div class="s2-prev-node node-top ' + (topAllMapped ? 'all-mapped' : '') + '">';
      html += '<span class="s2-prev-node-code">' + top.code + '</span>';
      html += '<span class="s2-prev-node-name">' + top.name + '</span>';
      html += '<span class="s2-prev-node-cnt">' + topMapped + '/' + topTotal + '</span>';
      html += '</div>';

      top.children.forEach(function(mid){
        var midMapped = s2_subtreeMappedCount(mid);
        var midTotal  = s2_subtreeLeafCount(mid);
        var midAllMapped = midTotal > 0 && midMapped === midTotal;
        html += '<div class="s2-prev-node node-mid ' + (midAllMapped ? 'all-mapped' : '') + '">';
        html += '<span class="s2-prev-node-code">' + mid.code + '</span>';
        html += '<span class="s2-prev-node-name">' + mid.name + '</span>';
        html += '<span class="s2-prev-node-cnt">' + midMapped + '/' + midTotal + '</span>';
        html += '</div>';

        mid.children.forEach(function(leaf){
          var a = leaf._ref;
          var origIdx = S2_ACCOUNTS.indexOf(a);
          var stateCls = a.status === 'confirmed' ? 'mapped' : 'unmapped';
          var hi = APP.s2.previewHighlight === origIdx ? ' highlighted' : '';
          html += '<div class="s2-prev-leaf ' + stateCls + hi + '" onclick="s2_previewSelect(' + origIdx + ')">';
          html += '<span class="s2-prev-leaf-code">' + a.old + '</span>';
          html += '<span class="s2-prev-leaf-name">' + a.oldName + '</span>';
          if (a.status === 'confirmed') {
            html += '<span class="s2-prev-leaf-arrow">&rarr; ' + a.newCode + '</span>';
          }
          html += '</div>';
        });
      });
    });
    html += '</div>';
  });

  html += '</div></div>';

  // ── RIGHT: Klay CoA (the focal pane — rename happens here) ──
  html += '<div class="s2-prev-side s2-prev-side-primary">';
  html += '<div class="s2-prev-side-hdr">';
  var mvpCount = S2_KLAY.filter(function(k){return k.mvp === 'IN';}).length;
  var renamedCount = Object.keys(S2_KLAY_NAME_OVERRIDES).length;
  html += '<div><div class="s2-prev-side-title">Klay CoA <span style="font-size:11px;color:var(--color-text-tertiary);font-weight:500">(your post-migration chart)</span></div>'
    + '<div class="s2-prev-side-sub">' + mvpCount + ' standardized accounts';
  if (renamedCount > 0) {
    html += ' &middot; <span style="color:#534AB7;font-weight:500;">' + renamedCount + ' renamed</span>';
  }
  html += '</div></div>';
  html += '</div>';
  html += '<div class="s2-prev-tree" id="s2-prev-tree-klay">';

  // Build inbound count once for efficiency
  var klayInbound = {};
  S2_ACCOUNTS.forEach(function(a){
    if (!a.newCode) return;
    if (!klayInbound[a.newCode]) klayInbound[a.newCode] = {confirmed:0, total:0};
    klayInbound[a.newCode].total++;
    if (a.status === 'confirmed') klayInbound[a.newCode].confirmed++;
  });

  S2_TYPES.forEach(function(t){
    var bucket = KLAY_TREE[t.key];
    if (!bucket || bucket.children.length === 0) return;

    var typeLeafCount = 0, typeMappedCount = 0;
    bucket.children.forEach(function(sub){
      sub.children.forEach(function(leaf){
        typeLeafCount++;
        var ib = klayInbound[leaf.code] || {confirmed:0};
        if (ib.confirmed > 0) typeMappedCount++;
      });
    });

    html += '<div class="s2-prev-grp">';
    html += '<div class="s2-prev-grp-hdr">' + t.name + ' <span class="s2-prev-grp-cnt">' + typeMappedCount + '/' + typeLeafCount + '</span></div>';

    bucket.children.forEach(function(sub){
      var subLeafCount = sub.children.length;
      var subMappedCount = 0;
      sub.children.forEach(function(leaf){
        var ib = klayInbound[leaf.code] || {confirmed:0};
        if (ib.confirmed > 0) subMappedCount++;
      });
      var subAllMapped = subLeafCount > 0 && subMappedCount === subLeafCount;

      html += '<div class="s2-prev-node node-mid ' + (subAllMapped ? 'all-mapped' : '') + '">';
      html += '<span class="s2-prev-node-code">' + (sub.code || '') + '</span>';
      html += '<span class="s2-prev-node-name">' + sub.name + '</span>';
      html += '<span class="s2-prev-node-cnt">' + subMappedCount + '/' + subLeafCount + '</span>';
      html += '</div>';

      sub.children.forEach(function(leaf){
        var ib = klayInbound[leaf.code] || {confirmed:0, total:0};
        var stateCls = ib.confirmed > 0 ? 'mapped' : 'unmapped';
        var targetCode = APP.s2.previewHighlight != null ? S2_ACCOUNTS[APP.s2.previewHighlight].newCode : null;
        var hi = targetCode === leaf.code ? ' highlighted' : '';
        var flagsHtml = '';
        if (leaf._klay && leaf._klay.sysReserved) flagsHtml += ' <span class="s2-prev-flag sys">sys</span>';
        if (leaf._klay && leaf._klay.controlAcct) flagsHtml += ' <span class="s2-prev-flag ctrl">ctrl</span>';

        var isOverridden = S2_KLAY_NAME_OVERRIDES[leaf.code] != null;
        var displayName = s2_klayDisplayName(leaf.code, leaf.name);
        var defaultName = leaf.name;
        var isEditing = APP.s2.klayRenameOpen === leaf.code;

        html += '<div class="s2-prev-leaf klay-row ' + stateCls + hi + (isOverridden ? ' renamed' : '') + '" id="s2-prev-klay-' + leaf.code + '">';
        html += '<span class="s2-prev-leaf-code">' + leaf.code + '</span>';
        if (isEditing) {
          // Count every account currently mapped to this Klay code — the rename
          // cascades to all of them regardless of confirmation status.
          var cascadeCount = (klayInbound[leaf.code] || {}).total || 0;
          html += '<input class="s2-klay-rename-input" id="s2-klay-rename-input-' + leaf.code + '" value="' + displayName.replace(/"/g, '&quot;') + '" autofocus onkeydown="s2_klayRenameKey(event, \'' + leaf.code + '\')" />';
          if (cascadeCount > 0) {
            html += '<span class="s2-klay-rename-cascade">Affects ' + cascadeCount + ' mapped ' + (cascadeCount === 1 ? 'account' : 'accounts') + '</span>';
          }
          html += '<button class="s2-klay-rename-btn" onclick="s2_klayRenameCancel()">Cancel</button>';
          html += '<button class="s2-klay-rename-btn s2-klay-rename-btn-pri" onclick="s2_klayRenameSave(\'' + leaf.code + '\')">Save</button>';
        } else {
          html += '<span class="s2-prev-leaf-name">' + displayName + flagsHtml;
          if (isOverridden) {
            html += ' <span class="s2-klay-renamed-was" title="Original: ' + defaultName.replace(/"/g, '&quot;') + '">was ' + defaultName + '</span>';
            html += ' <button class="s2-klay-reset-btn" onclick="s2_klayRenameReset(\'' + leaf.code + '\');event.stopPropagation();" title="Reset to default name">reset</button>';
          }
          html += '</span>';
          if (ib.confirmed > 0) {
            html += '<span class="s2-prev-leaf-arrow">' + ib.confirmed + ' inbound</span>';
          }
          html += '<button class="s2-klay-rename-pencil" onclick="s2_klayRenameStart(\'' + leaf.code + '\');event.stopPropagation();" title="Rename" aria-label="Rename Klay account">&#9998;</button>';
        }
        html += '</div>';
      });
    });
    html += '</div>';
  });

  html += '</div></div></div>';

  document.getElementById('main').innerHTML = html;

  if (APP.s2.previewHighlight != null) {
    var target = S2_ACCOUNTS[APP.s2.previewHighlight].newCode;
    if (target) {
      var el = document.getElementById('s2-prev-klay-' + target);
      if (el) el.scrollIntoView({block:'center', behavior:'smooth'});
    }
  }

  // Auto-focus the rename input when edit mode is open
  if (APP.s2.klayRenameOpen) {
    var inp = document.getElementById('s2-klay-rename-input-' + APP.s2.klayRenameOpen);
    if (inp) {
      inp.focus();
      inp.setSelectionRange(0, inp.value.length);
    }
  }
}

/* Rename a Klay account. Code stays immutable; only the display name changes.
   The override is applied globally — every row in the Workspace and reports
   that displays this Klay code will use the new name. */
function s2_klayRenameStart(code){
  APP.s2.klayRenameOpen = code;
  renderS2();
}
function s2_klayRenameCancel(){
  APP.s2.klayRenameOpen = null;
  renderS2();
}
function s2_klayRenameSave(code){
  var inp = document.getElementById('s2-klay-rename-input-' + code);
  if (!inp) { APP.s2.klayRenameOpen = null; renderS2(); return; }
  var newName = inp.value.trim();
  var k = S2_KLAY_BY_CODE[code];
  var defaultName = k ? k.name : '';
  if (!newName || newName === defaultName) {
    // Empty or same as default — drop any override and exit
    delete S2_KLAY_NAME_OVERRIDES[code];
  } else {
    S2_KLAY_NAME_OVERRIDES[code] = newName;
    // Cascade: update newName on every account already mapped to this code,
    // so the Workspace's Klay column reflects the rename without a full re-resolve.
    S2_ACCOUNTS.forEach(function(a){
      if (a.newCode === code) a.newName = newName;
    });
  }
  APP.s2.klayRenameOpen = null;
  renderS2();
}
function s2_klayRenameReset(code){
  delete S2_KLAY_NAME_OVERRIDES[code];
  // Restore the default name on every account mapped to this code
  var k = S2_KLAY_BY_CODE[code];
  var defaultName = k ? k.name : '';
  S2_ACCOUNTS.forEach(function(a){
    if (a.newCode === code) a.newName = defaultName;
  });
  renderS2();
}
function s2_klayRenameKey(ev, code){
  if (ev.key === 'Enter') { ev.preventDefault(); s2_klayRenameSave(code); }
  else if (ev.key === 'Escape') { ev.preventDefault(); s2_klayRenameCancel(); }
}

/* Helpers for preview tree counts */
function s2_subtreeLeafCount(node){
  if (node.kind === 'leaf') return 1;
  if (!node.children) return 0;
  return node.children.reduce(function(s, c){return s + s2_subtreeLeafCount(c);}, 0);
}
function s2_subtreeMappedCount(node){
  if (node.kind === 'leaf') return (node._ref && node._ref.status === 'confirmed') ? 1 : 0;
  if (!node.children) return 0;
  return node.children.reduce(function(s, c){return s + s2_subtreeMappedCount(c);}, 0);
}

/* ── Type-level mapping summary panel ──
   Compact lookup that shows, for the selected Account Type:
   - Legacy parents (mid-level, e.g. "Kas dan Bank", "Piutang & Uang Muka")
   - Klay parent (the Type itself, since Klay is 1-layer down)
   Each legacy parent is shown with its mapping target as a small flow.
*/
function s2_renderTypeSummary(typeKey){
  var t = S2_TYPES.find(function(x){return x.key === typeKey;});
  if (!t) return '';
  var typeRoots = LEGACY_TREE[typeKey] || [];
  // Collect mid-level parents across all top-level groups for this type
  var midParents = [];
  typeRoots.forEach(function(top){
    top.children.forEach(function(mid){
      midParents.push(mid);
    });
  });
  var klayBucket = KLAY_TREE[typeKey];
  var klayLeafCount = klayBucket ? klayBucket.children.length : 0;

  var html = '<div class="s2-typesum">';
  html += '<div class="s2-typesum-hdr">';
  html += '<span class="s2-typesum-title">Type-level structure</span>';
  html += '<span class="s2-typesum-sub">' + midParents.length + ' legacy sub-groups &rarr; ' + klayLeafCount + ' Klay accounts</span>';
  html += '</div>';
  html += '<div class="s2-typesum-body">';

  // LEFT: legacy mid-level parents
  html += '<div class="s2-typesum-side">';
  html += '<div class="s2-typesum-side-lbl">Legacy structure</div>';
  midParents.forEach(function(mid){
    var mappedN = s2_subtreeMappedCount(mid);
    var totalN = s2_subtreeLeafCount(mid);
    var done = totalN > 0 && mappedN === totalN;
    html += '<div class="s2-typesum-pill ' + (done ? 'done' : '') + '">';
    html += '<span class="s2-typesum-pill-code">' + mid.code + '</span>';
    html += '<span class="s2-typesum-pill-name">' + mid.name + '</span>';
    html += '<span class="s2-typesum-pill-cnt">' + mappedN + '/' + totalN + '</span>';
    html += '</div>';
  });
  html += '</div>';

  // CENTER: arrow
  html += '<div class="s2-typesum-arrow">&rarr;</div>';

  // RIGHT: Klay leaves under this type (1-layer down)
  html += '<div class="s2-typesum-side">';
  html += '<div class="s2-typesum-side-lbl">Klay structure</div>';
  if (klayBucket) {
    klayBucket.children.forEach(function(k){
      // count inbound confirmed
      var inb = S2_ACCOUNTS.filter(function(a){return a.newCode === k.code && a.status === 'confirmed';}).length;
      var hasInb = inb > 0;
      html += '<div class="s2-typesum-pill ' + (hasInb ? 'done' : '') + '">';
      html += '<span class="s2-typesum-pill-code">' + k.code + '</span>';
      html += '<span class="s2-typesum-pill-name">' + s2_klayDisplayName(k.code, k.name) + '</span>';
      if (hasInb) html += '<span class="s2-typesum-pill-cnt">' + inb + '</span>';
      html += '</div>';
    });
  }
  html += '</div>';

  html += '</div></div>';
  return html;
}

    else html += '<strong>' + confirmedN + '</strong> / ' + rows.length + ' confirmed';
