<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Vinaze IA — Migration Workspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Inconsolata:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fzerlina.github.io/vinaze/vinaze-design-system.css">
<style>
/* ── RESET & BASE ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'Manrope', sans-serif; background: #F4F0EB; color: #080706; font-size: 13px; -webkit-font-smoothing: antialiased; }

/* ── SHELL ── */
.shell { display: flex; flex-direction: column; height: 100vh; min-height: 0; }

/* ── TOP NAV ── */
.topnav {
  height: 50px; background: #1A1814; display: flex; align-items: center;
  padding: 0 20px; gap: 10px; flex-shrink: 0; z-index: 100;
}
.tn-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
.tn-mark { width: 24px; height: 24px; border-radius: 5px; background: #B83D08; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.tn-mark svg { width: 11px; height: 11px; fill: #fff; }
.tn-name { font-size: 14px; font-weight: 700; color: #fff; letter-spacing: -0.02em; }
.tn-div { width: 1px; height: 18px; background: rgba(255,255,255,0.1); flex-shrink: 0; }
.client-pills { display: flex; gap: 6px; }
.cpill {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.10);
  border-radius: 20px; padding: 4px 10px 4px 7px; cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.cpill:hover { background: rgba(255,255,255,0.12); }
.cpill.active { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.25); }
.cpill-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.cpill-dot.g { background: #166638; } .cpill-dot.a { background: #E8C870; } .cpill-dot.r { background: #A02020; }
.cpill-name { font-size: 11px; font-weight: 600; color: #fff; }
.cpill-day { font-family: 'Inconsolata', monospace; font-size: 10px; color: rgba(255,255,255,0.35); margin-left: 2px; }
.tn-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.cb-tag { font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
.cb-tag.on-track { color: #166638; background: rgba(22,102,56,0.2); border: 1px solid rgba(22,102,56,0.25); }
.cb-tag.at-risk { color: #7A4D00; background: rgba(232,200,112,0.2); border: 1px solid rgba(232,200,112,0.3); }
.cb-tag.blocked { color: #A02020; background: rgba(160,32,32,0.15); border: 1px solid rgba(160,32,32,0.25); }
.tn-avatar { width: 26px; height: 26px; border-radius: 50%; background: #2E2B27; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.4); }

/* ── BODY ── */
.body { display: flex; flex: 1; overflow: hidden; min-height: 0; }

/* ── VERTICAL PHASE SIDEBAR ── */
.phase-sidebar {
  width: 196px; flex-shrink: 0; background: #FBF8F5;
  border-right: 1px solid #E2DDD7; display: flex; flex-direction: column; overflow: hidden; min-height: 0;
}
.psc-header { padding: 14px 14px 12px; border-bottom: 1px solid #E2DDD7; flex-shrink: 0; }
.psc-lbl { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #C8C2BA; }
.psc-timer { font-family: 'Inconsolata', monospace; font-size: 24px; font-weight: 600; color: #080706; letter-spacing: -0.02em; margin-top: 4px; line-height: 1; }
.psc-timer span { font-size: 13px; color: #8C857C; font-weight: 400; }
.psc-sub { font-size: 10px; color: #8C857C; margin-top: 2px; font-weight: 300; }
.psc-cashback { margin-top: 8px; font-size: 10px; font-weight: 600; display: inline-block; padding: 2px 8px; border-radius: 20px; }
.psc-cashback.on { color: #166638; background: #E8F5EE; border: 1px solid #A8D9BC; }
.psc-cashback.risk { color: #7A4D00; background: #FDF3E0; border: 1px solid #E8C870; }

.ps-phases { overflow-y: auto; flex: 1; padding: 8px 0; }
.psi {
  position: relative; padding: 9px 12px 9px 34px; cursor: pointer;
  border-left: 2px solid transparent; transition: background 0.12s;
}
.psi::before {
  content: ''; position: absolute; left: 18px; top: 0; bottom: 0;
  width: 1px; background: #E2DDD7; z-index: 0;
}
.psi:first-child::before { top: 50%; }
.psi:last-child::before { bottom: 50%; }
.psi-dot {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  width: 13px; height: 13px; border-radius: 50%; z-index: 1;
  display: flex; align-items: center; justify-content: center;
}
.psi-dot.done { background: #166638; }
.psi-dot.done svg { width: 7px; height: 7px; stroke: #fff; fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
.psi-dot.active { background: #B83D08; box-shadow: 0 0 0 3px rgba(184,61,8,0.15); }
.psi-dot.warn { background: #FDF3E0; border: 2px solid #E8C870; }
.psi-dot.pending { background: #fff; border: 1.5px solid #C8C2BA; }
.psi.done { border-left-color: #E2DDD7; }
.psi.active { background: #F4F0EB; border-left-color: #B83D08; }
.psi:hover:not(.active) { background: #F4F0EB; }
.psi-name { font-size: 11px; font-weight: 600; line-height: 1.2; }
.psi.done .psi-name { color: #166638; }
.psi.active .psi-name { color: #B83D08; }
.psi:not(.done):not(.active) .psi-name { color: #8C857C; }
.psi-meta { font-size: 10px; color: #C8C2BA; margin-top: 2px; font-weight: 300; line-height: 1.3; }
.psi.active .psi-meta { color: #8C857C; }
.psi-pill {
  display: inline-flex; font-size: 9px; font-weight: 700;
  padding: 2px 6px; border-radius: 20px; margin-top: 4px;
}
.pp-a { background: #FDF3E0; color: #7A4D00; border: 1px solid #E8C870; }
.pp-r { background: #FBF0F0; color: #A02020; border: 1px solid #EAB8B8; }
.pp-g { background: #E8F5EE; color: #166638; border: 1px solid #A8D9BC; }
.pp-gr { background: #F4F0EB; color: #C8C2BA; border: 1px solid #E2DDD7; }

/* ── MAIN AREA ── */
.main-area { flex: 1; display: flex; flex-direction: column; min-height: 0; }
.main-topbar {
  height: 44px; background: #fff; border-bottom: 1px solid #E2DDD7;
  display: flex; align-items: center; padding: 0 20px; gap: 8px; flex-shrink: 0;
}
.mt-title { font-size: 13px; font-weight: 700; color: #080706; }
.mt-title em { color: #B83D08; font-style: normal; }
.mt-sep { color: #E2DDD7; }
.mt-sub { font-size: 11px; color: #8C857C; }
.mt-right { margin-left: auto; display: flex; gap: 6px; align-items: center; }

.main-body { flex: 1; display: flex; min-height: 0; overflow: hidden; }
.main-content { flex: 1; overflow-y: auto; padding: 18px 20px; display: flex; flex-direction: column; gap: 12px; min-height: 0; }
.aside-col { width: 214px; flex-shrink: 0; border-left: 1px solid #E2DDD7; background: #FBF8F5; overflow-y: auto; padding: 14px 12px; display: flex; flex-direction: column; gap: 10px; min-height: 0; transition: width 0.2s ease, padding 0.2s ease; position: relative; }
.aside-col.collapsed { width: 32px; padding: 0; overflow: hidden; }
.aside-col.collapsed .aside-inner { opacity: 0; pointer-events: none; }
.aside-inner { flex: 1; display: flex; flex-direction: column; gap: 10px; transition: opacity 0.15s ease; }
.aside-toggle {
  position: absolute; top: 14px; left: -13px;
  width: 24px; height: 24px; border-radius: 50%;
  background: #fff; border: 1px solid #E2DDD7;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; z-index: 20;
  transition: background 0.12s, border-color 0.12s;
  flex-shrink: 0;
}
.aside-toggle:hover { background: #F4F0EB; border-color: #C8C2BA; }
.aside-toggle svg { width: 10px; height: 10px; stroke: #8C857C; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; transition: transform 0.2s ease; }
.aside-col.collapsed .aside-toggle { left: 4px; top: 14px; }
.aside-col.collapsed .aside-toggle svg { transform: rotate(180deg); }
.aside-collapsed-label {
  display: none; writing-mode: vertical-rl; text-orientation: mixed;
  font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: #C8C2BA; margin: 48px auto 0; transform: rotate(180deg);
  user-select: none;
}
.aside-col.collapsed .aside-collapsed-label { display: block; }

/* ── CARDS ── */
.card { background: #fff; border: 1px solid #E2DDD7; border-radius: 9px; padding: 14px 16px; }
.card.sunken { background: #F4F0EB; border-color: #E2DDD7; }
.card-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.card-t { font-size: 9px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: #8C857C; }

/* ── BADGES ── */
.bdg { display: inline-flex; align-items: center; font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }
.bdg.g { background: #E8F5EE; color: #166638; border: 1px solid #A8D9BC; }
.bdg.a { background: #FDF3E0; color: #7A4D00; border: 1px solid #E8C870; }
.bdg.r { background: #FBF0F0; color: #A02020; border: 1px solid #EAB8B8; }
.bdg.b { background: #EBF0FD; color: #1A46C8; border: 1px solid #C8D8FA; }
.bdg.gr { background: #F4F0EB; color: #8C857C; border: 1px solid #E2DDD7; }

/* ── STATS GRID ── */
.stats-grid { display: grid; gap: 8px; }
.sg-4 { grid-template-columns: repeat(4,1fr); }
.sg-3 { grid-template-columns: repeat(3,1fr); }
.sg-2 { grid-template-columns: repeat(2,1fr); }
.stat-t { background: #fff; border: 1px solid #E2DDD7; border-radius: 7px; padding: 10px 12px; }
.sv { font-family: 'Inconsolata', monospace; font-size: 18px; font-weight: 600; line-height: 1; }
.sl { font-size: 9px; color: #8C857C; margin-top: 3px; }
.sv.g { color: #166638; } .sv.a { color: #7A4D00; } .sv.r { color: #A02020; } .sv.k { color: #080706; }

/* ── FORM ── */
.frow { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.frow.full { grid-template-columns: 1fr; }
.field label { font-size: 9px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #8C857C; display: block; margin-bottom: 3px; }
.field input, .field select {
  width: 100%; padding: 7px 10px; border: 1px solid #E2DDD7; border-radius: 6px;
  font-size: 12px; font-family: 'Manrope', sans-serif; color: #080706; background: #fff; outline: none;
}
.seg { display: flex; gap: 1px; background: #F4F0EB; border-radius: 6px; padding: 2px; border: 1px solid #E2DDD7; }
.seg-b { flex: 1; padding: 5px 6px; font-size: 11px; font-weight: 500; border-radius: 4px; border: none; cursor: pointer; font-family: 'Manrope', sans-serif; color: #8C857C; background: transparent; white-space: nowrap; }
.seg-b.on { background: #fff; color: #080706; font-weight: 700; }

/* ── TABLE ── */
.mt-tbl { width: 100%; border-collapse: collapse; }
.mt-tbl th { font-size: 9px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: #8C857C; padding: 0 8px 7px; text-align: left; border-bottom: 1px solid #E2DDD7; }
.mt-tbl td { font-size: 11px; color: #2E2B27; padding: 7px 8px; border-bottom: 1px solid #F4F0EB; vertical-align: middle; }
.mt-tbl tr:last-child td { border-bottom: none; }
.td-s { font-weight: 700; color: #080706; }
.td-m { font-family: 'Inconsolata', monospace; font-size: 12px; font-weight: 600; }

/* ── CHECKLIST ── */
.cl-item { display: flex; align-items: flex-start; gap: 9px; padding: 8px 11px; border-radius: 7px; border: 1px solid #E2DDD7; background: #fff; margin-bottom: 6px; }
.cl-item:last-child { margin-bottom: 0; }
.cl-item.pass { border-color: #A8D9BC; background: #E8F5EE; }
.cl-item.warn { border-color: #E8C870; background: #FDF3E0; }
.cl-item.fail { border-color: #EAB8B8; background: #FBF0F0; }
.cl-ic { width: 15px; height: 15px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
.cl-ic.pass { background: #166638; color: #fff; }
.cl-ic.warn { background: #7A4D00; color: #fff; }
.cl-ic.fail { background: #A02020; color: #fff; }
.cl-lbl { font-size: 11px; font-weight: 600; color: #080706; }
.cl-sub { font-size: 10px; color: #8C857C; margin-top: 2px; line-height: 1.4; }
.cl-act { font-size: 10px; font-weight: 600; color: #1A46C8; margin-top: 3px; }

/* ── MAP ITEMS ── */
.map-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-bottom: 1px solid #F4F0EB; }
.map-item:last-child { border-bottom: none; }
.map-from { flex: 1; min-width: 0; }
.map-arr { color: #C8C2BA; font-size: 11px; flex-shrink: 0; margin-top: 2px; }
.map-to { flex: 1; min-width: 0; }
.map-code { font-family: 'Inconsolata', monospace; font-size: 11px; font-weight: 600; color: #080706; }
.map-name { font-size: 10px; color: #8C857C; margin-top: 1px; }
.map-pct { font-size: 10px; font-weight: 700; flex-shrink: 0; margin-top: 2px; }
.map-pct.hi { color: #166638; } .map-pct.mid { color: #7A4D00; } .map-pct.lo { color: #A02020; }

/* ── EXCEPTION QUEUE ── */
.exc-wrap { border: 1px solid #E2DDD7; border-radius: 8px; overflow: hidden; margin-bottom: 8px; }
.exc-wrap:last-child { margin-bottom: 0; }
.exc-top { padding: 10px 13px; background: #fff; display: flex; align-items: flex-start; gap: 10px; }
.exc-cands { padding: 10px 13px; background: #F4F0EB; }
.exc-cand-lbl { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #8C857C; margin-bottom: 7px; }
.cand { display: flex; align-items: center; gap: 8px; padding: 7px 10px; background: #fff; border-radius: 6px; border: 1px solid #E2DDD7; margin-bottom: 5px; cursor: pointer; transition: border-color 0.1s; }
.cand:last-child { margin-bottom: 0; }
.cand.sel { border-color: #1A46C8; border-width: 1.5px; }
.cand:hover { border-color: #C8D8FA; }
.cand-info { flex: 1; min-width: 0; }
.cand-name { font-size: 11px; font-weight: 600; color: #080706; }
.cand-why { font-size: 10px; color: #8C857C; margin-top: 1px; }
.cand-pct { font-size: 11px; font-weight: 700; flex-shrink: 0; }
.exc-batch { padding: 8px 13px; background: #EBF0FD; border-top: 1px solid #C8D8FA; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.exc-resolved { padding: 10px 13px; background: #E8F5EE; border-top: 1px solid #A8D9BC; display: flex; align-items: center; gap: 8px; }

/* ── VARIANCE TABLE ── */
.var-row { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 7px; border: 1px solid #E2DDD7; background: #fff; margin-bottom: 5px; }
.var-row:last-child { margin-bottom: 0; }
.var-lbl { flex: 1; font-size: 11px; color: #2E2B27; }
.var-leg { font-family: 'Inconsolata', monospace; font-size: 11px; color: #8C857C; width: 96px; text-align: right; flex-shrink: 0; }
.var-ours { font-family: 'Inconsolata', monospace; font-size: 11px; font-weight: 600; color: #080706; width: 96px; text-align: right; flex-shrink: 0; }
.var-diff { font-family: 'Inconsolata', monospace; font-size: 11px; font-weight: 700; width: 76px; text-align: right; flex-shrink: 0; }
.var-diff.z { color: #166638; } .var-diff.nz { color: #A02020; }

/* ── UAT ── */
.uat-i { display: flex; align-items: center; gap: 9px; padding: 8px 11px; border-radius: 7px; border: 1px solid #E2DDD7; background: #fff; margin-bottom: 5px; cursor: pointer; transition: background 0.1s; }
.uat-i:last-child { margin-bottom: 0; }
.uat-i:hover { background: #FBF8F5; }
.uat-i.flagged { border-color: #EAB8B8; background: #FBF0F0; }
.uat-i.done { border-color: #A8D9BC; background: #E8F5EE; }
.uat-cb { width: 15px; height: 15px; border-radius: 4px; border: 1.5px solid #C8C2BA; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; }
.uat-cb.done { background: #166638; border-color: #166638; color: #fff; }
.uat-cb.flag { background: #FBF0F0; border-color: #A02020; color: #A02020; font-size: 10px; }
.uat-lbl { flex: 1; font-size: 11px; color: #2E2B27; line-height: 1.4; }

/* ── SIGN-OFF ASIDE ── */
.so-item { display: flex; align-items: center; gap: 7px; padding: 7px 9px; border-radius: 6px; border: 1px solid #E2DDD7; background: #fff; margin-bottom: 4px; }
.so-item:last-child { margin-bottom: 0; }
.so-item.done { background: #E8F5EE; border-color: #A8D9BC; }
.so-item.active-so { background: #FDF3E0; border-color: #E8C870; }
.so-item.locked { opacity: 0.4; }
.so-n { font-size: 9px; font-weight: 700; color: #C8C2BA; width: 11px; flex-shrink: 0; }
.so-lbl { flex: 1; font-size: 10px; font-weight: 500; color: #080706; }
.so-st { font-size: 9px; font-weight: 700; }
.so-st.done { color: #166638; } .so-st.wait { color: #7A4D00; } .so-st.lock { color: #C8C2BA; }
.so-t { font-size: 9px; color: #C8C2BA; margin-left: 2px; }

/* ── BUTTONS ── */
.btn-primary { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; background: #1A46C8; color: #fff; font-size: 12px; font-weight: 600; border-radius: 7px; border: none; cursor: pointer; font-family: 'Manrope', sans-serif; transition: background 0.12s; }
.btn-primary:hover { background: #1338A8; }
.btn-secondary { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; background: #EBF0FD; color: #1A46C8; font-size: 12px; font-weight: 600; border-radius: 7px; border: 1px solid #C8D8FA; cursor: pointer; font-family: 'Manrope', sans-serif; transition: background 0.12s; }
.btn-secondary:hover { background: #C8D8FA; }
.btn-ghost { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; background: transparent; color: #8C857C; font-size: 12px; font-weight: 500; border-radius: 7px; border: 1px solid #E2DDD7; cursor: pointer; font-family: 'Manrope', sans-serif; transition: border-color 0.12s, color 0.12s; }
.btn-ghost:hover { border-color: #C8C2BA; color: #2E2B27; }
.btn-warn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; background: #FDF3E0; color: #7A4D00; font-size: 11px; font-weight: 700; border-radius: 7px; border: 1px solid #E8C870; cursor: pointer; font-family: 'Manrope', sans-serif; width: 100%; justify-content: center; }
.btn-brand { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; background: #B83D08; color: #fff; font-size: 13px; font-weight: 700; border-radius: 8px; border: none; cursor: pointer; font-family: 'Manrope', sans-serif; transition: background 0.12s; }
.btn-brand:hover { background: #A03206; }
.btn-brand:disabled { opacity: 0.3; cursor: not-allowed; }

/* ── GO LIVE BLOCK ── */
.golive-block { background: #1A1814; border-radius: 9px; padding: 18px 20px; }
.gl-pre { font-size: 9px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: rgba(255,255,255,0.25); margin-bottom: 10px; }
.gl-i { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 6px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); margin-bottom: 5px; }
.gl-i.done { background: rgba(22,102,56,0.12); border-color: rgba(22,102,56,0.2); }
.gl-i.pend { background: rgba(184,61,8,0.08); border-color: rgba(184,61,8,0.15); }
.gl-lbl { flex: 1; font-size: 11px; color: rgba(255,255,255,0.45); }
.gl-lbl.done { color: rgba(255,255,255,0.75); }
.gl-switch { margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: space-between; gap: 14px; }
.gl-sw-title { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.85); }
.gl-sw-sub { font-size: 10px; color: rgba(255,255,255,0.28); margin-top: 2px; }

/* ── ASIDE LABELS ── */
.aside-lbl { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #C8C2BA; padding: 2px 0 6px; }

/* ── COMM LOG ── */

<script>
// ── STATE ──
const clients = {
  makmur: {
    name: 'PT Makmur Jaya',
    day: 14, total: 30,
    cashback: 'Full cashback on track',
    cashbackClass: 'on',
    cbTagClass: 'on-track',
    cbTagText: 'PT Makmur Jaya · Day 14 · on track',

      { id:0, name:'Setup', meta:'Done · Day 1', state:'done', pill:null },

      { id:2, name:'Dimension Discovery', meta:'Locked · Day 7', state:'done', pill:null },
      { id:3, name:'CoA Mapping', meta:'Day 6 → now', state:'active', pill:{text:'In progress', cls:'pp-a'} },
      { id:4, name:'GL Mapping', meta:'Coming soon', state:'pending', pill:{text:'Coming soon', cls:'pp-gr'} },
      { id:5, name:'Trial Balance', meta:'Coming soon', state:'pending', pill:{text:'Coming soon', cls:'pp-gr'} },
      { id:6, name:'UAT', meta:'Coming soon', state:'pending', pill:{text:'Coming soon', cls:'pp-gr'} },
      { id:7, name:'Go-Live', meta:'Coming soon', state:'pending', pill:{text:'Coming soon', cls:'pp-gr'} },
    ]
  },
  sumber: {
    name: 'CV Sumber Alam',
    day: 6, total: 30,
    cashback: 'Full cashback on track',
    cashbackClass: 'on',
    cbTagClass: 'on-track',
    cbTagText: 'CV Sumber Alam · full cashback on track',
    activePhase: 2,
    phases: [
      { id:0, name:'Setup', meta:'Done · Day 1', state:'done', pill:null },
      { id:1, name:'Upload & Health Check', meta:'Done · Day 3', state:'done', pill:null },
      { id:2, name:'Dimension Discovery', meta:'Day 3 → now', state:'active', pill:{text:'Session today', cls:'pp-a'} },
      { id:3, name:'CoA Mapping', meta:'Awaiting Phase 2', state:'pending', pill:{text:'Locked', cls:'pp-gr'} },
      { id:4, name:'GL Mapping', meta:'Coming soon', state:'pending', pill:{text:'Coming soon', cls:'pp-gr'} },
      { id:5, name:'Trial Balance', meta:'Coming soon', state:'pending', pill:{text:'Coming soon', cls:'pp-gr'} },
      { id:6, name:'UAT', meta:'Coming soon', state:'pending', pill:{text:'Coming soon', cls:'pp-gr'} },
      { id:7, name:'Go-Live', meta:'Coming soon', state:'pending', pill:{text:'Coming soon', cls:'pp-gr'} },
    ]
  },
  artha: {
    name: 'PT Artha Niaga',
    day: 3, total: 30,
    cashback: 'At risk — blocked',
    cashbackClass: 'risk',
    cbTagClass: 'blocked',
    cbTagText: 'PT Artha Niaga · blocked — hard prerequisite failed',
    activePhase: 1,
    phases: [
      { id:0, name:'Setup', meta:'Done · Day 1', state:'done', pill:null },
      { id:1, name:'Upload & Health Check', meta:'Day 2 → now', state:'active', pill:{text:'Hard block', cls:'pp-r'} },
      { id:2, name:'Dimension Discovery', meta:'Awaiting Phase 1', state:'pending', pill:{text:'Locked', cls:'pp-gr'} },
      { id:3, name:'CoA Mapping', meta:'Awaiting Phase 2', state:'pending', pill:{text:'Locked', cls:'pp-gr'} },
      { id:4, name:'GL Mapping', meta:'Coming soon', state:'pending', pill:{text:'Coming soon', cls:'pp-gr'} },
      { id:5, name:'Trial Balance', meta:'Coming soon', state:'pending', pill:{text:'Coming soon', cls:'pp-gr'} },
      { id:6, name:'UAT', meta:'Coming soon', state:'pending', pill:{text:'Coming soon', cls:'pp-gr'} },
      { id:7, name:'Go-Live', meta:'Coming soon', state:'pending', pill:{text:'Coming soon', cls:'pp-gr'} },
    ]
  }
};

let currentClient = 'makmur';
let currentPhase = 4;
let excResolved = false;
let batchApplied = false;
let glSignoffSent = false;
let goLiveReady = false;

// ── SIGN-OFF DATA PER PHASE ──
const phaseSignoffs = {
  0: null,
  1: { label: 'Health check sign-off', state: 'done', time: 'D4' },
  2: { label: 'Dimension sign-off', state: 'done', time: 'D7' },
  3: { label: 'CoA mapping sign-off', state: 'done', time: 'D12' },
  4: null,
  5: null,
  6: null,
  7: null,
};

// ── RENDER PHASE NAV ──
function renderPhaseNav() {
  const c = clients[currentClient];
  const nav = document.getElementById('phase-nav');
  nav.innerHTML = c.phases.map(p => {
    const dotClass = p.state === 'done' ? 'done' : p.state === 'active' ? 'active' : 'pending';
    const dotInner = p.state === 'done'
      ? `<svg viewBox="0 0 8 8"><polyline points="1,4 3,6 7,2"/></svg>`
      : '';
    const pill = p.pill ? `<div><span class="psi-pill ${p.pill.cls}">${p.pill.text}</span></div>` : '';
    const activeClass = currentPhase === p.id ? 'active' : p.state;
    const so = phaseSignoffs[p.id];
    const signoffHtml = so ? `<div class="psi-signoff">
      <div class="psi-so-dot ${so.state}"></div>
      <span class="psi-so-label ${so.state}">${so.state === 'done' ? '✓ ' + so.time : so.state === 'wait' ? so.time : 'Sign-off locked'}</span>
    </div>` : '';
    const isComingSoon = p.id >= 4;
    return `<div class="psi ${activeClass}${isComingSoon ? ' coming-soon' : ''}" onclick="goToPhase(${p.id})" style="${isComingSoon ? 'opacity:0.4;cursor:default;' : ''}">
      <div class="psi-dot ${dotClass}">${dotInner}</div>
      <div class="psi-name">${p.name}</div>
      <div class="psi-meta">${p.meta}</div>
      ${signoffHtml}
      ${pill}
    </div>`;
  }).join('');
}

// ── SWITCH CLIENT ──
function switchClient(id) {
  currentClient = id;
  currentPhase = Math.min(clients[id].activePhase, 3);
  document.querySelectorAll('.cpill').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');
  const c = clients[id];

}

function setActiveVersion(radio, fileId, version) {
  // Guard: check if the version item has a failed badge — if so, block
  const versionItem = radio.closest('.version-item');
  if (versionItem) {
    const badges = versionItem.querySelectorAll('.bdg.r');
    if (badges.length > 0) {
      radio.checked = false;
      showToast('Cannot set a failed version as active — upload a clean version first');
      return;
    }
  }
  // Update all labels in this file block
  const versionList = document.querySelector(`#fbody-${fileId} .version-list`);
  if (versionList) {
    versionList.querySelectorAll('.active-ver-label').forEach(l => {
      const inp = l.querySelector('input');
      if (inp && inp.checked) {
        l.classList.add('is-active');
        l.innerHTML = '';
        const newInp = document.createElement('input');
        newInp.type = 'radio';
        newInp.name = inp.name;
        newInp.checked = true;
        newInp.style.accentColor = '#166638';
        l.appendChild(newInp);
        l.appendChild(document.createTextNode(' Active'));
        newInp.onchange = function() { setActiveVersion(newInp, fileId, version); };
      } else {
        l.classList.remove('is-active');
        l.innerHTML = '';
        const newInp = document.createElement('input');
        newInp.type = 'radio';
        newInp.name = radio.name;
        newInp.style.accentColor = '#166638';
        l.appendChild(newInp);
        l.appendChild(document.createTextNode(' Set active'));
        newInp.onchange = function() { setActiveVersion(newInp, fileId, version); };
      }
    });
  }
  // Inject audit entry
  const auditCard = document.querySelector('#aside-inner .card');
  if (auditCard) {
    const newItem = document.createElement('div');
    newItem.className = 'audit-i';
    newItem.style.background = '#F4F0EB';
    const fileNames = { gl: 'GL Export', coa: 'Chart of Accounts', tb: 'Trial Balance' };
    const label = fileNames[fileId] || fileId;
    newItem.innerHTML = `<span class="audit-t">Now</span><div class="audit-dot ia"></div><div class="audit-b"><div class="audit-l">Active version set — ${label} ${version}</div><div class="audit-who">Reza Maulana · traceability label only · health check unchanged</div></div>`;
    const firstItem = auditCard.querySelector('.audit-i');
    if (firstItem) auditCard.insertBefore(newItem, firstItem);
    else auditCard.appendChild(newItem);
  }
  showToast(`Active version set to ${version} for ${fileId === 'gl' ? 'GL Export' : fileId === 'coa' ? 'Chart of Accounts' : 'Trial Balance'} — logged`);
}

function updateDimCounts() {
  const rows = document.querySelectorAll('#dim-list .dim-row');
  let confirmed = 0, review = 0, rejected = 0, values = 0;
  rows.forEach(row => {
    const status = row.dataset.status;
    if (status === 'confirmed') confirmed++;
    else if (status === 'review') review++;
    else if (status === 'rejected') rejected++;
    // count editable tags (not the + button)
    const tagContainers = row.querySelectorAll('[id^="tags-"] .dim-tag');
    values += tagContainers.length;
  });
  const cc = document.getElementById('dim-confirmed-count');
  const rc = document.getElementById('dim-review-count');
  const rjc = document.getElementById('dim-rejected-count');
  const vc = document.getElementById('dim-values-count');
  if (cc) cc.textContent = confirmed;
  if (rc) rc.textContent = review;
  if (rjc) rjc.textContent = rejected;
  if (vc) vc.textContent = values;
  const lockBtn = document.getElementById('lock-btn');
  const lockStatus = document.getElementById('lock-status');
  if (lockBtn && lockStatus) {
    if (review === 0 && confirmed > 0) {
      lockBtn.disabled = false;
      lockBtn.style.opacity = '1';
      lockBtn.style.cursor = 'pointer';
      lockStatus.textContent = `${confirmed} dimension${confirmed !== 1 ? 's' : ''} ready to lock`;
      lockStatus.style.color = '#166638';
    } else {
      lockBtn.disabled = true;
      lockBtn.style.opacity = '0.4';
      lockBtn.style.cursor = 'not-allowed';
      lockStatus.textContent = review > 0
        ? `${review} dimension${review !== 1 ? 's' : ''} need${review === 1 ? 's' : ''} review`
        : 'No dimensions confirmed yet';
      lockStatus.style.color = '#7A4D00';
    }
  }
}

function simulateUpload(fileId, filename) {
  const progress = document.getElementById('upload-progress');
  if (!progress) return;
  const fnEl = document.getElementById('upload-filename');
  const pctEl = document.getElementById('upload-pct');
  const fillEl = document.getElementById('progress-fill');
  const statusEl = document.getElementById('upload-status');
  progress.style.display = 'block';
  fnEl.textContent = filename;
  fillEl.style.width = '0%';
  pctEl.textContent = '0%';
  const steps = [
    { pct:30, status:'Uploading file…', delay:400 },
    { pct:65, status:'Running health check…', delay:900 },
    { pct:85, status:'Analyzing file structure…', delay:1400 },
    { pct:100, status:'Complete', delay:2000 },
  ];
  steps.forEach(s => {
    setTimeout(() => {
      fillEl.style.width = s.pct + '%';
      pctEl.textContent = s.pct + '%';
      statusEl.textContent = s.status;
      if (s.pct === 100) {
        setTimeout(() => {
          progress.style.display = 'none';
          if (fileId !== 'new') addNewVersion(fileId, filename);
          showToast(`${filename} uploaded — logged as IA upload in audit trail`);
          // refresh aside to show new audit entry
          const newEntry = { t:'Now', who:'ia', l:`IA uploaded ${filename}`, sub:'Reza Maulana · on behalf of client' };
          const auditCard = document.querySelector('#aside-inner .card');
          if (auditCard) {
            const newItem = document.createElement('div');
            newItem.className = 'audit-i';
            newItem.style.background = '#FDF3E0';
            newItem.innerHTML = `<span class="audit-t">Now</span><div class="audit-dot ia"></div><div class="audit-b"><div class="audit-l">${newEntry.l}</div><div class="audit-who">${newEntry.sub}</div></div>`;
            const firstItem = auditCard.querySelector('.audit-i');
            if (firstItem) auditCard.insertBefore(newItem, firstItem);
            else auditCard.appendChild(newItem);
          }
        }, 600);
      }
    }, s.delay);
  });
}

function addNewVersion(fileId, filename) {
  const versionList = document.querySelector(`#fbody-${fileId} .version-list`);
  if (!versionList) return;
  const items = versionList.querySelectorAll('.version-item');
  const newNum = 'v' + (items.length + 1);
  const radioName = fileId + '-active';
  // deactivate all current active labels
  versionList.querySelectorAll('.active-ver-label').forEach(l => {
    l.classList.remove('is-active');
    l.querySelector('input').checked = false;
    l.textContent = ''; // rebuild
    const inp = document.createElement('input');
    inp.type = 'radio';
    inp.name = radioName;
    inp.style.accentColor = '#166638';
    inp.onchange = () => setActiveVersion(inp, fileId, l.closest('.version-item').querySelector('.v-num').textContent);
    l.appendChild(inp);
    l.appendChild(document.createTextNode(' Set active'));
  });
  items.forEach(item => item.classList.remove('latest'));
  const newItem = document.createElement('div');
  newItem.className = 'version-item latest';
  newItem.innerHTML = `
    <span class="v-num">${newNum}</span>
    <div class="v-who ia" title="IA upload">IA</div>
    <div class="v-info"><div class="v-filename">${filename}</div><div class="v-detail">Just uploaded · IA upload on behalf of client</div></div>
    <label class="active-ver-label is-active" title="Active version for migration">
      <input type="radio" name="${radioName}" checked style="accent-color:#166638;"/> Active
    </label>
    <span class="bdg gr" style="flex-shrink:0;margin-left:4px;">Latest</span>
    <span class="v-time">Now</span>
    <div class="v-actions">
      <button class="v-btn" onclick="showToast('Downloading ${filename}')">Download</button>
    </div>`;
  newItem.querySelector('input[type=radio]').onchange = function() {
    setActiveVersion(this, fileId, newNum);
  };
  versionList.insertBefore(newItem, versionList.firstChild);
  // update meta
  const hd = document.querySelector(`#fbody-${fileId}`).previousElementSibling;
  const metaEl = hd ? hd.querySelector('.file-meta-sm') : null;
  if (metaEl) {
    const parts = metaEl.textContent.split('·');
    if (parts.length > 1) {
      const last = parts[parts.length - 1].trim();
      if (last.includes('version')) parts[parts.length-1] = ' ' + (items.length + 1) + ' versions';
      metaEl.textContent = parts.join('·');
    }
  }
}

function coaUpdateSummary() {
  const accs = coaState.accounts;
  const get = (s) => accs.filter(a => a.status === s).length;
  const el = (id, val) => { const e = document.getElementById(id); if(e) e.textContent = val; };
  el('coa-cnt-mapped', get('mapped'));
  el('coa-cnt-review', get('review'));
  el('coa-cnt-unmapped', get('unmapped'));
  el('coa-cnt-resolved', get('resolved') + get('manual'));
  el('coa-cnt-tax', get('tax'));
  const unmapped = get('unmapped');
  const review = get('review');
  const lockBtn = document.getElementById('coa-lock-btn');
  const lockStatus = document.getElementById('coa-lock-status');
  if (lockBtn && lockStatus) {
    if (unmapped === 0 && review === 0) {
      lockBtn.disabled = false; lockBtn.style.opacity = '1'; lockBtn.style.cursor = 'pointer';
      lockStatus.textContent = 'All accounts mapped — ready to lock';
      lockStatus.style.color = '#166638';
    } else {
      lockBtn.disabled = true; lockBtn.style.opacity = '0.4'; lockBtn.style.cursor = 'not-allowed';
      const issues = [];
      if (unmapped > 0) issues.push(`${unmapped} cannot map`);
      if (review > 0) issues.push(`${review} needs review`);
      lockStatus.textContent = issues.join(' · ');
      lockStatus.style.color = unmapped > 0 ? '#A02020' : '#7A4D00';
    }
  }
}

function coaRenderRow(id) {
  const a = coaState.accounts.find(x => x.id === id);

function coaApplyOverride(id, code, name, placement) {
  const a = coaState.accounts.find(x => x.id === id);
  if (!a) return;
  const wasUnmapped = a.status === 'unmapped';
  a.tradeosCode = code;
  a.tradeosName = name;
  a.placement = placement;
  a.status = 'resolved';
  a.rationale = 'IA manual override — ' + a.rationale;
  a.conf = 0;
  coaState.overrideOpen = null;
  // trigger batch suggestion for unmapped resolutions
  if (wasUnmapped) {
    coaState.batchPending = { triggeredBy: id };
  }
  coaRenderRow(id);
  coaUpdateSummary();
  showToast(`Mapped to ${code} · ${name}`);
}

function coaConfirm(id) {
  const a = coaState.accounts.find(x => x.id === id);
  if (!a) return;
  a.status = 'resolved';
  coaRenderRow(id);
  coaUpdateSummary();
  showToast(`Mapping confirmed — ${a.legacyCode} → ${a.tradeosCode}`);
}

function coaPreviewBatch(id) {
  showModal('Batch apply preview',
    'The following 3 accounts share a similar "Biaya Lain" pattern and have no mapping:<br><br>• 6032 · Biaya Lain A<br>• 6033 · Biaya Lain B<br>• 6099 · Biaya Umum<br><br>All will be mapped to the same TradeOS account as the resolved account.',
    `<button class='btn-primary' onclick='closeModal();coaConfirmBatch("${id}")'>Apply to 3 accounts</button><button class='btn-ghost' style='margin-left:8px' onclick='closeModal()'>Cancel</button>`);
}

function coaConfirmBatch(id) {
  coaState.batchPending = null;
  coaRenderRow(id);
  showToast('Batch applied — 3 similar accounts mapped');
}

function coaDismissBatch() {
  const id = coaState.batchPending?.triggeredBy;
  coaState.batchPending = null;
  if (id) coaRenderRow(id);
}

function coaLock() {
  showModal('Lock CoA mapping',
    'This will lock all 847 account mappings. The Controller will receive a sign-off request (Chunk 3). Post-lock changes require IA action and a new Controller sign-off.',
    `<button class='btn-primary' onclick='closeModal();showToast("CoA mapping locked · Sign-off sent to Budi Santoso · Phase 4 now available")'>Lock & request sign-off</button><button class='btn-ghost' style='margin-left:8px' onclick='closeModal()'>Cancel</button>`);
}

// ── ASIDE TOGGLE ──
let asideCollapsed = false;
function toggleAside() {
  asideCollapsed = !asideCollapsed;
  const aside = document.getElementById('aside-col');
  const toggle = aside.querySelector('.aside-toggle');
  if (asideCollapsed) {
    aside.classList.add('collapsed');
    toggle.title = 'Expand audit trail';
  } else {
    aside.classList.remove('collapsed');
    toggle.title = 'Collapse audit trail';
  }
}

// ── MODAL ──
function showModal(title, body, actions) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body.replace(/\n/g, '<br>');
  document.getElementById('modal-actions').innerHTML = actions;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── INIT ──
renderPhaseNav();
renderPhase(currentPhase);
</script>
</body>
</html>
