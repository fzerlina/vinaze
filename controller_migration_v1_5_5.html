<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Klay Migration — v1.4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Inconsolata:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --primitive-tc-900:#3D1200;--primitive-tc-700:#A03206;--primitive-tc-500:#B83D08;--primitive-tc-400:#D4622A;--primitive-tc-200:#EDD5C4;--primitive-tc-100:#F7EDE5;
  --primitive-bl-900:#0E2470;--primitive-bl-700:#1338A8;--primitive-bl-500:#1A46C8;--primitive-bl-400:#4D72E0;--primitive-bl-200:#C8D8FA;--primitive-bl-100:#EBF0FD;
  --primitive-ink-950:#080706;--primitive-ink-900:#1A1814;--primitive-ink-800:#2E2B27;--primitive-ink-400:#8C857C;--primitive-ink-300:#C8C2BA;--primitive-ink-200:#E2DDD7;--primitive-ink-100:#F4F0EB;--primitive-ink-50:#FBF8F5;--primitive-white:#FFFFFF;
  --primitive-go-700:#166638;--primitive-go-200:#A8D9BC;--primitive-go-100:#E8F5EE;
  --primitive-warn-800:#7A4D00;--primitive-warn-300:#E8C870;--primitive-warn-100:#FDF3E0;
  --primitive-stop-700:#A02020;--primitive-stop-300:#EAB8B8;--primitive-stop-100:#FBF0F0;
  --color-brand:var(--primitive-tc-500);--color-brand-hover:var(--primitive-tc-700);--color-brand-mid:var(--primitive-tc-400);--color-brand-subtle:var(--primitive-tc-200);--color-brand-wash:var(--primitive-tc-100);--color-brand-deep:var(--primitive-tc-900);
  --color-action:var(--primitive-bl-500);--color-action-hover:var(--primitive-bl-700);--color-action-mid:var(--primitive-bl-400);--color-action-subtle:var(--primitive-bl-200);--color-action-wash:var(--primitive-bl-100);
  --color-text-primary:var(--primitive-ink-950);--color-text-secondary:var(--primitive-ink-800);--color-text-tertiary:var(--primitive-ink-400);--color-text-disabled:var(--primitive-ink-300);--color-text-inverse:var(--primitive-white);
  --color-surface-base:var(--primitive-ink-50);--color-surface-raised:var(--primitive-white);--color-surface-sunken:var(--primitive-ink-100);
  --color-border-default:var(--primitive-ink-200);--color-border-subtle:var(--primitive-ink-100);--color-border-strong:var(--primitive-ink-300);
  --color-success-text:var(--primitive-go-700);--color-success-border:var(--primitive-go-200);--color-success-surface:var(--primitive-go-100);
  --color-warning-text:var(--primitive-warn-800);--color-warning-border:var(--primitive-warn-300);--color-warning-surface:var(--primitive-warn-100);
  --color-danger-text:var(--primitive-stop-700);--color-danger-border:var(--primitive-stop-300);--color-danger-surface:var(--primitive-stop-100);
  --font-sans:'Manrope',sans-serif;--font-mono:'Inconsolata',monospace;
  --radius-sm:6px;--radius-md:10px;--radius-lg:14px;--radius-xl:20px;--radius-full:9999px;
  --space-2:8px;--space-3:12px;--space-4:16px;--space-6:24px;--space-8:32px;--space-14:56px;
  --transition-base:0.15s ease;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--font-sans);background:var(--color-surface-base);color:var(--color-text-primary);-webkit-font-smoothing:antialiased;}
/* NAV */
.nav{background:var(--color-surface-base);border-bottom:1px solid var(--color-border-default);padding:0 var(--space-14);height:52px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{color:var(--color-brand);font-weight:700;font-size:15px;letter-spacing:-0.02em;}
.nav-sep{color:var(--color-border-strong);margin:0 6px;}
.nav-org{color:var(--color-text-primary);font-weight:500;font-size:14px;}
.day-badge{font-size:11px;font-weight:600;padding:4px 12px;border-radius:var(--radius-full);}
.day-badge.pend{background:var(--color-surface-sunken);color:var(--color-text-tertiary);border:1px solid var(--color-border-default);}
.day-badge.act{background:var(--color-danger-surface);color:var(--color-danger-text);border:1px solid var(--color-danger-border);}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--color-brand);color:var(--color-text-inverse);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;}
/* TOP NAV */
.stagebar{background:var(--color-surface-raised);border-bottom:1px solid var(--color-border-default);padding:0 var(--space-14);display:flex;align-items:stretch;height:48px;}
.sti{display:flex;align-items:center;gap:8px;padding:0 16px;border-bottom:2px solid transparent;white-space:nowrap;}
.sti.clickable{cursor:pointer;}
.sti.clickable:hover{background:var(--color-surface-sunken);}
.sti.on{border-bottom-color:var(--color-brand);}
.sti.off{opacity:.35;}
.stc{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.stc.on{background:var(--color-brand);color:var(--color-text-inverse);}
.stc.done{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);}
.stc.off{background:var(--color-surface-sunken);color:var(--color-text-disabled);border:1.5px solid var(--color-border-default);}
.stl{font-size:12px;font-weight:500;}
.stl.on{color:var(--color-brand);font-weight:600;}
.stl.done{color:var(--color-text-secondary);}
.stl.off{color:var(--color-text-disabled);}
.sts{display:none;}
.conn{width:1px;background:var(--color-border-default);margin:12px 0;flex-shrink:0;}
.conn-done{background:var(--color-border-default);}
/* LEFT NAV — checklist */
.sb-prog-wrap{padding:6px 16px 8px;border-bottom:1px solid var(--color-border-subtle);}
.sb-prog-bg{background:var(--color-border-default);border-radius:var(--radius-full);height:2px;margin-bottom:5px;overflow:hidden;}
.sb-prog-fill{height:2px;border-radius:var(--radius-full);background:var(--color-brand);}
.sb-prog-fill.complete{background:var(--color-success-text);}
.sb-prog-label{display:flex;justify-content:space-between;font-size:10px;color:var(--color-text-tertiary);font-weight:300;}
.cl-item{padding:8px var(--space-4);display:flex;align-items:flex-start;gap:10px;cursor:pointer;border-left:3px solid transparent;transition:background var(--transition-base);}
.cl-item:hover:not(.cl-blocked){background:var(--color-surface-sunken);}
.cl-item.cl-sel{background:var(--color-brand-wash);border-left-color:var(--color-brand);}
.cl-item.cl-blocked{opacity:.32;cursor:default;}
.cl-dot{width:18px;height:18px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;margin-top:1px;}
.cl-dot.empty{border:1.5px solid var(--color-border-strong);}
.cl-dot.active{background:var(--color-brand);color:var(--color-text-inverse);}
.cl-dot.done{background:var(--color-success-surface);border:1px solid var(--color-success-border);}
.cl-dot.warn{background:var(--color-warning-surface);border:1px solid var(--color-warning-border);}
.cl-dot.lock{background:var(--color-surface-sunken);border:1px solid var(--color-border-default);}
.cl-name{font-size:13px;font-weight:500;color:var(--color-text-primary);}
.cl-blocked .cl-name{color:var(--color-text-disabled);}
.cl-tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:var(--radius-full);margin-top:2px;font-weight:500;}
.cl-tag.done{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);}
.cl-tag.active{background:var(--color-brand-wash);color:var(--color-brand);border:1px solid var(--color-brand-subtle);}
.cl-tag.ready{background:var(--color-action-wash);color:var(--color-action);border:1px solid var(--color-action-subtle);}
.cl-tag.wait{background:var(--color-warning-surface);color:var(--color-warning-text);border:1px solid var(--color-warning-border);}
.cl-tag.lock{background:var(--color-surface-sunken);color:var(--color-text-disabled);border:1px solid var(--color-border-default);}
.cl-group-lbl{font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.07em;padding:8px 16px 2px;}
.cl-divider{height:1px;background:var(--color-border-subtle);margin:3px 0;}

.layout{display:flex;min-height:calc(100vh - 104px);}
/* SIDEBAR */
.sidebar{width:220px;background:var(--color-surface-raised);border-right:1px solid var(--color-border-default);padding:14px 0;flex-shrink:0;}
.sb-hdr{padding:0 var(--space-4) 10px;display:flex;justify-content:space-between;}
.sb-lbl{font-size:10px;color:var(--color-text-tertiary);font-weight:600;letter-spacing:.07em;text-transform:uppercase;}
.sb-cnt{font-size:11px;color:var(--color-text-tertiary);}
.sb-row{padding:9px var(--space-4);display:flex;align-items:center;gap:10px;cursor:pointer;border-left:3px solid transparent;transition:background var(--transition-base);}
.sb-row:hover{background:var(--color-surface-sunken);}
.sb-row.sel{background:var(--color-brand-wash);border-left-color:var(--color-brand);}
.ic{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ic.pend{background:var(--color-surface-sunken);}
.ic.done{background:var(--color-success-surface);}
.ic.warn{background:var(--color-warning-surface);}
.ic.spnic{background:var(--color-action-wash);}
.dot{width:6px;height:6px;border-radius:50%;background:var(--color-border-strong);}
.chk{color:var(--color-success-text);font-size:11px;font-weight:700;}
.dsh{color:var(--color-warning-text);font-size:13px;font-weight:700;}
.sb-name{font-size:13px;font-weight:500;color:var(--color-text-primary);}
.sb-meta{font-size:11px;color:var(--color-text-tertiary);margin-top:1px;font-weight:400;}
/* step numbers for stage 2 sidebar */
.step-n{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.step-n.pend{background:var(--color-surface-sunken);color:var(--color-text-disabled);border:1.5px solid var(--color-border-default);}
.step-n.act{background:var(--color-brand);color:var(--color-text-inverse);}
.step-n.dn{background:var(--color-success-surface);color:var(--color-success-text);font-size:13px;}
.spin{display:inline-block;width:11px;height:11px;border:2px solid var(--color-action);border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
/* CONTENT */
.content{flex:1;padding:22px var(--space-8);overflow-y:auto;background:var(--color-surface-raised);}
.srow{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:var(--radius-sm);letter-spacing:.02em;}
.b-not{background:var(--color-surface-sunken);color:var(--color-text-tertiary);}
.b-act{background:var(--color-danger-surface);color:var(--color-danger-text);border:1px solid var(--color-danger-border);}
.b-proc{background:var(--color-action-wash);color:var(--color-action);border:1px solid var(--color-action-subtle);}
.b-rev{background:var(--color-warning-surface);color:var(--color-warning-text);border:1px solid var(--color-warning-border);}
.b-inrev{background:var(--color-action-wash);color:var(--color-action);border:1px solid var(--color-action-subtle);}
.bmeta{font-size:11px;color:var(--color-text-tertiary);font-weight:400;}
/* v1.4 filter buttons */
.exc-filt-btn{background:var(--color-surface-raised);border:1px solid var(--color-border-default);color:var(--color-text-secondary);font-size:11px;padding:4px 10px;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-sans);font-weight:400;transition:background var(--transition-base);}
.exc-filt-btn:hover{background:var(--color-surface-sunken);}
.exc-filt-active{background:var(--color-surface-sunken);border-color:var(--color-text-primary);color:var(--color-text-primary);font-weight:600;}
h1{font-size:20px;font-weight:700;color:var(--color-text-primary);margin-bottom:8px;letter-spacing:-0.01em;}
.desc{font-size:13px;color:var(--color-text-secondary);line-height:1.65;margin-bottom:14px;font-weight:300;}
/* ALERT */
.alert{border-left:3px solid var(--color-brand-subtle);background:var(--color-brand-wash);border-radius:0 var(--radius-md) var(--radius-md) 0;padding:10px 14px;margin-bottom:14px;display:flex;gap:10px;}
.alert.blue{border-left-color:var(--color-action-subtle);background:var(--color-action-wash);}
.alert-icon{color:var(--color-brand);font-size:13px;flex-shrink:0;margin-top:1px;}
.alert.blue .alert-icon{color:var(--color-action);}
.alert-body{font-size:12px;color:var(--color-text-secondary);line-height:1.55;font-weight:300;}
.alert-body strong{color:var(--color-brand);display:block;margin-top:3px;font-weight:600;}
/* UPLOAD */
.upzone{border:1.5px dashed var(--color-border-strong);border-radius:var(--radius-lg);background:var(--color-surface-sunken);padding:32px 20px;display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:14px;}
/* BUTTONS */
.btn-action{background:var(--color-action);color:var(--color-text-inverse);border:none;border-radius:var(--radius-md);padding:9px 20px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-sans);transition:background var(--transition-base);}
.btn-action:hover{background:var(--color-action-hover);}
.btn-cont{background:var(--color-action);color:var(--color-text-inverse);border:none;border-radius:var(--radius-lg);padding:11px 26px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font-sans);display:inline-flex;align-items:center;gap:8px;transition:background var(--transition-base);}
.btn-cont:hover{background:var(--color-action-hover);}
.btn-ia{background:var(--color-surface-raised);border:1px solid var(--color-action-subtle);color:var(--color-action);font-size:11px;padding:5px 12px;border-radius:var(--radius-sm);cursor:pointer;margin-top:6px;font-family:var(--font-sans);font-weight:500;transition:background var(--transition-base);}
.btn-ia:hover{background:var(--color-action-wash);}
.btn-ghost{background:var(--color-surface-raised);border:1px solid var(--color-border-default);color:var(--color-text-secondary);font-size:12px;padding:5px 14px;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-sans);transition:background var(--transition-base);}
.btn-ghost:hover{background:var(--color-surface-sunken);}
.btn-confirm{background:var(--color-surface-raised);border:1.5px solid var(--color-text-primary);color:var(--color-text-primary);font-size:12px;padding:5px 14px;border-radius:var(--radius-sm);cursor:pointer;font-weight:600;font-family:var(--font-sans);}
.btn-confirm:hover{background:var(--color-surface-sunken);}
.btn-ask{background:var(--color-action-wash);border:1px solid var(--color-action-subtle);color:var(--color-action);font-size:12px;padding:5px 14px;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-sans);font-weight:500;}
.btn-lock{background:var(--color-action);color:var(--color-text-inverse);border:none;border-radius:var(--radius-lg);padding:12px 20px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;font-family:var(--font-sans);line-height:1.3;transition:background var(--transition-base);flex-shrink:0;}
.btn-lock:hover{background:var(--color-action-hover);}
/* CHECKLIST */
.chklist{border:1px solid var(--color-border-default);border-radius:var(--radius-md);padding:14px;background:var(--color-surface-sunken);margin-bottom:14px;}
.chklist h3{font-size:10px;font-weight:600;color:var(--color-text-tertiary);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;}
.cli{display:flex;gap:8px;align-items:flex-start;font-size:12px;color:var(--color-text-secondary);line-height:1.55;margin-bottom:5px;font-weight:300;}
.cdot{width:4px;height:4px;border-radius:50%;background:var(--color-border-strong);flex-shrink:0;margin-top:6px;}
/* PROCESSING */
.pcard{border:1px solid var(--color-border-default);border-radius:var(--radius-lg);padding:18px;margin-bottom:14px;background:var(--color-surface-sunken);}
.pbar-wrap{background:var(--color-border-default);border-radius:var(--radius-full);height:4px;margin-bottom:10px;overflow:hidden;}
.pbar{height:4px;border-radius:var(--radius-full);background:var(--color-brand);transition:width .3s;}
.plabel{font-size:12px;color:var(--color-text-tertiary);text-align:center;margin-bottom:6px;font-weight:300;}
.psteps{font-size:11px;color:var(--color-text-tertiary);display:flex;gap:6px;align-items:center;justify-content:center;flex-wrap:wrap;}
.psteps .ds{color:var(--color-success-text);font-weight:500;}
.psteps .cs{color:var(--color-action);font-weight:500;}
/* HEALTH CHECK */
.frow{border:1px solid var(--color-border-default);border-radius:var(--radius-md);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;background:var(--color-surface-sunken);}
.fname{font-size:13px;font-weight:600;color:var(--color-text-primary);}
.fmeta{font-size:11px;color:var(--color-text-tertiary);margin-top:2px;font-weight:300;}
.up-badge{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);font-size:10px;font-weight:600;padding:3px 10px;border-radius:var(--radius-full);white-space:nowrap;}
.hcgrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:var(--space-2);margin-bottom:18px;}
.hccard{border-radius:var(--radius-md);padding:12px 14px;border:1px solid var(--color-border-default);background:var(--color-surface-sunken);}
.hccard.hrd{border-left:3px solid var(--color-danger-text);background:var(--color-danger-surface);}
.hccard.sft{border-left:3px solid var(--color-warning-text);background:var(--color-warning-surface);}
.hccard.wrn{border-left:3px solid var(--color-border-strong);}
.hccard.gd{border-left:3px solid var(--color-success-text);background:var(--color-success-surface);}
.hcn{font-family:var(--font-mono);font-size:20px;font-weight:600;color:var(--color-text-primary);letter-spacing:-0.02em;}
.hcn.gd{color:var(--color-success-text);}
.hcl{font-size:11px;color:var(--color-text-secondary);margin-top:2px;}
.hcs{font-size:10px;color:var(--color-text-tertiary);margin-top:2px;font-weight:300;}
.shdr{display:flex;align-items:center;gap:8px;margin-bottom:8px;margin-top:4px;}
.shdr h2{font-size:12px;font-weight:600;color:var(--color-text-secondary);}
.stag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:var(--radius-sm);}
.t-must{background:var(--color-danger-surface);color:var(--color-danger-text);border:1px solid var(--color-danger-border);}
.t-dec{background:var(--color-warning-surface);color:var(--color-warning-text);border:1px solid var(--color-warning-border);}
.t-info{background:var(--color-surface-sunken);color:var(--color-text-tertiary);}
.bcard{border-left:3px solid var(--color-danger-border);border-radius:0 var(--radius-md) var(--radius-md) 0;background:var(--color-danger-surface);border-top:1px solid var(--color-danger-border);border-right:1px solid var(--color-danger-border);border-bottom:1px solid var(--color-danger-border);padding:12px 14px;margin-bottom:8px;}
.bcard.sft{border-left-color:var(--color-warning-border);background:var(--color-warning-surface);border-color:var(--color-warning-border);}
.bcard.wrn{border-left-color:var(--color-border-strong);background:var(--color-surface-sunken);border-color:var(--color-border-default);}
.bcard h3{font-size:12px;font-weight:600;color:var(--color-text-primary);margin-bottom:5px;}
.bcard p{font-size:12px;color:var(--color-text-secondary);line-height:1.5;margin-bottom:3px;font-weight:300;}
.gbanner{background:var(--color-success-surface);border:1px solid var(--color-success-border);border-radius:var(--radius-md);padding:10px 14px;font-size:12px;color:var(--color-success-text);margin-bottom:14px;font-weight:500;}
.tbtable{width:100%;border-collapse:collapse;}
.tbtable td{padding:9px 12px;border-bottom:1px solid var(--color-border-default);font-size:12px;font-weight:300;color:var(--color-text-secondary);}
.tbtable tr:last-child td{border-bottom:none;}
.tbtable .val{color:var(--color-text-primary);font-weight:500;}
.b-bal{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);font-size:10px;padding:2px 8px;border-radius:var(--radius-full);font-weight:600;white-space:nowrap;}
.b-rvw{background:var(--color-warning-surface);color:var(--color-warning-text);border:1px solid var(--color-warning-border);font-size:10px;padding:2px 8px;border-radius:var(--radius-full);font-weight:600;white-space:nowrap;}
.twrap{border:1px solid var(--color-border-default);border-radius:var(--radius-md);overflow:hidden;margin-bottom:14px;}
/* SIGN-OFF CONFIRMATION MODAL */
.so-modal-overlay{position:fixed;inset:0;background:rgba(8,7,6,.45);z-index:300;display:flex;align-items:center;justify-content:center;}
.so-modal{background:var(--color-surface-raised);border-radius:var(--radius-lg);width:480px;max-width:calc(100vw - 32px);box-shadow:0 8px 40px rgba(8,7,6,.18);overflow:hidden;}
.so-modal-hdr{padding:18px 20px 14px;border-bottom:1px solid var(--color-border-default);}
.so-modal-title{font-size:15px;font-weight:700;color:var(--color-text-primary);letter-spacing:-0.01em;margin-bottom:4px;}
.so-modal-subtitle{font-size:12px;color:var(--color-text-tertiary);font-weight:300;line-height:1.5;}
.so-modal-body{padding:16px 20px;}
.so-modal-offline{background:var(--color-warning-surface);border:1px solid var(--color-warning-border);border-radius:var(--radius-md);padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--color-warning-text);line-height:1.6;}
.so-modal-offline strong{display:block;font-weight:600;margin-bottom:3px;}
.so-modal-check{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px;cursor:pointer;}
.so-modal-check input{margin-top:2px;flex-shrink:0;cursor:pointer;}
.so-modal-check-lbl{font-size:13px;color:var(--color-text-primary);line-height:1.5;}
.so-modal-summary{background:var(--color-surface-sunken);border-radius:var(--radius-md);padding:10px 14px;margin-bottom:14px;}
.so-modal-summary-title{font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;}
.so-modal-ftr{padding:14px 20px;border-top:1px solid var(--color-border-default);display:flex;gap:8px;justify-content:flex-end;}
.btn-so-cancel{background:var(--color-surface-raised);border:1px solid var(--color-border-default);color:var(--color-text-secondary);font-size:13px;padding:9px 18px;border-radius:var(--radius-md);cursor:pointer;font-family:var(--font-sans);}
.btn-so-confirm{background:var(--color-action);color:var(--color-text-inverse);border:none;font-size:13px;font-weight:600;padding:9px 18px;border-radius:var(--radius-md);cursor:pointer;font-family:var(--font-sans);transition:background var(--transition-base);}
.btn-so-confirm:hover{background:var(--color-action-hover);}
.btn-so-confirm:disabled{opacity:.35;cursor:default;}
.drawer-overlay{position:fixed;inset:0;background:rgba(8,7,6,.35);z-index:200;opacity:0;transition:opacity .2s ease;pointer-events:none;}
.drawer-overlay.open{opacity:1;pointer-events:all;}
.drawer{position:fixed;top:0;right:0;width:480px;max-width:100vw;height:100vh;background:var(--color-surface-raised);z-index:201;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .22s ease;box-shadow:-4px 0 24px rgba(8,7,6,.12);}
.drawer.open{transform:translateX(0);}
.drawer-hdr{padding:16px 20px;border-bottom:1px solid var(--color-border-default);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-shrink:0;}
.drawer-title{font-size:14px;font-weight:600;color:var(--color-text-primary);line-height:1.4;}
.drawer-sub{font-size:11px;color:var(--color-text-tertiary);margin-top:2px;font-weight:300;}
.drawer-close{width:28px;height:28px;border-radius:var(--radius-sm);border:1px solid var(--color-border-default);background:var(--color-surface-sunken);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--color-text-tertiary);flex-shrink:0;line-height:1;}
.drawer-close:hover{background:var(--color-surface-base);}
.drawer-body{flex:1;overflow-y:auto;padding:14px 20px;}
.drawer-footer{padding:14px 20px;border-top:1px solid var(--color-border-default);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;}
.drawer-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--color-border-subtle);gap:10px;}
.drawer-item:last-child{border-bottom:none;}
.drawer-item-left{flex:1;min-width:0;}
.drawer-item-code{font-family:var(--font-mono);font-size:11px;color:var(--color-text-tertiary);}
.drawer-item-name{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-top:1px;}
.drawer-item-note{font-size:11px;color:var(--color-warning-text);margin-top:2px;font-weight:300;}
/* SUCCESS / COMPLETE */
.sucscreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;text-align:center;padding:36px 20px;}
.succircle{width:56px;height:56px;border-radius:50%;background:var(--color-success-surface);display:flex;align-items:center;justify-content:center;margin-bottom:18px;}
.succheck{color:var(--color-success-text);font-size:24px;font-weight:700;}
.sucscreen h2{font-size:20px;font-weight:700;color:var(--color-text-primary);margin-bottom:6px;letter-spacing:-0.01em;}
.sucscreen .sub{font-size:13px;color:var(--color-text-tertiary);margin-bottom:18px;font-weight:300;}
.pills{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:24px;}
.pill{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);font-size:11px;padding:3px 10px;border-radius:var(--radius-full);font-weight:500;}
/* VENDOR */
.scards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:var(--space-2);margin-bottom:14px;}
.scard{border-radius:var(--radius-md);padding:12px 14px;border:1px solid var(--color-border-default);background:var(--color-surface-sunken);}
.scard.grn{background:var(--color-success-surface);border-color:var(--color-success-border);}
.scard.amb{background:var(--color-warning-surface);border-color:var(--color-warning-border);}
.snum{font-family:var(--font-mono);font-size:20px;font-weight:600;color:var(--color-text-primary);letter-spacing:-0.02em;}
.snum.grn{color:var(--color-success-text);}
.snum.amb{color:var(--color-warning-text);}
.slbl{font-size:11px;color:var(--color-text-secondary);margin-top:2px;}
.ssub{font-size:10px;color:var(--color-text-tertiary);margin-top:2px;font-weight:300;}
.vtable{width:100%;border-collapse:collapse;font-size:12px;}
.vtable th{text-align:left;font-size:10px;font-weight:600;color:var(--color-text-tertiary);letter-spacing:.07em;text-transform:uppercase;padding:8px 10px;border-bottom:1px solid var(--color-border-default);background:var(--color-surface-sunken);}
.vtable td{padding:9px 10px;border-bottom:1px solid var(--color-border-subtle);color:var(--color-text-secondary);vertical-align:middle;font-weight:300;}
.xrow td{border-bottom:none;}
.xform-td{padding:12px 14px !important;background:var(--color-brand-wash) !important;border-bottom:1px solid var(--color-brand-subtle) !important;}
.xinner{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;}
.ff{display:flex;flex-direction:column;gap:4px;}
.ff label{font-size:10px;color:var(--color-text-tertiary);font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.ff select,.ff input{height:32px;border:1px solid var(--color-border-default);border-radius:var(--radius-sm);padding:0 10px;font-size:12px;color:var(--color-text-primary);background:var(--color-surface-raised);outline:none;font-family:var(--font-sans);}
.ff select:focus,.ff input:focus{border-color:var(--color-action);}
.ff select{width:140px;}
.ff input{width:170px;}
.ff input.nt{width:150px;}
.btn-save{background:var(--color-action);color:var(--color-text-inverse);border:none;border-radius:var(--radius-sm);padding:0 14px;font-size:12px;font-weight:600;cursor:pointer;height:32px;font-family:var(--font-sans);align-self:flex-end;transition:background var(--transition-base);}
.btn-save:hover{background:var(--color-action-hover);}
.btn-skip{background:none;border:none;color:var(--color-text-tertiary);font-size:12px;cursor:pointer;height:32px;padding:0 6px;align-self:flex-end;font-family:var(--font-sans);}
.t-supp{background:var(--color-action-wash);color:var(--color-action);border:1px solid var(--color-action-subtle);font-size:10px;padding:2px 7px;border-radius:var(--radius-sm);font-weight:600;white-space:nowrap;}
.t-cust{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);font-size:10px;padding:2px 7px;border-radius:var(--radius-sm);font-weight:600;white-space:nowrap;}
.btn-add{background:var(--color-surface-raised);border:1px solid var(--color-brand-subtle);color:var(--color-brand);font-size:11px;padding:3px 10px;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-sans);font-weight:500;transition:background var(--transition-base);}
.btn-add:hover{background:var(--color-brand-wash);}
/* DIMENSION CARDS */
.dim-card{border:1px solid var(--color-border-default);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:12px;background:var(--color-surface-raised);}
.dim-card.low{border-color:var(--color-warning-border);background:var(--color-warning-surface);}
.dim-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.dim-name{font-size:14px;font-weight:700;color:var(--color-text-primary);}
.conf-h{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);font-size:10px;font-weight:600;padding:2px 8px;border-radius:var(--radius-full);}
.conf-l{background:var(--color-warning-surface);color:var(--color-warning-text);border:1px solid var(--color-warning-border);font-size:10px;font-weight:600;padding:2px 8px;border-radius:var(--radius-full);}
.dim-desc{font-size:12px;color:var(--color-text-secondary);margin-bottom:10px;line-height:1.5;font-weight:300;}
.dv-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.dv-p{background:var(--color-surface-sunken);color:var(--color-text-secondary);border:1px solid var(--color-border-default);font-size:11px;padding:2px 9px;border-radius:var(--radius-sm);}
.dv-p.unk{background:var(--color-warning-surface);color:var(--color-warning-text);border-color:var(--color-warning-border);}
.dim-acts{display:flex;gap:8px;align-items:center;}
.conf-tag{font-size:11px;color:var(--color-success-text);font-weight:600;}
/* REVIEW SECTIONS */
.rev-sec{border:1px solid var(--color-border-default);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden;}
.rev-hdr{padding:11px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:var(--color-surface-sunken);}
.rev-hdr:hover{background:var(--color-border-subtle);}
.rev-trow{display:flex;align-items:center;gap:8px;}
.rev-chev{font-size:10px;color:var(--color-text-tertiary);transition:transform .2s;display:inline-block;}
.rev-chev.op{transform:rotate(180deg);}
.rev-title{font-size:13px;font-weight:700;color:var(--color-text-primary);}
.rev-cnt{font-size:11px;color:var(--color-text-tertiary);background:var(--color-border-subtle);padding:1px 7px;border-radius:var(--radius-full);}
.rev-acts{display:flex;gap:10px;}
.btn-flag,.btn-edit-sm{background:none;border:none;color:var(--color-action);font-size:11px;cursor:pointer;font-family:var(--font-sans);font-weight:500;}
.rev-body{padding:0 14px 4px;background:var(--color-surface-raised);}
.rev-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--color-border-subtle);}
.rev-row:last-of-type{border-bottom:none;}
.rev-val{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--color-text-primary);}
.rev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.rev-txns{font-size:11px;color:var(--color-text-tertiary);font-family:var(--font-mono);}
.unres-row{background:var(--color-warning-surface);border-left:3px solid var(--color-warning-border);padding:9px 12px;margin:0 0 8px;border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-size:12px;color:var(--color-warning-text);display:flex;gap:8px;}
.add-link{font-size:12px;color:var(--color-action);cursor:pointer;padding:7px 0;display:block;font-weight:500;background:none;border:none;font-family:var(--font-sans);}
/* SIGN-OFF */
.so-table{width:100%;border-collapse:collapse;margin-bottom:14px;}
.so-table th{text-align:left;font-size:10px;font-weight:600;color:var(--color-text-tertiary);letter-spacing:.06em;text-transform:uppercase;padding:8px 12px;border-bottom:1px solid var(--color-border-default);background:var(--color-surface-sunken);}
.so-table td{padding:11px 12px;border-bottom:1px solid var(--color-border-subtle);font-size:13px;vertical-align:middle;color:var(--color-text-secondary);font-weight:300;}
.so-table tr:last-child td{border-bottom:none;}
.sv-pills{display:flex;gap:5px;flex-wrap:wrap;}
.sv-p{background:var(--color-surface-sunken);color:var(--color-text-secondary);border:1px solid var(--color-border-default);font-size:11px;padding:2px 8px;border-radius:var(--radius-sm);}
.sv-pend{background:var(--color-warning-surface);color:var(--color-warning-text);border-color:var(--color-warning-border);font-size:11px;padding:2px 8px;border-radius:var(--radius-sm);}
.so-box{border:1px solid var(--color-border-default);border-radius:var(--radius-lg);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:14px;background:var(--color-surface-sunken);}
.so-lbl{font-size:10px;font-weight:600;color:var(--color-text-tertiary);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px;}
.so-text{font-size:13px;color:var(--color-text-primary);line-height:1.5;margin-bottom:3px;}
.so-note{font-size:11px;color:var(--color-text-tertiary);font-weight:300;}

/* ── STAGE 3 ── */
.coa-prog-wrap{background:var(--color-border-default);border-radius:var(--radius-full);height:6px;margin:6px 0 4px;overflow:hidden;}
.coa-prog-bar{height:6px;border-radius:var(--radius-full);transition:width .4s;}
.coa-prog-bar.grn{background:#166638;}
.coa-prog-bar.tc{background:var(--color-brand);}
.coa-sec{border:1px solid var(--color-border-default);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden;}
.coa-sec-hdr{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:var(--color-surface-sunken);}
.coa-sec-hdr.grn-l{border-left:3px solid var(--color-success-text);}
.coa-sec-hdr.amb-l{border-left:3px solid var(--color-warning-text);}
.coa-sec-hdr.red-l{border-left:3px solid var(--color-danger-text);}
.coa-sec-hdr.neu-l{border-left:3px solid var(--color-border-strong);}
.coa-sec-hdr:hover{background:var(--color-border-subtle);}
.coa-sec-title{font-size:13px;font-weight:600;color:var(--color-text-primary);display:flex;align-items:center;gap:8px;}
.coa-sec-desc{font-size:12px;color:var(--color-text-tertiary);margin-top:3px;font-weight:300;}
.coa-badge{font-size:10px;font-weight:600;padding:2px 9px;border-radius:var(--radius-full);white-space:nowrap;}
.coa-badge.auto{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);}
.coa-badge.action{background:var(--color-warning-surface);color:var(--color-warning-text);border:1px solid var(--color-warning-border);}
.coa-badge.iares{background:var(--color-danger-surface);color:var(--color-danger-text);border:1px solid var(--color-danger-border);}
.coa-badge.locked{background:var(--color-surface-sunken);color:var(--color-text-tertiary);border:1px solid var(--color-border-default);}
/* exceptions table */
.exc-toolbar{background:var(--color-surface-sunken);border:1px solid var(--color-border-default);border-radius:var(--radius-md);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.exc-showing{font-size:12px;color:var(--color-text-tertiary);font-weight:300;}
.exc-confirmed{font-size:12px;color:var(--color-action);font-weight:600;}
.exc-selects{display:flex;gap:8px;}
.exc-selects select{height:28px;border:1px solid var(--color-border-default);border-radius:var(--radius-sm);padding:0 8px;font-size:11px;color:var(--color-text-secondary);background:var(--color-surface-raised);font-family:var(--font-sans);outline:none;}
.exc-table{width:100%;border-collapse:collapse;font-size:12px;}
.exc-table th{text-align:left;font-size:10px;font-weight:600;color:var(--color-text-tertiary);letter-spacing:.07em;text-transform:uppercase;padding:7px 10px;border-bottom:1px solid var(--color-border-default);background:var(--color-surface-sunken);}
.exc-table td{padding:10px;border-bottom:1px solid var(--color-border-subtle);color:var(--color-text-secondary);vertical-align:middle;font-weight:300;}
.exc-table tr:last-child td{border-bottom:none;}
.exc-table tr.conf-row td{background:var(--color-success-surface);}
.leg-code{font-family:var(--font-mono);font-size:10px;color:var(--color-text-tertiary);display:block;margin-bottom:2px;}
.leg-name{font-size:13px;font-weight:500;color:var(--color-text-primary);}
.tos-code{font-family:var(--font-mono);font-size:10px;color:var(--color-text-tertiary);display:block;margin-bottom:2px;}
.tos-name{font-size:12px;color:var(--color-text-secondary);}
.fs-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:var(--radius-sm);white-space:nowrap;}
.fs-pl{background:#EBF0FD;color:#1338A8;}
.fs-bs{background:#E8F5EE;color:#166638;}
.conf-pct{font-size:12px;font-weight:700;color:var(--color-warning-text);}
.conf-bar-wrap{background:var(--color-border-default);border-radius:2px;height:3px;margin-top:3px;overflow:hidden;}
.conf-bar{height:3px;border-radius:2px;background:var(--color-warning-text);}
.exc-btn-confirm{background:var(--color-surface-raised);border:1px solid var(--color-border-strong);color:var(--color-text-primary);font-size:11px;padding:4px 10px;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-sans);font-weight:600;}
.exc-btn-override{background:var(--color-surface-raised);border:1px solid var(--color-border-default);color:var(--color-text-tertiary);font-size:11px;padding:4px 10px;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-sans);}
.exc-btn-confirmed{background:var(--color-success-surface);border:1px solid var(--color-success-border);color:var(--color-success-text);font-size:11px;padding:4px 10px;border-radius:var(--radius-sm);font-weight:600;}
.exc-input{height:28px;border:1.5px solid var(--color-action);border-radius:var(--radius-sm);padding:0 8px;font-size:12px;color:var(--color-text-primary);background:var(--color-surface-raised);font-family:var(--font-sans);outline:none;width:180px;}
.exc-btn-save{background:var(--color-action);color:var(--color-text-inverse);border:none;border-radius:var(--radius-sm);padding:4px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font-sans);}
.exc-btn-cancel{background:none;border:none;color:var(--color-text-tertiary);font-size:11px;cursor:pointer;font-family:var(--font-sans);margin-left:4px;}
.bulk-banner{background:var(--color-brand-wash);border-left:3px solid var(--color-brand);border-radius:0 var(--radius-md) var(--radius-md) 0;padding:12px 14px;margin:2px 0;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.bulk-text{font-size:12px;color:var(--color-text-secondary);font-weight:300;}
.bulk-text strong{font-weight:600;color:var(--color-text-primary);display:block;margin-bottom:2px;}
.bulk-actions{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.exc-btn-apply{background:var(--color-action);color:var(--color-text-inverse);border:none;border-radius:var(--radius-sm);padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-sans);white-space:nowrap;}
.exc-btn-indiv{background:none;border:none;color:var(--color-action);font-size:12px;cursor:pointer;font-family:var(--font-sans);font-weight:500;white-space:nowrap;}
/* sign-off table */
.so3-table{width:100%;border-collapse:collapse;font-size:12px;}
.so3-table td{padding:9px 12px;border-bottom:1px solid var(--color-border-subtle);vertical-align:middle;}
.so3-table tr:last-child td{border-bottom:none;}
.so3-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:var(--radius-full);white-space:nowrap;}
.so3-b-confirmed{background:var(--color-action-wash);color:var(--color-action);border:1px solid var(--color-action-subtle);}
.so3-b-ai{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);}
.so3-b-ia{background:var(--color-danger-surface);color:var(--color-danger-text);border:1px solid var(--color-danger-border);}
.so3-b-locked{background:var(--color-surface-sunken);color:var(--color-text-tertiary);border:1px solid var(--color-border-default);}
.so3-scroll{max-height:260px;overflow-y:auto;border:1px solid var(--color-border-default);border-radius:var(--radius-md);margin-bottom:14px;}
.warn-bar{border-left:3px solid var(--color-brand-subtle);background:var(--color-brand-wash);border-radius:0 var(--radius-md) var(--radius-md) 0;padding:10px 14px;margin-bottom:12px;display:flex;gap:10px;align-items:flex-start;}
.warn-bar-icon{color:var(--color-brand);font-size:13px;flex-shrink:0;}
.warn-bar-text{font-size:12px;color:var(--color-text-secondary);line-height:1.55;font-weight:300;}

/* ── MONTH CARDS (Stage 4 overview) ── */
.month-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:var(--space-2);margin-bottom:18px;}
.month-card{border:1px solid var(--color-border-default);border-radius:var(--radius-lg);padding:14px 16px;background:var(--color-surface-raised);cursor:pointer;transition:border-color var(--transition-base),box-shadow var(--transition-base);position:relative;}
.month-card:hover{border-color:var(--color-action-subtle);box-shadow:0 0 0 3px var(--color-action-wash);}
.month-card.mc-done{border-left:3px solid var(--color-success-text);background:var(--color-success-surface);}
.month-card.mc-active{border-left:3px solid var(--color-brand);background:var(--color-brand-wash);}
.month-card.mc-warn{border-left:3px solid var(--color-warning-text);background:var(--color-warning-surface);}
.month-card.mc-todo{border-left:3px solid var(--color-border-strong);}
.month-card.mc-pend{opacity:.55;cursor:default;}
.month-card.mc-pend:hover{border-color:var(--color-border-default);box-shadow:none;}
.mc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.mc-month{font-size:14px;font-weight:700;color:var(--color-text-primary);letter-spacing:-0.01em;}
.mc-card.mc-done .mc-month{color:var(--color-success-text);}
.mc-status{font-size:10px;font-weight:600;padding:2px 8px;border-radius:var(--radius-full);}
.mc-s-done{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);}
.mc-s-active{background:var(--color-brand-wash);color:var(--color-brand);border:1px solid var(--color-brand-subtle);}
.mc-s-warn{background:var(--color-warning-surface);color:var(--color-warning-text);border:1px solid var(--color-warning-border);}
.mc-s-pend{background:var(--color-surface-sunken);color:var(--color-text-disabled);border:1px solid var(--color-border-default);}
.mc-prog-wrap{background:var(--color-border-default);border-radius:var(--radius-full);height:3px;margin-bottom:10px;overflow:hidden;}
.mc-prog-bar{height:3px;border-radius:var(--radius-full);}
.mc-prog-bar.grn{background:var(--color-success-text);}
.mc-prog-bar.tc{background:var(--color-brand);}
.mc-prog-bar.amb{background:var(--color-warning-text);}
.mc-stats{display:flex;gap:10px;}
.mc-stat{flex:1;}
.mc-stat-n{font-size:15px;font-weight:700;font-family:var(--font-mono);color:var(--color-text-primary);letter-spacing:-0.02em;}
.mc-stat-n.grn{color:var(--color-success-text);}
.mc-stat-n.red{color:var(--color-danger-text);}
.mc-stat-n.amb{color:var(--color-warning-text);}
.mc-stat-l{font-size:10px;color:var(--color-text-tertiary);margin-top:1px;font-weight:300;}
.mc-var-flag{margin-top:8px;padding:4px 8px;border-radius:var(--radius-sm);font-size:10px;font-weight:600;display:flex;align-items:center;gap:5px;}
.mc-var-flag.has-var{background:var(--color-warning-surface);color:var(--color-warning-text);}
.mc-var-flag.no-var{background:var(--color-success-surface);color:var(--color-success-text);}

/* ── MODAL OVERLAY ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding-top:48px;overflow-y:auto;}
.modal-box{background:var(--color-surface-raised);border-radius:var(--radius-xl);width:100%;max-width:760px;box-shadow:0 20px 60px rgba(0,0,0,.25);margin:0 var(--space-4) var(--space-8);}
.modal-hdr{padding:20px 24px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.modal-title{font-size:18px;font-weight:700;color:var(--color-text-primary);letter-spacing:-0.01em;}
.modal-close{background:none;border:none;font-size:18px;color:var(--color-text-tertiary);cursor:pointer;padding:0;line-height:1;flex-shrink:0;margin-top:2px;}
.modal-close:hover{color:var(--color-text-primary);}
.modal-body{padding:16px 24px 24px;}

/* ── STAGE 4 ── */
.gl-queue-tabs{display:flex;gap:0;border-bottom:2px solid var(--color-border-default);margin-bottom:16px;overflow-x:auto;}
.gl-tab{padding:8px 14px;font-size:12px;font-weight:500;color:var(--color-text-tertiary);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font-sans);}
.gl-tab.active{color:var(--color-brand);border-bottom-color:var(--color-brand);font-weight:700;}
.gl-tab .tab-cnt{font-size:11px;color:var(--color-warning-text);font-weight:600;margin-left:4px;}
.gl-tab .tab-done{font-size:11px;color:var(--color-success-text);font-weight:600;margin-left:4px;}
.txn-card{border:1px solid var(--color-border-default);border-left:3px solid var(--color-warning-text);border-radius:0 var(--radius-lg) var(--radius-lg) 0;margin-bottom:12px;overflow:hidden;}
.txn-card.collapsed{cursor:pointer;}
.txn-card.collapsed:hover{background:var(--color-surface-sunken);}
.txn-header{padding:12px 16px;display:flex;align-items:flex-start;justify-content:space-between;}
.txn-ref{font-family:var(--font-mono);font-size:11px;color:var(--color-text-tertiary);}
.txn-date{font-size:11px;color:var(--color-text-tertiary);margin-top:2px;font-weight:300;}
.txn-desc{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-top:3px;}
.txn-amount{font-family:var(--font-mono);font-size:14px;font-weight:700;color:var(--color-text-primary);text-align:right;}
.txn-dr{font-size:11px;color:var(--color-action);font-weight:600;text-align:right;margin-top:2px;}
.txn-select{font-size:12px;color:var(--color-action);font-weight:500;text-align:right;cursor:pointer;padding:0 16px 12px;background:none;border:none;font-family:var(--font-sans);display:block;width:100%;}
.ai-cands{padding:0 16px 14px;border-top:1px solid var(--color-border-default);background:var(--color-surface-sunken);}
.ai-cands-lbl{font-size:10px;font-weight:600;color:var(--color-text-tertiary);letter-spacing:.06em;text-transform:uppercase;padding:10px 0 8px;}
.cand-row{border:1px solid var(--color-border-default);border-radius:var(--radius-md);padding:10px 12px;margin-bottom:6px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;background:var(--color-surface-raised);transition:border-color .15s;}
.cand-row:hover{border-color:var(--color-action-subtle);}
.cand-row.selected{border-color:var(--color-action);background:var(--color-action-wash);}
.cand-radio{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--color-border-strong);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.cand-radio.sel{border-color:var(--color-action);background:var(--color-action);}
.cand-radio.sel::after{content:'';width:6px;height:6px;border-radius:50%;background:#fff;}
.cand-rank{font-size:10px;color:var(--color-text-tertiary);font-weight:600;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0;margin-top:2px;min-width:22px;}
.cand-body{flex:1;}
.cand-title{font-size:13px;font-weight:600;color:var(--color-text-primary);display:flex;align-items:center;gap:6px;}
.cand-code{font-family:var(--font-mono);font-size:11px;color:var(--color-text-tertiary);}
.cand-fs{font-size:10px;font-weight:600;padding:1px 6px;border-radius:var(--radius-sm);}
.cand-dim{font-size:11px;color:var(--color-text-tertiary);margin-top:2px;font-weight:300;}
.cand-conf{font-size:11px;margin-top:4px;font-weight:300;}
.cand-conf .pct{font-weight:700;}
.cand-conf .pct.hi{color:var(--color-success-text);}
.cand-conf .pct.med{color:var(--color-warning-text);}
.cand-conf .pct.lo{color:var(--color-danger-text);}
.txn-footer{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--color-border-default);background:var(--color-surface-raised);}
.txn-similar{font-size:12px;color:var(--color-text-tertiary);font-weight:300;}
.txn-actions{display:flex;gap:8px;}
.btn-confirm-sel{background:var(--color-action);color:var(--color-text-inverse);border:none;border-radius:var(--radius-sm);padding:6px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-sans);transition:background .15s;}
.btn-confirm-sel:disabled{opacity:.35;cursor:default;}
.btn-confirm-sel:hover:not(:disabled){background:var(--color-action-hover);}
.btn-override-sel{background:var(--color-surface-raised);border:1px solid var(--color-border-default);color:var(--color-text-secondary);border-radius:var(--radius-sm);padding:6px 14px;font-size:12px;cursor:pointer;font-family:var(--font-sans);}
.exc-queue-row{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--color-border-subtle);}
.exc-queue-row:last-child{border-bottom:none;}
.exc-q-lbl{font-size:13px;color:var(--color-text-primary);}
.exc-q-cnt{font-family:var(--font-mono);font-size:13px;color:var(--color-text-secondary);}
.exc-q-owner{font-size:12px;color:var(--color-text-tertiary);font-weight:300;}
.exc-q-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:var(--radius-full);}
.exc-q-badge.inq{background:var(--color-warning-surface);color:var(--color-warning-text);border:1px solid var(--color-warning-border);}
.exc-q-badge.iares{background:var(--color-surface-sunken);color:var(--color-text-tertiary);border:1px solid var(--color-border-default);}
.arap-row{border:1px solid var(--color-border-default);border-radius:var(--radius-md);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--color-surface-sunken);margin-top:10px;}
.arap-text .title{font-size:13px;font-weight:600;color:var(--color-text-primary);margin-bottom:3px;}
.arap-text .sub{font-size:12px;color:var(--color-text-tertiary);font-weight:300;}
.arap-text .detail{font-size:12px;color:var(--color-warning-text);font-weight:500;margin-top:3px;}
.soft-block-badge{background:var(--color-warning-surface);color:var(--color-warning-text);border:1px solid var(--color-warning-border);font-size:11px;font-weight:600;padding:4px 10px;border-radius:var(--radius-full);white-space:nowrap;display:flex;align-items:center;gap:4px;}
/* sign-off review table */
.so4-table{width:100%;border-collapse:collapse;margin-bottom:16px;}
.so4-table th{text-align:left;font-size:10px;font-weight:600;color:var(--color-text-tertiary);letter-spacing:.06em;text-transform:uppercase;padding:8px 12px;border-bottom:1px solid var(--color-border-default);background:var(--color-surface-sunken);}
.so4-table td{padding:11px 12px;border-bottom:1px solid var(--color-border-subtle);font-size:13px;color:var(--color-text-secondary);font-weight:300;}
.so4-table tr:last-child td{border-bottom:none;}
.so4-b-complete{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);font-size:11px;font-weight:600;padding:2px 9px;border-radius:var(--radius-full);}

/* ── STAGE 5 ── */
.tb-tabs{display:flex;border-bottom:2px solid var(--color-border-default);margin-bottom:18px;}
.tb-tab{padding:8px 16px;font-size:13px;font-weight:500;color:var(--color-text-tertiary);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font-sans);display:flex;align-items:center;gap:6px;}
.tb-tab.active{color:var(--color-brand);border-bottom-color:var(--color-brand);font-weight:700;}
.tb-tab .tab-var{font-size:11px;padding:1px 6px;border-radius:var(--radius-full);}
.tb-tab .tab-var.has{background:var(--color-warning-surface);color:var(--color-warning-text);border:1px solid var(--color-warning-border);}
.tb-tab .tab-clean{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);font-size:11px;padding:1px 6px;border-radius:var(--radius-full);}
.tb3-cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:14px;}
.tb3-card{border-radius:var(--radius-md);padding:14px 16px;border:1px solid var(--color-border-default);background:var(--color-surface-sunken);}
.tb3-card.grn{background:var(--color-success-surface);border-color:var(--color-success-border);}
.tb3-card.amb{background:var(--color-warning-surface);border-color:var(--color-warning-border);}
.tb3-num{font-family:var(--font-mono);font-size:18px;font-weight:600;color:var(--color-text-primary);letter-spacing:-0.02em;}
.tb3-num.grn{color:var(--color-success-text);}
.tb3-lbl{font-size:11px;color:var(--color-text-secondary);margin-top:2px;font-weight:300;}
.tb3-balanced{font-size:13px;color:var(--color-success-text);font-weight:500;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.tb3-warn{font-size:13px;color:var(--color-warning-text);font-weight:500;margin-bottom:12px;}
.tb3-table{width:100%;border-collapse:collapse;font-size:12px;}
.tb3-table th{text-align:left;font-size:10px;font-weight:600;color:var(--color-text-tertiary);letter-spacing:.07em;text-transform:uppercase;padding:7px 10px;border-bottom:1px solid var(--color-border-default);background:var(--color-surface-sunken);}
.tb3-table td{padding:10px;border-bottom:1px solid var(--color-border-subtle);color:var(--color-text-secondary);font-weight:300;vertical-align:middle;}
.tb3-table tr:last-child td{border-bottom:none;}
.tb3-table .acct{font-size:12px;font-weight:500;color:var(--color-text-primary);}
.tb3-table .mono{font-family:var(--font-mono);font-size:12px;}
.var-pos{color:var(--color-success-text);font-weight:600;font-family:var(--font-mono);}
.var-neg{color:var(--color-danger-text);font-weight:600;font-family:var(--font-mono);}
.var-zero{color:var(--color-text-tertiary);font-family:var(--font-mono);}
.var-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:var(--radius-full);white-space:nowrap;}
.vb-exp{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);}
.vb-inv{background:var(--color-warning-surface);color:var(--color-warning-text);border:1px solid var(--color-warning-border);}
.tb3-row-highlight{border-left:3px solid var(--color-success-text);}
.tb3-row-warn{border-left:3px solid var(--color-warning-text);}
.links-row{font-size:13px;color:var(--color-text-secondary);font-weight:300;margin-bottom:14px;}
.links-row a{color:var(--color-action);font-weight:500;cursor:pointer;text-decoration:none;}
/* variance review cards */
.var-card{border-radius:var(--radius-lg);border:1px solid var(--color-border-default);overflow:hidden;margin-bottom:12px;}
.var-card.exp{border-left:3px solid var(--color-success-text);}
.var-card.inv{border-left:3px solid var(--color-warning-text);}
.var-card-hdr{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.var-card-hdr .title{font-size:14px;font-weight:700;color:var(--color-text-primary);}
.var-card-hdr .nums{font-size:12px;color:var(--color-text-secondary);font-weight:300;margin-top:2px;}
.var-card-hdr .nums .v{font-weight:600;}
.var-card-hdr .nums .vpos{color:var(--color-success-text);}
.var-card-hdr .nums .vneg{color:var(--color-danger-text);}
.sys-exp-box{background:#EBF0FD;border-radius:var(--radius-md);padding:12px 14px;margin:0 16px 12px;}
.sys-exp-lbl{font-size:10px;font-weight:700;color:var(--color-action);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.sys-exp-text{font-size:12px;color:var(--color-text-secondary);line-height:1.6;font-weight:300;}
.ia-note-box{background:var(--color-warning-surface);border-radius:var(--radius-md);padding:12px 14px;margin:0 16px 12px;}
.ia-note-lbl{font-size:10px;font-weight:700;color:var(--color-warning-text);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.ia-note-text{font-size:12px;color:var(--color-text-secondary);line-height:1.6;font-weight:300;}
.ia-note-attr{font-size:11px;color:var(--color-text-tertiary);margin-top:6px;font-style:italic;}
.var-card-footer{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--color-border-subtle);}
.var-auto-accepted{font-size:12px;color:var(--color-text-tertiary);font-weight:300;}
.btn-accept-reason{background:var(--color-action);color:var(--color-text-inverse);border:none;border-radius:var(--radius-sm);padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-sans);}
.btn-request-inv{background:var(--color-surface-raised);border:1px solid var(--color-border-default);color:var(--color-text-secondary);border-radius:var(--radius-sm);padding:7px 14px;font-size:12px;cursor:pointer;font-family:var(--font-sans);}
/* sign-off */
.so5-summary{border:1px solid var(--color-border-default);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:16px;}
.so5-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--color-border-subtle);}
.so5-row:last-child{border-bottom:none;}
.so5-label{flex:1;font-size:13px;color:var(--color-text-primary);}
.so5-reviewed{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);font-size:11px;font-weight:600;padding:2px 9px;border-radius:var(--radius-full);margin:0 16px;}
.so5-detail{font-size:12px;color:var(--color-text-tertiary);font-weight:300;}
.accepted-box{background:var(--color-surface-sunken);border:1px solid var(--color-border-default);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:14px;}
.accepted-box-lbl{font-size:10px;font-weight:600;color:var(--color-text-tertiary);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;}
.accepted-item{font-size:12px;color:var(--color-text-secondary);font-weight:300;margin-bottom:5px;line-height:1.5;}
.accepted-note{font-size:11px;color:var(--color-text-tertiary);font-weight:300;margin-top:8px;border-top:1px solid var(--color-border-default);padding-top:8px;}
.fin-pos-row{border-left:3px solid var(--color-brand-subtle);background:var(--color-brand-wash);border-radius:0 var(--radius-md) var(--radius-md) 0;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.fin-pos-lbl{font-size:12px;color:var(--color-text-secondary);font-weight:300;}
.fin-pos-date{font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--color-brand);}
.formal-box{border:2px solid var(--color-text-primary);border-radius:var(--radius-lg);padding:20px;text-align:center;margin-bottom:14px;}
.formal-box-lbl{font-size:10px;font-weight:600;color:var(--color-text-tertiary);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;border-bottom:1px solid var(--color-border-default);padding-bottom:10px;}
.formal-text{font-size:13px;color:var(--color-text-primary);line-height:1.7;margin-bottom:16px;}
.formal-text .mono{font-family:var(--font-mono);background:var(--color-surface-sunken);padding:1px 4px;border-radius:3px;}
.formal-sig{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--color-border-default);}
.formal-sig-name{font-size:12px;color:var(--color-text-secondary);font-weight:300;}
.btn-sign-seal{background:var(--color-action);color:var(--color-text-inverse);border:none;border-radius:var(--radius-md);padding:10px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font-sans);display:inline-flex;align-items:center;gap:8px;}
.proto-note{font-size:11px;color:var(--color-text-tertiary);font-weight:300;margin-top:8px;}

/* ── STAGE 6 ── */
.uat-card{border:1px solid var(--color-border-default);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden;transition:border-color var(--transition-base);}
.uat-card.passed{border-color:var(--color-success-border);background:var(--color-success-surface);}
.uat-card.flagged{border-color:var(--color-warning-border);}
.uat-card-hdr{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:12px;}
.uat-card-hdr:hover{background:var(--color-surface-sunken);}
.uat-card.passed .uat-card-hdr:hover{background:transparent;}
.uat-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;background:var(--color-surface-sunken);color:var(--color-text-tertiary);border:1.5px solid var(--color-border-default);}
.uat-num.done{background:var(--color-success-surface);color:var(--color-success-text);border-color:var(--color-success-border);}
.uat-num.flag{background:var(--color-warning-surface);color:var(--color-warning-text);border-color:var(--color-warning-border);}
.uat-num.active{background:var(--color-brand);color:var(--color-text-inverse);border-color:var(--color-brand);}
.uat-title{font-size:13px;font-weight:600;color:var(--color-text-primary);flex:1;}
.uat-card.passed .uat-title{color:var(--color-success-text);}
.uat-status{font-size:11px;font-weight:600;padding:3px 10px;border-radius:var(--radius-full);white-space:nowrap;flex-shrink:0;}
.uat-s-pending{background:var(--color-surface-sunken);color:var(--color-text-tertiary);border:1px solid var(--color-border-default);}
.uat-s-pass{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);}
.uat-s-flag{background:var(--color-warning-surface);color:var(--color-warning-text);border:1px solid var(--color-warning-border);}
.uat-s-active{background:var(--color-action-wash);color:var(--color-action);border:1px solid var(--color-action-subtle);}
.uat-body{padding:14px 16px;border-top:1px solid var(--color-border-default);background:var(--color-surface-raised);}
.uat-instr{font-size:12px;color:var(--color-text-secondary);font-weight:300;margin-bottom:12px;line-height:1.6;}
/* lookup widget */
.uat-lookup{display:flex;gap:8px;margin-bottom:10px;}
.uat-lookup input{flex:1;height:34px;border:1px solid var(--color-border-default);border-radius:var(--radius-sm);padding:0 12px;font-size:13px;color:var(--color-text-primary);background:var(--color-surface-raised);outline:none;font-family:var(--font-sans);}
.uat-lookup input:focus{border-color:var(--color-action);}
.btn-lookup{background:var(--color-action);color:var(--color-text-inverse);border:none;border-radius:var(--radius-sm);padding:0 16px;font-size:12px;font-weight:600;cursor:pointer;height:34px;font-family:var(--font-sans);white-space:nowrap;}
.btn-lookup:hover{background:var(--color-action-hover);}
/* result table */
.uat-result{border:1px solid var(--color-border-default);border-radius:var(--radius-md);overflow:hidden;margin-bottom:12px;}
.uat-result-hdr{background:var(--color-surface-sunken);padding:8px 12px;font-size:11px;font-weight:600;color:var(--color-text-tertiary);display:flex;justify-content:space-between;}
.uat-result table{width:100%;border-collapse:collapse;font-size:12px;}
.uat-result th{text-align:left;font-size:10px;font-weight:600;color:var(--color-text-tertiary);letter-spacing:.06em;text-transform:uppercase;padding:7px 10px;border-bottom:1px solid var(--color-border-default);background:var(--color-surface-sunken);}
.uat-result td{padding:9px 10px;border-bottom:1px solid var(--color-border-subtle);color:var(--color-text-secondary);font-weight:300;}
.uat-result tr:last-child td{border-bottom:none;}
.uat-result .mono{font-family:var(--font-mono);}
.uat-result .overdue{color:var(--color-danger-text);font-weight:600;}
/* report mini */
.uat-report{border:1px solid var(--color-border-default);border-radius:var(--radius-md);overflow:hidden;margin-bottom:12px;}
.uat-report-hdr{background:var(--color-surface-sunken);padding:10px 14px;font-size:12px;font-weight:600;color:var(--color-text-primary);display:flex;justify-content:space-between;align-items:center;}
.uat-report-date{font-size:11px;color:var(--color-text-tertiary);font-weight:300;}
.uat-report table{width:100%;border-collapse:collapse;font-size:12px;}
.uat-report th{text-align:left;font-size:10px;font-weight:600;color:var(--color-text-tertiary);letter-spacing:.06em;text-transform:uppercase;padding:7px 12px;border-bottom:1px solid var(--color-border-default);background:var(--color-surface-sunken);}
.uat-report td{padding:9px 12px;border-bottom:1px solid var(--color-border-subtle);color:var(--color-text-secondary);font-weight:300;}
.uat-report tr:last-child td{border-bottom:none;}
.uat-report .total-row td{font-weight:700;color:var(--color-text-primary);border-top:2px solid var(--color-border-default);}
.uat-report .mono{font-family:var(--font-mono);}
/* txn search */
.uat-txn-result{border:1px solid var(--color-border-default);border-radius:var(--radius-md);padding:14px;margin-bottom:12px;background:var(--color-surface-sunken);}
.uat-txn-ref{font-family:var(--font-mono);font-size:11px;color:var(--color-text-tertiary);margin-bottom:4px;}
.uat-txn-desc{font-size:14px;font-weight:600;color:var(--color-text-primary);margin-bottom:8px;}
.uat-txn-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.uat-txn-field label{font-size:10px;color:var(--color-text-tertiary);font-weight:600;text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:2px;}
.uat-txn-field span{font-size:12px;color:var(--color-text-primary);font-family:var(--font-mono);}
/* pass/flag actions */
.uat-actions{display:flex;gap:8px;margin-top:4px;}
.btn-uat-pass{background:var(--color-success-surface);color:var(--color-success-text);border:1.5px solid var(--color-success-border);border-radius:var(--radius-sm);padding:7px 18px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font-sans);transition:background var(--transition-base);}
.btn-uat-pass:hover{background:var(--color-success-border);}
.btn-uat-flag{background:var(--color-surface-raised);color:var(--color-warning-text);border:1.5px solid var(--color-warning-border);border-radius:var(--radius-sm);padding:7px 18px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-sans);}
/* flag form */
.uat-flag-form{background:var(--color-warning-surface);border:1px solid var(--color-warning-border);border-radius:var(--radius-md);padding:12px;margin-top:10px;}
.uat-flag-form label{font-size:11px;font-weight:600;color:var(--color-warning-text);display:block;margin-bottom:6px;}
.uat-flag-form textarea{width:100%;border:1px solid var(--color-warning-border);border-radius:var(--radius-sm);padding:8px 10px;font-size:12px;font-family:var(--font-sans);color:var(--color-text-primary);background:var(--color-surface-raised);outline:none;resize:vertical;min-height:60px;}
.btn-send-flag{background:var(--color-warning-text);color:#fff;border:none;border-radius:var(--radius-sm);padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;margin-top:8px;font-family:var(--font-sans);}
/* urgency indicator */
.urgency-banner{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--radius-md);margin-bottom:12px;font-size:12px;font-weight:500;}
.urgency-banner.yellow{background:var(--color-warning-surface);color:var(--color-warning-text);border:1px solid var(--color-warning-border);}
.urgency-banner.red{background:var(--color-danger-surface);color:var(--color-danger-text);border:1px solid var(--color-danger-border);}
/* uat sign-off */
.uat-so-row{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(--color-border-subtle);gap:10px;}
.uat-so-row:last-child{border-bottom:none;}
.uat-so-num{width:20px;height:20px;border-radius:50%;background:var(--color-success-surface);color:var(--color-success-text);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.uat-so-task{flex:1;font-size:13px;color:var(--color-text-primary);}
.uat-so-badge{font-size:10px;font-weight:600;padding:2px 9px;border-radius:var(--radius-full);}
.uat-so-pass{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);}

/* ── STAGE 7 ── */
.ia-checklist{border:1px solid var(--color-border-default);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:16px;}
.ia-cl-hdr{padding:12px 16px;background:var(--color-surface-sunken);border-bottom:1px solid var(--color-border-default);display:flex;align-items:center;justify-content:space-between;}
.ia-cl-hdr-lbl{font-size:11px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.06em;}
.ia-cl-row{display:flex;align-items:flex-start;padding:11px 16px;border-bottom:1px solid var(--color-border-subtle);gap:12px;}
.ia-cl-row:last-child{border-bottom:none;}
.ia-cl-row.done-r{background:var(--color-success-surface);}
.ia-cl-row.active-r{background:var(--color-action-wash);}
.ia-cl-icon{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px;}
.ia-cl-icon.done-i{background:var(--color-success-surface);color:var(--color-success-text);border:1.5px solid var(--color-success-border);}
.ia-cl-icon.active-i{background:var(--color-action);color:#fff;}
.ia-cl-icon.pend-i{background:var(--color-surface-sunken);color:var(--color-text-disabled);border:1.5px solid var(--color-border-default);}
.ia-cl-body{flex:1;}
.ia-cl-title{font-size:13px;font-weight:500;color:var(--color-text-primary);}
.ia-cl-row.done-r .ia-cl-title{color:var(--color-success-text);}
.ia-cl-sub{font-size:12px;color:var(--color-text-tertiary);font-weight:300;margin-top:2px;}
.ia-cl-badge{font-size:10px;font-weight:600;padding:2px 9px;border-radius:var(--radius-full);flex-shrink:0;margin-top:2px;}
.ia-cl-badge.done-b{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);}
.ia-cl-badge.active-b{background:var(--color-action-wash);color:var(--color-action);border:1px solid var(--color-action-subtle);}
.ia-cl-badge.pend-b{background:var(--color-surface-sunken);color:var(--color-text-tertiary);border:1px solid var(--color-border-default);}
/* acknowledge box */
.ack-box{border:2px solid var(--color-action);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;background:var(--color-action-wash);}
.ack-box-lbl{font-size:10px;font-weight:700;color:var(--color-action);letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px;}
.ack-box-title{font-size:16px;font-weight:700;color:var(--color-text-primary);margin-bottom:10px;}
.ack-box ul{padding-left:16px;margin-bottom:14px;}
.ack-box ul li{font-size:13px;color:var(--color-text-secondary);line-height:1.7;font-weight:300;}
.ack-box ul li strong{color:var(--color-text-primary);font-weight:600;}
.btn-ack{background:var(--color-action);color:var(--color-text-inverse);border:none;border-radius:var(--radius-md);padding:10px 24px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font-sans);transition:background var(--transition-base);}
.btn-ack:hover{background:var(--color-action-hover);}
/* the switch */
.switch-screen{display:flex;flex-direction:column;align-items:center;text-align:center;padding:28px 20px;}
.switch-orb{width:80px;height:80px;border-radius:50%;background:var(--color-success-surface);border:3px solid var(--color-success-border);display:flex;align-items:center;justify-content:center;margin-bottom:20px;font-size:32px;animation:pulse-orb 2s ease-in-out infinite;}
@keyframes pulse-orb{0%,100%{box-shadow:0 0 0 0 rgba(22,102,56,.2);}50%{box-shadow:0 0 0 12px rgba(22,102,56,0);}}
.switch-title{font-size:24px;font-weight:700;color:var(--color-text-primary);margin-bottom:6px;letter-spacing:-0.02em;}
.switch-sub{font-size:13px;color:var(--color-text-tertiary);margin-bottom:22px;font-weight:300;max-width:480px;}
.activated-list{width:100%;max-width:500px;border:1px solid var(--color-success-border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:20px;text-align:left;}
.act-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--color-success-border);background:var(--color-success-surface);}
.act-row:last-child{border-bottom:none;}
.act-row-icon{color:var(--color-success-text);font-size:13px;flex-shrink:0;}
.act-row-text{font-size:12px;color:var(--color-success-text);font-weight:400;}
/* cashback card */
.cashback-card{width:100%;max-width:500px;border:2px solid var(--color-success-border);border-radius:var(--radius-xl);padding:20px;background:var(--color-success-surface);text-align:center;margin-bottom:20px;}
.cashback-lbl{font-size:10px;font-weight:700;color:var(--color-success-text);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;}
.cashback-amount{font-family:var(--font-mono);font-size:28px;font-weight:700;color:var(--color-success-text);letter-spacing:-0.02em;margin-bottom:4px;}
.cashback-sub{font-size:12px;color:var(--color-success-text);font-weight:300;opacity:.8;}
/* celebration */
.celebration{display:flex;flex-direction:column;align-items:center;text-align:center;padding:32px 20px 28px;}
.cel-icon{font-size:52px;margin-bottom:16px;}
.cel-title{font-size:26px;font-weight:700;color:var(--color-text-primary);margin-bottom:6px;letter-spacing:-0.02em;}
.cel-sub{font-size:14px;color:var(--color-text-secondary);margin-bottom:6px;font-weight:300;max-width:520px;}
.cel-org{font-size:14px;font-weight:600;color:var(--color-brand);margin-bottom:22px;}
/* journey timeline */
.journey{width:100%;max-width:580px;margin-bottom:22px;background:var(--color-surface-sunken);border-radius:var(--radius-lg);padding:16px 20px;}
.journey-lbl{font-size:10px;font-weight:700;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;}
.journey-track{display:flex;align-items:center;gap:0;margin-bottom:12px;}
.journey-node{display:flex;flex-direction:column;align-items:center;flex:1;}
.journey-dot{width:10px;height:10px;border-radius:50%;background:var(--color-brand);margin-bottom:4px;}
.journey-dot.end{background:var(--color-success-text);}
.journey-line{flex:1;height:2px;background:var(--color-brand);margin-bottom:14px;}
.journey-label{font-size:9px;color:var(--color-text-tertiary);text-align:center;font-weight:400;}
.journey-label strong{color:var(--color-text-primary);font-weight:700;font-size:10px;}
.journey-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.jstat{text-align:center;padding:8px;background:var(--color-surface-raised);border-radius:var(--radius-md);border:1px solid var(--color-border-default);}
.jstat-num{font-family:var(--font-mono);font-size:15px;font-weight:700;color:var(--color-text-primary);}
.jstat-lbl{font-size:10px;color:var(--color-text-tertiary);margin-top:2px;font-weight:300;}
/* unlocked modules */
.modules-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;width:100%;max-width:500px;margin-bottom:20px;text-align:left;}
.module-card{border:1px solid var(--color-border-default);border-radius:var(--radius-md);padding:12px 14px;background:var(--color-surface-raised);}
.module-card .icon{font-size:18px;margin-bottom:6px;}
.module-card .name{font-size:13px;font-weight:600;color:var(--color-text-primary);margin-bottom:2px;}
.module-card .desc{font-size:11px;color:var(--color-text-tertiary);font-weight:300;}
.legacy-note{font-size:12px;color:var(--color-text-tertiary);font-weight:300;max-width:460px;line-height:1.6;margin-bottom:22px;}
.audit-ref{font-family:var(--font-mono);font-size:11px;color:var(--color-text-tertiary);background:var(--color-surface-sunken);padding:6px 12px;border-radius:var(--radius-sm);margin-bottom:22px;border:1px solid var(--color-border-default);}
.btn-golive{background:var(--color-brand);color:var(--color-text-inverse);border:none;border-radius:var(--radius-lg);padding:13px 32px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font-sans);display:inline-flex;align-items:center;gap:8px;transition:background var(--transition-base);letter-spacing:-0.01em;}
.btn-golive:hover{background:var(--color-brand-hover);}

/* ── PHASE 0 ── */
.p0-shell{min-height:calc(100vh - 52px);background:var(--color-surface-base);display:flex;flex-direction:column;}
.p0-hero{background:var(--color-brand);padding:40px 56px 36px;}
.p0-kicker{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.p0-kicker::before{content:'';width:16px;height:2px;background:rgba(255,255,255,.4);display:block;}
.p0-hero h1{font-family:var(--font-display);font-size:clamp(32px,4vw,52px);font-weight:900;color:#fff;letter-spacing:-0.02em;line-height:1.05;margin-bottom:12px;}
.p0-hero h1 em{color:var(--color-brand-subtle);font-style:italic;}
.p0-hero-sub{font-size:15px;font-weight:300;color:rgba(255,255,255,.7);line-height:1.6;max-width:560px;}
.p0-body{flex:1;padding:32px 56px 40px;display:grid;grid-template-columns:1fr 340px;gap:32px;align-items:start;}
.p0-left{display:flex;flex-direction:column;gap:20px;}
/* entity card */
.p0-entity-card{border:1px solid var(--color-border-default);border-radius:var(--radius-lg);background:var(--color-surface-raised);overflow:hidden;}
.p0-entity-hdr{padding:12px 16px;background:var(--color-surface-sunken);border-bottom:1px solid var(--color-border-default);display:flex;align-items:center;justify-content:space-between;}
.p0-entity-lbl{font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.07em;}
.p0-entity-badge{background:var(--color-success-surface);color:var(--color-success-text);border:1px solid var(--color-success-border);font-size:10px;font-weight:600;padding:2px 9px;border-radius:var(--radius-full);}
.p0-entity-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;}
.p0-entity-field{padding:14px 16px;border-right:1px solid var(--color-border-default);}
.p0-entity-field:last-child{border-right:none;}
.p0-entity-field label{font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px;}
.p0-entity-field span{font-size:13px;font-weight:600;color:var(--color-text-primary);}
.p0-entity-field .mono{font-family:var(--font-mono);}
/* cashback card */
.p0-cashback{border:1px solid var(--color-border-default);border-radius:var(--radius-lg);background:var(--color-surface-raised);overflow:hidden;}
.p0-cashback-hdr{padding:12px 16px;background:var(--color-surface-sunken);border-bottom:1px solid var(--color-border-default);}
.p0-cashback-hdr-lbl{font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.07em;}
.p0-cashback-body{padding:16px;}
