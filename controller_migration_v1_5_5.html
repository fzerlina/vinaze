/* ── Consolidation map: tosCode → [indices] for rows that consolidate ── */
function getConsolidationMap(){
  var map={};
  EXC_ROWS.forEach(function(r,i){
    if(!r.tosCode||r.state==='tax'||r.state==='ia') return;
    if(!map[r.tosCode]) map[r.tosCode]=[];
    map[r.tosCode].push(i);
  });
  /* Only keep entries with >1 row */
  Object.keys(map).forEach(function(k){if(map[k].length<=1) delete map[k];});
  return map;
}
function getDimTagOptions(){
  /* Returns [{label, dim, val}] — label is "DimName: Value" */
  var confirmedDims=DIM_STATE.dims.filter(function(d){return d.enabled;});
  /* Fallback: if Controller hasn't reached Dimensions step yet, use all non-rejected dims */
  var sourceDims=confirmedDims.length>0
    ?confirmedDims
    :DIM_STATE.dims.filter(function(d){return d.enabled;});
  var opts=[];
  sourceDims.forEach(function(d){
    d.vals.filter(function(v){return v!=='?';}).forEach(function(v){
      opts.push({label:d.name+': '+v, dim:d.name, val:v});
    });
  });
  return opts;
}

/* renderDimTagsCell — chip-list + add-dropdown for multi-dimension tags per row.
   Shows existing tags as chips with × to remove. Below: a small <select> showing
   only options not already on this row. Picking one adds it.
   Per PRD: "One account can have multiple dimensions tied to it simultaneously". */
function renderDimTagsCell(r,i,dimOpts,isAutoRow){
  var tags=r.dimTags||[];
  if(dimOpts.length===0){
    return tags.length===0
      ?'<span style="color:var(--color-text-disabled);font-size:11px">— no dimensions —</span>'
      :tags.map(function(t){return'<span class="dim-chip">'+t+'</span>';}).join(' ');
  }
  /* Available options = dimOpts not already on this row */
  var available=dimOpts.filter(function(o){return tags.indexOf(o.label)<0;});
  var chipsHtml=tags.map(function(t,vi){
    return'<span class="dim-chip" style="font-size:10px">'+t
      +'<span class="dim-chip-x" onclick="removeDimTag('+i+','+vi+')">&times;</span>'
    +'</span>';
  }).join('');
  /* AI / Edited indicator */
  var indicator='';
  if(r.dimTagAI&&!r.dimTagsEdited&&tags.length===1&&tags[0]===r.dimTagAI){
    indicator='<span style="font-size:9px;color:var(--color-success-text);font-weight:300">AI</span>';
  } else if(r.dimTagsEdited){
    indicator='<span style="font-size:9px;color:var(--color-action);font-weight:300">Edited</span>';
  }
  /* Add-tag dropdown */
  var addDropdown='';
  if(available.length>0){
    var selOpts='<option value="">+ Add tag</option>'+available.map(function(o){return'<option value="'+o.label+'">'+o.label+'</option>';}).join('');
    addDropdown='<select style="font-size:10px;height:22px;border:1px solid var(--color-border-default);border-radius:var(--radius-sm);padding:0 4px;background:var(--color-surface-raised);color:var(--color-text-secondary);font-family:var(--font-sans);max-width:140px;margin-top:3px" onchange="addDimTag('+i+',this.value);this.value=\'\'">'+selOpts+'</select>';
  }
  return'<div style="display:flex;flex-direction:column;gap:3px;align-items:flex-start">'
    +(chipsHtml?'<div style="display:flex;gap:3px;flex-wrap:wrap;align-items:center">'+chipsHtml+(indicator?' '+indicator:'')+'</div>':'')
    +addDropdown
  +'</div>';
}

    atOpts+='<optgroup label="P&L">';
    plTypes.forEach(function(t){
      var lbl=t.replace('P&L · ','');
      atOpts+='<option value="'+t+'"'+(S3.atFilter===t?' selected':'')+'>'+lbl+'</option>';
    });
    atOpts+='</optgroup>';
  }

  var toolbar='<div class="exc-toolbar" style="flex-wrap:wrap;gap:10px;margin-bottom:10px;align-items:center">'
    +'<div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">'
      +'<span style="font-size:11px;color:var(--color-text-tertiary);font-weight:300">Show:</span>'
      +fBtn('all','All ('+totalRows+')')
      +fBtn('unmapped','Unmapped ('+unmappedTotal+')')
      +fBtn('mapped','Mapped ('+(counts.confirmed+counts.auto)+')')
      +fBtn('ia','IA ('+counts.ia+')')
      +fBtn('tax','Tax ('+counts.tax+')')
      +(counts.archived>0?fBtn('archived','Archived ('+counts.archived+')'):'')
    +'</div>'
    +'<div style="display:flex;align-items:center;gap:5px">'
      +'<span style="font-size:11px;color:var(--color-text-tertiary);font-weight:300">Account type:</span>'
      +'<select style="font-size:11px;height:26px;border:1px solid var(--color-border-default);border-radius:var(--radius-sm);padding:0 8px;background:var(--color-surface-raised);color:var(--color-text-primary);font-family:var(--font-sans);max-width:200px" onchange="s3SetAT(this.value)">'+atOpts+'</select>'
    +'</div>'
    +'<div style="display:flex;align-items:center;gap:5px">'
      +'<span style="font-size:11px;color:var(--color-text-tertiary);font-weight:300">Sort:</span>'
      +'<button class="exc-filt-btn'+(S3.sort==='conf'?' exc-filt-active':'')+'" onclick="s3SetSort(\'conf\')">Confidence</button>'

    +'<div style="margin-left:auto"><button class="btn-ghost" style="font-size:11px" onclick="showMappingSummaryModal()">&#9432; Mapping summary</button></div>'
  +'</div>';

  /* ── apply filters ── */
  var filtered=EXC_ROWS.map(function(r,i){return{r:r,i:i};}).filter(function(obj){
    var r=obj.r;
    /* Cleanup-task filter takes precedence — overrides other filters */
    if(S3.cleanupFilter){
      return r.cleanupTaskId===S3.cleanupFilter;
    }
    if(S3.filter==='unmapped') return r.state==='unmapped'||r.state==='pending';
    if(S3.filter==='mapped')   return r.state==='confirmed'||r.state==='auto';
    if(S3.filter==='auto')     return r.state==='auto';
    if(S3.filter==='ia')       return r.state==='ia';
    if(S3.filter==='tax')      return r.state==='tax';
    if(S3.filter==='archived') return r.state==='archived';
    return true;
  });
  if(!S3.cleanupFilter&&S3.atFilter&&S3.atFilter!=='all'){
    filtered=filtered.filter(function(obj){return obj.r.fs===S3.atFilter;});
  }
  if(!S3.cleanupFilter&&S3.fsFilter!=='all'){
    filtered=filtered.filter(function(obj){
      if(!obj.r.fs) return false;
      return S3.fsFilter==='pl'?obj.r.fs.startsWith('P&L'):obj.r.fs.startsWith('BS');

  /* ── sort ── */
  filtered.sort(function(a,b){
    var order={unmapped:0,pending:1,confirmed:2,auto:3,ia:4,tax:5,archived:6};
    var ao=order[a.r.state]||7, bo=order[b.r.state]||7;
    if(ao!==bo) return ao-bo;
    if(S3.sort==='conf'){
      var ac=a.r.conf===null||a.r.conf===undefined?999:a.r.conf;
      var bc=b.r.conf===null||b.r.conf===undefined?999:b.r.conf;
      return ac-bc;
    }
    return a.r.legCode.localeCompare(b.r.legCode);
  });

  /* ── pagination ── */
  var totalFiltered=filtered.length;
  var totalPages=Math.max(1,Math.ceil(totalFiltered/S3.PAGE_SIZE));
  S3.page=Math.min(S3.page,totalPages-1);
  var pageStart=S3.page*S3.PAGE_SIZE;
  var pageRows=filtered.slice(pageStart,pageStart+S3.PAGE_SIZE);

  /* ── progress: single big-anchor "X / Y reviewed" with bar ──
     Reviewed = decisions made (mapped via confirmed+auto, plus archived).
     Total reviewable = all rows except tax-locked (which are pre-mapped automatically). */
  var reviewedNow=counts.confirmed+counts.auto+counts.archived;
  var reviewableTotal=totalRows-counts.tax;
  var pct=reviewableTotal>0?Math.round(reviewedNow/reviewableTotal*100):100;
  var progressColor=pct>=100?'var(--color-success-text)':'var(--color-brand)';
  var stickyProgress='<div style="background:var(--color-surface-raised);border:1px solid var(--color-border-default);border-radius:var(--radius-md);padding:18px 20px;margin-bottom:12px">'
    +'<div style="display:flex;align-items:baseline;justify-content:space-between;gap:14px;margin-bottom:10px">'
      +'<div style="display:flex;align-items:baseline;gap:10px">'
        +'<span style="font-size:32px;font-weight:600;color:var(--color-text-primary);font-family:var(--font-mono);line-height:1">'+reviewedNow+'</span>'
        +'<span style="font-size:18px;color:var(--color-text-tertiary);font-weight:300;font-family:var(--font-mono);line-height:1">/ '+reviewableTotal+'</span>'
        +'<span style="font-size:13px;color:var(--color-text-secondary);font-weight:500;margin-left:6px">accounts reviewed</span>'
      +'</div>'
      +'<span style="font-size:11px;color:var(--color-text-tertiary);font-weight:300">'+(counts.tax>0?counts.tax+' tax-locked excluded':'')+'</span>'
    +'</div>'
    +'<div style="background:var(--color-border-default);border-radius:var(--radius-full);height:8px;overflow:hidden">'
      +'<div style="width:'+pct+'%;height:8px;background:'+progressColor+';border-radius:var(--radius-full);transition:width 250ms ease"></div>'
    +'</div>'
  +'</div>';

  /* ── bulk-action bar — appears when ≥1 row selected ── */
  var selectedIdxs=Object.keys(S3.selected).filter(function(k){return S3.selected[k];}).map(function(k){return parseInt(k,10);});
  var visibleSet={};
  filtered.forEach(function(obj){visibleSet[obj.i]=true;});
  /* Selection trimmed to actionable rows (unmapped or pending) inside the visible filter */
  selectedIdxs=selectedIdxs.filter(function(idx){
    var r=EXC_ROWS[idx];
    return visibleSet[idx]&&(r.state==='unmapped'||r.state==='pending');
  });
  var selectedCount=selectedIdxs.length;
  var dimOptsForBulk=getDimTagOptions();
  var klayList=getKlayAccountList();
  var bulkBar='';
  if(selectedCount>0){
    /* Map dropdown — all Klay accounts grouped by FS */
    var mapOpts='<option value="">Map to Klay\u2026</option>';
    var mapBySection={};
    klayList.forEach(function(k){
      var s=k.fs||'Other';
      if(!mapBySection[s]) mapBySection[s]=[];
      mapBySection[s].push(k);
    });
    Object.keys(mapBySection).forEach(function(section){
      mapOpts+='<optgroup label="'+section+'">';
      mapBySection[section].forEach(function(k){
        mapOpts+='<option value="'+k.code+'">'+k.code+' \u00b7 '+k.name+'</option>';
      });
      mapOpts+='</optgroup>';
    });
    var bulkMapSelect='<select id="bulk-map-select" style="font-size:11px;height:28px;border:1px solid var(--color-border-default);border-radius:var(--radius-sm);padding:0 8px;background:var(--color-surface-raised);color:var(--color-text-primary);font-family:var(--font-sans);max-width:200px">'+mapOpts+'</select>';

    var bulkDimSelect='<select id="bulk-dim-select" style="font-size:11px;height:28px;border:1px solid var(--color-border-default);border-radius:var(--radius-sm);padding:0 8px;background:var(--color-surface-raised);color:var(--color-text-primary);font-family:var(--font-sans);max-width:180px"><option value="">Add tag\u2026</option>'
      +dimOptsForBulk.map(function(o){return'<option value="'+o.label+'">'+o.label+'</option>';}).join('')
    +'</select>';

    bulkBar='<div style="background:var(--color-action-wash);border:1.5px solid var(--color-action-subtle);border-radius:var(--radius-md);padding:9px 14px;display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap">'
      +'<span style="font-size:12px;font-weight:600;color:var(--color-action)">'+selectedCount+' row'+(selectedCount>1?'s':'')+' selected</span>'
      +'<div style="flex:1"></div>'
      +'<div style="display:flex;align-items:center;gap:5px">'+bulkMapSelect
      +'<button class="btn-lock" style="font-size:11px;padding:6px 10px" onclick="bulkMap()">Map &rarr;</button></div>'
      +'<button class="exc-btn-override" style="font-size:11px;padding:6px 12px" onclick="bulkArchive()">Archive '+selectedCount+'</button>'
      +'<div style="display:flex;align-items:center;gap:5px">'+bulkDimSelect
      +'<button class="btn-ghost" style="font-size:11px;padding:6px 10px" onclick="bulkApplyDimTag()">Apply tag</button></div>'
      +'<button class="btn-ghost" style="font-size:11px" onclick="bulkClear()">Clear</button>'
    +'</div>';
  }


  /* ── build table rows ── */
  var consMap=getConsolidationMap();
  var dimOpts=getDimTagOptions();
  var rows=pageRows.map(function(obj){
    var r=obj.r, i=obj.i;
    var fsCls=r.fs&&r.fs.startsWith('P&L')?'fs-pl':r.fs&&r.fs.startsWith('BS')?'fs-bs':'';
    var fsCell=r.fs?'<span class="fs-badge '+fsCls+'">'+r.fs+'</span>':'<span style="font-size:11px;color:var(--color-text-tertiary)">—</span>';

    /* ── CONFIRMED ── */
    if(r.state==='confirmed'){
      var isBulkAnchor=(S3.lastConfirmedIdx===i)&&S3.bulkGroup&&S3.bulkGroup.indices.length>0;
      var dimTagCell=(function(){
        var tags=r.dimTags||[];
        if(tags.length===0) return '<span style="color:var(--color-text-disabled);font-size:11px">— none —</span>';
        var chips=tags.map(function(t){return'<span class="dim-chip" style="font-size:10px;background:var(--color-success-surface);border-color:var(--color-success-border);color:var(--color-success-text)">'+t+'</span>';}).join(' ');
        var suffix=r.dimTagAI&&!r.dimTagsEdited&&tags.length===1&&tags[0]===r.dimTagAI
          ?' <span style="font-size:10px;color:var(--color-success-text);font-weight:300">AI</span>'
          :r.dimTagsEdited
          ?' <span style="font-size:10px;color:var(--color-action);font-weight:300">Edited</span>'
          :'';
        return'<div style="display:flex;flex-wrap:wrap;gap:3px;align-items:center">'+chips+suffix+'</div>';
      })();
      var rowHtml='<tr style="background:var(--color-success-surface)">'
        +'<td></td>'
        +'<td>'
          +'<div style="font-family:var(--font-mono);font-size:11px;color:var(--color-success-text);opacity:.7">'+r.legCode+'</div>'
          +'<div style="font-size:12px;font-weight:500;color:var(--color-success-text)">'+r.legName+'</div>'
        +'</td>'
        +'<td>'
          +'<div style="font-family:var(--font-mono);font-size:11px;color:var(--color-success-text);opacity:.7">'+r.tosCode+'</div>'
          +'<div style="font-size:12px;font-weight:500;color:var(--color-success-text)">'+r.tosName+'</div>'
        +'</td>'
        +'<td>'+dimTagCell+'</td>'
        +'<td>'+fsCell+'</td>'
        +'<td><span style="font-size:11px;font-weight:600;color:var(--color-success-text)">&#10003; Confirmed</span></td>'
        +'<td><button class="exc-btn-override" onclick="overrideRow('+i+')">Override</button></td>'
        +'</tr>';
      if(isBulkAnchor){
        var bg=S3.bulkGroup;
        if(!S3.bulkInlineExpanded){
          var nameList=bg.indices.map(function(idx){return'<span style="font-family:var(--font-mono);font-size:10px">'+EXC_ROWS[idx].legCode+'</span> '+EXC_ROWS[idx].legName;}).join(' &nbsp;&middot;&nbsp; ');
          rowHtml+='<tr><td colspan="6" style="padding:0"><div class="bulk-banner"><div class="bulk-text"><strong>'+bg.indices.length+' similar account'+(bg.indices.length>1?'s':'')+' share the same mapping &rarr; '+bg.tosCode+' &middot; '+bg.tosName+'</strong><div style="margin-top:3px;font-size:11px;color:var(--color-action)">'+nameList+'</div></div><div class="bulk-actions"><button class="exc-btn-apply" onclick="applyBulk()">Apply to '+bg.indices.length+' &#10003;</button><button class="exc-btn-indiv" onclick="expandBulkInline()">Review individually &#8964;</button></div></div></td></tr>';
        } else {
          rowHtml+='<tr><td colspan="6" style="padding:0"><div style="background:var(--color-action-wash);border-top:1px solid var(--color-action-subtle);border-bottom:1px solid var(--color-action-subtle)"><div style="padding:8px 14px 4px;font-size:11px;font-weight:600;color:var(--color-action)">Similar accounts — review individually</div>';
          bg.indices.forEach(function(idx){
            var br=EXC_ROWS[idx];
            var bfsCls=br.fs&&br.fs.startsWith('P&L')?'fs-pl':'fs-bs';
            rowHtml+='<div style="display:flex;align-items:center;gap:10px;padding:7px 14px;border-top:1px solid var(--color-action-subtle)"><div style="flex:1"><span class="leg-code">'+br.legCode+'</span><span class="leg-name">'+br.legName+'</span></div><div style="flex:1"><span class="tos-code">'+br.tosCode+'</span><span class="tos-name">'+br.tosName+'</span></div><div><span class="fs-badge '+bfsCls+'">'+br.fs+'</span></div><div style="width:90px">'+confTag(br.conf)+'</div><div style="white-space:nowrap"><button class="exc-btn-confirm" onclick="confirmBulkItem('+idx+')">Confirm</button> <button class="exc-btn-override" onclick="overrideRow('+idx+')">Override</button></div></div>';
          });
          rowHtml+='<div style="padding:6px 14px 8px;display:flex;justify-content:flex-end"><button class="btn-ghost" style="font-size:11px" onclick="applyBulk()">Confirm all '+bg.indices.length+' &#10003;</button></div></div></td></tr>';
        }
      }
      return rowHtml;
    }

    /* ── OVERRIDE INPUT ── */
    if(S3.overrideRow===i){
      return'<tr><td></td><td><span class="leg-code">'+r.legCode+'</span><span class="leg-name">'+r.legName+'</span></td>'
        +'<td colspan="2"><input class="exc-input" id="ov-inp-'+i+'" value="'+r.tosCode+' &middot; '+r.tosName+'" /></td>'
        +'<td></td>'
        +'<td>'+fsCell+'</td>'
        +'<td><button class="exc-btn-save" onclick="saveOverride('+i+')">Save</button><button class="exc-btn-cancel" onclick="cancelOverride()">Cancel</button></td></tr>';
    }

    /* ── NEEDS REVIEW (pending) ── */
    if(r.state==='pending'){
      var isConsolidated=!!consMap[r.tosCode];
      var dimDropdown=renderDimTagsCell(r,i,dimOpts,false);
      var isSelected=!!S3.selected[i];
      /* Visual mapping chain: legacy → Klay · dim tags */
      return'<tr'+(isSelected?' style="background:var(--color-action-wash)"':'')+'>'
        +'<td><input type="checkbox"'+(isSelected?' checked':'')+' onchange="toggleRowSelection('+i+',this.checked)" style="cursor:pointer" /></td>'
        +'<td>'
          +'<div style="display:flex;align-items:flex-start;gap:6px">'
            +'<div style="flex:1;min-width:0">'
              +'<div style="font-family:var(--font-mono);font-size:11px;color:var(--color-text-tertiary)">'+r.legCode+'</div>'
              +'<div style="font-size:12px;font-weight:500;color:var(--color-text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+r.legName+'</div>'
            +'</div>'
          +'</div>'
        +'</td>'
        +'<td>'
          +'<div>'
            +'<div style="font-family:var(--font-mono);font-size:11px;color:var(--color-text-tertiary)">'+r.tosCode+'</div>'
            +'<div style="font-size:12px;font-weight:500;color:var(--color-text-primary)">'+r.tosName+'</div>'
            +(isConsolidated?'<div style="font-size:10px;color:var(--color-action);margin-top:1px">&#8592; shared by '+consMap[r.tosCode].length+' accounts</div>':'')
          +'</div>'
        +'</td>'
        +'<td>'+dimDropdown+'</td>'
        +'<td>'+fsCell+'</td>'
        +'<td>'+confTag(r.conf)+'</td>'
        +'<td style="white-space:nowrap"><button class="exc-btn-confirm" onclick="confirmRow('+i+')">Confirm</button> <button class="exc-btn-override" onclick="overrideRow('+i+')">Override</button></td>'
        +'</tr>';
    }

    /* ── AUTO-MAPPED ── */
    if(r.state==='auto'){
      var isConsAuto=!!consMap[r.tosCode];
      var autoTagCell=renderDimTagsCell(r,i,dimOpts,true);
      return'<tr style="opacity:.8">'
        +'<td></td>'
        +'<td>'
          +'<div style="font-family:var(--font-mono);font-size:11px;color:var(--color-text-tertiary)">'+r.legCode+'</div>'
          +'<div style="font-size:12px;font-weight:500;color:var(--color-text-primary)">'+r.legName+'</div>'
        +'</td>'
        +'<td>'
          +'<div style="font-family:var(--font-mono);font-size:11px;color:var(--color-text-tertiary)">'+r.tosCode+'</div>'
          +'<div style="font-size:12px;font-weight:500;color:var(--color-text-primary)">'+r.tosName+'</div>'
        +'</td>'
        +'<td>'+autoTagCell+'</td>'
        +'<td>'+fsCell+'</td>'
        +'<td>'+confTag(r.conf)+'</td>'
        +'<td><button class="exc-btn-override" onclick="overrideRow('+i+')">Override</button></td>'
        +'</tr>';
    }

    /* ── IA RESOLVING ── */
    if(r.state==='ia'){
      return'<tr style="background:var(--color-warning-surface)">'
        +'<td></td>'
        +'<td>'
          +'<div style="font-family:var(--font-mono);font-size:11px;color:var(--color-warning-text);opacity:.7">'+r.legCode+'</div>'
          +'<div style="font-size:12px;font-weight:500;color:var(--color-warning-text)">'+r.legName+'</div>'
        +'</td>'
        +'<td colspan="2"><span style="font-size:11px;color:var(--color-warning-text);font-weight:300;font-style:italic">'+r.iaStatus+'</span></td>'
        +'<td><span style="font-size:11px;color:var(--color-text-disabled)">—</span></td>'
        +'<td><span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:var(--radius-full);background:var(--color-surface-raised);color:var(--color-warning-text);border:1px solid var(--color-warning-border)">IA working</span></td>'
        +'<td style="color:var(--color-text-disabled);font-size:11px">—</td>'
        +'</tr>';
    }

    /* ── TAX LOCKED ── */
    if(r.state==='tax'){
      return'<tr style="opacity:.55">'
        +'<td></td>'
        +'<td>'
          +'<div style="font-family:var(--font-mono);font-size:11px;color:var(--color-text-tertiary)">'+r.legCode+'</div>'
          +'<div style="font-size:12px;font-weight:500;color:var(--color-text-primary)">'+r.legName+'</div>'
        +'</td>'
        +'<td>'
          +'<div style="font-family:var(--font-mono);font-size:11px;color:var(--color-text-tertiary)">'+r.tosCode+'</div>'
          +'<div style="font-size:12px;font-weight:500;color:var(--color-text-primary)">'+r.tosName+'</div>'
        +'</td>'
        +'<td><span style="color:var(--color-text-disabled);font-size:11px">—</span></td>'
        +'<td>'+fsCell+'</td>'
        +'<td><span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:var(--radius-full);background:var(--color-surface-sunken);color:var(--color-text-tertiary);border:1px solid var(--color-border-default)">&#128274; Pre-mapped</span></td>'
        +'<td style="color:var(--color-text-disabled);font-size:11px">Locked</td>'
        +'</tr>';
    }

    /* ── UNMAPPED — newly added rows with no AI suggestion ── */
    if(r.state==='unmapped'){
      var isSelectedU=!!S3.selected[i];
      var pickerOpen=S3.mapPickerForRow===i;
      /* Status pill: differs based on cleanup task */
      var statusPill;
      var ct=r.cleanupTaskId?getCleanupTask(r.cleanupTaskId):null;
      if(ct&&ct.tier==='hard'&&ct.iaState==='awaiting'){
        statusPill='<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:var(--radius-full);background:var(--color-danger-surface);color:var(--color-danger-text);border:1px solid var(--color-danger-border);white-space:nowrap">\u26d4 In progress</span>';
      } else if(ct&&ct.tier==='hard'&&ct.iaState==='proposed'){
        statusPill='<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:var(--radius-full);background:var(--color-action-wash);color:var(--color-action);border:1px solid var(--color-action-subtle);white-space:nowrap">\u26d4 Resolution ready</span>';
      } else if(ct&&ct.tier==='soft'){
        statusPill='<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:var(--radius-full);background:var(--color-warning-surface);color:var(--color-warning-text);border:1px solid var(--color-warning-border);white-space:nowrap">\u26a0 '+ct.label+'</span>';
      } else {
        statusPill='<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:var(--radius-full);background:var(--color-surface-sunken);color:var(--color-text-tertiary);border:1px solid var(--color-border-default);white-space:nowrap">Unmapped</span>';
      }
      /* Block hard-block accounts from being mapped while IA is still working on them */
      var blockMap=ct&&ct.tier==='hard'&&ct.iaState==='awaiting';
      var dimDropdownU=renderDimTagsCell(r,i,dimOpts,false);
      return'<tr'+(isSelectedU?' style="background:var(--color-action-wash)"':'')+'>'
        +'<td><input type="checkbox"'+(isSelectedU?' checked':'')+' onchange="toggleRowSelection('+i+',this.checked)" style="cursor:pointer" /></td>'
        +'<td>'
          +'<div style="font-family:var(--font-mono);font-size:11px;color:var(--color-text-tertiary)">'+r.legCode+'</div>'
          +'<div style="font-size:12px;font-weight:500;color:var(--color-text-primary)">'+r.legName+'</div>'
        +'</td>'
        +'<td>'
          +(pickerOpen
            ?renderMapPicker(i)
            :'<span style="font-size:11px;color:var(--color-text-disabled);font-style:italic">— not mapped —</span>')
        +'</td>'
        +'<td>'+dimDropdownU+'</td>'
        +'<td>'+fsCell+'</td>'
        +'<td>'+statusPill+'</td>'
        +'<td style="white-space:nowrap">'
          +(pickerOpen?'':(blockMap
            ?'<button class="exc-btn-confirm" disabled style="opacity:.35;cursor:not-allowed" title="Resolution in progress">Map</button> '
            :'<button class="exc-btn-confirm" onclick="openMapPicker('+i+')">Map &#8250;</button> ')
          +'<button class="exc-btn-override" onclick="archiveRow('+i+')">Archive</button>')
        +'</td>'
      +'</tr>';
    }

    /* ── ARCHIVED — Controller archived ── */
    if(r.state==='archived'){
      return'<tr style="opacity:.5;background:var(--color-surface-sunken)">'
        +'<td></td>'
        +'<td>'
          +'<div style="font-family:var(--font-mono);font-size:11px;color:var(--color-text-tertiary)">'+r.legCode+'</div>'
          +'<div style="font-size:12px;font-weight:500;color:var(--color-text-tertiary);text-decoration:line-through">'+r.legName+'</div>'
        +'</td>'
        +'<td><span style="font-size:11px;color:var(--color-text-disabled);font-style:italic">— archived —</span></td>'
        +'<td><span style="color:var(--color-text-disabled);font-size:11px">—</span></td>'
        +'<td>'+(r.fs?fsCell:'<span style="font-size:11px;color:var(--color-text-disabled)">—</span>')+'</td>'
        +'<td><span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:var(--radius-full);background:var(--color-surface-sunken);color:var(--color-text-tertiary);border:1px solid var(--color-border-default);white-space:nowrap">&#128451; Archived</span></td>'
        +'<td style="white-space:nowrap"><button class="exc-btn-override" onclick="restoreRow('+i+')">Restore</button></td>'
      +'</tr>';
    }

    return'';
  }).join('');

  /* ── pagination ── */
  var pageInfo='Showing '+(totalFiltered===0?0:pageStart+1)+'–'+Math.min(pageStart+S3.PAGE_SIZE,totalFiltered)+' of '+totalFiltered;
  var pagination='<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-top:1px solid var(--color-border-default)">'
    +'<span style="font-size:11px;color:var(--color-text-tertiary);font-weight:300">'+pageInfo+'</span>'
    +'<div style="display:flex;gap:6px">'
      +'<button class="btn-ghost" style="font-size:11px"'+(S3.page===0?' disabled style="font-size:11px;opacity:.35;cursor:default"':' onclick="s3PrevPage()"')+'>&#8592; Previous</button>'
      +'<button class="btn-ghost" style="font-size:11px"'+(S3.page>=totalPages-1?' disabled style="font-size:11px;opacity:.35;cursor:default"':' onclick="s3NextPage()"')+'>Next &#8594;</button>'
    +'</div>'
  +'</div>';

  /* ── CoA cleanup panel — quality issues from ingestion ── */
  var cleanupPanel=renderCleanupPanel();

  /* ── Filter banner — only when a cleanup task filter is active ── */
  var filterBanner='';
  if(S3.cleanupFilter){
    var ft=getCleanupTask(S3.cleanupFilter);
    if(ft){
      var statusLine='';
      if(ft.tier==='hard'){
        if(ft.iaState==='awaiting') statusLine='In progress. Cannot map until resolved.';

/* ═══════════════════════════════════════
   CoA CLEANUP PANEL — grid-of-boxes layout
   Hard + soft blocks render as count-badge cards (3-up grid).
   Warnings render as compact pill row.
   Each card has a Filter button that filters the table to its rows.
═══════════════════════════════════════ */
function renderCleanupPanel(){
  var c=cleanupCounts();
  if(c.totalAll===0) return '';
  var allDone=c.resolvedAll===c.totalAll;
  var expanded=CLEANUP_STATE.panelExpanded;
  var headerColor=c.hardOpen>0?'var(--color-danger-text)':c.softOpen>0?'var(--color-warning-text)':'var(--color-success-text)';
  var headerBg=c.hardOpen>0?'var(--color-danger-surface)':c.softOpen>0?'var(--color-warning-surface)':'var(--color-success-surface)';
  var headerBorder=c.hardOpen>0?'var(--color-danger-border)':c.softOpen>0?'var(--color-warning-border)':'var(--color-success-border)';

  /* Header strip (clickable to toggle) */
  var header='<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:'+headerBg+';border-bottom:1px solid '+headerBorder+';cursor:pointer" onclick="cleanup_togglePanel()">'
    +'<span style="font-size:14px;color:'+headerColor+'">'+(allDone?'\u2713':'\u26a0')+'</span>'
    +'<div style="flex:1">'
      +'<div style="font-size:13px;font-weight:600;color:'+headerColor+'">CoA cleanup'+(allDone?' \u2014 all done':'')+'</div>'
      +'<div style="font-size:11px;color:var(--color-text-tertiary);font-weight:300;margin-top:1px">'
        +c.resolvedAll+' / '+c.totalAll+' tasks resolved'
        +(c.hardOpen>0?' \u00b7 <span style="color:var(--color-danger-text);font-weight:500">'+c.hardOpen+' hard block'+(c.hardOpen>1?'s':'')+' must be resolved before sign-off</span>':'')
      +'</div>'
    +'</div>'
    +'<span style="font-size:11px;color:var(--color-text-tertiary);font-weight:300">'+(expanded?'Collapse':'Expand')+' '+(expanded?'\u25b2':'\u25bc')+'</span>'
  +'</div>';

  if(!expanded){
    return'<div style="border:1px solid '+headerBorder+';border-radius:var(--radius-md);overflow:hidden;margin-bottom:12px">'+header+'</div>';
  }

  /* Card-grid section for hard + soft tiers */
  function tierGrid(tier,title,subtitle,iconColor){
    var tasks=CLEANUP_STATE.tasks.filter(function(t){return t.tier===tier;});
    if(tasks.length===0) return '';
    var cards=tasks.map(function(t){return renderCleanupCard(t);}).join('');
    return'<div style="padding:8px 14px 10px">'
      +'<div style="display:flex;align-items:baseline;gap:8px;padding:4px 0 8px">'
        +'<span style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:'+iconColor+'">'+title+'</span>'
        +'<span style="font-size:10px;color:var(--color-text-tertiary);font-weight:300">'+subtitle+'</span>'
      +'</div>'
      +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px">'+cards+'</div>'
    +'</div>';
  }

  /* Compact pill row for warnings */
  function warningsRow(){
    var tasks=CLEANUP_STATE.tasks.filter(function(t){return t.tier==='warning';});
    if(tasks.length===0) return '';
    var pills=tasks.map(function(t){return renderWarningPill(t);}).join('');
    return'<div style="padding:8px 14px 12px;border-top:1px solid var(--color-border-subtle)">'
      +'<div style="display:flex;align-items:baseline;gap:8px;padding:4px 0 6px">'
        +'<span style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--color-action)">Warnings</span>'
        +'<span style="font-size:10px;color:var(--color-text-tertiary);font-weight:300">Advisory \u2014 click to filter; click \u00d7 to dismiss</span>'
      +'</div>'
      +'<div style="display:flex;flex-wrap:wrap;gap:6px">'+pills+'</div>'
    +'</div>';
  }

  return'<div style="border:1px solid '+headerBorder+';border-radius:var(--radius-md);overflow:hidden;margin-bottom:12px;background:var(--color-surface-raised)">'
    +header
    +tierGrid('hard','Hard blocks','IA action \u00b7 Controller confirms \u00b7 gates sign-off','var(--color-danger-text)')
    +tierGrid('soft','Soft blocks','You can resolve','var(--color-warning-text)')
    +warningsRow()
  +'</div>';
}

function renderCleanupCard(t){
  /* Resolved card — green-tinted with check */
  if(t.resolved){
    return'<div style="border:1px solid var(--color-success-border);background:var(--color-success-surface);border-radius:var(--radius-md);padding:10px 12px;opacity:.75">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">'
        +'<span style="font-size:18px;color:var(--color-success-text)">\u2713</span>'
        +'<span style="font-size:10px;color:var(--color-success-text);font-weight:600">Resolved</span>'
      +'</div>'
      +'<div style="font-size:12px;font-weight:600;color:var(--color-success-text);text-decoration:line-through">'+t.label+'</div>'
      +'<div style="font-size:10px;color:var(--color-success-text);opacity:.8;margin-top:2px">'+t.count+' affected</div>'
    +'</div>';
  }

  /* Tier-specific styling */
  var iconChar,iconColor,borderColor,bgColor;
  if(t.tier==='hard'){iconChar='\u26d4';iconColor='var(--color-danger-text)';borderColor='var(--color-danger-border)';bgColor='var(--color-surface-raised)';}
  else{iconChar='\u26a0';iconColor='var(--color-warning-text)';borderColor='var(--color-warning-border)';bgColor='var(--color-surface-raised)';}

  /* Action area depends on tier and IA state */
  var actionsHtml='';
  if(t.tier==='hard'){
    if(t.iaState==='awaiting'){
      actionsHtml='<div style="display:flex;align-items:center;gap:6px"><div class="spin" style="width:10px;height:10px;border-width:2px"></div><span style="font-size:10px;color:var(--color-text-tertiary);font-style:italic">In progress</span></div>'
        +'<button class="btn-ghost" style="font-size:10px;padding:4px 9px" onclick="cleanup_filterTable(\''+t.id+'\')">Filter table</button>';
    } else if(t.iaState==='proposed'){
      actionsHtml='<button class="btn-lock" style="font-size:10px;padding:5px 10px" onclick="cleanup_iaConfirm(\''+t.id+'\')">Review proposal &rarr;</button>'
        +'<button class="btn-ghost" style="font-size:10px;padding:4px 9px" onclick="cleanup_filterTable(\''+t.id+'\')">Filter</button>';
    }
  } else {
    /* Soft */
    actionsHtml='<button class="btn-lock" style="font-size:10px;padding:5px 10px" onclick="cleanup_resolve(\''+t.id+'\')">'+t.bulkLabel+'</button>'
      +'<button class="btn-ghost" style="font-size:10px;padding:4px 9px" onclick="cleanup_filterTable(\''+t.id+'\')">Filter</button>';
  }

  return'<div style="border:1px solid '+borderColor+';background:'+bgColor+';border-radius:var(--radius-md);padding:10px 12px;display:flex;flex-direction:column;gap:6px;min-height:130px">'
    +'<div style="display:flex;align-items:center;justify-content:space-between">'
      +'<span style="font-size:24px;font-weight:600;font-family:var(--font-mono);color:'+iconColor+';line-height:1">'+t.count+'</span>'
      +'<span style="font-size:14px;color:'+iconColor+'">'+iconChar+'</span>'
    +'</div>'
    +'<div style="font-size:12px;font-weight:600;color:var(--color-text-primary);line-height:1.35">'+t.label+'</div>'
    +'<div style="font-size:10px;color:var(--color-text-tertiary);font-weight:300;line-height:1.5;flex:1">'+t.desc+'</div>'
    +'<div style="display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-top:auto">'+actionsHtml+'</div>'
  +'</div>';
}

function renderWarningPill(t){
  if(t.resolved||t.dismissed){
    var label=t.resolved?'Resolved':'Dismissed';
    return'<span style="display:inline-flex;align-items:center;gap:6px;padding:5px 9px;background:var(--color-surface-sunken);border:1px solid var(--color-border-default);border-radius:var(--radius-full);font-size:11px;color:var(--color-text-tertiary);opacity:.6">'
      +'<span style="font-family:var(--font-mono);font-weight:600">'+t.count+'</span>'
      +'<span style="text-decoration:line-through">'+t.label+'</span>'
      +'<span style="color:var(--color-text-tertiary);font-size:9px">&middot; '+label+'</span>'
      +'<button onclick="cleanup_undismiss(\''+t.id+'\')" style="background:none;border:none;color:var(--color-text-tertiary);cursor:pointer;padding:0;font-size:10px;text-decoration:underline">Undo</button>'
    +'</span>';
  }
  return'<span style="display:inline-flex;align-items:center;gap:5px;padding:5px 5px 5px 10px;background:var(--color-action-wash);border:1px solid var(--color-action-subtle);border-radius:var(--radius-full);font-size:11px;color:var(--color-action);font-weight:500">'
    +'<span style="font-family:var(--font-mono);font-weight:600">'+t.count+'</span>'
    +'<span onclick="cleanup_filterTable(\''+t.id+'\')" style="cursor:pointer">'+t.label+'</span>'
    +'<button onclick="event.stopPropagation();cleanup_dismiss(\''+t.id+'\')" title="Dismiss" style="background:none;border:none;color:var(--color-action);cursor:pointer;padding:0 4px;font-size:14px;line-height:1;opacity:.6">&times;</button>'
  +'</span>';
}

/* ── Map-to-Klay picker (inline popover within a row's Klay column) ── */
var KLAY_ACCOUNTS=null; /* memoized list of all Klay accounts for the picker */
function getKlayAccountList(){
  if(KLAY_ACCOUNTS) return KLAY_ACCOUNTS;
  var seen={};
  var list=[];
  EXC_ROWS.forEach(function(r){
    if(r.tosCode&&!seen[r.tosCode]){
      seen[r.tosCode]=true;
      list.push({code:r.tosCode,name:r.tosName,fs:r.fs});
    }
  });
  /* Sort by FS section then code */
  list.sort(function(a,b){
    if(a.fs!==b.fs) return (a.fs||'').localeCompare(b.fs||'');
    return a.code.localeCompare(b.code);
  });
  KLAY_ACCOUNTS=list;
  return list;
}

function setMapPickerQuery(q){
  MAP_PICKER_QUERY=(q||'').toLowerCase();
  /* Re-render only the picker without nuking the entire workspace
     so the input keeps focus. We re-render the whole thing for simplicity here. */
  var box=document.getElementById('map-picker-list');
  if(box){
    box.innerHTML=renderMapPickerListHTML(S3.mapPickerForRow);
  }
}
function selectMapTarget(idx,tosCode){
  var r=EXC_ROWS[idx];
  var t=getKlayAccountList().find(function(k){return k.code===tosCode;});
  if(!t||!r) return;
  r.tosCode=t.code;
  r.tosName=t.name;
  r.fs=t.fs;
  r.state='confirmed';
  r.conf=null;
  /* If the unmapped row was tied to a cleanup task, leave the task state alone —
     resolution of the task is separate (the IA proposal flow), but the row itself
     is now mapped. */
  S3.mapPickerForRow=null;
  rS3Workspace();
}
function archiveRow(idx){
  var r=EXC_ROWS[idx];
  if(!r) return;
  /* Preserve original state so restore is meaningful */
  r._prevState=r.state;
  r.state='archived';
  rS3Workspace();
}
function restoreRow(idx){
  var r=EXC_ROWS[idx];
  if(!r) return;
  r.state=r._prevState||'unmapped';
  delete r._prevState;
  rS3Workspace();
}

function renderMapPickerListHTML(idx){
  var list=getKlayAccountList();
  var q=MAP_PICKER_QUERY;
  var matches=q?list.filter(function(k){
    return (k.code+' '+k.name+' '+(k.fs||'')).toLowerCase().indexOf(q)>=0;
  }):list;
  var grouped={};
  matches.forEach(function(k){
    var section=k.fs||'Other';
    if(!grouped[section]) grouped[section]=[];
    grouped[section].push(k);
  });
  if(matches.length===0){
    return'<div style="padding:14px;text-align:center;font-size:11px;color:var(--color-text-tertiary)">No matches for "'+q+'"</div>';
  }
  var html='';
  Object.keys(grouped).forEach(function(section){
    html+='<div style="padding:5px 10px;background:var(--color-surface-sunken);font-size:9px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--color-border-subtle)">'+section+'</div>';
    grouped[section].forEach(function(k){
      html+='<div onclick="selectMapTarget('+idx+',\''+k.code+'\')" style="padding:7px 10px;border-bottom:1px solid var(--color-border-subtle);cursor:pointer;display:flex;align-items:baseline;gap:8px"'
        +' onmouseover="this.style.background=\'var(--color-action-wash)\'" onmouseout="this.style.background=\'\'">'
        +'<span style="font-family:var(--font-mono);font-size:10px;color:var(--color-text-tertiary);min-width:54px">'+k.code+'</span>'
        +'<span style="font-size:11px;color:var(--color-text-primary)">'+k.name+'</span>'
      +'</div>';
    });
  });
  return html;
}

function renderMapPicker(idx){
  return'<div style="border:1.5px solid var(--color-action);background:var(--color-surface-raised);border-radius:var(--radius-md);overflow:hidden;width:100%">'
    +'<div style="padding:6px 8px;border-bottom:1px solid var(--color-border-default);display:flex;gap:5px;align-items:center">'
      +'<input type="text" placeholder="Search Klay accounts\u2026" oninput="setMapPickerQuery(this.value)" autofocus style="flex:1;font-size:11px;padding:4px 7px;border:1px solid var(--color-border-default);border-radius:var(--radius-sm);background:var(--color-surface-sunken);color:var(--color-text-primary);font-family:var(--font-sans)" />'
      +'<button onclick="closeMapPicker()" style="background:none;border:none;color:var(--color-text-tertiary);cursor:pointer;font-size:14px;padding:0 4px">&times;</button>'
    +'</div>'
    +'<div id="map-picker-list" style="max-height:240px;overflow-y:auto;font-size:11px">'
      +renderMapPickerListHTML(idx)
    +'</div>'
  +'</div>';
}

function s3SetFS(v){S3.fsFilter=v;S3.page=0;rS3Workspace();}
function s3SetAT(v){S3.atFilter=v||'all';S3.page=0;rS3Workspace();}

/* ── Bulk selection actions (rows × actions) ── */
function toggleRowSelection(idx,checked){
  if(checked) S3.selected[idx]=true;
  else delete S3.selected[idx];
  rS3Workspace();
}
function bulkSelectAllVisible(checked){
  /* Apply to all currently-visible unmapped/pending rows under the active filter set. */
  var visible=EXC_ROWS.map(function(r,i){return{r:r,i:i};}).filter(function(obj){
    var r=obj.r;
    if(S3.cleanupFilter) return r.cleanupTaskId===S3.cleanupFilter&&(r.state==='unmapped'||r.state==='pending');
    if(S3.filter==='unmapped'&&r.state!=='unmapped'&&r.state!=='pending') return false;
    if(S3.filter==='mapped'&&r.state!=='confirmed'&&r.state!=='auto') return false;
    if(S3.filter==='auto'&&r.state!=='auto') return false;
    if(S3.filter==='ia'&&r.state!=='ia') return false;
    if(S3.filter==='tax'&&r.state!=='tax') return false;
    if(S3.filter==='archived'&&r.state!=='archived') return false;
    if(S3.atFilter&&S3.atFilter!=='all'&&r.fs!==S3.atFilter) return false;
    return r.state==='unmapped'||r.state==='pending';
  });
  if(checked){
    visible.forEach(function(obj){S3.selected[obj.i]=true;});
  } else {
    visible.forEach(function(obj){delete S3.selected[obj.i];});
  }
  rS3Workspace();
}
function bulkClear(){
  S3.selected={};
  rS3Workspace();
}
function bulkConfirm(){
  /* Confirm all selected pending rows */
  Object.keys(S3.selected).forEach(function(k){
    var idx=parseInt(k,10);
    var r=EXC_ROWS[idx];
    if(r&&r.state==='pending'){
      r.state='confirmed';
    }
  });
  S3.selected={};
  S3.bulkGroup=null;
  S3.lastConfirmedIdx=null;
  rS3Workspace();
}
function bulkMap(){
  /* Apply a chosen Klay account to all selected unmapped/pending rows */
  var sel=document.getElementById('bulk-map-select');
  if(!sel||!sel.value) return;
  var target=getKlayAccountList().find(function(k){return k.code===sel.value;});
  if(!target) return;
  Object.keys(S3.selected).forEach(function(k){
    var idx=parseInt(k,10);
    var r=EXC_ROWS[idx];
    if(!r) return;
    if(r.state==='unmapped'||r.state==='pending'){
      r.tosCode=target.code;
      r.tosName=target.name;
      r.fs=target.fs;
      r.state='confirmed';
      r.conf=null;
    }
  });
  S3.selected={};
  rS3Workspace();
}
function bulkArchive(){
  /* Archive all selected rows that are unmapped/pending */
  Object.keys(S3.selected).forEach(function(k){
    var idx=parseInt(k,10);
    var r=EXC_ROWS[idx];
    if(!r) return;
    if(r.state==='unmapped'||r.state==='pending'){
      r._prevState=r.state;
      r.state='archived';
    }
  });
  S3.selected={};
  rS3Workspace();
}
function bulkApplyDimTag(){
  var sel=document.getElementById('bulk-dim-select');
  if(!sel||!sel.value) return;
  var tag=sel.value;
  Object.keys(S3.selected).forEach(function(k){
    var idx=parseInt(k,10);
    var r=EXC_ROWS[idx];
    if(!r) return;
    if(!r.dimTags) r.dimTags=[];
    if(r.dimTags.indexOf(tag)<0){
      r.dimTags.push(tag);
      r.dimTagsEdited=true;
      r.dimTag=r.dimTags[0];
    }
  });
  /* Don't clear selection — Controller may want to add another tag, then bulk-confirm */
  rS3Workspace();
}

/* ── Mapping summary modal — replaces the old Summary substep.
   Auto-shown on first arrival in Mapping; reachable later via toolbar button. */
function showMappingSummaryModal(){
  var T=S3_TOTALS;
  var pendingNow=EXC_ROWS.filter(function(r){return r.state==='pending';}).length;
  var confirmedNow=EXC_ROWS.filter(function(r){return r.state==='confirmed';}).length;
  var reviewable=T.total-T.taxLocked;
  var reviewed=T.autoMapped+confirmedNow;

  var grps={};
  EXC_ROWS.forEach(function(r){if(r.tosCode&&r.state!=='tax') grps[r.tosCode]=(grps[r.tosCode]||0)+1;});
  var consCount=Object.keys(grps).filter(function(k){return grps[k]>1;}).length;

  var enabledDims=DIM_STATE.dims.filter(function(d){return d.enabled;});
  var dimLine=APP.s1.skipDims
    ?'<span style="color:var(--color-warning-text);font-weight:500">Dimensions skipped</span>'
    :enabledDims.length===0
      ?'<span style="color:var(--color-text-tertiary)">No dimensions enabled</span>'
      :enabledDims.map(function(d){return'<span class="sv-p" style="display:inline-block;margin-right:4px">'+d.name+'</span>';}).join('');

  var bodyHtml=''
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">'
      +'<div class="hccard gd" style="padding:14px"><div class="hcn gd">'+T.autoMapped+'</div><div class="hcl">Auto-mapped</div><div class="hcs">AI \u226580% &middot; no action</div></div>'
      +'<div class="hccard sft" style="padding:14px"><div class="hcn">'+pendingNow+'</div><div class="hcl">Needs your review</div><div class="hcs">Confirm or override</div></div>'
      +'<div class="hccard hrd" style="padding:14px"><div class="hcn danger">'+T.iaResolving+'</div><div class="hcl">IA resolving</div><div class="hcs">Cannot map &middot; IA assigning</div></div>'
      +'<div class="hccard wrn" style="padding:14px"><div class="hcn">'+T.taxLocked+'</div><div class="hcl">Tax accounts</div><div class="hcs">Pre-mapped &middot; locked</div></div>'
    +'</div>'
    +'<div style="background:var(--color-surface-sunken);border:1px solid var(--color-border-default);border-radius:var(--radius-md);padding:10px 14px;margin-bottom:12px">'
      +'<div style="font-size:11px;color:var(--color-text-tertiary);font-weight:300;margin-bottom:4px">Progress so far</div>'
      +'<div style="font-size:14px;color:var(--color-text-primary);font-weight:600"><span style="font-family:var(--font-mono)">'+reviewed+' / '+reviewable+'</span> accounts reviewed</div>'
    +'</div>'
    +(consCount>0?'<div style="background:var(--color-action-wash);border:1px solid var(--color-action-subtle);border-radius:var(--radius-md);padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--color-action);line-height:1.5"><strong style="font-weight:600">'+consCount+' consolidation group'+(consCount>1?'s':'')+'</strong> &mdash; multiple legacy accounts merging into one Klay account. Use dimension tags to preserve the distinction.</div>':'')
    +(function(){
      var cc=cleanupCounts();
      if(cc.totalAll===0) return '';
      var openCount=cc.hardOpen+cc.softOpen+cc.warnOpen;
      var color=cc.hardOpen>0?'var(--color-danger-text)':cc.softOpen>0?'var(--color-warning-text)':'var(--color-action)';
      var bg=cc.hardOpen>0?'var(--color-danger-surface)':cc.softOpen>0?'var(--color-warning-surface)':'var(--color-action-wash)';
      var border=cc.hardOpen>0?'var(--color-danger-border)':cc.softOpen>0?'var(--color-warning-border)':'var(--color-action-subtle)';
      return'<div style="background:'+bg+';border:1px solid '+border+';border-radius:var(--radius-md);padding:10px 14px;margin-bottom:12px;font-size:12px;color:'+color+';line-height:1.55">'
        +'<strong style="font-weight:600">'+cc.totalAll+' CoA cleanup task'+(cc.totalAll>1?'s':'')+' detected at ingestion</strong> \u2014 '
        +(cc.hardOpen>0?cc.hardOpen+' hard \u00b7 ':'')
        +(cc.softOpen>0?cc.softOpen+' soft \u00b7 ':'')
        +cc.warnOpen+' warnings. '
        +(cc.hardOpen>0?'Hard blocks gate sign-off; you\u2019ll resolve these in the workspace.':openCount===0?'All resolved or acknowledged.':'Resolve or dismiss in the workspace before sign-off.')

    if(checkRow)checkRow.style.display='';
    if(offline)offline.style.display='';
    if(btnEl)btnEl.textContent='Confirm & lock \u203a';
    if(cancelEl)cancelEl.textContent='Cancel';
  };
  if(overlayEl){overlayEl.style.display='flex';overlayEl.classList.add('open');}
}

function confirmRow(i){
  EXC_ROWS[i].state='confirmed';
  S3.overrideRow=null;
  S3.lastConfirmedIdx=i;
  S3.subStep='workspace';
  S3.bulkInlineExpanded=false;
  /* find similar pending rows: same tosCode, not this row, not yet confirmed */
  var similar=[];
  EXC_ROWS.forEach(function(r,idx){
    if(idx!==i&&r.state==='pending'&&r.tosCode===EXC_ROWS[i].tosCode){
      similar.push(idx);
    }
  });
  if(similar.length>0){
    S3.bulkGroup={tosCode:EXC_ROWS[i].tosCode,tosName:EXC_ROWS[i].tosName,indices:similar};
  } else {
    S3.bulkGroup=null;
  }
  rS3Exceptions();
}

function confirmBulkItem(idx){
  EXC_ROWS[idx].state='confirmed';
  /* remove from bulk group */
  if(S3.bulkGroup){
    S3.bulkGroup.indices=S3.bulkGroup.indices.filter(function(x){return x!==idx;});
    if(S3.bulkGroup.indices.length===0) S3.bulkGroup=null;
  }
  rS3Exceptions();
}

function applyBulk(){
  if(S3.bulkGroup){
    S3.bulkGroup.indices.forEach(function(idx){EXC_ROWS[idx].state='confirmed';});
  }
  S3.bulkGroup=null;
  S3.bulkInlineExpanded=false;
  rS3Exceptions();
}

function expandBulkInline(){
  S3.bulkInlineExpanded=true;
  rS3Exceptions();
}

function overrideRow(i){S3.overrideRow=i;rS3Workspace();}
function cancelOverride(){S3.overrideRow=null;rS3Workspace();}
function saveOverride(i){

  if(inp)EXC_ROWS[i].tosName=inp.value;
  EXC_ROWS[i].state='confirmed';
  S3.overrideRow=null;

}

/* ═══════════════════════════════════════
   STAGE 1, STEP 3, SUBSTEP 3: PREVIEW
   Shows the new Klay CoA structure:
   - Grouped by FS placement (Assets, Liabilities, Equity, Revenue, COGS, OpEx)
   - Each Klay account: code, name, FS placement
   - Consolidated accounts: legacy account refs nested under
   - Dimension tags shown as chips
   - Tax accounts: locked icon
═══════════════════════════════════════ */
function rS3Preview(){
  APP.screen='s3-preview';
  S3.subStep='preview';
  APP.s1.cur=2;
  updS1Sidebar();
  var a=document.getElementById('main');

  /* Group rows by tosCode (the new Klay account), preserving FS section order. */
  var groupOrder=[];
  var groupMap={};
  EXC_ROWS.forEach(function(r){
    if(!r.tosCode) return;
    if(!groupMap[r.tosCode]){
      groupMap[r.tosCode]={tosCode:r.tosCode,tosName:r.tosName,fs:r.fs,state:r.state,rows:[],tags:[]};
      groupOrder.push(r.tosCode);
    }
    groupMap[r.tosCode].rows.push(r);
    /* Aggregate dim tags across all legacy rows in this group */
    (r.dimTags||[]).forEach(function(t){
      if(groupMap[r.tosCode].tags.indexOf(t)<0) groupMap[r.tosCode].tags.push(t);
    });
  });

  /* Sort groups into FS sections. */
  var SECTION_ORDER=[
    {key:'BS · Current Assets',     label:'Current Assets'},
    {key:'BS · Non-current Assets', label:'Non-current Assets'},
    {key:'BS · Current Liabilities',label:'Current Liabilities'},
    {key:'BS · Non-current Liabilities',label:'Non-current Liabilities'},
    {key:'BS · Equity',             label:'Equity'},
    {key:'P&L · Revenue',           label:'Revenue'},
    {key:'P&L · COGS',              label:'Cost of Goods Sold'},
    {key:'P&L · OpEx',              label:'Operating Expenses'},
    {key:'P&L · Other Income',      label:'Other Income'},
    {key:'P&L · Other Expense',     label:'Other Expense'}
  ];
  var sections={};
  SECTION_ORDER.forEach(function(s){sections[s.key]=[];});
  var orphans=[];
  groupOrder.forEach(function(code){
    var g=groupMap[code];
    if(sections[g.fs])sections[g.fs].push(g);
    else orphans.push(g);
  });

  /* Build section blocks */
  var allTaxLocked=EXC_ROWS.filter(function(r){return r.state==='tax';}).length;
  var totalKlayAccounts=groupOrder.length;
  var consolidated=groupOrder.filter(function(c){return groupMap[c].rows.length>1;}).length;
  var withDims=groupOrder.filter(function(c){return groupMap[c].tags.length>0;}).length;

  function renderGroup(g){
    var isCons=g.rows.length>1;
    var isTax=g.state==='tax';
    var isIA=g.state==='ia';
    var nameColor=isTax?'var(--color-text-tertiary)':isIA?'var(--color-warning-text)':'var(--color-text-primary)';
    var iconRight=isTax
      ?'<span style="font-size:10px;font-weight:600;padding:1px 7px;border-radius:var(--radius-full);background:var(--color-surface-sunken);color:var(--color-text-tertiary);border:1px solid var(--color-border-default);flex-shrink:0">&#128274; Pre-mapped</span>'
      :isIA?'<span style="font-size:10px;font-weight:600;padding:1px 7px;border-radius:var(--radius-full);background:var(--color-warning-surface);color:var(--color-warning-text);border:1px solid var(--color-warning-border);flex-shrink:0">IA resolving</span>'
      :isCons?'<span style="font-size:10px;color:var(--color-action);font-weight:500;flex-shrink:0">'+g.rows.length+' merged</span>'
      :'';
    var tagsHtml=g.tags.length>0
      ?'<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:5px">'+g.tags.map(function(t){return'<span class="dim-chip" style="font-size:10px">'+t+'</span>';}).join('')+'</div>'
      :'';
    /* Legacy account references (only if consolidated, since otherwise the 1 legacy = the row itself) */
    var legacyRefs='';
    if(isCons||isTax||isIA){
      legacyRefs='<div style="margin-top:6px;padding-left:10px;border-left:2px solid var(--color-border-subtle)">'
        +g.rows.map(function(r){
          return'<div style="display:flex;align-items:center;gap:6px;font-size:10px;color:var(--color-text-tertiary);padding:1px 0">'
            +'<span style="font-family:var(--font-mono)">'+r.legCode+'</span>'
            +'<span>'+r.legName+'</span>'
          +'</div>';
        }).join('')
      +'</div>';
    }
    return'<div style="padding:10px 12px;border:1px solid var(--color-border-default);border-radius:var(--radius-md);background:'+(isTax?'var(--color-surface-sunken)':'var(--color-surface-raised)')+';margin-bottom:6px">'
      +'<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">'
        +'<div style="flex:1;min-width:0">'
          +'<div style="display:flex;align-items:baseline;gap:8px">'
            +'<span style="font-family:var(--font-mono);font-size:11px;color:var(--color-text-tertiary);flex-shrink:0">'+g.tosCode+'</span>'
            +'<span style="font-size:13px;font-weight:600;color:'+nameColor+'">'+g.tosName+'</span>'
          +'</div>'
          +tagsHtml
          +legacyRefs
        +'</div>'
        +iconRight
      +'</div>'
    +'</div>';
  }

  var sectionsHtml=SECTION_ORDER.map(function(s){
    var groups=sections[s.key];
    if(groups.length===0) return '';
    var fsCls=s.key.startsWith('P&L')?'fs-pl':'fs-bs';
    return'<div style="margin-bottom:18px">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--color-border-default)">'
        +'<span class="fs-badge '+fsCls+'" style="font-size:10px">'+s.key+'</span>'
        +'<span style="font-size:13px;font-weight:600;color:var(--color-text-primary)">'+s.label+'</span>'
        +'<span style="font-size:11px;color:var(--color-text-tertiary);font-weight:300">&middot; '+groups.length+' account'+(groups.length>1?'s':'')+'</span>'
      +'</div>'
      +groups.map(renderGroup).join('')
    +'</div>';
  }).join('');

  /* Orphans (rows that did not match a known FS section) */
  var orphansHtml=orphans.length>0
    ?'<div style="margin-bottom:18px">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--color-border-default)">'
        +'<span style="font-size:13px;font-weight:600;color:var(--color-text-primary)">Other</span>'
      +'</div>'

/* Multi-dimension handlers: add and remove tags from a row's dimTags array.
   Tags are "DimName: Value" labels matching getDimTagOptions(). */
function addDimTag(i,val){
  if(!val||val==='— select dimension —') return;
  if(!EXC_ROWS[i].dimTags) EXC_ROWS[i].dimTags=[];
  if(EXC_ROWS[i].dimTags.indexOf(val)<0){
    EXC_ROWS[i].dimTags.push(val);
    EXC_ROWS[i].dimTagsEdited=true;
    EXC_ROWS[i].dimTag=EXC_ROWS[i].dimTags[0];  /* keep legacy field synced */
  }
  rS3Workspace();
}
function removeDimTag(i,vi){
  if(EXC_ROWS[i].dimTags){
    EXC_ROWS[i].dimTags.splice(vi,1);
    EXC_ROWS[i].dimTagsEdited=true;
    EXC_ROWS[i].dimTag=EXC_ROWS[i].dimTags[0]||null;
  }
  rS3Workspace();
}
/* Legacy single-tag setter — translates to the multi-tag system */
function setDimTag(i,val){
  if(val==='— none —'||!val){
    EXC_ROWS[i].dimTags=[];
  } else {
    EXC_ROWS[i].dimTags=[val];
  }
  EXC_ROWS[i].dimTag=EXC_ROWS[i].dimTags[0]||null;
  EXC_ROWS[i].dimTagsEdited=true;
  EXC_ROWS[i].dimTagEdited=(EXC_ROWS[i].dimTag!==EXC_ROWS[i].dimTagAI);
  rS3Workspace();
}

function soUpdateState(){
  /* Master "all" checkbox auto-toggles all 6 individual ones (and unchecks if turned off).
     Lock button enables only when all 7 (6 individual + master) are checked AND
     all hard/soft cleanup tasks are resolved or dismissed. */
  var ids=['so-chk-all-accounts','so-chk-tax-mapped','so-chk-archived','so-chk-hierarchy','so-chk-names','so-chk-locked-after'];
  var master=document.getElementById('so-chk-all');
  var btn=document.getElementById('so-lock-btn');
  if(!master||!btn) return;

  var allIndividual=ids.every(function(id){var el=document.getElementById(id);return el&&el.checked;});
  if(master.checked&&!allIndividual){
    ids.forEach(function(id){var el=document.getElementById(id);if(el)el.checked=true;});
  }

  var allChecked=ids.every(function(id){var el=document.getElementById(id);return el&&el.checked;})&&master.checked;

  /* Cleanup gate: hard blocks must all be resolved; soft blocks must be resolved or dismissed. */
  var c=cleanupCounts();
  var cleanupOk=c.hardOpen===0&&c.softOpen===0;

  var canLock=allChecked&&cleanupOk;
  btn.disabled=!canLock;
  btn.style.opacity=canLock?'1':'0.4';
  btn.style.cursor=canLock?'pointer':'not-allowed';
}

function updS4Sidebar(active){
  /* step indices: 0=GL upload, 1=TB upload, 2=GL mapping, 3=TB review, 4=Sign-off */
  var steps=[
    'Upload GL export|.xlsx or .csv from your ERP',
    'Upload Trial Balance|As of cut-off date',
    'GL mapping|Month by month',
    'TB · BS · P&L review|Formal reconciliation',

  var rows=steps.map(function(r,i){
    var p=r.split('|');
    var state=i<active?'dn':i===active?'act':'pend';
    var sel=i===active?' sel':'';
    var sub=i<active?'Complete':p[1];
    return'<div class="sb-row'+sel+'" onclick="s4GoStep('+i+')"><div class="step-n '+state+'">'+(i<active?'&#10003;':(i+1))+'</div><div><div class="sb-name">'+p[0]+'</div><div class="sb-meta">'+sub+'</div></div></div>';
  }).join('');
  document.getElementById('sidebar').innerHTML='<div class="sb-hdr"><span class="sb-lbl">Transaction data</span></div>'+rows;
}
function s4GoStep(i){
  S4.step=Math.max(S4.step,i);updS4Sidebar(i);
  if(i===0)rS4GLUpload();
  else if(i===1)rS4TBUpload();
  else if(i===2)rS4Overview();
  else if(i===3)goStage5();
  else rS5SignOff();
}

function rS4Overview(){
  APP.screen='s4-overview';
  var a=document.getElementById('main');

  var totalTxn=S4_MONTHS.reduce(function(s,m){return s+m.txn;},0);
  var totalMapped=S4_MONTHS.reduce(function(s,m){return s+m.mapped;},0);
  var totalReview=S4_MONTHS.reduce(function(s,m){return s+m.review;},0);
  var pctDone=Math.round(totalMapped/totalTxn*100);

  var cards=S4_MONTHS.map(function(m,i){
    var cardCls='month-card mc-'+m.status;
    var statusHtml='';
    if(m.status==='done') statusHtml='<span class="mc-status mc-s-done">&#10003; Done</span>';
    else if(m.status==='active') statusHtml='<span class="mc-status mc-s-active">In progress</span>';
    else if(m.status==='warn') statusHtml='<span class="mc-status mc-s-warn">'+m.review+' remaining</span>';
    else statusHtml='<span class="mc-status mc-s-pend">Not started</span>';

    var progCls=m.status==='done'?'grn':m.status==='todo'?'tc':'amb';
    var mappedCls=m.status==='done'?'grn':'';
    var reviewCls=m.review>0?'red':'';

    var varHtml=m.status!=='todo'
      ?('<div class="mc-var-flag '+(m.var?'has-var':'no-var')+'">'+(m.var?'&#9651; TB variance detected':'&#10003; No variance')+'</div>')
      :'';

    var onclick=' onclick="goS4Month('+i+')"';

      +'<div class="mc-header"><span class="mc-month">'+m.m+'</span>'+statusHtml+'</div>'
      +'<div class="mc-prog-wrap"><div class="mc-prog-bar '+progCls+'" style="width:'+m.pct+'%"></div></div>'
      +'<div class="mc-stats">'
        +'<div class="mc-stat"><div class="mc-stat-n '+mappedCls+'">'+m.mapped.toLocaleString()+'</div><div class="mc-stat-l">mapped</div></div>'
        +'<div class="mc-stat"><div class="mc-stat-n">'+m.txn.toLocaleString()+'</div><div class="mc-stat-l">total</div></div>'
        +'<div class="mc-stat"><div class="mc-stat-n '+reviewCls+'">'+(m.review>0?m.review:'—')+'</div><div class="mc-stat-l">to review</div></div>'
      +'</div>'
      +varHtml
    +'</div>';
  }).join('');

  a.innerHTML='<div class="srow"><span class="badge b-proc">In progress</span><span class="bmeta">Transaction data &middot; GL mapping</span></div>'
    +'<h1>GL transaction mapping</h1>'
    +'<p class="desc">Your GL covers '+totalTxn.toLocaleString()+' transactions across 9 months. Work month by month — the AI has pre-mapped the majority. Click any month to open its workspace, or start from January.</p>'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">'
      +'<span style="font-size:12px;color:var(--color-text-tertiary);font-weight:300">'+totalMapped.toLocaleString()+' of '+totalTxn.toLocaleString()+' transactions mapped</span>'
      +'<span style="font-size:12px;font-weight:700;color:var(--color-brand)">'+pctDone+'% complete</span>'
    +'</div>'
    +'<div class="coa-prog-wrap" style="margin-bottom:18px"><div class="coa-prog-bar tc" style="width:'+pctDone+'%"></div></div>'
    +'<div class="month-grid">'+cards+'</div>'
    +'<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">'
      +'<div style="font-size:12px;color:var(--color-text-tertiary);font-weight:300">'
        +totalReview+' transactions across all months need your review'

    +'</div>';

function rS6UAT(){

  var allDone=passed===6;

  // urgency banner — simulated: item 0 has been pending >48h
  var urgencyHtml='<div class="urgency-banner yellow">&#9651; 1 item pending for more than 48 hours — your IA has been notified.</div>';

  var cards=UAT_ITEMS.map(function(item,i){
    var st=S6.items[i].status;
    var isActive=S6.activeItem===i;
    var numCls=st==='pass'?'done':st==='flagged'?'flag':isActive?'active':'';
    var numContent=st==='pass'?'&#10003;':st==='flagged'?'!':isActive?'&#9654;':(i+1);

    +'</div>'
    +'<div class="coa-prog-wrap"><div class="coa-prog-bar '+(allDone?'grn':'tc')+'" style="width:'+(passed/6*100).toFixed(0)+'%"></div></div>'
    +'<div style="margin-bottom:12px"></div>'
    +urgencyHtml
    +cards
    +'<div style="margin-top:14px">'
      +(allDone
        ?'<button class="btn-cont" onclick="goS6SignOff()">Proceed to sign-off &#8250;</button>'
        :'<button class="btn-cont" style="opacity:.35;cursor:default" disabled>Proceed to sign-off &#8250;</button><p style="font-size:11px;color:var(--color-text-tertiary);margin-top:6px;font-weight:300">Complete all 6 UAT checks to proceed</p>')

function s6Pass(i){
  S6.items[i].status='pass';
  S6.activeItem=null;
  S6.showFlagForm[i]=false;
  // auto-open next pending
  for(var j=i+1;j<6;j++){if(S6.items[j].status==='pending'){S6.activeItem=j;break;}}
  rS6UAT();
}
function s6ShowFlag(i){S6.showFlagForm[i]=!S6.showFlagForm[i];rS6UAT();}
function submitFlag(i){
  var ta=document.getElementById('flag-note-'+i);
  if(ta)S6.items[i].flagNote=ta.value;
  S6.items[i].status='flagged';
  S6.showFlagForm[i]=false;
  S6.activeItem=null;
  // for demo: immediately resolve the flag
  setTimeout(function(){
    S6.items[i].status='pass';
    S6.items[i].flagNote='';

  },1200);

}

function updS7Sidebar(active){
  var steps=['IA go-live checklist|IA executing','MIGRATION &#8594; LIVE switch|Final confirmation','You are live|Celebration'];
  var rows=steps.map(function(r,i){
    var p=r.split('|');
    var state=i<active?'dn':i===active?'act':'pend';
    var sel=i===active?' sel':'';
    var sub=i<active?'Complete':p[1];
    return'<div class="sb-row'+sel+'" onclick="s7GoStep('+i+')"><div class="step-n '+state+'">'+(i<active?'&#10003;':(i+1))+'</div><div><div class="sb-name">'+p[0]+'</div><div class="sb-meta">'+sub+'</div></div></div>';
  }).join('');
  document.getElementById('sidebar').innerHTML='<div class="sb-hdr"><span class="sb-lbl">Stage 7 &middot; Go-Live</span></div>'+rows;
}

function s7GoStep(i){
  S7.step=Math.max(S7.step,i);
  S7.step=i;updS7Sidebar(i);
  if(i===0)rS7Checklist();
  else if(i===1)rS7Switch();
  else rS7Live();
}

      +'<div class="p0-cta-card">'
        +'<div class="p0-cta-title">Migration in progress</div>'
        +'<div class="p0-cta-sub">You are on Stage '+curStage+'. Pick up where you left off.</div>'
        +'<button class="btn-begin" onclick="jumpToStage('+curStage+')">Continue &mdash; Stage '+curStage+': '+stageNames[curStage]+' &#8594;</button>'

      +'</div>';
  }

  // ── CASHBACK CARD ─────────────────────
  var cashbackHTML;
  if(!inProgress){
    cashbackHTML = ''
      +'<div class="p0-cashback">'
        +'<div class="p0-cashback-hdr"><div class="p0-cashback-hdr-lbl">Your cashback incentive</div></div>'
        +'<div class="p0-cashback-body">'
          +'<div class="p0-cashback-row"><div class="p0-cb-icon full">&#127881;</div><div class="p0-cb-text"><span class="amount">Full month cashback</span><span class="when">Go live within 30 days of first upload</span></div></div>'

          +'<div class="p0-cashback-row"><div class="p0-cb-icon none">&#8212;</div><div class="p0-cb-text"><span class="amount" style="color:var(--color-text-tertiary)">No cashback</span><span class="when">After 60 days</span></div></div>'
          +'<hr class="p0-cb-divider">'
          +'<p class="p0-cb-note">The clock starts the moment you upload your first file. Every day the Controller delays a sign-off checkpoint is a day closer to the cashback deadline. Both you and your IA see the countdown at all times.</p>'
        +'</div>'
      +'</div>';
  } else {
    // In-progress: show projected dates instead
    cashbackHTML = ''
      +'<div class="p0-cashback">'
        +'<div class="p0-cashback-hdr"><div class="p0-cashback-hdr-lbl">Cashback status</div></div>'
        +'<div class="p0-cashback-body">'
          +'<div class="p0-cashback-row"><div class="p0-cb-icon full">&#127881;</div><div class="p0-cb-text"><span class="amount" style="color:var(--color-success-text)">Full cashback &mdash; on track</span><span class="when">Projected go-live Day '+(curDay+Math.max(0,22-curDay))+' &middot; deadline Day 30</span></div></div>'
          +'<hr class="p0-cb-divider">'
          +'<div class="p0s-proj-row"><span class="p0s-proj-lbl">Migration started</span><span class="p0s-proj-val">Day 1 &mdash; Oct 1, 2025</span></div>'
          +'<div class="p0s-proj-row"><span class="p0s-proj-lbl">Current stage</span><span class="p0s-proj-val">Stage '+curStage+'</span></div>'
          +'<div class="p0s-proj-row"><span class="p0s-proj-lbl">Projected go-live</span><span class="p0s-proj-val" style="color:var(--color-success-text)">~Day '+(curDay+Math.max(0,22-curDay))+'</span></div>'
          +'<div class="p0s-proj-row"><span class="p0s-proj-lbl">Full cashback deadline</span><span class="p0s-proj-val" style="color:var(--color-success-text)">Day 30</span></div>'
        +'</div>'
      +'</div>';
  }

  // ── ENTITY CONFIG ────────────────────
  var entityHTML = ''
    +'<div class="p0-entity-card">'
      +'<div class="p0-entity-hdr"><span class="p0-entity-lbl">Configured by your IA</span><span class="p0-entity-badge">Setup complete &#10003;</span></div>'
      +'<div class="p0-entity-grid">'
        +'<div class="p0-entity-field"><label>Entity</label><span>PT Makmur Jaya</span></div>'
        +'<div class="p0-entity-field"><label>Cut-off date</label><span class="mono">30 Sep 2025</span></div>'
        +'<div class="p0-entity-field"><label>Source system</label><span>Accurate</span></div>'
        +'<div class="p0-entity-field"><label>Fiscal year start</label><span class="mono">1 Jan 2025</span></div>'
        +'<div class="p0-entity-field"><label>Accounting basis</label><span style="color:var(--color-success-text)">Accrual &#10003;</span></div>'
        +'<div class="p0-entity-field"><label>Migration tier</label><span>Standard &middot; 30 days</span></div>'
      +'</div>'
    +'</div>';

  // ── TEAM ─────────────────────────────
  var teamHTML = ''
    +'<div class="p0-team-card">'
      +'<div class="p0-team-hdr">Migration team</div>'
      +'<div class="p0-team-body">'
        +'<div class="p0-team-row"><div class="p0-team-av ctrl">BW</div><div><div class="p0-team-name">Budi Wibowo</div><div class="p0-team-role">Controller &middot; Primary</div></div></div>'
        +'<div class="p0-team-row"><div class="p0-team-av ctrl">SR</div><div><div class="p0-team-name">Sari Rahayu</div><div class="p0-team-role">Controller &middot; Secondary</div></div></div>'
        +'<div class="p0-team-row"><div class="p0-team-av ia">RM</div><div><div class="p0-team-name">Reza Maulana</div><div class="p0-team-role">Implementation Associate</div></div></div>'
        +'<div class="p0-team-row"><div class="p0-team-av spn">HS</div><div><div class="p0-team-name">Hendra Santoso</div><div class="p0-team-role">Director Sponsor &middot; View only</div></div></div>'
      +'</div>'
    +'</div>';

  // ── IA MESSAGE (pre-migration only) ──
  var iaHTML = !inProgress ? ''
    +'<div class="p0-ia-card">'
      +'<div class="p0-ia-hdr">Your Implementation Associate</div>'
      +'<div class="p0-ia-body">'
        +'<div class="p0-ia-av">RM</div>'
        +'<div class="p0-ia-name">Reza Maulana</div>'
        +'<div class="p0-ia-role">Implementation Associate &middot; Klay</div>'
        +'<div class="p0-ia-msg">Everything is configured and ready. When you have your 3 files exported from Accurate, click Begin Migration. I will be notified the moment you upload your first file and will schedule the Stage 2 dimension discovery session with you.</div>'
      +'</div>'
    +'</div>' : '';

  // ── ATTENTION BANNER (in-progress only) ──
  var attnHTML = inProgress ? ''
    +'<div class="p0-attn-card">'
      +'<div class="p0-attn-hdr">&#9651; Action needed</div>'
      +'<div class="p0-attn-body">'
        +'<div class="p0-attn-item"><div class="p0-attn-dot"></div><span>Stage 3 — 62 accounts need your review before CoA sign-off</span></div>'
        +'<div class="p0-attn-item"><div class="p0-attn-dot"></div><span>Stage 1 — 4 vendors still have missing payment terms (due Day 15)</span></div>'
      +'</div>'
    +'</div>' : '';

  // ── ASSEMBLE ─────────────────────────
  return '<div class="p0-shell">'
    + heroHTML
    +'<div class="p0-body">'
      +'<div class="p0-left">'
        +'<div class="p0-stage-table">'+stageRowsHTML+'</div>'
        + teamHTML
      +'</div>'
      +'<div class="p0-right">'
        + ctaHTML
        + attnHTML
        + cashbackHTML
        + entityHTML
        + iaHTML
      +'</div>'
    +'</div>'
  +'</div>';
}

function beginMigration(){
  document.getElementById('sidebar').style.display='';
  document.getElementById('main').style.padding='';
  document.getElementById('stagebar').style.display='';
  APP.stage=1;APP.screen='s1';
  APP.s1.ts=[0,0,0];APP.s1.day=0;APP.s1.cur=0;
  updStageBar();updDay();
  updS1Sidebar();
  rUp(document.getElementById('main'),T[0],0);
}

function rLogin(){
  // inject login overlay over everything
  var el=document.getElementById('login-overlay');
  if(!el){
    el=document.createElement('div');
    el.id='login-overlay';
    el.className='login-overlay';
    document.body.appendChild(el);
  }
  el.style.display='flex';
  el.innerHTML=''
    +'<div class="login-card">'
      // Logo
      +'<div class="login-logo">'
        +'<div class="login-logo-mark">'
          +'<svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">'
            +'<path d="M22 4L6 10V22C6 31 13 38.5 22 41C31 38.5 38 31 38 22V10L22 4Z" fill="#B83D08"/>'
            +'<path d="M22 4L6 10V22C6 31 13 38.5 22 41V4Z" fill="#A03206"/>'
          +'</svg>'
        +'</div>'
      +'</div>'
      // Title
      +'<div class="login-title">Welcome</div>'
      +'<div class="login-sub">Log in to continue to <strong>Klay</strong>.</div>'
      // Error
      +'<div class="login-error" id="login-error">Wrong email or password. Please try again.</div>'
      // Email
      +'<div class="login-field"><label>Email address *</label><input type="email" id="login-email" placeholder="you@company.com" autocomplete="email"/></div>'
      // Password
      +'<div class="login-field"><label>Password *</label><div class="login-pw-wrap"><input type="password" id="login-pw" placeholder="Your password" autocomplete="current-password"/><button class="login-pw-eye" onclick="togglePw()" tabindex="-1"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>'
      // Reset
      +'<button class="login-reset" onclick="void(0)">Reset password</button>'
      // CTA
      +'<button class="btn-login-continue" onclick="submitLogin()">Continue</button>'
      // Divider
      +'<div class="login-divider"><span>OR</span></div>'
      // Google
      +'<button class="btn-login-google" onclick="submitLogin()">'
        +'<svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>'
        +'Continue with Google'
      +'</button>'
    +'</div>'
    // Footer logo
    +'<div class="login-footer">'
      +'<svg class="login-footer-mark" width="24" height="24" viewBox="0 0 44 44" fill="none"><path d="M22 4L6 10V22C6 31 13 38.5 22 41C31 38.5 38 31 38 22V10L22 4Z" fill="white"/><path d="M22 4L6 10V22C6 31 13 38.5 22 41V4Z" fill="rgba(255,255,255,.6)"/></svg>'
    +'</div>';

  // allow Enter key to submit
  setTimeout(function(){
    var pw=document.getElementById('login-pw');
    if(pw)pw.addEventListener('keydown',function(e){if(e.key==='Enter')submitLogin();});
    var em=document.getElementById('login-email');
    if(em)em.addEventListener('keydown',function(e){if(e.key==='Enter')submitLogin();});
  },50);
}

function togglePw(){
  var inp=document.getElementById('login-pw');
  if(inp)inp.type=inp.type==='password'?'text':'password';
}



function submitLogin(){
  var email=document.getElementById('login-email');
  var pw=document.getElementById('login-pw');
  var err=document.getElementById('login-error');
  // demo: any non-empty input works; wrong = show error once
  var e=email?email.value.trim():'';
  var p=pw?pw.value.trim():'';
  if(!e||!p){
    if(err){err.textContent='Please enter your email and password.';err.classList.add('show');}
    return;
  }
  // demo auth: accept any input
  var overlay=document.getElementById('login-overlay');
  if(overlay){overlay.style.display='none';}
  rPhase0();
}
